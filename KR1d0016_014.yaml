front:
  text: 周禮通今續論
  hash: sha256:496c82b3b821fa8705eb811d7e448dae3bb1639bb6758d91ce17dacd3e8d03d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0016_WYG_014-1a, image: WYG0096/WYG0096-1036a.png}
body:
  text: 翼傳論徳行道藝舉選附周禮一書規模措置綱舉目張運之於廊廟而遐陬僻壤無遺照範之於天地而昆蟲草木致其詳禮樂之顯設鬼神之幽㣲人道之曲折周旋庶彚之相感相制莫不包舉而無遺讀之若見其粗而精者未嘗不在其中措之若見其滯於事侑於迹合之以自然證之以至理則道未嘗不寓於器之内是故或一言而盡天下之道或一法而含千古之變其叙事也簡而嚴盡而不迂其立詞也約而周推而有餘所謂建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也非周公之元聖仰思待旦損益百代躬親吐握之勤者孰能及此是萬聖之指㣲帝王之楷範六經之本根儒者致用之梯航也其可不盡心乎然聖經廣博淵深萬事庶物雖舉其綱而萬目則可類而推也百官萬務雖提其要而細㣲曲折則可詳而演也古今之異風氣之宜稽之百代尚可損益而推行也愚於聖經所存既句之為釋章為之原雖繁而不厭矣自春秋戰國以至於今代有賢哲其所述作豈無可以發揮聖經者乎六藝之奥衍百工衆技之敷陳豈無可以補其所未備者乎帝王之傳統其損益因革豈無三代遺跡相傳而未泯者乎愚再欲推原聖經之㫖趣合賢哲之敷述集成記傳以羽翼之其事詳其文理其義正要皆生民之不可廢者請得而詳言之夫自周公而下惟孔子孟子既得其道又明其法嘗曰苟有用我者期月而已可也及終不遇也乃曰甚矣吾衰也久矣吾不復夢見周公孔子之夢思者豈周公之形體哉以周公為萬世開太平之具在周禮故也孟子曰諸侯惡其害已也而皆去其籍籍之所去大小司馬班爵班禄之法而已其他固具在而孟子聞之熟矣井田征税之法班爵班禄之論教齊梁王道之陳位職賢能之辨皆所以補聖經者亦既家傳而人誦矣自孟子而下有王制之作雜夏殷之制雖未見周禮然其言有羽翼聖經者固多也又有夏小正一篇出於戴氏之所傳然經幸存於傳之中取而標之其詞古其義深孔子所謂吾得夏時者非此也哉秦有吕不韋者集門客作月令此非不韋之客所能撰也盖秦未火之先所得禮樂古文相傳而未泯者祖小正之意集成倫類而為十二紀之首焉觀其他篇之不相似可知矣故月令之篇今在戴記然於周禮有發明羽翼之道焉戴記之中又有明堂位一篇乃末魯儒者所作其詞主於誇大魯國然所陳禮樂之器宫室之度多有古制存焉但曰周公踐祚而朝諸侯則害教者也内則之中有飯食之制八珍之法盖周禮食醫酒正等官之傳也并明堂位皆以翼周禮焉考工記一篇乃戰國之儒㑹集古工作之事而文之作為此書雖四十三工之詳然皆周禮工事之支裔耳後儒取以補冬官不亦謬乎其他有所謂九刑政典者具於偽三墳書未可入傳也惟有司馬法其言間見於漢書或小司馬之遺逸者其出車制賦之灋簡稽之數誠可以補小司馬之闕者宜取以附經外此又有齊司馬穰苴兵灋號曰司馬灋其中所言行師之制九伐之灋多有合於王灋者此其人必曾見古司馬灋之書而為之傳耳今選其可以羽翼聖經者以附於後凡此六篇皆采先儒之訓以釋之為周禮之内傳焉此皆先秦古書也竊又常推之周禮大指教人以徳行道藝取人以賢徳才能有徳行則謂之賢而使之在位有道藝則謂之能而使之在職故孟子之論王道曰賢者在位能者在職則古者教人之具取人之制舉可知矣是知徳行有徳行之書道藝有道藝之書讀徳行之書者宜取之以徳行讀道藝之書者宜取之以道藝斯理之必然也後世教法之廢由於鄉法不立故萬事無本取人之制先壞故不得已設科目以羅天下之人材雖曰示公而古人之教法掃地矣竊嘗思之科目之設是欲人苦心讀書以求其理發揮於辭藻以暢其材也夫五經四書之教其大指在於欲人體之於身而為徳揩之於事而為行也是徳行之書矣今之取人也固欲取其才以治天下之事是宜使之讀道藝之書以達其材然後可也今乃使之讀徳行之書是宜取之於徳行可也乃使之依徳行之書而發揮於文辭以觀其才則五經四書柰之何不使人視為空言且以之為求利禄之筌乎由不知徳行道藝之教而所取悖於所學故也請得而分之古人六徳之教曰知仁聖義中和五經四書孰非教人以進六徳哉六行之教曰孝友睦婣任恤今内則曲禮之中孰非教人以行六行哉道藝之教曰禮樂射御書數今所存者禮則儀禮也樂則六代之舞今大司樂所掌固所以教國子成徳之具也射則鄉射兵射也御則在於曲禮書數則古文雖不可見今之藝則愈精矣然此六藝乃才藝非道藝也謂之道則又有經緯天地之用焉故又有大學小學之教為徳行道藝之本也小學教之以事大學教之以理然小學之事不外乎大學之理大學之理不出乎小學之事但人之入道有淺深故學有大小之辨也由是觀之則小學有小學之事小學之理大學有大學之事大學之理者也小學之事則少儀内則曲禮是也小學之理則自洒掃應對上便可到聖人事人莫不飲食鮮能知味是也大學之事則周禮儀禮是也大學之理則五經四書是也以小學大學槩之則徳行道藝始無所偏而才徳大小皆當於用矣今欲以徳行取人歟則宜先立鄉遂之灋比閭族黨州鄉之制以處其位而使之讀五經四書徳行之書可也欲以才能取人與治天下之事歟則宜使之讀周禮儀禮及六藝之書可也是知小學者徳行之本大學者小學之用而道藝之事皆具於大學則道藝者徳行之用乎徳行者道藝之本乎故不知小學大學之辨無以知徳行道藝相為體用而人品髙下皆以是而知鄉舉里選之灋根本實在乎此故孟子曰夫人幼而學之壯而欲行之可謂能得大學小學之意徳行道藝體用之義矣今夫周禮之書大學之實事也上自天子宰相不知之則無以經綸天下下及卿大夫士不知之則無以奉守其職孔門所傳大學之書乃其中之理耳儒者執之曰大學在是矣其所謂脩身不知身何以脩其所謂齊家不知家何以齊而所謂治國平天下者又何所注錯耶執是而施之實事如無星之秤無寸之尺但據其資以隨世就功而已則孔門大學之教不亦荒乎殊不知脩身齊家之實事已具於内則曲禮而教者固以是而制刑耳治國平天下之實事則具於周禮儀禮施而措之綱紀天地陶冶民物無不備矣非大學之全書哉然六徳之書所謂知仁聖義中和之理備于四書五經也成祖既命儒臣類輯成書備列秦漢以下先儒註説至詳至備可以行之萬世無弊矣此外又有性理大全通鑑纂要然皆徳行之書也取士之制非精於此固不以之列於士民之上其於六徳六行之事可謂遵行極至矣竊謂成周取士徳行兼舉以徳無可見故鄉刑不立内有其徳外必見之於行故鄉灋有八刑之紏是教之以徳而考之以行也今觀鄉灋所書閭胥書敬敏任恤族師書孝弟睦婣有學黨正乃書徳行道藝之全焉州長又從而考之豈非教之以徳而書之以行也乎今取士以徳行材藝只於六徳之書求之六行無書周禮儀禮又不習而通之而行舉選之灋則誦六徳之書以應舉者皆空言無實何從而考其有徳而見之於行也惟考行之典不舉是以舉選不得不糊名易書以示至公此非聖人之意也古人有徳行道藝正欲知其名而舉之知其人而書之獨行於隠㣲之地而書之於昭昭之表風行海流人必向化矣何糊名易書之有此科舉之灋所以與古大悖也所以然者以六行無全書人無所法守而書者亦無所據依故耳是宜下明詔脩六行之書命儒臣開局聘召天下有博學行誼之士聚天下之書分類博考上自天子下至庶人將孝弟睦婣任恤分為細目立成提綱取祖宗所脩五倫書孝順事實為善隂隲等書兼取而類著之古今言行有可采者大而諸史細而行狀志銘皆所節取以成科條雖細行有所不遺而性理大全之例既成頒行天下下自閭巷上及朝廷皆以是循而行之凡里閭之中有行義敦篤之士行合古人一二者據其事實能某事可合古何人何事季書歲考以取之則實行可得而風俗可美矣又以六藝成就人才而兼取焉則任國事有人而才行可興矣使不脩成全書令其師灋則無為而行無據而書故機不動而崇虚者多也然則六行之書雖非周禮之正傳亦推廣周禮之事也至於六藝所以成就人才共成三物者固有其書而推其説於後云藝記推廣古六藝之教分為内外十二記叙論傳曰徳成而上藝成而下行成而先事成而後藝者所以盡乎事之理也而道存於其間矣故道得於心之謂徳道行於身之謂行道見於事之謂藝徳行所以成已道藝所以成物不可偏廢也今分以上下先後者亦以君子之學當先體而後用先本而後末故耳周禮閭胥書敬敏任恤未及乎藝也族師書孝弟睦婣有學六行全矣而藝在乎有學之中矣及黨正乃書徳行道藝之全焉而藝必以道言者以勤敏有學皆藝之本明藝為徳行中之物而非外也學必有體有用而道乃全耳古之六藝為禮樂射御書數以今觀之惟禮可以盡之樂固寓於禮射御乃行禮之事書數亦為禮中之物盖先王以禮治天下故六藝亦不出於禮也愚謂古今不同禮樂宗伯所掌為藝之首則六藝之禮樂與宗伯之禮樂必有分矣盖存其大本則謂之道盡其度數則謂之藝今之射御不以取士既為行禮之事則射御之外宜加以兵刑與禮樂射御書數為六藝庶可成一世之人才為朝廷之用也請推廣古六藝之意集後世藝術之書分為内外十二記以達天下之材僣妄之罪固不可逃然一得之愚聊備採擇内六記曰禮曰樂曰兵曰刑曰書數外六記則天文也地理也醫方也卜筮也農桑也祝史也内六記公卿大夫皆可學庠序學校皆可教也外六記則凡民皆可習之有精其術者各有職以用之焉曰禮記者仍立家鄉邦國王朝四部以統之家禮則冠婚喪祭四禮程朱已有成書近世儒者著述或節其要或備其儀皆可參定焉鄉禮則士相見鄉飲酒與鄉射投壺之類朱子増損吕氏鄉約備其禮今有鄉約可舉古鄉灋之教者宜定著為家鄉教灋之書焉郡國王朝之禮今則有大明集禮其篇目與古五禮不逺矣宜酌古凖今再加脩纂以通行天下可也曰樂記者樂學不傳人起異議以愚觀之惟漢史為得其傳也苟能候氣而得至神黄鍾之管則樂之制度分數具存苟設官分局如大司樂之所掌徴天下有邃思心得者與瞽矇同聚審其音節則古樂必可復矣然後取漢唐宋及近代名賢制作如史漢律書宋史及律吕新書近世亦有樂書可用者重加討論著為樂律全書以成一代之制作焉然周家四夷之樂亦設其官使服其服用其器作於廟廷之士以示王者無外之意今世俗樂與器見於陳氏樂書等集者亦古夷樂之類也去其淫哇協以中聲皆可兼用焉春官鼓人舞師專為民間教樂而設有兵舞帗舞羽舞皇舞野舞之類今既不傳然其用不可廢也遂變為民間俗戯亦樂舞之類也雖詞腔非古亦世變使然若作其忠孝節義之處能使人感動而興起今浹肌淪骨不可革矣愚以為孟子告齊宣以今樂猶古者亦取其有補世教則同耳苟因而正之將古之忠良孝義節行之事制其聲詞協以音律去導欲増悲之聲著數十本頒之天下専設官以司其教酷禁鄭衛淫哇之戯寘之重法必可以移風易俗助王化不少矣亦此去邪反正之機也兵者所以威不軌而昭文徳也後世兵民既分文武二道則所以處兵者甚詳然皆不如成周之制兵民為一無坐食之費有挑選之精其習之平時者蒐苗狩獮之法教戒甚詳此所以兵無不精戰勝攻取主客之勢甚懸故未有悖逆盜賊奸宄之徒而可以勝吾教戒有素百中選一之精者也夫成周選兵之制處兵之方既論於前矣而所以教兵之事用兵之法則習兵者所宜講也宜命儒臣定著武經如握奇七書將傳及總要等書參酌類為篇目去其險恠一依正理令天下遵習則必有眞才出焉亦可謂藝之大者至於刑者所以輔禮亦以弼教也自漢迄今刑書具存弼教輔禮之意似為少矣愚意以為古鄉刑所紏者六行孝友睦婣任恤也宜以之分條別類著之於前然後以刑繼之曰違如何禮經則當入如何刑法有禮以道之有刑以齊之刑必依禮故人欲求其免刑者先於學禮今禮經不著民無循守之方著為刑律亦無根本致民不知而誤陷者遽執法而論之不幾於不教而殺乎故欲脩刑律先脩禮經今内則曲禮孰非六行之條目此古禮也今亦宜訪禮意制為民間常用之禮然後準此以制刑輕則朴罰重則入五刑矣五刑亦本於違禮故也次曰嘉石次曰圜土然後有五刑曰墨劓宫刖大辟也一麗肉刑則不得復為平人矣此古之刑罰也今為刑書宜以古刑定其綱然後以漢唐宋之法傳著為三千之目則刑之宜因宜革務協於至當而盡世事之變焉著為刑書頒之天下古治可復作矣六書自黄帝作書契以代結繩之政蒼史觀鳥跡成六書之文至於今盖十百變矣古人以此為至重之務故保氏以六書教國子外史掌達書名行人掌諭書名欲天下書同文也漢循其法太史試學童諷書九千字者得為史吏民上書字有不正者則紏劾之至宣帝乃命諸儒脩蒼頡法光武時馬援上書論文字偽謬和帝命賈逵脩理舊文於是許愼訪之於逵著為説文後世宗之今雖有洪武正韻之書然推衍六義畧矣宜考六書之法以母統子相生不窮之用著為定論以正字體然後考古篆籕八分之法一變為𨽻再變為眞又變為行為草著之於後令天下習者同焉則文無不正矣精其藝所以載二帝三王之道以繼熈熈穆穆之風次而官府簿書刑名計數皆不可苟者豈可以無一定之制乎數者出於天地之自然書契未興而數攸始保氏以數教國子則古必有其經是以天文律厯出於古者精於後世逺甚今既不可考矣後世筭術雖非古文然九數之推幽㣲畢具至於執數寸之矩而日月之運行朓朒遲速之變山谿之髙深廣逺凡目力所及無不可知者是數之術後世未嘗亡也朱子欲補書數二藝於王朝之禮况樂厯之於數尤切者是宜取後世數學之書如九章筭術之類及古今推衍發明之論類成全書頒行天下亦至要之藝也此内六記即古之道藝所以成就人才以為世用也王宫國都庠序學校天下民庶不能舍之以為學豈能舍之以為教哉苟能如成祖五經大全之例纂集成書令天下習焉皆致用之實也今庠序之士亦衆矣古人之教必以徳行道藝上者賔興次者亦可為世用豈可專於徳行而廢道藝之習乎若為業以授之為科以等之然後為職以任之而天下無遺才矣豈有終老庠序之歎哉又有外六記一曰天文周禮馮相氏掌推步保章氏掌占候古者重黎氏能世序天地堯典一篇言天文者過半先儒曰此堯所以盡為君之職也後世有司天臺我朝改為欽天監盖天文古經雖不可見漢有甘石洛下閎頗得其傳不外乎漢史所推者矣唐有李淳風僧一行元有郭守敬亦有卓然名家者斯皆有書藏於天府今監立四科之職以司之不傳於民間矣而大統厯頒行天下者民所宜用止五十餘事然亦畧而不詳不免循用宋元人所集通書美惡雜居又無制化之法多載禍福之詞令人拘而多畏亦有欽頒選擇書畧而不詳是宜再斟酌之兼取通書釐正其煩雜定其可依者著為成書去其不經之説行於天下有精其術者居隂陽之局以前民用此盖舊法之不可廢者二曰地理自公劉相隂陽觀流泉而衛文公作楚邱望景觀卜而地理之術始啟古人作邑作宫以矩而定誠有趨吉避凶之法不敢苟也自郭氏葬經一出而地理之學始繁如今世葬師㝠行瞽趨妄談禍福鼓惑吾民至有停喪不葬以媒利益者不可勝數其害豈少哉故泥其術則害教廢其術則其論亦誠有可取用之亦有能合天地之機者亦宜原其正理取其要約去其邪誕之言集為正宗之書令民間循而行之使不惑於異説不溺於他岐亦民事之不可廢者三曰醫師記周禮醫師所掌羣醫立案考之以上下其食有食醫為調養之節有内証有外証有獸醫古之醫政精詳如此是欲納天下於仁夀之域也後世醫書充棟汗牛然其要未嘗不存焉故最近理者莫如醫宜節取大本正宗之書分為數部頒行天下醫學立醫政為醫案考之以上下其食亦仁民之切務也四曰農桑記衣食民之大本在焉固宜不教而能矣然周禮有草人教民糞種稻人教民畜㵼水利楊芟作田柞氏攻草木薙氏掌殺草則教民農桑實在上者所宜留心也後氏種植之事耕稼之法各有其書近世有王氏農書可謂大備矣若更以農桑輯要等書類成全備頒之民間俾有司行勸課農桑之政焉豈非大本所繫哉五曰卜筮記傳曰聖人建天地隂陽之情立以為易雖有明智之心必進斷其志焉示不敢專以尊天也則卜筮雖聖人有不敢廢况天下之人乎古卜筮之法至詳周禮太卜之官以下大夫為之掌三易三龜三夢之法龜兆之體皆百有十二其頒皆千有二百漢司馬遷作龜䇿傳亦亡矣禇氏所補者似不足以盡古人之奥惟易更四聖而始備而連山歸藏亦不傳矣三夢之法其經運十其別九十今皆亡矣然則夢之與卜聖人以之而得良輔季冬聘王夢獻吉夢于王拜而受之乃舍萌于四方以贈惡夢朕兆未萌則有夢以先之也此天地之靈著於人心也故聖人作經使其戒愼恐懼以保其吉脩省飭戒以消其㓙非欲前知所以正人心備法戒至切也揚子雲作太𤣥以凖易後世或有取焉然於聖人之法無所當也司馬之潛虚蔡氏之洪範雖以擬易無補於世今筮法詳矣或入於外道而龜卜亦無有賢哲纉承其緒作經如太𤣥不亦可乎唐徐堅作龜經似亦可采今若參而定之著書如易繫無不可者至於夢之在人為靈至神為應至妙也因而設教使人恐懼脩省至切也乃無聖哲作為夢經以行其政焉豈非大闕者乎宜令天下有宿學邃思能窺天地隂陽之奥秘者作龜夢之經傳用諸朝廷以及天下斯有助於世教不少至於禄命雜數充滿天下雖有小驗斯皆後世之事固非聖人之所留念也六曰祝史記夫天地之間有隂必有陽有人必有神是以聖人立太祝之官以司天下之神有男覡女巫以通鬼神之情凡以神仕者考其藝為進退之等至於宫中亦設女祝又制為禮度辭命以通上下逺近親疎其治神之法甚詳是以邪誕之説不行而神人各安其所也後世儒者未通幽明之故一切鬼神皆目為邪至所以禮神之事又濶畧空疏致使異端得以因其機而入其説天下隂機遂為彼所執庶民靡然從之而遂行其教法律憲有所不能禁驅除有所不能滅大賢志士繼出然扑之未滅而愈熾廢之未久而即復何也亦先王之制不明故也今若循先王之法而經制之則異端亦將歸正而為吾用矣宗人職曰掌三辰之法以猶鬼神示之居辨其名物三辰者星辰也天有三垣各有帝星象懸於天司天下鬼神今老佛二氏皆有三清佛之三清以釋伽當之老之三清以老子當之此為妖誕盖三辰者紫㣲垣其北一星名天極又名天樞盖極星所在三垣二十八宿衆星所拱為天文之正中萬神所宗今謂之紫極是也又有帝座帝星而太㣲天市二垣亦各有帝星象天子之行宫也所謂三辰者其指此歟二氏以人鬼當之謬矣猶鬼神示之居辨其名物者若何而為天神若司中司命風師雨師雷神司禄司民文昌之類固皆天神也豈可以人鬼之名瀆之五嶽四海四鎭四瀆州社里社王社之類固皆地神也又可以人鬼之號加之乎古帝王先聖先師忠孝節義之士其神長留於天地間所謂於昭于天陟降在帝左右者皆人鬼也由此而推之則天地鬼神名物皆可辨而居皆可猶矣今淫祀者盖以人鬼之名號加之天地之神示故生此異端妖誕之説儒者槩以為無之過矣盖凡天地之間隂與陽常相對日出則人用事日入則鬼用事人之生則自小而大人之死則自大而小形歸于地而精䰟則存故為之廟祀以鬼享之此人鬼之原也司巫職曰凡喪事掌巫降之禮謂人始死巫尚能降之也國有大烖則造巫恒謂其知其禬禳之方也男巫掌望祀望衍授號旁招以茅望衍之祭授以神之名號束茅而招祭之為其游䰟浪祟失位無依者為厲於人故祭之可愈病也由是言之人神不同而理則一人有人主鬼亦有主以管轄之也今天下各立城隍之神以主隂教而徧於府州縣里社亦立社神是宜鬼神各有其主矣然曰城隍里社似以地示而名人鬼夫神必依土有土而後有神此制之合宜者也是以陽有人政隂有神政賞善罰惡宜無不同矣若鬼無主以治之使歸於正則淫邪之妖各逞其靈必至嘯梁泥屋為殃為祟於人間惟朝廷處之得其道故神人各安其所也今請申明太祝之法以祛異端之説依六祝以事鬼神祈福祥作為六祈之制一曰類有災則類於上帝二曰造有事則即神之所而祭之三曰禬有災則禳之四曰禜水旱風雨之不時則雩禜之五曰攻驅逐其邪祟六曰説以言詞求解脱於神作六辭辨六號以此為綱而推其目制為禮儀牲帛器物之等辨其名號與其宜用令祝與巫史司其禮設官以申明其職掌則理幽之道得矣是宜令儒臣能通幽明之故知鬼神之情狀又能知禮樂之情文者參酌其禮著為一書頒之天下令天下僧尼道士盡改為巫祝知禮文者為史由朝廷以及鄉國閭閻皆用是人而皆治於有司則異端之説既不失其本藝亦皆吾民要用矣反正之機孰大於此凡此十二記可以盡天下之事凡天下之才藝豈出於此哉内六記庠序學校所習也儲才之多大以成大小以成小視其藝而舉用焉命官分職以任之可以無遺才矣外六記凡民皆可習古人一技一能皆有用於世今隂陽醫學二者固有職矣若僧綱道錄司之類亦可更其法易其名善其事者處以職可以無廢事矣以此而推廣周公之意則先王之法無一而不可行於後世也
