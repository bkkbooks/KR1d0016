body:
  text: 周禮全經釋原卷六明柯尚遷撰春官宗伯第三春官者象春所立之官天覆也地載也非四時之和則不能成萬物官以春為名者法春為德純和之氣贊乎天地者也宗者主也猶宗族之宗有族則有祀有祀則有宗而宗典祀者也伯長也禮莫重於祭宗伯掌天神地示人鬼之禮則謂之宗於四時之官為長則謂之伯惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國釋曰邦禮者國家之典禮也其經有五其别三十有六和邦國者禮達而分定神人之所以定上下之所以和也和則樂之所由生故宗伯兼司樂者禮樂之道相須也司馬溫公曰禮之為用大矣用之於身則動靜有法而百行備焉用之於家則尊卑有别而九族睦焉用之於鄉則長幼有倫而俗化美焉用之於國則君臣有敘而政治成焉用之於天下則諸侯賔服而紀綱正焉豈直几席之上户庭之間得之不亂哉禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人釋曰大宗伯典禮之長官總掌三十六禮與樂史之等列小宗伯副二大宗伯之事而掌其法守肆猶陳也肆師佐宗伯陳祭祀之位次及牲器粢盛之品節上中下士各有職分掌宗伯之庶事者也鬱人下士二人府二人史一人徒八人鬱於物反釋曰鬱金香草宜以和鬯鬯是秬米酒不和鬱者若祭宗廟及祼賔客則鬯人以鬯酒入鬱人煮鬱金草以和之為鬱鬯鬯人下士二人府一人史一人徒八人鬯敕亮反釋曰鬯釀秬米為酒祼則用以和鬱秬如黑黍一稃二米和氣所生謂之鬯者言芬芳條暢於上下也雞人下士一人史一人徒四人釋曰雞木畜也為物至微而設官者以其能呼旦以嘂百官祭祀賔客之禮為牲莫要焉必預養之而屬於禮官司尊彞下士二人府四人史二人胥二人徒二十人釋曰尊彛皆盛酒之器尊之為言尊也彛之為言常也尊用以獻上及天地彛用以祼施於宗廟而已尊於祭器獨名尊彛於常器均名彛尊以盛鬱鬯彛以盛齊酒司几筵下士二人府二人史一人徒八人釋曰几憑器筵席之别名敷席之法初在地一重即謂之筵重於上者即謂之席其實一物也詩曰肆筵設席授几有緝御是也原曰鬱人以下五官職至微也而居肆師之下者以在宗伯官府之內也禮莫先於器器莫要於尊彛几筵祭莫重於祼鬱鬯所以祼也而雞之為用莫要焉故各設官以司之宗伯之所役召也故次於此所謂籩豆之事則有司存者也天府上士一人中士二人府四人史二人胥二人徒二十人釋曰藏物謂之府言天者以藏宗廟祖宗之重器故尊之也不屬大府者寶器非貨賄可班也典瑞中士二人府二人史二人胥一人徒十人釋曰典者典守之義瑞玉瑞節信也玉瑞祭時所執玉器所以禮神雖餘事以事神為本故次於此也典命中士二人府二人史二人胥一人徒十人釋曰命謂諸侯羣臣宫室車旗衣服隆殺之等秩典之使不得踰僣皆禮官至要之職故次典瑞二官修則貴賤辨民志定立國之本也鄭康成謂命為王遷秩群臣之書蓋遷秩羣臣內史䇿命之有書矣此則據其見在之命而掌其序次之秩禮儀之等使不得踰越也司服中士二人府二人史一人胥一人徒十人釋曰司王之吉凶冕服及羣臣吉凶衣服服為身之章等級所存也故次典命之下典祀中士二人下士四人府二人史二人胥四人徒四十人釋曰祀國外之祀也其所兆之塋域典祀守之所以防褻慢也守祧奄八人女祧每廟二人奚四人釋曰五服親盡謂髙祖以上也天子備禮立祧廟在二昭二穆之上故曰三昭三穆用奄奚守之不言守廟而言守祧者自逺而言之也祧廟守則親廟無不守矣世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有二人釋曰世婦女官也以女人而加男爵以有職任也其職教六宫后夫人九嬪以下之禮事所謂傅母也設府於內擇內外宗之有齒德者為之大抵天子立后夫人嬪御便有傅母加以卿大夫士之職與內宰相表裏以女宫內小臣奄豎通之故曰凡內事有達於外官世婦掌之原曰天官九嬪世婦女御無爵秩者天子妃嬪序次自定非官職也何爵秩之有春官世婦有卿大夫士之爵非天子之嬪御乃后夫人以下之傅母有職者也故加以男爵女府史各二人奚各十二人者其職簡也然亦可以見其有官府矣若是天子嬪御則府史奚何為哉故知春官世婦為傅母以教六宫禮事者也或曰內宰以隂禮教六宫九嬪以婦學之法教九御矣春官世婦又詔王后之禮事相王后之􅉔事掌達內事於外官者何也曰此正春官世婦施內宰之教者也內宰之屬皆男子也豈可以入宫中而施教乎故王內之政雖無不掌而所以教隂禮婦職於嬪御者亦須世婦詔相之也况所以通傳教令者內有女宫女奚専屬宫卿之用外有內小臣奄竪専屬內宰之用乎曰世婦既為傅母今每宫卿二人大夫四人士八人合六宫則八十四人矣不亦多乎曰不惟后夫人有傅母嬪御皆有之况內既有官府則內政亦多矣故曰専掌達內事於外官外官非內宰而何哉曰既非嬪御其人何自取之曰以德行為本道藝次之或內外宗之有齒德者或王族之婦人或卿大夫士之妻以齒德為主耳故明乎春官世婦之職可以無疑於內宰混男女之别可以免奄宦竊柄之禍矣治亂之原有不係於此乎內宗凡內女之有爵者釋曰內者王族之內也宗者掌祭祀之名凡者無常數之詞也女子無爵從其夫之爵今曰內女之有爵者無乃上文世婦宫卿以下大夫士之爵其內外宗之爵乎既有爵則必有職故曰宗然則世婦則尊而為卿者爾外宗凡外女之有爵者釋曰外女王諸姑姊妹之女有爵者居宫職無爵者各從其夫凡言女者本其所生自其族人言之也雖老猶然今曰內外女則自王族言也老而有德者舉而為傅母則體統尊嚴而詔相教導可行矣八十四人之多者內外女多分六宫也府史之簡者宫政少也冢人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人釋曰封土為冡象丘壠之髙古者族葬故天子諸侯各有兆域設官掌之墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人釋曰墓者孝子思慕之處冡塋之地此官主邦墓萬民之所葬也冡與墓異名者貴賤之别也職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人釋曰職主也主諸侯卿大夫士之喪劉氏曰聖人作五禮以徑畛其民俾趨于中者也而凶喪之下達萬民苟無主執以涖其事則有過中而僭上者有不及中而遺親者何以俾民率禮於凶喪哉故墓大夫者掌庶民之凶禮也職喪者掌諸侯卿大夫士之喪禮也是以五服有制尊卑異儀殯斂虞袝葬祭禭含百禮皆有定法不可過不可不及也故曰以國之喪禮涖禁令序其事焉大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人釋曰大司樂掌成均之教成均太學也胄子國子天下俊選之士皆入教之乃大學之總師又為樂官之長古者教人皆以樂而涵濡之故曰成於樂况入大學者皆成德之士故惟以樂成就其德然後司馬辨論官材而用之大胥中士四人小胥下士八人府二人史四人徒四十人釋曰胥有才智之稱大胥掌學士之版序帥國子者小胥掌徴令撻罰之事者也大師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人視瞭三百人府四人史八人胥十有一人徒百有二十人釋曰此専職樂之官亦屬於大司樂謂之師者以其賢知而知音可以教其屬也無目曰瞽有目而無見曰矇先王作樂必用瞽者以其善聽而審於音也瞽有上中下因其藝而等之瞭視之明者瞽矇無見矣故有瞭三百人扶持輔相之因使掌樂焉典同中士二人府一人史一人胥二人徒二十人釋曰同六律六同也孟子曰不以六律不能正五音亦謂之十二同凡制必本於此故曰以十二律為之度數以十二聲為之齊量磬師中士四人下士八人府四人史二人胥四人徒四十人釋曰磬石磬也此主擊磬亦擊編鐘者編鐘與磬同律鍾師中士四人下士八人府二人史二人胥六人徒六十人釋曰鐘金屬此官掌金奏九夏者鐘之譜調也笙師中士二人下士四人府二人史二人胥一人徒十人釋曰笙竹音笙師教笙者燕禮南陔祟丘由儀白華華黍皆笙譜也鎛師中士二人下士四人府二人史二人胥二人徒二十人釋曰鎛小鐘也置官司之者多故也國語曰細鈞有鐘無鎛尚大故也大鈞有鎛無鐘尚小故也韎師下士二人府一人史一人舞者十有六人徒四十人釋曰韎東夷之樂韎赤韋也作其樂舞因使服其服從其宜也樂官亦備四夷之樂旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人釋曰旄牛尾舞者所持以指麾此官専掌舞故凡以舞仕者屬焉籥師中士四人府二人史二人胥二人徒二十人釋曰籥舞者所吹春秋萬入去籥王氏曰籥三孔主中聲而上下之律吕於是乎生焉籥章中士二人下士四人府一人史一人胥二人徒二十人釋曰籥章吹豳詩蓋民間祈報蠟祭之樂官鞮鞻氏下士四人府一人史一人胥二人徒二十人鞮丁奚反鞻九具反釋曰鞮鞻者四夷樂人所履之屨此官掌教四夷樂與聲歌故以其屨名官典庸器下士四人史二人胥八人徒八十人釋曰庸功也有功者鑄名其功於器猶曰勒功於鼎彛凡銘功之樂器皆此官掌之司干下士二人府二人史二人徒二十人釋曰干舞者持之謂楯也武舞有之此官主授器兼教舞葉氏曰大司樂而下皆樂官也樂師之教國子小舞大胥之教諸子合舞合聲小胥之令學士巡舞列籥師之教國子舞羽吹籥皆樂教也人皆知周之學政掌於樂官而不知周之樂官屬於禮官皆有深意存焉誠以教之以樂德則可以淑人之心教之以樂語則可以和人之聲教之以樂舞則可以善人之形其入人也深其化人也易猶虞之胄子教於典樂殷之太學藏於瞽宗此成均學政所以掌於樂官也然而司樂為大宗伯之屬蓋教人以禮所以養其未發之中教人以樂所以養其已發之和非中則無以為和故禮樂之相為用而不可偏廢也亦如王制樂正掌樂而曰教禮文王世子典樂之學而曰學禮此大司樂所以屬禮官也大卜下大夫二人卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人釋曰卜灼龜以占吉凶也卜實兼筮與夢其官之長只名太卜者筮短龜長而夢又非卜筮之比故總之於太卜也龜人中士二人府二人史二人工四人胥四人徒四十人釋曰専掌天下之龜工者所以攻龜菙氏下士二人史一人徒八人菙時髓反釋曰菙荆木也灼龜用荆故名官占人下士八人府一人史二人徒八人釋曰占人占蓍龜之卦兆吉凶易曰以卜筮者尚其占蓋占事知來以視兆吉凶則謂之占人簭人中士二人府一人史二人徒四人簭與筮同釋曰揲蓍曰簭簭靈草也史記曰天下平和王道得而蓍莖長丈叢生滿百莖占夢中士二人史二人徒四人本又作夢釋曰夢宵所感也人之精神通乎天地故夜之所夢而禍福妖祥成敗得喪徴焉此占夢之官所以設也視祲中士二人史二人徒四人釋曰鄭氏曰祲隂陽相祲漸成祥者魯梓慎云吾見赤黑之祲王氏曰易曰觀乎天文以察時變又曰天垂象見吉凶天人同流相應而不相逺先王於天象必立官以觀妖祥辨吉凶所以和同天地之際使之無間此視祲之官所由設也原曰卜筮設官之詳如此聖人精意之所存也蓋古人恭敬不敢自専每有大事必求諸天意而後敢行事雖出於至公猶恐涉於自擅是以虞庭讓位武周征伐遷都必稽之卜而後決繫曰聖人是興神物以前民用禮曰雖有明知之心必進斷其志焉示不敢専以尊天也卜筮之重如此聖人為此而作經不亦宜乎至於春秋猶存其法故左氏所載龜筮之繇多名言後世卜筮之法流為術數朝廷不設其官萬民左道是信令龜夢之書俱亡漢司馬遷嘗為龜䇿傳亦亡矣禇氏所補繁蕪可厭夢經無傳焉今惟有易經賴孔子翼傳而存然亦殽於衆説晦於緯書惟朱子獨出千載之見以為易本因卜筮而作著筮儀本義以發其旨可謂盛矣夫古聖為卜筮而作易孔聖因其書讚之以明道設教則今之易用於卜筮者輕用於設教者重固其所也愚謂易有聖人之道三焉曰理曰數曰占數者易之體占者易之用理則兼體用者也皆聖人精藴在焉學者曷可偏廢也宋之大儒程主理卲主數朱主占皆得聖人之意於千載之上者也學者其可不盡心乎大祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人釋曰祝者陳其詞於鬼神又致鬼神之辭於主人之稱也大祭祀用大祝小祭祀用小祝言祝兼言史者以其能作六辭也原曰大祝作六辭以通上下遠近親疏曰辭命曰誥誓曰禱誄皆出於大祝所製者今書經之中半皆其辭焉蓋史有四曰太史曰內史曰外史皆辭命之職也而祝史亦居其一焉可以見大祝之官為不輕矣故以下大夫為之也喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人釋曰喪祝辨乎喪禮者也别立官者吉凶不可同事也甸祝下士二人府一人史一人徒四人釋曰甸之言田也田獵之祝官詛祝下士二人府一人史一人徒四人釋曰大事曰盟小事曰詛誓也司巫中士二人府一人史一人胥一人徒十人釋曰巫所以降神司巫巫官之長男巫無數女巫無數其師中士四人府二人史四人胥四人徒四十人釋曰國語曰在男曰覡在女曰巫今男女皆謂之巫者其通稱也王氏曰祝則以辭而通神巫則神所降而依之故巫所以佐祝原曰先王之世王道明邪説息安有巫祝詛盟之事乃建太祝之官以司羣巫而員之廣秩之髙何也曰此所以為三代之世與古語曰何謂治鬼道微人道顯何謂亂人道微鬼道顯又曰國將興聽於人國將亡聽於神是鬼神之道無以治之治亂之所由分也古之時民神雜揉黃帝命南正重司天以屬民北正黎司地以屬神是以絶地天通鰥寡無蓋言至治之極神人各得其所也後世正道不明民心易惑淫祠諂瀆在在有之是以妖邪行其威福惑亂愚民故異端左道之術是以騁其計而民生日用遂以為異端真不可闕者大儒君子莫不病之不知先王所以理天下之幽者固自有道立大祝之官以下大夫為之司巫之屬王畿邦國在在有之司祈禱以治神祗又制為禮度辭命以通上下逺近親踈是以邪誕之説不行而神人各得其所也儒者未通幽明之故一切鬼神皆目為邪至所以禮神之事又濶略空踈故異端得以竊其機而用之所求少效愚民靡然從之異端之術遂深錮而不可救蓋由先王禮教不明祝史之官不立民心無所執持而然也苟能復先王之禮教朝野皆立巫祝之官以理天下之鬼神則異端何自而生哉太史下大夫二人上士四人小史中士八人下士十有六人府四人史八人胥四人徒四十人釋曰太史史官之長掌典法則以逆朝廷邦國都鄙之治大事執書讀禮協事掌頒告朔于邦國祭祀卜日大師抱天時從又藏六官之所登馮相保章皆屬大史蓋其職紀述國事計書禮法星厯卜祝皆在所掌矣馮相氏中士二人下士四人府二人史四人徒八人釋曰馮乘也相視也言其世登髙臺以觀天文之次序保章氏中士二人下士四人府二人史四人徒八人釋曰保守也章文章天之文也劉氏曰馮相氏考諸厯數以知天道者也保章占天象以觀時變者也內史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人釋曰黃氏曰內史掌八柄與冡宰同地愈親任愈重故其爵秩髙置員廣皆先王精意自漢始以尚書總朝事自後離為中書又離為門下而朝廷日以卑非成周建官之意史之官有二太史掌天時與禮者故以馮相保章為屬內史掌治法䇿命者故以外史御史為屬然皆掌書史文字之事故各稱史其實二官不同外史上士四人中士八人下士十有六人胥二人徒二十人釋曰外史掌書外令并掌經籍四方之志書經書乃公器也故掌於外史御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人釋曰御猶侍也其史百有二十人者掌朝廷贊書用人多也史寫書其専職也故居府之上吕氏曰御史之名見於周禮以中下士為之特小臣之傳命令者耳至於戰國其職益親故獻書多云獻書於大王御史澠池之會各命御史書事淳于髠亦曰御史在前執法在後是掌記事糾察之任也至秦其勢益重遂與丞相分權矣葉氏曰周之史職有二等太史下大夫為之小史等官之長也內史中大夫為之外史御史之長也然皆以史名官則皆史也今觀太史所掌典法則以逆邦國官府都鄙之治即太宰之所掌者內史所掌八柄之法以詔王治亦太宰之所掌者太史內史雖為宗伯屬官其權則與大臣相峙矣法則有所辨而不信者刑之約劑有所藏而不信者誅之太史實得以刑誅百官矣法令政事會計則考逆之公侯孤卿大夫則䇿命之制祿賞罰則贊為之內史實得以祿命百官矣此史氏之權所以重也語曰古者天子有史官言則右史書之動則左史書之今太史內史等官曽無一言及言動之書其所書者內史有王命則書之外史有外令則書之是策命掌之內史外令掌之外史所書者此二事而已御史一官掌贊書謂凡治者來受法於冡宰則贊書之周人制誥詔文出於內外史非御史也或曰周史掌為制誥而史籍何獨又藏之史氏乎曰此則史官之所掌也小史掌邦國之志外史掌四方之志世系昭穆三皇五帝之書皆藏於小史邦國之盟書太史內史二之藏之故韓宣子聘魯觀書于太史氏豈非以書籍為史官所掌乎王國之書侯國之志皆藏之史氏則作史非史官之職而誰與夷考周之史職自太史至御史凡七官馮相保章之掌天文猶星厯也內史外史之書命令猶制誥也詔王也有言責之寄掌志有書籍之藏雖名為史而實叢是四者之職于以見史官之為任重矣後世置史徒知有左右言動之記而已其他則有星臺有祕閣有諫垣有翰苑之别職分而意不相屬名别而事不相干成周史館之任不如是之狹也巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人釋曰巾車為車官之長巾設飾之物巾車所掌以設飾為主也王氏曰有車必有馬有馬必有僕有僕必有右王之五路其馬六其僕五其右三其職見校人大馭戎右三官然三官皆屬夏官而五路獨見於春官者蓋春官所以為禮夏官所以為兵車旗之物屬於禮而馬與僕右屬於兵所以重其事也典路中士二人下士四人府二人史二人胥二人徒二十人釋曰路一作輅巾車兼掌天下車典路則専掌王及后五路也車僕中士二人下士四人府二人史二人胥二人徒二十人釋曰僕猶御也掌其副車以備乏用也司常中士二人下士四人府二人史二人胥四人徒四十人釋曰司常主王旌旗者也以常名官者日月為常王所建也九旗莫尊焉謂之司常主尊者言葉氏曰車旗所以彰德而辨等藏禮而正名一毫不容僣越也巾車掌車司常掌旗二職雖分而實通故其官相聫巾車曰掌公車之政與其旗物而辨之則車旗之職通矣蓋王后之路有等而孤卿大夫士庶人之車亦有等王與諸侯之旗有名而卿大夫士師田州里縣鄙之旗亦有名名物之頒等級之敘章其有德之别而禮存焉此巾車司常所以屬於禮官也都宗人上士二人中士四人府二人史四人胥四人徒四十人釋曰都謂王子弟及公卿之采地宗典祀者祭於其都則有宗人掌其禮蓋王子母弟不出封者及王朝公卿皆身居王朝而立宗廟社稷於其都邑故立宗人以掌其禮事家宗人如都宗人之數凡以神仕者無數以其藝為之貴賤之等釋曰家謂大夫所食之采邑也祭於家亦有宗人掌其禮神仕謂明神理而仕者國語曰能知四時之生犧牲之物玉帛之類采服之儀彛器之量次主之度屏攝之位壇場之所上下之神氏姓之出而必率由舊典者有即入之不為常數其藝髙者為上士次者為中士又其次者為下士原曰古人治神之法詳矣是故以神仕者以其藝為貴賤之等其法以三辰之法由隂陽之精以推之而辨其所命之名所色之物則其居可圖所以鬼神之情狀不能隱也國語曰在男曰覡在女曰巫是以所制神之次主而為之牲器時服今之巫祝既暗其義何明之見何法之行正神不降惑於邪厲苟貪食貨遂誣人神噫此異端之所以害道也必欲闢異端必先明聖人治神之道以開明俗溺不過禮樂而已禮樂明備神人得所矣春官上大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國示與祗同釋曰建立也三禮立國之本也神一也天曰神人曰鬼地曰示祭一也天曰祀人曰享地曰祭此三禮雖屬吉禮然天地祖宗國之本也有天下則可祀之所以建邦國也祭之則受天下之福所以保邦國也宗伯典其禮與王行之所以佐王也唐氏曰虞書巡守修五禮臯陶謨言自我五禮舜命官曰有能典朕三禮蓋五禮兼神人三禮則事神之禮也故宗伯先言建邦天神人鬼地示之禮則三禮也次之以吉凶賔軍嘉則五禮也成周蓋祖述虞舜命官之意為宗伯之職掌也原曰三禮五禮之一也宗伯掌禮五禮其實也而首言建邦専掌三禮何也曰天之胙君實為神主君之受命惟典神天商辛惟不祀上帝神祗遺厥先宗廟不祀此天所以致罰于商武王所以數罪于受也故曰天之厯數在爾躬明天位由天所命也安得不以三禮為本卦或曰五禮非所以治天下乎曰五禮禮之文也三禮禮之本也故五禮施之於事三禮存之於心施之事者百官有司能辨之矣存之心者惟王也故三禮敬而已敬弗至禮弗達也仁孝弗極則鬼神弗享也惟敬為能盡仁惟敬為能盡孝非仁非孝禮文雖具虛而已矣故曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝孔子曰明乎郊社之禮禘嘗之義治國其如示諸掌乎然則非三禮又何有五禮也以吉禮事邦國之鬼神示以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師飌古風字釋曰祭祀之禮曰吉禮者受福之義也其别十有二事謂祀之享之祭之也上以神鬼示言上下也此以鬼神示言內外也禋之言禋周人尚臭煙氣之臭聞者昊天言其總名南郊合祀是也五帝謂之上帝四郊分祀曰旅上帝是也天以形體言帝以主宰言黃氏曰國語云精意以享謂之禋蓋日月星辰有象者也山林川澤有形者也有象者以物之聲臭祀之有形者以物之形體祭之惟天也無形不可薦之以味無象不可達之以氣惟誠意以動之精意以接之人之意粗則交於物精則交於神蓋其理也有無之間帝之神用在焉故定之以七日之戒齊之以三日之宿以恭致莊以默致靜然後思道以致其虛此所以致精而接於帝也其精意以享之謂與愚謂祀天以禋祭之禮也精意以享祭之誠也祭天以升禋為本故下實柴槱燎皆升煙事也實柴謂實牲於柴而燔之使氣臭上達也星謂五緯之星辰謂日月所會十二次日月星辰有象者故以氣臭達之槱積也燎燔也謂積柴而燔之不實以牲也司中文昌第五星司命文昌第四星主人間妖祥故祀之也或曰天文虛宿下有司命星主人之夀夭司中天樞北極天之正中主天之中氣故祀之若文昌六星自主天子文德不當與此混也月離于箕風必揚沙風師箕也月離于畢俾滂沱矣雨師畢也三祀皆積柴實牲于上或有玉帛燔燎而升煙所以報陽也陽祀自煙起故於祀天言之此三者祀天神以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物貍音埋疈宇逼反釋曰血祭者取牲血以祭貴氣臭也地有幽隂之義故求之以血社即祭地也以土示為義變地言社者神之也猶天曰昊天稷榖神祭地必以稷配明養人之功與地並也五祀五行之神有虞以稷并五行為六府周以稷并於社復立五行之祀故曰五祀月令以門户井竈中霤為五祀非也或曰五帝之祀正主五行流行之主宰配以五人神其禮至隆其餘祀典若山林于木川澤于水司爟于火鄉州之社無非五行之祀故此之五祀當從月令也愚謂五方帝實天之分山林川澤乃地之分非五行也五行星在於天運行不息氣行於地變化無窮今日月有祀五行之氣在地故祭地之下即祭之主於民用為切故也五嶽東岱南衡西華北恆中嵩也古人之祭天地也以其濶逺故以人配焉郊則配其祖虞嚳而夏頊殷契而周稷此配天也共工氏之子曰勾龍能平九州名曰后土以配社厲山氏之子曰農能植百榖以配稷後更以棄故名稷此配地也五方之神祀於四郊曰五祀其配也少昊之子重為勾芒食於木司春該為蓐收食於金司秋修及熙為玄冥食於水司冬顓頊氏之子曰黎為祝融食於火土司夏及中央五祀亦以人配也祭山林之牲埋之祭川澤之牲沈之既有五嶽復有山林川澤之祭者小宗伯曰兆五帝於四郊四望四類亦如之則五嶽五祀亦在四郊矣曰望者望而祭之又曰兆山川丘陵墳衍各因其方此則貍沈之祭也南軒張氏曰古者祭山川以其氣之所蒸能出雲潤澤萬物故為之壇壝立之祝史設之牲幣所以致禱祀之實而交孚乎隱顯之際誠之不可掩如此後世固亦有山川之祠而人其形宇其地則其失也久矣疈牲胸也肆而磔之謂之疈制而磔之謂之辜此蠟祭也合聚四方百物而索享之先嗇一也司嗇二也農三也郵表畷四也貓虎五也坊六也水庸七也昆蟲八也皆於臘月而祭之亦地類此三者皆祭地示胡氏曰成身莫大於禮禮莫大於祭祭祀所以立吾誠也鬼神之物非他即吾之誠而已王者繼天而為之子獨主萬化故祭天於郊祭地於社祭名山大川五祀各於其方後世禮學失傳儒者論祭天地之禮於天則曰昊天上帝有五方帝有感生帝夫土不可有二王而天可以有七帝乎於地則或立方丘或立方澤或立北郊與天敵體是猶家有二主也且子事父母父在為母齊衰期不敢見其父者尊無二上也王者父事天母事地而可崇地以抗天乎是故夫獨制義于家而家道正矣君獨出令于國而天下定矣天獨健而無息地道順承而無成太極立矣王者父事天而精一其德故兆於南郊掃地而祭者昊天上帝而已天言其氣帝言其性也社祭土所以神地道也名山大川者寶貨財用之所出而四方之所依據也五祀者榖水火金木也人所日用莫過五材不是之報而顧報行與門户舉失輕重豈禮也哉以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王釋曰肆者進所解牲體謂薦熟也獻者獻醴謂薦血腥也祼者以鬱鬯之酒灌地降神也饋食言有黍稷也宗廟有祼鬯禮既祼而獻有薦腥禮既薦而肆有薦熟禮既肆而饋有薦黍稷饋食禮然禘以祼為重祫以饋食為重四時之享則四禮並用焉故以肆獻祼言可知是禘也以饋食言可知是祫也故冠於四時祭之上而四時之祭必用四禮也故各舉祭名言之春物生未有以享也其享也以熟為主故曰祠夏則陽盛矣其享也以樂為主故夏曰禴秋則物成而可嘗矣故曰嘗冬物畢成可進者衆故曰蒸王氏曰按司尊彛春祠夏禴秋嘗冬蒸皆用祼今以肆獻祼言者取其歆神之始也天神之祀以禋為歆神之始地示之祭以血為歆神之始人鬼之享以祼為歆神之始其實天神同於禋地示同於血人鬼同於祼也六者皆享人鬼原曰天子宗廟之禮有禘有祫有四時之祭諸侯有祫無禘四時之祭廢其一大夫無祫無禘四時之祭廢其二大傳曰大夫有大事省于君于祫及其髙祖春秋傳曰大夫三年之祭則曰殷殷以少牢則大夫亦時有祫亦至始爵之祖而止耳是故禘以祼為重孔子曰禘自既灌而往者吾不欲觀之矣祫以饋食為重故大夫祭禮名為饋食之禮四時則兼用之故總名之曰享先王也分而言之天子月祭於禰四時祭於祖春秋祭於太廟三年大祫祧廟之主於太祖之廟五年朝諸侯祀始祖所自出於明堂所自出謂天也既曰始祖矣又何所自出非天而何禘者從示從帝祀帝於明堂配以父祖故曰不王不禘也周禮雖未明言宗廟六享必兼禘祫以理推之當如此耳以凶禮哀邦國之憂以喪禮哀死亡以荒禮哀凶札以弔禮哀禍災以禬禮哀圍敗以恤禮哀冦亂襘户外反釋曰凶禮凡五哀謂救患分災也喪制為復襲殯斂之式衰麻哭踊之度賵賻含禭之儀葬袝祥禫之節君卿大夫士庶人各有品式所以哀天下之死亡也始死則曰死既葬則曰亡曲禮曰嵗凶年不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂是其禮也司徒有荒政十二是其政也凶謂嵗歉札謂民病弔慰問也禍謂殃咎災謂水火若宋大水魯莊公使人弔焉曰天作淫雨害於粢盛若之何不弔此亦相弔之道也禬者會合財物以補其所喪行人云若國師役則命犒禬之是也圍者國圍於敵敗者兵衄於外恤憂也兵作於外為冦於內為亂恤禮則出兵師以救其危也按凶禮以喪為重儀禮有士喪禮三篇而天子之禮則闕喪大記推君大夫士之品節可推以補王朝大喪之闕荒弔禬恤其禮亦簡可以因時行之不用著其儀也以賔禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同時聘曰問殷眺曰視俯音眺釋曰賔者賔主相敬之禮其别有八親者使之相親附也朝猶朝也欲其來之早宗尊也義在尊王也覲猶勤也欲其勤於王事遇偶也欲其不期而俱至也劉氏曰賔禮者天子為主而用是禮以待諸侯之來見也朝覲宗遇此王畿之外諸侯每服分為四時遞來朝見於天子一嵗而遍者侯服也再嵗而遍者甸服也三嵗而遍者男服也四嵗而遍者衛服也六嵗而周者要服也其朝見疏數之節如此時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而會是也殷猶衆也十二嵗王如不巡狩則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉謂之同者以期而來必相同也時聘亦無常期天子有事則諸侯遣卿以問於天子王制曰比年一小聘三年一大聘殷眺謂殷同之嵗不當朝則遣卿以眺視於天子此二者諸侯使臣見于天子之禮也按朝覲宗遇會同各有其禮太史大會同執書讀禮而協事今儀禮無之可知其亡矣獨有覲禮一篇王禮五禮獨此而已然賔禮其制見於行人其儀掌於司儀其牢禮見於掌客參而互之六禮備矣問視之禮亦闕獨聘禮一篇又諸侯相問之禮也以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也釋曰軍兵衆之名其禮之别有五同謂齊之以法使其和同也征伐之時有師旅卒兩之制有坐作進退之法有鼓鐸鐲鐃之節所以用其命令也因地以令賦因家以起役地有肥磽而賦有輕重家有上下而役有多寡所以優恤其民也兵事不習則不和車徒不簡則不精春以教振旅夏以教茇舍秋以教治兵冬以教大閲所以簡其能否也城郭道塗之修宫室營造之役帥其民而至家無過一人豐年則公旬三日焉中年二日無年一日焉所以任其力也公旬上所役作之期旬也正其畿疆使地有定域平土地使民有定業合聚其衆以成其功也按軍禮有五惟大田之禮見於大司馬大役之禮則見於各聫職大封如山甫營齊召伯營謝之類不過簡稽卒伍之法而已惟大師之禮其法則見於大司馬其用則見於九伐其廟算征戰之方師律行陳之法則闕或曰司馬法或是古軍禮田穰苴所作中亦有九伐之説曰此乃軍禮之傳耳以嘉禮親萬民以飲食之禮親宗族兄弟以婚冠之禮親成男女以賔射之禮親故舊朋友以饗燕之禮親四方之賔客以脤膰之禮親兄弟之國以賀慶之禮親異姓之國釋曰嘉善也因人心所善而為之禮也親相親睦也不曰親邦國而曰親萬民者以宗族兄弟男女故舊朋友非邦國事也民者下之義以君臣言之則是宗族以下皆治之所及故曰萬民人君有與宗族飲食之禮所謂族食世降一等是也陳氏曰先王之於同姓有時燕焉有因祭而燕焉國語曰時燕而不淫此時燕也詩曰諸父兄弟備言燕私記曰因其酒肉聚其宗族以教民睦此因祭而燕也其禮之詳雖不可考要之服皮辨服即事於路寢宰夫為主異姓為賔王與族人燕於堂后帥內宗之屬燕於房其物殽蒸所以合好也其食世降一等所以辨親踈也昭穆以序之所以明世次也夜飲以成之所以别異姓也若夫几席之位升降之儀脫屨而坐立監相禮羞庶羞以盡愛爵樂無算以盡歡大率與諸侯燕禮不異諸侯燕族人與父兄齒雖王之尊亦不以至尊廢至親也婚姻之禮所以親男女之情冠笄之禮所以成男女之德儀禮有士冠禮士婚禮而王朝冠婚則闕記曰天子無冠禮而有其婚禮大抵婚冠亦自士禮而推之於朝廷耳射禮雖王亦立賔主也王之故舊朋友為世子時共學者天子亦有友諸侯之義此天子賔射之禮也蓋賔禮燕也射禮大射之禮也射以燕必立主賔故曰賔射饗有體薦所以訓恭儉燕有折爼所以示慈惠賔客諸侯來朝謂之賔遣臣來聘謂之客大行人云上公三饗三燕侯伯再饗再燕子男一饗一燕社稷之胙曰脤宗廟之胙曰膰成肅公受脤于社劉子曰祀有執膰戎有受脤此其驗也兄弟之國者蓋同姓諸侯有共先王者諸侯不敢祖天子大夫不敢祖諸侯公廟設於私家非禮也故王子母弟雖出封而廟不敢立於其國未出封則從王而祭既居國則天子有脤膰之禮天王使石首來歸脤是已此禮亦只法例而已不用儀也行人曰賀慶以贊諸侯之喜遣人贊之曰慶加之以物曰賀異姓之國則王之婚姻甥舅也嘉禮之行於異姓諸侯者獨賀慶而已親踈之辨也原曰成周盛時鹿鳴以下治內天保以上治外行葦之忠厚既醉之太平則知五禮之所以行矣小宗伯掌五禮之禁令辨其用等六官之中各有聫職以行五禮之事則五禮者誠治亂之本國家安危所係觀之變風變雅所作何莫不由五禮之不舉也哉太史大祭祀朝覲會同執書讀禮而協事今儀禮之中獨闕王朝之禮則太史所掌五禮之書誠亡矣今考之吉禮如郊社之儀宗廟六享誠不可闕者其經則略見於聫職其傳則郊特牲等篇頗存其意凶禮大喪亦略見之聫職喪大記一篇分君大夫士之禮綱紀略具宜取以補之朝覲宗遇會同聘問今只有覲禮一篇而已其餘聫職行人司儀略為備之軍禮則見於司馬而大役大均大封可依此推之嘉禮饗燕賔射則有大射燕禮可推矣族食冠昏脤膰賀慶亦不必著其儀也由此言之則王朝之五禮亦可推矣後世如不欲興行王道則亦已矣有志復古者其可不推尋以補其書援據以行其禮哉以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯釋曰儀即宫室車旗衣服之禮儀命即內史凡命諸侯卿大夫則䇿命之之命每命異宜貴賤之位乃定宗伯辨其命數多寡正其位分也公侯伯之士子男之大夫天子之下士皆一命固已受職治事矣子男之士不命其他所未命者府史皆官長自辟非王官故無命數子男之卿公侯伯之大夫天子之中士皆再命受服者謂辨服也卿大夫服爵辨命於君則得自為也公侯伯之卿王之上士始有列位於朝以論爵也王之大夫公之孤三命以下祭器不備假而用之惟四命始有田祿具祭器則八則以治都鄙也王朝出封之大夫子男之君始得操八則之權以治其邑也王朝之六卿有都得置官屬治其采地如諸侯故曰賜官王之卿出封加一命或加子男為侯伯蓋子男未成國加至侯伯始得建國立軍侯伯之有功德者賜之屬國如五百里四百里三百里之類非其實封謂之九州長入天子之國曰牧得征伐於其屬國王之三公八命是上公矣有功德則加一命為二伯得征五侯九伯公羊傳曰自陕以東周公主之自陕以西召公主之是曰東伯西伯也薛氏圖云凡王之臣命數其三公八命卿六命大夫四命上士三命中士再命下士一命諸侯之君命數則上公九命侯伯七命子男五命諸侯之臣命數則上公之孤四命卿三命大夫再命士一命侯伯之卿三命大夫再命士一命子男之卿再命大夫一命士不命有定命之數有加命之數定命之數典命掌之加命之數宗伯掌之加命非定命故謂之九儀之命而已原曰大司徒以度教節則民知足易之履君子以辨上下定民志大宗伯掌禮即於五禮之下次以九儀何也蓋人心之欲無窮耳目口鼻之奉品秩名位之崇雖遞踰分限其心未肯以為足也不有禮度以為之節民志何由而定乎是以九儀之命以宗伯掌之典命司之行人又以九儀而辨諸侯之禮小行人又以九儀而協賔客之位司儀又以九儀而詔賔相之儀如權衡之懸而銖兩不可損益如繩墨之設而分毫不可踰越是以賤不踰貴卑不抗尊上不敢陵而下不敢僣周人世守之是以東遷之後威令不逮小國之諸侯尚能維持四百年之久非周公制禮之功乎以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧信音申釋曰四圭兩璧為六瑞等辨其等級也自王至子男所執之符信鎮安也鎮圭尺有二寸以山為瑑飾取其鎮安四方也故王執之雙植為桓桓圭九寸以桓楹為瑑飾取其柱石國家也故公執之信圭七寸以身形為瑑飾示其直身事上尊而不屈也故侯執之躬屈也躬圭七寸以躬形為瑑飾示其鞠躬以事上也故伯執之榖所以養人其璧五寸以榖為瑑飾示其有養人之象也故子執之蒲所以安人其璧五寸以蒲為瑑飾示有安人之義故男執之劉氏曰璧有虛中所以受益也有循環所以勤道也治民之德未大成而不可以忘其進則其執璧宜矣丘氏曰圭制下方上員取象天地內有孔謂之好好有玉謂之肉肉倍好為璧好倍肉為環圭形直者為信曲者為躬以禽作六摯以等諸臣孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞鶩音木釋曰摯之言至也所執以自致瑞摯皆所以等貴賤尊卑摯必用禽者致其養也孤卿大夫士通天子諸侯之臣言凡爵名同則其摯同臣於君以摯見者受而膳之所以享臣子之奉也相見交接之始等級以定明少當事長賤當事貴也孤特立之稱皮虎豹皮示服猛也帛金璧色繒也蓋束帛而加之以皮羔小羊取其羣而不黨跪乳而有禮欲其恭也詩曰委蛇委蛇亦羔羊之義也鴈往來順時行列有序大夫以道進退欲其知時也雉有五彩介而守死士欲其有文而守節也鶩水鳥取其不能飛遷安其業也雞知時而鳴工商執之欲其守時而動也王氏曰六等之玉謂之瑞六等之禽謂之摯曰瑞曰摯有用飾者有不用飾者有用享者有不用享者六瑞則有繅籍之飾皮帛則束帛而以虎豹之皮為飾羔鴈則以繢布為飾自士執雉以下皆無飾矣以其尊卑不同故也五等諸侯有摯有享圭璧摯也玉幣享也行人上云成六瑞下云合六摯圭以馬璋以皮璧以帛琮以琇璜以黼鄭氏謂五等諸侯享天子用璧享后用琮皆以庭實若馬與皮是已自六摯以下則不用享以六瑞受而復之三帛二生一死皆受而不復故也以玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其器之色釋曰劉氏曰玉者純陽之精氣而天地之至寶也將禮於天地四方而無以歸其誠乃以玉作六器既象天地四方之色又擬其形以瑑之為柴槱煙燎埋沈之所用以答其神之降饗也璧圓中虛以象天之形其色蒼以象天之色此冬至郊玉也琮方八面象地之形其色黃則象地之色故夏至禮地於大社東方其帝大皥圭鋭其首象出震而生物其色青則以象木之色此東郊之禮也南方其帝炎帝半圭曰璋明也象物之相見乎離赤者象火之色此南郊之禮也西方其帝少皥琥以玉刻伏虎形象威也秋之氣肅白則金色此西郊之禮也北方其帝顓頊半璧曰璜黃色也象物藏於黃宫也玄則水之色此北郊之禮皆迎氣旅上帝也劉氏曰玉作六器所以放神示之德也牲幣又放其器之色欲因其類以答其饗也故能建神示於無形而收禮敬於色象必受其福焉王氏曰有禮神之玉有祀神之玉以蒼璧禮天至玄璜禮北方則是禮玉始告神時薦於神坐若書所謂植璧是也四圭無邸以祀天兩圭有邸以祀地則是祀玉若書云植圭是也以天産作隂德以中禮防之釋曰天産者日月星辰風雨霜露之類隂德者地之德也地以生物為德故曰隂德然非以天産之物烜之潤之散之濡之則物不能生非以天産作隂德乎然物生衆盛美惡雜居非得聖人裁成輔相則陵亂無統三才不立矣故制為禮以約之中若種榖去草穿牛絡馬宫居粒食乃禮之本原以中禮防之者禮者不過制其過與不及使歸之中而已故謂之中禮防之者若制生事葬祭之禮以明父子之親辨上下等級朝覲聘問之禮以立君臣之義為養老慈幼事長使衆之禮以序長幼之倫昏姻冠笄以别男女射鄉食饗以正交接皆所以防之使天地萬物各得其所也以地産作陽德以和樂防之釋曰地産地之所生之物如金石絲竹匏土革木之類八音之器雖人所制然皆地之隂德所産也陽德者聲音是也聲所以鼓動天地之氣凡聲陽也聲而成音則為德矣氣觸物而聲出焉雖天籟之自鳴亦以物觸之而成聲聖人以地産之物吹之鼓之搏之拊之而成聲非以地産作陽德乎以和樂防之者聲音雖為陽之德然髙下清濁長短疾徐不相為用則不和矣不和則天地不位萬物不得其平矣聖人作樂以宣暢其和聲故制為六律六同以齊其聲使清濁髙下長短疾徐合天地之自然循環不窮以和其聲然後作為和樂使五聲成文而不亂八音從律而不姦始也審聲以氣終也召氣以聲故鬼神雖幽可以人道接人情雖戾可以和平感萬物雖逺可以聲氣召蓋以兩間聲氣常相隨故也按禮本乎天之自然聖人因自然之道而經制之則為禮故以天産者天以之樂由人所作聖人因聲音而節制之則為樂故以地産者人以之天以之者先天也人以之者後天也故曰禮先而樂後禮典至此乃以制作禮樂之本言之以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物釋曰天地之化即隂德陽德也百物之産即天産地産也然必禮樂以合之蓋禮自隂作樂自陽來一禮一樂相須並作則天地之化以合百物之産以遂中和致而天地位萬物育矣由是以事鬼神則六變而天神降八變而地示出九變而人鬼享禮儀卒度而神降之福也以諧萬民合父子之親明長幼之序四海之內合敬同愛也以之而致百物則飛潛動植各若其性鳳凰來儀百獸率舞矣禮樂感應之機何其深妙若此哉其理見之樂記其制度見之大司樂凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮若王不與祭祀則攝位凡大祭祀王后不與則攝而薦豆籩徹大賔客則攝而載祼朝覲會同則為上相大喪亦如之王哭諸侯亦如之王命諸侯則儐省息井反鑊户郭反齍音咨釋曰天神地示人鬼正所典三禮故為至大執事有職於祭者宿視滌濯謂祭之前夕躬視洗事溉祭器也玉禮神之玉鬯鬱鬯之酒也郊社有玉而無鬯宗廟有鬯而無玉始臨視之祭又奉之也鑊釜屬牲鑊在廟門之外所以省牲備熟獻兼省之焉玉齍即玉敦盛黍稷器大號所以詔太祝為祝辭治大禮謂紀綱其大體也其大禮儀則詔相于王使無失禮王若有故不與祭則大宗伯代王行其禮事也大祭祀宗廟之事也薦徹豆籩王后之事不與亦宗伯攝而代之載承之以往也言酌鬱鬯載璋瓉往而禮賔君無酌臣之禮故使宗伯攝酌獻焉王不親為主拜送則王也相詔王禮也出接賔曰擯入詔禮曰相朝覲會同宗伯為王相而贊王禮大喪宗伯主贊其禮哭諸侯謂薨於國為位而哭之胡氏曰周制王哭諸侯則大宗伯為上相司服為王制緦麻宰夫掌邦之弔事戒令與其幣器財用是王所以懷諸侯也儐進之也鄭氏曰王命諸侯將出命假祖廟立扆前南鄉儐者進當命者延之命使登內史承王命以䇿命之降再拜稽首登受䇿以出此其略也封國天子大權非諸侯所得擅行焉國有大故則旅上帝及四望王大封則先告后土乃頒祀于邦國都家鄉邑釋曰大故凶災也旅衆也謂各分其類而祭之上帝四郊之五帝也四郊之帝止四時迎氣之時禮之而已冬至則合祀於南郊若有凶災則隨時各祭所司權之帝以禳災也旅四望謂五嶽四瀆於其地有祭夏至望祀合於大社而祭之及有凶災則各隨名山大川所在而祭之故曰旅上帝及四望鄭康成以旅為合祭之名合祭只冬夏至有合祭有故則宜分祭也且旅字豈可以合字訓之哉后土大社也大封則分人以土必告於社示不敢專也劉氏曰王大封諸侯則先告大社然後割其方之土白茅包而賜之俾立社於其國又隨其命數頒之祀典頒祀謂頒社稷之祀典邦國諸侯也諸侯祭其境內名山大川都大都小都家采地鄙邑立社亦如邦國鄉一鄉也立社祀一鄉之土榖之神邑自閭里以上皆謂之邑皆有社祀如州社黨禜族酺是也天尊而在上其體渾淪運轉不息不可分也故惟天子得以祭之天子統天地氣類相感也宗伯頒祀於邦國都家鄉邑則地之祭諸侯卿大夫士庶皆得祭之蓋土親也民資生焉故皆得因其所有而祭之所以報其德也孔子曰天子祭天地諸侯祭社稷是也原曰語云明則有禮樂幽則有鬼神禮樂鬼神其宗伯之職掌與是故事不離於道而禮樂者道也五官所掌皆事也治非禮不制教非禮不立刑無禮則淫事無禮則亂宗伯所掌五禮六瑞九儀本天下之事而歸於制作禮樂之功所以節其過引其不及而納之於中者也非所以道天下之明者乎然天人之際幽明之理未嘗不相感通其召變致祥捷於影響人所難知惟聖人洞於幽明之故制為天神地示人鬼之三禮以祀以祭以享而感格之作為聲樂以感召之其始也以人而事天其終也天亦不違乎人至於天人合一精神流通而三才各得其所矣故五官所掌皆人也而宗伯之三禮所以理天下之幽者禮樂鬼神幽明得所此設立宗伯之本意是皆出於天敘天秩感應自然而非出於人為者也小宗伯之職掌建國之神位右社稷左宗廟兆五帝於四郊四望四類亦如之兆山川丘陵墳衍各因其方釋曰大宗伯曰事鬼神示而已小宗伯則建其神位即鬼神示之位也位社稷於右右隂也地道之所尊故地示居之位宗廟於左左陽也人道之所鄉事死如事生之義也故人鬼居之先言地示人鬼而后及天神者內外之别也兆為壇之營域也五帝五方之帝兆之各因其方東青帝南赤帝西白帝北黑帝中央黃帝同位於南火土相生也故五帝曰四郊不言兆昊天上帝於南郊者四郊則南在其中也四望謂五嶽四瀆與凡名山大川之在四方者皆望而祭之四類日月星辰運行無常兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊蓋以氣類為之位也王氏曰五嶽四瀆在地而成形故祭謂之望日月星辰在天而成象故祭謂之類凡天下之山川丘陵墳衍能興雲雨出財用也各隨其所在之方而祭之其兆域不在四望之中也原曰觀小宗伯之為郊兆則知天地各有分祀合祀之禮後世南郊北郊之論合祀天地之非可見矣禮運曰祭帝於郊所以定天位也祀社於國所以列地利也天尊也地親也天有四時地有四方不有合祭無以昭統體之全不有分祀無以别司權之令是故立方澤於雉門之右以祭地合嶽瀆而望祭之社即地也此地之合祭也立圜丘於南郊合日月星辰而類祀之此天之合祭也故曰冬至祭天於圜丘夏至祭地於方澤見於大司樂可知矣五嶽河海各於其地而立兆天子巡守五嶽柴望祭告此地之分祀也立四郊之兆於四方日月風雨司中司命為壇為坎而類附焉四時迎氣國有大故則旅上帝及四類此天之分祀也由是觀之則天地各有分合之祀社即地也經每言郊社之禮天而曰郊地而曰社所以神之也世言既有昊天與后土合祭矣又有社祭不亦異乎掌五禮之禁令與其用等辨廟祧之昭穆釋曰五禮大宗伯司其綱若禁其不當為令其當為與其所用牲器之等則小宗伯掌之四親之廟曰廟五世以上宜祧别立二廟以藏祧主曰祧廟故天子七廟三昭三穆與太祖之廟而七也周以文王武王親盡不當祧宜與太祖百世不遷故立文世室武世室於祧廟之上故曰九廟昭明也穆深逺也古者廟制南為堂後為室室東户西牖室西北隅為最尊之位故太祖東向自如自始祖之後父曰昭坐北而南向子曰穆坐南而北向故父子不同列而孫附於祖則無嫌矣而生者亦因其世次以别昭穆焉原曰辨廟祧之昭穆言廟復言祧者何也曰存廟曰廟毁廟曰祧祧亦有廟故守廟者名曰守祧或云祧廟在三昭三穆之外與曰劉歆云天子七廟三昭三穆與太祖之廟而七宗不在數中鄭康成云后稷始封文武受命而王故三廟不毁與親廟四而七朱子曰祧廟之主藏於太廟之東西夾室及文武世室既立為百世不遷三昭三穆之上有祧主則藏於二世室之夾室故廟數天子三昭三穆諸侯二昭二穆大夫一昭一穆士一廟然皆以天子六世而祧其主藏於夾室也竊意三年之喪達乎天子四代之祭通乎庶人君子之澤五世而斬小人之澤五世而斬廟數雖别而四親則同别以明禮同以稱情也經文有守祧之職辨廟祧之昭穆者蓋北面髙曽之上一昭一穆為祧廟四親并二祧而數之為三昭三穆也自古稱髙曽祖考為五服今云天子三昭三穆則五世六世之祖當何稱乎故四親廟各藏一代之主祧廟則合凡祧主皆藏之無有五世六世各自立廟而祧主藏於夾室之禮亦無有止二昭二穆并二世室為七廟而祧主亦藏於世室之云也故無祧廟而祧主藏於太廟夾室者諸侯之禮也大夫則昭穆二代同廟士則五代同廟庶人無廟祭四代於寢夫禮有隆殺情無貴賤天下之大義也父昭子穆有常數者禮也祖功宗德百世不毁者義也九廟之制以義起也辨吉凶之五服車旗宫室之禁掌三族之别以辨親踈其正室皆謂之門子掌其政令釋曰吉之五服衮冕鷩冕毳冕絺冕玄冕是也凶之五服謂斬衰齊衰錫衰緦衰疑衰是也有以辨之則吉服不可下僣上凶服不可重降輕也車旗宫室之等以九以七以五為節各依品秩上得兼下下不得僣上也三族父族已族子族也以父親祖以子親孫以三為五之謂也以祖親曽髙祖以孫親曽玄孫以五為九之謂也上殺下殺旁殺而親疏之義盡矣正室適室門子適子以其代父當門故謂之門子掌其政令所以辨嫡庶定繼襲也王氏曰古人重立嫡天子曰太子諸侯曰世子皆以嫡立也三族之嫡亦皆有嫡子在曲禮曰孤子當室名其嫡也文王世子曰正室守太廟是以正室名其嫡也此曰正室謂之門子則其重嫡之意深矣原曰禮别於五自然之等實存乎其間故其度數等降之不同特輔其自然者以等之而已用等之不同有尊卑焉於是辨其廟祧之昭穆有貴賤焉於是辨其衣服車旗宫室之等有親疏焉於是辨其三族之别故昭穆辨則尊卑明矣五服辨則情分明矣車旗宫室有禁則貴賤明矣三族之親疏辨則愛敬興而宗法立矣天下之治亦曰禮以辨分明於上則道義之俗興於下矣毛六牲辨其名物而頒之于五官使共奉之辨六齍之名物與其用使六宫之人共奉之辨六彛之名物以待果將辨六尊之名物以待祭祀賔客掌衣服車旗宫室之賞賜掌四時祭祀之序事與其禮若國大貞則奉玉帛以詔號釋曰毛者擇其毛色也辨六牲之名號與其物也頒之五官者司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕太宰贊王牲事不奉牲在器曰齍六齍黍稷稻粱麥苽也六宫之人世婦云女宫之宿戒是也王氏曰祭祀之事莫重於犧牲粢盛牲天産也故屬乎陽粢地産也屬乎隂故王牽牲后薦玉齍牲必共奉於五官以五官所以續王之事而終以成外治者粢必共奉於六宫者以六宫之人所以續后之事而終之以成內治者也六彛雞彛鳥彛􅕌彛黃彛虎彛蜼彛盛鬱鬯也果與祼同將送也名既不同所用亦異故辨之六尊犧尊象尊壺尊著尊大尊山尊也王氏曰尊彛皆以用祭祀賔客於彛言果將於尊言祭祀賔客相備而已言彛祼將則尊酌獻可知也衣服車旗宫室王以賞賜有功者書曰車服以庸祭之序事先後所當行之事其禮有隆殺之别大貞以事之大者而卜以貞之貞以問問以知吉凶若卜立君卜大封及遷都之類奉玉帛所以禮神號神號即太祝之六號小宗伯詔之大祭祀省牲視滌濯祭之日逆齍省鑊告時于王告備于王凡祭祀賔客以時將瓉果詔相祭祀之小禮省所景反瓉才旦反果音貫釋曰充人繫牲執事滌濯祭器小宗伯省之視之饎人奉粢盛以入簠簋小宗伯逆之烹人烹牲省之時謂當祭之時備謂祭物之備小宗伯以告于王瓉天子圭瓉諸侯璋瓉祼謂以圭瓉或鬱鬯而祼之也祭祀以時而授王賔客以時而授宗伯祭祀小禮未祭則詔之既祭則相之凡大禮佐大宗伯賜卿大夫士爵則儐小祭祀掌事如大宗伯之禮大賔客受其將弊之齎釋曰詔相大禮者大宗伯也小宗伯但佐之而已王命諸侯則大宗伯儐故賜卿大夫爵則小宗伯儐進之也小祭祀則小宗伯専之齎持送也謂所齎來貢獻之物也諸侯來朝禮畢於廟貢國所有行三享之禮以玉幣致享既訖其庭實之物小宗伯受之若大師則帥有司而立軍社奉主車若軍將有事則與祭有司將事于四望與音預釋曰有司太祝也出師立社主曰軍社奉社主以行曰主車古者大師則先有事于社與廟然後載社主與遷廟之主以行故書云用命賞于祖不用命戮于社軍將有事謂與敵合戰也主將有事則小宗伯以當與祭於軍中司馬之官實典焉四望之祭則遣其所屬之有司往行事焉謂軍祭四望也若大甸則帥有司而饁獸于郊遂頒禽大災及執事禱祠于上下神示甸讀曰田饁于輒反釋曰大甸大田獵也有司大司馬之屬官饁饋也謂以獸而饋四方之神也頒禽謂以豫群臣禽雖多擇取三十焉每等得十為三等其餘以豫士大夫習射于澤宫中而分之既饁獸于神乃頒于人先神後人也獻神用其大故曰獸頒禽用其小故曰禽大災水火之類執事大祝也求福曰禱報祭曰祠先王靡神不舉要與民同患而已王崩大肆以秬鬯渳及執事涖大斂小斂帥異族而佐縣衰冠之式于路門之外及執事視葬獻器遂哭之卜葬兆甫竁亦如之既葬詔相喪祭之禮成葬而祭墓為位渳亡婢反斂力艷反縣音玄衰七雷反竁充芮反或讀為穿釋曰大肆陳尸而伸之也渳浴也以秬鬯浴尸也涖臨視也異族佐斂使疏者以相助也縣衰冠之式欲其制度之齊也及執事視葬器者執事梓匠之屬至將葬獻明器之材又獻素獻成皆於殯門外王不親哭有官代之小宗伯是也卜葬兆卜墓之營域也甫始也竁穿地為壙皆如上哭之既葬坎已掩也喪祭謂虞祔以安之也檀弓曰葬日虞弗忍一日離也是日也以虞易奠卒哭日成事是日也以吉祭易喪祭明日祔于祖父成葬丘已封也天子之冡不一日而畢位壇位也謂祠后土於墓左也以為王體魄托於此地祀其神以安之也凡王之會同軍旅甸役之禱祀肄儀為位國有禍災則亦如之凡天地之大災類社稷宗廟則為位凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀釋曰肄習也習儀為壇位也大災如日月食水旱地震之類合聚其神而禱祀之故曰類數者有事于神皆小宗伯為位也大禮統於尊則佐之小禮攝于已則専之非王親行曰小禮肆師之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲以嵗時序其祭祀及其祈珥祈巨既反珥而志反釋曰肆陳也國祀總鬼神示而言也大宗伯言禮之所用肆師則備陳其物以致其用故曰立佐助也大祀天地次祀日月星辰小祀司命以下玉取陽精之純以禮神帛取人功之勤以交神牲取天産之精以事神牷色之純者下只言牲者色不必純也劉氏曰天神地示人鬼皆國祀也即其祀中有三等之差故以玉帛牲牷明其大小則祀典立矣每嵗四時祭祀定其先後之序祈珥舊作璣衈謂成廟而釁血之事愚謂祈者祈福珥者弭災大祭祀展犧牷繫于牢頒于職人凡祭祀之卜日宿為期詔相其禮視滌濯亦如之祭之日表齍盛告潔展器陳告備及果築鬻相治小禮誅其怠慢者掌兆中廟中之禁令凡祭祀禮成則告事畢職當為樴之弋反鬻音煮釋曰展閲也牲之牷者謂之犧牲之純者謂之牷牢間也所以繫牲職人謂充人及監門人也頒之使養其牲也卜日卜祭祀之日宿為期先卜祭之夕定其期及卜之時詔相其禮也粢六榖也在器曰盛謂當祭之日具其黍稷盛於簠簋以徽識表其名而告潔也又陳列祭器實之展視之而告備具也築鬱金草及祼之時煮之以和秬鬯之酒以降神也群臣行禮則相治之執事之人有怠慢者則誅責之兆四郊神位也廟七廟也掌其禁令平時不得侵犯也禮成告事畢終其禮也大賔客涖筵几築鬻贊祼將大朝覲佐儐共設匪甕之禮饗食授祭與祝侯禳于疆及郊大喪大渳以鬯則築鬻令外內命婦序哭禁外內命男女之衰不中法者且授之杖甕於貢反釋曰大賔客王之兄弟及公侯來朝也涖筵几司几筵設之肆師臨之鬱鬯鬱人共之肆師鬻以和之祼則小宗伯將之肆師贊之大朝覲宗伯儐肆師為承儐也匪以實幣甕以實醯醢也其事其物掌客籩人共之其所設之禮則肆師為之饗以酒飲賔食以食食賔也授祭授賔以祭食也王祭則膳夫授之賔祭則肆師授之候者候迎善祥禳者禳去妖氣國之有候有禳逺或至于五百里之疆近或至於百里之郊小祝實主其事而肆師與之偕行焉大喪大渳以鬯築香草煮以為鬯以浴尸也序哭使相次序也外命男六卿以下也內命男朝廷卿大夫士也其妻皆為外命女內命女王之三夫人以下不中法違升數與裁制者授之杖者喪大記曰君之喪三日豫夫人杖五日既殯授大夫世婦杖四制云七日授士杖凡師甸用牲于社宗則為位類造上帝封于大神祭兵于山川亦如之凡師不功則助牽主車凡四時之大甸獵祭表貉則為位甸音田貉音陌釋曰社社之名主宗遷廟之木主軍旅田獵之時用牲以祭社宗行主則設其神位類造皆祭名聚其神謂之類往其所謂之造類禮依郊祀而為之封謂纍土為壇也大神社及方嶽也兵之所過山川皆有祭亦如之者用牲皆設神位也助助大司馬也主車石主木主之車也師無功肆師助牽之恐為敵所得貉師祭也於所立表之處祭日則設神位焉陳氏曰表貉之祭其蚩尤也貉之祭蓋使有司為之而立表於陳前肆師為位甸祝掌祝號既事然後誓衆而師田焉禡與貉一也嘗之日涖卜來嵗之芟獮之日涖卜來嵗之戒社之日涖卜來嵗之稼若國有大故則令國人祭嵗時之祭祀亦如之凡卿大夫之喪相其禮凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮釋曰嘗薦新榖也芟除田草也嘗新榖則曰此芟之功又卜來嵗宜芟否獮秋田也始習兵戒不虞也秋獮之日又卜來嵗有兵冦之警否社祭土神也秋祭報社之日又卜來嵗稼事之成何如夫於得也不忘失安也不忘危先王與民同吉凶之患而為之卜焉欲預知其吉凶而防之也故太卜以八命贊三兆三易三夢之占以觀國家之吉凶以詔救政救政者因其事而救之非徒卜之而遂已也大故水旱荒凶也令祭者社及禜酺也王氏曰嵗時祭祀常禮也國有大故而祭非常禮也然皆待上令而後祭焉則其祀事亦有節矣記曰禮有其舉之莫敢廢也有其廢之莫敢舉也謂此矣相其禮相其適子也大夫之喪職喪掌之肆師則相主喪之禮儀也大事如朝覲會同則從其長小事則肆師専掌其禮所謂小事則専達也治謂戒令之原曰禮官之綱不過吉凶賔軍嘉而已其綱則大宗伯掌之其事則小宗伯治之至於節目之繁儀文之備而所以綱紀始終乎五禮者非設肆師之職以治其繁則何以周全而無憾哉故曰經禮三百曲禮三千禮有經曲之分而官有大小之辨觀之宗伯肆師亦可以見矣鬱人掌祼器凡祭祀賔客之祼事和鬱鬯以實彛而陳之凡祼玉濯之陳之以贊祼事詔祼將之儀與其節凡祼事沃盥大喪之渳共其肆器及葬共其祼器遂貍之大祭祀與量人受舉斚之卒爵而飲之貍與埋同斚古雅反宜作嘏字聲之誤也釋曰鬱鬱金香草宜以和鬯立官主之者祭以精意玉王祼用鬱鬯貴氣臭也故祭有三重獻之屬莫重於祼以精意尤在於此也祼器謂彛及舟與瓉也天地至尊不祼而用鬯宗廟社稷山川四方祼賔客亦有祼者承賔猶敬神尊之至也和鬱鬯者以所煮之鬱金和秬鬯實於六彛而陳列之祼玉王用圭瓉后用璋瓉濯之以致潔陳之以備用又因以贊其事焉詔儀奉玉進祼之威儀節時之早晚也凡王及后宗伯之行祼事皆鬱人沃水以盥手及洗瓉皆所以致潔敬其事也肆器陳尸之器也君設大槃造氷焉大夫設夷槃造氷焉士設牀禪笫有枕此為肆器葬之祼器遣奠之彛與瓉也埋之於祖廟階間明奠終於此量人制從獻之膰脯王酳尸尸嘏王此其卒爵也與量人受舉嘏之卒爵而飲之使執事者皆得以蒙福也鬯人掌共秬鬯而飾之凡祭祀社壝用大罍禜門用瓢齎廟用修凡山川四方用蜃凡祼事用概凡疈事用散大喪之大渳設斗共其釁鬯凡王之齊事共其秬鬯凡王弔臨共其介鬯釋曰秬如黑黍一稃二米釀為酒使芬香條暢於上下也不和鬱謂之秬鬯飾之謂設巾社壝委土為壇所以祭也大罍瓦罍也禜門風雨水旱疫厲之災則禜祭於國門瓢齎者取甘瓠割去祇以齎為尊修蜃概散皆漆尊也修讀曰卣卣中尊也謂獻象之屬中尊者彛為上罍為下蜃畫為蜃形概尊以朱帶絡腹無飾曰散是故社用罍以出於土也禜門用瓢齎中虛而善容取其質也廟享人鬼人道尚文修則飾以彩色故用修山川四方為國阻固扞蔽蜃外堅有阻固之義故飾以蜃凡祼必和鬱鬯而多少之齊宜適平焉故罍以概絡腹能平物故也疈則蠟而疈辜以祭四方百物蠟以息老物物終則無飾矣故用散與散樂散車同意也大喪大渳設斗斗所以沃尸也釁鬯釁尸以鬯酒使之香美王齊所以致潔以交神故用鬯以浴所以致其香潔介副也王弔臨諸臣有副使同行天子無客禮於天下而有摯禮於鬼神天子以鬯為摯共介鬯則以介致之而已王氏曰夫秬一稃二米天地至和之氣所生名曰鬯以言和氣之條暢也祼之事必以鬱和鬯者以明其德之馨香也其色黃則以明其德之中而著乎外也先王所以承祭祀而交神明者其德如此故鬱所和鬯乃用以祼鬯人所共秬鬯不和鬱者用之以陳而已鬱鬯之有秬黍亦猶五齊三酒之有玄酒也亦反本復古不忘其初之意與雞人掌共雞牲辨其物大祭祀夜呼旦以􅑧百官凡國之大賔客會同軍旅喪紀亦如之凡國事為期則告之時凡祭祀面禳釁共其雞牲呼火吳反􅑧音呌禳如羊反釋曰雞為物至微而設官者尊祭祀必預養之也宗伯主雞故次於此物謂毛色也辨之者陽祀用騂隂祀用黝夜呼旦夜漏未盡雞鳴時也呼旦以警起百官使興也夫雞其色有文其鳴知時文以事神時以覺人雞之德亦大矣用之重也宜矣四者禮之大也皆以雞鳴為度故曰亦如之凡國事不止五事也為期為行事之時候也告時告主事者行事之時也必雞人告之以雞知時故也凡祭祀宗廟之屬也面禳四面禳祭去惡祥也釁釁門與夾室也此二者皆以雞牲共之也司尊彛掌六尊六彛之位詔其酌辨其用與其實春祠夏禴祼用雞彛鳥彛皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也釋曰尊以盛酒用以獻也彛以盛鬯用以祼也六尊獻尊以下六彛雞彛以下位尊彛所陳之位詔告也告王及后與諸臣所酌為祼獻者不同也用謂四時祭祀之用實謂鬱鬯以實彛齊酒以實尊皆當辨之也春祭曰祀夏祭曰禴皆宗廟之祭也雞刻雞形鳥刻鳳形於彛也二彛皆實以鬱鬯待祼舟尊下臺若今承槃王氏曰彛皆有舟為酒戒也蓋舟能載物所受過量則有沉溺之禍朝踐即朝獻也曰踐者言籩豆有踐也獻讀為犧犧尊者畫牛於尊腹也象尊畫象也尊必兩者一實醴齊王酌以為三獻二實緹齊后酌以為四獻再獻即饋獻也以序言之故曰再獻象尊亦必以兩者一實盎齊王酌以為五獻一實緹齊后酌以為六獻王之七獻則犧尊之醴齊后之九獻則象尊之盎齊罍所以副二其尊也昨與酢同蓋諸臣酌於罍以為九獻也不言獻者遲王后故曰酢也秋嘗冬蒸祼用斚彛黃彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也釋曰斚彛畫禾稼於彛秋者禾稼西成之時故用斚彛黃彛畫黃目於彛郊特牲曰黃目者鬱氣之上尊也黃者中也目者氣之清明也言酌於中而清明於外冬者萬物歸根復命之時蟄壞其封故用黃黃土色也曰獻者言其獻齊酒之物也著尊者無足著地也春耕故用犧尊夏假大故用象尊秋斂華就實故用著尊冬勞乎坎之時故用酒壺之尊藏以勞之之意時祭之外親逺為之遷廟主追而祭之謂追享親近為祖為考每月朔朝於廟謂之廟享虎為義獸蜼為知獸畫其形於彛取其義也大尊大古之瓦尊有反本復始之義山尊畫為山形致養之義凡六彛六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌大喪存奠彛大旅亦如之獻酌獻字素何反讀為摩莎之莎字之誤也涗舒鋭反修直歷反讀為滌釋曰凡言酌者謂皆泲之使可酌也祼用鬱齊用之於始獻故曰獻酌朝踐用醴齊濁用茅泲之故曰縮酌記曰縮酌用茅明酌也饋獻用盎齊涗新之也以清泲之拭勻而涗之也諸臣自酢用凡酒修治也凡酒三酒也滌酌以水和而泲之惟大事于太廟備五齊三酒存省也謂大遣時奠者朝夕乃徹也旅者大故之祭也亦存其奠彛則陳之不即徹也司几筵掌五几五席之名物辨其用與其位凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几祀先王昨席亦如之黼音斧依於豈反莞音管紛讀為粉純章允反繅讀為藻釋曰五几玉雕漆彤素几也五席莞繅次蒲熊席也名以命之物以色之也用謂所設之席位謂所設之次也大朝覲非常朝因會同而行朝覲之禮也大饗王與諸侯行饗禮於廟也大射王將祭祀擇士射於澤宫中也封國以茅包社稷之土於其方而封之也命諸侯朝而命之列於諸侯也王位天子常位也設新設也黼狀如斧其繡白黑采以絳帛為質也依狀如屏風即扆也以其設於户牅之間謂之依設黼其上也依前設王席南鄉嚮者明之義筵亦席也天子之席三重初在地者為一重謂之筵以莞為之而緣以白繡之粉加其上者謂之繅席以五采為之畫雲氣為緣也再加其上者次席即桃枝席以黼緣也莞即管也草似蘭繅即藻也削蒲蒻編以五采次以桃枝竹為席次列成文者紛如綬有文而狹者畫雲氣黼白果采純緣也五几莫貴於玉設於左右以為慿優至尊也鄭氏曰昨讀曰酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於是席王於户內后諸臣致爵乃設席是也蓋祀先王之席乃尸酢席皆如上三種也諸侯祭祀席蒲筵繢純加莞席紛純右雕几昨席莞筵紛純加繅席畫純筵國賔于牅前亦如之左彤几甸役則設熊席右漆几繢胡內反彤徒冬反釋曰諸侯祭祀席用蒲筵以蒲草為筵也繢純畫采色為緣也右彤几以几之雕刻者設於右莞席紛純天子以為下筵諸侯以為上席貴賤之等也昨席諸侯酳尸尸酢主君之席摹成物體為盡不言几無几也國賔諸侯來朝孤卿大夫來聘也亦如之為筵席與純于牅前亦如上二種席也彤丹色為飾而設於左天子設几於左右諸侯隂事尚右陽事尚左王田有司祭表貉所設席熊席以熊皮飾席几用漆几凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几凡吉事變几凶事仍几柏音迫萑音丸敦讀曰燾釋曰喪事几奠也葦似芄而粗萑似葦而細拍逼地之席諸侯則紛純謂諸侯之柏席亦用萑但緣則用粉也敦讀曰燾覆也每敦一几以其體實不同祭於廟同几精氣合也變几者王祭宗廟祼於堂饋食於堂繹於祊每事易几神事尚文示新之也仍因也凶事謂几奠几朝夕相因喪事尚質也陳氏曰席莫貴於次席黼純桃枝席也王筵莞而無蒲純有黼而無繢諸侯筵有蒲與莞席有莞繅而無次純有繢而無黼則害制之義故次周禮全經釋原卷六
