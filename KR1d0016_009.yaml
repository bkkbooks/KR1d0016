body:
  text: 周禮全經釋原卷九明柯尚遷撰夏官司馬第四官以夏為名象夏也說文云馬武也司馬掌兵言為武者也夏整齊萬物司馬掌邦政政者正也政所以平諸侯正天下也惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國釋曰邦政即六典之政典也夏官其屬六十司馬帥之而掌邦政政者正天下之性而不敢任情邪以亂邦之典法也故先之以治典次之以教典禮典然後繼之以政典者一其民於治教而安於禮樂也九州之諸侯四海之夷狄莫不循乎治教而安於禮樂不曰佐王平邦國乎吕氏曰自夏后氏命𦙍侯掌六師舉政典以誓衆則邦政之掌於司馬舊矣國之大事何莫非政獨戎政謂之政者何也天下無事寓兵於農然後賦役百為始有所施是政之所從出也天下有事舉兵討亂邦之存亡安危係焉其為政之大不待論矣此戎政所以獨謂之政也統六師而謂之平邦國則王者用師之本㫖特欲平邦國之不平者耳非濟貪忍而誇武功所謂天討也政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人釋曰軍司馬主一軍之衆猶司徒司空有鄉師遂師也輿兵車也行步兵也輿司馬如晉掌公之路車曰公路行司馬如晉掌公車之行列曰公行若無車則騎將步將也徒三百有二十與諸官異者以大司馬總六軍故獨多也李嘉㑹曰自小司馬而下皆不見其職掌豈用兵之時他官兼攝故職不見耶抑兵事尚密不當載之書耶先王不以兵機示天下五官治教刑事無不著惟兵法不傳陳君舉曰儀禮闕軍禮蓋司馬法即古軍禮後世司馬穰苴兵法非也凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人釋曰此言制軍之法雖與鄉遂卒伍之數同然鄉遂則比其家之數卒伍則比其人之數軍旅則比其師之數也王六軍則六鄉六遂大國三軍則三鄉三遂次國小國以是差之然軍將師帥以下雖與鄉大夫州長黨正其爵雖同然鄉遂之法施於平時伍兩之法施於師旅有征伐之舉則制伍兩無事復歸之鄉遂都鄙是以師無廩給之費將無擁兵之患然所謂六軍三軍二軍一軍乃天子諸侯之定制皆國中之鄉寓兵之法以守國者非征行之兵也六遂都鄙之兵有征伐之時則隨平日寓兵之數簡稽之隨所選之人編為伍兩卒旅師軍之制大將帥之以行此征伐之兵也六鄉之兵有變之際起之以衛王室四時之間作之以趨田役冦盜之臨比之使追胥閒暇之時令之出貢賦是故備千乘之賦於王城而王國已固蓄九千乘於六遂都鄙而富強已具征伐之舉選六軍之衆於九千乘之中而民力已裕此先王之足兵而未常有兵也陳君舉曰司馬法四井為邑四邑為丘出馬一匹牛三頭四丘為甸甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人戈盾具謂之乘馬且以民數中家計之一家六人二家十有二人可任用者五人一井八家四十八人可任用者二十人司馬甸出七十五人蓋於一甸六十四井之中五百一十有二家之內一千二百八十人可任用者擇七十五人籍於司馬以備征伐又曰井十為通通匹馬三十家士一人徒二人通十為成三百家士十人徒二十人與前數差錯者前言總籍民兵今言調發民兵前言四井為邑四邑為丘今言井十為通促零說整以什起數耳田制以八家為井起算兵制以什為什起算各從其宜前四丘為甸為六十四井五百一十有二家其籍於司馬者七十五人今通十為成加三十六井二百八十八家則一成之中百井調發三十人以中家計之百井八百家約為丁四千八百人堪使者二千人籍於司馬者百二十人有竒四分當兵之數發其一分之強故八百家只言三百家番休者常五百家可見周家優民之至丘氏曰伍五人兩二十五人三兩七十五人出車一乘百人為卒三卒三百人出車四乘五百人為旅二千五百人為師三師七千五百人出車百乘萬有二千五百人為軍三軍三萬七千五百人出車五百乘此大國也二軍二萬五千人出車三百三十三乘此次國也一軍萬有二千五百人出車一百六十七乘此小國也天子六軍七萬五千人出車千乘故六鄉六遂共二千乘其餘八千乘見之都鄙稍甸稍人掌之七十五萬人為萬乘大國三鄉三遂為千乘次國二鄉二遂六百六十乘小國一鄉一遂三百三十四乘此取之近地每家賦一人以為國家武備所以強本也若其調發則依司馬法簡稽之又曰家出一人為正卒此徒役之大數甸出革車一乘此出軍調發之數每次調發則五百七十六家共出七十五人并一革車其餘可以應八次調發之數司勳上士二人下士四人府二人史四人胥二人徒二十人釋曰勳功也此官主功賞蓋六鄉之內有賞田百官之中有功勳庸勞力多六者之功舉以賞之司勳差其等殺故曰掌六卿賞地之法而等其功司馬職當辨官論材考劾功能故司勳居首按先儒云司勳猶今吏部司封司勳之職冝以屬天官否則六卿土地之賞宜以屬司徒今以屬司馬者先王用師首以功賞為重賞之速則人心勸如屬地官則司存散出而壅底之患生愚謂此正不明司馬之職在於辨官論才考核功能豫奪黜陟振肅紀綱也故治諸侯天子所以平天下也而司馬主之司徒舉賢能興之太學將以治職也而司馬論之至於正王之服位出納王之大命朝廷之紀綱也正朝儀之位掌羣臣之版百官之紀綱也而大僕司士皆屬之司馬則司勳非屬之司馬而何乎况六功以戰居末而民功治功事功又六官之事今以戰而屬司馬是誠不知司馬為朝廷之紀綱乃謂兵官之一職也馬質中士二人府一人史二人賈四人徒八人釋曰質平也主買馬平其大小之價值如市之有質人司馬之職馬政其首務也故馬質在此葉氏曰成周設教民養馬之政特設馬質一官繼於司馬之後使之為民平馬價之髙下而使民自畜焉王馬之政乃有校人僕夫趣馬等官何其略於民牧而詳於王牧也蓋民馬民自備而自畜之其畜也則有司授之其用也則有司帥之王馬則自為牧廄所以必有數官分任其責也量人下士二人府一人史四人徒八人釋曰量猶度也謂以丈尺量度長短多少之數而不使之踰節者也故自掌營國邑以及祭祀賓喪皆掌其度量焉原曰大司馬之首有司勳馬質量人三官離而判之若不相屬合而觀之司馬之職見矣惟其掌天下之功賞也故首司勳惟其掌天下之戎事也故有馬質惟其掌天下之制節也故有量人功賞明則天下莫敢不趨事而赴功戎事舉則天下莫敢干紀而亂常度量有制則天下莫敢踰節而犯分此司馬所以為國之紀綱猶天之有雷霆號令也小子下士二人史一人徒八人釋曰小子主祭祀之小事乃司馬用牲事也羊人下士二人史一人賈二人徒八人釋曰夏官主馬羊二牲故在比原曰此二官與司爟猶司徒之有充人牧人牛人之官在司徒之首以祭祀為重故也司爟下士二人徒六人爟古焕反釋曰舉火曰爟鄭氏曰爟火乃熱火也司爟之職乃聖人觀天地五行之變順隂陽消長之宜寒暑往來之節而裁成輔相之道者也豈不大乎葉氏曰水火皆有禁水親而不尊易以溺人秋官萍氏禁之宜也火禁既有天官宫正修之又有秋官司烜職之夏官又特設司爟掌之何耶火之為物炎上就燥尊而不親不得其齊則疾不得其性則灾故其星之伏見則國火為之變易季春出火司爟禮而出之季秋內火司爟禮而內之二時之出內火星猶祭祀之祭爟不忘本也然司爟行火南方之事故𨽻於夏司烜取水火秋官奉明水火故𨽻於秋云掌固上士二人下士八人府二人史四人胥四人徒四十人釋曰固國所依阻者也在國則曰固在野曰險掌固掌修城池郭溝樹渠之固並據國而言司險周知山林川澤之阻並據野而言司險中士二人下士四人史二人徒四十人釋曰易曰天險不可升也地險山川丘陵王公設險以守其國此司馬所以有司險葉氏曰險者天地之所設聖人固不恃險以立國亦未嘗不因險以守國而所以用險之道則大矣成周掌固一職司修城郭溝池樹渠之固而使士庶子及其衆庶守之此掌王畿之固也司險一職掌九州之固以周知山林川澤之險設國溝涂而樹之林以為阻固皆有守禁此司天下之險也二官屬於司馬者謹固封守而預為備也亦如萃之除戎器戒不虞之意歟昔者周公營洛且曰使有德易以興無德易以亡則初非恃險也今險固二官無亦因天地之所設而使之為守云爾候人上士六人下士十有二人史六人徒百有二十人釋曰候人主候迎賓客之來者詩曰彼候人兮荷戈與祋環人下士六人史二人徒十有二人釋曰環猶郤也以勇力郤敵王氏曰巡察內外若環之相循而不窮故名官曰環人挈壺氏下士六人史二人徒十有二人挈若結反釋曰壺盛水器主挈壺水以為漏王氏曰先王分十二時於一晝一夜之間以漏箭凖十二時而為百刻以百刻定長短而分晝夜於是立挈壺之職焉詩曰不能辰夜不夙則莫失其職矣原曰候人掌迎賓客諸侯之使往來也環人致師巡察賊情挈壺令軍井軍糧軍舍皆司馬之所有事也故在於此射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人釋曰掌王賓射之儀所以屬司馬者以職辨公卿大夫之位故也服不氏下士一人徒四人釋曰服不者謂服不服之獸者故曰主養猛獸而教擾之射鳥氏下士一人徒四人射音亦釋曰主射鳥以共膳羞及驅惡鳥羅氏下士一人徒八人釋曰能以羅網捕鳥者禮大羅氏天子之掌鳥獸者此職是也掌畜下士二人史二人胥二人徒二十人釋曰蓄養也養鳥以備用原曰射人之屬有服不射鳥羅畜四官何也此先王所以均節羽物無使失其性也是故聖王之治非以盡民將以盡物故雖飛鳥之微惡者足以為人害善者足以為人用且祭祀賓客所不可廢也奈之何不設官以司之乎然用之有時秩之卑員之寡亦見先王不以小妨大末纍本耳故射人雖以射為名其實司公卿大夫之位向掌天子之大禮所射在禮不在物也其屬四官所射在物將以備禮也故物必出於禮者所以均節天地萬物也服不四官非所以均節萬物者乎司士下大夫二人中士六人下士十有二人府四人史四人胥四人徒四十人釋曰司士掌羣臣之版凡仕於國者不以貴賤總謂之士者始附于版者也故其官名司士焉正朝儀之位三歲稽士任進退其爵祿則鼓舞百官之權皆屬司馬矣古用人之權職在司馬也諸子下大夫二人中士四人府二人史二人胥二人徒二十人釋曰諸子主天子公侯卿大夫士之庶子者以兼同姓異姓之衆子言之故曰諸子文王世子名曰庶子者諸公諸侯之禮也諸侯之臣之庶子𨽻於編氓比天子殺之故庶子專主公族天子曰諸子諸侯曰庶子此其名實之辨也原曰司士諸子所以在司馬者蓋古者教人之權在司徒考課之權在冡宰用人之權在司馬今司士稽士任三歲進退其爵祿則兼冡宰之權矣諸子掌國子之遊倅使之修德學道考其藝而進退之則又兼司徒之權矣不知司馬掌國之紀綱與天下諸侯也故司士掌朝儀諸子掌宿衛教之車甲天子諸侯二事皆其所掌也綱紀所係不屬之司馬而何哉司右上士二人下士四人府四人史四人胥八人徒八十人釋曰右謂勇力之士充車右劉氏曰司右羣屬車之右也若王之五路右其玉路金路者則下大夫也右其象路者則上士也右其戎路木路者則中大夫也故司右上士二人下士四人者皆屬車之右也虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人釋曰不言徒曰虎士則虎士徒之選有勇力者以為王之親兵胡氏曰自古盛王雖用文德必有親兵専掌宿衛周公指虎賁與常伯同戒成王欲其知恤虎賁者猶今侍衛親軍也康王初立太保俾齊侯吕伋以虎賁五百人迎于南門吕伋者太公望子自諸侯入典親軍猶今殿前馬步軍都帥也勳德世臣總司禁旅虎賁衛士宿衛王宫其為國家慮深逺矣旅賁氏中士二人下士十有六人史六人徒八人釋曰旅賁者以旅力而衛王則兵衛之猶親者也夾王車則下士也而中士帥之焉節服氏下士八人徒四人釋曰其所服者與王為節此官不常置有事則用之方相氏狂夫四人釋曰王氏曰時儺而驅疫名以方相以其相視而攻疫者非一方也原曰司右虎賁旅賁三官皆天子在車護衛者也故皆以勇力之士為之而以士夫帥之蓋朝夕侍從最親於王者也然必以道義之士帥乎勇力之人使王侍御僕從罔非正人則所以養成君德者微矣節服方相二氏祭祀朝覲則用之時儺大喪則用之此臨時攝用者序其官者所以寓其事况此類在周禮多矣大僕下大夫二人小臣上士四人祭僕中士六人御僕下士十有二人府二人史四人胥二人徒二十人釋曰僕侍御尊者之名大僕其長官也東萊吕氏曰穆王命伯冏為太僕正作冏命夫陪僕􅉏御之臣後世視為賤品而不之擇者也曽不知人主朝夕與居氣體移養常必由之潜消默奪於冥冥之中而明諍顯諫於昭昭之際抑末矣穆王之命其知本哉然自周公作立政而歎綴衣虎賁知恤者鮮則君德之所係前此知之亦罕矣周公表而出之其選始重穆王之用太僕正特作命書至與大司徒略等流風猶未逺也𨽻僕下士二人府一人史二人胥四人徒四十人釋曰𨽻者其事䙝也辨師下士二人工四人史二人徒四人辨皮彥反釋曰辨者古冠之大稱賈氏曰按郊特牲及士冠禮皆云夏收殷冔周辨三代皆祭冠則辨亦冕也即是六冕皆得稱辨若皮辨爵辨自然是辨按有服必有冠有冠必有屨今司服既在春官而辨師則在夏官追師屨人又在天官何也蓋天官治內者也故追師屨人掌后之首飾與屨而王及命夫之屨亦附焉者以屨之等威不如冠服之詳故也司服之在春官固為禮制之大而冕與服不宜相離今辨師又在夏官者豈非司馬所掌者諸侯之分職而辨者衣服之最先故司服主乎天子而及乎諸侯辨師主乎諸侯而推自天子二官蓋互為用而不可専屬故辨師特在夏官與司甲下大夫二人中士八人府四人史八人胥八人徒八十人釋曰甲今之鎧也以下大夫為之是司兵戈盾弓矢諸掌兵器官之長司兵中士四人府二人史四人胥二人徒二十人釋曰掌五兵五盾也司戈盾下士二人府一人史二人徒四人釋曰戈今時鈎子㦸戈盾用多司兵總掌之又設此官以專掌之也原闕車所以承祭祀王敬賓如祭故也道右上士二人釋曰道右象路之右也以王朝夕燕出入故謂之道也大馭中大夫二人釋曰馭與御同大馭御之最尊者即玉路之僕得以馭名重之也戎僕中大夫二人釋曰主馭戎車者戎車革路也馭謂之僕者以其侍從於車以尊玉路也齊僕下大夫二人釋曰王敬賓如祭故車右謂之齊右車僕謂之齊僕然僕以馭車而馭不可以兼職故齊兼祭祀賓客之事而馭則異官也道僕上士十有二人釋曰主馭象路與王燕出入者田僕上士十有二人釋曰此木路之馭者馭夫中士二十人下士四十人釋曰二車從車使車之馭多其員者備雜馭也原曰戎右至馭夫九官皆所以參乘馭車者乃天子法駕之臣臨時兼攝故其爵尊無常職故無府史胥徒所謂侍御僕從罔非正人必以士大夫為之此官也歟然戎右三官充車之右大馭六官御車之左然玉路有五齊右兼祀右戎右兼田右右可以兼僕以御車則不可兼故五馭皆備官也馭夫又在五馭之外觀此則先王設官真如權衡之陳一毫不得輕重也安可以私意亂之哉校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人校户教反釋曰校人馬官之長校之為言校也主馬者必仍校視之王氏曰戎右至馭夫凡九職所以掌五路之車也自校人至圉人凡七職所以掌五路之馬也趣馬下士皂一人徒四人趣七口反皂才早反釋曰趣馬趣養馬也詩蹶惟趣馬巫馬下士二人醫四人府一人史二人賈二人徒二十人釋曰巫馬知馬祖先牧馬社馬步之神者馬疾若有犯焉則知之而祭之也祭而不愈則用藥以攻之是以有醫有賈也牧師下士四人胥四人徒四十人釋曰牧師主牧馬而頒之養之也廋人下士間二人史二人徒二十人釋曰廋𨼆也間者馬之所𨼆也圉師乘一人徒二人圉魚吕反圉人良馬匹一人駑馬麗一人釋曰養馬曰圉四馬為乘良善也駑劣也麗耦也良馬匹一人駑馬二匹一人養之也陳氏曰先王之時國馬足以行車公馬足以稱賦周禮鄉師以時辨其馬牛之物均人均馬牛之力政縣師遂人等皆辨其六畜或登之或稽之而牛與馬與焉及其用之則司馬法甸出長轂一乘牛三頭馬四匹此國馬也校人以下所掌此公馬也漢之養馬有五監六廄而武帝之時馬至四十萬匹唐置八使五十六監麟德間馬至七十萬開元間馬四十五萬匹與周公馬數相去逺甚者蓋周制六軍之馬出於民而校人所掌者特給公家之用而已漢唐出軍之馬盡出於公家所以多寡之不同職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人釋曰職主也主四方之職貢者自此以下皆掌侯國之官司馬專掌天下諸侯故土方以下皆其屬也原曰量人掌固司險職方土方懷方合方形方山師川師數官與司空虞衡土訓誦訓職頗相關所以屬司馬者以司馬專掌諸侯此以下皆邦國之事也故周禮理諸侯之官僅存此數官而已其大政則在大司馬小司馬而今亡矣土方氏上士五人下士十人府二人史五人胥五人徒五十人釋曰土方主諸侯土地之事者蓋奉行大司空之法於諸侯之國焉懷方氏中士八人府四人史四人胥四人徒四十人釋曰懷來也主諭德宣譽以來逺方諸侯及蠻夷之民物者子曰逺人不服則修文德以來之是也合方氏中士八人府四人史四人胥四人徒四十人釋曰合方主合同四方諸侯之政教者訓方氏中士四人府四人史四人胥四人徒四十人釋曰訓方主教道四方諸侯使遵王之道者也形方氏中士四人府四人史四人胥四人徒四十人釋曰形方主制正邦國之封疆形體無使侵紊則邦國各安其分守山師中士二人下士四人府二人史四人胥四人徒四十人釋曰掌諸侯之山林以致其貢蓋亦奉行大司空之法耳川師中士二人下士四人府二人史四人胥四人徒四十人釋曰掌邦之川澤使之貢其物邍師中士四人下士八人府四人史八人胥八人徒八十人釋曰邍與原同地之廣平者匡人中士四人胥四人徒八人釋曰匡正也正諸侯以法則而觀其隱慝也撢人中士四人史四人徒八人撢他面反與探同釋曰主撢序王意以語天下都司馬每都上士二人中士四人下士八人府二人史八人胥八人徒八十人釋曰主都之軍賦者其官建於王朝家司馬各使其臣以正於公司馬釋曰家司馬卿大夫采地也正猶聽也公司馬國司馬卿大夫之采邑王不特置司馬各使其家臣為司馬主其地之軍賦往聽于王之司馬原曰周禮治諸侯之政略而不詳大抵皆於治王畿而推之諸侯惡害己而去籍則大小司馬有闕文而班爵班祿方伯連帥之制謹固封守之度不見耳其他則於六職而推之司馬專掌之王制大同故也故以典待邦國之治以則待都鄙之治以法待官府之治則見於天官正月之吉施教法于邦國都鄙頒十二職事於邦國則見於地官其封建諸侯土圭之制造都鄙之法則見於冬官祭祀之儀宗廟之數車旗冕辨命數瑞節則見於春官行人司儀掌舍掌客掌交方士訝士縣士則見於秋官是治邦國之紀綱五官皆主之矣乃設司馬専掌諸侯以推行五官所職司空掌封國之法任土之制則有量人土方氏職方氏形方氏以推行之司徒掌教法則有懷方氏合方氏訓方氏以推行之又設巡察善惡之官則有匡人撢人亦如司諫司救焉冬官有山林川澤之虞衡則設山師川師邍師以辨侯國之名物使致貢焉春官有九儀司服則設辨師以相通候人以致禮其交際往來貢賦之節則見於秋官之行人又設都家司馬以司都鄙之軍賦則周禮治邦國之具亦略備矣或者不知職方以下十三官之設所以専理諸侯之事推行五官之所掌妄為分析以入他官先王之意荒矣夏官上大司馬之職掌建邦國之九法以佐王平邦國制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以紏邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國釋曰五官皆曰建邦此獨言建邦國者以司馬專掌諸侯之事也九法者邦國之事以佐王平邦國則使強不得以侵弱衆不得以暴寡苟戾乎此然後九伐施焉則王之於邦國豈遽以刑辟威之哉亦曰平之而已制畿則有侯甸男采衛之别封國則有公侯伯子男之異自王畿之外其畿皆不過乎五百里自大國百里而下小國不過乎五十里如是則大無并吞之強小無侵削之患而地之大小無不正矣設儀則典命之五儀謂國家宫室車旗衣服或以九或以七以五為之節也辨位則公一位侯一位伯一位子一位男一位也如此則上不逼下下不僣上而五等之上下尊卑等級明矣賢有德者功能建功立業者有德者進其爵有功者加其地所以作興天下諸侯修德建功之心而聽天王旌舉之典也牧太宰曰建其牧立其監牧謂九州之牧所以統領一州之諸侯蓋諸侯之長也監監察之如武王封武庚為殷後而立管叔蔡叔以監之監亦同等之國如王制所謂十國以為連連有長二十國以為卒卒有正則謂之監也牧以施政教號令於上監以考䆒督察於下上下相維大小相督所以聨天下之勢而不至於亂也制軍大國三軍次國二軍小國一軍詰問也禁諸侯之禁令天王頒諸侯之大禁於天下令牧監之國各制其軍又承天子之命詰問其犯禁者而伐所以繩紏諸侯之愆也施貢謂制其國之貢贄貢則各以其國之所有貨賄九貢則所謂食者三之一二入於天子一歸之臣是也分職則各以其能如長教化者則令其主教於侯國長於功業者則令考功於侯國即所謂牧監之職也施貢以任其財分職以任其能則所以任邦國無專土廢事矣鄉民兼國野之民也簡謂辨其材藝可任征伐者稽謂以司馬法三畨選之以聽調發之數也觀此則侯國亦用王朝簡稽之法矣辨可任以治事也則無遊民無廢職而邦國之民可用矣守者經界之地守也則者貢賦之等則也均其地守之經界則無不均之患平其貢賦之額則無輕重之偏使民各安其生民安則國安矣比猶親也使大國親小國小國事大國相和也郭氏曰民之有君諸侯之有王非先王創始而有之皆出於自然之勢也蓋上下之分未立強弱之勢不齊於是大得以陵小衆得以暴寡日趨於亂亡而生生之理息矣必有德者出焉則上下之分安衆寡之情一於是乎有小事大大比小小大之情率歸乎大定是先王封建之本也原曰觀九法之立則所以平天下之大綱舉矣故王畿之內天子之國也設六官以治之可謂纎悉矣畿外建國與天下英賢共治其法皆自治王畿者推之是故治教禮政刑事無不皆然但有制節於其間耳觀其畿封之正儀等之辨則列爵惟五分土惟三之制立矣建牧立監比小事大則方伯連帥之職舉矣賢能之進軍禁之詰則諸侯之功罪明矣施貢分職均守平則侯國之民事察矣又簡稽其軍賦則諸侯征役之用民不得而自專矣夫惟征伐聽簡稽則兵不得而妄用貢賦定疆理正則財不得而妄取功罪明則善有勸而惡有懲爵祿之班畿封之制一定而不移則小大相統而無侵奪吞並之虞矣使天下如身之使臂臂之使指逺近遲疾輕重強弱各得其平焉此之謂平天下之要道潔矩之義也後世郡縣之法是以治國之道而平天下令天下為一國無逺近之等無輕重之權雖曰天下一家中國一人之道然國與天下不可無别亦天道之自然分天下英賢共治亦至公之理大同之世也有天下者試思之以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴內陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弒其君則殘之犯令陵政則杜之外內亂鳥獸行則滅之馮皮氷切眚所景反壇音善釋曰九法用以定諸侯之職守故曰平九伐所以問諸侯之有罪故曰正先以九法平之然後以九伐正之一教一治先王所以治天下之權也以強凌弱謂之馮以衆暴寡謂之犯眚瘦也若人之瘦眚使其強更弱衆更寡所以正其馮犯之罪也王霸記曰四面削其地曰眚賢者國之寶宜任之尊之而賊之則傷義而為暴民者國之本宜教之養之而害之則傷仁而為虐有鐘鼓曰伐則伐者兵入其境鳴鐘鼓以聲其罪而伐之也內暴其臣民外陵其諸侯是德不宜君者故伐之而出其君置之空壇之地以奪其權更立賢者焉野荒而不治民離散而不安則削其地明其不能有焉張氏曰先王深知禮義之本原起於稼穡之際故於農事常首天下之政諸侯助祭成王作臣工之詩而戒以農事者由此故也先王巡狩四嶽較諸侯之善惡其慶始於土地闢田野治其罰始於土地荒蕪夫惟戒諸侯之事莫急於新畬之勤制諸侯之賞罰莫先於田野之政則先王之意可知矣負猶恃也固者國有山溪之險可依諸侯因之而不服上之教令者則潜師深入其地以伐之則罪人斯得固斯不能負矣親者其兄弟親屬也賊其親則不仁殺其親則不義正之者執之而治其罪論輕重加刑法焉若春秋晉人執衛侯歸之京師坐殺其弟叔武也放逐也弒下殺上也殘滅也臣下有放其君則無上弒其君則大逆故并其徒黨而殘害滅絶之也上文君無道而殺臣此臣無道而害君故皆以王法誅之令猶命也犯令者違王之教令也凌輕忽之意政則所頒之政教也杜閉塞之意不許其施令於屬國也故犯令則違命陵政則干法故削其屬國而杜絶之也外亂若陳靈與其臣淫于夏姬內亂若齊襄通于文姜是也若是則悖人倫滅天道無以異於禽獸則不可以親百姓當誅滅而盡除之如草木之除其根本使不復生也王氏曰先王之時其所封建諸侯莫非賢也安有諸侯造惡至此者乎蓋先王制治於未亂思患而預防之故九伐之法雖設不欲嘗試也垂之使知懼而已袁宏曰古者帝王必建萬國而植親賢置百官而班羣才所以不私諸已共饗天下分其力任以濟民事周禮天子之地方千里公之地方五百里侯伯子男之地降殺之謂之五等雖富有天下綜理不過一畿臨饗一國政刑不出封域故政事簡而才有餘所任輕而事不滯諸侯朝聘所以述職納賦盡其禮敬也天子巡狩所以觀察風教知其善惡也功德著於民加地進律其有不善者則明九伐之制是以世祿承襲之徒保其富厚而無苟且之慮修職述守之疇務善其禮不為進取之計故信義著而道化成名器固而風俗淳推之百世可久之道也自周室微弱政教凌遲桓文翼戴二國皆賴是雖楚恃江漢秦據崤函然畏迫宗周忌憚齊晉歷觀八百豈非扶持根深難拔已然之效哉正月之吉始和布政于邦國都鄙乃縣政象之法于象魏使萬民觀政象挾日而斂之釋曰正歲建子月朔布王政于天下至建寅正月朔旦乃縣政象之書如九法九伐之類有推行條節故也易氏曰布政於邦國都鄙者於萬民何與焉聖人唯能合民之情內外逺近通行無間而後可以言政愚謂大司馬職掌不宜止此數章田穰苴司馬法蓋亦祖述九伐之法而推演之或有古意在焉今傳司馬法與周禮不合或曰文王治岐之政愚以為井田貢賦非司馬法則簡稽之法不眀而周禮不可行矣今取班固之說附之於此庸補司馬之闕文而井田軍賦可得而通行焉班固曰殷周以兵定天下矣天下既定戢藏干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝是為八百八十畝餘二十畝以為廬舍井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦稅以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬四匹兵車一乘牛十二頭甲士三人步卒七十二人干戈備具是謂乘馬之法一同百里提封萬井除山川沈斥城池邑居園囿術路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六千四萬井戎馬四萬匹兵車萬乘故稱萬乘之主戎馬車徒素具春振旅以搜夏茇舍以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車卒正三年簡徒羣牧五載大簡車徒此先王為國立武足兵之大略也此必有傳授之言古司馬法之遺者乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿釋曰畿疆也猶限也自王城以外分其疆限有九也又謂之九服畿言其界畫服言其服屬於王也籍載九畿封域之書也政謂天子頒於侯國之政職謂諸侯所守之職事也國畿王國之畿天子之畿方千里不千里不足以待諸侯也其外每加五百里為一畿曰方五百里則蕃畿之內萬里矣孟子曰海內之地方千里者九是也蠻畿之外不在數中侯者候也為天子伺候非常也甸田也為天子治田以出貢賦也男者任也任王者之職事也采者采取采物以供天子也衛者為天子守衛也天下有道守在四夷也蠻者縻也縻繫之以政教也自此以上六服為中國之九州自此以外是夷狄之君長蠻服亦謂之要服要束以文教也夷四夷鎮去中國稍逺鎮守夷服之地不得內侵蕃者翻也言其與人異也或曰有蕃屏之義凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人釋曰賦給軍用者也令賦亦以民之衆寡地之美惡為制蓋地有美惡令其出賦以給軍餉人有多寡令其出丁為軍卒也賈氏曰有夫有婦然後為家自二人至於十人為等七五六者為之中制也地有上中下各分為三等所謂九比也則十口食上上九口食上中以至三人食下中二人食下下是也又遂人曰上地夫一廛田百畝萊五十畝中地田百畝萊百畝下地田百畝菜二百畝又都鄙受田不易之地田百畝再易之地田二百畝三易之地田三百畝是所食者三之二食者半食者三之一也按遂人曰夫一廛田百畝餘夫亦如之此云上地食者三之二蓋上地餘夫多故受田亦多謂其勤力墾闢之多也人多故田多墾闢耕治亦多故為上地上家非以萊易之多寡為上地上家也其三等以此制之若上家受上地只百畝則人多而田反少矣故此言食者以耕治墾闢之多者而言之也原曰令賦以地與民制之者地量其所受墾闢之多寡以為給餉之需民稽其可用之數以為征行之備而已司徒凡起徒役無過家一人乃一家力役之征也此之令賦以出征自有簡稽之法於其間耳先儒稱鄉軍之美乃曰處則為比閭族黨之民出則為伍兩卒旅之衆士不待選皆吾民也將不改置皆吾吏也有事置之行陳無事歸之田里此不知司馬法有簡稽之制故也若天子出征六軍皆六鄉之士國中偕行而不留一家可乎蓋六鄉六軍者平時卒伍之法行於保伍之中乃出貢賦聽田役之民衛王宫而不以征行也天子萬乘六鄉不過出車五百七十二乘而已六遂都鄙可以出車八千餘乘也不發之可乎故征伐之兵必於遂都鄙之中行簡稽之法宜為兵者籍於司馬稍人掌之所謂若有師田帥其同徒輂輦聽於司馬是也或曰簡稽之制如何司馬法曰四丘為甸出長轂一乘蓋六十四井之內五百七十二家之中可任用者一千二百八十人之中取其七十五人籍於司馬稍人掌其丘乘之令是故不為兵者常八倍之又曰通十為成成百井八百家士十人徒二十人是八百家之中可任用者二千人之內調發者三十人而已是掌於稍人者四分當兵之數發其一分之強以行征伐簡稽之精至於如此烏有每家一人偕行者乎曰然則伍兩卒旅之長又何人為之曰籍於司馬者稍人所掌平時編為卒伍之制鄉中預選其將領之以聽教戒春搜夏苗秋獮冬狩矣及征伐之時又隨調發之數編成伍兩卒旅之制於選將之中又擇而統之故軍司馬輿司馬行司馬皆臨行所置也安有六鄉之吏偕行者乎但所謂有事帥以征伐無事復歸之田里是以平時民無供給之費將無擁兵之患士安其所民樂其業此先王之法所以為美也中春教振旅司馬以旗致民平列陳如戰之陳中音仲釋曰此下言四時教兵之法與五官不類或此是軍禮諸侯惡害已遂去其治諸侯之制節恐霸者執而伐之故以軍禮補之歟未可知也春教曰振旅者振謂振而拯之爾雅曰出曰治兵尚威武也入為振旅反尊卑也春陽用事非用兵之時故教振旅兵入收衆專於農也熊虎為旗司馬植之以期民於下也平列陳者平其列髙下如一以為陳也田獵所習無非軍事故曰如戰之陳辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅師執鼙卒長執鐃兩司馬執鐸公司馬執鐲鐃音嘵鐲音濁賁扶云反提徒兮反鼙蒲兮反釋曰兵以鼓進以金止鼓鐸鐲鐃皆所以節坐作也故於振旅辨之路鼓賁晉提鼙皆鼓也鼓人職曰以路鼓鼓鬼享以賁鼓鼓軍事以晉鼓鼓金奏以金鐃止鼓以金鐸通鼓以金鐲節鼓故鼓之為物以和軍旅以節音樂以正田役以作士氣者也車驟徒趨鼓與之進車發徒刺鼓與之戒車坐徒作鼓與之行止易車險徒先王所恃以却敵者也然而坐作進退疾徐疏數之節在鼓而已王執路鼓路者道之大也王以道御衆故職之賁者事之大也諸侯為王執事故執賁鼓軍將統萬二千五百人晉以進為義師帥統二千五百人提鼓鼓之有柄者於馬上提之旅師統五百人鼙鼓卑者所執也卒長統百人執金鐃以止鼓兩司馬統二十五人執金鐸以通鼓公司馬五長也執金鐲以節鼓伍兩之長皆謂之司馬司馬帥人之稱雖卑而同其號公者别私人也以教坐作進退疾徐疏數之節遂以搜田有司表貉誓民鼓遂圍禁火弊獻禽以祭社數音朔貉莫駕反弊婢世反釋曰坐作進退習戰法也詳見大閲搜搜也春田之名蓋春時鳥孕乳搜擇取其不孕者將田之初有司行表貉之祭司馬以軍法誓民有司謂肆師甸祝也鼓遂圍者虞衡守禽之厲者乃擊鼓而圍之遂搜火火田春田用火田止曰弊火止則獻禽以祭社為民祈榖胡氏曰戎祀國之大事也搜狩所以講大事也用民以訓軍旅所以示之武以威天下取物祭宗廟所以示之孝以順天下故中春教振旅遂以搜中夏教茇舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩然不時則害民不地則害物田狩之地如秦有具囿鄭有原圃皆常所也違其常所犯害民物而百姓將聞車馬之音見羽旄之美舉疾首蹙額而相告矣可不謹乎中夏教茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅遂以苗田如搜之法車弊獻禽以享礿茇蒲未反釋曰茇草舍也軍有草止之法於夏教之亦平列陳如戰之陳也車兵車也徒步卒也撰謂數擇之也述事為書合驗為契讀之則聲於衆也撰車徒所以具之讀書契所以聲之皆比軍事也帥六軍之帥也門所居之門也公邑謂之縣小都謂之鄙大夫謂之家鄉謂六鄉野謂六遂茇舍之教乃下寨法專以辨軍之夜事蓋休兵偃師之時宿火而寢目固無見銜枚而處耳固無聞也將以鼓鐸而聲之則所聞必亂將以旗物而揮之則所見必昧於是專以號名為尚而號名又不外假者所以防姦細及間諜等事其他皆如振旅則夫坐作進退疾徐疏數之節皆然矣夏田若治苗去其不秀實者故曰苗如搜之法則其他表貉誓民鼓為圍禁之屬皆同車弊驅獸之車止也夏田主用車示所取物希皆殺而車止王制曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵礿宗廟之夏祭也冬夏田主于祭宗廟者隂陽始起象神之所在中秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅遂以獮田如搜田之法羅弊致禽以祀祊祊音方釋曰秋教治兵以出兵為名秋尚嚴武也旗物所以統衆載建之於車也軍吏諸軍之帥自軍將至伍長皆是也師都謂孤卿之涖衆者鄉遂六鄉六遂之大夫也郊野謂都邑之吏也日月為常交龍為旗熊虎為旗通帛為旜雜帛為物龜蛇為旐鳥隼為旟書當作畫事謂所掌之事號謂所稱之號皆畫於旗物也兵法夜戰多火鼓晝戰多旌旗是晝之相示者以象夜之相聞者以聲故旗物有龍虎鳥龜之文所以待晝事有號名之稱所以待夜事也秋田為獮獮殺也羅弊網止也秋田主用網王制曰鳩化為鷹然後設罻羅則秋用羅宜矣祊當為方秋田主祭四方報成萬物詩曰以社以方中冬教大閲前期羣吏戒衆庶修戰法虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐釋曰春辨鼓鐸夏辨號名秋辨旗物三時各教其一至冬大閲之時總教之大閲軍實為農隙也王氏曰四時之田辨鼓鐸者未始無旗物所謂以旗致民是也辨旗物者未始無號名所謂各象其事與其號是已周禮田法大抵詳於冬狩以文考之四時並用也羣吏鄉師以下也戒衆庶修戰法若鄉師四時之田前期出田法于州里簡其鼓鐸修其卒伍州長帥而致之掌其戒令黨正則以其法治其政事族師合其卒伍簡其兵器帥而至也萊芟除其草萊令車得馳驅立三表三表之間二百步左右之廣當容三軍又加一表五十步從南頭立表以北頭為後表司馬建旗於後表之中羣吏帥民而至質明正明也弊仆也仆旗後至者誅之車徒皆坐而聽誓士卒北面吏南面軍法後期者斬此方致民故誅之下文不用命者斬則此之誅未遽以死處之也羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之釋曰羣吏諸軍帥也誓告戒也如甘誓湯誓之屬是也陳前南向表也小子斬牲以徇陳左右巡行之使衆皆知也夫前期戒衆庶然後至者可誅既陳而誓然後不用命者可斬不先有以告戒之及犯而誅之是罔民也故必斬牲以徇則民皆知避而難犯矣中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐摝音鹿釋曰中軍中軍之將也天子六軍三軍居一偏皆自有中軍也羣吏既聽誓各復其部曲中軍之將令鼓以鼙者旅帥執鼙也鼓人者軍將也三鼓以作士衆之氣也司馬兩司馬也振鐸以作衆羣吏皆植所建之旗物車徒之坐而聽誓者皆起軍將擊鼓以行之伍長鳴鐲以節之車徒皆行自後表前至第二表而止也摝鐸者掩上振之為摝所以止行息氣也羣吏聞鐸皆仆其旗車徒皆坐者止行而息氣也又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼓車馳徒走及表乃止釋曰又三鼓振鐸令作旗作車徒也鼓趨而進則車驟徒趨者赴敵尚疾之漸也驟謂聚足而進趨則走之肅也及表乃止自第二表至前第三表也坐作如初者又坐又作摝鐸振鐸弊旗作旗也乃鼓者又擊鼓令車馳徒走者馳謂决圍而去走則速也此言勇於赴敵也及表乃止者自第三表至前表也鼓戒三闋車三發徒三刺乃鼓退鳴鐃且郤及表乃止坐作如初關苦舌反郤起略反釋曰鼓聲止謂之闋鼓戒者聲鼓以戒攻敵也鼓一闋車一發徒一刺及三而止以象服敵成於三之意也武王之誓徒曰不愆於六步七步乃止齊焉誓車曰不愆于四伐五伐乃止齊焉此車徒之節也乃鼓退者謂南表軍吏及士卒回身向北從南而始也軍退卒長鳴鐃以止鼓及表乃止退自前表至後表也坐作如初習戰之禮出入一也曰及表乃止凡四段三進一退也每段皆有作行止坐獨第三段無坐者此乃攻敵之時也自後表至第二表曰車徒皆行自第二表至第三表曰車驟徒趨自第三表至第四表曰車馳徒走此其疾徐之節也進則每進一表退則自前表至後表此疏數之節也遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗居卒閒以分地前後有屯百步有司巡其前後險野人為主易野車為主釋曰冬田為狩言守取之無所擇也軍門曰和今謂之壘門立兩旌以為之名旌門曰和師克在和故也以叙和出以次序出和門也左右陳車徒或出而左或出而右也有司平之鄉師居門正其出入行列也旗車吏所載也分地調其部曲疏數也車徒前後異屯相去百步也車徒畢出和門鄉師又巡其行列使不紊也險野山阜險阻則步卒居前原野平夷則以兵車居前春秋昭八年搜干紅榖梁傳曰刈蘭以為防置旜以為轅門以葛覆質以為𣙗流旁握御轚者不得入左者之左右者之右然後焚而射焉右者戰不出頃田不出防是其事也陳氏曰古者用兵險野人為主易野車為主則險野非不用車而主於人易野非不用人而主於車動則足以衝突止則足以營衛將卒有所芘兵械衣裘有所齎詩云君子所依小人所腓則車之為利大矣昔周伐鄭為魚麗之陳先偏後伍伍承彌縫偏則車也伍則人也伍從其偏也先車足以當敵後人足以待變則古者車戰之法略可知也或者謂晉人以什共車必克房琯以車戰取敗遂以為用車不若用人與騎之愈是不知古者教民以射御為藝君子以射御為能孔子曰吾執御乎執射乎詩稱大叔之多才則曰叔善射忌又良御忌古人相率以射御如此則登車而不能御驂乘而不能射者鮮矣房琯之用車有是人乎不然巫臣教吳以乘車而勝於楚何也既陳乃設驅逆之車有司表貉于陳前釋曰驅謂驅禽使前趨獲也逆謂逆還之不得令走出圍也驅用驅車逆用逆車此田僕之所設也表貉之祭皆如振旅中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小獸私之獲者取左耳及所弊鼓皆駴車徒皆譟徒乃弊致禽饁獸于郊入獸禽以享蒸釋曰此言往狩田也師帥先擊鼙以令鼓執鼓之人皆三鼓之必以三者節制之度也羣司馬衆兩司馬公司馬也枚如箸銜之有繣結項中以止語為相疑惑也下文有銜枚氏大獸輸之於公小禽以自畀也詩云言私其豵獻豜于公獲得也得禽獸者取左耳當以計功也及所弊田所當止之處也疾雷擊鼓曰駴車徒皆譟者天子諸侯搜獸有常至其常所吏士鼓譟象攻敵尅勝而喜也譟譁也徒乃弊冬田主用徒物多衆得取至是而止凡田春用火夏用車秋用羅非不用徒也特所主者有異耳致禽饁獸于郊聚所獲禽因以祭四方之神于郊又取禽以入獻先王以為蒸之祭也蒸冬祭名李氏曰兵者不祥之器不得已而用之若無故而習是習殺人也非示天下以不復用兵之意也故用春搜夏苗秋獮冬狩而教焉鳥獸魚鱉皆函血氣若無故而殺之是暴殄天物也作禽荒也故因祭社享礿祀祊享蒸而行焉明非好兵也為田獵也非好田獵也為祭祀也外以彰事神之禮內以作不虞之備聖人之動其順如此不足為後世法乎春秋發微云禽獸多則五榖傷不可不捕故因田以捕之上以供祭祀之鮮下以除稼穡之害故田必以時殺必由禮田不以時謂之荒殺不由禮謂之暴惟荒也妨於農惟暴也殄于物聖人之深戒也及師大合軍以行禁令以救無辜伐有罪若大師則掌其戒令涖大卜帥執事涖釁主及軍器及致大常比軍衆誅後至者釋曰及師者謂平時教其民知上下之分行陳之法及王巡守若㑹同司馬起師大合六軍之衆以行所以威天下行其政事禁令也民既教戒軍旅既備諸侯苟有無罪而被虐者救之有罪而不服教者伐之王氏曰仁者愛人故惡人之害之也義者循理故惡人之亂之也以其愛人循理故以救無辜為先以其惡人之害故以伐有罪為後蓋師以安民為先故也大師者王親出師征伐也涖臨也臨大卜卜出師吉凶也戒令行軍之約束也主謂社主及遷廟之主軍器鼓鐸之屬凡師既授甲迎主于廟及社祝奉以從殺牲以血塗主及軍器皆神之致聚衆也比軍衆校其軍數及齊一之也王親御六軍則司馬用王之太常致衆而校數之太常既建而後至者誅之及戰巡陳視事而賞罰若師有功則左執律右秉鉞以先愷樂獻于社若師不功則厭而奉主車王弔勞士庶子則相厭於涉反釋曰司馬當戰對陳之時巡軍陳視其戰功之事知其有功無功而行賞罰也師有功勝也司馬則左執律以聽軍聲右秉鉞以為將威也先猶道也兵樂曰愷獻于社獻功于社也司馬法曰得意則愷歌示喜也厭謂厭冠喪服也戰而敗則喪服示戚也奉主車獲本也送主歸于廟與社也戰敗士庶子必有死與傷者王親弔其死者而間勞其傷者皆司馬相其禮也大役與慮事屬其植受其要以待考而賞誅大㑹同則帥士庶子而掌其政令若大射則合諸侯之六耦大祭祀饗食羞牲魚授其祭大喪平士大夫喪祭奉詔馬牲釋曰大役築城邑之類植部曲將吏如宋城傳曰華元為植是也要簿書也大司馬於大役與慮事欲知其事之可否屬其植則欲知其人之多寡受其要則欲知其功之等差事成而考之以行賞罰也士謂國子之已命者庶子國子之未命者諸子職云㑹同賓客作羣子從從王也司馬帥之大射王將祭射于射宫以選賢也王射三侯以諸侯為六耦羞牲魚牲與魚也羞進之也受其祭謂受尸賓以祭也大祭祀與大饗食大司馬主進牲魚與受祭也平一其服也司馬主平一士大夫之喪服祭喪之祭也王喪以馬祭者蓋遣奠也奉猶送也送而至墓告而藏之也葉氏曰大司馬制六軍則兵屬大司馬矣至於軍旅大事則五官預有事焉蓋古者寓兵於農寓將於卿命卿為將此有事之時也無事而統兵亦不專屬之司馬使兵無專將將無專權也觀周人制兵之法國子宿衛之士則屬之冡宰虎賁宿衛之兵則屬之司馬師保四翟之𨽻既屬之地官又屬之秋官至如國有大事國子游倅雖屬於地官之諸子而又弗征於司馬其衛兵之權散出可知也鄉遂之民皆軍也則屬之司徒四時之田皆兵也則屬之司馬閭師地官之屬軍旅之戒則受法于司馬至如鄉師帥民徒而致政令受役要可也而必考辟于司空其畿兵之權散出可知也蓋古者兵制自衛民之外六軍之制皆寓兵於農本無兵之可統寓將於卿本無將之可名又况兵權散出不屬一人有事調兵則天子遣使一牙璋發之其權又專屬於天子是以兵滿中外而居然若無逮及數世司馬世官爰以命氏馴至諸侯更霸列國專征世卿帥師大夫藏甲孔子作春秋凡書帥師議權臣也聚民為兵則兵安得而不惰聚兵而專將則將焉得而不驕此其為患也久矣唐人府兵號為得井田大意然井田寓兵於農府兵寓農於兵其意已異而况兵有定額將有定員更畨再世安能無將驕卒惰之患府兵且爾況不為府兵者哉小司馬之職掌鄭𤣥曰此下字脫滅札爛文闕漢興求之不得遂無識其數者凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之法闕文軍司馬闕此乃屬官之首其所職大且要矣其缺而不能補可惜哉輿司馬闕此掌出兵車戰也此亦有職今缺愚意大司馬春搜夏苗陳法或在此二官歟行司馬闕何氏曰先王制禮道民吉凶嘉賓之禮達于天下久矣而軍禮獨藏于司馬周禮於庶官職掌纎悉畢具而小司馬之職文不可考軍司馬輿司馬行司馬徒有其名得非軍法尚密而藏其用耶今武經有司馬法雜以穰苴之說其書文古而意深亦載九伐之法中間有格言安知非古之遺文而兵家者流附以用兵之權略歟按穰苴獨推演九伐之法耳若班固井田出兵之制則誠古司馬遺文而諸侯之制度則王制亦頗備焉司勳掌六鄉賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多釋曰賞地即賞田也載師職曰以賞田任逺郊之地逺郊在六鄉之內故言六鄉賞地之法等猶差也功有大小則賞有差等大功勳則封國矣賞地謂民功以下也王謂有天下者有安定天下之大功則謂之曰勳諸侯有一國者能安定一國之業則謂之曰功國以民為本君為民而立能造福萬民民安則國安矣故民功次之謂之庸者平常之中功德著焉事功者治事之功處人之所難處為人之所不能為則可謂有勞效矣治功則整齊庶政治理著績者也不謂之有力於職業乎至於克敵取勝首虜多效亦不可無賞也然止曰多而已不以之為尚也故居末焉鄭氏曰王功之勳輔成王業若周公國功之功保全國家若伊尹民功之庸法施於民若后稷事功曰勞以勞定國若禹治功曰力制法成治若臯陶戰功曰多尅敵出竒若韓信陳平今按功必至如此則非司勳賞地所掌矣故大功司勳藏其二其次功能賞地者司勳等其功而賞之凡有功者銘書于王之大常祭于大蒸司勳詔之大功司勳藏其二釋曰大功謂王功國功二者之功固不以地賞之也必錫之山川土田附庸然後銘書其功於王之大常使與日月同其光冬祭先王之時亦與祭於廟使與先王同其榮君牙曰厥有成績紀于大常盤庚曰兹豫大享于先王爾祖其從與享之是也司勳詔之有此大功非司勳所能等差之特於旌功之時司勳詔告之而已又凡大功成績藏於天原闕天文辰為馬𧖟書𧖟為龍精月有大火則浴其種是𧖟與馬同氣物莫能兩大禁再𧖟者為傷馬與按原訓再無義例禁𧖟恐傷馬非聖人之政𧖟者民生之本不可禁也原當是平原牧馬之處禁𧖟桑於原者恐害馬芻歟然未知是否量人掌建國之法以分國為九州營國城郭營后宫量市朝道巷門渠造都邑亦如之營軍之壘舍量其市朝州涂軍社之所里釋曰建營立也營國之法詳於匠人司馬掌天下諸侯故建國有大國次國小國之差都鄙有廣狹之度此量人所以不屬司空而屬司馬也分國為九州者州方千里則四公六侯七伯二十五子百男州各有長王畿獨居一州此建國之大槩也每國之中則營國之城郭城有里數郭周城城郭既立乃營后宫國君所居也量市朝者宫居中前朝後市城中有道民居有巷城有門門外有渠縱橫廣狹各有定制量人以尺度量度之大小各得其分使無僣踰是所以一天下之權也大國亦有都有邑其城郭市朝渠巷各有定制故曰亦如之其營建之次第同也師行於外壁壘之處亦不可無市朝州涂軍社也亦量人制其廣狹市則通行交易所在朝則主將出令之所每州為一師二千五百人各有涂道而軍社則有常居之里此營壘亦設定也邦國之地與天下之涂數皆書而藏之凡祭祀饗賓制其從獻脯燔之數量掌喪祭奠竁之爼實凡宰祭與鬱人受斚歷而皆飲之竁昌絹反釋曰邦國之地其制有大小丈尺天下之涂道所通達之里數有逺近多寡之數皆書而藏之則天下諸侯莫敢違制而天下之道路莫敢移易以數在量人故也祭祀以事神饗賓以接人從獻脯燔其物之所共則有數其器之所容則有量量人制之其官以量多少為事故也所謂從獻脯燔者以所獻牲牢為正以脯燔為從也奠遣奠也竁穿土為壙也其祭皆有爼實亦必量人掌之者以其制度數故也宰祭者謂冢宰佐王祭及攝祭也訖事量人與鬱人受舉斚之餘瀝而飲之盡所以受神之福王氏曰鬱人於祭祀達其氣臭以始之交神以德者也量人於祭祀制其量數以成之事神以禮者也二官本末相成焉小子掌祭祀羞羊肆羊殽肉豆而掌珥于社稷祈于五祀凡沈辜侯禳飾其牲釁邦器及軍器凡師田斬牲以左右徇陳祭祀贊羞受徹焉珥而志反讀為衈釋曰羞進之也羊肆豚解而腥之用於朝踐者也羊殽體解而爓之用於饋食者也肉豆切肉而以豆羞者也王氏曰肉豆則醢人所掌四豆之實謂以豆盛醢而進之者也珥弭災之祭也祈求福之祭也社稷五祀見前沈謂貍沈辜謂疈辜侯謂侯福禳謂禳灾皆小子飾其牲也邦器禮樂祭祀之器軍器鼓鐸之屬以厭妖小子釁之也斬牲徇陳必用小子者以其掌釁社而軍法不用命者則戮社故也羞始祭所進之物也徹祭畢所徹去之器也小子皆贊之以小子之職皆事之小故也羊人掌羊牲凡祭祀飾羔祭祀割羊牲登其首凡祈珥共其羊牲賓客共其法羊凡沈辜侯禳釁積共其羊牲若牧人無牲則受布于司馬使其賈買牲而共之釋曰羔小羊也飾羔若記所謂飾羔鴈者以繢示敬也登升也升首以報陽也法羊賔客牢禮所用法式之羊積積柴也禋祀槱燎實柴也布泉也即原闕納其氣於內逆而用之則强弱相勝而氣無以為均順而變之則休廢相沿而疾以之救民於四時皆有厲疾火生於木其氣性從之故四時各取其所宜木以變國火焉而民疾於是乎可救矣時運而往火變而新陽太盛則養隂之弱以抑其強隂太盛則用陽之盛以救其弱使民常得隂陽之正氣而不滯于一偏此聖人善救民之道也火之象在天其伏見有時火之用在人其出內有節蓋五行於四時各有盛衰則火之運於四時也亦有休廢自辰至已於方為火所王自戌至亥於方為火所伏因其王而出之所以宣其力於其伏而納之所以息其氣先王於火之政令豈特有以救民疾哉其原五行之性又有至理於此自非深知夫隂陽之情者孰能與焉掌固掌修城郭溝池𣗳渠之固頒其士庶子及其衆庶之守釋曰劉氏曰易云城復于隍則是浚溝之土所以為城也鑿池之土所以為郭也溝池深於外城郭固於內用其深以增其髙也渠所以出水又在外因之設固植木其上守固之材出焉王氏曰士者公卿大夫之適子而巳命者也庶子者國子之倅而未命者也衆庶則其人民遞守者也故士庶子所使帥衆庶而頒其守則逺近均勞逸更焉而守政於是乎行矣公卿大夫涖職於內而子弟又守城郭溝池之固於其外此所以內外一心休戚一體而先王之治晏然無內外之虞矣設其飾器分其財用均其稍食任其萬民用其材器凡守者受法焉以通守政有移甲與其役財用唯是得通與國有司帥之以贊其不足者晝三巡之夜亦如之夜三鼜以號戒鼜音戚釋曰飾器兵甲之屬飾之以為威儀設之以聳觀曠備非常也財用國以財給守吏之用也稍食守者祿廩也任其萬民各以任使之也民之材器其所用築塹及為藩落者劉氏曰財用曰分隨地守之所用也稍食曰均計功力之所當也萬民曰任分地界為守也材器曰用防緩急之所須也凡守者各致其守不可以有移也其有移者則受法于掌固以通之也蓋甲兵有時而不足用力役有時不足供財用有時不足給則移甲移役與移財用以足一時之需其他非是不得妄離部署故曰唯是得通國有司甲兵財用之官也言其通又必與國有司帥而致之以助其不足則其移也無私矣贊佐助也巡行也鼜戒守鼓也號呼其守者之名也戒戒其守者之事也言為衆庶之懈怠故晝夜三巡為夜不見其三巡故以三鼜號戒為信也以上皆王國之守固若造都邑則治其固與其守法凡國都之竟有溝𣗳之固郊亦如之民皆有職焉若有山川則因之釋曰若造三等都邑則亦治其固與其守法然不惟王國都邑之內至於國都之境皆有溝𣗳之固而鄉遂之境亦如之合守之處其民皆分其職任使遞守也而凡造溝之處值有山川則因而為之不須别造也王氏曰若有山川則因之以為阻固也夫為髙必因丘陵為下必因川澤因其髙下自然之勢以為之阻固則用力不勞而其為備也易矣先王之世以道德則明以仁義則修然後掌固之守可賴焉若夫徒恃形勢之固而不知仁義道德之所本委而去之雖有方城漢水何足恃哉此魏之武侯保西河之固而吳起對之以在德不在險者良有以哉司險掌九州之圗以周知其山林川澤之阻而達其道路設國之五溝五涂而𣗳之林以為阻固皆有守禁而達其道路國有故則藩塞阻路而止行者以其屬守之唯有節者達之釋曰九州之圗謂天下地理阻厄之圗也山林川澤之阻若職方氏所謂東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖之類是也觀其圖則知其阻為其阻而不通也山林則開鑿之川澤則橋梁之而達其道路焉五溝遂溝澮洫川也五涂徑畛塗道路也樹之林作籓落也或曰溝涂之上植林木為阻固使民守而禁之則非遂人之五溝五涂矣曰晉師伐齊而曰使齊之封內盡東其畝今曰盡東其畝唯吾子戎車是利無顧土宜無乃非先王之命也夫是五溝五涂之設於天下豈惟利田亦寓阻固之意也然唯於分界之處有溝涂則樹之林木以為守固其田中之溝涂不樹也國有故謂兵冦也閉塞要害之路不通往來備奸冦也凡司險之民皆以守之焉節謂道路之旌節也有節則非冦也故達之掌疆闕其職原曰疆者侯國都鄙之疆界也是故大國不過百里次國七十里小國五十里不能五十里曰附庸是建國之定制其曰五百里三百里二百里者其屬國也先王之為此制也法制必嚴分守必明疆界必定使彊不得以侵弱衆不得以暴寡故大小相維王設其牧天下之定其原蓋出於此春秋之時諸侯踰制晉大數圻漢陽諸姬楚實盡之司馬之職廢天子不能問方伯自違制封建於是而大壞矣春秋書侵書伐何者而非兼并之議也故曰春秋無義戰及戰國之時王制壞亂極矣孟子曰諸侯惡害己而去籍其全書孟子巳不得見豈特司祿之職缺而掌疆亦缺矣况并冬官於司徒闕略大小司馬之職掌則諸侯之意不益可見乎候人各掌其方之道治與其禁令以設候人若有方治則帥而致于朝及歸送之于竟釋曰先王於四方之賓客來則有以迎之去則有以送之因設候人之官分掌候四方賓客之往來其於道路候掌其道路之治治謂出入迎送治其事也鄭氏曰國語候不在竟譏不居其方也禁令備奸冦也以設候人者選士卒為之即其徒也方治謂出於其方來治國事者候人帥其使而造於朝及其事竣而歸又送之出竟也詩曰彼候人兮荷戈與祋春秋傳曰晉欒盈過周王使候人送出諸轘轅是也環人掌致師察軍慝環四方之故巡邦國摶諜賊訟敵國揚軍旅降圍邑摶音慱諜音牒降戶江反釋曰環人蓋巡察之官致師者犯敵以誘其出也鄭氏曰致其必戰之志古者將戰先使勇力之士犯敵焉春秋傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下掚馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復之察軍慝慝隂奸也視軍中有為慝者則執之環四方之故四方其兵戎之故環而却之不使合黨締交所謂折衝禦侮也巡邦國摶諜賊平時巡行邦國之中恐有隂謀邦國有賊來作間諜伺虛實者摶而執之訟敵國者敵國有兵來侵則往訟曲直若齊國佐如師是也揚軍旅稱耀其威武以攝恐敵人也降圍邑於其所圍之邑苟有欲降者則受其降然則環人乃才勇口辨之人為之若古使敵辨士之流者挈壺氏掌挈壺以令軍井挈轡以令舍挈畚以令糧凡軍事縣壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以日夜及冬則以火㸑鼎水而沸之而沃之畚音本柝音託釋曰挈提也壺盛水器也令軍井者軍穿井及水懸壺其上令軍衆知水所在也壺所盛飲故以壺表井挈轡以令舍者轡以駕馬馬止則脫轡故懸轡令軍知所當舍也挈畚以令糧者畚以盛糧軍當給食則懸畚於當禀假之處令軍望見使來受糧於此下也軍中軍騎雜㑹歡囂號令不聞故各以物為表識也擊柝兩木相敲行夜時也易曰重門擊柝以待暴客軍之所處尤嚴故懸壺以水分漏刻所以序次更迭擊柝守備之人也代亦更也禮未大斂代哭以水守壺者為沃漏也以火守壺者夜則視刻數也分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉冬水凍漏凝不下故以火炊水沸以沃之謂沃漏也薛氏曰以火㸑鼎則使之不凝以火守壺則使之不差施之軍事所以嚴守警施之喪事所以嚴凶哀朝廷朝夕之禮亦常以是為節焉然春官雞人凡國事為期則告之時齊詩特罪挈壺氏者蓋天子備官挈壺掌漏雞人告時諸侯則掌漏告時一於挈壺氏也射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面其摯三公執璧孤執皮帛卿執羔大夫執鴈諸侯在朝則皆北面詔相其法釋曰位將射始入見君之位三公輔弼之長諸侯方伯之長故皆北面以正臣禮孤西卿大夫東面朝廷之序以右為尊士不與者此非大射選賢與祭故也以言曰詔以力曰相謂射人詔相公孤卿大夫諸侯禮儀之法也王氏曰先王於祭祀賔燕之事未嘗不射方其與諸侯行賓射之禮則國之三公孤卿大夫與焉故射人掌其位也三公北面答君也孤東面佑王也卿大夫西面佐王也其摯三公執璧則以其有君之體而不致其用也三公之摯不序於宗伯而獨見於射人者蓋三公師道也王之所承有弗敢臣也宗伯之摯不序於其職而射人以主賓射為先則三公之摯言於此亦以見賓之而弗敢臣之意也諸侯在國則有君道故南面在朝則有臣道故北面也詔相其法朝射之法也若有國事則掌其戒令詔相其事掌其治達釋曰國事謂王有祭祀㑹同之事諸侯當助其薦獻與其禮儀也戒令振肅之使無違禮也事則所當行之事也射人詔相之治達謂諸侯因與王射及助祭而有所治受而達之於王王有命又受而下之以射法治射儀王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘩五節二正射三侯皆音亦正音征犴五豆反釋曰此賓射之儀也射法者制為度數則為法射儀者見於動容則為儀下文所謂侯也獲也容也樂節也皆是也六耦者諸侯與王射而合卿大夫以為六耦射三侯者陳君舉曰王大射張三侯乃是養人主不爭之德以萬乘之尊下與諸侯羣臣射射有中否則有勝負使人主有爭勝負之意則不可故特設三侯於侯道九十弓之地一侯髙一侯其侯又廣其弓又良又有相助之者則易為中雖以優至尊乃養其不爭之德諸侯二侯亦此意獲者射必有人執旌以告獲每侯用一人其名曰獲射必有容其制如屏風一名曰乏樂以騶虞歌此詩以為樂節也三侯熊虎豹也二侯熊豹也一侯豹也犴侯以胡犬之皮飾九七五節奏樂以為射節之差張布謂之侯侯中為鵠鵠中為正正中為𣙗𣙗方六寸五正畫五采之雲氣也三正畫以朱蒼白之雲氣也二正畫以朱緑之雲氣上文不言士天子與諸侯賔射士不與也此云士犴侯則士得自行賔射不得與君賔射矣若王大射則以貍步張三侯王射則令去侯立于後以矢行告卒令取矢祭侯則為位與太史數射中佐司馬治射正釋曰貍善摶物者行則止而擬度焉其發必獲是以量侯道法之於今為半步也侯道者各以弓為度九節者九十弓七節者七十弓五節者五十弓弓之下制長六尺王射則射人令人去候所而立于後以矢行告者射人主以矢行髙下左右告于王也射畢則令當取矢者使取矢也祭侯為位者祭侯獻服不為位者為服不受獻之位也數射中者數射者中侯之算也與太史者以太史凡射事飾中舍算故也佐司馬治射正者射以不失正鵠為主司馬治之射人佐之也祭祀則贊射牲相孤卿大夫之法儀㑹同朝覲作大夫價凡有爵者大師令有爵者乘王之倅車有大賔客則作卿大夫從戒大史及大夫介大喪與僕人遷尸作卿大夫掌事比其廬不敬者苛罰之比毗志反苛音何釋曰祭祀謂郊禘之事王必親射牲示誠敬之至也而射人則贊之法儀謂射法射儀也作使也㑹同朝覲用大夫為介以相禮與士之有爵者為介則射人作而使之也倅車王之副車也大師令有爵者乘之不敢虛其位以在師中也作卿大夫從者選使從王見賓客也戒太史及大夫介者謂王有命使三公命諸侯及衣服就館賜之時則射人戒太史及大夫為介於諸公者也太史與事者以大史主協禮事故也僕人太僕也僕人與射人俱掌王之朝位也遷尸大斂之後遷於室堂作卿大夫掌事者使之各掌王喪之事也王喪親於貴者居廬則比其服之親疏貴賤也居廬而不敬者則苛而詰問之罰而究治之也服不氏掌養猛獸而教擾之凡祭祀共猛獸賔客之事則抗皮射則贊張侯以旌居乏而待獲釋曰猛獸熊羆虎豹之屬教而擾之使馴服而不摶噬也祭祀共猛獸以充膳羞也賔客來朝陳虎豹之皮畢則舉而藏之射侯張於射人則贊助之乏即容也舉旌而居於容待獲待射中而舉旌以唱獲也射鳥氏掌射鳥祭祀以弓矢驅烏鳶凡賔客㑹同軍旅亦如之射則取矢矢在侯髙則以并夾取之釋曰射鳥供膳羞其本職也祭祀主潔净驅烏鳶慮其汚穢也賓客㑹同軍旅主嚴肅驅烏鳶慮其喧聒也王射主取矢以司射鳥之事若矢著侯髙手不能及則以并夾取之并針箭具也司弓矢共并夾羅氏掌羅烏鳥蠟則作羅襦中春羅春鳥獻鳩以養國老行羽物襦汝俱反釋曰以網繫鳥謂之羅鳥謂卑居鵲屬也蠟謂臘月大祭萬物也襦與繻同網之細密者春鳥蟄而始出者鳩鷹所化者鳩同春鳥宜養老鄭氏曰蠟則作羅襦者謂十二月此時火蟄者畢矣豺既祭獸可以羅網圍取禽獸也王制曰豺祭獸然後田又曰昆蟲已蟄可以火田今俗放火張羅其遺教也獻鳩以養國老者陳氏曰天子之於老者其所養有三國老也庶老也死政之老也夫貴胄謂之國子則貴而老者謂之國老賤者謂之庶人則賤而老者謂之庶老國子與庶人之俊者同其學所以一道德國老與庶老異其養所以别分義記之所言四代養老是已而又有死政之老焉故羅氏鳩以養之者國老司徒以保息養之者庶老也司門以財養之者死政之老也若夫外饔酒正所謂耆老者總三老言之也掌畜掌養鳥而阜蕃教擾之祭祀共卯鳥歲時貢鳥物共膳獻之鳥釋曰禽鳥可食者非一種掌畜斂而養之阜猶盛也蕃蕃息也阜蕃使各遂其生教擾使各馴其性也卯鳥鵝鴨雞鶩之屬其卯可薦者以祭祀共之鳥物鳬鴈之屬以時而來者歲時貢之鶉雀鵒雉之類非一品也故於膳獻共之先王設此官以供祭祀備膳羞共器用無棄物者也亦可謂能使禽獸昆蟲各得其所者矣而豈徒哉鄭氏鍔曰先王置官欲其簡而不冗自服不氏以下或教猛獸或射飛鳥或羅或畜蓋一官可以兼數職也兹四官其事雖微然所掌者供鬼神之祭祀者有之供人君之膳羞者有之供賓客之禽獸者有之設官以備物物備而禮舉凡所以嚴國體而尊天王也孰謂冗而且濫耶周禮全經釋原卷九
