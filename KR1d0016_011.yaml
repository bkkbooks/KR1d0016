body:
  text: 周禮全經釋原卷十一明柯尚遷撰秋官上大司冦之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典詰起吉反釋曰典常也法也民失其常則立法以治之使復于常乃謂之典也苟失其常諸侯則治之以三典萬民則治之以五刑皆欲致之於中和也詰究治也新國者新造之國其民未習於教故用輕典寬其文法洪範所謂柔克也平國者已治之國其民已服其政故用中典不剛不柔洪範所謂正直也亂國者悖亂之國其民頑梗暴疾故用重典嚴其政刑明其誅罰洪範所謂剛克也夫先王以德制刑以刑輔德凡刑之所施如權衡之懸低昂隨物何嘗容心哉何氏曰三典以明刑猶三德以為治也然人君撫世酬物又不可執一焉新國固用輕典也不幸承刑政縱弛之後人有慢心若復以輕典治之是以水濟水矣必時出猛政懾服人心如諸葛亮之治蜀可也亂國固宜重典也不幸承殘虐無道之餘人無生意若復以重典治之是如火益熱矣必除其苛政使人知有生之樂如裴度之入蔡可也平國固宜用中典也然法度不修姑息為治則國勢寖微矣必修明法度振舉紀綱使臣民皆有所警懼子孫有所持循可也有天下國家者其可不審於所用哉以五刑糾萬民一曰野刑上功糾力二曰軍刑上命糾守三曰鄉刑上德糾孝四曰官刑上能糾職五曰國刑上願糾暴釋曰五刑以野軍鄉官國為序先逺而後近也上者必欲致其如此也糾者察其違於此然後刑之也故不先教之曷以刑之野刑施於田野野以農功為上而察其不致力者則刑之軍刑施於軍旅者兵以用命為上而察其不守律者則刑之鄉刑施於鄉鄉之教以成德為上而察其不致孝者則刑之孝為百行之本也官刑施於官府者官以賢能為上而察其不修職者則刑之國刑施於王國者以謹願為上而察其強暴者則刑之暴願之反也野刑如載師閭師不耕出屋粟無職出夫布之類軍刑不用命者戮于社之類鄉刑八刑糾萬民之類官刑即士師之八成國刑即小宰以宫刑憲禁于王宫是也古之刑師以五者為類必欲遵行之法列之於先然後糾其不如法而刑之禮刑表裏之義也劉氏曰以五刑糾萬民者建六典以為民極也是故六鄉分職各職於其官而建之使必行於天下範於後世者司冦之刑典也乃建事典佐王富邦國任百官生萬民者用野刑焉農耕也溝塗也隄防也井邑也宫城也百工也凡役民以作其事者以成工為上不致力為糾也則冬官之政待之而後立焉乃建政典佐王平邦國正百官均萬民者則用軍刑焉振旅也茇舍也大閲也伐國也戍疆也凡設民立政以尊國家者用命為上以不死守為糾也則夏官之政待之而後成焉乃建教典佐王安邦國教官府擾萬民者用鄉刑焉司徒以鄉八刑糾萬民是也六德也六行也六藝也五禮也凡率民以行其教而佐邦國者以成德為上以不致孝為糾也則地官之職待之而後立焉乃建治典以佐王經邦國治官府經萬民者用官刑焉六官也六屬也府史也羣吏也凡役民以立其治造國家者以賢能為上以不稱職為糾也則天官之職待之而後立焉凡建禮典佐王以和邦國統百官諧萬民者用國刑焉君臣也父子也兄弟也夫婦也朋友也祭祀也凡率民以踐其禮者以恪願為上以不致恭為糾也則春官之職待之而後立焉五者國之大典聖人皇建其極於天下以參天地而贊化育待之而成焉然非典刑之正亦莫得而成之也不曰詰邦國刑百官糾萬民乎以圜土聚教罷民凡害人者置之圜土而施職事焉以明刑恥之其能改者反於中國不齒三年其不能改而出圜土者殺罷音疲釋曰圜土獄城也聚罷民其中困苦以教之為善也民不愍作勞有似於罷害人謂邪惡已有過失麗於法者以其不故犯罪置之圜土繫教之庶其困悔而知改也置置也施職事以所能役使之明刑書其罪惡於大方版著於背以恥之所以啓其憤而思悔過遷善也其能改者俾反乎鄉里而猶不得齒於平民者三年欲其動心忍性深自懲創也司圜職曰上罪三年而舍中罪二年而舍下罪一年而舍出謂逃亡也既不能改過又遁出乎獄城則置之極刑蓋法有出圜土者殺之例也夫聚而教之者仁出而殺之者義圜土之設而先王之仁義兩存則孰不逺罪遷善哉李氏曰人之為惡豈一朝一夕必有漸也放僻邪侈之情動而無所顧忌則或伏尸市朝或流血刀鋸雖其悔之猶噬臍也是故先王之馭民必早為之所過輕者則坐諸嘉石稍重者則歸於圜土皆未入于五刑也若因茲困辱遂能自新則復為齊民何刑殺之及哉此亦使民遷善逺罪之法也孔子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也以兩造禁民訟入束矢於朝然後聽之造七報反釋曰鄭氏曰訟謂以財貨相造者造至也使訟者兩至既兩至使入束矢乃治之也不至不入束矢則是自服不直者也詩曰其直如矢古者一弓百矢束矢其百矢歟王氏曰兩造謂彼已有辨兩爭者皆至於公也訟者言於公也以兩造聽之而無所偏受則不直者自反而民訟自禁矣入束矢以明其直不直則入其矢所以懲不直不直知懲則訟何患於滋乎古之於訟謂之聽者以聽其聲為主也書曰兩造具備師聽五辭是也以兩劑禁民獄入鈞金三日乃致于朝然後聽之釋曰鄭氏曰獄謂相告以罪名者劑今劵書也使獄者各齎劵書既兩劵書使入鈞金又三日乃治之重刑也不劵書不入金亦自服不直也必入金者取其堅也三十斤曰鈞王氏曰方言於公者訟也以罪相告者獄也蓋爭而不已必至於訟訟而不已必至於獄以其至於獄也必有簡然後聽之簡劑之類也劑判書也兩劑各具獄辭之書也以兩劑聽之則無所偏信而不直者自反而民獄自禁矣入鈞金以自明其不可變然後聽之必三日而後辨者重致民於獄也書曰聽獄之兩辭記曰有旨無簡不聽是也以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之桎音質梏古毒反釋曰嘉石文石也立之外朝門左平成也成之使之善也嘉石有文欲使罷民思其文理而改悔自修也麗附也未附於法未著於法也木在足曰桎在手曰梏役諸司空坐日訖使給百工之役也王介甫曰萬民之有罪過而未麗於法而害於州里者則司救所謂邪惡也凡害人者司救所謂過失也過失不謂之罪而得罪反重於邪惡則為其已麗於法也唯其過失是以未入於刑不虧其體以圜土教之也邪惡謂之罪而得罪反輕於過失為其未麗於法也坐諸嘉石使自反焉且以恥之役諸司空則以強其罷故也州里任之則宥而舍之無任者不舍焉是乃使州里相安也先王善是法以為刑人也不虧體罰人也不虧財司空之役不可廢也與其徭平而苦之孰若役此以安州里之為利也以肺石達窮民凡逺近惸獨老幼之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長釋曰肺石赤石也窮民天民之窮而無告者無兄弟曰惸無子孫曰獨復猶報也長謂諸侯若鄉遂大夫長不肯通達窮民立於肺石三日然後聽之以觀其誠又恐其瀆也劉氏曰肺者氣之腑而外達乎皮毛惸獨老幼天民之窮無告也猶國之皮毛心之氣靡而不通也不通則疾病生焉故用之達窮民其有取於是乎立於肺石三日者審究考核得其情實然後以其辭告於上而罪其長焉正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之釋曰布刑者正嵗布之正月始縣之也蓋先王制刑欲使易避而難犯苟不顯示乎民而愚者或陷於罪從而刑之是罔民也必使民觀之者亦使其知所避而已夫刑侀也侀者成也宜無加損焉必於正月布行之者蓋先王雖原情以定罪因事以制刑亦當因時而為之變通是故每年有法度之頒焉者也凡邦之大盟約涖其盟書而登之于天府太史內史司會及六官皆受其二而藏之釋曰大盟約者謂王與諸侯因大會同而與盟所有約誓之辭涖臨也天府祖廟之藏六官六卿之官二副也夫刑一成而不可變盟要如之且違焉則刑之取也故司冦涖其盟書太史掌邦之典法則內史掌國法國令之二司會掌典法則之二皆二而藏之各以其事考焉非特備失亡而已也凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成蔽之釋曰邦典三典也有新國平國亂國之差而輕重之邦法八辟之法有議親議故議賢議能至議賓之辟此為卿大夫而設也邦成士師之八成邦汋邦賊至邦朋邦誣雖為士而設兼乎庶民也三典大司冦掌之八法小司冦掌之八成士師掌之尊卑之序也豈六典八法官成之謂哉大祭祀奉犬牲若禋祀五帝則戒之日涖誓百官戒于百族及納亨前王祭之日亦如之奉其明水火凡朝覲會同前王大喪亦如之大軍旅涖戮于社凡邦之大事使其屬蹕亨普庚反釋曰犬金畜也秋官羞之各從其類也戒之日卜之日也百官者百執事也百族者王之族姓也族姓之與于祭則重於百官矣故戒百官於庫門之內而戒百族於太廟之內所以辨親疏也百官言誓而百族言戒者百族不預於執事有預於從祭所以不聽誓而聽戒也納亨致牲也大司冦為王引導祭之日亦然明水火取於日月者水以配鬱鬯與五齊火以給㸑亨也凡朝覲會同之時行禮為王前導大喪亦然王氏曰明水火之為物潔而隂陽之精氣也所以致聖人精明之意於鬼神示也而刑官奉之以其自潔而能潔於神也弗用命戮于社軍法也司冦涖戮刑官之事也屬士師以下蹕止行人也劉氏曰邦之大事役民衆矣所以致肅也使刑官之屬蹕之則罔不肅矣小司冦之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司冦擯以敘進而問焉以衆輔志而弊謀鄉許亮反長丁丈反釋曰外朝在雉門外致萬民聚集之也詢謀也國有大政心有大疑則臨外朝集各羣臣萬民而咨謀焉國危謂兵冦交至詢所以輯寧之策也國遷謂都邑不安詢以遷徙之宜也立君謂國無冢嫡詢以孰可為宗社之主也羣臣卿大夫士也羣吏府史也當咨謀之時天子南鄉三公州長北面帥民也百姓北面答君也不言三孤從公而立也羣臣在東而西面羣吏在西而東面左右其事而已王氏曰三公鄉老也上言三公中言州長下言百姓則鄉官俱在矣詢者詢之民也擯謂揖之使前也敘次也志在王也謀在下也以衆輔志則以衆謀而輔王之志也弊謀則以衆謀為稽而斷之於王也書所謂朕志先定詢謀僉同亦若此而已矣以五刑聽萬民之獄訟附于刑用情訊之至于旬乃蔽之讀書則用法凡命夫命婦不躬坐獄訟凡王之同族有罪不即市訊音信釋曰五刑墨劓宫刖殺也聽獄訟則是非曲直能審克也能聽之然後於有罪者而麗之於法以附于刑也既得其罪附于刑矣又從而用情理以訊之冀其有可以出之者或非其心服而從者至於十日乃斷之王制曰侀者成也一成而不可變故君子盡心焉又以罪斷之書讀之於囚使知其所犯審之而弗變乃用法焉則受刑者可無憾矣其謹之如是也凡命夫命婦不躬坐獄訟者為治獄吏褻尊者也不身坐者必使其子弟代之所以養其信義也人有信義則亷恥生於其心而不復為非義也此先王所以厚風俗正人倫也王族有罪不即市磬于甸人不與國人慮兄弟也王氏曰命夫婦不躬坐獄者貴貴也王同族有罪不即市者親親也貴貴親親仁之至義之盡也以五聲聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽釋曰聽獄訟求民情以訊鞠作其言因察其視聽氣色以知其情偽故皆謂之聲焉辭聽謂觀其出言不直則煩色聽謂觀其顔色不直則赧然氣聽謂觀其氣息不直則喘耳聽謂觀聆不直則惑目聽謂觀其眸子不直則眊然然皆以辭為主辭窮而情得矣故五聲以辭為先色氣耳目次之以八辟麗邦法附刑罰一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賓之辟釋曰辟法也附麗也人之犯法有親貴勛賢之屬則議其輕重以為辟宥焉蓋卿大夫之屬也親王之親戚也故王之故知也以王之親故則不可以衆人同例賢有德者能有才者以國之賢能則不可與庸常同科功謂勛在社稷貴謂官居親近有功則或可掩過在貴則不遽辱勤則盡瘁國事者賓謂作賓王家吏之勤勞可圖後效既備三恪則待以不臣此八者不幸陷於刑罪必上請而議之不可遽行刑法也乃理之當然豈撓法哉以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聽民之所刺宥以施上服下服之刑釋曰刺殺也謂獄成而殺之者猶懼其殺之失中也是以訊問於衆以蔽之訊之於羣臣羣吏庶民皆知其情之可以刺宥然後從而施其刑所謂訊人皆曰可殺然後殺之者也其刑或上服或下服不失乎中焉上服則刑之重者下服則刑之輕者上服下服猶舜典言五刑有服吕刑言上刑適輕下服下刑適重上服同也李氏曰凡有血氣之類莫不愛其生君大夫士之於牛羊豕猶無故不殺况於人為萬物之靈父母生之拊畜長育顧復之恩至三年然後免於其懷刑之大者伏鈇鑕其次亦斷支體刻肌膚終身不息何其痛哉刑期無刑蓋不獲已苟得其情亦哀矜勿喜矧可不審以及于非辜者乎故聖人求之以五聽麗之以八議三宥以恤其非意三赦以異於全人猶恐聰有所不聞明有所不見下情有所不達議法有所不平於是有外朝之法以詢於衆焉必羣臣羣吏萬民之意同然後刑殺可不謂謹乎此孟子所謂國人皆曰可殺然後殺之意也及大比登民數自生齒以上登于天府內史司會冢宰二之以制國用上時掌反釋曰大比三年大校比而計其民數之衆寡也人生齒而體備男八月女七月而生齒皆書之於版而登于天府也人數定則賦斂可知國用乃可制耳蓋國用以賦斂制之賦斂之多寡以民數制之故也冢宰制國用而兼內史司會言之者內史執國令之二以逆會計司會以法均節邦之財用故也小祭祀奉犬牲凡禋祀五帝實鑊水納亨亦如之大賓客前王而辟后世子之喪亦如之小師涖戮凡國之大事使其屬蹕孟冬祀司民獻民數於王王拜受之以圖國用而進退之釋曰實鑊所以滌牲也納亨所以煮牲也前王而辟為王開道除姦凶也小師王不自出之師屬亦士師以下也司民星名謂軒轅角也進退猶損益也國用民衆則益民寡則損益每夫有三征故即民數可知國用也王氏曰民生自天天實有司之者先王必有以報其生養之功冬成物之時故孟冬祀司民焉方祀司民則司冦獻民數於王者以民之多寡實天降也刑之繁省致天討也王拜而受之重國本也圖制國用於司冦言之者民之輕生而觸法冒死而犯刑者以其貧而已民之貧以不知圖國用而制之故也嵗終則令羣士計獄弊訟登中于天府正嵗帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士乃宣布于四方憲刑禁乃命其屬入會乃致事釋曰羣士刑官也登中上其所斷之獄訟事實之書必於天府者以刑所以致天討且示重其書而用刑不敢不謹也令羣士則令于士師鄉士以下使之稟法故也宣布于四方邦國都鄙也憲刑禁則揭而示之使知所避也有刑必有禁所以左右刑罰而使不犯也命其屬刑官之屬也入會則計其刑之多少而入其書於司冦也嵗會餘官皆以嵗終入其書司冦獨以正嵗入之者所以謹其始也且重民命也乃致事得其屬之計乃令致之於王也士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸徇之于朝書而縣于門閭左音佐徇以後反釋曰先王之用刑罰常出於不得已其心常期於不用也故必輔之以禁欲民無犯于刑是右助刑法毋使罪麗於民也宫禁王宫官府國則王城之內野則郊野之中軍則行師之際此五禁者徇以木鐸使人共聞縣於門閭使人共見也古之禁書不可見亦因時制之要在於使民不犯而已以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙釋曰禁者止使勿為施於未然之前戒者飭其怠忽施於事為之際以五戒先之則引而道之使民無進而麗於五罰也以五戒後之使民無退而麗於五刑也誓若湯誓秦誓之類誥若康誥洛誥之類禁若遂人之田役掌其禁令糾若刑典之糾萬民憲若布憲掌憲邦之刑禁是也然誓者約束以法非特軍旅也祭祀誓戒亦誓也誥者開諭以理非特會同太祝有誥誥於廟之類禁非特田役官禁官府皆有禁也推之則糾也憲也亦若是而已掌鄉合州黨族閭比之聯與其民人之什伍使之相安相受以比追胥之事以施刑罰慶賞釋曰閭胥職曰四閭為族八閭為聯五人為伍十人為聯蓋閭比卒伍之法渙然而散則同等者各不相上下惟以聨法施之則先後大小各當其分而無相凌之患矣合者合其州黨族閭比之聨聨其居合卒伍之聨聨其人也夫聨比其居什伍其人鄉官之事也而士師掌其合之法所以使之相安相受故也上下有序故相安先後有倫故相受無事而相安相受然後有事而可以同其憂患焉此追胥逐冦伺盜之事於是乎可作矣廢事者施刑罰有功者施慶賞所以聨比之者欲其慶賞刑罰相及而已士師掌刑罰故掌合鄉之政如此云掌官中之政令察獄訟之辭以詔司冦斷獄弊訟致邦令釋曰官中政令刑官之中政事教令士師掌之以士師刑官之考也察獄訟之辭羣士上其獄訟不決之事致於士師士師察其辭之曲直以告司冦斷之弊之焉獄訟既審合於邦令則以法報於羣士也掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰嬌邦令六曰為邦盜七曰為邦朋八曰為邦誣汋止約反嬌音矯釋曰八成言士者以此刑皆治為士者之成法也大司冦曰凡庶民之獄訟以邦成弊之即此八成也此言士彼言庶民者庶民可兼士也按此即冢宰以八法治官府之官刑綱見於大司冦其目見於士師汋讀如斟酌之酌嬌讀如矯制之矯邦汋謂探聽微密斟酌為姦者邦賊謂潛謀隂結將為逆亂者邦諜謂隂為反間刺探國事者犯邦令謂故恃傲悍廢格法令者嬌邦令謂詐為王言以布于下者為邦盜謂竊取國貨以私其家者為邦朋謂結私黨以亂政者為邦誣謂造為訛言以惑衆聽者凡茲八者皆治亂之階故専以馭士其慮深矣若邦凶荒則以荒辨之法治之令移民通財糾守緩刑凡以財獄訟者正之以傅别約劑傅音附約於妙反釋曰鄭氏曰辨當為貶猶朝士之凶荒慮刑貶謂國事有所貶損作權時法也愚謂當如字荒辨之法即移民通財民可移則移之以就穀或通財移穀以賙之即梁惠王所謂河內凶則移其民於河東移其粟於河內此即古荒辨之法也糾守防冦盜也緩刑舒民心也凶年行其數事亦荒政之在刑官者耳傅謂地傅以為之保别為判書以為之合約謂書其約信劑謂官給券書以財獄訟必稽此四者然後其實偽可知也故以此正之則無敢苟簡於其始而獄訟由之而省也易之訟曰君子以作事謀始者此也若祭勝國之社稷則為之尸王燕出入則前驅而辟釋曰勝國為吾所勝之國謂先朝亡國也亡國社稷亦祭之安其神也以刑官為尸滅亡類也自治朝而退於內朝謂燕朝自燕朝而退於寢謂之燕寢燕出入凡非視朝大事出入及宫苑皆是前驅者前王而行辟者辟除行人士師為之尚嚴也祀五帝則沃尸及王盥洎鑊水凡刉珥則奉犬牲諸侯為賓則帥其屬而蹕于王宫大喪亦如之大師帥其屬而禁逆軍旅者與犯師禁者而戮之嵗終則令正要會正歲帥其屬而憲禁令于國及郊野釋曰古祀帝亦用尸尸入門以槃匜盥水則士師沃之王將獻尸必就洗以致潔則士師洎而增其鑊水以待小司冦沃王也刉珥用牲以釁也毛者曰刉羽者曰珥賓喪之禮皆以刑官蹕之致其嚴也王氏曰大小司冦使其屬弗親蹕也士師帥其屬親蹕矣大司冦蹕邦事小司冦蹕國事故士師蹕王宫而已行師而不從命令者曰逆軍旅臨陳而不用命者曰犯師禁治兵以嚴為主故帥其屬而戮之正要會定計簿也嵗終士師正之正嵗小司冦乃命其屬入會故也去國百里內為郊郊外曰野士師正嵗帥屬憲禁令亦使之無犯故也葉氏曰為政至於用刑豈聖人之得已哉詳觀司冦數官大抵恤刑之意多用刑之意少設官之意蓋以刑禁民非以刑刑民也舜告臯陶曰刑期無刑成王告康叔曰辟以止辟如必察察焉以治獄聽訟為能非王政之所尚也司冦以五刑糾萬民不施其刑而功命德能願之是尚不察其罪而守孝職恭之是糾曰尚者開其向慕也曰糾者糾其過使之歸正也初何意於用刑也八辟麗邦法其當刑固不可循情而違法其當宥又不可記過而忘功麗于法者不出于私情附于刑者實在于公議又何心于用刑乎此猶曰刑不上大夫士節不可不厲也至於萬民之有獄訟者使入束矢鈞金蓋取其辭之直與其信之堅而後聽之豈非使民無訟乎其麗于刑罰也士師以五禁左右之徇于朝又垂于門閭使之知所禁止以五戒先後之使之知所警戒此非刑期無刑乎大司冦正月垂象而使觀小司冦正嵗帥官屬而憲刑禁士師正嵗則帥屬而憲禁令布憲則正月執旌節而憲刑禁又有禁殺戮禁暴民惟恐民之陷于罪也司刺則訊羣臣訊羣吏又訊之萬民必其左右大夫與國人皆曰可刑然後刑之如吏民以為不可小則宥之大則赦之宥之則以其不識過失遺忘也赦之則以其幼弱老耄蠢愚也至於死刑之不可免也鄉則王會其期遂則王命三公會其期縣則命六卿會其期欲合衆議而免之也此正所謂辟以止辟之義也故大司冦一官雖掌邦刑也而曰掌邦禁周官亦如之焉則其設刑也固欲詰姦慝刑暴亂以格其非心也至於五刑之用豈聖人之心哉鄉士掌國中各掌其鄉之民數而糾戒之聽其獄訟察其辭辨其獄訟異其死刑之罪而要之旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺肆之三日若欲免之則王會其期釋曰六鄉之獄皆在國中而鄉士主之鄉之民數亦掌于鄉士而糾察戒飭焉所以輔佑吾民俾安于中而不至抵于刑憲也六鄉之民有獄訟則鄉士聽之察其辭之虛實辨其情之過誤其有犯死罪者有犯刑罪者或輕或重既定則殊異其文案斷罪之書以藏之又為其罪法之要辭如今之略節招情是也囚既伏罪仍至十日而無悔異乃以職事聽于外朝司冦從而審之果得其情乃就外朝斷之示無所容私也羣士司刑之官皆在者合衆官而參議焉不敢以獨見斷也各麗其法以議獄訟者羣士司刑各有所掌若司刑掌五刑之法司刺掌三赦三刺三宥之法故各麗其法也王制曰凡聽五刑之訟必原父子之親立君臣之義以權其輕重之序慎測淺深之量以别之悉其聰明致其忠愛以盡之此足以見當時之所議矣獄訟成士師受中者成罪已成定也合乎法得其情之謂中士師受其定罪合中之文辭也協合也和合善日以為刑殺之期肆陳也既殺則陳尸三日暴其罪與衆棄之且以懲乎未犯者免猶赦也期謂鄉士聽職于朝司冦聽獄之時親至外朝以八議定其取舍亦不敢以已意廢天討之公也此足以見先王之時有一獄訟所屬之士已聽之矣而司冦又聽之羣士司刑又議之士師又受之欲免其罪則又或王或三公六卿會其期凡更數人而後成蓋不敢妄加人以罪如此大祭祀大喪紀大軍旅大賓客則各掌其鄉之禁令帥其屬夾道而蹕三公若有邦事則為之前驅而辟其喪亦如之凡國有大事則戮其犯命者夾古洽反釋曰祭祀喪紀軍旅賓客六鄉皆有共焉故帥屬夾道而蹕以士官為之欲嚴肅人無敢犯也三公與王論道者若以國事至鄉則為之前驅而辟行人也大事謂軍旅田役之事若鄉衆鄉師治之而鄉士則戮其犯命者掌刑罰故也遂士掌四郊各掌其遂之民數而糾其戒令聽其獄訟察其辭辨其獄訟異其死刑之罪而要之二旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日就郊而刑殺各於其遂肆之三日若欲免之則王令三公會其期若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕六卿若有邦事則為之前驅而辟其喪亦如之凡郊有大事則戮其犯命者釋曰六遂之獄在四郊遂士主之二旬而職聽于朝去王城漸逺故其期不同焉令三公會其期者殺于鄉也聚衆庶遂士則各掌其遂之禁令戮其犯命者司刑故也六卿有事於遂則遂士為之前驅而辟行人焉餘見上縣士掌野各掌其縣之民數糾其戒令而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之三旬而職聽于朝司冦聽之斷其獄蔽其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺各就其縣肆之三日若欲免之則王命六卿會其期若邦有大役聚衆庶則各掌其縣之禁令若大夫有邦事則為之前驅而辟其喪亦如之凡野有大事則戮其犯命者釋曰郊外曰野自二百里至三百里大夫所食之采邑或公邑也三旬職聽于朝者去王城稍逺故加十日也命六卿會其期者縣士職聽之時命六卿往議之也掌禁令戮犯命皆如遂士方士掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國司冦聽其成于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中書其刑殺之成與其聽獄訟者凡都家之大事聚衆庶各掌其方之禁令以時修其縣法若嵗終則省之而誅賞焉凡都家之士所上治則主之釋曰大都在疆地小都在縣地家邑在稍地則去王城愈逺其都家之主則王之三公及王子卿大夫皆身居王朝而食采於三百里四百里五百里之內者故遂士縣士皆得以職聽于朝而方士則三月乃上獄訟于國者其主在國上於都家之主其主乃付於司冦聽其成也羣士司刑參斷之情與法相應乃麗于律法以為中然後士師受之士師又書其當刑當殺之成于案以備稽考又書其治獄之吏姓名以備反覆失實者蓋以其逺故特詳焉協日刑殺則各於其處以王命焉縣法修之者都鄙比居之法至縣而止其夫家田菜之數六畜車輦之稽皆如鄉遂不言鄉遂者大都不可耦國亦至縣鄙比居之法惟於此見之故曰以時修其縣法也嵗終又省之亦於閭里校比之事鄉士遂士掌民數之意也方士在朝都家各有士在都家之中故其所治之獄訟各上于方士主之然後上于國也李氏曰君之於民猶親之於子也親則不忍其子君焉得忍其民哉惟其不忍之心則人無有可戮罪無有可刑王欲赦固其理也然而天討有罪王者奉之以作五刑刑者非王之意也天之意也非天之意天下人之意也殺人者死而民猶有相殺傷人者刑而民猶有相傷苟以不忍而赦之則殺人者不死傷人者不刑殺傷之者無以懲其惡被殺傷者無以伸其寃此不近於帥賊而攻人者乎是故先王雖有不忍之心而不敢輒赦必於外朝與掌事者議其可否焉赦者非王赦之情可赦也否者非王不赦情不可赦也如此則民何有不服令何有不行訝士掌四方之獄訟諭罪刑于邦國凡四方之有治于士者造焉四方有亂獄則往而成之邦有賓客則與行人送逆之入於國則為之前驅而辟野亦如之居館則帥其屬而為之蹕誅戮暴客者客出入則道之有治則贊之凡邦之大事聚衆庶則讀其誓禁釋曰四方諸侯之來朝覲者有行人以掌其禮有訝士以掌其刑禮與刑不可偏廢也四方之獄訟諸侯之獄訟也諭刑罪于邦國告諸侯以麗罪及制刑之本意有治于士謂四方諸侯有獄不能斷而讞疑辨事至者先造訝士乃通之於士師也亂獄謂在外侯邦有上下相虐君臣宣淫者則往而成之聽其獄正其罪以告於王也送逆謂始來及去也以其掌四方之獄訟故賓客則與行人送逆之入於國則為之前驅而辟居館則帥其屬而為之蹕以刑官所在則人無敢犯也誅戮暴客者客國之所禮而暴之則刑之所取故誅之戮之客出入則為之道使知所往客有事治則為之贊助使事有成國有師田之事或討伐諸侯也則訝士讀其誓命之辭及五禁之法也朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉帥其屬而以鞭呼趨且辟禁慢朝錯立族談者長丁丈反罷音疲釋曰外朝在雉門之外兩觀之間王者詢衆庶羣士聽獄訟皆在於是焉小司冦掌其法朝士掌其位棘取其赤心事上無隱而能制禦于外者也槐取其黃中通理暢于四肢臣德之至也孤卿大夫臣道也比諸侯為卑故位於左侯伯子男君道也比諸臣為尊故位於右三孤六卿其位凡九諸侯列於四國其服亦九故左右皆九棘太師太傅太保其位止於三故面三槐嘉石所以平罷民之不能自強以禮然必在左者卑之而示其辱故爾肺石所以達窮民之不能自伸其情然必在右者佑之欲其伸故爾以鞭呼趨且辟執鞭以威之呼朝者使之趨呼行者使之辟所以肅朝儀也慢朝謂處班行而不肅也錯立謂班行不整者族談謂違班位而聚談者夫禁慢朝者則使之欽禁錯立則使之正禁族談則使之靜朝士掌外朝之法振肅朝儀者如此凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期內之治聽期外不聽釋曰獲亦得也謂所拾得者也人民小者未齕七嵗以下凡貨賄人民六畜至於遺失有得獲者委於聽訟之朝告於朝士而不敢私焉以待其人而反之至于旬則亦久矣於是舉之大者入於公小者歸于拾得之人士之治有期日使來於外朝職聽之以逺近節之故期內聽期外不聽亦息訟之一端也國中一旬鄉士也郊二旬遂士也野三旬縣士也都三月方士也邦國期訝士也蓋民之獄訟宜以時治苟不急又在期外亦可以已矣又况獄訟追證聨逮及於平民烏可久哉凡有責者有判書以治則聽凡民同貨財者令以國法行之犯令者刑罰之凡屬責者以其地傅而聽其辭屬音燭傅音付釋曰責者責償其所欠也判書謂凡借貸者書其數而中分之各執其一有判書可以驗其實故聽之無判書則不聽者所以養信而息訟也同貨財如今合錢興販者以國法行之謂以節傳出納之犯令者如貨不出於關者舉其貨罰其人是也二人同財一人犯令則刑罰惟施於犯令者不及其儕也凡責者有判書屬責者無判書或有單書口屬而責者則以其地相比近之人俱來乃受其辭而治之也凡盜賊軍鄉邑及家人殺之無罪凡報仇讎者書於士殺之無罪若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶釋曰軍猶攻也盜賊明聚攻剽鄉邑及家虜辱者殺越人于貨凡民罔不憝有卒伍追胥之法殺之無罪仇讎之復雖出於私情苟同國不相避必將報之不得擅殺必書於士罪昭著則殺之無罪非擅殺也慮猶圖也貶減損也王氏曰凶而至于荒札而至於喪冦而至於戎皆故之大者其所制之刑所用之財宜有異於平日故令邦國都家縣鄙慮刑貶先事而思患謂之慮慮刑則刑之加釋有趣一時之宜者慮以制之也慮貶則財省殺則紓一時之急者慮以節之也慮刑則非獨緩刑也慮貶則非特省禮也皆出於不得已也司民掌登萬民之數自生齒以上皆書於版辨其國中與其都鄙及其郊野異其男女嵗登下其死生及三年大比以萬民之數詔司冦司冦及孟冬祀司民之日獻其數於王王拜受之登於天府內史司會冢宰二之以贊王治釋曰登上也民數司於刑官者制刑本以生民且司民數則不犯刑者亦知懼此刑官之權也男八月女七月而生齒版今戶籍也國中都鄙郊野合王畿之內而辨其地之所著也異其男女知所以成夫家也下除去也每嵗之終必著其生去其死然後可以驗其實也地官冬官之所校登夫家田萊之數只及於司徒司空以詔廢置誅賞而民數則専以司民掌之三年大比則以民數之籍上司冦司民軒轅之角星也孟冬祀之以保民使繁庶也祀畢乃獻民數於王民為國之本故王拜而受之登于天府與宗廟寶共藏者民為貴社稷次之君為輕故也內史司會冢宰二之將視年之豐儉以制國用而觀其土著治否之實也贊王治觀其盈縮以考主民之吏之能否也徐幹曰民數為國之本也先王周知其萬民衆寡之數乃分九職九職既分則劬勞者可見勤惰者可聞也然事役不均未之有也事役既均故上盡其心而人竭其力國家殷富大小不匱百姓休和下無怨疾焉周禮孟冬祀司民獻民數於王王拜受之登於天府其重也如此今之為政者未之知恤也譬如無田而欲樹藝雖有農夫安能措其強力乎是以先王致六鄉六遂之法所以維持其民而為之綱目也使其鄰比相保賞罰相延及出入存亡㵴否逆順可得而知也及亂君之為政也戶口漏於國版夫家脫於聨伍避役逋逃者有之於是姦心競生而偽端並作小則竊濫大則攻劫嚴刑峻令不能救也民數者庶事之所自出也莫敢不正焉以分田里以令貢賦以制祿食以起田役以作軍旅國以建典家以立度五禮用修五刑用措其惟審民數乎司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百若司冦斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重劓魚器反刖音月釋曰民之有罪者以五刑之法麗之皆虧體肉刑也墨者刻其面以墨窒之劓者截其鼻形不完矣宫者男子去勢而為奄女子幽閉而為奚去勢者去其陽幽閉者閉其隂蓋女子去其生本則幽隂閉塞矣刖者斷其足使不能行動則惡何自施殺則死刑也亦有異焉若司冦斷獄弊訟之時則以五刑之書三千條件往辨其罪之輕重所當麗之刑而詔之如今律家所署法矣此非精於法律者不能也故特設其官焉王氏曰周禮五刑之法皆五百而吕刑墨劓之屬皆千宫之屬則三百大辟則二百者此所謂刑罰世輕世重也以刑之法詔刑罰所謂惟法惟察其審克之也而以辨罪之輕重所謂上下比罪上刑適輕下服下刑適重上服是也原曰五刑之屬凡二千五百穆王訓夏贖刑曰五刑之屬三千班固以司刑二千五百為中典吕刑三千為重典然夏刑三千而死罪二百周刑二千五百而殺罪五百則周之刑為重矣蓋刑非以屬之數而分輕重之也刑止五而已行之既久人情事變獨詳故穆王有其屬三千之云非所以為重輕之別也孔子曰五刑之屬三千蓋亦據後王之刑條為言也蓋五刑肉辟也肉辟之用虧人形體聖人誠有甚不得已焉者然亦本諸天理之極為天地立心為百世生民立命而制之也以五刑而論之人之為惡生於心必待形以運之然後其惡成焉聖人制刑辱其形所以懲其心殘其形所以制其心也然此聖人猶欲生之也至於罪大惡極天討不加人道廢矣乃殺之焉故嘉石圜土者勞苦之困辱之猶愛而教之能改則復之尚可齒於平人也至於墨劓宫刖以其終不能改也然後刑之惡心雖存不得肆矣故肉刑者天理之極人情之當至公至平之制也自二帝三王循而不廢世道之隆非後世所及者以肉刑存焉耳漢文帝感一女子之言遂廢從古帝王循守之大法豈帝王好生之德不若後世之中主臯陶伊傅周召之仁智不若漢世一女子哉以無明見逺識之智狃目前之小慈不見天地聖人之心不顧世道之害故耳噫肉刑其可廢哉司刺掌三刺三宥三赦之法以贊司冦聽獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老旄三赦曰蠢愚以此三法者求民情斷民中而施上服下服之罪然後刑殺刺七賜反忘音妄旄音耄蠢勑江反釋曰刺殺也訊而罪定則殺之訊問也掌以司冦已成之獄訟問於衆人宥寬也赦舍也贊助也人之犯罪重者有至于殺故有三刺之法其罪有被之五刑則已重加之鞭朴為已輕則宥而寬之故有三宥之法至於情之可矜而五刑疑於無罪則從而赦之故有三舍之法三刺者罪雖當死不遽殺之一則詢諸公卿大夫二則詢諸府史之卑三則詢諸國人之衆國人皆以為可殺然後施刑焉三訊則於我無憾矣又求以寬之曰豈其人之不識乎豈其人之過失乎豈其人之遺忘乎有是三者則宥以寬之也又求之於心曰其人年少而微弱也其人年老而昏耄也其人蠢愚而無知也有是三者則不止於宥而直舍之也以此三法者求民情斷民中則情盡於內辭孚於外因法以議罪因罪以施刑情重者服上刑情輕者服下刑然後刑之殺之則彼我皆無憾矣劉氏曰今律三刺之法皆存特不分職以專掌之而有審刑之官聖人之仁古今雖邈而其志同矣司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之釋曰約信也劑券書也以言語之信為文書於券也治者定也恐其相抵冒上下之差故以約治之也神約謂社稷山川所命祀者民約謂賦貢力役所供者地約謂疆界所至山川所屬也功約謂土功國功軍功民功之屬不可忘也器約謂車旗尊彝禮樂所用也摯約謂玉帛禽鳥所當執者有約以結其信有劑以固其約法已定於先則後世循守者孰敢違哉凡大約劑書於宗彝小約劑書於丹圖若有訟者則珥而辟藏其不信者服墨刑若夫亂則六官辟藏其不信者殺珥作衈藏才浪切釋曰大約劑邦國諸侯之約書於宗廟之彝器至貴至重盟諸鬼神也小約劑萬民約也書於丹圖圖書以丹為地而書其上古無紙也訟謂爭六事之約有不明不如始約而爭者辟開也藏約所藏也則開其所藏之約示之不信是踰約僭奪也服墨刑踰約之刑大亂謂所僭踰者大如并國旅泰山之類六官初受盟約之二同開藏約之書以視之有不如約則誅之也約則約於人盟則約於神司約掌其約書於初封之時司盟則掌其盟書於既封之後司盟掌盟載之法凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之釋曰盟結信而誓諸神也載為約而載諸書也凡邦國有疑而會同焉則司盟掌其結盟之載書與合盟之禮儀明神如日月山川是也北面詔之者讀載書以告之也既盟之後上其載書於天府藏其二於司盟也王氏曰夫幽則質諸鬼神而盟者神之所為也明則盡諸人而約者人之所為也盟則必約蓋非約則無以固其盟約則必盟蓋非盟則無以示其誠盟諸神約諸人所以為結信之道也盟萬民之犯命者詛其不信者亦如之凡民之有約劑者其二在司盟有獄訟者則使之盟詛凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯詛側慮反為于偽反釋曰犯命犯君教令也不信違約也凡盟皆北面詔明神大者為盟小者為詛詛咀也夫萬民之犯命者誅不信者刑何詛盟之有犯命不信以詛盟而免刑誅則人孰不從詛盟而覬免刑誅哉蓋犯命不信為人所訟無所左驗則難加刑故令其盟誓而自詛焉冀其不自欺於神耳此亦聽訟之一法也凡民之有約劑者謂與儕輩要約之事有約書者則人既收其一藏其二於司盟後有反覆而獄訟者則詣司盟啓二以合之則曲直辨矣其自相違約有獄訟者則使之盟詛不信則不敢聽此盟詛所以省獄訟也各以其地域共其牲而致焉既盟則為司盟共祈酒脯者謂使其邑閭出牲而來盟已又使出酒脯司盟為之祈明神使不信者必凶司盟之設宋之大儒皆疑以為信義不足自結而恃於鬼神末矣愚以為唯此益以信其為治世之法王道之備也蓋惟世治然後民知自愛知自愛則畏禍畏禍斯敬信神明矣今有千金之子雖使之破數百金不惜也違心而詛咀於神不肯為矣司盟之息訟非治世之事乎苟末世衰亂民身且不自保何有於神老子曰民不畏死奈何以死懼之利之所在刑殺之且不懼何有於盟乎故先儒以盟為衰世之事而王道所棄者殆未見於此矣王氏曰先王之時貴而諸侯賤而萬民皆有盟詛之法者豈徒聽於神之虛拘哉蓋世之治也人心以誠相示知欽畏於神而不敢欺慢焉先王因其有欽畏鬼神之心而因以先之則必以覆詛盟為大戮至於成俗則盟邦國之不協與萬民之犯命而詛不信者有獄訟者使之盟詛弭亂息爭豈小補哉吕刑曰民興胥漸泯泯棼棼罔中于信以覆詛盟以為苗民之罪則盟詛之設帝者之世已然矣而作記者以為詛盟不及三王不亦謬乎然事有本末本之不圖無事於末後世仁義不足以勝之欽畏不足以臨之慢神於上誣人於下區區之牲血酒脯不足以勝背誕之衆矣此君子屢盟詩人所以謂之長亂小國爭盟左氏所以知其必亡鄢陵之盟季文子曰德則不競尋盟何為武父之盟君子曰信之不繼盟無益也豈盟之不足恃哉失之本求之末此其所以滋亂也職金掌凡金玉錫石丹青之戒令受其入征者辨其物之媺惡與其數量揭而璽之入其金錫于為兵器之府入其玉石丹青于守藏之府入其要掌受士之金罰貨罰入于司兵釋曰石瑶琨之類丹丹砂也青空青也上以政取謂之征下以職供謂之貢受其入則取諸冬官所入者受其征則取諸民而官所賦斂者辨其物之美惡以知貴賤與其數量而知多寡也揭而璽之者標識其名物而封之以璽印也此蓋地征之物入于職金宜在天官今在秋官者以士之罰金在焉也金錫可以為兵器故入于稿人所謂受財于職金以齎其工是也玉石丹青非所常用者故入于玉府所謂掌金玉玩好之物是也要計書也入其總數于大府也金罰即鈞金貨罰司關所謂凡貨不出於關舉其貨罰其人是也入于司兵給治兵工直也然金亦可以作兵器貨可以市物料焉旅于上帝則共其金版饗諸侯亦如之凡國有大故而用金石則掌其令釋曰供金版者旅上帝則張氊案設皇邸邸後版屏風也以金飾之饗諸侯亦設皇邸承賓如承神也國有大事用金石則凡器械有用金石者則掌其所取之令也司厲掌盜賊之任器貨賄辨其物皆有數量賈而揭之入于司兵其奴男子入于罪𨽻女子入于舂稿凡有爵者與七十者與未齓者皆不為奴釋曰竊賄為盜強劫為賊任器者盜賊所用傷人兵器貨賄所盜得之財物也賈而揭之定其價而識之也入于司兵以充兵器之用也凡坐盜賊而為奴者男子輸于罪𨽻之官女子入于舂人稿人之官以役之有爵者不為奴貴之也七十不為奴老之也未齔不為奴慈之也毁齒謂之齔家語男子八歲毁齒女子七嵗毁齒曰未齔犬人掌犬牲凡祭祀共犬牲用牷物伏瘞亦如之凡幾珥沈辜用駹可也凡相犬牽犬者屬焉掌其政治牷音全瘞於例反幾讀為刉珥當為衈駹亡江反相息亮反釋曰色純謂之牷啓毛以告牷貴純也伏謂軷祭王出則伏犬牲以車轢之而去也瘞謂地祭曰瘞埋也幾珥士師所謂刉珥則奉犬牲是也沈辜大宗伯所謂以貍沈祭山林川澤以疈辜祭四方百物是也用駹不若用牲之為善故曰可也相犬察知善惡者以屬有賈四人也牽犬者以屬有徒十六人也掌其政令則以犬人非特祭祀之大而已凡田犬并掌故也司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒凡圜土之刑人也不虧體其罰人也不虧財釋曰罷民謂惡人不化為百姓所患苦而未入五刑者收教者拘之圜土使省愆思善是所以教之也弗使冠飾示不能以禮自飭其躬也加明刑者書其過惡於背以恥之晝則役諸司空以勞之皆欲其自怨自艾也其能改者以罪之輕重為久近之期而舍之其不能改而出圜土者殺之雖年滿得出而猶不得齒於倫類者三年所以深懲之也凡刑人必虧體罰人必虧財圜土之刑則加明刑而已異於五刑之傷肌圜土之罰則役之以事而已異於五罰之出鍰也此之謂收教欲使之改過為平人也葉氏曰禁民以刑者遏其惡於未萌道之以教者格其非於無過書曰明于五刑以弼五教又曰勿庸殺之姑惟教之是先王有以教之於其始而後禁之於其終也司諫職曰糾其德行而勸之朋友正其行而強之道藝是有以驅之於善也司救職曰凡民有邪惡過失則誅之以禮防禁而救之是又有以懲民於惡也其有邪惡者三責而後罰三罰而未恥則以嘉石坐之有過失者三責而後罰三罰而未改則以圜土納之先王始拳拳於教官之諫救而後凜凜乎刑官之誥禁况嘉石則曰平罷民圜土則曰聚教罷民此則曰收教罷民不惟教之于未犯刑之先而且教之於既犯刑之後是雖國有五刑聖人豈輕用之也哉掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪及刑殺告刑于王奉而適朝士加明梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺梏古毒反拲薑奉反釋曰凡囚凡以罪拘者梏桎拲三者拘囚之械也木其手曰拲木其項曰梏木其足曰桎三木備者重囚也輕者桎而已王之同族則拲其手有官爵者則桎其足以待斷罪及刑殺之時則告于王以今日當行刑及所刑姓名也其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟既告于王又適朝士蓋以朝士掌外朝又得以詳審焉朝士以為無可疑則加明梏於梏上書其所犯使見咸知其罪乃適市而殺之與衆棄之也凡有爵者與王之同族當殺則拲而適甸師氏以待刑殺刑于隱者親親貴貴之義不與庶人同也李氏曰先王之時雖同族雖有爵其犯法當刑與庶民無以異也法者天子所與天下共也如使同族犯之而不刑殺是為君者私其親也有爵者犯而不刑殺是為臣者私其身也君私其親臣私其身君臣自私則五刑之屬三千止為民也賞慶則貴者先得刑罰則賤者獨當上不愧於下下不平於上豈適治之道耶故王者不避親疏不異貴賤一致于法其所以不肆諸市朝而適甸師氏者為其有恥毋使人見之也文王世子曰公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也掌戮掌斬殺賊諜而摶之凡殺其親者焚之殺王之親者辜之凡殺人者踣諸市肆之三日刑盜于市凡罪之麗于法者亦如之唯王之同族與有爵者殺之于甸師氏凡軍旅田役斬殺刑戮亦如之踣皮比反釋曰賊謂隂圖不軌者諜謂為敵間探者其罪不可赦也故大者斬之小者殺之摶謂去衣磔之以示衆也殺其親者焚而燒之不存其形殺王之親者辜而磔之不全其體殺人者謀殺故殺之類僵尸於市以懲不道陳尸三日然後除之盜之罪未至於死者亦刑于市以入之其他罪犯法者亦刑之于市也王之同族與有爵既言於掌囚此復言之者掌囚待刑殺此則正殺之也軍旅田役有斬殺有刑戮其法亦如之焉墨者使守門劓者使守關宫者使守內刖者使守囿髠者使守積髠苦門反積子賜反釋曰黥者無妨於禁禦故可使守門截鼻者以貌惡逺之故可使守關宫者人道絶故可使守內以嚴內外之辨也斷足者驅較禽獸不能死守而已故可使守囿王族無宫刑惡翦其類也髠頭而已貨財積於隱處故使髠髮者守之王氏曰用刑人者刑之以償其罪也養之以全其生也使之以致其用也先王之於刑人猶其民也無所喜怒而有不全其生者彼其自取非王刑之也司𨽻掌五𨽻之法辨其物而掌其政令帥其民而摶盜賊役國中之辱事為百官積任器凡囚執人之事邦有祭祀賓客喪紀之事則役其煩辱之事掌帥四翟之𨽻使之皆服其邦之服執有邦之兵守王宫與野舍之厲禁釋曰五𨽻罪𨽻與四翟之𨽻也掌其法則役使之差等有數存焉故也辨其物則衣服兵器之屬也民謂五𨽻之民也盜賊之未獲者則司𨽻帥而摶之國中汚辱之事則司𨽻帥而役之百官任用之器亦為其民積之也凡囚執罪人之事亦使為之也服邦服以其所素安執邦兵以其所素習在內則使之守王宫在外則使守野舍之厲禁皆司𨽻帥之蓋古者天子守在四夷治教刑之既明則四夷之民莫不向風懷德故使之守內外而不以為嫌用其兵服而不以為虞也罪𨽻掌役百官府與凡有守者掌使令之小事凡封國若家牛助為牽傍其守王宫與其厲禁者如蠻𨽻之事傍步浪反釋曰百官府與有守者則罪𨽻為之役雖充其役亦掌使令之小事而已封國若家謂建諸侯立大夫也牛助封國以牛助其轉徙也在前曰牽在傍護之曰傍皆罪𨽻為送致也蠻𨽻掌役校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁釋曰蠻役使養馬各以其宜校人其徒八十人王馬千匹不足以給其役故蠻𨽻兼役其事也亦各從其便器以為守衛之備故執其國之兵陳氏曰古之宿衛王宫者不特士庶子而已有虎賁之虎士司𨽻之五𨽻虎士有卒伍而四翟之𨽻有兵國有大事則守王門舍則守王間則王之在國在野可謂嚴矣然必使四翟之𨽻者以著王之所守在四夷也或使師氏之屬帥之者著王之使武以文也四𨽻所守如蠻𨽻之事者周之時以南方為逺尤貴其來故掌四夷之官曰象胥詩曰以雅以南記曰胥鼓南則周人之意可知矣閩𨽻掌役畜養鳥而阜蕃教擾之掌子則取𨽻焉釋曰掌役畜養鳥則役於掌畜也阜蕃教擾與掌畜同事也掌子鄭氏曰王立世子置臣使掌其家事而以閩𨽻役之司𨽻言帥四翟之𨽻守王宫與野舍之厲禁則閩𨽻有守可知矣夷𨽻掌役牧人養牛馬與鳥言其守王宫者與其守厲禁者如蠻𨽻之事釋曰牧人掌牧牛馬者也夷𨽻則受役於牧人以共芻莝之事焉夷狄之人或曉鳥獸之言故春秋傳曰介葛盧聞牛鳴曰是生三犧皆用矣故貉𨽻掌與獸言貉𨽻掌役服不氏而養獸而教擾之掌與獸言其守王宫者與其守厲禁者如蠻𨽻之事釋曰獸謂熊虎兕象之屬不言阜蕃者猛獸不乳於圈檻也夷𨽻與鳥言故貉𨽻與獸言夷貉之人近於鳥獸故識其言也原曰先王之馭蠻夷也侵凌則薄伐之驅之荒服之外而已不窮追也其有慕義而來朝貢者禮而歸之而已其有或屈於勢舍其本國而來歸附者先王使之入於司𨽻每𨽻百二十人而不盡收可見矣其有材藝者如司樂作夷樂有鞮鞻氏之類使之養鳥獸養牛馬所以苦之也服其邦之服執其邦之兵不使其混而一也使之守王宫王門出則守王間無非使之以賤役貴也先王之待蠻夷意可見矣後世有獠狄願內附者加中國之衣冠命朝廷之爵秩令士大夫下之徙中國之人民以處其衆傾中國之府廩以養之致使獠蠻生心肆其技以憑凌中國宜乎中國莫能當致有邊警時聞之患也夫獠蠻之在中國也混於編氓非我族類其心必異時遇南風彼固鋭然起其故國之思為吾中華之害矣然後知先王五𨽻之意必使服其邦之服執其邦之兵作其邦之樂者為慮深矣秋官下布憲掌憲邦之刑禁正月之吉執旌節以宣布于四方而憲邦之刑禁以詰四方邦國及其都鄙達于四海凡邦之大事合衆庶則以刑禁號令釋曰布謂宣布憲謂刑憲刑以懲惡禁以輔刑故有刑必有禁刑禁之設亦使民易避而難犯耳先王懼四方之逺不能周知於是設布憲之官正月之吉執旌節帥其屬以宣布於四方而憲于民以國之刑禁使家喻戶曉而不敢犯自邦國至都鄙以達于四海無不知國法之當守也國有大事而合人民則以國之刑禁號召命令之也刑者王政之本故丁寧焉達于四海者必書其刑禁之法憲于民者達于方伯連帥使之各憲于所治布憲則執旌節以巡行四方詰其違禁令者然後刑禁可以達于四海矣禁殺戮掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之釋曰司猶察也殺戮者上之施刑於下也下以非法相殺戮及傷人見血而里閭壅不以告于有司者攘劫獄囚使不得正其罪者止遏民訟使不得直於官者如此則姦凶得以侵善良勢力得以抑窮弱民之情將鬱而不伸下之惡將長而不革禁殺戮以此四者告于司冦之屬而誅罰之是所以怙善良而佑窮弱也禁暴氏掌禁庶民之亂暴力正者矯誣犯禁者作言語而不信者以告而誅之凡國聚衆庶則戮其犯禁者以徇凡奚𨽻聚而出入者則司牧之戮其犯禁者釋曰亂謂悖於人倫暴謂虐其鄉里力正謂脅衆從已以邪為正矯誣犯禁謂矯誣罔冒犯國禁也作言語不信謂造為浮言鼓惑人心也王制曰析言破律亂名改作執左道以亂政者殺行偽而堅言偽而辨學非而博順非而澤以疑衆者殺凡此皆害於正教敗壞風俗者也故禁暴民糾之以告於司冦而誅之宜矣大衆所聚有犯禁者則戮之以徇于衆奚宫刑之女為奴者𨽻男子為奴者其聚出入有隂謀也則司以察之牧以治之亦以防其暴也故犯禁則戮之也野廬氏掌達國道路至於四畿比國郊及野之道路宿息井樹若有賓客則令守塗地之人聚柝之有相翔者誅之凡道路之舟車轚互者敘而行之柝音託轚音記釋曰達國道路至于四畿者謂循行修築使不陷絶而車馬可通于畿也凡國野之道十里有廬三十里有路室五十里有候館所以待賓客使命之往來而遺人掌其委積野廬則掌其廬自國及郊自郊及野皆有宿息井樹夜可以寢晝可以憩有井以備飲食有樹以為籓蔽所以待賓旅也守塗地之人廬傍居民也聚而擊柝所以防暴客也相翔如鳥之翔而後集相視翔玩觀伺欲為冦盜者誅之以禦姦也轚者相值而礙也互者交互不得行也舟車行於水陸偶相值而轚互阻礙則因其先後之敘以次而行勿使爭先也凡有節者及有爵者至則為之辟禁野之橫行徑踰者凡國之大事比修除道路者掌凡道禁邦之大師則令掃道路且以幾禁行作不時者不物者釋曰有節者至則欲達之而為辟尊王命也有爵者至則在所承故為之辟敬王官也橫行妄行而暴禾稼者徑踰捷出而越隄渠也皆禁之國有師田之事而修道則比校其夫役道禁道路有禁令野廬氏掌之不時謂行作失早晚之時不物謂操持非常之物幾禁之者備姦人內賊及反間蠟氏掌除胔凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師大賓客亦如之若有死於道路者則令埋而致楬焉書其日月焉縣其衣服任器于有地之官以待其人掌凡國之胔禁蠟清預反胔以賜反縣音玄釋曰胔死人骨也除者屏而埋之不令暴露於溝壑道塗也蠲潔也大祭祀所以致精神之至以交乎神明之德不以哀樂惡欲二其心又去物之可以昏憒其志意者故令州里凡不蠲之物則除之受黥劓之刑者荷梏拲之具者服衰麻之衣者則禁之不使接於耳目也大賓客如之承賓如承神也有行旅死於途者無人收斂既為斂而瘞之又削木書其日月植于瘞所使其親得以識而取之也地官閭胥里宰之屬也有衣服任器則縣之胔禁如孟春埋胔掩骼之屬蠟氏掌之也雍氏掌溝瀆澮池之禁凡害於國稼者春令為阱擭溝瀆之利於民者秋令塞阱杜擭禁山之為苑澤之沈者阱在性反擭胡化反釋曰溝瀆澮池田間蓄水者也穿地為穴以陷獸謂之阱於阱中設木以載禽獸入陷者使足不著地謂之擭春令為阱擭以農事方興恐禽獸害稼也故預為防之溝瀆防旱潦也故禁之恐防水利也皆利民也秋農事已成故令塞阱杜擭便行動恐害人畜也禁不得為苑於山使草木成長也禁不得毒餌於澤使魚鱉蕃育也此皆利民之事聖人設官司之撙節愛養之道也萍氏掌國之水禁幾酒謹酒禁川遊者釋曰國之水禁謂朝廷所用之水泉禁之不得與人民雜取尊朝廷潔水泉為賓客祭祀之用也幾酒者朝廷之酒既有酒正以下司之民間之酒其造釀之法賣買之度亦幾察之恐不如法而傷人也謹酒者無使飲酒無節至於沈湎也禁川遊無使人狎玩於深水恐至沈溺者是水禁幾酒則欲水與酒之潔清謹酒禁川遊則恐人之沈溺溺於酒猶其溺於水也王氏曰譏酒則於飲酒微察其不節者也謹酒則於用酒謹制其無度也書曰文王誥教小子有正有事無彝酒越庶國飲惟祀德將無醉所謂德將無醉以文王幾酒而庶國之飲酒者皆有節也所謂越庶國飲惟祀者以文王謹酒而庶國之用酒者皆有度也又曰羣飲汝勿佚盡拘執以歸于周豫其殺成王於酒致嚴如此而晚周之君臣乃至於沈湎淫泆天下化之良可惜哉司寤氏掌夜時以星分夜以詔夜士夜禁禦晨行者禁宵行者夜遊者釋曰此施於國中者掌夜時者掌夜漏之早晚也然漏箭之早晚升降亦有不應天時者必驗之於星焉故以星之見也為夜星之沒也為曉而詔守夜之士嚴夜禁之法焉自始夜至半曰宵日未出之時為晨星未沒而行則禦之夜已深而行則禁之夜而遊遨惑衆也故皆禁之司烜氏掌以夫遂取明火於日以鑒取明水於月以共祭祀之明齍明燭共明水凡邦之大事共墳燭庭燎中春以木鐸修火禁於國中軍旅修火禁邦若屋誅則為明竁焉夫方符反墳扶云反竁昌絹反釋曰夫遂陽遂也鑒方諸也二者皆鏡屬而其體有方圓之不同先王於天地宗廟社稷之祭以陽遂取火於日以方諸取水於月蓋欲得隂陽至精之氣以將其誠致其潔也明齍以明水為齍盛也明燭以明火照饌陳也共明水以明水為玄酒也墳大也樹於門外曰墳燭樹於庭中曰庭燎皆所以照衆為明也中春火星將出之時以木鐸修火禁謹人戒火也軍旅修火禁大衆所聚尤宜致謹故也屋誅謂不殺於市而誅於甸師氏屋舍之中所謂刑于隱者不令衆庶見也則王之同族及有爵之刑也竁為壙以埋其尸也明竁蓋揭其罪於竁上若明刑明梏焉或曰屋誅屋幽深如竁蓋土室之中司烜氏以火為明而後行誅故曰明竁以掌火也亦通條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人凡誓執鞭以趨於前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之太史曰殺誓小史曰墨釋曰執鞭所以為威趨辟走以辟除行人使之避尊者也王出入則用條狼八人趨呼使避公侯伯子男皆有之卿大夫不用者君道也誓者君將行命條狼氏執鞭以誓於衆君行貴嚴肅也君登車執鞭趨前君命之誓僕右驂乘者誓曰殺言不謹則殺罪也其次則馭車者誓之曰不謹則車裂之其所有事也大夫謂戎右節服氏皆以大夫之服蓋以從王非真大夫也關者嚴謹之意敢不嚴謹則鞭五百也師者君行師從人衆也故誓之曰敢不奉紀律鞭三百也君行則太史小史從故誓太史曰殺小史曰墨者以太史知天時君之行止皆係於太史也故謹重如此然誓雖曰自近而逺然王行則八人夾王車曰誓則同時誓而後行也誓之詞非實也言此以肅之耳修閭氏掌比國中宿互柝者與其國粥而比其追胥者而賞罰之禁徑踰者與以兵革趨行者與馳騁於國中者邦有故則令守其閭互惟執節者不幾粥音育釋曰閭有閭胥矣又設修閭之官以守閭門宿有止宿之屋有行馬之互有擊柝之柝修閭氏掌比校此三者粥養也國所遊養謂羡卒也追逐冦也胥伺盜惟田與追胥竭作則正卒羡卒偕行修閭氏比之欲其偕出也其不出者罰之能擒捕有功者賞之徑踰行不由正道踰越垣牆者持兵被甲而趨走者躍馬駕車馳騁於國中者皆不遵法度及惑衆也故皆禁之國有兵喪之故則令守其閭互以備不虞也執節者輔命而行不待幾察也冥氏掌設弧張為阱擭以攻猛獸以靈鼓驅之若得其獸則獻其皮革齒須備釋曰弧張機弩置罦之屬阱坑坎也擭機於坎也靈鼓六面鼓也鼓之使驚阱擭也須者額之須備者謂爪也攻猛獸者既為民除害又資其物以利用也庶氏掌除毒蠱以攻説禬之嘉草攻之凡驅蠱則令之比之蠱音古禬音潰釋曰蠱毒之病人非一種而下士一人者掌其方書治療之法也以攻説禬之者蠱有神用巫醫祝禁之也今百粵山谷之間有蠱有神蠱豈自古有之歟嘉草攻之者用藥草燻之草有善制其毒者其草未聞凡能驅蠱者隨其方土所宜各有能者病則用之而庶氏比其優劣焉冗氏掌攻蟄獸各以其物火之以時獻其珍異皮革釋曰蟄獸熊羆之屬有絶倫之力冬則穴處乃可攻也將攻之必先燒其所食之物以誘出之而後可得既得之則獻其珍異皮革如爪牙可備用皮革可製也翨氏掌攻猛鳥各以其物為媒而掎之以時獻其羽翮掎居綺反翮户革反釋曰猛鳥鷹隼之屬取猛鳥者或以鳩鴿誘而致之或以匹類媒而招之鳥來下則掎之謂係其足也既獲之則獻其羽翮以共用也王介甫曰攻猛獸以除人物之害焉非利其羽翮而已孟子曰鳥獸之害人者消然後人得平土而居之則正以除為主也柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剝隂木而水之若欲其化也則春秋變其水火凡攻木者掌其政令釋曰攻治也積木曰林山足曰麓草木所生林麓之地皆可宅居民稼穡故柞氏掌攻治之政刋剝互言耳皆謂斫去其皮也凡木生於山南為陽生於山北為隂夏日至陽之日也陽木以至陽之日刋而火之則不勝陽而死且不肄焉冬日至隂之日也隂木以至隂之日剝而水之則不勝其隂而死且不肄焉化欲使化而為土也變其水火者隂木至春又從而火之陽木至秋又從而水之則其孽薄於隂陽相殄之氣化而為土矣政令即刋剝之期水火之變也剃氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之掌凡殺草之政令釋曰柞氏攻木剃氏殺草皆所以為田也春如萌芽則以鎡基鋤其生而夷之夏漸長茂則以鈎鎌迫地而刈之含實曰繩秋芟其繩則實不成矣冬則以耜去其根使不復生也欲其化化為也以火燒其所芟夷之草已而水之則其土亦和美矣月令季夏燒剃行水利以殺草是也按舊本剃氏之下有硩蔟氏翦氏與庶氏相同赤犮氏蟈氏壺涿氏庭氏六官立名詭異載事不經後人附麗明甚先儒疑周禮者在此今出之置考工記之後使聖經明潔焉銜枚氏掌司囂國之大祭祀令禁無囂軍旅田役令銜枚禁􅑧呼歎嗚於國中者行歌哭於國中之道者囂五羔反􅑧音叫釋曰掌司囂者司察在朝者言語之喧譁也大祭祀貴嚴肅故令禁止無歡囂軍旅田役令銜枚枚如箸為繣以結於項不使之言語有聲也車攻詩曰之子于征有聞無聲言靜肅也聲大而急曰􅑧聲髙而緩曰呼聲嗟而怨曰歎聲悲而傷曰嗚禁􅑧呼嘆嗚及行歌哭者為其惑衆相感動也伊耆氏掌國之大祭祀共其杖咸軍旅授有爵者杖共王之齒杖咸音函釋曰咸函也所以藏杖也老臣雖杖於朝事鬼神尚敬去之有司以此函藏之既事乃授之軍旅授杖有爵者尊其爵故授杖以指揮兵衆不必老焉共王之齒杖者王以齒而賜老臣之杖伊耆共之也鄭氏曰王之所以賜老者之杖王制曰五十杖於家六十杖於鄉七十杖於國八十杖於朝按此二官銜枚禁止言語宜在秋官也伊耆所以優老也何以在秋官蓋秋者陽氣自消之時五十以後向於老矣此伊耆氏所以在此也大行人掌大賓之禮及大客之儀以親諸侯春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政時聘以結諸侯之好殷眺以除邦國之慝間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之災比毗志反好呼報反眺通弔反間去聲脤上忍反禬如字釋曰大賓謂六服之羣辟大客謂列國之孤卿禮以本言儀以文言對舉之互文也春見曰朝則圖其事之可否秋見曰覲則比其功之髙下夏見曰宗則陳其謨之是非冬見曰遇則合其慮之異同時見曰會非朝覲之常期而相見也則徵其師旅以施九伐之法殷見曰同當十二嵗王不巡狩而諸侯皆來朝也則考其制度亦如方嶽之禮既朝王命為壇於國外合諸侯而命政事焉黃氏曰諸侯平時無事王者之使相繼於道德意志慮道之使知度量法則諭之使同好惡已一於心用捨已一於事及其入王則又會而圖之收衆見以為王明合衆善以為王道以四海為一家中國為一人蓋如此耳時聘殷眺此二者王見諸侯之使臣也諸侯使大夫來聘親以禮見之禮而遣之所以結其恩好也諸侯使卿來眺天子天子以禮見之命以政禁之事所以除其惡行慝猶惡也間問歸脤賀慶致禬此四者王者使臣於諸侯之禮也間問者間嵗一問諸侯謂存省之屬諭諸侯之志者諭言語諭書名其類也脤所以交神之福以脤歸之則與諸侯共其福也諸侯有喜也賀慶以贊之所以與之同其樂諸侯有災也致禬以補之所以與之同其憂也王氏曰朝覲宗遇會同六者諸侯致勤於王者也間問歸脤賀慶致禬四者王致愛於諸侯者也諸侯以禮致其憂王者以仁致其愛尊卑之意通內外之誠達尚何疑猜間二之為患哉所以親諸侯者在是矣以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賓客上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就二車九乘介九人禮九牢其朝位賓主之間九十步立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人禮七牢朝位賓主之間七十步立當前疾擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其他皆如諸侯之禮諸子執穀璧五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人禮五牢朝位賓主之間五十步立當車衡擯者三人廟中將幣三享王禮一祼不酢饗禮五獻食禮五舉出入三積一問一勞諸男執蒲璧其他皆如諸子之禮繅音藻軹之氏反食音嗣積子賜反勞七報反信音伸釋曰九儀謂命者五公侯伯子男爵者四孤卿大夫士也凡諸侯來朝之禮曰圭璧執之以見王者也曰繅藉所以藉玉者也曰冕服著冕所服之衣也曰常所建之旌旗也斿其屬縿垂者也樊纓馬飾也以罽飾之每一處五采備焉就成二車副車也無飾者也介輔已行禮者也禮大禮饔餼也三牲備為一牢擯所使傳命相禮者也朝位謂大門外賓出車及王車出迎所立處王始立大門內交擯三辭乃乘車而迎之軹穀禾也廟中將幣謂行朝禮訖乃行三享在受命祖之廟也三享三獻也皆束帛加璧庭實王禮王以鬱鬯禮賓也鬱人和鬱鬯實彝而陳之使宗伯攝酌圭瓚而祼王既拜送爵又攝酌璋瓚而祼后又拜送爵是謂再祼賓乃酢王也九獻者王酌獻賓賓酢凡九也九舉者食禮之時九舉牲體而食畢出入五積謂在路供賓來去皆五積每積有牢禮芻薪米禾問不恙也勞苦倦乏也凡此數者諸侯之禮皆同而有隆殺之等上公九命故其禮以九為節侯伯七命故其禮以七為節子男五命故其禮以五為節前疾者轅曲中在軹之前衡之後侯伯一祼而酢者賓酢王而已后不祼也子男一祼不酢者則有禮無報卑不敢當焉七獻五獻則主於飲故以獻為節七舉五舉主於食故以舉為節此所謂名位不同禮亦異數也凡大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆眂小國之君凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之釋曰此以君命來聘者也大國之孤未誓於天子奉君命而朝則以皮帛為贄次於子男之後不交擯不使介傳辭交於王之擯親自對擯也廟中無相謂介皆入門西上而立不前相禮也以酒禮之酒謂齊酒也和之不用鬱鬯耳卿各下其君二等若公之卿以七侯伯之卿以五子男之卿以三大夫又各下卿二等士又降於大夫一等也邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢材物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寶為摯釋曰諸侯之國其道路有逺近之殊故朝見有疏數之節至其所貢物亦因其土地之宜未必某國出某物而限之也此因朝而貢乃執摯見王之禮非九貢之物也小行人春入貢是九貢之物嵗之常貢也大行人之言亦舉其槩耳父子相繼謂之世蕃國無朝見之期父死子繼及嗣王即位然後一來見其所貴寶謂其國所産貴重之物則以為摯如島夷之卉服西戎之織皮是也王氏曰自侯服嵗一見至要服六嵗一見以逺近為疏數之節也自要服以上所貢有常物而蕃國則各以所貴寶為摯者詳於治內而略於治外也郊特牲曰旅幣無方所以别土地之宜而節逺邇之期也土地之宜在物而逺邇之期在人然則六服六嵗之差六貢六物之異正所謂逺邇之期土地之宜乎成王訓迪厥官曰六年五服一朝以侯甸男采衛而言也而行人於六服之見則及於要服者其治制禮之時為已備矣其近中國之夷狄非特承德又能入貢來見焉則致禮以致太平者此其極也王之所以撫邦國諸侯者嵗遍存三嵗遍眺五嵗遍省七嵗屬象胥諭言語協辭命九嵗屬瞽史諭書名聽聲音十有一嵗達瑞節同度量成牢禮同數器修法則十有二嵗王巡狩殷國胥讀為諝釋曰撫猶安也上諸侯朝天子之事此天子撫諸侯之事一嵗者巡狩之明年為始也存者問其安否眺視其治效省察其風化也皆王遣使於諸侯之禮所謂間問也南方為象通言語之官也胥有才智者辭命六辭之命也故七嵗則以屬象胥通五方之言語達九等之辭命瞽樂師也史大史小史也故九嵗則屬瞽史達六書之名所以同其文也聽六律之音所以和其聲也瑞六瑞節六節也度丈尺也量區釡也牢禮若掌客之所職數器銓衡也法八法則八則十有一嵗王將巡狩之時則列國之瑞節度量牢禮數器法則有不一者大行人從而達同成修以齊之為明年巡狩考制度張本也十二嵗王巡狩則諸侯各朝于方嶽考禮正刑大明黜陟王不巡狩則會諸侯而殷見此皆所以撫邦國也凡諸侯之王事辨其位正其等協其禮賓而見之若有大喪則詔相諸侯之禮若有四方之大事則受其幣聽其辭凡諸侯之邦交嵗相問也殷相聘也世相朝也釋曰王事諸侯朝王之事辨其位謂九十七十五十步之位正其等謂冕服旌旗二車之類皆有等級禮饔餼饗食之禮以此禮等賓敬而見之也大喪諸侯入弔臨者齊斬之服僻踊之節必教告而相道之列國被冦戎而來告者受其贄幣而聽其告急之辭以達于王也凡諸侯之邦交謂鄰國之往來也小以事大大以比小粲然之文歡然之恩以相愛相接也各有疏數焉小聘曰問殷中也父死子立曰世凡君即位大國朝焉小國聘焉皆所以習禮考儀正刑一德以尊天子也若問聘則遣臣而已吕氏曰聘義曰天子制諸侯比年小聘三年大聘相厲以禮使者聘而誤主君弗親饗也所以愧厲之也夫上下不交則天下無邦人道所以不能羣也故先王之馭諸侯必使相交以修其好必使相敬以全其交多為之升降之文酬酢之節蓋以養其德意使之安於是而不憚也故不安於偷盜而安於行禮不恥於相下而恥於無禮則忿爭之心暴慢之氣無所從而作此天下之亂所以止之於未萌也天子以是養諸侯諸侯以是養其士大夫上下交相養此兵所以不用天下所以平也小行人掌邦國賓客之禮籍以待四方之使者令諸侯春入貢秋獻功王親受之各以其國之籍禮之凡諸侯入王則逆勞于畿及郊勞視館將幣為承而擯釋曰禮籍所載諸侯名位尊卑禮節隆殺之書也四方諸侯之使臣來按籍以待之貢天子所食列國之貢是嵗之常大國半次國三之一小國四之一是也春而入焉功考績之功也若今計文書斷於九月其舊法也曰獻者圖於春而比於秋也王親受之國之所重在此也入王入朝于王也諸侯來朝其未至則有迎勞郊勞之禮及其既至則有致館將幣之儀皆王遣公卿以示誠意之厚小行人但為承擯耳承次擯也凡四方之使者大賓則擯小客則受其幣而聽其辭使適四方協九儀賓客之禮朝覲宗遇會同君之禮也存眺省聘問臣之禮也釋曰大客則擯者擯而見之王使得自言也小客則受幣而聽辭者受其贄幣入以告王所為來之事也適之也王撫存四方遣使則受法於小行人使協九儀賓客之禮朝覲宗遇會同君禮者乃臣事君之禮存眺省聘問五者王撫臣之禮賓五客四謂之九儀達天下之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之釋曰達之者使之四方皆齎法式以齊等之也龍虎人皆以金為之金取不變之義也旌符管皆以竹為之竹有自然之節故也不言璽節則貨賄非小行人所與不言玉節角節則守邦國都鄙行人非所達邦節先門關後道路則以自內達外言之天下之節先道路後門關則自外達內言之也成六瑞王用瑱圭公用桓圭侯用信圭伯用躬圭子用穀璧男用蒲璧合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故釋曰成平也瑞信也皆朝見所執以為信合同也六幣者諸侯所用以享也諸侯之致享內盡其誠心外備其禮物而行人所以合六幣也五等諸侯享天子用璧享后用琮其大各如其瑞皆有庭實以馬若皮皮虎豹皮也用圭璋者二王之後也二王後尊故享用圭璋而特之薛氏曰言合者兩兩相配有配合之義也圭東方也以象陽之生物馬陽類也乾之所為故合以馬璋章也文明之方所用皮有文也故合璋以皮璧象天天事質故合璧以帛琮象地地事文故合琮以錦琥為虎形西方也萬寶所成繡則五采之全故合以繡半璧曰璜北方所用也隂陽之辨莫斷於此故合以黼以白為黑謂之黼故也以其通情而來則謂之好以其因事而來則謂之故行人為之合六幣焉所以和其好故不使之乖也劉氏曰九儀既正乃達六節以為門關之符乃成六瑞以通朝見之信乃合六幣以致享摯之誠然後禮樂行焉燕饗舉焉諸侯之好故出焉若國札喪則令賻補之若國凶荒則令賙委之若國師役則令稿禬之若國有福事則令慶賀之若國有禍災則令哀弔之凡此五物者治其事故釋曰天子之於諸侯同其憂樂者也此賻補賙委稿禬哀弔慶賀之禮所以掌於行人以治其事故也病曰札死曰喪則在所賻補謂以禮傳之為賻助其不足為補也穀不熟曰凶凶甚而為荒凶荒則在所賙委以利周之謂之賙以聚與之謂之委也大宗伯以喪禮哀死亡荒禮哀凶札是也有兵冦謂之師會衆以興功謂之役師役則在所稿禬犒其勞則謂之稿會衆財以與之則謂之禬大宗伯以禬禮哀圍敗以恤禮哀冦亂是也福事則在所慶賀大宗伯以賀慶之禮親異姓之國是也禍災則在所哀弔大宗伯以弔禮哀禍災是也及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命于王以周知天下之故釋曰慝惡也猶圖也行人之適四方必采其風俗美惡條録為書以報上焉所以廣天子之視聽詩皇華所謂諏謀咨詢即此是也猶後世遣直指使者巡行天下採察風俗政治美惡以報於朝以行黜陟也諸侯之政孰有利於民孰有害於民者録為一書則興除之宜在是矣禮俗也政事也教治也刑禁也諸侯所行有順逆從違録為一書則慶讓之道在是矣悖逆也暴亂也作慝也犯令也諸侯罪惡有若是者録為一書則征誅之舉在是矣札喪凶荒厄貧侯國有是者録為一書則王朝所當恤者在是矣康樂和親安平侯國有如是者録為一書則王朝所當褒賞者在是矣凡此五事者每國辨異之以為使歸反命之獻焉則王者所以周知天下之故者此也王氏曰聖人以天下為度而休戚與之同以百姓為心而憂樂與之共則天下之故可以不周知乎然四方之逺事物之變無窮而王之耳目所不及聽採所難明非行人之官巡行而辨異之有不能遍究而悉舉故為之書具五物以述其事以反命于王則先王所以同四海於一堂之上者不可謂知要乎司儀掌九儀之賓客擯相之禮以詔儀容辭令揖讓之節將合諸侯則令為壇三成宫旁一門詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓及其擯之各以其禮公於上等侯伯於中等子男於下等其將幣亦如之其禮亦如之王燕則諸侯毛釋曰出接賓曰擯入贊禮曰相以詔者以禮告王儀容所以相接辭令所以相與揖遜所以相欽會諸侯謂有事而會也為壇於國外以命事三成三重也宫為壝土以為牆其門以棘為之覲禮云諸侯覲於天子為宫方三百步四門壇十有二尋深四尺蓋壝土為壇壇外為宫每旁一門則四門矣加方明於壇上而祀焉蓋聖人身為天地之主尊為萬國之君雖能使之四時來朝不敢當其獨尊於己也故其朝于國中則帥之以奉宗廟祭祀也其會於郊外則帥之以拜日月山川也所以教尊尊也詔王儀謂王既祀方明諸侯上介皆奉其君之旗置于宫乃詔王升壇諸侯就其旗而立朝位王南鄉向明以聽天下也土揖則推手小下之庶姓無親者也時揖則平手揖之異姓則王之姻親也天揖舉手揖之同姓王之宗族也及其擯之謂擯諸侯以前王也各以其爵之尊卑為隆殺壇有三重擯公於第一重侯伯於第二重子男於第三重其將幣以享亦分三等其行祼將之禮亦然所謂上公再祼而酢是也朝享畢而燕則諸侯毛諸老者在上也老者二毛故曰毛朝事尊尊尚爵燕則親親尚齒貴貴老老之義也貴貴者禮也老老者仁也賢賢者義也爵齒德同為天下之達尊也凡諸公相為賓主國五積三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜致館亦如之致飱如致積之禮及將幣交擯三辭車逆拜辱賓車進答拜三揖三讓每門止一相及廟唯上相入賓三揖三讓登再拜授幣賓拜送幣每事如初賓亦如之及出車送三請三進再拜賓三還三辭告辟致饔餼還圭饗食致贈郊送皆如將幣之儀賓之拜禮拜饔餼拜饗食賓繼主君皆如主國之禮諸侯諸伯諸子諸男之相為賓也各以其禮相待也如諸公之儀釋曰行人所掌諸侯朝王王撫諸侯之禮司儀所掌諸侯相賓及臣交聘之禮諸公相為賓謂相朝也賓所停止則積間闊則問行道則勞皆使卿大夫致之主國始聞賓入境於其止宿則有五積以其間闊則有三問賓三辭之若不敢當也拜而受之敬主君之命也九擯陳之而已矣無所事於交擯也再勞者以道途之苦故遣使再勞也三揖者謂入門當曲當碑也拜受受其勞拜送送其使也賓至於郊則主君出郊而勞於是有交擯之禮賓主各陳九介使之傳辭也三辭不獲賓乃乘車出舍門而迎之既見則下拜迎謝其屈辱而來也於是三揖以致恭三辭以致謙然後升堂拜受其勞也主君之去賓又出車以送之主君三還辭之賓乃再拜送之也將幣賓致幣以享主君也車逆拜辱主君乘車出迎而拜謝其來辱也車進答拜賓乘車前進而答拜其迎己也相主之擯賓之介也及廟唯上相入以詔禮也授幣之授當作受主君拜受幣尊其所享也賓拜送幣致敬於所享也朝享而出主君諸賓就車每一請則車一進欲逺送之也三還三辭謂主君一請者賓亦一還一辭三辭不獲則告避也熟食曰飱生物曰餼還圭享畢而歸其玉也致贈賓去而贈以財也郊送謂主君送賓至于郊也郊送之時主君親至賓為主而主為賓矣故擯之之禮與主國同侯伯子男之相為賓客視其命數為禮之隆殺其行禮之節亦同於諸公諸公之臣相為國客則三積皆三辭拜受及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賓使者如初之儀及退拜送至館如初之儀及將幣旅擯三辭拜逆客辟三揖每門止一相及廟唯君相入三讓客登拜客三辟授幣下出每事如初之儀及禮私面私獻皆再拜稽首君答拜出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟致饔餼如勞之禮饗食還圭如將幣之儀君館客客辟介受命遂送客從拜辱於朝明日客拜禮賜遂行如入之積凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之賓使者當為擯從力用反釋曰此諸公遣其卿聘於鄰國之禮也賓至境則主國遣使致積賓至郊則主君遣大夫迎勞賓三讓而升堂聽使者傳命畢然後下堂而拜命升堂而受幣也主之勞賓用束錦賓既至則遣卿致館其辭讓拜受皆如郊勞之禮三辭者辭主君以客禮待己也主君拜迎而客辟者不敢當主君拜也及廟唯君相入者客乃臣也故其相不敢入也客登堂主君拜其至客三辟者逡巡而三退也賓既卒聘主君以禮禮之賓奉束帛請覿所謂私面私獻也問君問其君之無恙也再拜而對者敬所尊也問大夫問其大夫之無恙也對而不拜者已同列也勞客者勞其行道之勤也再拜稽首者謝主君勞己也君館客者以賓將去故就館省之也辟介受命者賓不敢當主君之命而辟則前而受命也遂送者主君拜以送客也禮賜謂乘禽君之加惠也如入之積出亦三積也侯伯子男之臣謂卿大夫士各以其爵之尊卑而為禮之隆殺其儀同也凡四方之賓客禮儀辭命餼牢賜獻以二等從其爵而上下之凡賓客送逆同禮凡諸侯之交各稱其邦而為之幣以其幣為之禮凡行人之儀不朝不夕不正其主面亦不背客釋曰禮儀見於容貌辭命見於問答餼牢禮之常也賜獻禮之加也以二等後其爵而上下之降殺以兩也送逆同禮者來則逆之有問勞之儀去則送之賻贈之禮凡列國往來之禮以邦之大小而為幣之隆殺以幣之隆殺為禮之厚薄日出為朝日入為夕主西南也客北面也為行人而擯相者視賓主所向隨機旋轉不正面主不背客也王氏曰邦國之君臣相為賓客先王設官掌其禮問勞贈送物為之數拜揖辭受事為之節此邦國之君臣所以相親也觀春秋之時一言之不酬一揖之不中而兩國為之暴兵則周官圖民禍患豈不預哉行夫掌邦國傳遽之小事媺惡而無禮者凡其使也必以旌節雖道有難而不時必達居於其國則掌行人之勞辱事焉使則介之難去聲焉如字釋曰傳遽若今時乘傳騎驛而使者也小事小禮也媺福慶也惡凶荒也無禮小使而無大禮也謂諸侯小慶弔也必以旌節為國使而行雖小事必以旌節為信也道有難謂在途有疾或他故不以時至然必達之於所往之國王命不敢廢也居於諸侯之國則凡行人煩勞汙辱之事皆掌之焉若止行人為使則為之介以行夫為行人之屬役也環人掌送逆邦國之通賓客以路節達諸四方舍則授館令聚柝有任器則令環之凡門關無幾送逆及疆釋曰通賓客以常事往來者也路節謂旌節館謂侯館令野廬氏也有任用之器則環而守之凡門關無幾者謂賓客出入環人以路節達之或曰環人自以路節出入故門關不得而幾也疆王畿四方之界賓客來則逆之去則送之至疆而止不越也象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭説焉以和親之若以時入賓則協其禮與其辭言傳之凡其出入送逆之禮節幣帛辭令而賓相之賓當為擯釋曰國使謂蕃國之臣來朝聘者傳王言而諭説者以象胥知四夷言語也和之親之使其心歡恱也入賓謂其君以世一見來朝為賓者不謂之入王者非王政所加故也夷狄之人其拜揖進退跪伏之禮不同於中國象胥教之以中國之儀用協其禮也與其辭言傳之者譯其外國之言辭傳以告于上也凡其出入迎送之禮節幣帛辭令而擯相之從來至去皆為之擯而詔侑其禮儀也凡國之大喪詔相國客之禮儀而正其位凡軍旅會同受國客幣而賓禮之凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子釋曰若其入賓而遇國之大喪則詔相其哀臨之禮儀而正其坐立之位遇有軍旅會同之事則受其幣而以賓接之凡作事謂作四夷之事也國之大事莫大於戎有戎事於四夷則命諸侯使之敵王愾焉次事則或威讓之令文告之辭施於四夷者則量其事之輕重或以卿或以大夫或以上士也若下事則事之尤小者故以庶子而已何氏曰夷狄雖在荒逺然羞愧之心好惡之情亦與中國不殊接之以禮待之以誠則相率而恱服矣不然則執干戈以犯邉境者豈其微哉凡伯不賓而有楚丘之伐駒支有對而得與于向之會孰謂夷狄可賤簡耶掌客掌四方賓客之牢禮餼獻飲食之等數與其政治王合諸侯而享禮則具十有二牢庶具百物備諸侯長十有再獻王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公視上公之禮卿視侯伯之禮大夫視子男之禮士視諸侯之卿禮庶子一視其大夫之禮釋曰四方之賓客其名位不同故其牢禮餼獻飲食之等數亦異政治王朝之典禮也王合諸侯而行饗食之禮則具十有二牢者以公侯伯子男盡在是故用王禮之數也庶羞百品莫不皆具厚其禮也上公九命作伯者用十二獻者優尊之也王十二年而巡守則列國皆朝所過之國供王之膳以牲則犢貴其誠也犢繭栗之犢與祭天同共王之百官則具百牲以多為貴也王之從臣其三公之禮比於上公其卿之禮比於侯伯其大夫之禮比於子男士之禮比於諸侯之卿庶子之禮比於諸侯之大夫隆殺之等各有所視焉凡諸侯之禮上公五積皆視飱牽三問皆修羣介行人宰史皆有牢飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十甕車皆陳車米視生牢牢十車車秉有五籔車禾視死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獸夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢牲當作腥車皆陳之客字衍文藪素口反秅音妬釋曰此以下皆諸侯相朝主國待賓之禮也視飱牽所共如飱之數牽牲以往不殺也三問皆修於其始至相問間闊則有修焉修者脯之加薑桂者也羣介行人宰史皆公所從行者也致問之始亦有牢者尊其君以及其臣也簠所以盛稻粱簋所以盛黍稷豆所以盛菹醢鉶羮器壺酒器鼎烹飪之器牲當作腥謂腥鼎也饔餼既相見致大禮也死牢已殺者也牽則生牢也十斗為斛十六斗為籔十籔為秉一秉十六斛禾四秉曰莒十莒曰稯十稯曰秅乘禽雉鴈之屬自賓始至以及歸饗燕食皆三君有故不親饗燕食則遣大夫以酬幣致君饗禮以侑幣致其食禮所以將意也上介有禽獻以其在諸侯之臣為尊故優異之也夫人致禮助君養賓也卿皆見者見于賓也膳大牢亦所以助君養賓也侯伯四積皆視飱牽再問皆修飱四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飱之陳牽三牢米百筥醯醢百甕皆陳米三十車禾四十車芻薪倍禾皆陳乘禽日七十雙殷膳太牢三饗再食再燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八籩膳太牢致饗太牢卿皆見以羔膳特牛子男三積皆視飱牽一問以修飱三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飱之陳牽二牢米八十筥醯醢八十甕皆陳米二十車禾三十車芻薪倍禾皆陳乘禽日五十雙一饗一食一燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳視致饗親見卿皆膳特牛凡諸侯之卿大夫士為國客則如其介之禮以待之釋曰侯伯之禮殺於上公子男之禮殺於侯伯夫人致禮侯伯與上公同不言食太牢則殺於公也致禮於子男殺於侯伯特言膳視致饗者夫人致膳於小國之君以致饗之禮亦不復饗也卿之膳或用太牢或用特牛亦禮之殺也子男獨言親見者大國之卿於小國之君有不造館見者見之乃致膳耳為國客謂卿大夫士特來聘問者待之之禮亦如凡介有饔飱餼以其爵等為牢禮之陳數同科也黃氏曰先王待諸侯何其至也未至也致積始至也致飱及其朝饗之後又致饔餼之大禮食之而弗愛豕交之也則有問勞逆送之示其勤愛而弗敬是以獸畜之也則有辭受拜揖之示其恭然恭敬而無實君子不可以虛拘也又况其愛之乎拜揖辭讓恭之之文也有饗焉則盡其恭之之實問勞送逆愛之之文也有燕焉則盡其愛之之實其樂無算取其歡而已其爵無算取其醉而已取脯以降奏陔以出諸侯心平而氣和相與一德以尊其上大者比其小小者事其大相朝之君相問之使旌節繼道何以致之先王為之朝禮而貴貴之教寓焉為之燕禮而老老之教寓焉為之饗禮設几而不倚所以訓其恭爵盈而不飲所以訓其儉是其所以致之之道也凡禮賓客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野在外殺禮凡賓客死致禮以喪用賓客有喪唯芻稍之受遭主國之喪不受饗食受牲禮釋曰國新新建國也荒凶無年也禍災新有兵冦水火也札喪民疫厲也在野謂野外忽遽禮物不可卒備在外禍亂出避也凡此數者禮從省約不求豐備也朝聘之賓死則主國為之具而殯之喪用饋奠之物也賓在主國聞親之喪則饗食之禮不敢受而受芻稍以給人馬者不可辭也牲當作腥主國有喪不受其熟食而受其生物者有喪不忍烹煎也掌訝掌邦國之等籍以待賓客若將有國賓客至則戒官修委積與士逆賓于疆為前驅而入及宿則令聚柝及委則致積至于國賓入館次于舍門外待事于客及將幣為前驅至于朝詔其位入復及退亦如之釋曰等籍者九儀差數之籍也有賓客則以其籍數而為隆殺之節焉戒官修委積若牛人共積牛羊人共積羊倉人共道路之穀積委人共積委之芻薪戒之使蚤正素備以給賓客之用也士訝士也聚柝令野廬氏也及委則令致積以王命致于賓也賓既就館則次于舍門之外待事于客通其所求也前驅道之以如朝也詔其位告賓以位處也入復者入告王以客至也及退亦復于王所謂賓不顧矣是也凡賓客之治令訝訝治之凡從者出則使人道之及歸送亦如之凡賓客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝凡訝者賓客至而往詔相其事而掌其治令釋曰賓客之治謂欲理國事也以告乎訝訝謂如朝而理之從者凡介以下也人其徒屬也使道賓客之從者營護之也送亦如之送至於境如其前驅聚柝待事之屬賓客之爵命不同王所使訝賓之臣以爵命皆卑一秩卑而迎尊也賓客方至則掌訝往而詔相其事治令逆送賓客之政令也掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之德意志慮使咸知王之好惡辟行之使和諸侯之好達萬民之説掌邦國之通事而結其交好以諭九稅之利九禮之親九牧之維九禁之難九伐之威辟音避釋曰節以為信幣以為禮持節與幣巡行諸侯及萬民聚居之處道説王者德之所存意之所發志之所之慮之所定使臣民皆知王之所好者德善而行之所惡者邪惡而避之又使王知諸侯之所好達萬氏之所恱則上下之情莫不通矣通事謂朝覲聘問也諭告曉也九稅之利必有九職共貢賦以盡臣職之利也九禮之親必結九儀之好以相維持也九禁之難必知九法之禁則免於患難也九伐之威必畏九伐之法則免於刑戮也皆其職通上之情使其下之必遵成下之義使其上之必庇者也王介甫曰九稅之利使知樹藝九禮之親使知分守九牧之維使知聽令九禁之難使知避禁九伐之威使知免兵於無事之時使人巡邦國而諭之折亂萌多矣不知出此而恃威讓文告征伐之施焉則非所謂圖難於其易為大於其細也愚謂九稅九禮九牧九禁其目皆見大小司馬之職掌與九伐同而今亡矣掌察闕監掌督察邦國之事者諸侯有廢法犯令者則告于王而詰之掌貨賄闕諸侯之朝聘有時幣帛之往來有數若非朝聘之期以貨賄私交者王法所禁也朝大夫掌都家之國治日朝以聽國事故以告其君長國有政令則令其朝大夫凡都家之治於國者必因其朝大夫然後聽之唯大事弗因凡都家之治有不及者則誅其朝大夫在軍旅者則誅其有司釋曰掌都家之國治謂公卿王子弟之都大夫之家凡有治於國則朝大夫掌之也日朝者日日在朝以聽受國之事故也所作謂之事所遭謂之故君謂都家之君長謂都家之吏王國之政令當行於都家者朝大夫聽而受之以告其君長而行之凡都家之治有當治於王國者必因朝大夫以達於國若事之大者則其君長當自稟命不可因朝大夫也都家之治有不及以朝大夫弗達之故則罪在所誅也在軍旅則大夫弗預焉都家司馬弗達之故也則誅其有司都家司馬也先王制朝大夫之官使都家之治因之以達於國使國之事故因之以告於都家則下之事無不上聞上之政無不下達則自國中至數百里之逺又安有壅遏蔽塞之患哉都則闕都則掌都家之八則者也太宰以八則治都鄙周禮全經釋原卷十一
