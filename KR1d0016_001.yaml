body:
  text: 周禮全經釋原卷一明柯尚遷撰天官冢宰第一天官以下法天地四時以建六官周天三百六十度六官三百六十屬冢宰言天官者總御六官奉承天道統理萬物者也冢山頂也宰主也制也言所主制者大非若他官只司一事而已取其象則曰天官立其名則曰冢宰不言司者兼總之義宗伯亦不言司者祭祀天神非人所主故也惟王建國辨方正位體國經野設官分職以為民極釋曰王三代君天下之號民所歸往之稱也建立也國王者之都也辨别也方四方也正位聽治中正之位與廟社奠置之所也體制國中民居衢路之形如人之有四體鄉閭是也經經畫郊野邱甸之制如織之有經緯井牧是也設置也官冢宰以下六官所統是也分别也授也職官所掌之事極者標準之名民之表則也今考曲禮曰臨諸侯畛於鬼神曰有天王某甫君天下曰天子朝諸侯分職授政任功曰豫一人皆王稱也司空曰日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也百物阜安乃建王國此建國也考工記曰匠人營國水地以縣置𣙗以縣視以景為規識日出之景夜考之極星以正朝夕此辨方也又曰國中九經九緯涂九軌左祖右社面朝後市此正位也司徒令民五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉此體國也司空井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同遂人又曰凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路合此數法經野備矣乃立天官冢宰掌邦治地官司徒掌邦教春官宗伯掌邦禮夏官司馬掌邦政秋官司冦掌邦刑冬官司空掌邦事宰伯四司設官也治教禮政刑事分職也此數言乃周禮之綱蓋先王制國必先分封建侯以立民主别鄉立遂以比民居井牧田野以定民業然後設官分職以維持之必制定而後建官官定而後分職職定推行之後乃作是經此蓋約其制作之本於先然後於庶職之中推言其制也故於經中取五者之制略具于此原曰極者何也中之謂也以道化言則曰皇極以法度言則曰民極皆所以使民各歸其分以協於中者也蓋王畿立而後根本定所以為民建此極也體經行而後國野正所以為民定此極也官職舉而後治教明所以為民溥此極也故極之所在蓋欲習民於尊卑等級之中而道之禮樂教化之內使其志慮不易視聽純一易直淳龎以從上令然後入則㑹其有極出則歸其有極矣先王之為天下以萬物各得其所為極至故六官各冠之以此歟乃立天官冢宰使帥其屬而掌邦治以佐王均邦國釋曰冢宰六卿之長也帥總率之也屬其屬六十也治謂經理之均者平也上下四方均齊方正無不各得其所也大曰邦小曰國通言王畿侯國也葉氏曰掌邦治與均邦國其事同也而邦治則自掌之均邦國必以佐王何也蓋宰相之權重則侵天子也厚集徒黨布列庶位政柄下移非重所致乎輕則百官侵宰相之權也更進用事惟天子意向是趨大臣始不得以天下事自任矣故直曰冢宰掌邦治則天下事無不在已而經世之志得行矣又曰以佐王則權綱常主於上所謂廢置視朝必以詔王贊王是也豈至於大重也哉治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人大音泰釋曰大宰即冢宰也變冢言大者對小宰言之也卿爵也即上大夫冢宰三公之任故命以卿古者三公無其人則以冢宰兼師保之任六卿有闕亦以三公領之小宰其佐也故二人中大夫次卿也主治一官之事惟此三人而已謂之治官宰夫以下其屬也故四人倍至下士三十二人共六十人小宰曰其屬六十即此也六官之數皆同宰夫治官之考也故為屬之首旅衆也上士中士各有所分主之事而下士則卑矣分屬衆事以治其繁故稱旅焉惟六官有之丘氏曰自下士以上得王之簡命則為王臣下文府史胥徒官長得自辟召非王臣也原曰周官三公論道經邦燮理隂陽三孤二公𢎞化寅亮天地周禮未見其職惟朝士掌外朝之法又有公孤之位何也蓋三公者師道也六卿者相道也禹以益為相湯以伊尹為相未有公孤之立也惟成王以幼沖踐祚不可無師保之教故設公孤於六卿之上成王實師之然六卿正職公孤之職也彼所謂論經𢎞寅者豈但恭默無事而已耶今觀六卿之職法天以立道本道以揆事其成相天地立極生民者靡不畢舉然未嘗拘拘于法守也六少而下則一一皆法度之守而不可有絲毫之侵紊矣則知公孤之位其爵也六卿之長其職也位職相兼治本端矣而冢宰則六卿之總也故人君惟任一相曰冢宰司徒而下皆分職以聽焉斯君臣道合治出於一矣府六人史十有二人胥十有二人徒百有二十人釋曰有藏則置府有書則置史有次序幹辦之事則置胥有號令徵召之事則置徒宰夫云府掌官契以治藏史掌官書以贊治胥掌官叙以治叙徒掌官令以徵令此皆庶人在官其長所徵役者不稱則去之無遷轉之煩無勳勞之考其祿則下士視上農食九人以此等之則府食七人史食六人胥食五人徒則役之也此庶人在官之祿也其多寡不同則量其職事之繁簡耳有官府則必設之原曰古者庶人在官為府史者無非道藝之人賢人君子或未得志亦往往出於其間所謂委吏乘田是也夫吏有祿則知自愛善其事則舉而任之不能則復之農畝司徒頒職所謂學藝服事是也祿足自養則邪念不生不誘爵祿則無外慕是以官府清平奸弊不作後世鄉差之法變為雇役又變為吏胥以胥兼史而府史失職薄其祿而重其任天下事付之無賴是教之為奸而授之具也不得已又以爵祿誘之以熟於為奸之人而使之居上臨民是肆其虐於民也可乎哉宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人釋曰環衛王宫有兩項一是公卿大夫之子弟為之分置八隅謂之八次八舍宫伯領之一項在王宫徒役為之分於八次八舍之間周列環衛分置區廬宫正領之而宫正乃掌王宫宿衛官之長宫伯中士二人下士四人府二人史二人胥二人徒二十人釋曰伯長也以其為宫官之長故曰宫伯所掌士庶子凡在版者士庶子乃公卿大夫之庶子國子之倅諸子所掌是也諸子掌王族宫伯掌宿衛二官蓋相通歟陳氏曰宫正掌凡宫中官府次舍之衆寡宫伯掌士庶子授次舍之職事則宫伯所掌皆宿衛之人宫正所掌乃八次八舍之法次其宿衛所在也舍其休沐所在也布於王宫四角四中則逺邇節而檄侯便矣士庶子非王族則功臣之世賢者之類王以其自近而衛焉則上下親而內外察矣又宫正稽其功緒糾其德行㑹其什伍而教之道藝宫伯掌其政令誅賞使之學問日進職業日修足以備顧問謹侍衛則王宫之左右前後孰非多聞直諒之士乎膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人釋曰膳之言善也今時美物曰珍膳膳夫食官之長禮記曰若公與族燕則異姓為賔膳宰為主人即此官也庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人庖扶交反賈音古釋曰庖厨也取烹炮之義必用賈人者以其主市買知物價也天子之厨亦用市買蓋國畿所貢只備其數時用之物須用市買內饔中士四人下士八人府二人史四人胥十人徒百人饔於容反釋曰饔割烹和調之稱內饔所主在內以其掌王及后世子及宗廟皆是在內之事外饔中士四人下士八人府二人史四人胥十人徒百人釋曰外饔所主在外掌外祭祀及饗耆老孤子割烹皆是在外之事饔别內外重君身也亨人下士四人府一人史二人胥五人徒五十人釋曰亨與烹同主給水火以役內外饔原曰天官之職天子修身齊家之事修身必始於飲食故宫衛之後必繼以膳饔之職焉甸師下士二人府一人史二人胥三十人徒三百人釋曰王藉千畝甸師主之帥其徒耕耨以共齍盛共蕭茅共野果所以為祭祀此皆地之所出也又帥其徒薪蒸以役內外饔之事所以不使地有遺利人有曠職也公族有罪亦刑于甸師者慮兄弟故不顯示人也獸人中士四人下士八人府二人史四人胥四人徒四十人釋曰獸人共野獸以為膳羞亦膳夫之用也漁人中士二人下士四人府二人史四人胥三十人徒三百人漁音漁釋曰漁人掌取魚以為膳羞亦膳夫之用也徒三百人以池塘囿沼多故也龞人下士四人府二人史二人徒十有六人釋曰龞人掌取互物亦膳夫之用也臘人下士四人府二人史二人徒二十人釋曰臘人掌乾肉亦膳夫之用也葉氏曰甸師掌王藉者也何以列於食官蓋先王設飲食之官雖供王膳羞而實崇祭祀之事甸師而上有膳庖饔烹之官下有獸漁龞臘之職皆有祭祀之事者也先王以禮人之禮事鬼一食而且祭其先而況粢盛之奉詎可忘其自來耶醫師上士二人下士四人府二人史二十人徒二十人釋曰醫疹脉察色以療疾者醫師衆醫之長諸醫皆統於醫師也史二十人者醫案多故也食醫中士二人釋曰王之飲食五味之宜最難和也故設食醫以調節之王氏曰易之頥君子以節飲食蓋疾病之起本於氣體之不和亦始於飲食之不節蓋飲食人之本也本得其養無物不長本失其養無物不消於無事之時而順適之有道疾病何自至哉此食醫所以設也愚謂聖人設醫皆所以治萬民之疾病未嘗立治王疾病之醫也此可見保王躬者貴於不病和飲食者貴於得宜疾醫中士八人釋曰疾醫專治內證古經雖不傳後世為其術者亦精矣瘍醫下士八人釋曰瘍瘡癰也瘍專治外證今世所謂外科也獸醫下士四人釋曰獸馬牛也先王愛人及物獸亦置醫官以治之何其仁之至也原曰醫職固不可廢而食醫獸醫皆屬醫師何也政必出于一術必世其守也食醫調王之飲食不當兼治萬民之疾病瘍醫察外證不當兼內證獸醫既已治病瘍之獸又不可以治人此職之所以不能相兼也天子調和天地大臣調和隂陽醫師調和身體故凡調和燮理之事醫師皆掌之酒正中士四人下士八人府二人史八人胥八人徒八十人釋曰酒者祭祀賔客燕饗喪紀之禮無不須焉以酒名官豈獨掌酒哉酒之所設必有膳羞百物備然後成禮故酒人以下至於冪人皆酒正之屬也故其官獨以士人為之此下七官皆以奄人女奚為之而酒正統焉政出於一也惟凌人以士為之以在外不在內也其官不統於膳夫者其禮廣也酒人奄十人女酒三十人奚三百人釋曰用女奚為酒故以奄人統之奄去勢者奚幽閉者不稱士亦府史之類先王重名器不使刑餘列於士人也女酒女人解作酒者奚給使者有三百人造酒人多也漿人奄五人女漿十有五人奚百有五十人釋曰漿人主共王六飲入于酒正女漿女之曉造漿者以飲與酒為類故次於此凌人下士二人府二人史二人胥八人徒八十人釋曰冰室曰凌春秋傳曰古者日在北陸而藏冰西陸朝覿而出之深山窮谷固隂沍寒於是乎取之王之賔食喪祭於是乎用之亦輔相燮調之一事也丘氏曰周公以此屬於酒漿之末蓋酒所以奉陽冰之用所以禦陽也一身之血氣常欲周流於天地間隂陽節宣之不至則未有不致乖戾者豈能與天地同流哉籩人奄一人女籩十人奚二十人釋曰竹豆曰籩女籩女之曉籩實者蓋四籩之實百物之産備矣其務至精至細者女人以酒漿為職則籩豆之實是其所有事者故宜以女為之禮雖無所不在而曾子則曰籩豆之事則有司存固非君子所當務觀此亦可見矣醢人奄一人女醢二十人奚四十人醢音海釋曰醢肉漿也有骨為臡無骨為醢醢人司豆實也不謂之豆而謂之醢者以豆實皆為醢也四豆之實與籩相錯亦薦羞之事故次於此女醢女之曉醢者醯人奄二人女醯二十人奚四十人醯呼西反釋曰醯醋也凡五齊七葅須醯乃成而醯醬飲食皆不可闕故立其官亦以女人為之鹽人奄二人女鹽二十人奚四十人釋曰鹽之所産有刮於地而得者有風其水而成者有熬其波出於井而為者有積於鹵而結者此其所出必於海澤之旁則既有川澤之衡取之矣此其所掌乃鬻鹽之務者也然五味非鹽不和周官不著鹽政用女為之者亦膳羞之鹽焉耳冪人奄一人女冪十人奚二十人冪莫歷反釋曰司以巾覆膳羞之物者用此以潔飲食細務也有品式存焉故立其官以次食後原曰酒之於人大矣以交神明以洽燕饗不可廢也故以祭祀言則謂之凡酒以飲食言則謂之飲酒以陳設言則謂之陳酒以獻酬言則謂之禮酒以祿養言則謂之秩酒五齊則專用於共祭四飲則專用於致養四籩四豆之實則祭祀燕享所必有也醯醬又所以和膳羞也水鹽又所以給酒禮之用也是其用相須而成禮相因而舉然皆謂之酒也故立酒正以統衆職以士人為之而設府於外其餘皆以刑餘男女為之故宫中之女雖多而職業則各有所事造飲食其大本也至於蠶桑織絍縫線之務祝史廟祧之禮善其事者令其居是職功緒有稽賞罰有糾是以盡心職業無外慕之心非若後世聚千百少艾於深宫之中妖淫愁怨而致水旱之災也宫人中士四人下士八人府二人史四人胥八人徒八十人釋曰宫中居舍官之長此下四官皆王之寢處供帳安息王身之事掌舍下士四人府二人史四人徒四十人釋曰舍行所解止處王休息之時也幕人下士一人府二人史二人徒二十人釋曰掌帷幕幄帟之事者掌次下士四人府四人史二人徒八十人釋曰次次舍也幕人共帷幕掌次則張之二職相聮而後成事原曰宫人四官所以掌王之居處亦修身之事也飲食而後居處故次於此大府下大夫二人上士四人下士八人府四人史八人賈十有六人胥八人徒八十人釋曰大府為王治藏官之長有賈者邦國都鄙之賦有物必有賈人辨之然後知其美惡貴賤也葉氏曰周官掌財固非一職而斂散出入之權大府實主之故受而入之大府也分而頒之大府也凡執事者受財用受於大府也凡邦之賦用取具焉取於大府也以大府為府官之長而司貨賄出入之權則利權不分斂散得宜而出入得以通知矣向使分掌於諸府而不專掌於一司則出財者惟以給辨為能用財者惟以濟事為功後之不繼不恤也財如何而不虧玉府上士二人中士四人府二人史二人工八人賈八人胥四人徒四十有八人釋曰此官掌王之金玉玩好兵器凡良貨賄之藏以玉為主故曰玉府有工者使攻玉也有賈者使辨寶物也此天子之內帑也鄭氏曰玉府內府所掌金玉兵器凡良貨賄一也而分為二官何哉蓋玉府所掌皆式貢餘財之所作及獸人漁人所入之物專共王玩好賜豫耳邦之大用不與焉內府所掌凡九貢九功之貨賄及諸侯所獻國珍皆公家之用以供邦之大用故不得不分為二也內府中士二人府一人史二人徒十人釋曰內府者受藏之府凡九貢九賦九功之良者皆入焉以待邦之大用若出師遷國然後出之蓋大府自有九職以待九式之用矣此則貢賦之良者可以經久故擇而入是府以備國實所謂萬民之貢以充府庫是也此與玉府略同但玉府所藏寶玉故惟王自得用之此所藏凡良貨賄故與冢宰得用之不在大府九式之內也外府中士二人府一人史二人徒十人釋曰外府掌邦布以時交易者古者交易惟貝而已至太公立九府圜法始用錢代貝或曰泉或曰布布取宣布之意泉取流行之意其實一也九賦之中亦有以布代者蓋九功多以泉代故也凡布皆入於外府者以其外府在外布可以流行交易故設此府以理財備國用也原曰大府總凡貨賄之入自置諸府以受之以備九式之用而不敢有一毫之踰越矣其諸侯萬民之貢與凡式貢之餘則頒其良者於受藏之內府頒其布於受用之外府又擇其中可寶之物以入於玉府又以司㑹總其㑹司書總其書職內量入職嵗稽出職幣斂餘與夫司裘掌皮皆隸於冢宰所謂制國用者不出此矣司㑹中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人㑹古外反釋曰㑹大計也司㑹主天下之計為計官之長此官雖主考天下之治然考財用其要也故次于此葉氏曰大府為財官長僅有下大夫二人司㑹為計官長乃有中大夫二人下大夫四人何也蓋分職以受貨賄之出入者其事易持法以較出入之虛實者其事難以㑹計之官鉤考掌財用之吏苟權不足以相制而大府反得以勢臨之又安敢較其得失姦欺也今臨之以中大夫之尊則糾察鉤考之勢得行於諸府之中而司㑹又屬之於冢宰則九式節財用嵗終制國用司㑹又不得而欺之司書上士二人中士四人府二人史四人徒八人釋曰書簿籍也司書掌記財用之數書之於簿籍實鉤考之本職內上士二人中士四人府四人史四人徒二十人釋曰職內主㑹計邦賦之入以稽實在之數司㑹分屬之官也職嵗上士四人中士八人府四人史八人徒二十人釋曰職嵗㑹計邦賦之出而以職嵗名者以制國用必於嵗之杪凡財用必㑹之於嵗終也職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人釋曰幣者財帛俱謂之幣職幣主斂官府公用所餘之財物不足則取具於大府有餘者司㑹計之出入二官有定數矣有餘者又立職幣以斂之不然寧免有司之姦欺乎司裘中士二人下士四人府二人史四人徒四十人釋曰裘以獸皮為之雖出於山虞然不在九賦之中者以九功是絲麻裘是皮褐皆可禦寒故次職幣之下掌皮下士四人府二人史四人徒四十人釋曰已製者謂之裘未製者謂之皮皮之用廣不專為裘也次於司裘以斂財也原曰司裘掌皮二官列於職幣之後者蓋天下貨賄至九貢九賦盡矣而九功則布縷之征所以為衣也皮裘則山虞所賦所以為褐也詩云無衣無褐何以卒嵗此九功之所未有九賦之所不備故特設官而繼財官之後歟內宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人釋曰內宰天子所以治內之事對大宰而言之故曰內宰后之相也古者男女不親故內小臣奄人之職皆內宰所用以通傳言語教令者也故內宰施所教於中猶師保教王子於外也原曰內宰之設王者所以立教家之法者也夫治未有無本而成故教家者治之本也士庶之家女子少時己姆教娩婉聽從至長性行和美自是宜家況以天子而統四海之大后妃之尊一念邪正之間所繫匪輕安可不汲汲教之耶文王后妃曰言告師氏言告言歸師女師也立世婦宫卿於內以為女師屬之春官而施內宰之教內有女宫女奚外有內小臣奄寺以通傳教令故內宰以下大夫為之外視大宰而內施其職又屬於大宰先王所以致重於是官者欲家齊而後國治先其本也後世則以為混男女之别故以奄人為之殊不知奄人內竪止傳內宰之令於宫卿者也而宫卿又有女宫皆刑人也以傳令於內宰又安有混男女之别乎後世以齊家之本付之奄人又無女宫幽閉之法是以宫府判隔后妃萌預政之端宦官基竊柄之禍何莫不由此也內小臣奄上士四人史四人徒八人釋曰內小臣用奄士即繼內宰之後可見奄士即為內宰通傳教令者而寺人內竪何莫而非內宰所用乎奄位止於上士亦惟四人而止耳閽人王宫每門四人囿游亦如之釋曰閽人司晨昏啓閉者也刑人墨者使守門此也囿苑囿游離宫也寺人王之正內五人釋曰寺之言侍也寺人披曰豈惟刑人此蓋刑人之奄者為之也正內路寢也內竪倍寺人之數釋曰竪童子之稱蓋奄之小者主通小事閽寺既嚴其守然後繼以內竪原曰秋官掌戮曰墨者使守門劓者使守關宫者使守宫刖者使守囿髠者使守積先王無絶人之心刑人未嘗不用也然則閽人寺人其即墨劓與宫者乎天官之屬除閽人寺人內竪之外用奄者二十九人皆不命也惟內小臣一職以其掌后服位禮命故擇奄之賢者為之四人而已為其下者不過內竪女奚為之給役耳其職卑其數寡而又近役於內宰臨之以冢宰雖有傾覆蠱惑之徒又安得騁技於其間哉九嬪釋曰嬪婦也昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之內治此其數也不列夫人於周禮者夫人之於后猶三公之於王坐而論婦禮尊於天官也不言其數曰九嬪則止九人而已世婦鄭氏曰具其名而不言數君子不苟於色有婦德者充之無則闕按昏義則二十七人春官亦有世婦則每宫卿二人下大夫四人中士八人其職又與此不同者後儒合之則所謂下大夫中士果何人也竊意天官世婦與九嬪女御為列則誠天子之妃嬪也春官世婦則專掌后宫之禮者上自王后下至內外宗皆其所教有大夫士之爵者乃女官設府於內有齒德者為之所謂女傅是也內宰自外而治內世婦自內而達外必如此法制乃備也觀其有屬有府史胥奚而內外宗次之可知矣後儒合之非也女御釋曰昏義所謂御妻也宜八十一人凡宫中所掌衣服縫線酒漿籩豆蠶績者恐亦此女御也女祝四人奚八人女祝之善辭令能通神明知禱祠之事者故設之宫中俾無外求焉夫最易惑人莫如巫祝然亦人心之不容己者一切廢之則必求之外濁亂宫闈由是始也故先王立之宫中而設其職則神人兩得其當矣奚者幽閉之女也男去勢為奄女幽閉為奚幽者隂也閉者塞也女子去其生本則幽閉矣凡言奚者倣此女史八人奚十六人釋曰女史掌禮者也猶太史之於王執彤筆以書起居故後宫懼而修德李氏曰自九嬪至女史皆屬天官先王之意深矣彼女子而當至尊幽居九重則驕蹇自恣無所不至是故使之分職於內而附屬於外有職則當奉其法有屬則必考其功奉法則不敢不謹考功則不敢不勤舉宫中之人而知所勸勉者官有其長之效也而況內宰亦用大夫士春官世婦每宫卿二人及大夫士之職皆分命賢者以參預內事與婢妾賤人自相使令而無畏忌者不可同年語矣以天子所御而服官政從官長則天子既無私人羣臣焉得不公庶務焉得不平無偏無黨王道蕩蕩此之謂也典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人釋曰典婦功者主宫嬪絲枲功官之長有賈者欲以辨絲枲之美惡貴賤有工者欲先治法式以授嬪婦也典婦功以下三官設府於外悉用士人先儒以為此人主奢侈之原國家利害所關非士大夫為之則害國政必矣不得不與內官相關通如女祝女史內司服縫人則悉可用內人耳典絲下士二人府二人史二人賈四人徒十有四人釋曰絲出於蠶繭所以為繒帛典之欲以授嬪婦也典枲下士二人府二人史二十人徒二十人釋曰枲出於種植所以為布典絲枲者授女功而治之典婦功者功既成而獻之皆主婦人之事故在此內司服奄一人女御二人奚八人釋曰內司服司后服也而九嬪世婦亦必共之焉自此以下皆掌衣服之官惟內司服與縫人近后故用奄士為之女御者以衣服進或當於王廣其禮使無色過也縫人奄工八人女御八人女工八十人奚三十人釋曰女御統率之而已女工則專為縫線之事故用八十人焉染人下士二人府二人史二人徒二十人追師下士二人府一人史二人工二人徒四人釋曰追治玉石之名詩曰追琢其章掌為王后之首服者屨人下士二人府一人史一人工八人徒四人釋曰掌造王及后之屨者首服在上尊故追師辨師王與后之服分掌之屨舄在下卑故男子婦人同於屨人掌之夏采下士四人史一人徒四人釋曰掌服之官不常置以衣服之類故附於末鄭氏曰天子理陽道后治隂德風化並行故贊治之官皆曰宰內宰屬大宰者以其治家之道亦多權衡審訂於大臣格心之所自出歟今考內宰下大夫二人命士十二人自內小臣奄宦凡將命灑掃之人自九嬪至女御祝史凡內官自典婦功織絍衣服凡掌內之事皆屬焉而隸於大宰蓋女寵近習所以移人主之德者大臣總之無敢踰節皇父作相膳夫內史皆不得其人巷伯之雅寺人為之雖奄官亦遴其選晉侯近女感疾醫和以為趙孟之過古人致君二南之化其道由此按周禮首惟王建國至民極二十字六官皆有之乃周禮之綱也辨方正位建國事也體國經野鄉遂井牧事也自乃立天官至夏采設官事也太宰之職以下分職事也自不可混後儒析設官之事冠於各職之首違大綱矣故依古本正之六官皆然周禮全經釋原卷一
