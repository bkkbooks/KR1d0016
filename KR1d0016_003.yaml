body:
  text: 周禮全經釋原卷三明柯尚遷撰天官下膳夫掌王之食飲膳羞以養王及后世子凡王之饋食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋食音嗣釋曰人君以一身為天下萬姓之主宗廟社稷之所關飲食其大本也故膳夫次宫伯食飯也飲酒漿也膳牲肉也羞有滋味者凡養之具大略有四者后配王以治內也世子天下之本也故用其養王者以養之進食於尊者曰饋此饋之盛者王舉之饌也六榖稻黍稷粱麥苽六牲馬牛羊豕犬雞六清水漿醴凉醬酏也羞出於牲及禽獸以備滋味謂之庶羞也八珍謂淳熬淳母炮豚炮牂搗珍漬熬肝膋也醬醯醢也王舉則醢人共醢六十罋以五韲七醢七葅三臡實之醯人共虀葅醢物六十罋王日一舉鼎十有二物皆有爼以樂侑食膳夫授祭品嘗食王乃食卒食以樂徹于造王齊日三舉大喪則不舉大荒則不舉大札則不舉天地有烖則不舉邦有大故則不舉札側八反齊側皆反釋曰殺牲盛饌曰舉王日一舉以朝食也后與王同庖鼎十有二牢鼎九陪鼎三物謂牢鼎之實亦九爼侑勸也王之食也以禮其侑食也以樂禮樂所以養之也王將食必祭膳夫授所祭之物品嘗食者每物皆嘗之王乃食故物必祭思報始也品必嘗謹於微也膳夫行之就養有方也卒食食畢也徹收也造故處也徹食必以樂和其終也夫人之養也心志和而後氣體從焉食飲膳羞所以養氣體也侑徹以樂所以和平其心而助氣體之養也齊謂散齊致齊也齊必變食致潔其氣體去酒去葷以致精明之至也齊時加二舉謂三食皆變常食非殺牲盛饌之謂也大喪死亡也大荒凶年也大札疫癘也大烖日月晦蝕為天烖山川崩動為地烖大故寇戎也凡此皆不舉以自貶損也所謂憂以天下也王燕食則奉膳贊祭凡王祭祀賓客食則徹王之胙爼凡王之稍事設薦脯醢王燕飲酒則為獻主胙音祚釋曰燕食謂日中與夕食也奉進也贊助也燕食不如朝舉之盛故不預整列而膳夫奉之不先授祭物而膳夫贊之祭餘謂之胙胙爼祭餘之爼也祭祀則有尸酢王之爼賓客則有祭先之爼膳夫既授祭及卒食又徹胙爼重祭故也稍事小事而飲酒稍則禮之略也故設薦脯醢而已脯醢臘人醢人所共者特設之薦之而已餘則使其屬焉燕謂王燕羣臣嘉賓也主人當獻賓則膳夫代王為主以君不敵臣也楊子曰禮受爵於君前則降而再拜燕所以待羣臣嘉賓也而使之有升降揖遜之勞是以犬馬畜之矣故以膳夫為主而王不自獻焉此孟子所謂養君子之道也掌后及世子之膳羞凡肉修之頒賜皆掌之凡祭祀之致福者受而膳之以摯見者亦如之嵗終則㑹唯王及后世子之膳不㑹釋曰上言奉王之膳羞此言掌后世子之膳羞故膳夫之於后世子也亦主其饌之數不饋之耳肉加薑桂煆治曰修無薑桂以鹽乾之曰脯王以肉修頒賜羣臣亦膳夫掌之也致福者諸臣祭祀致胙於王謂之致福膳夫受以共王膳卿大夫士以羔鴈雉為摯見者亦受之以給王膳是故養后世子頒賜羣臣膳夫主其出致胙受摯膳夫主其入膳夫者飲食之概量也㑹計也謂計度多少也嵗終則㑹者謂頒賜羣臣燕飲賓客㑹其出致福與摯㑹其入其他皆㑹之是無所不㑹矣惟王及后世子之膳不㑹者當享天下之養豈可使有司限制之耶然惟王后世子一身而已其餘皆㑹也後世不考嵗終則㑹之文而曰凡王后世子之侈用皆不㑹是蕩然無紀也是故觀王后世子不㑹之文可以見至尊制法之禮觀嵗終則㑹之文可以見有司守法之義庖人掌共六畜六獸六禽辨其名物凡其死生鮮薧之物以共王之膳與其薦羞之物及后世子之膳羞共祭祀之好羞共喪紀之庶羞賓客之禽獻鮮音鮮薧音稿釋曰庖掌庖厨者六畜即六牲養之曰畜用之曰牲六獸麋鹿狼麕野豕兔也六禽鴈鶉雉鳩鴿鷃也凡鳥未孕曰禽辨其名物者凡畜禽獸皆有名號物色故皆辨之凡計數也鮮生肉也薧乾肉也備品物曰薦薦羞者羞出於牲非常御之物時乎薦進也膳羞者常羞也好羞非常之物禮器曰四海九州之美物莫不咸在示盡物也王氏曰若文王之菖蒲曽晢之羊棗先王先后平生所好者祭祀因而修之事死如事生之心也故曰好羞喪紀喪中之祭虞祔之屬庶衆也賓客禽獻燕饗好賜所用之禽獻謂獻禽於賓客凡令禽獻以法受之其出入亦如之凡用禽獻春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鮮羽膳膏羶歲終則㑹唯王及后之膳禽不㑹腒音渠鱐音搜臊音騷麛音迷羶書然反釋曰令令獸人也法受之必書其所獻之物與其數也出謂出以授賓入謂入以待用出入有定式依而授之用禽謂煎和之以獻王行猶用也羔豚羊豕之小者方春而肥牛脂曰膏香腒乾雉鱐乾魚夏物易腐用乾犬脂曰膏臊犢麛秋肥雞脂曰膏腥鮮羽飛潛之物冬肥羊脂曰膏羶如春宜食羔豚則煎之以牛膏夏宜食腒鱐則煎之以犬膏秋宜食犢麛則和之以雞膏冬宜食鮮羽則和之以羊膏王者之養必順其節煎和之味各有所宜此庖人獻禽之法也王氏曰膳夫云王及后世子之膳不㑹庖人只不㑹王及后是世子之膳禽則㑹矣曰膳常禮也膳禽非常禮也不㑹者所以重其為天下之本㑹者所以正其為天下之本也唯王及后之服不㑹是世子之服則㑹也㑹其禽則無禽荒之失㑹其酒則無酒荒之失㑹其服則無好潔其衣服之失矣周公之待世子所以杜其奢侈之心如此內饔掌王及后世子膳羞之割亨煎和之事辨體名肉物辨百品味之物王舉則陳其鼎爼以牲體實之選百羞醬物珍物以俟饋共后及世子之膳羞亨普庚反釋曰饔調和熱食也割肆解肉也亨煮也煎和則濟以五味調和之體名謂脊肩臂臑之屬肉物謂殽胾燔炙之屬百品味庶羞之屬言百者舉成數也陳設也取於鑊以實鼎取於鼎以實爼百羞庶羞百二十也醬物二十罋也珍物八珍也凡此內饔先進食之時選擇其中御者以俟膳夫之饋王也后世子不言饋只共之者殺於王也辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲視而交睫腥馬黑脊而般臂螻庮音由泠音零毳昌鋭反皫芳表反貍音鬱睫音接般音班釋曰內饔辨腥臊羶香之物可食者則共之不可食者則去之凡以謹於奉至尊也則隂陽偏勝之氣不能干而四體賴以安矣牛之夜鳴者其肉必庮臭羊之毛本稀泠而毛端毳結者其肉羶氣犬股裏無毛謂之赤股而狂躁其肉雖臊而不可食皫色變而無潤澤也沙嘶也鳴聲細而踈散則氣鬱塞而不泄其臭惡矣盲有目而視不明交睫目睫毛交也豕如此其肉必腥腥讀為星肉中生小息肉如米者也般臂前脛毛班也螻蛄也馬黑脊而文班旋則其臭如螻蛄不可食矣此皆腥臊羶香之不可食者故內饔辨之古人色惡不食臭惡不食所以養其志氣者必以正也凡宗廟之祭祀掌割亨之事凡燕飲食亦如之凡掌共羞修刑膴胖骨鱐以待共膳凡王之好賜肉修則饔人共之膴火姑反胖普半反好去聲釋曰凡宗廟祭祀時祭月祭皆在其中云割亨不言煎和者煎和所以致味鬼神不貴䙝味故也掌共共當為具羞庶羞也修煆脯也刑鉶羹也膴䐑肉大臠所以祭也胖半體骨體之連骨者鱐乾魚以待珍膳好賜王所善而賜之饔人內饔之屬蓋言掌共則內饔自掌以待共膳饔人共之則别有掌者以待外饔掌外祭祀之割亨共其脯修刑膴陳其鼎俎實之牲體魚臘凡賔客之飱饔饗食之事亦如之邦饗耆老孤子則掌其割亨之事饗士庶子亦如之師役則掌共其獻賜脯肉之事凡小喪紀陳其鼎俎而實之食音嗣釋曰外祭祀謂天地四望山川社稷外神皆掌其割亨兼言魚臘以羣小祀不用牲也飱客始至之禮饔既將幣之禮饗以酒為主食以飯為主行人所謂饗禮九獻食禮九舉是也皆外饔陳之饗耆老有國老有庶老禮有三老焉有五更焉天下有無父矣欲為人子不可得也無兄矣欲為人弟不可得也是以父事三老所以教天下之為人子者也兄事五更所以教天下之為人弟者也孤子死王事者之子也士庶子衛王宫者亦皆有饗食之禮師役出師征伐及巡守田役也獻以飲之賜以豫之脯肉以勞之詩有出車杕杜此勞師役之詞也小喪死王事者及有功者與大夫以下之喪亦有奠祭於王之禮故外饔陳鼎俎而實之亨人掌共鼎鑊以給水火之齊職外內饔之爨亨煮辨膳羞之物祭祀共太羮鉶羮賓客亦如之齊才細反釋曰亨人主給水火為外內饔亨煮者鑊所以煮之鼎所以和之齊水火適均之節膳羞之物亨人辨之以其職調亨之節也祭祀饗賓皆有太羹鉶羹亨人共之劉氏曰六牲之肉汁不和以味者謂之太羹牛則用藿羊用苦豕用薇而用陪鼎調以五味盛於鉶器謂之鉶羹孝子愛於親以德不以味也故其祭也始不忘乎古所以追崇其德也終必備物所以竭其誠也甸師掌帥其屬而耕耨王藉以時入之以共齍盛耨乃豆反齍音資釋曰甸師主藉田者以其共野物給薪蒸茅蕭給亨人之用者故次之其屬府史胥徒也耨耘耔也天子祭田謂之藉以其借民力治之也王以孟春耕帝藉天子三推三公五推諸侯九推庶人終於千畝即徒三百人也以時入之者麥則夏熟黍稷秋熟送入地官神倉六榖曰粢在器曰盛粢稷榖者六榖稷為長是以名云劉氏曰聖人貴為天子富有四海非於祭祀不能備物而必躬耕以共粢盛者事親聖人之志也道為人之所尊富貴皆外物也豈足以奪其志哉必躬身為之使天下知所以事其親焉夫志遂於已而誠及於先者孝子之能事也又况使天下孝於其親此聖人所以務為百政之先而竭其誠盡其禮者也祭祀共蕭茅共野果蓏之薦喪事代王受眚烖王之同姓有罪則死刑焉帥其徒以薪蒸役內外饔之事釋曰蕭香蒿合黍稷與稻既奠熱之使臭達墻屋茅用以縮酒束茅立之祭前沃酒其上若神飲之野果桃李之屬蓏瓜瓞之屬共茅蕭與果蓏者不使地有遺利亦所以致誠於祭祀以其地之所出也受眚烖丘氏曰國有大變毋乃粢盛不蠲與鬼神弗享與夫何使至於斯新王在疚欲請命神祗受譴罰不可得也乃使大祝作禱辭授甸師以禱藉田之神受眚災弭後殃焉非謂使甸師受眚於己也同姓有罪當刑者斷其獄於甸師氏死與刑為二等重罪則死罄於甸人輕罪則致刑於甸人必刑於隱不刑於市不與國人慮兄弟也役給役也木大曰薪細曰蒸耕耨之暇則帥其徒三百人使之薪蒸果蓏蕭茅以供爨饔之用焉蓋其徒皆給食公家者故役之如此獸人掌罟田獸辨其名物冬獻狼夏獻麋春秋獻獸物時田則守罟及弊田令禽注於虞中凡祭祀喪紀賔客共其死獸生獸凡獸入于臘人皮毛筋角入于玉府凡田獸者掌其政令罟音古注之樹反釋曰罟網也以網搏取所田之獸四時田獵春用火夏用車秋用羅冬用徒四時各以一為主辨名物者辨百獸之名與其物也冬成物之時狼殘物之尤者夏田稼之時麋害稼之衆也春秋書冬麋以此各於其尤害物之時罟而獻之獸物朱子詩傳作鹿豕大抵各獸不可食者莫可紀故總言獸物守罟備獸觸罟也弊仆也弊而田止田止則虞人致旌旗於田處之中央注猶聚也獸人則令所田之衆輸其所得獸聚於旌旗之下大獸公之小獸私之也為用鮮故共生獸為給常用故共死獸入于臘人乾之以為脯也其皮毛筋骨入於玉府者將以制器用也獸人司獸故凡田獵取禽獸者所有政令獸人掌之以其知田獵之法故也夫無事不田曰不敬田不以禮曰暴天物故田者一為乾豆二為賓客三充君之庖書曰疇若於上下草木鳥獸禮曰斷一木殺一獸不以其時非孝也獸人之職宜以是觀之漁人掌以時漁為梁春獻王鮪辨魚物為鮮薧以共王膳羞凡祭祀賓客喪紀共其魚之鮮薧凡漁者掌其政令凡漁征入于玉府漁今作漁釋曰月令季冬命漁師為梁漁師即漁人也季冬即以時也梁堰石障水而空其中以通魚之往來乃以竹為笱而承梁之孔以取魚也劉氏曰魚潛於淵蓋物之善者聖人養之之法則數罟不入汙池獺祭魚然後漁人入澤梁然則罟非其制不可設矣取非其時不可為矣是以罟必四寸梁設以時則凡魚皆得以遂其性也王鮪鮪之大者鮪出河南至春入西河上龍門以俟變化周人取之獻所無也鮮鮮也薧乾也王之膳羞用魚則獻於膳夫凡禮事用魚皆漁人主給之也取魚受政令於漁人以其知取之時節及其法也漁征漁者之稅也近川澤之民於十月獺祭魚之後亦得自取魚其中須骨堪飾器物者漁人主收之送入玉府以當邦賦王氏曰周之初沛澤多而禽獸至周人嘗惡其逼矣唯周公有以勝之然後中國之患除而人更賴其所獲以共服食器用然則獸人之官修寧百姓之大者也魚之為物潛逃微眇難及以政方周之盛時乃能使之莘其尾而頒其首浮沈大小備得其性則以有法度加焉而已然則漁人之官修養萬物之悉者也故二官各入其物於玉府以為王者仁民愛物其施如是然後可以兼百姓之奉備萬物之養以足其燕私玩好之欲也鱉人掌取互物以時簎魚鱉龜蜃凡貍物春獻鱉蜃秋獻龜魚祭祀共蠯螺蚳以授醢人掌凡邦之簎事互户故反簎勑角反蜃工軫反貍莫皆反蠯薄佳反螺即戈反蚳直其反釋曰互物謂介甲之屬介蟲也簎以義刺泥中搏取之蜃大蛤也貍藏也自埋藏於泥中非網罟可致者鱉及龜魚字乳以夏而蜃以夏秋故春獻鱉蜃秋獻龜魚避其字乳之時而弗獻也惟王不以飲食之養害仁政之法度然後能使物盡其性也蠯蚌蛤也螺䗂蝓也蚳蛾子也謂蟻之子取其白者為醢故授醢人王氏曰魯語宣公夏濫於泗淵里革諫曰魚禁鯤鮞蟲舍蚳蝝古之制也里革以舍蚳蝝為仁此以共蚳蝝為禮何也蓋宣公之夏濫非其時也聖人取物以時而已按鳥獸魚鱉咸若皆其德懋之致自獸人以下莫不以時取之以共膳夫之用亦所以贊天地之化育輔萬物之自然非窮口腹之欲以暴殄天物也臘人掌乾肉凡田獸之脯臘膴胖之事凡祭祀共豆脯薦脯膴胖凡臘物賓客喪紀共其脯臘凡乾肉之事胖普半反釋曰大物解肆乾謂之乾肉薄析曰脯小物全乾為臘膴全體亦大之義胖半體此皆獸人所共臘人治之也田獸一為乾豆故祭祀共豆脯鄭氏曰脯非豆實當為羞羞脯謂庶羞之脯薦脯謂薦獻之脯凡臘物皆臘人治之以為脯故凡事取具焉原曰觀膳夫以下之職知王者養身之道矣非獨養身乃養德也是故享天下之養者莫大於備物盡飲食之道者莫先於備禮備物者必致其精備禮者必致其敬精矣敬矣盡愛物之道而得乎裁成輔相之宜者皆於此乎見之今考之膳夫所掌之珍羞鼎俎庖人所掌之獸禽鮮薧內饔之膴胖骨鱐外饔之脯修魚臘亨人職煎和甸師供薪蒸獸人漁人鱉人共鳥獸魚鱉龜蜃臘人共脯臘夫是之謂備物物備矣豈徒窮口腹之欲而已耶故膳夫王燕食則奉膳贊祭所以起其敬授祭品嘗食所以謹其微侑食卒食皆以樂所以道其和夫是之謂備禮庖人辨香臊腥羶之膏欲適四時之宜內饔辨庮羶臊貍腥之臭而去六物之不可食獸人則辨四時獸物之獻則又致其精慎如此王日一舉齊日三舉一舉常道也三舉者將交神明必變食潔饌所以致敬也若有喪荒凶札則不舉蓋人君以天地萬物為一體一有凶變必致戚而不遑安者眚自己出也况敢以盛饌自豐耶夫是之謂致其敬又以甸師以下觀之則知先王於山林川澤之物取之甚廣而皆有其法用之甚周而必以其時於耕藉之暇則蕭茅薪蒸之共者徒不空養也於獵則守罟春秋異獻於魚則時漁為梁時簎鱉蜃則庶物皆得以遂其生而成育物之仁至於祭祀賓客喪紀膳羞得以取之無窮用之不竭而裁成輔相之力又於是乎寓也非大聖人能以天地為一體萬物為一身者安能制度之曲盡其道如此乎醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者疕瘍者造焉則使醫分而治之釋曰醫師總掌衆醫為四醫之長故掌其政令毒謂五毒攻之之毒藥謂五藥療之之藥二物也聚之所以共衆醫之用政即聚毒藥以共醫事也令即使醫分而治之劉氏曰藥有州土之宜採取之候煉制之方攻治之法悉預知之然後可以共醫事也疾輕而病重疾甚曰病也頭瘡曰疕身瘡曰瘍皆造醫師而求藥王氏曰凡人以血氣為營衛氣壅遏而不通則有疾病血凝結而不流則為疕瘍疾病則使疾醫治之疕瘍則使瘍醫治之歲終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下釋曰每歲之終醫師考衆醫之事功而制其食祿之差分為五等十全為上者按其病用其術十無一失者也程子曰非謂十人皆愈為上若十人不幸皆死者則奈何但知可治者與不可治者十人皆中則為上也失一失二失三皆然定為醫按嵗終計之以為祿食之差蓋餼稟必稱事然後能者勸不能者勉食醫掌和王之六食六飲六膳百羞百醬八珍之齊食音嗣和去聲齊才細反釋曰和調也六食謂六穀六飲謂六清六膳謂六牲百羞謂羞用百二十品百醬謂醬用百二十罋八珍謂八物之羞此皆膳夫所掌食醫主調和其齊使適於節焉夫疾病之起本於氣體之不和不和由於飲食之弗節故飲食者人之本也本得其養病何自生哉故在民與物則治其疾於已然在君與臣當防其疾於未然此食醫所以為諸醫之先而屬之醫師也凡食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時凡和春多酸夏多苦秋多辛冬多鹹調以滑甘釋曰春為陽中其氣溫食齊視春宜溫取其生也夏為陽盛其氣熱羹齊視夏宜熱取其化也秋為隂中其氣凉醬齊視秋宜凉取其成也冬為隂盛其氣寒而飲齊視之宜寒取其清也人一身備四氣之和故味視四時為凖也春為木而肝屬焉春主發散宜多酸以收之所以養肝也夏為火而心屬焉夏主解緩宜多苦以堅之所以養心也秋為金而肺屬焉秋主揫斂宜多辛以散之所以養肺也冬為水而腎屬焉冬主堅栗宜多鹹以䎡之所以養腎也脾土分旺四時故皆調以滑甘以養脾也黃氏曰滑以調之慮其不通也甘以調之慮其不和也甘在內則養脾在外則養肉四行不可無土四味不可無甘此甘所以調歟竅者氣之所由以通也竅不利則氣窮焉此滑之所以調歟凡㑹膳食之宜牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽凡君子之食恆放焉稌音杜苽音孤放甫往反釋曰㑹合也合之以相成也膳食之宜謂畜與穀各有相宜稌粳也苽雕胡也牛土畜稌土穀羊火畜黍火穀此二者以同氣為宜豕土畜稷水榖此以土尅水為宜犬金畜粱土穀此以土生金為宜鴈火畜麥木穀此以木生火為宜魚水畜苽水穀此亦以同氣為宜君子卿大夫士也食醫本為和王食然君子之食亦當依倣以為節焉黃氏曰牛羊豕鴈魚天産也以為膳所以養人之精稌黍稷粱麥苽地産也以為食所以養人之形精不足於養則氣衰形不足於養則氣殆膳食之養不可相廢其宜不可相反所宜或失焉則所養適足以害之耳楊氏曰先王於食有醫所以治未病也凡百君子所以自養者亦當放此至於疾而後用醫則末矣故周官疾醫施於萬民而君子不與焉疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾痟音消癢以掌反疥音介嗽西豆反上時掌反釋曰疾醫醫師所使醫萬民之疾病不云療而云養者治病以調養為本也癘疾氣戾不和而成疾也痟酸削也首疾頭痛也嗽咳也上氣逆喘也四時之間冬傷於寒春必病溫夏傷於暑秋必痎瘧素問云然也蓋方冬時陽為主於內寒雖入之勢未能動及春陽出而隂為內主然後寒動而搏陽故有痟首之疾方夏之時隂為主於內暑雖入之勢未能動及秋隂出而陽為內主然後暑動而摶隂為瘧寒之疾夏則陽溢於皮膚冬則陽溢於臟腑疥生於皮膚者也故夏有癢疥之疾嗽肺病也肺氣屬金而主聲故臟腑受病則肺動而為嗽上氣之疾矣此四時之癘疾也夫隂陽判而為五行五行運而為四時或為寒暑或為溫凊資其氣以生者孰不為之感動哉善攝生者消息盈虛與時偕行故邪氣不能以襲之不然客邪輒蹈其舍則疾病交作此四時所以皆有癘疾者也以五味五穀五藥養其病以五氣五聲五色視其死生兩之以九竅之變參之以九藏之動竅苦弔反釋曰養猶治也病由氣勝負而生攻其嬴養其不足者五味醯酸酒苦飴密甘姜桂辛鹽鹹之類五穀麻麥黍稻稷也五藥草木蟲石穀也素問曰形不足溫之以氣精不足補之以味味養精也穀養形也藥療病也養精為本養形為次療病為末下文皆療病之事五形五臟所出之氣心肝脾肺腎也五聲口所出之聲由唇舌牙齒喉有宫商角徵羽之辨也五色面貌所發之色木青火赤金白水黑土黃也此三者有相生相勝之理有旺相休廢之道醫者望其氣聼其聲觀其色則死生可以預知矣兩者再也參者三也謂再三重審驗之九竅陽竅七隂竅二變謂通與塞也五臟心肝脾肺腎為五臟胃為水穀之府小腸為受盛之府大腸為行道之府膀胱為津液之府是為九藏三焦為孤府故不入藏之動為脉或曰九竅之變有通塞之二候故曰兩九脉之動有浮中沈之三按故曰參可謂精矣凡民之有疾病者分而治之死終則各書其所以而入于醫師釋曰疾醫所以治萬民之疾病所命者中士八人而已其他為醫之人尚多皆名𨽻於醫師民有病者請於醫師使治之內外各專其術故使分而治之失治者曰死應死者曰終書所以死終之故入於醫師而稽考之以為制食之差等古人醫政詳密如此故民無橫死與夭札之灾也原曰疾醫掌養萬民之疾病而不及王后貴人者聖人疾意之所在也凡疾病有不起於飲食之不謹起居之無節者乎故食醫一官列之於前雖不及藥石之具而以醫名官是欲其保安於無事之日况醫職之下又有酒醬等官所以調飲食而迎𨗳和氣者無所不至矣而宫人舍人掌次之職在在有之所以節宣其動息起居曷所不至疾病何從而生哉故醫師之設蓋欲貴者養之於未病之先賤者治之於己病之後君子觀此則知寡欲以養心謹禮以養形者自不容已矣瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之瘍音癢折時設反祝作注劀音刮齊才細反釋曰瘍瘡癰也瘍醫專治外證腫瘍氣聚而不散者潰瘍血溢而將破者金瘍刀傷而成瘡者折瘍踠跌而骨折者祝注也以藥附著之或曰如字以氣封瘍而徒之也劀括去膿血也殺以刀去其腐肌也祝之不勝然後用藥藥之不去必劀之括之不愈則殺去之止病曰療攻治也五毒五藥之有毒者攻之利法也五氣五藥之氣也養之補法也五藥以療其瘡於外五味以節其養於內王氏曰疾醫以治內為主故先味而後藥瘍醫以治外為主故先藥而後味凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅凡有瘍者受其藥焉釋曰酸者木之味肉以骨為體骨收則强故以酸收之辛者金之味肉以筋為節筋散而不攣故以辛散之鹹者水之味脉所以行血脉䎡則和故以鹹䎡之苦者火之味氣所以充體氣堅則完故以苦堅之甘者土之味肉緩則不壅故以甘緩之竅以骨為體以肉為包所以通氣也素問曰骨肉滑利可以長久惟滑則無所凝止故以滑利之蓋腎主骨腎水屬也故欲收肝主筋肝木屬也故欲散心主脉心火屬也故欲䎡肺主氣肺金屬也故欲堅脾主肉脾土屬也故欲緩而竅則水屬也故以滑利為主獸醫掌療獸病療獸瘍凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸瘍灌而劀之以發其惡然後藥之養之食之几獸之有病者有瘍者使療之死則計其數以進退之食音嗣釋曰療獸病者醫獸內病之症也療獸瘍者醫獸外症也醫人則內外各自為術醫獸則合為一術貴人賤物也獸病疾之不可見者獸不能言則病狀難知必灌之以藥使行焉行之不止則其病劇又從而節止之先動其氣脉因以觀其病之發而養之則獸病可療矣此醫其內者也瘍結於外而易見必先灌以藥而攻之以刮去其膿血而發其惡然後藥以療之養以息之食以肥之此療獸瘍之序也是之謂外症死則計其多少之數以進退其食如此則醫者有所憚而獸之有病者可愈此聖人及物之仁也酒正掌酒之政令以式法授酒材凡為公酒者亦如之釋曰掌政令者酒官之長也式其給用之式若米麯多寡之數法其造釀之法若水火齊量之差酒材則凡資之以為酒者皆是月令曰秫稻必齊麯蘖必時湛熾必潔水泉必香陶器必良火齊必得是也授者授酒人使造之公酒為公事而作酒如饗燕飲射之類亦以式法授酒材釀之辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒辨四飲之物一曰清二曰醫三曰醬四曰酏掌其厚薄之齊以共王之四飲三酒之饌及后世子之飲與其酒泛方劒反盎烏浪反緹音體醫於已反酏以友反釋曰齊者造作而有節量之名也五齊用以祭祀非人所飲也不致其味致其義而已故曰辨名以名者義之所自出也太古以明水為禮其後乃有𤣥酒𤣥酒一變而有泛齊泛齊者成而滓浮泛泛然泛齊一變而有醴齊成而汁出渾厚而甜醴齊一變而有盎齊成而滃滃然葱白色其味得中過此有緹齊其色紅赤味已是酒矣沈者成而渾沈則清矣自醴以上尤濁縮酌者盎以下差清五者酒之始也三酒所以飲者務致其實而已故言辨其物事酒酌工事者之酒味稍薄不可以久者昔酒昔熟而久者也其味厚故可久清酒者醇酒也酒熟久則醇醇久則清詩或言祭以清酒或言清酒百壺故酒以極清為極美故事神接人皆以清酒為尚焉自泛齊以至清酒然後為極酒之次也清謂泲醴而為之醫謂釀粥而為之漿用米以漿謂之酨漿言米汁相將也酏則稀粥之清者可飲也陳氏曰酒正四飲清醫漿酏而無水醴凉漿人六飲水漿醴凉醫酏而無清水凉之味薄非酒正所辨酒在飲中非用漿人之法內則無水凉醫亦以其薄而略之五齊以下並酒人漿人所作酒正則辨其厚薄之齊共之於王則陳設之所謂饌也后世子不言饌飲酒則直共之而已凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數唯齊酒不二皆有器量共賓客之禮酒共后之致飲於賓客之禮醫酏糟皆使其士奉之釋曰凡祭天地宗廟諸神皆有五齊三酒祭有大小酒有多少各有常法以共之五齊五尊三酒三尊此除明水𤣥酒若五齊加明水三酒加𤣥酒為十六尊不言者舉正尊也大祭王服大裘衮冕所祭也中祭王服鷩冕毳冕所祭也小祭王服希冕𤣥冕所祭二副二也酌所用器注酒尊中者數量之多少也陳氏曰濁莫如五齊而其味薄清莫如三酒而其味厚祭祀有五齊以神事之尚質也有三酒以人養之尚味也酒正共五齊三酒以實八尊皆陳而弗酌所以致事養之義也非此八尊所實齊酒皆有二備乏少也大祭所酌度用一尊則以三尊二之中祭二尊小祭一尊副之皆酌而獻所以致事養之用也禮運曰𤣥酒在堂醴盞在户粢醍在堂澄酒在下皆設而弗酌者也故有器量而無酌數禮酒王所致酒糟醫酏不泲者也泲曰清不泲曰糟士其下士也諸侯來為賓者王致酒后致飲夫婦相成之義也使士奉之不親獻也凡王之燕飲酒共其計酒正奉之凡饗士庶子饗耆老孤子皆共其酒無酌數掌酒之賜頒皆有法以行之凡有秩酒者以書契授之釋曰王燕飲酒謂王燕居而自飲酒或不時與羣臣燕也共其計者計其用酒多少之數以共於王也有司不可以法度拘玉故但共其計也惟獻王故酒正親奉之士庶子宿衛者或賢能者耆老有齒衡之老孤子死王事之子皆有饗禮示所隆無酌數以醉為度示恩意之厚也王若以酒匪頒賜羣臣酒正必畫為一定之式法令循而行之秩酒謂月給有定數書之於契以授之使知所得之多少執以取酒也酒正之出日入其成月入其要小宰聼之歲終則㑹唯王及后之飲酒不㑹以酒式誅賞釋曰出謂授酒材及用酒之多少也日入其成旬計也月入其要月計也入其書於小宰使聼之以其執九式之二守出納之正止其不如法者也嵗終則計㑹總一歲用酒多寡之數入於太宰以合九式也王后飲酒不㑹者當享天下之養無過度也然止自飲而已非匪頒也世子以下皆㑹防荒侈也以酒式誅賞者酒正於授酒材之初既有給用之式則於造成之後必計其美惡如式者賞不如式者責之或曰凡用酒各有式酒正掌之受用酒者或過不及違式法者酒正誅賞之可以互相備也酒人掌為五齊三酒祭祀則共奉之以役世婦共賓客之禮酒飲酒而奉之凡事共酒而入于酒府凡祭祀共酒以往賓客之陳酒亦如之釋曰酒人皆婦人曉解作酒者奄人掌之酒正辨其名物授酒材酒人則受酒式酒材於酒正而造釀之故曰掌為五齊三酒世婦春官之世婦立宫卿女官府於內以掌女宫之宿戒教王后六宫之禮事故女酒奄人之屬皆宫卿世婦掌之故曰以役世婦非天官妃嬪世婦也禮酒饗酒也饗以訓恭儉爵盈而不飲所以為禮也飲酒燕酒也燕以示慈惠常飲之酒而已奉之者酒人奉於賓客也凡事王燕飲之事也酒府酒正之府也王燕飲之酒酒人當奉之故共酒入於酒府而辨其厚薄之齊也凡祭祀之酒自有人奉之故共酒往待其令而已賓客之陳酒掌客所謂壺四十皆陳之類此酒亦自有人陳之故共酒以往漿人掌共王之六飲水漿醴凉醫酏入于酒府共賓客之稍禮共夫人致飲于賓客之禮清醴醫酏糟而奉之凡飲共之釋曰六飲大槩煮酏而為之以其味薄而淡則謂之水水為清冷所以和酒凉為寒粥所以佐酒無厚薄之齊不待辨也漿醴酏見上入於酒府者酒正當奉之也稍禮賓客欲去留間王稍給以六飲之禮非正饔餼之禮也夫人之賓客卿大夫之妻也夫人有致飲於賓客之禮猶冡宰之有賜豫也蓋上下內外大小相成焉禮之所以立也清之為醴濁之為醫酏此四飲漿人奉之不使士凡用飲漿皆共之非必饋食也凌人掌冰正歲十有二月令斬氷三其凌釋曰凌氷室也詩云二之日鑿氷冲冲三之日納于凌隂設官以掌之上以法天時下以防人患也正嵗者建子月朔云十有二月者周人改嵗於子而不改夏月故建子十一月謂之正嵗建寅月謂之正月此云正嵗十二月者改嵗之次月建丑月也詩云二之日鑿氷是月之日也季冬火星中大寒氷方盛之時水澤腹堅故令斬氷三其凌三倍其氷納於氷室備消釋也春始治鑑凡外內饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賓客共氷大喪共夷槃冰夏頒冰掌事秋刷刷所劣反釋曰鑑似甀大口以盛冰置食物於中以禦溫氣春始治之為三月將獻羔啓冰也外饔內饔之膳羞酒人漿人之酒醴見溫氣皆失其味故用冰鑑以凉之也祭祀之物停久故各共冰鑑謂祭物置冰鑑之上也賓客之膳羞則以冰錯之故不置鑑夷之言尸也尸之盤曰夷盤廣八尺長丈二深三尺漆赤中實冰于槃中置之尸牀之中欲以寒尸故共夷槃冰也夏四月暑氣盛王以冰頒賜羣臣則主其事刷清也秋七月天氣凉不用冰刷除冰室將納新冰王氏曰藏冰將以備暑而亦所以達陽出冰雖以禦暑而亦所以助隂夫隂陽之氣流行於天地之間一氣之不至則閉塞而為災一氣之或過則乖戾而為疾善防患者或養其弱以抗其强故方隂之盛而陽之微也則鑿冰以達陽或損其有餘以補其不足故方陽之隆而隂之消也則出冰以禦暑如此則無愆陽無伏隂無閉塞乖戾之患矣先王裁成天地之道輔相天地之宜以左右民如此籩人掌四籩之實朝事之籩其實䵄蕡白黑形鹽膴鮑魚鱐饋食之籩其實棗㮚桃乾􅢀榛實加籩之實蓤芡㮚脯蓤芡㮚脯羞邊之實糗餌粉餈䵄方弓反蕡符文反鱐所求反㮚力質反􅢀音老榛側巾反蓤音陵芡音儉㮚古栗字餌而志反餈作資反釋曰籩竹器如豆其容實皆四升朝事饋食加籩羞籩四籩也籩豆禮之器也器以薦物而致禮各有司存故非特掌其器併掌其實也朝事祭宗廟薦腥之事熬麥曰䵄枲實曰蕡熬稻曰白熬黍曰黑築鹽為虎形曰形鹽膴以魚肉為大臠鮑以魚於楅室中糗乾之鱐乾魚也鮑出江淮鱐出東海王者備物近者腥之逺者乾之是為朝事八籩王薦腥后亞獻之後薦此豆籩也饋食薦熟之事乾􅢀乾梅也榛似㮚而小三物則以乾濕之物足此五物為八籩此王薦熟后亞獻之後薦之蓤芰也芡雞頭也四物重言之謂八籩加籩者尸既食后亞獻尸所加之籩糗熬大豆與米也粉豆豆屑也合蒸曰餌餅之曰餈二物皆粉稻米黍米所為餌言糗餈言粉互文相足也此羞籩者王既酳尸后又獻羞籩羞豆各四焉是也凡祭祀共其籩薦羞之實喪事及賓客之事共其薦籩羞籩為王及后世子共其內羞凡籩事掌之釋曰凡祭祀非止宗廟也薦羞皆進也未食未飲曰薦先薦後獻也若朝踐饋獻時未獻前所薦之籩豆朝事饋食也既食既飲曰羞若尸食後酳尸訖所進羞即加豆之實也賓客之事謂燕饗時喪事謂殷奠時皆共二籩之實也內羞房中之羞凡籩事非一事也或曰籩人醢人皆不言共王及后世子之內羞而曰為王及后世子者則此內羞非共王后世子乃后世子以此內羞共禮事而籩人醢人為之共之也世婦及祭之日涖陳凡內羞之物則此內羞為共祭明矣醢人掌四豆之實朝事之豆其實韭菹醓醢菖本麋臡菁菹鹿臡茆菹麇臡饋食之豆其實葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢羞豆之實酏食糝食韭音久菹莊魚反醓吐感反臡乃兮反菁作寧反茆音卯䴢京倫反螺力禾反脾婢支反析星歷反蠯音蚌拍音搏芹音勤箈音台筍即笋字食音嗣糝素感反釋曰醢豆實也不言豆人而曰醢人者為豆實而言也四豆之實亦是薦羞有骨為臡無骨為醢全物為菹細切為韲凡作醢及臡者必先膞乾其肉乃莝之雜以粱麯及鹽漬以美酒塗置甀中百日則成矣醓肉汁也菖本蒲根也菁蔓菁也茆鳬葵也䴢似鹿而大者也此為朝事八豆之實焉螺䗂蝓也脾析牛百葉也蠯蛤也蜃大蛤也蚳蛾子也豚拍脅也此饋食之八豆芹楚葵也深蒲謂蒲始生水中子醓醢肉醬也箈箭萌或曰水中魚衣筍竹萌凡菹醢皆以氣味相成兩兩相配為入此加豆之實后設之酏􅊡也內則取稻米舉糔溲之小切狼臅膏以與稻米為􅊡糝取牛羊豕肉三如一小切之與稻二肉一合以為餌煎之謂之糝食此為羞豆之實二豆也凡祭祀共薦羞之豆實賓客喪紀亦如之為王及后世子共其內羞王舉則共醢六十罋以五齊七醢七菹三臡實之賓客之禮共醢五十罋凡事共醢齊當為韲釋曰五韲昌本脾析蜃豚拍深蒲也七醢醓螺蠯蚳魚兔鴈醢七菹韭菁茆葵芹箈筍菹也三臡鹿麋䴢也凡醯醬所和細切為韲全物若䐑為菹虀菹之稱肉及菜通賓客之禮致饗餼時也上公醯醢共百二十罋侯伯百罋子男八十罋此云五十罋百罋之半舉中以見上下也醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賓客亦如之王舉則共齊菹醯物六十罋共后及世子之醬齊菹賓客之禮共醯五十罋凡事共醯醯呼西反釋曰醯醢一事也周人分為二職其所實之器在膳夫則為罋在醯人則為豆罋以備禮數豆則可和齊菹而共膳醢人雖具齊菹以充豆非醯則齊菹之味不成故醯醢不嫌二職蓋齊菹有須醬而成者有須醢而成者故醢人醯人各有五齊七菹也凡醯物則以醯所成之物凡醯醬之物則以醯所成之醬也王舉共醯六十罋并醢人六十罋即膳夫醬用百有二十罋也后世子之醬齊菹用醯以成之者皆共之賓客共醯五十罋並醢人五十罋為百罋侯伯之禮也鹽人掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽賓客共其形鹽散鹽王之膳羞共飴鹽后及世子亦如之凡齊事煮盬以待戒令齊才細反煮音煮盬音古釋曰鹽所以調和食味故次醯人王氏曰鹽之為物其用博其利厚必有政令以治之先王之時山澤有虞衡物為之厲而為守禁至於鹽則有守禁尤嚴以共百事之鹽者鹽之為用非一人人不可闕也若祭祀賓客及王后世子膳羞其大耳鹽之所産不同有刮於地而得者其味苦謂之苦鹽有熬其波而出者其鹽散謂之散鹽有風其水而成者其味甘甜謂之飴鹽有積於鹵而結者其形似虎謂之形鹽祭祀則共苦鹽取其成於自然與𤣥酒明水不異也賓客則共形鹽取其如虎之形示服猛也然皆益以散鹽者取其治洽四海能致逺物以奉先祖懷諸侯也王及后世子膳羞皆共飴鹽者取其味之甘甜可嘗食也齊事和五味之事煮為煮盬者鹽之陳而古者其色黑或化為水也用火以煉治之則潔白如初其味和矣原曰鹽民食之和不可一日闕也禹任土作貢而令青州貢鹽蓋貢其所有以供王用耳周禮鹽人之職以共百事之鹽蓋亦以鹽之用而共邦事未嘗以鹽之利而共邦財也其官則以奄二人為之掌其政令謂共鹽耳待其戒令謂煮盬爾自祭祀賓客膳羞之外未嘗有一毫之取於民是以其利則嘗在民而不在官也上之人未嘗資其利以富國下之人未嘗謀其利以富家故周禮一書理財居半鹽獨無賦自管仲以後寢以為富國之計遂至官與民爭利豈先王之意哉幂人掌共巾幂祭祀以疏布巾幂八尊以畫布巾幂六彛凡王巾皆黼黼音甫釋曰以疏布者天地之神尚質也禮器云大路素而越席疏布幂至敬無文者也六彛皆盛鬱鬯以裸宗廟其巾幂皆畫雲氣尚文也其實天地亦有秬鬯之彛宗廟亦有八尊則天地皆用疏布宗廟皆用畫布可知劉氏曰凡王之燕射饗食當巾幂者皆繡為黼則有形為斧矣繡以設色所以示文章形以為斧所以示威斷古之道也夫巾幂所以衛潔清而示恭敬也故設官以掌之其所以事天地宗廟君尊之誠可知也原曰飲食祭祀燕饗賓客喪紀國之大事也周禮諸官各有其禮矣而所以備四者之用則自酒正至幂人九官掌之焉夫所以暢天地之和致事養之用者莫大乎五齊三酒四飲也而酒正酒人漿人職之極天地之産盡水陸之珍者莫盛乎五齊七菹七醢三臡醯醬也而籩人醢人醯人職之節天地之盛氣以堅衆味莫大乎冰取自然之味以和庶物莫大乎鹽此二者用若小而關天地燮調之功則大也故特設凌人鹽人以掌之至於巾幂致潔之物也而有天地宗廟及王之品節焉為是而設官可見先王致詳致謹於禮義之中莫不有法式存焉是故於飲食燕饗也則見先王不以口體而竭四海難得之物焉於祭祀也則不敢以天下而儉於天地宗廟百神而不盡誠盡物焉於賓客也則不敢以天下之富而缺上下之歡與懷柔之道焉至於喪紀則不敢不預其備焉九官之設實大義所在大禮所關可以萬世循之而不敢苟者此職不明則四禮不盡其義備物致誠之道微矣宫人掌王之六寢之修為其井匽除其不蠲去其惡臭共王之沐浴凡寢中之事掃除執燭共爐炭凡勞事四方之舍事亦如之匽於建反蠲音涓去起吕反釋曰宫人主安息王身者六寢路寢一小寢五路寢以治事小寢以時燕息諸侯三寢一路寢一燕寢一側室焉修掃除也王者外有三朝內有六寢隂陽之義也井以停止水備火燭匽豬也謂霤下之池以受水潦備洗滌也蠲潔也除不蠲去惡臭謂决匽以洗滌之所以謂之修也沐以潔首浴以潔身則膚受之塵垢無所受也掃除所以潔室執燭所以為明爐炭所以致熱凡寢中之事宫人則兼治之凡勞䙝之事宫人則兼理之王㑹同征伐巡狩之所次舍皆宫人掌之此宫人所以司王之居處而舍幕次之官所以屬也掌舍掌王之㑹同之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫設旌門無宫則共人門凡舍事則掌之梐步禮反枑户故反重直隆反壝遺季反釋曰㑹同之舍發政為㑹施政為同王若巡狩則㑹諸侯於方嶽之下不巡狩則為方明之壇於國門之外皆為王宫於其下梐枑行馬也內外兩重設之然後設車宫轅門於內所以營衛至尊也車宫環車以外向轅門仰轅以為門壇壝築壇於中壝土於外以為宫以棘為門棘荆棘或曰矛㦸也君晝日息暫展肆焉則張帷以為宫設旌以為門無宫非企息之所在雖暫駐亦必設備故以衛士為門焉劉氏曰設梐枑再重所以衛宫車也設車宫轅門所以衛壇壝也為壇壝棘門所以衛天子㑹同也為幄宫設旌門所以待王之休息也無宫則共人門亦以待王之休息也凡舍事王行所止舍皆掌舍職之也幕人掌帷幕幄帟綬之事凡朝覲㑹同軍旅田役祭祀共其帷幕幄帟綬大喪共帷幕帟綬三公及卿大夫之喪共其帟釋曰在旁曰帷在上曰幕皆布為之四合曰幄帟幄內之帳綬絛也四物皆以綬連繫之也此即綴衣也掌舍幕人掌次三職相須而成事上掌帷幕幄帟綬者王在宫之時則幕人掌其事此朝覲以下言共之者共之掌次使張之不主其事也大喪用帷者以帷堂也或與幕張之於庭帟在柩上三公及卿大夫之喪應有帟故共之唯士無帟王有惠賜之檀弓曰君於士有賜帟是也掌次掌王次之法以待張事釋曰舍與次一也舍者久居之辭次者暫止之義故分為二職待張事者王出宫則幕人以帷與幕送與掌次張之法者大小丈尺之差也王大旅上帝則張氊案設皇邸朝日祀五帝則張大次小次設重帟重案合諸侯亦如之師田則張幕設重帟重案諸侯朝覲㑹同則張大次小次師田則張幕設案孤卿有邦事則張幕設案釋曰旅之為言衆也陳也上帝合五帝言之大旅上帝者合五帝於圜丘以祭也國有故則旅上帝分五帝而祭也亦曰旅但不曰大旅也氊案張氊於案皇邸設鳯羽於版以為屏風此王齊宿之所設也朝日春分拜日於東門之外祀五帝謂四時迎氣於四郊國有故亦於四郊祀五帝次謂幄也王不宿於外故初往則設大幄以候息止既接祭則張小幄以候行禮師田出師田臘張幕不設幄者王臨誓衆或回顧瞻察也大次亦初往所居小次亦待事之處皆邇方明之壇為之師田者與諸候從王而師田也只言張幕設案則不重也敬賓客者也三公九卿將受命出使於四方亦張幕於庭所以籍弊設案為位王立於前而授之命焉凡喪王則張帟三重諸侯再重孤卿大夫不重凡祭祀張其旅幕張尸次射則張耦次掌凡邦之張事釋曰凡喪王與諸侯孤卿大夫之喪也帟柩上承塵也三重再重不重尊卑之等也旅衆也公卿以下即位所祭祀之門外以待事為之張大幕尸祭祀之尸則張幄以更衣亦尊之也耦兩人為一耦俱升射者次在洗東射人云王以六耦張三候皆有次以待之丘氏曰先王設掌次之官其意若曰帷幕幄帟所用非一次用罷徹之而復用其為費亦少矣後世離宫别館竭萬家生養之資為一日巡幸之備嗚呼無怪乎生民息肩之無日也原曰飲食起居養身之大務也王者端拱於穆清之上享天下之奉求遂欲得矣然過於安養則所以戕身之具亦甚蕃也不於飲食起居之間而致其謹可乎故天官於宫伯之下即設食官以保其身體而養之於無事之日又次以醫官而藥之於無病之時又次以酒官以和五味之㫖則於飲食之養亦備矣又設宫人以潔六寢使王致謹其起居於內又屬以掌舍幕人掌次以衛其起居於外則所以保王躬於平日者至矣後世乃以天官不親細事以食醫宫禁付之近侍奄竪之手而不屬之論經燮理之大臣則所以防微而杜漸葆和而育粹者尚何望耶大府掌九貢九賦九功之二以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府凡官府都鄙之吏及執事者受財用焉藏財浪反釋曰九功即貢賦中之布帛以其出於女功所成故謂之九功貨則九賦之物與泉賄即九功之布帛也受藏之府內府也受用之府外府也內府金玉齒革兵器凡良貨賄入焉以其可久藏故入受藏之府外府掌邦布之入以共王后世子衣服之用或布帛或泉均謂之賄故入受用之府官府謂王朝百官之府都鄙謂治采地之羣吏執事謂府史胥徒乃有公事之務合用財物皆受之大府焉此只言二府受財用亦外府之賄也下文有式貢餘財則擇其可寶者以入玉府乃有三府焉大府則三府之總官而二府則分中士專主為守藏之吏故大府無中士玉府有上士者天子內帑專官守之亦統於大府故大府不自置府也諸侯只一府天子有三府按鄭𤣥以太宰無九功之賦遂以九職當之夫稍甸縣都關市山澤之賦非出於九職之三農園圃百工商賈虞衡乎九賦以地言九職以人言人必資於地而後賦可出也獨嬪婦臣妾五職皆有之皆分以宅地者故閭師無職亦出夫布則九功誠嬪婦之所出謂之布縷之征焉觀之外府只掌邦布以為衣服財用可知矣此所以先賦而後功也凡頒財以式法授之關市之賦以待王之膳服邦中之賦以待賓客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜豫稍九式作芻釋曰頒財亦於外府而分九藏式法九式之法也太宰定其式大府遵而行之關市以下即太宰之九賦膳服以下即太宰之九式關市商旅所聚百物珍竒於此乎在故以待王之膳服王者備天下之養也然有凶饑則關譏而不征市㕓而不稅王則不舉而素服此又法外之深意吕氏曰膳服雖不㑹然不出關市之賦而已此所以為式也邦中之賦園㕓之所出也諸侯來朝卿大夫來聘致之則有積與饔餼接之則有饗燕故以邦中之賦待之以國宅之民近而易於備禮故也四郊逺郊逺郊有牛田牧田其賦取之以養公牛馬及祭祀之六牲也匪頒者功懋懋賞所以馭其幸稍地家邑之賦出於諸臣之所奉亦以賞羣臣也甸地去國稍逺公邑未頒與人者故取其賦以待百工營造之事以公餘之財給興造之用苟無其財則營建之役亦可已矣此其式也邦縣小都之田乃王子與公卿之采地也問勞贈賄酬爵侑食皆有筐實故以邦縣之賦待之畿內諸侯所出以待畿外諸侯之禮事也邦都疆地王子母弟公孤所受百里之都其賦多矣國之大事莫重於祭內神外神牲帛庶品所須實多故以大都所入最多之賦待之夫小都以接人大都以事神蓋畿內之賦莫多焉神人之禮莫重焉喪紀九式作喪荒山澤者虞衡所賦也喪有賻賵含襚吊奠葬祭凶荒所為預備其用亦多也故以山澤之利待之以天下之餘地餘物為預備不虞之需也賜豫九式作好用義亦同幣餘職幣之餘財也王有燕好不時頒恩苟不預之倉卒所取九式亂矣故以幣餘之賦待之以常禮待人以所餘給非常賜豫也王之好用無常不出乎幣餘之賦而已則有濫用橫賜者太宰得以式法而節之此言畿內之賦以配九式之用者然皆外府之物凡邦國之貢以待吊用凡萬民之貢以充府庫凡式貢之餘財以共玩好之用凡邦之賦用取具焉嵗終則以貨賄之入出㑹之釋曰邦國之貢即九貢之貨賄司空所謂食者三之二一入於王者小行人所謂春入貢是也弔用即外府所謂共百物而待邦用者也畿內九賦以配九式矣畿外諸侯之貢貨賄也則入於外府以待邦用焉大抵畿內畿外之貢賦功皆以入九式皆以入三府大府分言畿內入九式畿外入三府者以畿內之式先定為大本然後以諸侯之貢益之國用乃得充裕焉此皆入外府者萬民之貢即王畿侯國賦貢之物祀也嬪也器也幣也材也貨也服也斿也物也皆民職之所成也府庫則內府也故內府曰受良兵良器金玉齒革良貨賄皆賦貢之物而王畿侯國之所斂者充府庫所以待邦之大用與王好賜焉其他不用也此言內府也式即九賦待九式之用者貢即邦國萬民之貢也餘財者王畿邦國之賦貢入於大府之時即擇其竒珍可寶者入於玉府以共玩好王者不以玩好妨國大用故謂之餘財然亦竒珍可為國寶非如貨賄之可常用者此言玉府也賦者九貢九賦九功皆言賦也用者九式及邦之大小用度也賦言其入用言其出也取具者一出一入皆取於大府也嵗終則總㑹計一年貨賄出入之數此雖司㑹之職大府亦自㑹之原曰成周理財之道大抵於大府一職可以見之故粟米之征則九賦之外也而公卿大夫之受地者取之為祿矣百官執事之稍食皆取於粟米也則有倉人廩人舍人以主之矣而大府所職則九貢九賦所入之貨賄以待邦用焉故財非出於貢賦則大府不敢入用非出於九式則大府不敢出王后世子不得而妄用百官不得而妄供以有式法在也故九式必用乎九賦九賦必出乎九職侯國之賦亦如王畿但二為國中之用一入於王為九貢則所以開財之源與節財之流者其本固有在矣是以大府既於外府置九藏以待九賦之入以預九式之用矣其邦國九貢之物則又配於三府焉府雖有內外之分然凡貢賦貨賄庶品之入必因其地擇其物而入之蓋以畿內九賦九式定其大本然後以邦國之貢充裕國用焉則賦式一定之中未嘗不通之以三府變易之權是以有餘不足可以相兼而大故大荒可以移用也然三府雖有變通之權又有司㑹總其㑹司書總其書職內量入職嵗稽出職幣振餘而大府不得而欺之則成周理財之法大略亦可覩矣玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉王齊則共食玉大喪共含玉復衣裳角枕角柶釋曰玉府所掌乃式貢之餘財金玉玩好良貨賄物雖貴而不關於國用故謂之餘財金玉人所寶者玩好可悅樂竒珍之物兵器如寶弓劒之類良貨賄如文織之類又如獸人㕓人之皮角筋骨澤虞之財物皆入於玉府是也服玉王所服用之玉如大圭之類佩玉珩璜衝牙也珠玉琢玉為珠以貫冕辨食玉以玉為屑齊則食之助精明之養也含玉璧形而小為死者實口復用生時衣服升屋以招魂也角枕以枕尸角柶角匕以楔齒者掌王之燕衣服袵席牀笫凡䙝器若合諸侯則共珠槃玉敦凡王之獻金玉兵器文織良貨賄之物受而藏之凡王之好賜共其貨賄敦音對好去聲釋曰燕衣服玉燕私所服袵卧席也席坐席也床笫牀簀也䙝器私䙝所用之器王燕服燕器皆掌於玉府者明其貴重也合諸侯謂盟誓也珠槃以珠飾槃所以盛牛耳玉敦以玉為敦所以盛牛耳血盟㑹所用也王之獻諸侯來朝所獻也文織帛之有文出於織成者玉府受於作治之工而藏之以待用焉好賜謂王有私恩頒賜臣下者玉府則共其物也內府掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉凡適四方使者共其所受之物而奉之凡王及冡宰之好賜豫則共之釋曰內府受王畿侯國之貢賦由大府所頒受而藏之所謂受藏之府也謂之內者蓋積之以備國實所謂萬民之賦以充府庫是也九賦九功固以王畿為本亦侯國九貢中分九賦九功之等亦如畿內之賦也待邦大用積之以備非常如遷國出師凶荒大故然後用之非如九式之常用也上是所貢之物此是所獻之物貢則有常獻則無常也幣四方賓客來朝之幣獻之者金玉齒革諸侯所獻國珍冢宰所謂玉幣玉獻是也其物亦充內府焉四方之幣獻既入於內府王遣使於諸侯則共其所受之物此王者所以遺諸侯也其有報施之禮者則以原所獻者受之即反幣也冡宰二王治事故或有所賜豫亦得請於王取之內府可見冡宰為首相亦得用內府之物也玉府只共王之好賜內府并及冡宰好賜則玉府者天子之內帑內府者天子之公帑也外府掌邦布之入出以共百物而待邦之用凡有法者釋曰外府受用之府布泉也布取宣布之意泉取流行之意其實一物也執此可以權百物而通之故入外府以共百物而待邦用有法即九式之法外府給之或曰外府之立専掌邦布此布何從而出曰侯國之賦有折泉而入貢者以其道逺而易運也九功之內有布帛者皆入外府以其可以流行常用故也則知九賦者或庶物或折泉九功者皆布帛以其共王后世子衣服之用及幣齎之財用故也所以總言邦布共王及后世子之衣服之用凡祭祀賓客喪紀㑹同軍旅共其財用之幣齎賜豫之財用凡邦之小用皆受焉嵗終則㑹唯王及后之服不㑹釋曰此約九式之事而為文也王后世子之衣服則關市之賦待之祭祀則邦都之賦賓客則邦中之賦喪紀則山澤之賦賜豫則幣餘之賦幣帛匪頒稍秣則㑹同軍旅所用者大府總掌其法外府受其貨賄大府未嘗自置府也邦之小用細小之用謂以泉布可以權百物也嵗終則㑹者㑹計一嵗出入之多少知餘缺備侵盜也王后衣服不㑹者以享天下之奉不可以有司之法繩之世子而下則皆㑹矣然不㑹者亦不出關市之賦耳豈蕩而無節也哉葉氏曰三府所掌見王者富有天下之意也若侯國只一府而已故大府九賦所入以待九式之用者國中之財也二府與式貢餘財者天下之財也觀九式只用九賦而九貢不與焉可知矣玉府掌金玉玩好玉為重也故謂之玉府內府待邦大用使者適四方所受之物則奉之王與冡宰之好賜則共之其用固在外何以謂之內豈非以貨賄之藏在內以備國實而不輕用者乎外府固共百物之用而王后世子之衣服所共又在內何以謂之外豈非以泉布之在外流通可給常用者乎大府邦國之貢為侯國所貢邦布言之也外府之共百物邦之小用非弔用乎萬民之貢為邦國民職所賦之物言之也內府受九貢九賦九功之貨賄良兵器非充府庫乎式貢餘財以供玩好則誠玉府也故三府所掌而統之以大府則三府不得行其私大府雖總其財而制之以太宰之九式則大府亦不得行其私而况於司㑹司書以稽之則成周理財之道至精密矣兹所以常有三十年之通而民無凶荒水旱之患禮備樂和兵寢刑措而成泰和之治者豈非制國用之所基乎司㑹掌邦之六典八法八則之二以逆邦國都鄙官府之治以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用㑹古外反釋曰㑹大計也六典八法八則之二小宰之所掌也司㑹亦掌之職在㑹計故迎受而勾考之以計其治否也九貢九賦九功取民之常法九式用財之常法致者欲其至之謂不至者以㑹而知之令者使之共之謂不共者以㑹而知之均節者量入為出由㑹而知均節之法也九功之賦固出於民職而九賦亦出於九職也但九賦出於三農園圃虞衡百工商賈斯皆有其地者故司㑹因大府有郊甸縣都之等故總言田野九功之賦出於嬪婦臣妾民功所成者司㑹因九職皆有布縷之征故總言民職非既有九賦之賦又有九職之貢也唐氏曰先儒謂萬民有九職之貢又有九賦為口率出泉先王取民以什一貢與賦不幾二乎古之賦民各因其所有豈以口率出泉如後世乎蓋其見大府既言九賦又言萬民諸侯之貢以九職既貢其物不得不以九賦為口率出泉又見司㑹致邦國之財用令田野之財用令民職之財用亦析為三益信其說曽未深考之耳大府言九賦以頒財言非既使之貢又賦之也閭師任民止於國中四郊而甸稍縣都不與焉縣師徴野之賦貢而國中四郊不與焉載師任地又有在鄉遂井牧之外者故司㑹互見以相備於九功言民職於九賦言田野云耳關市山澤邦中之賦皆有九賦豈田野所能該而甸稍縣都豈無民職之財用九賦出於九職九職輸為九賦豈有既賦之而復責之貢哉唐氏之辦貢賦可破千古之惑但九賦之中與邦國之貢亦有以泉代物者以道逺不可致也况外府専掌邦布之入豈可全無以泉代賦乎但九功之賦專為嬪婦之職而言耳故曰令民職之財用也掌國之官府郊野縣都之百物財用凡在書契版圖者之二以逆羣吏之治而聼其㑹計以參互考日成以月要考月成以嵗㑹考嵗成以周知四國之治以詔王及冡宰廢置釋曰不言邦中而言官府者以官府之在邦中也書簿書也契最凡也版户籍也圖土地形象廣狹也凡書契版圖掌於司書司㑹主鈎考故掌其二諸處百物皆資財用以成司㑹欲知財用出入之數故掌其書契欲知夫家山林川澤所入之財數故掌其版圖逆為有所治政則司㑹按書契版圖以逆之而又聼羣吏計㑹之書焉諸官府一日所涖之事有數總其數而計之有目總一旬之數而結之有凡以凡考目以目考數是之謂參凡與數相考數與目相考是之謂互日成則旬計也月計曰要嵗計曰㑹積日而月又以月要考月成積月而嵗又以嵗㑹考嵗成詳略並施久近兼察則四國之吏治其勤怠不可隱矣詔王廢置者四國之吏治莫逃乎司㑹則以其勤怠之績告王及冡宰升有功而黜有罪此司㑹所以為冡宰之重職也故以中大夫為之焉司書掌邦之六典八法八則九職九正九事邦中之版土地之圖以周知入出百物以叙其財受其幣使入于職幣凡上之用財用必考于司㑹正音征釋曰九職即九賦九貢也九正即司空以九等制天下地征司徒載師掌賦貢之事也九事即九式也邦中之版城郭園㕓閭族之圖也土地之圖山林川澤之數入者賦也出者式也已上所掌與司㑹同者以司書掌書記司㑹掌鈎考二官實相須焉叙比次也受其幣受財幣之簿書也次叙掌事者之財以知其餘乃以幣餘之簿書受之於官府都鄙入於職幣使振舉其物也幣餘充九賦之目者也非司書則何所考然此所入至多非法度嚴密則皆為吏所欺隱矣凡關乎國體者皆曰上不專指王也上之用財必紀録其用財之數抱其書往考於司㑹防其侈用而妄費也三嵗則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之徵令凡稅斂掌事者受法焉及事成則入要二焉凡邦治考焉釋曰三嵗則以㑹計之書佐太宰以大計羣吏之治凡民財之有無器械之備乏田野夫家六畜之開墾衆寡登耗莫不有數存焉至於山林川澤厄塞之處無不稽焉以逆受而鈎考之則羣吏之徵令多寡當否遲速舉可知矣司書掌九職九正則稅斂之法備於司書掌事者如載師閭師縣師皆於司書處受法焉取民不得過制也事畢使之入要二之書則知稅斂之多寡完否其要將以致諸朝其二藏之以為勾考之證邦治考之者司書自六典八法已下無不掌其書是以邦治於此乎考也則司㑹一職又大府之本也職內掌邦之賦入辨其財用之物而執其總以二官府都鄙之財入之數以逆邦國之賦用凡受財者受其二令而書之及㑹以逆職嵗與官府財用之出而叙其財以待邦之移用釋曰職內主㑹計邦賦之入其類不同職辨其物而執其總則邦賦之大數可知矣以其總數副官府都鄙財入之數則邦國財用多少可以勾考其得失也羣吏受財以給公用者職嵗之事二令者職內為副令而類書之及嵗終以㑹計以已入財之數鈎考職嵗出財之數與夫官府所出財用之數參互鈎考也然後比次其財如國有大用內府之所共國有小用外府之所待若夫有無多寡豐歉盈虛出於天之所為非人力所及者必預備於此緩急相資為移用焉職嵗掌邦之賦出以二官府都鄙之財出賜之數以待㑹計而考之凡官府都鄙羣吏之出財用受式法于職嵗凡上之賜豫以叙與職幣授之及㑹以式法贊逆㑹釋曰職嵗掌邦賦之出者故凡官府都鄙之財或出以給用或用以賜豫皆書其數以二之備嵗終㑹計而考之也蓋有數以計其財有書以二其數則財用之多寡費出之當否皆可考而知矣每嵗羣吏用財多寡具有成式大府以式法授之職嵗故凡出財用者于職嵗受之叙受賜者之尊卑也幣餘之賦以待賜豫職幣所掌也故以叙與職幣授之嵗終之㑹則以九式之法贊助司㑹以鈎考羣吏之計也此與職內同者凡內外府應於財用皆計於司㑹職內職嵗又所以贊司㑹也職幣掌式法以斂官府都鄙與凡用邦財者之幣振掌事者之餘財皆辨其物而奠其録以書揭之以詔上之小用賜豫嵗終則㑹其出凡邦之㑹事以式法贊之釋曰職內職嵗既以稽財用之出入則必有餘財其數不可亂也故立職幣以收之幣者給公用之餘財也收之有式法焉斂官府都鄙與凡用邦財之幣此㑹計餘財之入也振猶舉也掌事者所用有餘不鈎考則沈墜矣故舉之以為給賜豫之用所以在九賦之末既斂得幣則當辨其物知類之善惡而奠定其録又書為標目各入一府使知價數多寡然後度其用之所宜以詔王之小用或賜豫焉若大用則各有式法者存嵗終㑹計其出入之數所以防冒濫也凡諸官府㑹計財用之事職幣以式法贊司㑹而勾考之知其餘則入於職幣故也黃氏曰周公設官理財居半財用之數驗之以書契督之以要成證之以二令考之以參互制之以式辨之有類執之有總小數之則乘大數之則㑹職嵗所叙職幣所振雖餘財然猶加肅焉葉氏曰成周理財大法在於設司㑹之官也故官府邦國都鄙山澤郊野其出財也有地九貢九賦九功其取財也有法以九式之法令財用其用財也有節苟不設司㑹之官以司㑹計則於羣吏四國之治豐歉盈虛之數書契版籍之稽有所弗考不立其屬則於出入頒授移用振餘有所不知是以既立司㑹以執其總又立四官以治其凡則彼此相稽式法相維國無聚斂民財不乏官無盜臣而君用不匱成周之世百姓足而君無不足者由設官之有道也漢髙帝以張蒼為計相此近周之司㑹其後諸府各自置官以為管計此官遂廢豈知成周立中大夫以為計官位尊權重則糾察鈎考之勢得行於諸府之中有司不能用其奸欺人主不能肆其侈欲後世主㑹計者或以屬官以屬官而㑹其長勢必有不行矣讀周禮者知大府之可以統諸府知司㑹之可以臨大府又知太宰之所以用司㑹則理財之法庶乎可得而論者司裘掌為大裘以共王祀天之服中秋獻良裘王乃行羽物季秋獻功裘以待頒賜釋曰裘以獸皮為之大裘黑羔裘冬至祭天於圜丘服裘被冕而祭天示質也言大尊之也良善也玉藻所謂黼裘也為八月誓獮田所用仲秋獻之行羽物鳥獸毛毨之時罻羅可設故以羽鳥賜羣臣以應秋氣也功裘人功多謂狐青麛裘之屬不如良裘之全卿大夫所服也季秋授衣之節故獻之以待頒賜羣臣也王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大喪廞裘飾皮車凡邦之皮事掌之嵗終則㑹唯王之裘與其皮事不㑹鵠古毒反廞音斂釋曰王大射謂將有郊廟之事以射擇士者也侯以布為之以皮飾其側鵠棲皮於侯中也虎侯中廣丈八尺鵠方六尺王所自射也熊侯中廣丈四尺六寸大半寸諸侯所射豹侯中廣一丈鵠方三尺三寸小半寸卿大夫以下所射此王之大射諸侯與卿大夫將祀其先祖亦與羣臣射而擇士諸侯之大射熊侯諸侯所自射豹侯其羣臣所射卿大夫之大射麋侯君臣共射焉士不大射祭無所擇侯必用虎豹熊麋之皮示服猛也鵠小鳥難中也廞裘與廞樂器同蓋陳儀物於庭序也儀物皆德之所寓故陳之皮車以革鞔遣車邦之皮事謂用皮也掌皮主斂皮司裘主用皮故曰掌皮事裘則皮之已制者耳掌皮掌秋斂皮冬斂革春獻之遂以式法頒皮革于百工共其毳毛為氊以待邦事嵗終則會其財齎釋曰全毛者謂之皮去毛者謂之革鳥獸毛毨之時其皮善故秋斂之革須練治故冬斂之皮革逾嵗乾久故春獻之獻其良者於王以入司裘給王之用也式法作物所用多少之故事也百工如裘氏韋氏函氏之類毳毛之細褥者以為氊當用則共之邦事若大旅張氊案之屬財斂本數及餘者見在者齎給豫人以物為資用者原曰司裘掌皮繼財官之後者皮革取於田狩非九賦之目故也自此以上為外政自此以下為內政內宰掌書版圖之法以治王內之政令均其稍食分其人民以居之釋曰內宰治王內之政對太宰治百官故曰內宰太宰不稱外者統乎內也書者所以教宫人六宫之隂禮九嬪之婦學九御之婦職閽寺之法禁皆其所以為書也宫內百職之名氏皆載於其版宫寢內外之廬寺皆畫於其圖王內后宫也政令施於閽寺者均平也稍食祿廩也無秩而有職事者謂之人民分之者使男服事乎外女服事乎內內之官府春官世婦掌之外之人民內宰掌之閽竪通乎內外之間不廢其職不違其事此內宰之尊所以兼統內外而令其别於男女之間耳以隂禮教六宫以隂禮教九嬪以婦職之法教九御使各有屬以作二事正其服禁其竒邪展其功緒竒紀宜反邪似差反釋曰鄭氏曰隂禮婦人之禮六宫謂后也不敢斥言若今稱為中宫婦人稱寢曰宫后象王立六寢而居之亦正寢一燕寢五劉氏曰六宫之主王后也后雖尊而四德具備不敢怠於聼學者日新其德以為六宫之範也故詩稱尊敬師傅言告言歸以為后妃之美周公所以擇下大夫之賢者為內宰而教王后者此書其實也愚謂內宰之教六宫豈親教之哉蓋立世婦宫卿於內以為后夫人以下之傅毋以施內宰之教法其官屬於禮官不為內宰之屬者內外相維之義而奄竪通傳其命令耳言告師氏者豈告於男子耶九嬪九人不言夫人世婦者舉中省文其教同也九御女御也九九而御因以號焉婦職謂織絍組紃縫線之事各有所屬者自夫人下至女御三三為屬如姪娣之於媵以相親愛俾無妬忌之心也二事謂絲枲也正其服后六服夫人揄翟闕翟九嬪則鞠衣世婦則展衣女御則褖衣正之不使踰僣也竒則怪而不常邪則僻而不正謂越常正以立異用祕計以求媚者展省之也絲枲女功之本及縫線之事皆有功緒必省而稽之張南軒曰古者后妃之貴亦必立師傅以教詔之葛覃言歸必以告師氏而左氏傳亦謂傅母不在宵不敢下堂則知師傅之職所以朝夕教道之者也法家佛士非惟人主不可一日無在后妃亦然誠以人心易動貴驕易溺處其極而無所畏憚則其憂將有不可勝言者周家歷世相傳其君子則重稼穡之事其室家則躬織絍之勤相與咨嗟嘆息服習乎艱難咏歌其勞苦此實王業之本也夫治常生於敬畏而亂常起於驕肆使為國者每念乎稼穡之勞而后妃又不忘乎織絍之事則心不存焉者寡矣是心常存則驕矜放肆何自而生豈非治之所由興也與大祭祀后祼獻則贊瑶爵亦如之正后之服位而詔其禮樂之儀贊九嬪之禮事凡賓客之祼獻瑶爵皆贊致后之賓客之禮凡喪事佐后使治外內命婦正其服位釋曰大祭祀祭宗廟也祼謂王既祼而出迎牲后乃從后祼也獻謂王薦熟后亦從後獻也贊詔相其禮事也瑶爵亦如之者謂尸卒食王既酳尸后亞獻之其爵以瑶為飾此三事內宰皆令春官宫卿詔相其禮也王后之服如祭先王則禕衣祭先公則當揄翟羣小祀則闕翟是也正其位房中户內及阼階所立處也禮樂之儀謂后出入行薦徹之禮進止之節當與樂相應者詔相之九嬪贊后薦玉齍薦徹豆籩內宰又令宫卿詔九嬪贊后之事也賓客之禮先王承賓猶承神也故大饗之禮略如祭祀賓客王同姓尊屬及二王後來朝覲為賓者祼之禮亞王而禮賓獻謂饗燕亞王而獻賓也瑶爵所以亞王酬賓也后之賓客公卿大夫之妻外之命婦也禮若牢醴及醫酏糟之類此皆內宰令宫卿致之也使后之所使也內命婦王之嬪御及內外宗有爵者外命婦卿大夫士之妻也衰麻之服哭泣之位從而正之佐也治也正也皆內宰掌禮之事也凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以隂禮釋曰始建國君立朝后立市隂陽相成之義天子理陽道后治隂德朝陽而市隂也次司市之思次介次也叙謂各於其地之叙肆鋪設於市肆也陳列之也度五度丈尺也量五量斗斛也淳布帛之廣制布帛之長皆出於后宫之式所以一制度正民心絶詐僞也隂禮婦人之祭禮原曰至矣哉王立朝后立市之意乎古者后不預政非無政也后不主禮非無禮也立市者后之政乎隂禮者后之禮乎朝之政主乎義王與公卿大夫平章天下者也市者商賈販夫交易之處主乎利后令內宰立之者也夫市以通貨賄濟民用不可闕也先王不立於前而置於後政不出於王而出於后此見聖人先義而後利賤貨而貴德之意也且立其法曰君過市則刑人赦謂已親利則無以令乎人也至於夫人世子命夫命婦過市有罰者以身為君子當論道義而不當見財利也其賤之也至矣然必使后立之祭之者亦以隂能成陽利能和義財貨成家市肆成國先後之間治亂之分心術之判也觀之曽孟之所傳授拳拳於先義後利之戒其亦得於聖王之法乎中春詔后帥外內命婦始蠶于北郊以為祭服嵗終則㑹內人之稍食稽其功事佐后而受獻功者比其大小與其粗良而賞罰之㑹內宫之財用正嵗均其稍食施其功事憲禁令于王之北宫而紏其守中音仲釋曰中春建卯之月草木發生之時外內命婦見前北郊正隂之地也郊必有公桑蠶室焉祭義曰蠶事既畢遂朱緑之𤣥黃之以為祭服后之親蠶非徒以敬祖宗且以勸天下之女工也內人王宫之內之人也稍食㑹之於嵗終使無冒濫也稽計也既展其絲枲之功緒嵗終則稽之以知其勤怠也獻功者女御以下獻絲枲之功也比校也縷小則良縷大則粗賞罰之以示懲勸也內宫總六宫之內夫人以下所用之財皆㑹計之也賞罰於嵗終故均其稍食於嵗始勵功德也已施其功事於正嵗則稽其功事於嵗終别勤惰也憲表縣之也北宫王六寢在南后六宫在北也守宿衛者小宰正嵗以宫刑憲禁於王宫者前宫也內宰正嵗憲禁令於王之北宫者後宫也內外各設其禁皆受之於少宰上春詔王后帥六宫之人而生穜稑之種而獻之于王穜直龍反稑音六釋曰上春建寅之月六宫之人夫人以下分居之而宫卿世婦亦有府在焉先種後熟為穜後種先熟為稑古者使后宫藏種以其有蕃孳之祥必生而獻之示育之使不傷敗且以佐王耕事供郊禘也李氏曰普天之下蠶者非一女也將以為祭服有不足者乎而后且親蠶耕者非一男也將以共粢盛有不足者乎而且佐王親耕以事先舅先姑不敢不用力焉所以為婦道也王后之尊而親蠶天下之女子有不遵微行求柔桑者乎王后之尊而佐耕天下之女子有不饁南畝喜田畯者乎王后之尊而為婦道天下之女子有不承先祖以共祭祀者乎明王以孝治天下此其一助也鄭鍔曰后之尊與王同體賓客之來則有禮賓之事祭祀之時則有助祭之事建國則立市供祭服則親蠶耕藉則獻種是后不為無職也立內宰之官或佐之或贊之或詔之或正之如是其詳先王之意不止此耳中宫之貴椒房之寵命下大夫為之宰以掌宫中之政令而制以天下之公法實所以杜驕侈之原也內小臣掌王后之命正其服位后出入則前驅若有祭祀賓客喪紀則擯詔后之禮事相九嬪之禮事正內人之禮事徹后之俎后有好事于四方則使往有好令於卿大夫則亦如之掌王之隂事隂令好去聲釋曰后之內小臣與王之太僕同亦正其服位出入大命也命謂使令所為也服后之六服位祭祀賓客喪紀宫中之位出入前驅訶禁以肅衆也擯贊也有禮必有事擯則若執事介賓也詔則告之以言也相佐助也正正其失次也詔后相擯正內人者異尊卑也俎謂后受尸之爵飲於房中之俎膳夫徹王胙俎所以尊王內小臣徹后之俎所以尊后也好事謂恩好之事四方謂王后族親之在外內者必遣內小臣以修其問遺之好所以睦外親也好令謂恩好之令卿大夫謂族親有位於朝者隂事謂羣妃御見之事隂令則使詔告於北宫之命令也原曰周禮一書其餘奄皆不命也惟內小臣則有奄上士四人而已其他未有以爵稱者夫宦官之位天象所有指其居次則或在帷薄之內論其職掌則或聞牀笫之言固不可以詘辱俊乂渾淆男女其用奄人是乃制事之宜矣然古人之奄者皆是有罪刑人先王不枉其材而用之其間有謹信端厚可受爵者四人以掌王后命令正服位而已矣如後世所謂著青紫者千人皆無故而自刑者也夫極治之世無他人主親近端人正士不使刑人在側而已是以成周盛時內小臣閽人寺人之屬悉統於冡宰其職卑其數寡人主不得以私意昵內臣不得以非道干故侍御僕從罔非正人此先王治內之嚴也周衰春秋勃貂立公子無虧則奄人與廢立矣繆賢薦舍人藺相如則奄人預薦舉矣恃勢怙寵漢唐之間尚忍言哉閽人掌守王宫之中門之禁喪服凶器不入宫潛服賊器不入宫竒服怪民不入宫凡內人公器賓客無帥則譏其出入以時啓閉凡外內命夫命婦出入則為之闢掌掃門庭大祭祀喪紀之事設門燎蹕宫門廟門凡賓客亦如之帥色類反釋曰閽人刑人亦奄者墨者使守門則外門苑囿也中門雉門也王有五門外曰臯門二曰庫門外朝在庫門外羣吏衆庶皆可入也三曰雉門則非臣民所得妄入故閽人掌其禁四曰應門內則治朝也五曰路門內則燕朝也喪服衰絰也凶器死器也潛服若𠂻甲者賊器器之可賊人者竒服異常之服怪民左道惑衆者也凡此皆變異之事故不使入宫所以嚴禁密之地也先王治內之法正在乎此則巫蠱之禍何自興哉內人王內之臣公器王宫應用之器賓客公卿大夫之妻應得入見者三者出入須有帥道無帥則閽人譏察之以時以晨昏為啓閉之節也外內命夫命婦內外宗之夫婦皇族之人皇族之女也故得出入於宫中闢者闢除行人使無干犯也掃門庭致潔也燎大燭也古者之燭以荆百枚并而束之以為明也蹕止行人也廟在中門之外燎以致其明蹕以致其肅寺人掌王之內人及女宫之戒令相道其出入之事而紏之若有喪紀賓客祭祀之事則帥女宫而致於有司佐世婦治禮事掌內人之禁令凡內人弔臨于外則帥而往立于其前而詔相之釋曰寺之言侍也亦奄者為之內人女御也女宫幽閉之女在宫中者即女奚也戒飭其怠令趨其行相道其出入為之通內外也糾察也其不循則者寺人亦得糾察之有司掌禮之官寺人帥女奚以為之役則女宫乃宫刑之女可知世婦春官宫卿之命婦在宫中掌祭祀之禮者必用寺人以通內外則男女不親可見內宰之教令必以寺人通之內人王內之人有宗姻之喪而行弔臨之禮則詔相之立于其前者寺人賤也詔相者婦人不可無相禮也內竪掌內外之通令凡小事若有祭祀賓客喪紀之事則為內人蹕王后之喪遷于宫中則前蹕及葬執䙝器以從遣車釋曰竪未冠之稱蓋奄之小者法亦有宫刑而小也此專給內外通令之役故曰小事以其出入便疾若大事則有寺人焉為內人蹕亦女官之行於禁中者喪遷將葬朝於廟也䙝器振飾頮沐之器將葬而祭曰遣奠既祭乃包牲體載之以車隨柩而行曰遣車事死如事生之意也原曰內宰以下四官皆奄竪為之而女宫亦寺人掌之蓋皆役於內宰用以通傳教令者也可以見內宰之職掌矣其曰教六宫教九嬪九御紏察禁令豈必內宰親之無亦司其綱紀而世婦宫卿大夫士行其法度教戒歟然內宰宫卿亦不親授受也以奄竪女宫通之役之所以别男女者嚴矣故寺人職曰有禮事則帥女宫致於有司佐世婦治禮事者豈非幽閉之女春官之世婦乎後世不知女宫世婦之職故以內宰為混男女之别不得不用奄人易內宰之職又合世婦於天官使內官既無士人職掌又無女師教訓而幽閉之法不行以致怨女深幽上干隂陽之和奄人用事竊弄國家威柄何者而非內宰之職不明所致乎後之人主欲知齊家之道正本清源之法先於內宰世婦女宫奄人四者而復周公之舊斯乃致太平之首務也九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御叙于王所凡祭祀贊玉齍贊后薦徹豆籩若有賓客則從后大喪帥叙哭者亦如之釋曰王立一后三夫人九嬪二十七世婦八十一女御王之內宫盡於此矣春官世婦自宫卿至大夫士共六十四人此皆女師有德學老婦為之施內宰之教者也豈王妃嬪之等乎然則九嬪掌婦學之法正春官世婦所執以為教者於九嬪言之者以王九嬪尊故掌其法使春官世婦遵而行之婦德貞順也婦言詞語也婦容婉娩也婦功絲枲也婦學之法不過四者而已各帥其屬者王之內以三三為屬后之屬有三夫人九嬪各屬三妃二十七世婦各屬九嬪八十一女御各屬二十七世婦每三人而屬一人凡王之內人不過一百二十人為極今不著其數者不必備無可增也以時御叙於王所者王之燕寢也時御以時進御叙者其進有叙也鄭氏曰羣妃進御之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而偏自望後反之月初卑者為始月望後尊者為先所謂三五而盈三五而缺也玉齍玉敦盛黍稷之器也薦徹豆籩者后之事故九嬪贊之賓客謂諸侯來朝后助王燕饗時九嬪從后往當贊后事也大喪內外命婦皆依尊卑命數后哭衆以次序皆哭世婦掌祭祀賓客喪紀之事帥女宫而濯溉為齍盛及祭之日涖陳女宫之具凡內羞之物掌弔臨于卿大夫之喪溉古愛反釋曰祭祀祭宗廟也賓客饗食諸侯也喪紀朝廟設祖奠也帥女宫令女奚給役也溉拭也洗祭器食器也黍稷曰齍在器曰盛涖臨也春官世婦比女宫之具而王世婦則尊重親臨視之以肅衆也內羞房中之羞若糗粉餈之屬籩人醢人共內羞世婦涖陳之也劉氏曰王與后之祭祀賓客喪紀外有百執事各帥其屬夙夜厥職非不可以備其物致其誠也而必使九嬪世婦躬涖乃事而女御之職又以贊世婦焉蓋以婦人不事於宗廟賓客喪紀則不知所以事上之道使之豈獨致已之誠哉亦所以役之艱難俾盡其敬也則關雎之后妃召南之夫人立教於前而周官所以帥而習之於後者斯其為教不亦大哉九嬪視卿世婦視大夫故王使掌弔臨卿大夫之喪蓋王親族同姓者或使人致禮或往弔焉按世婦女御掌弔臨卿大夫之喪內宗亦云卿大夫之喪掌其弔臨則王后有臨諸侯之禮而此三官掌其事也夫王后於賓客有助王祼獻之事則其弔臨之禮固所宜有蓋古者君臣其分雖嚴而情則甚親其於天性之親往來報施之禮亦自不可已者後世君臣勢隔上下之間情愛漠然此治所以不如古也觀之王后世婦女御內宗俱有弔臨臣下之禮則成周君臣之間何等氣象今以後世人情而疑聖制甚不可也女御掌御叙于王之燕寢以嵗時獻功事凡祭祀贊世婦大喪掌沐浴后之喪持翣從世婦而弔臨于卿大夫之喪釋曰御猶進也侍也叙者以九人少長為叙燕寢之內不使九嬪世婦掌之者位尊則有禮也女御卑直役之而已且防上之專姤也功事絲枲成功之事嵗時獻之內宰佐后比其粗良而賞罰之則宫御雖貴職業必修矣李氏曰以女御職卑而掌燕寢則不敢嫉妬而九九之法行矣九九法行則內無怨女而子孫衆多矣夫男女人之大欲一有失時則怨曠七月女心傷悲東山婦歎於室君子殫於人情周家所以興也安得聚少艾之色幽於深宫之中而無進御之路則其性情之所感動何如哉四時何以能和百神何以降福闕繼社稷之重其有寵者或不宜子非廣其禮將無及也然則聖人之意逺矣祭祀贊世婦者助其帥涖女宫也沐用潘浴用湯翣障棺飾也天子八翣后同女御持之左右各四人從世婦者其數如使者之價云李氏曰男女之際人所甚重前哲備言之矣然而賢妃相成之道不世出而亂國亡家者實多也蓋婦人之性隂昧而柔弱昧不足以自見弱不足以自立與物而遷鮮克正也堯之試舜觀厥刑於二女以堯之女其淵源非不善尚曰舜能以義理下其心則凡女子不漸教摩禮不克使之行婦道明矣今人數口之家猶以婦傾况后妃同體於王其次嬪御亦所愛幸一舉事足以旋轉天地薄蝕日月其為禍福可勝言哉貴則為驕富則為侈並寵則妬不答則怨憎則有讒言愛則有私謁府庫或為之空刑賞或為之濫姦邪或為之昌忠良或為之剝其他患禍可勝言哉成周內宰之職王宫之中下至女御皆受教皆知禮皆習業德皆正言皆順無冶容無侈服無邪道則閨門之內何有不肅溥天之下何有不化關雎之不淫葛覃之躬儉樛木之無嫉妬螽斯之多子孫於斯見矣王道安得不成乎女祝掌王后之內祭祀凡內禱祠之事掌以時招梗禬禳之事以除疾殃梗古猛反禬古外反禳如羊反釋曰女祝之設所以敬鬼神除疾殃也王有大祝小祝后亦有女祝聖人通天地幽明之故祭必用祝所以交神明疾殃禱祠亦人逼切之至情也故雖王之后宫亦必設焉內祭祀竈門户也王立七祀三在內此也禱祈福也祠報福也招招取善祥梗捍患之未至禬以除災禳以弭變故有疾則禱有應則祠祈祥則招備虞則梗有災則禬有害則禳此皆欲除去疾殃之事也故立女祝以主之女史掌王后之禮職掌內治之二以詔后治內政逆內宫書內令凡后之事以禮從釋曰女史之於后猶太史之於王擇嬪御之賢而有學有藝者為之令執彤筆在宫中書王后夫人言動以佐內治嬪御德之善惡進御之不以其叙皆書之故后宫皆知懼而修德后之禮如祭祀則有薦徹賓客則有祼獻女史掌之內治之二二內宰也掌之以詔后治內宫之政令鈎考六宫之計后有命令則書之凡后有禮事則執書以從猶太史執書協禮事也典婦功掌婦式之法以授嬪婦及內人女功之事齎凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而揭之以共王及后之用頒之于內府賈音價釋曰婦式之法絲以為帛枲以為布其制治皆有常法其多寡皆有常數也嬪婦九嬪世婦內人女御女宫以下皆頒授此婦式之法也女工絲枲之功齎費用之財也授事者授其所為女功之事授齎者授其所為女功之財也王之內人自九嬪世婦以下皆治絲枲皆有婦功故女御曰以嵗時獻功事此周家之法也及至末世詩人刺之曰婦無公事休其蠶織此周之所以亡也授嬪婦功不特授之而已及秋皆令其獻成功於后也內宰佐后受獻功者亦比其大小苦良而賞罰之典婦功則辨其大小苦良而定其賈書其賈數與物多少以共王后之用上於內宰王后監之頒於內府藏以待用然則成周王之內宫無不蠶績之女其功緒有稽如此則無驕逸之失矣此內宫之中典婦功所以設也典絲掌絲入而辨其物以其賈揭之掌其藏與其出以待興功之時頒絲于外內工皆以物授之凡上之賜豫亦如之釋曰絲入九職之嬪婦所賦分以宅地者所謂里布也后宫親蠶亦有之辨其物有美惡之不同則以其所值之賈書而揭之者將以為授功獻功之程也掌其藏出者未興工之時受而藏之待興功之時出之以頒於外內工使化治之也外工外嬪婦外宗及諸侯卿大夫之妻內工內宗女御女宫也以物授者若縑帛授以素絲文繡授以采絲也王之賜豫以絲豫人也亦如之皆辨其物以授之也及獻功則受良功而藏之辨其物而書其數以待有司之政令上之賜豫凡祭祀共黼畫組就之物喪紀共其絲纊組文之物凡飾邦器者受文織絲組焉嵗終則各以其物㑹之纊音曠織昌志反㑹古外反釋曰良功絲之縑帛苦功麻之布縷帛視布為美典絲者受之辨其物之美惡書其數之多寡以待有司若司服辨師之類政令禮物法度之政也上謂王后或夫人賜豫以絲頒賜人也王介甫曰典絲受良功而不受苦功典枲受苦功而不受良功則絲之良麻之良皆典婦功所受也且典絲所共則祭祀黼畫組就喪紀組文之物是乃王之致孝乎鬼神致美乎黼冕也其受良功不亦宜乎白與黑間謂黼采色一成曰就自衮衣九章而下皆畫衣而繡黼於裳則黼畫其服也天子繅斿十有二就以組為冕旒之就曰組則組就之為冕皆祭祀之用也用絲以為線縷用纊以充衣縟用組文以為物之飾皆喪紀之用也邦器茵席屏風之屬文織以文為織華采之繒也絲組以繫屬也凡此皆典絲共之嵗終則以出入之數計其所用之多少焉典枲掌布緦縷紵之麻草之物以待時頒功而授齎及獻功受苦功以其賈揭而藏之以待時頒頒衣服授之賜豫亦如之嵗終則各以其物㑹之齎古作資釋曰枲麻也布枲之已成者緦縷紵枲之未成者麻者麻之為枲者草者苧葛之為枲者故曰麻草之物時興功之時頒之於內外工授齎計其當用則授麻草使為布緦史氏曰布重而緦輕布視帛為惡故曰苦功以賈揭之者辨其苦良之賈以待頒賜之時也上分别其賈揭藏之此則以其物頒授之賜豫以布賜人也嵗終則㑹計其頒與賜之多寡也皆與典絲同原闕而不畫其色赤此三者皆祭服也從王祭先王則服禕衣祭先公則服揄翟祭羣小祀則服闕翟鞠衣黃桑服象桑葉始生月令三月薦鞠衣於上帝告桑事焉展衣其色白以禮見王及賓客也緣衣其色黑燕居及御於王之服也六服備矣婦專尚一德無所兼連衣裳不異色素沙今之白絹也六服皆以素沙為裏以示其德之一也素則取其內之純白也紗則取其外之疏通也內命婦服此三等外命婦其夫孤服鞠衣夫卿大夫服展衣夫士服緣衣三夫人三公之妻其闕翟以下乎侯伯之夫人揄翟子男之夫人闕翟惟二王之後禕衣亦皆以素紗為裏也后祭祀共三翟賓客共展衣及九嬪世婦謂助后祭祀賓客之時凡命婦謂女御與外命婦也外命婦唯王祭祀賓客以禮佐后得服此上服自於其家則降焉喪衰九嬪以下於王服斬衰於后服齊衰后喪所共衣服者謂襲時十二稱小斂十九稱大斂百二十稱內具生時所用紛帨線縷纊鞶之屬也縫人掌王宫之縫線之事以役女御以縫王及后之衣服喪縫棺飾焉衣翣柳之材掌凡內之縫事翣所甲反釋曰縫線婦人之事故以女御掌之奄以董其工奚以共其事也女御所以取其制授之修短者也以役女御者女工聼女御所役使以王與后尊非女工之所度量也宫中之縫事則其專為焉棺飾帷帟翣柳之類衣翣柳之材者翣如方扇持之以蔽棺柳柳車也柳隂木為喪車謂之柳車翣以木為體用彩繒纒之以為飾也縫線小事也立其官以女御女工為之可見古人重女工則後宫之女非無事矣染人掌染絲帛凡染春暴練夏纁𤣥秋染夏冬獻功掌凡染事暴步卜反夏户睢反釋曰染人以下復用士人以其功非女工也染絲者染而後織染帛者織而後染春陽和故暴曬其練練其素而暴之謂之暴練春絲始成且天不燥烈也纁黃而兼赤色𤣥赤而兼黑色以其隂陽雜而成文夏暑熱潤之時以朱湛丹秫易以和釋故染纁𤣥而為祭服也凡六冕之服皆上𤣥下練染夏者夏五色之總名夏翟自然而成五色其類有六曰翬曰搖曰曰災曰希曰蹲其毛羽五色皆備成章染者擬以為深淺之度秋凉之時乃可染備色春暴絲練夏秋染色至冬織功乃成故獻功也凡染事謂不止絲帛也追師掌王后之首服為副編次追衡笄為九嬪及外內命婦之首服以待祭祀賓客喪紀共笄絰亦如之釋曰追治金玉故名追師冠飾於首故謂首服副之言覆也所以覆首為飾其遺象若今之步搖服之以從王祭祀編編列其髮以為之其遺象若今之假紒服之以桑也次次第髮長短為之所謂髲髢也服之以見王記曰夫人副褘以配褘衣首飾之上也婚禮女次純衣則次配純衣為下也然則編居中配展衣矣此三翟之首服也追治也王后之衡笄以玉為之唯祭服有衡垂於副之兩旁當耳其下以紞懸瑱笄長一尺二寸以卷髮而節之使平也外內命婦衣鞠衣袒衣者服編衣緣衣者服次非王祭祀佐后之禮自於其家亦降焉纚笄總而已喪紀笄而又加之以絰九嬪內外命婦之所服亦如之屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青句素屨葛屨辨外內命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之繶於立反句音渠釋曰首服在上貴故辨師追師分掌之屨舄在下賤故男子婦人同於屨人掌之服屨者服各有屨也重底者為舄單底者為屨王之吉服赤舄為上冕服之舄也后之吉服𤣥舄為上禕衣之舄也凡舄之內有屨屨外又加以舄王赤舄下有白黑二舄后𤣥舄下有赤青二舄但言黑赤特言其尊者繶者屨頭牙底相接處綴絛於其中也句當為絇謂屨頭以為鼻也素屨祭祀之屨葛屨夏月之屨命夫之屨纁屨也命婦之屨黑黃屨也功屨以人力為之若功裘散屨無絇喪屨也以宜服之夏則用葛冬則用皮也上明王及后尊者舄屨此明臣妻及嬪已下之屨也外命夫六卿以下也內命夫朝廷卿大夫士也其妻為外內命婦命夫之命屨纁屨命婦之命屨黃屨以下功屨次命屨於孤卿大夫則白屨黑屨九嬪內子亦然世婦命婦以黑屨為功屨女御士妻命屨而已散屨亦謂去飾祭祀而有素屨以宜服者謂各以尊卑所宜之服服之若散屨惟大祥時所服夏采掌大喪以冕服復于太祖以乘車建綏復于四郊釋曰謂之夏采者采色所以重生之道也喪則哀素事死之道也復者所以幸其生故名以采色而置一官列其事臨時設其職也大喪王喪也復禮行於始死屬纊絶氣之後以招魂也古人死則使人以其上服升屋北面而號曰臯某復遂以其衣三招之乃下以覆尸冀其復生也於祖於四郊皆其平生所有事之處也復於祖廟以所服之冕服復於四郊以所乘之車綏冀神魂識之也綏讀為緌以旄牛尾為之綴於車上之􅓚詩所謂孑孑干旄是也原曰自內司服至夏采皆掌衣服之官修身之事也而內司服縫人染人所以掌其服於身者追師所以掌其服於首者屨人所以掌其服於足者夫服為身之章不盡其制則等級何以辨不列於內治之末何以見婦功內宫所不可廢至於夏采為天官之終者以復盡愛之道先王所以愛其親至誠慘怛以至於此所以為修身之終事也周禮全經釋原卷三
