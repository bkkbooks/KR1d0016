body:
  text: 周禮全經釋原後序聖人之言曰為國以禮蓋天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉此理之自然也君子循乎此理故其為國自君臣父子之大以至言動威儀之細其多至於三千三百而莫非長育流行之體天地萬物自然之定序也但吾不以私意擾之則天地順序而萬物各得其所顔子克已而復之於一身堯舜安仁而達之於天下其為禮一也故曰天叙有典自我五典五惇哉天秩有禮自我五禮有庸哉天命有德五服五章哉天討有罪五刑五用哉謹之於人心之危道心之微而達之於水火金木土穀惟修正德利用厚生惟和者惟一事而已所謂順此理而不以私意擾之故曰夫何為哉恭已正南面而已矣得此於上堯舜所以有天下而不與也得此於下仲尼所以飯疏食飲水而樂在其中也故曰百官萬務金革百萬之衆飲水曲肱樂在其中萬變皆在人其實無一事由求之徒未達此禮故不免規規於事為之末顔子其庶乎故子語之曰行夏之時乘殷之輅服周之冕樂則韶舞嗚呼周公之道其不在兹乎其經之存於今者有儀禮周禮他經言其理二禮見諸用此固古聖人所以修身齊家治國平天下之實事也佛老見其大而不見其實則騖而為虛名數之家見其細而無見其大則拘而為陋二禮之不明也久矣補而為戴記衍而為箋疏得者什三害者什五漢儒譬之周公守藏吏也名物充陳不問良楛天球河圖兊之弓和之矢與夫名材毒藥敗鼓之皮但傳以為先世所遺者皆籍記而封守之惟謹王安石啓漢儒之藏用其毒藥以療人之饑渴遂禍天下世之以是為周禮病則亦過矣紫陽朱夫子見高千古學總羣哲嘗加裁定而天不假年此志不就顧其書雖未成而綱領具在條目粲然足為後聖之所據依昔人所謂固將有待焉者也學者能因其遺書而發明補正之以俟有在上之王者在下之聖者而裁焉固亦朱夫子待後人之心也長樂柯君獨能有志而精考力求以知夫禮之所以為大而且切者不泥於名法之拘陋箋疏之駁雜於三代聖人之所以為心而舉而措之天下國家者深為有見其於周禮有全經蓋取遂人以下地官之半實冬官也不煩割裂紛亂而全經自復乃集諸儒之說以釋之發所見以原之其間如鄉遂為畿國之本與井田簡易之法賢能職位之辨貢賦中正之則郊禘仁孝之道作樂聲氣之元軍伍儲選之制皆有獨見非先儒所及昨歲遇豫雲陽一語意合遂辱定交一日盡攜所著過豫于草堂而相訂焉且以序屬豫愧謝以非所敢而柯君之意堅甚噫柯君之用心固古人之心也其敢終辭因綴言於末簡云柯君之志尚欲修儀禮與周禮並傳然後於古聖人所以修身齊家治國平天下之實事為備其書條理精密但取周禮聨識以補王朝之禮尚未及成他日當有知柯君而為之表章者兹以周禮故預及之金壇王樵序
