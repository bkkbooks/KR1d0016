body:
  text: 周禮全經釋原卷十明柯尚遷撰夏官下司士掌羣臣之版以治其政令歲登下其損益之數辨其年歲與其貴賤周知邦國都家縣鄙之數卿大夫士庶子之數以詔王治釋曰版方板名籍也羣臣之版凡在位在職之名籍也治其政令以詔王治蓋辨賢否高下以詔王為廢置之舉此其政令也賢而上其籍謂之益而登之也不賢退廢去其籍謂損而下之也歲一更其籍三年而後進退之辨其年則以知其齒之壯老辨其歲則以知其任之久近貴謂大夫以上及世代仕宦者賤謂士以下及世代庶人者或曰以有德加爵為貴以任職不加爵與降爵為賤亦通邦國列國諸侯也都家卿大夫食采者也縣鄙大夫士之祿在六遂之外也庶子卿大夫士之支子衆子也周知諸侯之數考畿外諸侯所承襲之人也周知都家縣鄙之數考國中任職之人也周知卿大夫士庶子之數祿其賢者將用之餘以衛王宫也詔王治賢否必以告王而使王廢置之也王制曰司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官而後爵之位定而後祿之則司士之職也以德詔爵以功詔祿以能詔事以久奠食唯賜無常釋曰凡公侯伯子男五等通於天下公孤卿即上大夫三大夫三士六等施於國中皆爵也爵以授德則賢者在位之選也故有德則告於王而爵之自諸侯之士下王朝之士一等下士視上農倍至君十卿祿皆所謂祿也祿以酬功故有功者告於王而祿之故有德則有爵有才則有功爵祿必相須德其本也祿亦以賦賢者在位之爵也事者職之事也職有大小能之大小稱之故有才能者則告於王使各任以職事此能者在職之選也食者任職之廪俸也食有多寡治之大小稱之事成於久任則有成績然後廪餼可稱其事也不詔王者乃所當得之稍食也故以德詔爵所以貴之以功詔祿所以富之以能詔事所以任之以久定食所以養之先王治官之法亦盡於此矣書曰德懋懋官功懋懋賞建官惟賢位事惟能此之謂也唯賜無常者賜出於王之特恩八柄王所執也恩有輕重則賜有厚薄何常之有謂不可以有司之法制繩之也正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上司士擯孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右太僕前王入內朝皆退釋曰人君之視治朝也自公孤卿大夫以至宿衛之士僕從之臣皆有常位正其位使不差辨其等使不亂司士之職也鄉明以聽天下者王故王南鄉鄉王而答之者三公故三公北面孤佑王者也故東面卿大夫佐王者也故西面王族故士虎士太僕大右大僕從者則從王者也順王所向故南面三公東上則北面以東為右故也自孤以下則皆近尊為上公以上皆言面王獨言鄉其體尊故也鄭氏曰王族故士故為士晚退留宿衛者也未嘗仕雖王族不得在王宫大右司右也太僕從者小臣祭僕御僕𨽻僕是也司士擯詔王出揖公卿以下朝者也卿大夫士皆君之所揖禮春秋傳所謂三揖在下者也特揖一一揖之旅衆也大夫爵同者衆揖之公及孤卿大夫始入門右皆北面東上王揖之乃就位三孤六卿尊故特揖之大夫卑於孤故中大夫下大夫各以等而衆揖之士又卑於大夫故上士中士下士旁三揖焉王還揖門左揖門右則在門左右者皆南向故也大僕前正王位故也王入內朝皆退王視事於治朝既畢而入內朝則事官皆退也內朝在路門內亦謂之燕朝掌國中之士治凡其戒令掌擯士者膳其摯凡祭祀掌士之戒令詔相其法事及賜爵呼昭穆而進之帥其屬而割牲羞爼豆凡㑹同作士從賓客亦如之作士適四方使為介釋曰士治士之仕於王國者治其進退損益也與其告戒命令皆掌於司士焉擯士者告見初為士者於王也膳其摯所執羔雁之摯入於王之膳人以示納用其德也祭祀羣臣之有事者皆掌其戒令也法祭祀之法度事行禮之事也皆司士詔相之賜爵神惠及下也謂祭祀未旅酬無算爵之時皆有酒賜及王之子姓兄弟司士呼昭穆而進之祭統曰凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂也凡有割牲及進爼豆之事皆帥其屬以為之㑹同作士從者選其行藝而進之以從王也迎待賓客亦司士選士焉若王選士使適四方司士則使士為之介如上卿使則大夫為之介大夫使士為之介蓋命使者王之事選介則司士揖之焉大喪作士掌事作六軍之士執披凡士之有守者令哭無去守國有故則致士而頒其守釋曰大喪掌奠斂及各執事皆司士選其士使任之披柩車所以持棺者有紐以結之謂之戴披六軍之士大司馬所掌亦司士作之守喪事之官守也又令有執於喪者雖哭不得去守官不可空也國有故兵與災也亦司士召致諸士頒其執事之守也故選任之權皆掌於司士所謂以能詔事也是理財用人二者治天下之要務也生財在司空理財在冡宰教人在司徒用人在司馬司士司馬之屬也此意之不明久矣凡邦國三歲則稽其士任而進退其爵祿釋曰自頒其守以上皆言王國之中者故曰掌國中之士治此則言掌侯國之士治也故曰凡邦國然王國無時不稽士任而考課之權在冡宰邦國則三歲稽其士任而考課之權在司馬蓋司馬專掌諸侯故也邦國之臣進退爵祿皆司士掌之則豈如後世封建一任其君所治而天子不與聞耶王昭禹曰邦國之士皆命於王其仕有勤惰爵祿有進退者則司士有三載而稽考之此黜陟勸沮之法所以皆本於王朝而國無異政也春秋之時列國之爵位名號皆自巳出故孔子譏之葉氏曰司士以久奠食又曰凡邦國三歲則稽士任而進退其爵祿以三年為任官之定制而升降黜陟之法乃視此為進退與是法也不惟行於王畿而通行於邦國都鄙矣蓋古人爵人以德不觀其暫而觀其常祿人以功不觀其驟而觀其素任事以能不揆其始而揆其終議論要諸久而後定功效要諸久而後成此先王所以久於任人而不驟遷也唐虞任人之法必三載而後考績三考而後黜陟何也唐虞之官簡故九載而黜陟成周之官衆故三年而誅賞大宰雖曰歲終詔王廢置而羣吏之法亦必待三年然後大計而誅賞之孔子曰如有用我者三年有成子路亦以及三年而可有勇皆以三年而觀政也此其為中制而可為賢能遷轉之叙明矣然司士所稽者士任爾大臣如公侯伯之有功德者又豈可以例遷乎內而周公為太師召公為太保外而康叔之治殷民君陳之正周郊苟稱其職終其身而任之也豈若後世銖功勞以計進守歲月而希遷哉諸子掌國子之倅掌其戒令與其教治辨其等正其位國有大事則帥國子而致於大子唯所用之若有兵甲之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正凡國正弗及倅七內反釋曰倅二也國子王庶子公卿大夫元士之子皆謂之國子其適子則受業於師氏保氏其成材受業於大司樂其庶而介於適子者則為國子之倅諸子掌之以宿衛王宫者也而宫正亦領之焉戒令告戒命令也若致於太子之事教治修德學道也辨其等以父之爵為等明貴賤也位朝位次序也鄭氏曰凡入學以齒則叙其齒以為之位也大事軍旅之事也國子即其倅二也致於太子者公卿大夫士則聽於王其子則聽於太子休戚同之所以同心一體無異慮也唯所用聽天子之驅使也兵甲之事則或寇戎侵及郊畿也授以車則馬可知授以甲則兵可知合其卒伍百人為卒伍人為伍置其有司謂伍長兩司馬卒正之數臨時聨合其卒伍立其長帥以行征伐也可見鄉遂之卒伍亦必臨時簡稽而聨合之以軍法治之其造作進退一如軍旅之事司馬弗征以為國之貴遊故司馬不得以兵賦征之也國征謂鄉遂起甸徒力役之事皆弗及也李氏曰大哉王者之師其備矣乎非直興於閭里而又取諸世族彼以父祖貴富宜有報上之心況學習德行道藝孰不知忠孝之美任之以金革與夫干賞而蹈利庸徒鬻賣者蓋有間矣且太子將為君國子將為臣君臣之分未定而恩義固已接於今日之逰倅未必不為嗣王之將帥也文王世子曰公若有出疆之政庶子以公族之無事者守於公宫正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室此諸侯禮也豈天子之事而有不用力者乎大祭祀正六牲之體凡樂事正舞位授舞器大喪正羣子之服位㑹同賓客作羣子從凡國之政事國子存遊倅使之修德學道春合諸學秋合諸射以考其藝而進退之釋曰劉氏曰諸子學禮樂詩書將世其父而未之用也割牲體羞爼豆則已仕者為之而司士掌之諸子則涖而觀之朝踐而豚解必腥以獻也酳尸而體解必熟以獻也至於犬豕牛羊則升首薦血六牲之體必叙以獻苟失其叙有不中禮則諸子正而叙之故曰正六牲之體習之以其行也位佾處也正舞位謂國子之在舞位也授舞器則國子之用舞器也蓋先王之教國子成之以樂而大司樂教之也國子亦謂之羣子者凡庶子居而衆者名之也從從王也服位喪服之次哭泣之位也國之政事若征役兵甲之事存者凡人皆役之獨存國子不役使之在學以養之也遊倅謂介子副二適子未仕而逰暇無事者德德行道道藝學學宫射射宫也國子存而不役者使之自修其三德六行習學其道術藝業以成其德逹其材也春合諸學教以詩書秋合諸射教以禮樂必合之者所以考其才藝長者進而用之短者退之使習業也原曰古者國子遊倅不入於師保二氏不入於司徒之教故特設諸子以統治教誨之其成材者則進之太學叙用之其未有賢行可名者則屬之宫伯以宿衛王宫至於掌固亦用庶子焉其又下者耳可以見古人待世族庶子之意矣後世大夫士之庶子列於下民而宿衛者又專用武人天子諸侯之庶子無問賢愚槩以爵位驕其肥遁之志廢其向用之心烏乎可哉司右掌羣右之政令凡軍旅㑹同合其車之卒伍而比其乘屬其右凡國之勇力之士能用五兵者屬焉掌其政令釋曰車有五等右者三右下文戎右齊右道右也戎右兼田右齊右兼玉路之右車之卒伍所謂兵車也合比屬者使之次第相安習也左氏稱其君之戎分為二廣廣有一卒卒偏之兩司馬法曰二十五乘為偏百二十五乘為伍故車有卒伍者周之遺法也比其乘者比其所乘之馬使之齊力屬其右者屬其為右之人使之同心車右必任勇力之士故凡有勇力者習之以五兵選之為右也司馬法曰弓矢圍殳矛守戈㦸助凡五兵長以衛短短以救長則㑹同而卒伍其車者有文事者必有武備也王介甫曰先王既合萬民之卒伍以時習之皆使知戰矣又屬勇力之士能用五兵者於司右而使掌其政令則軍旅之事有選鋒以待敵齊民得免死焉無事之時武夫皆制於官府無所奮其私鬭矣虎賁氏掌先後王而趨以卒伍軍旅㑹同亦如之舍則守王間王在國則守王宫國有大故則守王門大喪亦如之及葬從遣車而哭適四方使則從士大夫若道路不通有徵事則奉書以使於四方賁音奔先悉薦反釋曰虎賁主於衛王故王車之行擁衛前後雖趨而不失行列也舍王所止宿處間梐枑也守王宫為周衛也守王門非常之難要在門也故王出而舍於外則以虎士守梐枑王入而在於國則以虎士守王宫國有災兵則以虎士守王門所謂掌先後王者也遣車王之魂魄所依故從之而哭士大夫使於四方則以虎士從之護王命也道路不通有兵寇之故也有徵事徵師役之事也必以虎士謂其勇猛有力可為使用以徵兵於四方也吕氏曰周人戒成王曰王左右常伯常任準人綴衣虎賁任人牧夫準人固是係天下安危所當戒綴衣虎賁只是侍御僕臣何故與任牧準人同說而無輕重此最是周公養成君德深厚處大抵外朝之人人君臨朝方得入覲而人君又見其望高德厚待之尊嚴不敢䙝近惟侍御僕從朝夕與它親比若得正人動作起居隂化默移須到聖賢地位若讒諂面諛之人朝夕與之相處便到失德處故綴衣虎賁位最賤職最親所以不特是常伯常任準人要得人而虎賁綴衣亦要得人旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪凡祭祀㑹同賓客則服而趨喪紀則衰葛執戈盾軍旅則介而趨釋曰夾王車者其下士也下士十有六人中士為之帥焉此王衛之猶親者也以膂力剛强之士為之車止持輪使王車安固也服而趨夾王車而趨也王齊服服衮冕則此士之齊服服𤣥端也臣為王服斬衰麻絰至葬乃服葛絰也介𬒳甲也既衛王之行則從王之服而已王吉服則亦吉服王凶服則亦凶服王戎服則亦戎服也節服氏掌祭祀朝覲衮冕六人維王之大常諸侯則四人其服亦如之郊祀裘冕二人執戈送逆尸從車釋曰服衮冕者從王服也維持之也祭祀朝覲王建太常之旗其旗十二斿兩兩以縷綴連旁三人持之諸侯殺於王故建交龍之旗而四人持之其服亦如諸侯之服也裘大裘也裘冕者亦從尸服也逆尸送尸皆執戈而從尸車之後郊祀亦用尸也方相氏掌蒙熊皮黃金四目𤣥衣朱裳執戈揚盾帥百隸而時難以索室驅疫大喪先匶及墓入壙以戈擊四隅驅方良難乃多反驅起俱反先音薦方音罔良音兩釋曰蒙冒也冒熊皮取其毅而致果足以驚疫癘之鬼也黃金四目取其視無不見也黃者中之色金則剛而明剛中而明足以察見隂慝也執戈揚盾所以致其威也帥百隸夷隸罪隸之屬也時儺以時而儺也月令於季春之儺曰畢春氣仲秋之儺曰逹秋氣季冬則命有司大儺是也以索室則驅疫入室中索厲鬼而逐之也先匶為之前導也壙穿地為穴以葬也方良罔兩也驅罔兩以安王神也天子之椁柏黃腸為裏而表以石焉國語曰木石之怪曰䕫罔兩大僕掌正王之服位出入王之大命掌諸侯之復逆王視朝則前正位而退入亦如之建路鼓于大寢之門外而掌其政以待逹窮者與遽令聞鼓聲則速逆御僕與御庶子釋曰僕侍御於尊者之稱是親近王所之官故王之衣服及位處恐其不正故皆正之也出大命王之教令也入大命羣臣承意而復命也復有所報白也逆有所陳奏也王氏曰有諸侯之復逆有公孤卿之復逆有吏民之復逆皆所以通上下之情諸侯復逆掌之大僕諸臣復逆掌之小臣吏民復逆掌之御僕皆以位之尊卑為之次第也若宰夫則曰諸臣之復萬民之逆夫復者雖為諸臣言之而民亦未始不復雖為萬民言之而吏亦未始不逆是以御僕又云諸臣之逆庶民之復是知復逆者通于上下也王視朝視治朝也大僕本位在路門之左今進前正王位而退復本位也王退入路寢大僕亦前正其位也大寢路寢也其門外則內朝之中路鼓四面示欲四方無所不逹也其政鼓節之早晏也窮謂窮寃失職無所控訴也遽令謂急遽之令二者欲其聞之速也故使之鳴鼓焉大僕聞有鳴鼓者則速逆御僕與御庶子當受其事以聞蓋此二官皆直事鼓所者祭祀賓客喪紀正王之服位詔法儀贊王牲事王出入則自左馭而前驅凡軍旅田役贊王鼓救日月亦如之大喪始崩戒鼓傳逹于四方窆亦如之縣喪首服之法于宫門釋曰詔告也詔王之法儀正其容貌威儀使中於禮也王之牲事以事鬼神也大臣衆矣莫尊於大宰近臣衆矣莫親於大僕故贊牲事以此兩官也前驅道引也道而居左自馭不參乘避王也亦有車右焉軍旅田役王皆親執鼓路鼓四面大僕佐擊其餘面也日月薄蝕則擊鼓以祛隂慝大僕亦贊其事戒鼓擊鼓以警衆也傳逹于四方遞擊以相傳報也窆葬下棺也首服之法謂免髽筓總長短之數也縣其法于宫門示四方以為法戒也掌三公孤卿之弔勞王燕飲則相其法王射則贊弓矢王視燕朝則正位掌擯相王不視朝則辭於三公及孤卿釋曰弔勞王使往也王與諸侯及羣臣有燕所以示慈惠其飲雖無酌數然亦有法故大僕相之也王之大射燕射大僕贊弓矢授之受之也燕朝內朝王與族人燕處大僕皆正其位擯則助賓相則助王大僕掌之辭謂以不視朝之意而告之也小臣掌王之小命詔相王之小法儀掌三公及孤卿之復逆正王之燕服位王之燕出入則前驅大祭祀朝覲沃王盥小祭祀賓客饗食賓射掌事如大僕之法掌士大夫之弔勞凡大事佐大僕釋曰小臣大僕之小者小命時事所勑問也小法儀趨行拱揖之容太僕掌諸侯之復逆故小臣掌三公孤卿之復逆也燕服位朝退而適燕寢則正其服位也燕出入燕私之出入若今遊幸諸觀苑則馭而前驅也沃王盥者以水灌王手所以致潔也祭祀以接神朝覲以接人盥手所以為敬賓射與諸侯來朝者射三公孤卿之弔勞大僕掌之故小臣掌士大夫之弔勞也大事佐大僕所以為副二也王氏曰夏官大僕小臣之於王天官內小臣內豎之於后其職一也內小臣掌王后之命正其服位出入則前驅而太僕掌正王之服位出入王之大命王出入則前驅是太僕之職與小臣同內豎云掌內外之通令凡小事小臣云掌王之小命是小臣之職與內豎同然大者掌其大小者掌其小此太僕小臣之職所以分也至於內小臣之所掌宜若掌后之小命也今乃曰掌王后之命而其通令凡小事則內豎掌之所以見后之次於王也况后言命不言大命后只有好令于卿大夫曾何大命之有是知大命皆出於王也周之時后且不預王之大命况他人乎後世陪臣執國命豈不可嘆哉祭僕掌受命于王以視祭祀而警戒祭祀有司糾百官之戒具既祭帥羣有司而反命以王命勞之誅其不敬者大喪復于小廟凡祭祀王之所不與則賜之禽都家亦如之凡祭祀致福者展而受之釋曰謂王有故不親祭也祭祀有司有事於祭祀者糾謂校録所當共之牲物劉氏曰王之於祭祀也冡宰正其綱宗伯正其職六官之屬各抵其事先期誓戒擇賢執事齊戒滌濯可謂盡其誠敬備乎禮文矣而具修之初王不得以躬視之也乃設祭僕之職專受王命以視祭祀而警戒祭祀有司糾百官之戒具是代王躬視其事也聖人之於鬼神盡心如此故以祭則饗帝而受福也巳祭帥羣有司復命凡與祭有司敬其事者以王命勞之有不敬者以王命責之也小廟高祖以下廟也祭僕復于小廟夏采復于大廟始祖曰大廟祭祀王同姓有先王之廟者有故不與祭則賜之禽使自祭也都家亦如之同姓在都家者必不得與祭亦賜之禽也祭祀致福者謂臣有祭祀必致祭肉於君所謂歸胙也展録視其牲體之數以胙自外至受而膳王故敬慎如此御僕掌羣吏之逆及庶民之復與其弔勞大祭祀相盥而登大喪持翣掌王之燕令以序守路鼓翣所甲反釋曰小臣掌三公孤卿之復逆士大夫之弔勞故御僕掌羣吏之逆庶民之復與弔勞也庶民之復即大司寇所謂逺近惸獨老幼欲有復于上者也故太僕言建路鼓以待逹窮者聞鼓聲則速逆御僕是也小臣沃盥則御僕相盥者捧盤授巾也登為王登牲體於爼也翣飾棺也燕令燕居時之令也序更御僕下士十有二人以序更守路鼓以待逹窮與遽令也隸僕掌五寢之掃除糞灑之事祭祀修寢王行洗乘石掌蹕宫中之事大喪復于小寢大寢釋曰宫人掌王宫六寢之修則王宫之事隸僕掌五寢之掃除則宗廟之事也王者七廟而云五寢者二祧無寢故也可見王者之廟亦二昭二穆與太祖之廟而五二祧無寢可見無三昭三穆之說矣祭祀修寢或有事焉月令凡新物先薦寢廟是也乘石王所登上車之石也蹕止行人者宫中有事則蹕是故修之所以治壞洗之所以致潔蹕之所以警備僕之所有事也始祖廟之寢曰大寢高祖以下之寢曰小寢葉氏曰周有三朝一曰燕朝在路門之內王國宗人嘉事之朝也太僕小臣掌焉一曰治朝在路門之外王日聽治之朝也宰夫司士掌焉一曰外朝在庫門之外詢萬民聽政之朝也小司寇朝士掌焉外朝之位朝士所掌朝法鄉大夫以大詢之時帥六鄉之衆庶而致於朝百姓衆庶得與公卿侯伯羣士羣吏相先後於階陛之間其政誠為平易近民矣治朝之位司士所正之朝儀而宰夫掌其法太僕掌建路鼓于大寢門外以待逹窮與遽令宰夫掌庶民之逆得與賓客治諸臣之復同徹於天子之前則又未嘗以禁嚴為限矣燕朝之法雖在太僕然諸侯復逆掌於太僕三公孤卿復逆掌於小臣羣吏庶民之復逆又掌於御僕是庶民之復得與諸侯公卿羣吏逹於燕處之時則亦未嘗以邃深為隔矣觀三朝之法則知成周盛時戶庭無壅其疏通洞逹何如哉然外朝雖掌於秋官之屬而三公孤卿在焉則太宰與聞外朝之政矣治朝雖曰司士正之屬於夏官而宰夫掌其禁令王視治朝冡宰贊之則太宰實聞治朝之事矣燕朝亦夏官之屬也然則羣臣之復逆實與宰夫相關焉况建鼓在路門外王視治朝則太僕正位王不視朝則辭於三公及孤卿是燕朝之臣實與治朝相通則太宰亦與聞乎燕朝之政矣以此見周人之治宫中府中實為一體而無內外之分矣辨師掌王之五冕皆𤣥冕朱裏延紐五采繅十有二就皆五采玉十有二玉筓朱紘諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄繅音早釋曰王冕有六大裘冕衮冕鷩冕毳冕希冕𤣥冕而此云五冕者祀昊天上帝服大裘則服衮可知矣故大裘與衮同一冕也冕以版為之廣八寸長六寸上以𤣥下以朱覆之延即冕之覆而在上者紐小鼻也自下而視則延長故謂之延紐綴於武上四旁以笄貫之使其牢固也繅雜文之名也合五采絲為之繩貫五采玉垂於延之前後各十二旒所謂前後邃延也就成也以五采玉相間用五采繅貫而垂之每就各十有二旒也故五采備色也就十有二備數也玉十有二備物也玉笄以玉為笄橫貫於紐以朱為紘綴於笄之兩旁而屬兩端於武也侯當為公字之誤也蓋諸公以九為節每繅九成則九旒旒各九玉公之冕用玉百六十二瑉玉石之似玉者三采朱白蒼也德之殺異乎王之全矣其餘延紐皆𤣥覆朱裏與玉同也繅斿皆就者總言侯伯子男之冕也侯伯七命則七就子男五命則五就玉瑱以玉為瑱所以塞耳也故玉填塞耳以示反聽也前旒蔽明以示其內視也王之皮辨㑹五采玉璂象邸玉笄王之辨經辨而加環絰諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令釋曰皮辨者王視朝之服㑹縫中也璂結也皮辨之縫中每貫結五采十二以為飾謂之綦詩云㑹辨如星又曰其辨伊綦是也象邸以象骨飾辨內項上之祗又貫之以玉笄則為王之皮辨也璂作綦辨絰王弔所服也其辨如爵辨而素所謂素冠也環絰大如緦之麻絰纒而不糾冕吉服韋辨戎服也皮辨朝服也辨絰弔服也各以其等各依其命數也侯伯冕則繅七就用玉九十八子男繅五就用玉五十玉皆三采孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫繅再就用玉八藻玉皆朱緑韋辨皮辨則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采辨絰之辨其辟積如冕繅之就禁令者不得相踰僭也是故尊卑貴賤由乎冕辨定等差也卑不可踰於尊賤不可踰於貴辨師掌其禁令則禮行乎九服之諸侯矣此辨師所以在司馬也司甲闕其職王氏曰書之費誓言敹乃甲胄敿乃十無敢不弔而後言備乃弓矢煆乃戈矛礪乃鋒刃無敢不善蓋甲胄干所以自保弓矢與矛所以討敵戎事先自保而後討敵故周官先司甲而後言兵也司兵掌五兵五盾各辨其物與其等以待軍事及授兵從司馬之法以頒之及其受兵輸亦如之及其用兵亦如之祭祀授舞者兵大喪廞五兵軍事建車之五兵㑹同亦如之廞虛金反釋曰五兵戈殳㦸酋矛夷矛此乃車之五兵也五盾謂二車之盾乘車之盾旅賁之盾虎士之盾與藩盾也辨其物者則以其用各有宜也與其等者則以其制各有長短大小也以待軍事行軍則用之除戎器戒不虞之意也師旅卒兩之衆合頒干戈矛㦸之屬皆從司馬之法以頒之也兵輸謂師旅還有司還兵也用兵謂出給衛守也甸出革車一乘凡甲戈楯旗物鼓鐸悉備焉鄉遂之官簡其兵器是也調發則各以其具行而官府不與知也司兵司戈盾司弓矢掌授兵器非授之民也授之鄉大夫從軍㑹同者也故司兵曰及其受兵亦如之是鄉大夫畢事則歸之也若民兵則自藏之民間耳東萊吕氏曰古者藏兵於廟大夫家不藏甲凡用兵必取之廟而後授之兵者國之重事出必告於廟歸而必飲至以見其不敢輕舉之意如用命賞于祖不用命戮于社亦此意如鄭莊公將伐許授兵於大宫此見春秋之初其制尚存舞者兵朱干玉戚之屬車之五兵見上步卒之五兵則無夷矛而有弓矢司戈盾掌戈盾之物而頒之祭祀授旅賁殳故士戈盾授舞者兵亦如之軍旅㑹同授二車戈盾建乘車之戈盾授旅賁及虎士戈盾及舍設藩盾行則斂之釋曰司戈盾者戈所以克敵盾所以衛身戎備之最急者也頒之謂祭祀軍旅㑹同之時頒之以給用也故士王族故士也與旅賁虎士則衛王也殳如杖長尋有四尺二車副二之車也乘車王所乘之車也軍旅則革路㑹同則金路當祭祀之時旅賁夾王車者則使執殳故士從王者則授之戈盾以為衛有軍旅㑹同之事副二之車以戈盾授其僕王所乘之車則逹戈盾於其上旅賁虎士趨而衛王故亦授戈盾王所止宿則設盾以為藩衛王行則無所用故斂而收之司弓矢掌六弓四弩八矢之法辨其名物而掌其守藏與其出入中春獻弓弩中秋獻矢箙藏才浪反中音仲箙音服釋曰六弓四弩八矢見下文法曲直長短之數名物六弓八矢等各有名號物色也守則有人藏則有府出則頒之入則受之也中春陽氣方和之時弓弩之所成也故獻之箙盛矢器也以獸皮為之矢與箙成於隂氣方堅之時故中秋獻之蓋四時有明法萬物有成理先王以道制器固不違乎時之序物之理而與造化同其功矣是以器之成也既完且美而天下之利用於是乎出矣及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴侯鳥獸者唐弓大弓以授學射者使者勞者其矢箙皆從其弓釋曰王弧夾庾唐大弓體之異名所謂六弓也考工記曰往體寡來體多謂之王弧之屬往體多來體寡謂之夾庾之屬往體來體若一謂之唐大之屬或曰王弧雕弓也唐大彤弓也夾庾盧弓也甲革以革為甲椹質植椹為正射甲與椹試弓習武也王弧弓强故以授之犴侯五十步鳥獸又近而後射夾庾弓弱故授之射侯與弋學射者先用弱而後習强也唐大强弱適中之弓故以授學射者與為使者與勤勞王事者矢箙從其弓從弓數也每弓一箙一箙百矢凡弩夾庾利攻守唐大利車戰野戰凡矢枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢庳矢用諸散射鍭音侯茀音弗庳方二反釋曰凡弩夾庾利攻守攻城壘者與其自守者相迫近弱發疾也唐大利車戰野戰連戰進退非强不及也弩無王弧恆服弦往體少者發矢不疾也凡八矢者弓弩各有四焉枉殺矰恆弓所用也潔鍭茀庳弩所用也枉矢取變星潔有結約之義五分二在前三在後其鐵比鍭殺為差小前較重後微輕其行則疾故利火射用諸守城車戰殺矢前鐡最重中之必死故曰殺矢鍭矢象焉三分一在前二在後其前尤重故中深而不可逺用諸近射田獵為宜結繳於矢謂之矰矰髙也茀矢象焉茀之言刜也七分三在前四在後其鐡比枉潔又差小其行不低故用諸弋射蓋弋飛鳥刜羅之也恆矢以其可常用也庳矢象焉以其矢行而卑也八分四在前四在後訂其行平也故可用諸散射謂禮射及習射也天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之弊弓句音鈎弊音婢釋曰規者正圎之器謂之規則圓之至也弓强則往體寡來體多合多而圎弓弱則往體多來體寡合少而圓天子之弓王弧也其體不甚曲故合九弓而成一規諸侯之弓唐大也其體稍曲故合七弓而成一規士之弓斗力也故合三弓而成一規句曲也弊惡也弓以強為上以弱為下則直者為善而句者為惡矣故謂之弊弓凡祭祀共射牲之弓矢澤共射椹質之弓矢大射燕射共弓矢如數并夾大喪共明弓矢凡師役㑹同頒弓弩各以其物從授兵甲之儀田弋充籠箙矢共矰矢凡亡矢者弗用則更釋曰祭祀射牲示親殺也殺牲非尊者所親唯射為可國語曰禘郊之事天子必親射其牲是已澤澤宫也所以習射選士之處也質正也𣗳椹以為射正而共其弓矢也如數如當射之數每人一弓乘矢并夾所以取矢之高者射鳥氏用之明弓矢明器之用器也物弓弩矢箙之屬籠皆所以盛矢籠以竹為之箙以皮為之田弋之時則共矣而以其矢充實於籠箙之中也矰矢矢之有繳者不在籠箙之中也為其相繞亂於田弋則共而已更謂償也用於射而亡則不償弗用而亡者則償也繕人掌王之用弓弩矢箙矰弋抉拾掌詔王射贊王弓矢之事凡乘車充其籠箙載其弓弩既射則斂之無㑹計釋曰此繕人所掌王之用弓弩者謂司弓矢選擇大善者入繕人以共王之用也抉挾矢時所以持弦飾也著右手大指拾韝扞著左臂以遂弦以韋為之詔王射告王所當射之節也贊王弓矢之事授之受之也乘車王所乘之車也充其籠箙皆以矢實其中也載其弓弩載之於車也行時備其具以壯武容也既射斂之謂收藏之也尚文德也無㑹計至尊所用不可以有司之法拘之也槀人掌受財于職金以齎其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成書其等以饗工乘其事試其弓弩以上下其食而誅賞而入功于司弓矢及繕人齎音咨釋曰財貨財也齎其工者給市財用之直也皆三等者弓弩矢箙皆有上中下之制也六物四物八物皆見上槀人掌受財于職金以齎其工而考其造作之法也形法定為素飾治畢為成劉氏曰春獻素秋獻成謂弓弩之胎素必備四時之氣而後成也弓人曰凡弓冬折幹而春液角夏治筋秋合三材冬奠體體定則成而可獻矣矢箙亦春作秋成書其工拙之等以試其享食之差乘計也計其事之成功也試考也考其弓弩良否善則上其祿甚則賞之不善則下其祿甚則誅之既考其功乃入之于司弓矢以待頒賜入之于繕人以共王之用也凡齎財與其出入皆在槀人以待㑹而考之亡者闕之釋曰所齎工之財及弓弩矢箙出入其簿書槀人藏之以待㑹而考之也闕猶除也弓弩矢箙棄亡者除之計今見在者原曰國家非兵無以衛國兵非器無以利用觀槀人之職工有三等食有上下非直計其事而必試其物非唯饗之以厚薄又臨之以誅賞則造作安敢不慎器用安得不精孔子九經之政亦曰日省月試既廩稱事勸百工亦王政之大者考工記弓人為弓矢人為矢函人為甲其法度精審非後世可及也或曰聖人以道治天下無事於兵今司馬之兵政於器械之官既有司甲司兵矣又有司戈盾司弓矢既有繕人掌弓弩矢箙矣又有槀人以乘事試工豈聖人亦有取勝於天下之心哉曰易之萃曰君子以除戎器戒不虞除也者治也治其戎器以戒不虞所以保其萃也聖王能保已之必能治天下不能必天下之必治故思患預防戎器可無慎乎故曰兵不完利與空手同甲不堅密與袒禓同弩不及逺與短兵同射不穿札與亡鏃同苟有不虞驅空手袒裼之人與戰可乎楚之鐡劔利而秦王色憂謂劔利則士勇焉耳為國家者苟不留聰明有司以常事處之郡國之貢姑備名數武庫之藏唯謹簿書烏乎可哉戎右掌戎車之兵革使詔贊王鼓傳王命于陳中㑹同充革車盟則以玉敦辟盟遂役之贊牛耳桃茢使色吏反傳直宣反敦音對茢音列釋曰戎車革車也王乘戎車以征伐則戎右驂乘與君同車執戈盾以備非常并充軍中役使也詔贊王鼓者兩軍相當王鼓以作士氣既告王當鼓之節又助擊其餘面也軍聲囂雜懼有不聞則大言於陳中以傳王命也㑹同之際王雖乘金路而革車從行戎右則充革車之左而不敢曠也曲禮曰乘君之乘車不敢曠左是也有盟約之事則以玉敦共歃血辟開也將歃血先執其器陳載書之辭以開衆心也役之謂持敦血以授當歃者牛耳割以取血又以示順聽尸盟者所執而戎右贊之桃鬼所畏也茢苕帚所以掃不祥盟血在敦以桃茢拂之又助之也齊右掌祭祀㑹同賓客前齊車王乘則持馬行則陪乘凡有牲事則前馬齊側皆反乘繩證反釋曰祭祀王乘玉路㑹同賓客王乘金路前齊車者王乘車之時則立在馬前以備驚奔曲禮曰君車將駕則僕執策立於馬前是也王既登車則持馬以備駭輿之患也既乘而行則陪乘在車右為驂乘也凡牲事王見牲則拱而式曲禮曰國君式齊牛齊右則居馬前却行備驚奔也道右掌前道車王出入則持馬陪乘如齊車之儀自車上諭命于從車詔王之車儀王式則下前馬王下則以蓋從從才用反釋曰道車象路王所常行大道之車以王燕出入無非道之故也王之出入乘則持馬行則陪乘皆如齊右之儀也王行則以車從王有命焉則道右宣王之命而諭之也詔王之車儀若記曰不廣咳則口之儀也不妄指則手之儀也立視五􅖿式視馬尾則目之儀也顧不過轂則首之儀也以至升車必正立執綏不內顧不疾言無非車之儀也王式則下前馬與齊右凡有牲事前馬同王下則以蓋從者以儀輔王也大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之及祭酌僕僕左執轡右祭兩軹祭軓乃飲軷蒲末反祝之又反軹音只軓音范釋曰王出郊以祀則有犯軷之事行山曰軷犯之者封土為山象以菩芻棘柏為神主祭之以車轢之而去喻無險難也王自左馭者大馭下而為祝則王當左代之馭也既祭則登受王手之轡犯軷遂驅之謂驅馬登其山而去之所謂犯軷也僕即大馭軹謂轂末軌謂軾前將犯軷之時王以祭餘之酒酌大馭大馭則左并轡以右手酌酒祭左右兩轂之末又祭軾前軓三處乃飲始轢軷而去也曲禮曰其在車則左執轡右受爵祭左右軌范乃飲是也凡馭路行以肆夏趨以采薺凡馭路儀以鸞和為節釋曰凡馭路總言馭五路也爾雅曰堂上謂之步門外謂之趨則馭路之儀其疾徐進止固有節矣蓋行則欲其舒則歌肆夏以節其行也趨則欲其齊則歌采薺以節其趨也馭路儀者總言馭五路之儀也和鸞皆金鈴也鸞在衡而和在軾凡車升則馬動馬動則鸞鳴鸞鳴則和應節者謂舒疾之法也然則王之行趨固有環佩之聲鏘鳴于左右車之行趨又有和鸞之聲相應于衡軾是以倫清而聽聰心虛而氣和非僻之心無自而入矣戎僕掌馭戎車掌王倅車之政正其服犯軷如玉路之儀凡巡守及兵車之㑹亦如之掌凡戎車之儀釋曰戎車革路也王乘以出則戎僕馭馬故曰馭戎車倅車副車也掌其政令車僕也正其服則正乘戎車者之服蓋兵事則韋辨服也犯軷如玉路之儀者王以兵出皆有犯軷之儀田路不言犯軷則以戎路見之巡守謂巡諸侯之所守兵車之㑹謂盟㑹用兵車二者皆乘革路也戎車之儀戎以威為主甲胄則有不可犯之色則戎車之儀可知矣齊僕掌馭金路以賓朝覲宗遇饗食皆乘金路其法儀各以其等為車送迎之節釋曰以賓以待賓客也節謂王乘車送迎賓客各以其爵命尊卑之等而為逺近之節行人所謂上公九十步子男五十步與司儀所掌有車逆拜辱及出車送之法儀也道僕掌馭象路以朝夕燕出入其法儀如齊車掌二車之政令釋曰出入謂旦暮乘象路以之內外朝也燕謂自內外朝乘象路以還燕寢也其法儀如齊車則其度數動容亦各以其等為之節也掌二車之政令以其有故乃攝而代之故道車之副謂之二車若典命言適子攝其君則下其君之禮一等是也田僕掌馭田路以田以鄙掌佐車之政設驅逆之車令獲者植旌及獻比禽凡田王提馬而走諸侯晉大夫馳釋曰木路以田即田路也王既乘之以適四時之田又乘之以適縣鄙佐車田車之副也記曰大夫殺則止佐車佐車止則百姓田獵則佐車用之於田獵可知驅逆之車驅謂驅禽使前趨獲逆謂逆還之使不出圍也令獲者植旌則令獲禽者致於虞人所植之旌也及獻比禽則比其大小而致之也凡田總田獵驅馳之法提猶舉也王提馬首而走其田路者將以趨其禽而射之也晉進之馳則亟進之故諸侯則進其車大夫則馳其車皆所以佐佑翼禽致獲于王也是故提舉行也晉速行也馳奔走也尊者安舒卑者速戚馭夫掌馭二車從車使車分公馬而駕治之釋曰自大馭至田僕皆王五路之御者也馭夫則馭二車從車使車而已其車既衆非多其員則有所不給故馭夫共六十人也二車副車也從車屬車也使車使者所乘之車也三者皆公車也故分馬而駕治之駕而調治之者俾間習齊一安於五御而去其驚奔也校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廄廄一僕夫六廄成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫繫音計廄九又反鄭氏曰八宜皆為六字之誤也釋曰王馬共王五路之馬政謂差擇養乘之法也辨六馬之屬者馬之屬不同而所駕亦異天子有十二間馬六種故也種馬謂上善似母者玉路用之物者謂其毛其足其力皆所謂物也辨其物使之各以類而相從種馬而下以次差之戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役天子之馬五良而一駑也良馬善馬也五路之馬也頒之謂頒之于圉師圉人趣馬馭夫僕夫也養之乘之然後教也四匹曰乘養馬曰圉圉人良馬匹一人故乘馬四圉圉師教圉人養馬乘馬則一人故乘馬一師也三乘為皂則馬十二匹趣馬皂下士一人故皂一趣馬也三皂為繫繫凡三十六繫一馭夫也馭夫中士也六繫為廄馬二百一十六匹廄一僕夫則上士也六廄成校變為言成者明六馬各一廄而王馬之數少備焉故曰成校校有左右則十二廄為十二間良馬一種者四百三十二匹五種合二千五百六十匹駑馬三之則為一千二百九十六匹先儒謂乾之䇿二百一十有六在易乾為馬故六繫而二百一十六匹為廄六廄成校合五良一駑凡三千四百五十六匹然後王馬大備矣故校人以中大夫二人為之也駑馬三良馬之數者二馬為麗麗耦也麗馬一圉六麗則十二匹六師則七十二匹六趣馬則四百三十二匹以三計之則千二百九十六匹與三良馬之數等也王氏曰夫駑馬一物而必三良馬之數者以馬材之不良者充役事為多故也因其數之多寡設官以掌之亦有小大之序故良馬自圉師至校人則以中大夫為之其官則為稍尊駑馬自圉師至馭夫而止者以其材下於良馬故掌養乘之者兼其數而掌其事官至于中士之馭夫而已天子有十二間馬六種邦國六間馬四種家四間馬二種凡馬特居四之一春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬步獻馬講馭夫釋曰間必以木為之以防馬也六廄成校校有左右故十二間也馬六種則種戎齊道田駑也邦國六間良馬三間駑馬三間馬四種則無種馬戎馬也卿大夫良馬一間駑馬三間馬二種止有田馬駕馬而已特牡特也詩曰實維我特特居四之一是三牝一牡欲其生之衆也馬祖天駟星也房星為天駟馬資之以生故祭馬祖執猶拘也春通淫之時駒馬之未壯者血氣未定不可通淫故執之先牧始養馬者馬火畜火夏盛駒之蹄齧不可乘用故因夏頒馬而攻鑿其蹄也馬社廄中土神凡馬日中而出日中而入秋馬入廄之時也故祭馬社臧僕則簡練馭者令皆善也馬步神之能為灾害馬者故祭之以禳災獻馬獻成馬於王也講馭夫五馭之法講習其藝也凡大祭祀朝覲㑹同毛馬而頒之飾幣馬執撲而從之凡賓客受其幣馬大喪飾遣車之馬及葬埋之田獵則帥驅逆之車凡將事于四海山川則飾黃駒凡國之使者共其幣馬凡軍事物馬而頒之等馭夫之祿宫中之稍食撲普卜反釋曰毛馬齊其色也頒授當乘者爾雅言宗廟齊毫尚純也而此於宗廟㑹同亦毛馬者承賓如敬神也天子之於諸侯有馬為禮而賜之者謂之幣馬校人主飾之士喪禮曰馭者執䇿立于馬後所謂執撲而從之所以防其奔逸也賓客之聘馬諸侯來朝聘而享王者校人受其庭實之馬古者以塗為車以芻為人馬亦校人飾之以類也及葬埋之則明器也驅逆之車田僕設之校人帥之也王巡狩過大山川則用黃駒為牲以析沉校人飾之黃者地之中色駒者行地無疆地之類也猶郊用犢之意天子使人於侯國或以幣馬賜諸侯或以私覿皆共之也軍事物馬齊其力也爾雅曰戎事齊力尚強也田事齊足尚疾也頒之頒官府卿大夫共軍者等馭夫之祿者校人之屬自趣馬至圉師皆有祿食舉馭夫以見之也稍食餼廩也謂養馬於宫苑之中者亦校人等其祿廩也吕氏曰三代之制天子萬乘諸侯千乘大夫百乘立國制賦之法莫不以馬為本所以乘馬之法在古最為精密然天子諸侯大夫乘馬之數多寡不同細考當時之馬有養之於官者有藏之於民者如邱甸歲取馬一匹皆藏之於民不仰公家芻枺如有事田獵臨時徵召然而在天子之都諸侯之國大夫之家未嘗不自畜馬此是養之於官者天子十二間數不過三千衛文公承新造之國末年亦至騋牝三千當殘亂之餘如何便及成周全盛乘馬之數蓋十二間亦養之於官者所謂三千亦舉通數言之又如鄭子國之難子産以車十七乘出討賊子産百乘之家耳如徵馬於郊野之間盜賊卒至何以得集是十七乘乃養之於家者則三代之馬固有在官者亦有在民者數之多者在民平時無芻秣之費數之少者在官征伐無不至之虞古之制度精密如此趣馬掌贊正良馬而齊其飲食簡其六節掌駕說之頒辨四時之居治以聽馭夫說始鋭反治直吏反釋曰馬三乘為皂而下士一人為之趣馬校人既物而乘之以為良矣又從而贊正其有弗良也將駕五路謹擇之至矣齊其飲食欲其力之均也簡差也節猶量也差擇王馬以為六等駕以行說以止有勞逸之節故以叙而頒之也居謂牧廄所處之宜治謂執駒攻特之屬以聽馭夫則惟馭夫之所役使也巫馬掌養疾馬而乘治之相醫而藥攻馬疾受財于校人馬死則使其賈粥之入其布於校人賈音古粥音育釋曰乘治謂驅步以發其疾知其所疾之處而後可驗而療之若獸醫所謂觀其所發而養之是已相醫而藥者蓋其屬有醫四人其治疾則亦以藥攻焉然醫馬疾大抵以獸醫為主巫馬之用藥亦以相醫而已攻馬疾攻謂繫而治之也蓋其疾有藥不足以療之者乃用攻焉猶瘍醫所謂以毒藥攻之也受財于校人者以資醫馬之費也馬死則以其賈粥之以其屬有賈二人以知其直也入其布于校人所粥死馬之布泉也牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊釋曰牧地非一處度其年歲水草之宜與其馬之衆寡而頒之授圉者所牧之處也厲禁者謂可牧馬之處亦使其地之民遮護禁止不使人輒牧牛馬也孟春焚牧地以陳生新草也中春通淫隂陽交萬物生之時可以合馬之牝牡也田事焚萊者山澤之虞牧師贊之所以護牧地弗盡之焚也廋人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬正校人員選馬八尺以上為龍七尺以上為騋六尺以上為馬釋曰天子之馬十有二間政以正之教以道之也阜盛壯也佚特者乘用有節不使甚勞安其血氣也三歲曰駣教駣者始乘習之也二歲曰駒攻駒者治其蹄齧也間之先牧始制間者非前養馬之先牧散馬耳以竹括押其耳頭母令善驚也圉馬教圉其馬也校人謂師圉也正員選者選擇可備校人之員者平之其員不應選者正之也馬八尺極高大者可備天子五路之駕故曰龍月令曰駕蒼龍七尺以上諸侯之上駟故稱騋六尺特常馬耳故但稱馬也圉師掌教圉人養馬春除蓐釁廄始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔蓐音辱庌五嫁反茨在私反闔户臘反釋曰以師名官者掌教圉人養馬也冬寒藉馬以蓐春則除之釁廄殺牲釁之辟去邪氣也始牧者春秋傳曰馬日中而出日中而入日中謂春分秋分也故春始牧庌廡也廡所庇馬凉也夏熱故也椹質以木為之縛草以代侯也茨蓋也闔苫也翦草以苫蓋也椹質翦闔皆圉師所習也故因而使之圉人掌養馬芻牧之事以役圉師凡賓客喪紀牽馬而入陳廞馬亦如之釋曰芻以飼馬牧以放馬皆所以養之也役圉師受教於圉師聽使令也賓客之馬詩曰雖無子之路車乘馬王所以賜之也大司馬喪祭奉詔馬牲則喪紀之馬遣車所用也牽馬入陳者賓客則陳之於館喪紀則陳之於廟也廞馬遣車之馬也圉人賤役者也何氏曰馬政之用古今一也而古之牧者在民今之牧者在官以其在民也故牧養之法不可得而詳以其在官也故牧養之法不可不講成周之制官有馬質下士為之而賈二人以平馬價則是當時公私皆有馬矣然校人之職掌王馬之政自乘至廄為匹二百六十有奇五分其良而駑居其一焉凡五良而一駑則總為馬二千六百此其大數也王馬之政牧養之法莫詳於此又以井田之法計之甸六十四井也其賦兵車一乘戎馬四匹又以六鄉六遂之民而實計之十有九萬家則王之馬不能加其二分之一至於徒役之興戰陳之事則王命校人掌物其馬而次之則馬不專賦於民矣又以大司馬之法而計之則天子提封萬井兵車萬乘戎馬四萬匹則是所賦之馬多於王數十倍而當時不有牧養之法為其在民者多也漢有牧師諸苑三十六所畜馬三十萬匹用官奴三萬人散在北邊則牧之以民又有牧之之地唐初得隋馬三千匹八坊四十八監而張萬歲掌之其後萬歲失職馬亦減少至王毛仲領羣牧而有四十三萬唐之諸監或在隴右或在河西馬之蕃耗皆係乎監牧之人而又有牧之之地則其在官也多矣職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害貉孟白反釋曰圖如今之輿地圖也大司空掌天下九州土地之圖特圖而已職方掌天下之圖以掌天下之地則據圖以掌天下之地也邦國諸侯之國也都鄙邦國之采邑也東方有四夷南方有八蠻東方有七閩西方有九貉西北有五戎北方有六狄其疆理廣道里逺孰從而辨之按圖而辨之也邦國都鄙在九州之內夷蠻閩貉戎狄在九州之外雖有內外之殊然先王之政一視而同仁其財用之所出九榖六畜之所産其數要不可以不辨也其利害不可以不知也數謂别而計之要則總而計之也利如金石粟帛之類凡可以利人者也害謂猛獸長蛇之屬凡可以害人者同知其利害則將以興其利而除其害也乃辨九州之國使同貫利東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻㑹古外反藪素口反釋曰事之有條謂之貫可以生養大者謂之利四方九州之人民好惡之不同財用有無之不等必周知其利害貫而通之使有無之相濟善惡之相易也一天下之財用養天下之人民俾同享其利焉其山曰鎮者能出雲雨以生萬物鎮安於一州水瀦而不流以生蒲魚者曰澤水涸而不耕而生草木者曰藪水流而趍海者曰川水積而成淵者曰浸其民資之以為生者曰利其衆待之以為養者曰畜其土宜之以為食者曰榖八者九州之民仰之以為生者也九州之邦國仰之以為富者也苟不周知其數要則天下之民不可得而同貫其利矣自此以下陳九州之事先從南方蓋尊於陽方也四鎮五嶽總言之皆山鎮也㑹稽在山隂具區吳越之間今吳縣南太湖即震澤也三江謂婁江東江松江也禹貢曰三江既入是也五湖即太湖也王氏曰國語伍子胥曰吳與越三江環之范蠡曰與我爭三江五湖之利者非吳耶然則三江五湖乃吳越之境內也春秋越與吳戰于五湖注今太湖也然則太湖即五湖耳非太湖之外又有四也禹貢惟金三品瑶琨篠簜則金錫竹箭固揚州産也二男五女蓋通以一州之人民計之七人之中二為男五為女也八州言男女者義同飛曰鳥走曰獸稻稌也即南方水生之粳稻也正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻夢亡貢反湛直减反釋曰禹貢荆及衡陽惟荆州衡山南嶽也在湘南雲夢二澤名在華容安陸然楚之雲夢澤跨江南非止此也江出岷山漢出嶓冡即禹貢所謂荆州江漢朝宗于海詩所謂滔滔江漢南國之紀是已潁水出陽城湛未詳禹貢荆之厥貢羽毛齒革惟金三品與夫礪砥砮丹則丹銀齒革固荆州所産也河南曰豫州其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種華如字圃布古反滎户扄反溠音詐枲思似反擾而小反釋曰禹貢荆河惟豫州伊洛瀍澗既入于河滎波既豬華山西嶽也在華隂圃田在中牟縣滎水出東垣入于河在滎陽雒在雒邑爾雅曰水自洛出為波溠未詳所在春秋傳楚子梁溠營軍臨隨則在漢南宜屬荆州在此非也林竹木也禹貢豫之厥貢漆絲絺紵則林漆絲枲固豫州所産也六擾馬牛羊犬豕雞也以其人所擾馴畜養故曰六擾五種黍稷菽麥稻也正東曰青州其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沭其利蒲魚其民二男二女其畜宜雞狗其榖宜稻麥沂魚祈反沭音述或為洙釋曰禹貢海岱及淮惟徐州蓋周公以徐為青州故也沂山沂水所出也在蓋縣望諸即孟諸也在睢陽淮水出桐柏今淮河也泗出魯國今泗州也沭出東莞屬琅琊禹貢曰淮沂其乂是也蒲水草其地水多故産蒲魚禹貢泗濱浮磬淮夷蠙珠暨魚河東曰兖州其山鎮曰岱山其澤藪曰大野其川河泲其浸盧維其利蒲魚其民二男三女其畜宜六擾其榖宜四種泲子禮反盧維音雷雍釋曰禹貢曰濟河惟兖州九河既道雷夏既澤灉沮㑹同岱山東嶽也今之泰山大野在巨野縣或曰即今之南望湖也河謂大河泲即濟水盧當作雷即雷夏也維當為灉即灉水也四種黍稷稻麥也正西曰雍州其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜宜牛馬其榖宜黍稷雍於用反汭如鋭反釋曰禹貢黑水西河惟雍州嶽西嶽也爾雅曰河西嶽弦蒲在汧涇出涇陽汭在豳地公劉曰汭鞠之即渭出鳥鼠同穴洛出熊耳汧隴之西多出美玉美石琅玕之類禹貢曰厥貢惟球琳琅玕東北曰幽州其山鎮曰醫無閭其澤藪曰貕養其川河泲其浸菑時其利魚鹽其民一男三女其畜宜四擾其榖宜三種貕音兮釋曰爾雅曰燕曰幽州東方之美有醫無閭之珣玗琪焉醫無閭在遼東貕養在長廣今萊陽縣有貕養津菑出萊蕪時出般陽賈氏曰幽州之河泲亦與兖同者蓋兖在河東北二州相連皆有河泲也蓋禹貢又北播為九河同為逆河入于海道沇水東流為濟則幽兖皆河濟所經之地也魚鹽近海故也天官有鹽人所掌者共膳夫王宫之用而已此曰其利魚鹽禹貢曰厥貢鹽絺則鹽在古無禁後世有鹽禁非也四擾馬牛羊豕也三種黍稷稻也河內曰冀州其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾潞其利松柏其民五男三女其畜宜牛羊其榖宜黍稷紆於于反汾扶文反潞音路釋曰冀州在河北東西南三面距河故曰河內霍山在彘陽爾雅曰霍山之多珠玉今霍州楊紆未詳爾雅曰秦有陽跨漳水出長子縣禹貢曰覃懷底績至於衡漳汾出汾陽詩云彼汾一曲潞出歸德晉地多山松柏所産桞子晉問所言是也其地男多女少正北曰并州其山鎮曰恆山其澤藪曰昭餘祁其川呼池嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其榖宜五種恆音常呼音呼池徒多反嘔烏侯反釋曰恆山北嶽也爾雅曰燕有昭餘祈在塢呼池出鹵城嘔夷出平舒淶出廣昌易出固安五擾牛羊豕犬馬也薛氏曰凡九州之土高者宜黍稷下者宜稻麥山氣多男澤氣多女東南多絲縷西北多織皮先王之於民因其東西南北之異方山澤川浸之異宜男女異數玉石異産黍稷稻粱之異種丹漆絲枲之異利廣谷異制民生異俗為之修其教而不易其俗齊其政而不易其宜山者不使居川澤者不使居中原騂剛之地糞種不以羊赤緹之地糞種不以牛然後五方之民各安其性樂其業而無偏弊之患矣葉氏曰古之言九州者三禹貢之冀兖青徐揚荆豫梁雍夏制也爾雅之冀幽營兖徐揚荆豫雍先儒以為商制也職方之揚荆豫青兖雍幽冀并周制也商有幽營而無禹貢之青梁周有幽并而無禹貢之徐梁此三代之九州不同也爾雅有九州之名無九州之界禹貢職方之界有相侵者言之職方冀州視禹貢為小以分冀為幽并如舜時制是一分而為三也雖無徐州而青兖之間是巳雖無梁州而雍豫之間是已禹貢曰海岱及淮惟徐州又曰大野既豬今職方青州之川淮泗兖州之澤大野是以徐而入青兖可知矣禹貢曰華陽黑水惟梁州又曰厥貢璆鐡銀鏤砮磬今職方豫州之山華山雍州之利玉石是以梁而入雍豫可知矣職方既以青兖而包徐故青州多入禹貢之豫兖州多入禹貢之青禹貢豫州曰𬒳孟豬而職方青州曰其澤望諸豈非青之入豫乎禹貢青州曰鹽絺海物而職方兖州曰其利蒲魚豈非兖之入青乎職方既分冀而為幽并故幽州多入禹貢之青徐冀州多入禹貢之雍職方曰幽州其山醫無閭醫無閭在遼東先武以遼東屬青州後又屬幽州兹非幽之入青乎職方曰幽州其澤貕養其浸菑時貕養在長廣菑出萊蕪地理志以長廣屬徐州琅琊自萊山茲非幽之入徐乎職方曰冀州其澤楊紆爾雅謂秦有楊紆李巡以為在扶風茲非冀之入雍乎大抵周以禹之一冀州分而為三以禹之八州合而為六其勢必不能如禹之舊也乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服釋曰即大司馬之九畿也以其服事天子故曰九服詩曰侯服于周王畿司馬曰國畿藩作蕃邱氏曰衛服之外聖人雖制服之不必其來故武成叙諸侯之助祭洛誥稱諸侯之和㑹康王之誥陳諸侯之聽命止言五服而已夾漈鄭氏曰禹貢有五服各五百里是禹之時地方五千里職方有九服亦各五百里并王畿千里則周之時地方萬里矣五服九服之制雖若不同詳考制度無不相合禹之五服各五百里自其一面數之職方九服各五百里自其兩面而數之也周之王畿即禹之甸服各方千里禹貢之甸服五百里據一面而數之周畿千里不在九服之內王畿之外定制為九服各五百里以兩面相方而數之大抵周之王畿即禹之甸服周之侯甸即禹之侯服周之男采即禹之綏服周之衛蠻即禹之要服周之鎮夷即禹之荒服大率二畿當一服而周人鎮服之外又有五百里之藩服去王城二千五百里乃九州之外地增於禹貢五百里而已故行人之職其言九州之外謂之藩服則九州之外又有五百里之藩服明矣禹貢既叙五服又曰東漸于海西𬒳于流沙朔南暨聲教訖于四海是九州之外地也又如益稷曰弼成五服至于五千州十有二師外薄四海咸建五長謂四海之外各建諸侯為之長豈非周之藩服乎詳考制度無不相合求之里數未始不同先儒有禹弼萬里之說周斥大封疆之說皆考古未精耳凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下七伯當作十一伯釋曰一州之地方千里以封國必大小相維今舉封國之大數言之以千里為限則有四公六侯十一伯二十五子百男之差所以表其千里也其實公侯伯子男之數封之以是為準故曰以周知天下薛氏曰邦國有正封之地有廣封之地公侯方百里伯七十里子男五十里此正封也諸公之地封疆方五百里侯四百里伯三百里子二百里男百里此廣封也職方兼屬國附庸之地而言之廣封者然以邦國千里計之方四百里則六侯餘四百里三百里則十一伯餘百里何也蓋地勢不能常如碁局之方特因侯伯之爵以里數封之而已餘里無所餘焉職方舉其大數然也周制天下之地凡五千五百里一千為王畿一千五百里為夷鎮藩之服封諸侯之地則三千里而已今此封公侯伯子男之地各千里合而數之則六千里何也蓋職方特以封疆之數言之非有地里如此之廣也凡邦國小大相維王設其牧制其職各以其所能制其貢各以其所有釋曰小大相維謂五國為屬屬有長二十五國為連連有率二十國為州州有正二百一十國王設八命之牧統臨而牧理之八牧屬於天子之老二人曰二伯制其職牧監參伍各因其材不強其不能也制其貢任土作貢各隨其所産不責其所無也陳氏曰三代時牧守更代諸侯世襲權皆出於上如周初時荆州之牧則蔡侯其後則申侯豫州之牧則管叔其後則虢公周公君陳畢公迭居東郊初周公為東伯周公既沒君陳不為東伯行東伯之事至康王命畢公曰今豫祗命公以周公之事成王崩時畢公率東方諸侯則是已為東伯矣宣王中興只理㑹牧伯而已故韓侯在韓召虎在淮申伯在荆方叔在齊漢諸侯王自景武後若寄君然已不足言至唐藩鎮則是舉五侯九伯女實征之之事而付之世襲之人則其弊有不勝言者王將巡狩則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑及王之所行先道帥其屬而巡戒令王殷國亦如之釋曰王將巡守則諸侯各朝于方嶽之下故職方氏前期警戒四方諸侯也守謂國境之內修之平之使各當其分也諸侯所務之職事則考察之不使有曠職廢事也國有大刑謂討伐諸侯王之所行謂巡守所行之處先道先由王所從道居前行帥其屬土方氏以下而巡行前日所施戒令也十二歲不巡守六服盡朝謂之殷國殷猶衆也其戒四方諸侯與巡守同陳氏曰自古封建之法天下至廣難以統一故五載一巡守以一風俗以通民情至周而五載巡守既不能行故置職方撢人訓方氏之官以通逹上下使無壅蔽逮漢或遣謁者循行天下是亦得周公之遺意也自元封五年初置刺史每以秋分行部以詔書六條察郡國舉不法而後天下民情利害其雍遏通逹皆係于刺史之手而上或不得以聞宣元以後稍還古意天子則有郎官之出宰相則有掾吏之行上下相察莫之或匿如魏相敕掾吏案事郡國輒白四方異聞或有逆賊風雨灾異郡不上逹相輒奏言之是郡國欲𨼆之宰相而不知掾吏已得以上逹民情既通上下不壅則治可為也土方氏掌土圭之法以致日景以土地相宅而建邦國都鄙以辨土宜土化之法而授任地者王巡守則樹王舍相息亮反釋曰土方氏掌邦國土地之事領司空土圭土宜土化之法以施邦國之政者也故土圭長尺五寸致日景者立八尺之表夏至則景尺五寸冬至則景丈三尺土地猶度地也以此土圭度地勢而相其可居者以建諸侯之邦國公卿之都鄙也土宜謂九榖所宜土化謂糞種所用授任地者謂授諸侯任地之官與草人而令其耕種也樹王舍若掌舍設梐枑之時則於外周匝而樹為藩籬也王氏曰大司空凡建邦國以土圭土其地而土方氏掌土圭之法以土地相宅而建邦國都鄙則輔相司空建國之事而已大司空掌土宜之法而土方氏亦以土宜土化之法而授任地者則輔相司空草人任土糞種之事而已司空草人所掌止於王畿而土方氏所掌則主於四方邦國故名官以土方氏焉懷方氏掌來遠方之民致方貢致遠物而送迎之逹之以節治其委積館舍飲食釋曰逺方之民四夷之民也諭德延譽以來之非誘而致之也方貢逺方所貢之物若西旅底貢厥獒是也致逺物則致逺方所獻之物若所謂無有逺邇畢獻方物是也逺方之有貢猶六服之貢則世一見各以其所貢之寶為贄是也逺方有所獻之物猶六服諸侯之獻國珍是也送迎之送往迎來以為之禮也逹之以節逹民以旌節逹貢物以璽節也治其委積所以備其用也治其館舍所以安其居也治其飲食所以順其嗜好也逹之以節使無留難治其委積館舍飲食使有所資賴此所以懷之也名官謂之懷方其以此歟劉氏曰逺人不服則修文德以來之是懷萬方以成蓼蕭之化者聖王之事也逺人既來則懷方氏掌其送迎道路之給而開之以道德仁義之化恱之以聖人中和禮樂之方陳之以位天地和隂陽之本感之以致神祗遂生育之義使之心懷而誠服踴躍於內向而不知其已也合方氏掌逹天下之道路通其財利同其數器一其度量除其怨惡同其好善好去聲釋曰逹天下之道路津梁相湊往來相通不至阻絶也通其財利使懋遷有無豐凶相易以相濟也同其數器儀等一定權衡同律無異同也一其度量使丈尺釡鍾不得有大小也除其怨惡則講信修睦不相侵伐也同其好善則修仁尚義一道德同風俗也原曰先王立合方氏之官見王者大一統之治也事相通而不壅政齊一而不二教道行而好尚正則一統之治見矣是故道路財利通此合方之事也未及乎政焉同數器而九儀之命皆有定守一度量而五則之制亦有定用此合方之政也未及夫教焉至於除其怨惡同其好善則講信修睦敦仁尚義明禮興樂無有異志合方之為教大矣訓方氏掌道四方之政事與其上下之志誦四方之傳道正歲則布而訓四方而觀新物釋曰道猶言也四方諸侯也大之為政小之為事志其所向之善惡也皆言之於王傳道民臣所傳說邪正利病之事及傳聞四方諸侯之事必為王誦之蓋天子耳目之官也正歲十一月歲首則布其所傳道之善惡而訓之使去惡而從善也觀察也察其風俗之變也故觀其新物以審民之好惡則移風易俗之政必有所始者矣原曰訓方者所以訓誨天下之諸侯也然誨之必有所因故先以列國之政事孰為崇讓孰為尚功又以列國君臣之志孰為好賢孰為忠諌又考之臣民朝野之所傳說詳以告王則王之四目以明四聰以逹矣王乃以其所誦所傳所道者施為繩愆糾繆之教使訓方氏正歲布而訓于四方所以正一歲之始也又觀其新物以察其能改革舊染汙俗維新與否三年則黜陟賞罰行焉如是則四方之逺所聞者無非法言所行者無非法行道德由之而一風俗由之而同矣夫先王之所以致天下之大順而以中國為一人者以有此具也孰謂其官微而不足以寓大政耶形方氏掌制邦國之地域而正其封疆無有華離之地使小國事大國大國比小國華讀為􅏠若蛙反釋曰大司空建國自諸公至子男其封疆各有多寡之數形方氏掌其地域正其封疆所以奉行大司空之法也析而不絶為華絶而不續為離正其封疆使無有華離之地則小國易以守大國難以侵人各有其土宇而無交爭矣小國子男也大國公侯也凡建國必大小相維錯雜而處各相統屬故建牧立監以安之形方氏又使小國不得越分僭慢而謹事大國大國亦包涵遍覆不驕不凌而比小國則天下和平萬國以貞矣劉氏曰大司馬建邦國之九法有均守平則以安邦國之法則形方氏正其封疆不使相侵而無有􅏠離是也有比小事大以和邦國之法則形方氏小國事大國大國比小國是也大國不比於小國則侵其封疆而有􅏠離矣正之弗從然後詔於大司馬而九伐行焉聖人之於刑伐必有其漸不得已而後行以有形方氏為之始也山師掌山林之名辨其物與其利害而頒之于邦國使致其珍異之物釋曰山林在諸侯之國者名與物若岱畎絲枲嶧陽孤桐是也利謂物之可充民用者害謂物之能為人害者頒其名數于邦國使之各致其所産珍異之物令充貢獻以供王之珍玩膳羞服用也川師掌川澤之名辨其物與其利害而頒之于邦國使致其珍異之物釋曰川澤亦在諸侯之國者川之所産有魚鱉之屬澤之所産有麋鹿之屬珍異之物如泗濱浮磬淮夷蠙珠暨魚之類邍師掌四方之地名辨其丘陵墳衍邍隰之名物之可以封邑者邍與原同釋曰地名如冀之大陸徐之東原之屬辨其名以知其平陂燥濕辨其物以知其肥磽美惡物之謂相其地可以居民立邑大司空辨山林川澤邱陵墳衍原隰之名物而辨其邦國都鄙之數邍師之所掌皆所以行大司空之法者也除山林川澤四者有官餘邱陵墳衍原隰皆原師掌之原曰山林川澤皆有虞衡又設山川邍師於夏官以在邦國之山林川澤也故邦國各有虞衡矣使不立三師以掌之則珍異之物何由而致而疆界必􅏠離於列國爭訟由之以起矣後人析入他官不亦繆哉匡人掌逹法則匡邦國而觀其慝使無敢反側以聽王命釋曰法則八法八則也邦國之官府都鄙亦用焉慝姦僞之惡也反側背違反覆也匡人推逹法則以正列國諸侯而察隱慝使之無敢二心忠誠一德以尊天子如是則無從匪彛無隳王度一唯王命是聽庶不陷於九伐矣撢人掌誦王志道國之政事以巡天下之邦國而語之使萬民和說而正王面語魚據反釋曰志者心之所之政事者心之所發巡行天下邦國以王所欲致治之志慮與王所行之政事以告語諸侯則可以宣德意感人心則天下之民莫不和恱而正向於王矣原曰先王之於諸侯雖分之以土然所以防間感化之者亦至矣既有合方氏以一其統馭又有訓方氏以明其好惡則其所以教之者亦至矣此又設匡人使察其有二心不忠反側者惡雖未形見於外其所以匡救之者預矣又立撢人之職以王之志慮與王之行事告之使其傾心一意以向於王夫逺則心二驕則犯上勢所必有也王者於諸侯所以訓誨防間之者如此之密則蓼蕭之嘉豫天保之至誠不有所自來耶都司馬掌都之士庶子及其衆庶車馬兵甲之戒令以國法掌其政學以聽國司馬家司馬亦如之釋曰都謂王子公卿之采邑邦國有司馬都亦有司馬掌士庶子者司馬司軍賦士庶子主宿衛軍賦者衆庶則民之籍於司馬者也車馬者則所謂甸出車一乘是也掌其政學亦猶諸子之春合諸學秋合諸射以考其藝而進退是也國司馬則邦國之司馬蓋都亦邦國之都也如王畿之都則聽於大司馬矣劉氏曰采地之卿大夫仕於王朝士庶子在外既不屬於宫伯諸子及有軍旅之事徵兵於都鄙則以士庶子作其衆庶車馬兵甲而都司馬掌其戒令以聽國司馬奉其節制以進退討伐焉都司馬掌大都小都之士庶子者也家司馬掌家邑皆如都司馬之事但大小不同耳原曰都家者天子公卿大夫之采地各置司馬平時糾戒率令之使興事體教無有違慢則都家之君雖有數百乘之富無不統馭於王朝矣又其士庶子都家司馬掌其政學一如王國教胄之法然後世祿之人無驕泆敗禮矣如有軍旅之事徵兵于都鄙則都家司馬率之而聽于國司馬朝大夫云治有不及在軍旅則誅其有司此聖王馭都家之法所以必使都鄙之君無不循法守則而成太和之治也豈有後世據邑要君之事哉秋官司冦第五秋肅殺萬物刑所以懲奸惡而整齊萬民也故立司冦掌邦刑以象秋故謂之秋官羣行攻劫曰冦舜命臯陶作士命之曰蠻夷猾夏冦賊奸宄則刑以懲冦為急也天下之亂有不始於羣行攻劫乎故名官曰司冦官所司而至於冦則刑罰之事無不舉矣惟王建國辨方正位體國經野設官分職以為民極乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國釋曰禁所以防奸刑所以懲惡司冦司刑不言刑而言禁者刑施於已然禁防於未然先王設刑惟恐人入於其中故為之明示法禁使知有如是之罪必陷如是之刑則人有懼心易避而難犯故言邦禁也司徒曰以刑教中則民不暴司冦掌邦禁又曰刑邦國者蓋刑以弼教冦則敗其教之成者也縱欲敗類乃教之所棄而刑之所取王氏曰禁之所以為仁刑之所以為義禁之不止猶有犯焉然後以義斷仁也刑官之屬大司冦卿一人小司冦中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人釋曰大小司冦為刑官士師至旅下士為屬六十舜命臯陶曰汝作士穆王訓刑曰士制百姓于刑之中則古之刑官其名為士至成周始以士為司冦春秋時陳以避諱之故又改為司敗其名雖殊掌刑則一故其屬之首必名為士師鄉士者掌國中之刑罰猶鄉遂師也遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人釋曰遂士掌六遂之刑獄者也每遂二人故總之十有二人也縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人釋曰縣士掌四等公邑之刑獄者也方士中士十有六人府八人史十有六人胥十有六人徒百有六十人釋曰主都家之刑獄者采地在王畿四方故曰方士訝士中士八人府四人史八人胥八人徒八十人釋曰訝迎也士官之迎四方賓客以獄訟為主故曰士云朝士中士六人府三人史六人胥六人徒六十人釋曰朝士掌外朝之法為大詢衆庶主聽獄之朝故屬秋官司民中士六人府三人史六人胥三人徒三十人釋曰此官主民數者非訟獄者而屬秋官何也書其生齒登下之數欲生齒日多也生日多則刑日少矣故刑期無刑雖設而民不犯此聖人之意故雖殺民將以生之也此司民所以在司冦與司刑中士二人府一人史二人胥二人徒二十人釋曰此官掌五刑之法以詔司冦弊獄者司刺上士二人府一人史二人徒四人釋曰刺殺也訊而罪定者則刑之其情可矜法可疑者則從而宥之也司約下士二人府一人史二人徒四人釋曰約諸侯萬民以言語相約束者則掌其約劑司盟下士二人府一人史二人徒四人釋曰曲禮曰涖牲曰盟蓋以約辭告神殺牲歃血明著其信也黃氏曰商人作誓而民始畔周人作㑹而民始疑然則盟書果非先王之事乎先王以輔德信者也後世德信廢而明誓獨行於天下此民所以畔且疑也陳氏曰先王之時結民以忠信誠慤之心維邦國以比小事大之禮然盟詛之末常不弛於天下使人明則知好惡幽則知信畏然後有同德而無離心則盟詛之輔於教也其可忽哉後世儒者或以疑周官過矣職金上士二人下士四人府二人史四人胥八人徒八十人釋曰掌受士之金罰貨罰者而金玉錫石丹青之出入亦總之焉司厲下士二人史一人徒十有二人釋曰犯政為惡曰厲司厲主盜賊之兵器及坐盜賊之為奴者犬人下士二人府一人史二人胥四人徒十有六人釋曰司冦祭祀奉犬牲故犬人屬秋官司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人釋曰圜謂圜土也猶後世之獄城也掌囚下士十有二人府六人史十有二人徒百有二十人釋曰囚拘也主拘繫當刑殺者掌戮下士二人史一人徒十有二人釋曰戮猶辱也既斬殺之又戮辱之司隸中士二人下士十有二人府五人史十人胥二十人徒二百人釋曰隸給勞辱之役者以罪人為奴僕故在此司隸為五隸之長罪隸百有二十人釋曰盜賊之為奴者蠻隸百有二十人釋曰征南夷所獲者閩隸百有二十人釋曰南蠻之别名夷隸百有二十人釋曰征東夷所獲者貉隸百有二十人釋曰征北夷所獲者布憲中士二人下士四人府二人史四人胥四人徒四十人釋曰憲表也主敷布憲法以昭示其民使之畏而不犯也禁殺戮下士二人史一人徒十有二人釋曰禁殺戮者禁民不得相殺戮也丘氏曰此言非天吏不可以殺人禁暴氏下士六人史三人胥六人徒六十人釋曰禁民不得相凌暴也王氏曰以刑教中則民不暴者教官之事也以刑禁暴者刑官之事也野廬氏下士六人胥十有二人徒百有二十人釋曰廬野道之小室所以待行旅也十里有廬三十里有候館則館大而廬小野廬氏掌國野道路宿息之類故名官野蠟氏下士四人徒四十人蠟清預反釋曰蠟骨肉腐臭蠅蟲所蠟也月令曰掩骼埋胔此官之職也以掌禁戒之事故在於此雍氏下士二人徒八人雍於勇反釋曰掌隄防以止水者溝瀆澮之禁亦禁戒之事萍氏下士二人徒八人釋曰萍之草無根而浮以之名官主水禁取其不沉溺司寤氏下士二人徒八人釋曰王氏曰寤而覺謂之寤使掌夜時非覺而不寤者安能定其刻漏之早晚哉所以謂之司寤氏也以宣王之時去成王之世未逺而君子之來朝或以夜未央未艾則司寤之職不行可知矣此詩人所以針之也司烜氏下士六人徒十有二人釋曰烜火也王氏曰取明水火於日月而名官謂之司烜者易曰日以烜之蓋火本於日烜之而後明也然爟與烜皆火而司爟在夏官司烜列秋官者蓋司爟掌出入火南方之屬也司烜共明水火司冦所奉也故列司爟於夏而司烜在秋官也條狼氏下士六人胥六人徒六十人條徒歷反釋曰條謂滌除也不蠲之物狼籍道上者則滌除之也修閭氏下士二人胥一人徒十有二人釋曰修治也閭謂里門王氏曰里有門所以通往來扞制內外先王立官以修治其事故名曰修閭原曰自禁殺戮至修閭氏十官皆譏防盜賊奸宄譏防嚴則奸宄息所以清刑之原歟惟蠟氏司烜二官乃蠲潔與奉明水火之官為祭祀而設者冥氏下士二人徒八人釋曰冥氏掌除猛獸之害人者王氏曰欲攻猛獸必使之冥然而不覺然後可以獲所以名官謂之冥氏庶氏下士一人徒四人釋曰庶者驅除蠱之害毒王氏曰先王以善政養天下之民既庶且繁故設官以除蠱毒之害謂之庶氏也穴氏下士一人徒四人釋曰穴氏主搏蟄獸所藏者翨氏下士二人徒八人翨音翅釋曰翨鳥羽鳥之飛在翨攻猛鳥者必攻其翨然後可獲故名官曰翨氏柞氏下士八人徒二十人釋曰柞除木之名除木者必先刋剝之詩曰載芟載柞王介甫曰先王之於林麓也設虞衡為厲禁以掌之又置柞氏攻之者欲其材木為用則設官為厲禁以養蕃之欲其地宅民稼穡則刋剝而化之帝省其山松柏斯兊柞棫斯拔則虞衡之官修焉作之屛之其菑其翳修之平之其灌其栵則柞氏之職用焉剃氏下士二人徒二十人釋曰剃他計反是書剃或作夷芟夷藴崇之皆去草也剃氏掌夷五地之草以待耕種硩蔟氏下士一人徒二人硩讀為擲它歷反蔟倉獨反釋曰硩擲也蔟巢也摘其巢而去之妖鳥不復至矣翦氏下士一人徒二人釋曰翦除也主除蠱毒者謂之翦斷滅之義也赤叐氏下士一人徒二人叐音跋釋曰赤叐猶言捇拔除去之也主除蟲豸自埋於牆屋之中者蟈氏下士一人徒一人釋曰蟈蛙也月令曰螻蟈鳴壺涿氏下士一人徒二人涿涉角反釋曰壺瓦鼓也涿擊也所以驚水蟲也庭氏下士一人徒二人自硩蔟氏以下六官今已去之釋曰主射妖鳥令國中潔清如庭也自冥氏至庭氏十二官皆順天時以去民之害雖若傷殘乃所以仁愛此天之肅殺之意故皆屬乎秋官陳及之曰古之王者鐘鼓管絃以養其內威儀文物以養其外出則有虎賁氏夾道而趨居則有士庶子掌守其居止行幸未嘗一日忘武備自儒生論之以為無他事矣先王猶恐猛獸之隱伏毒蟲之竊發狸蟲之潛聽水蟲之巧伺皆足以害人身者妖鳥之聲蛙黽之音亦足以亂人心一物不去於治身養心為有缺則是數官之設非得已而不已者也豕突乘輿熊當御坐雖當時所致亦王制有不足耳所謂方書歲月日星之號以去妖鳥攻禜以攻蟲物蜃灰以攻貍蟲牡蘜以去蛙黽炮土之鼓以去水蟲救月之矢以射妖鳥非明於庶物精義入神者不能知也原曰先儒之疑周禮者正謂此十數官之類瑣細之甚非大義所關先王為此而設官有名爵有胥徒且有官必有祿則是為民除害者甚微而厲民為養者甚巨此有識者所以謂周禮之決不可信者在此也然不知先王賢者在位能者在職皆鄉遂之民為之故有此疑以愚觀之先王之於天下使天地萬物各得其所故凡天下之民有一德可録一能可使皆有以處之故凡天地間有害人之物利人之事天下之人善其物能其事者先王皆必使之致於用庶物之微或利或害皆必處之各當焉裁成輔相其功正在於此烏可以其小而忽之其所設之官皆於民伍之中有善其事者使之任其職以其官之秩為辨施舍之等而已夫豈如後世專事設官而履其士任者哉故知能者在職之說可無疑於周禮矣銜枚氏下士二人徒八人釋曰枚狀如箸橫銜之為之繣結於項中以止言語囂歡也此多軍中所用在此者以禁戒之事及祭祀亦用焉故也伊耆氏下士一人徒二人耆巨之反釋曰此官共王之齒杖及耆老之杖咸其有功於耆老矣以伊耆名官者蓋古王者始為蠟以息老物者號伊耆氏後王識伊耆之舊以名官及後世以其官為姓焉大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人釋曰宗伯掌禮司馬掌諸侯之政令行人掌天下之諸侯往來交際之禮者以掌禮宜在春官以掌諸侯宜在夏官屬刑官何也蓋欲刑官以刑約束天下諸侯使不敢違於禮也其意深矣唐氏曰伯夷降典而繼以折民惟刑周禮行人之官必屬之司冦此古者禮刑表裏之意也洪範六曰司冦七曰賔論語齊之以禮齊之以刑亦此意也環人中士四人史四人胥四人徒四十人釋曰環猶圍也主賔客任器而為之守衛王氏曰夏官有環人秋官復有環人者蓋夏官環人掌環四方之故取周巡往來若環之無端也秋官環人掌環賔客之任器取周圍保護若環之無隙也官名雖同而意則異象胥每翟上士一人中士二人下士八人徒二十人釋曰通夷狄之言者象胥其有才智者也東方曰寄南方曰象西方曰狄鞮北方曰譯今總名曰象者周之德先致南方也王氏曰化自北而南以言其所致者遠也掌客上士二人下士四人府一人史二人胥二人徒二十人釋曰專掌四方賔客牢禮之數者不屬禮官以與行人為類掌訝中士八人府二人史四人胥四人徒四十人釋曰訝迎也主迎賓客者王氏曰秋官有訝士又有掌訝者蓋訝士刑官也兼掌獄訟掌訝惟以迓賓客為主而已掌交中士八人府二人史四人徒三十有二人釋曰交者主交通以結諸侯之好王氏曰天地不交而萬物不生上下不交而功勳不成先王所以立掌交之官也與掌察四方中士八人史四人徒十有六人釋曰掌察主督察邦國之事者言四方者每方中士二人史一人徒四人也掌貨賄下士十有六人史四人徒三十有二人釋曰掌邦所致貨賄朝大夫每國上士二人下士四人府四人史二人庶子八人徒二十人釋曰此王朝之士也以其主都家之國治其事重故總名之朝大夫也庶子者蓋亦主采地之諸子今在府史之下蓋官長所辟除也都則中士一人下士二人府一人史二人庶子四人徒八十人釋曰主都家之八則者也太宰以八則治都鄙都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之按春官則有都宗人家宗人掌其祭祀夏官則有都司馬家司馬掌其軍旅秋官則有都士家士掌其獄訟蓋都鄙之君皆在王朝而其國事皆王官治之所謂天子使吏治其國者也然則司徒司空何以無都家之官曰司徒縣師是也縣師專治都家之正官其祭祀軍旅獄訟又王朝之官治之所謂都不可耦國而分其權也先王之意深矣周禮全經釋原卷十
