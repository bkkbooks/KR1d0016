  text: 刻周禮全經釋原跋
  hash: sha256:53644f3102123c099da83332a0aec25e74bcf97e6c55c647062f4183e078582c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0016_WYG_016-1a, image: WYG0096/WYG0096-1049c.png}
body:
  text: 大忠守廬無狀猥辱部使者西蜀傅公捐金勒周禮全經釋原檄忠董梓事刻既竣讀而歎曰嗟乎事固有迷於數千百年者而一旦顯白使洞見聖人之心如此書者乎周官六典乃周公致太平之具孟子曰諸侯惡其害已而皆去其籍遂使龎離錯亂僅存五官漢人用考工記補冬官牽合連綴使後世不見全書為憾長樂柯君者起斷然以余庭椿氏所謂冬官不亡散見於五官中者為的論黜考工記用遂人以下地官之半實為冬官乃作釋原作源流叙論作六官問目作通論挈領循緣使聖人經世大典若揭日月於層霄之上顧其功豈淺鮮矣哉竊怪今之士人侈談性命之學馳髙騖逺甚者以吏治為鄙嗟嗟是遵何見哉締觀兹籍皆周公精神所寄其輔理成化可以紹往聖憲百王乃其運用經綸不遺纎細雖米鹽廪舍之屬亦條制而曲防焉俾各歸于至當此顧非聖人之心學歟何嘗外日用為教西蜀公加意兹書其㫖蓋裒然逺矣公被璽書為屯田使者并治馬政凡令甲所載靡弗察舉其諸所擘畫炳然皆經國逺猷所謂身有之而身好之者非耶忠叨屬下吏幸睹成事乃僣為論著如右張大忠跋
  hash: sha256:6be461a402afed9524bcdefa38a858a199534fb2fb577c9da472cbc0127ca214
