body:
  text: 周禮全經釋原卷十三明柯尚遷撰鄉遂聖王有作必先制畿建侯以立民主別鄉分遂以比民居井牧田野以定民業然後設官分職以維持之是必制定而後建官官定而後分職耳人知制畿封國者官職之本而不知鄉遂者又畿國之本也今夫比閭族黨州鄉鄰里鄼鄙縣遂者鄉遂之制也卿大夫士者鄉遂之官也故鄉遂雖有官矣而非在職之選也何以明之一鄉不過萬二千五百家比長以下士為之一鄉則二千五百下士矣閭胥以中士為之一鄉則五百中士矣族師以上士為之一鄉則二百二十五上士矣黨正以下大夫一鄉則有二十五下大夫也州長中大夫一鄉又有五中大夫也而鄉大夫則卿之秩也合一鄉之官已有三千二百五十五人矣六鄉不過七萬五千家而官則有一萬九千餘也又以祿言之下士視上農祿食九人是五家則官賦一上家之食也中士倍下士祿食十八人是二十五家而復賦七上家之食也上士倍中士祿食三十六人是百家復賦其三十二上家之食也推此言之積而至於一鄉又積而至於畿內又以供朝廷之百需又以供王之九賦是在官之祿反倍於在民之耕則服南畝者其家皆不衣不食悉以供上猶為不足矣然則鄉遂天下根本法不可行於後世者其原皆起於此先儒之說不曰此皆兼設之員則曰古今異宜是古法果不可行於今矣夫古之天下亦今之天下山川民物無不同也習尚好惡無不同也今不可行古亦不可行也安有可行於古而不可行於今哉愚謂萬民之中愚知不齊才德亦異故貴賤不侔貧富不一古之時宜無以異於今之時也王者之治天下而皆使之無智無愚無貧無富無貴無賤混然齊一不過受百畝之田以給一家之衣食不亦難哉吾知必因萬民不齊之中而區別之使才德賢愚貧冨貴賤各得其分而無侵凌之患然後謂之平治决不為抑冨伸貧籠智擾愚之術也後世法制既廢强凌弱衆暴寡知詐愚勇苦怯冨者田連阡陌邑有公侯之尊里有人君之富貧者流離餓殍而上不之恤不肖處上賢者在下皆鄉遂之說不明有以致之不専在於井田也今考司徒設官鄉遂大夫而下有爵秩名位而無府史胥徒者皆鄉遂之民差其等正其位職其教者也無官府之設故無府史胥徒之役設官府以治鄉遂者惟鄉師遂師居司徒司空之局以治六鄉六遂載師閭師則居鄉遂之中縣師則居於都鄙而専治焉故鄉遂之中惟此四官各有府史胥徒為受命天子操刑政之權以治民事之正官自鄉大夫至比長自遂大夫至鄰長皆鄉遂之民各為保伍各相教治異其爵秩別其貴賤謂之教官謂之鄉吏不受命天子操刑政之權者也然則其祿何如比長雖統五家即上農也閭胥受二家之田也為二十五家之長族師雖統百家亦受四家之田又有士田以益之也此皆農人之中人品不齊德行才能足兼五人二十五人百人之上者為其田以處之為其秩以等之所謂下士即上農中士倍之上士又倍者亦合其子弟受之土田令其自耕以供一家之衣食耳固不如在職之上中下士食民賦稅以為倍也黨正州長鄉大夫則已嘗為大夫者其家既受田矣別有宅田官田以賦其祿或又有賞田牛田牧田以益之乎夫自其能受二夫之田而至於能受十夫之田則其家之殷富子孫從人之衆多可知矣自下士上士中士而至於秩當上大夫則其宫室之制器用之度衣服之別禮樂之等可知矣其人可為五百人二千五百人萬二千五百人之長則德行之優裕又可知矣賢者以次而升不賢者以次而降升者加其爵秩益其田祿合其子弟備其臣妾降者下其爵秩減其田祿分其子弟散其臣妾此小司徒所以歲終則考屬官之治而誅賞大比則平教治正政事考夫屋鄉師歲終則考六鄉之治以詔司徒廢置大比則考教察詞稽器展事以詔司徒誅賞是以古者之民貧冨貴賤常與人之德行才能相稱故幸民不得逞而奸民不得肆易直淳龎以從上令朝夕孜孜措心發慮未嘗不欲勤其事盡其職敏其行以聽在上之旌舉也成周之治其根本盡在乎此王道失傳後世未有能明之耳或曰比長即上農也農夫而加以下士可乎曰遂中鄰長無秩里宰則二十五家一下士似為合宜然古者鄉官皆以德行而立之其實民也耕公田供貢賦則一而已所以有上中下士之名者亦於庶人之中而差等之異其章服禮節而已非敢與朝廷所命在職之上中下士同也况六鄉乃王城之內宜君子多也六遂與都鄙則通之天下鄰長無秩乃常制也何疑於六鄉各尊一秩乎曰上中下之大夫爵亦尊矣鄉大夫州長黨正既民中之官安可授以如是之尊爵曰三等大夫其本皆賓興所出用事而任職則司乎百官府之治矣老而致其事則司鄉中之教及其既死子若孫則亦襲其爵為鄉官所以貴貴也然襲爵亦以功勞為等秩世祿之法實在於此必其子孫德不稱其位乃降之若身被降黜則亦不得膺是爵矣况子孫乎然在職之官不時更代鄉官少更代者是以朝廷在位之爵反少而在鄉之爵反多所謂以賢制爵則民愼德又曰長以貴得民者此也尚書大傳曰大夫七十而致事老其鄉里大夫為父師士為少師歲事已畢餘子皆入學傳農事上老坐右孰庶老坐左孰此可以見大夫士致其事必司鄉中之教矣夫所謂鄉遂之官大夫士之秩者皆常為大夫士者或為大夫士之子孫而世祿者是以家世素為民之所服其子孫亦思守其家法而不敢廢是以宗法亦可常行而不墜然後貴者不遽賤而賤者不遽貴故上下以辨民志以定後世以科目取士無德行道藝之考無鄉舉里選之法朝夕鑽研徒資口說聖經賢傳乃為利筌其取人也據一日之長慿一人之見富貴貧賤只在須臾之間朝為庶人夕登仕版及其廢也朝為民表夕為匹夫其進也無漸其退也無歸是以屠沽賤𨽻皆萌僥幸之心夫其進也無漸則居官者寧無充昔之念其退也無歸則當事者豈忘殖後之心忠赤之心日薄亦勢有以驅之故也是養賢之道既失於前馭官之法大繆於後矣鄉遂之法乃周禮之首務而禮樂兵刑井田次之三代而下豈無願治之君賢明之佐欲舉行聖人之典以復中古之治者乎特以其本不明而獨行其末適足以壞天下也故欲行周禮而興王道者必自鄉遂始封建胡五峯有言封建者先聖王所以公天下之大端大本也郡縣者秦人所以私天下之大竇也此升其堂未睹厥奧者歟就秦人而論之信有公私之判矣若以王道言之固無非公天下之心無非封建之法而郡縣亦行乎其中矣但先王之法則俱得之後世則俱失之何也治天下之大本大原起於鄉遂五家為比必立之長五比為閭必立之胥四閭為族必立之師斯皆民也辨其等列異其章服頒其教法上下貴賤於是乎分勸率服役於是乎始雖無封建之法其所以習民於等差階級之中而消其逼上無等之心則封建之意實原於此至於五族為黨黨正下大夫五黨為州州長中大夫五州為鄉鄉大夫則卿也斯亦民也仍其官而世其祿立其行而司其教是以上有定職而教可行下有常尊而服以素雖無封建之實而封建之法則本於此至於分以五十里七十里百里之土命以六命八命九命之爵人於是始知其為封建矣是故公侯伯子男者爵也上大夫中大夫下大夫及上中下士亦爵也五十里七十里百里者祿也而大都小都家邑官田宅田士田者亦祿也公掌五百里之諸國侯掌四百里之屬國伯掌三百里之屬國子掌二百里之附庸男掌百里之屬邑此職也鄉大夫掌其鄉之政教禁令州長掌其州之教治政令黨正掌其黨之教治族師掌其族之戒令政事閭胥掌其閭之徴令比長掌其比之治此亦職也是則鄉遂之法與封建同故鄉遂者封建之小者也封建者鄉遂之大者也鄉遂行於封建之中封建出於鄉遂之外故不知鄉遂何以知封建也胡子所言無乃未達其本乎揆厥所原蓋由賢能二科不明故鄉遂封建莫能辨也夫有德行則謂之賢有道藝則謂之能賢能必本於德行道藝人固知之矣至於賢者在位能者在職則未必知之也在位在職人固或知之矣有在位之職有在職之位則未必知之也夫何以賢者在位也有德行則以爵位處之矣自鄉大夫而至比長自天子而至公侯伯子男此皆賢者之位故有德行者居之居其位必思久其位蓋以國為已土衆皆我民民安已受其利國傷家嬰其禍此天子諸侯之心無不同也鄉官必思德以稱位位以彰德德行尊則能化下而人服故位可久德行不修則大比廢置而降黜隨之故秩進則祿益而富自來秩降則祿削而貧自至故前人欲以垂後後嗣思其堂搆在位者之心無不同也是以三代之人惟患德行之不修無憂爵祿之未至風俗淳美蓋有此具矣何以能者在職也王朝六鄉之長與屬下及都鄙治事之吏皆職也有德行道藝之全者賓興之以進於王入於太學教養之司馬辨論官材內史䇿命之以治王朝六官之事此職之大者然必著其功績而爵秩隨之故王朝雖有大夫公卿之貴皆謂之能與公侯伯子男之賢為對此大賢大能之分也若夫鄉遂之中德行道藝未能兼全者則為次賢次能不以鄉飲之禮禮之賓之止以鄉射之禮觀之詢之賢者則進其秩如閭胥進為族師黨正進為州長此亦賢者之位也能者則視其所習之道藝令為鄉遂都鄙治事之職如均人遺人之類凡六官所列微職不由朝廷所命司徒司空舉之鄉師遂師任之此亦能者之職也故曰使民興賢出使長之使民興能入使治之此之謂也若夫在位之職則公侯伯子男之教其屬國鄉大夫以下之各教其所治而謂之曰方伯連帥謂之曰鄉吏教官蓋皆不恃其政刑以威之貴於修其德行以服之是故行高則服衆德高則位崇故侯伯不得専征伐有奉命討罪而無興廢之權鄉官有鄉刑而無府史胥徒之設教人貴德故也夫是之謂在位之職而在職之位則王朝有公卿大夫士之爵鄉遂庶職有上中下士之秩是也蓋大賢大能天子所用自下士而可至於公卿大夫然必建其勳庸政績然後以次而升功名居先爵祿居後蓋爵以授德祿以酬功不可苟也夫是之謂在職之位亦有居其職不加其爵者以德位稱故也亦有有其爵不稱其職者則改其職依其本秩退為鄉官則有過者黜辱不至於極而去職亦有其所是以在職之人皆盡心職業而無後慮進有忠孝之心退有禮讓之實此王者處得其當故使之在職則美政在位則美俗三代所以泰和長久者以有此具也雖其身死之後子孫亦當其祿但爵則視其德耳夫是之謂大公夫是之謂封建故不明乎鄉遂之法在位在職之分而論封建終無以得聖人之意也若夫郡縣之法後世所不能廢者蓋亦有由天子王畿千里畿內設鄉遂都鄙畿外建侯伯子男諸侯之國亦設鄉遂都鄙但其大止於百里耳後世不建邦國而立郡縣而徴其貢賦亦猶畿內采地公卿大夫王子母弟身居王朝而收其貢稅以為祿天子使吏治之故畿內之制後世郡縣之法也故以治王畿之法治天下則為郡縣以邦國九倍王畿之制分天下英賢共之則為封建以郡縣之法治天下是以天下為王畿也以天下為王畿是修身齊家以平天下而無治國也無治國是以天下為已國也以天下為已私分而封建不行則聖人大公之意亡矣夫鄉遂不立則天下賢者不在於位偏用能者在職以治天下矣惟賢者不在於位故教法不行禮讓不著而鄉法壞鄉法壞則賔興無本貧富無制故不得不取以科目既取以科目又設在職之官以教之不過使之讀書為文以取科第而已利之所在程式存焉雖不設官教之何患其不能為舉業也故教官為虛設科目為虛法不知古之教官即鄉官之有德行者為之今日之教者以德行道藝則明日之舉者必以德行道藝矣教之初已為興之之地則用之也尚何負於賓禮之隆哉孟子曰夫人幼而學之壯而欲行之此之謂也以治王畿之法治天下者豈惟以天下為己國而謂之私哉萬里之外朝覲述職之禮賀慶考績之事無不同於王畿一命不命之官至微細也無不入冡宰之銓選使之往還萬里或數千里要荒之地終年曠職其視先王公天下以為心度逺近分英賢以共之何如也是故冡宰施典於邦國施則於都鄙五命賜則六命賜官七命賜國五百里外為侯服歲一見千里之外為甸服二歲一見二千里外為男服三歲一見三千里外為采服四歲一見四千里外為衛服五歲一見五千里外為要服六歲一見是朝覲述職以地逺近而分疏數之期建官授職以命多少為權輕重之別豈有如後世地無逺近之限事必出自朝廷官無大小之差權皆出自冡宰哉若夫公侯伯子男之分土分民在今之時誠不可與古同何也三代之王天下皆自諸侯而為天下之所推戴自宜以爵土分天下英賢共之而權未嘗不存也後世之君天下者無尺土一民之資以除暴救民而得之勢與三代不同固不宜踵三代之封建然而聖人公天下之意亦未嘗不存也是宜於郡縣之中而寓封建之法必鄉遂必井牧郡縣各有所治之民大小各有三等之別以相統屬官必久任以功最加爵而不徙其治職以祿賞功而不以官賞功地分逺近為朝覲述職之期官分大小為朝廷嶽牧除授之柄千里為省省設方伯連帥以為監有分職無分民有加爵無専土此古封建之法後世變而通之者也使聖王復作必不踵三代之封建因時制法而道未嘗不存焉不考封建之本原不推郡縣之至理徒曰郡縣私也封建公也先王之意荒矣郊廟天之胙君實為神主君之受命惟典神天明天位由天所命鬼神饗佑然後為天子也故曰天之厯數在爾躬是天神地示人鬼三者接之以其道則天清地寧鬼神降福天位尊而安矣然先儒於天地之祭南郊北郊之分祀合祀天子七廟九廟三昭三穆考論紛紜靡不質據經傳然卒未之能定云夫謂天地有分合祀者孔子曰天尊地卑乾坤定矣卑髙以陳貴賤位矣天輕清而浮陽在上上天之載無聲無臭然萬物之賦形受質者莫不本焉故陟降厥士日監在兹體物而不可遺者以不著形迹而神行於其間故感應之妙捷於景響耳地則屬乎質而塊然奠體於下雖曰萬物非地不生然物而非神也質而非氣也不得天之一氣運行其間地亦何自而有生物之功乎故地體雖大而不可與天配矣既不可與天配况可與天合祀乎吾知物之與神既不相同卑之與髙貴賤自別耳今以周禮考之大宗伯曰禋祀昊天上帝血祭社稷五嶽以蒼壁禮天以黃琮禮地與圭璋琥璜禮四方小宗伯曰右社稷左宗廟兆五帝於四郊典瑞曰四圭無邸以祀天旅上帝兩圭有邸以祀地旅四望司裘曰祀昊天上帝則大裘而冕祀五帝亦如之宗伯又曰國有大故則旅上帝及四望王大封則告后土稽之經文蓋天有分祀合祀地亦有分祀合祀非言天與地有分合之云也夫言祀昊天上帝則合祀於南郊言旅上帝則分祀於四郊言祭社稷則祭地於大社言旅四望則分祀於五嶽何也四郊各有壇以分祀五帝故春夏秋冬迎氣而禮之四類附焉祭日於東祭月於西日為壇而月為坎司中司命陽也祀於南風師雨師隂也祀於北國有災害則以類隨方而旅祭焉旅衆也分也鄭氏訓合非矣又於南郊總立圜丘之壇以祀昊天上帝后稷配焉凡天神皆合祭焉大司樂曰冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣郊特牲曰兆於南郊就陽位也禮運曰祭帝於郊所以定天位也此之謂也曷嘗有地在其中乎以祭地言之蓋於五嶽之下各有方丘以祀五嶽凡山川丘陵藪瀆墳衍之在其六者配之天子巡狩諸侯各朝于方嶽之下則望于山川遍于羣神此地之分祀也於王宫之右為方澤方丘以祭名之曰社曰后土神之也以稷配焉名曰大社大稷蓋以稷能養人功與地並也然後以五祀五嶽及山林川澤俱合配於社而夏至祭焉大司樂曰夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣禮運曰祀社於國所以列地利也此之謂也今言既有社稷又有祭地何也若社稷之外又有地之祭則大宗伯以社稷對昊天上帝而不言地何也蓋社者從土從示神其地故變其名猶天而言昊天上帝者也豈既有社又有地者哉後儒有言南郊祭天北郊祭地又何所本也故社則諸侯卿大夫之有分地者皆得祭之而鄉遂都鄙之間民皆立社以祭焉所以神地之道而教民美報也天則惟天子得以祭之以天有帝非為臣者所得對也昔者魯用郊禘孔子歎曰周公其衰也祀之郊也禹也宋之郊也契也皆二王之後也故得郊焉魯侯國而郊禘非禮也故曰天子祭天地諸侯祭社稷君臣之分凛不可犯矣或曰孔子云天地不合萬物不生又曰郊社之禮所以事上帝也是地合祭於郊亦可見也故分祀者所以使隂陽各得其位合祀者所以使隂陽合而萬物生此世道所以泰歟曰孔子不云乎天尊地卑而貴賤所以位也天地之合者以地氣上躋天氣下降而後合也奠位者天地之常體合者隂陽循環之氣非天地之常也隂陽升降道之自然非合祭天地而能使之合也故分祭天地者欲使隂陽各得其職卑髙各奠其位而君臣父子夫婦各安其分之道在是此世道所以泰也豈可尊母以抗父崇地以抗天是亂其常也又豈以道接三才之奧者乎夫謂郊社以祀上帝者便於立文也非併宗伯之三禮而為二也衆言殽亂折之聖經可矣若夫人鬼之享劉歆云天子三昭三穆與太祖之廟而七宗不在此數中鄭𤣥云后稷始封文武受命三廟不遷與四親廟而七朱子云祧廟之主藏於太廟之東西夾室及文武二世室既立為不遷而三昭三穆之上有祧主則藏於二世室之夾室竊意三年之喪達乎天子四代之祭達乎庶人廟數雖別而四親則同別以明禮同以稱情也雖天子九廟四親則一而已春官有守祧之職辨廟祧之昭穆者存廟為廟毁廟為祧蓋髙曾二廟之上一昭一穆為祧廟祧之主藏焉天子備禮也故曰三昭三穆君子之澤五世而斬故服以五世為斷若天子七世則髙曾之上又何稱也是知三昭三穆并二祧而數之諸侯祧主藏於太廟夾室而已故五廟大夫則昭穆各一廟士則五代同一廟庶人無廟祭於寢夫禮有隆殺情無貴賤天下之大義也諸儒不知有祧廟故有天子六世之說也曰其祭如之何曰天子之祭一年有四諸侯之祭一年有三大夫士有田則祭無田則薦庶人有薦無祭天子春犆禴夏祫祠秋祫蒸冬祫嘗三年大祫五年大禘故犆禴則各祭二昭二穆之廟三時之祫則合祭太祖之廟祧廟之主不與焉大祫三年一舉則祧廟親廟之主與焉五年則大禘禘也者禘其祖之所自出夫天子之祭自始祖而止矣始祖之上更無可推其所自出之帝而以始祖配之漢唐宋之君每以始祖無可推其所自出故廢大禘之祭竊謂禘字從示從帝謂天帝也生民詩明言姜嫄履帝武敏歆攸介攸止而育后稷閟宫詩亦言赫赫姜嫄上帝是依此則始祖之所自出也后稷既配天矣周公之意以為未足以盡其意之委曲故有大禘之禮焉當五年天下大朝覲之時為明堂大饗之禮以文王配上帝蓋文王之德與天同運故孔子曰周公郊祀后稷以配天宗祀文王於明堂以配上帝四海之內各以其職來祭又曰明乎郊社之禮禘嘗之義而不曰禘嘗之禮所以配乎其先可見禘為明堂之祭矣然所以當天下大朝覲之時而行明堂大禘之祭者明位天位也職天職也慶賞刑威皆奉天也豈敢以已意參之哉既祭之後乃大行朝㑹之禮而黜陟之典行焉是故禘則以德足配帝之祖父明仁人事天如事親事親如事天之義也必天下諸侯及王朝公卿大夫皆與祭者廣仁孝之道於天下明孝治也諸侯禴則不祠祠則不嘗嘗則不蒸犆一祫二非諸侯不大祫非天子不大禘魯禘于太廟孔子曰自既灌而往者吾不欲觀之矣故明乎郊社禘嘗之義治國豈不如示諸掌已乎樂本樂之所以為樂者何也和之至也以和召和故鬼神雖幽而可格萬民雖衆而可諧逺人雖戾而可悅動物雖繁而可作也曰和有本有用故天地雖大日月雖髙道並行而不相悖和也萬物並育而不相害和也人羣聚處而不相逆和也此和之用非和之本也樂之以和召和也則如之何夫樂始也審聲以氣終也召氣以聲天地之間聲與氣常相隨也以和聲召之則和氣應矣曰夫聲大而至於雷霆細而至於蠛蠓皆聲也夫氣隂陽寒暑皆氣也固無待於感召也今以和聲召和氣則亦有本乎曰其本起於神乎神也者妙萬物而為言也故不疾而速不行而至司馬氏遷曰神使氣氣就形神生於無形成於有形然後數成而成聲此樂之本也夫何以謂之神也不依於形而妙於形不著於氣而妙於氣常存於虛無之中氣不得則不能為氣形不得則不能為形故曰神者物受之而不能知及其去來聖人畏而欲存之故神自虛無之中而生氣氣非氣也清通妙應非常氣也是氣也其神之所依乎然則神氣之在天地間何由而得之曰冬至者氣之始也邵子所謂子之半天心未移一陽方動未動之間其氣神氣也在易謂之元謂之天地之心在人謂之仁謂之未發之中純粹精者也聖人則此神氣以為樂本名曰黃鍾之宫故以九寸九分之管凖之由黃鍾而生十一律由黃鍾而生八十四聲由此而自立隂陽由此而再生造化數始於一成於九三三而九之成二十七而八十一極於一十七萬奇而數終焉無非黃鍾之用也而無凡聲異氣雜於其間是之謂和樂由是以此氣而感天地之氣則和氣應矣故可動天地感鬼神悅逺人作動物也或曰黃帝命伶倫取竹於嶰溪之谷以聽鳳凰之鳴其雄鳴六其雌鳴亦六截竹為筒以應之乃得九寸九分為黃鍾之宫比之十一律皆可以生之是為律本何也曰黃帝聖人也定律作樂何不自用其神知而為之乃命官聽鳳鳴以為樂本者蓋以鳳為神鳥具天地中和之神氣故其聲也得天地中和之聲也惟黃帝伶倫乃能知之故凖以制器作樂張於洞庭之野其始也奏之以人徴之以天行之以禮義建之以太清四時迭起萬物循生其中也變化齊一不主故常其卒也五官皆備鬼神無不合㑹動植飛潛無不來格者以其本鳳鳴而制律吕神之至也今人以意見揣度能得此神氣乎又有欲於人身之指寸以定黃鍾者果神氣所在乎或曰雖黃帝之聖猶必聽鳳鳴以定鍾律今無聖人無鳳鳴則樂終不可作乎曰孟子云聖人既竭耳力繼之以六律正五音不可勝用也聖人雖亡制數法度存則樂存矣但律本非聖人之舊耳故樂本雖亡然神氣之在天地間終古不息一刻而無神氣則乾坤毁而天地不立也人無此氣則不能成人物無此氣則不能成物是所謂先天之氣也而神藏於其中矣惟於冬至之時可以取之一陽將至未至之間聖人謂之天地之心天地無心神即其心也惟此時可以見之過此則著於氣而非神之所存矣故截竹為筒以驗之氣至則灰飛此氣非後天之氣至精至純之氣也故以此管為至神之管律得此氣而為律吹之以為聲則天地之和聲也由是以生十二律由是以正五音而黃鍾未嘗不存焉故黃鍾之管神管也神管體也故曰理如類有可類言此神管之理有可類而為用者耳又曰或未形而未類或同形而同類言分者當律之數則同形而同類其分而存者則未形而未類皆黃鍾之體也又曰類而可班類而可識聖人知天地識別之故從有以至未有以得夫器數既成則人皆可識矣然氣數雖形至有也而神存其中則無有也非聖人其孰能識別之是故至細而難見者先天之氣也至微而難審者黃鍾之聲也聖人知天地之妙用而識別之故因神而得其氣因氣而得其聲由是可以和天地由是可以洽神人而樂之妙著矣故曰細若氣微若聲聖人因神而存之雖眇必效史遷之言乃世世相傳而得樂之大本者也故其發黃鍾神氣之理微妙如此後人不知而區區於器數之間求之不亦逺乎自此而下則數存而法備㑹而通之則前千萬世之既往後千萬世之未來其理莫不形見於樂以子貢之明達猶能聞樂而等百世之王之德况於孔子由文王之操以求之豈不宛然見文王哉故樂之道𢎞矣樂之理妙矣苟能取神氣以定黃鍾依黃鍾而作樂必能使人耳目聰明血氣和平移風易俗天下皆寧者也故樂惟漢為近唐宋則有得有失然皆施之議論耳近世有李文利者倡為黃鍾三寸九分之說以律凖易一隂一陽相為循環同天地之大氣焉是不知有神氣而再立隂陽之道也蔡元定曰易者盡天地之變善與惡無不備也律者致中和之用止於至善也是理也在聲為中聲在氣為中氣在人則為喜怒哀樂未發之中與發而中節者也西山此言可以破李文利賊經之妄矣又有泥史遷之言者曰九寸三分之管為神管不用而虛之再生之黃鍾為氣管倍長倍廣之管為形管惟使氣管形管對吹之神氣形皆立管焉既非矣虛神管不用而又倍之則黃鍾安在哉黃鍾之管而可倍則聲入雷霆矣又有執吕氏春秋三寸九分吹之名曰函少之說以為遂孔不過當合字之譜而已固非黃鍾之元聲也各出意見聲氣之元愈不可見矣兵制兵與民一人也文與武一體也人之賦質固有仁者矣固有勇者矣然必仁勇備乃為全德文武備斯為全才古之時兵民不分春夏合民以耕秋冬合民以田詩曰二之日其同載纘武功故時雖無事猶不忘戰也欲兵常強則莫若選民為兵使有勇力者得致於用欲食常足則莫若兵民不分有事選之入行陳無事使之歸農畝是以兵不久其人則老弱不雜食不專於給則民用可需周家選兵之法上地家七人可任用者家三人中地家六人可任用者二家五人下地家五人可任用者家二人凡起徒役無過家一人以其餘為羡惟田與追胥竭作夫家出一人為正卒此徒役之大數也若有大師旅大戍役則有簡稽之法焉小宰之八成曰聽師田以簡稽其制具於逸司馬法其曰四井為邑四邑為丘出馬一匹牛三頭四丘為甸甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人戈盾具謂之乘馬此乃司馬以田令賦之法也蓋於一甸六十四井之中五百一十有二家之內可任用者一千二百八十人之中擇七十五人籍於司馬是於三等之家正卒七人之中選一人為兵以備征伐是必生而有勇力可當禦侮之寄者然後選而教之也鄉遂之中又辨施舍老者幼者疾者則舍之是兵非長為兵其選之也不可謂不精其舍之也不可謂不預矣苟無征伐則長在民伍及用之乃合其卒伍族師所謂若師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至鄉師所謂四時之田修其卒伍是也然此亦四時之田教戒之法耳及軍旅調發乂不盡用之也逸司馬法又曰井十為通通匹馬三十家士一人徒二人通十為成三百家士十人徒二十人前之田賦以四起數總籍民兵之數此之田賦以十起數調發民兵之數也以夫井中家計之百井八十家約為丁四千八百人可任用者二千人籍於司馬者百二十人有奇調發者三十三人耳是四分當兵之數調發者一分之強故八百家止言三百家畨休者常五百家詩曰其軍三單單之言畨也謂簡稽者三也成周制兵之法如此選之豈有不精教之豈有不預用之豈有不均以戰則勝以攻則取食隨取而隨足而民不罷勞蓋得其道矣先儒稱成周軍制之美必曰處則為比閭族黨州鄉出則為伍兩卒旅師軍且曰士不待選皆吾民也將不改置皆吾吏也如使天子起六軍征伐則六鄉偕行國中遂空可乎是不知有簡稽之法故也但曰有事帥以征伐無事歸之田里兵無廪給之費將無擁兵之患則先王之法所以為美者是為得之以兵食言之六官之中朝覲㑹同祭祀賔客軍旅田役與喪荒七事也皆小宰令百官府共其財用夫軍旅之用至多也官府何以能供之哉蓋所謂兵賦者非止賦其車與卒也如八家之中出一人為兵籍於司馬凡有資用八家供之矣若有調發五百家共出三十三人則五百家共出三十人之資糧豈有不給哉然此非常屯之兵行則給之耳而遺人所掌郊里野鄙之間皆有委積以待㑹同師役賔客之用矣委人又斂野之賦斂薪芻以式法共軍旅之委積薪芻疏財充軍旅之賔客館焉而廪人掌九穀凡邦有㑹同師役之事則治其糧與其食則成周委積之多隨處皆有曷嘗有轉輸漕挽之事哉至於春秋列國征伐無歲無之其兵食亦皆取用於所過之國若齊師還自召陵申侯請道出陳鄭之間供其資糧屝屨是矣亦未嘗有餽餉之後蓋周公之遺法也或曰周之田稅盡以賦祿矣又安得委積如是之多也蓋凡受地者三之一食其在公者盡為委積以須七事之用平時不以給坐食之兵故隨在有備無轉輸之苦也及至秦人始飛芻挽粟以給河北率三十鍾而致一石天下之民始困矣自此而後兵民既分天下田稅太半給軍不耕而食者遍於天下郊野縣鄙之間安得委積之備哉一有師旅之興故不得不為漕挽之擾漕挽之困民又倍於養兵之苦率暴秦之轍行之不廢欲求天下無亂不可得矣揆厥所原自漢而下王者不階尺土專以兵力定天下故遂以兵守其國由是詳府衛鎮戍之制設居重馭輕之權及其後也兵以尺籍為定而子孫不移將以世祿襲官而才藝不選始無挑選之精終無老疾之舍在伍者率多庸羸苟備名數以坐索祿糧竭生民之膏血養無用之老羸肆其驕矜急莫為用大敵未至望風先奔彼習為常此竭國力一有不副怨叛隨生天下大患孰過於此夫創業之初既用此輩以取天下則承平之日祿此輩以報功可也籍此輩以守國衛民不可也孟子曰民為貴社稷次之君為輕故君雖至貴必依民而後成其貴也後世之王天下也得國之始必曰藉此輩以取天下亦當養此輩以與國咸休又以不可徒養之遂藉之以衛民焉故府衛兵將率多創業之人也陸賈有言以馬上得天下寧能以馬上治之乎是故誠不宜以此輩守天下矣夫王者之興以除暴救民故天命歸焉非由此輩善戰之力也其善戰者以能除此殃民之賊矣天下既定爵祿金帛既足以償之其心亦自以為足矣如有賢才豈遂棄哉故報功之與守國誠不可以一途而論也夫國之所以長久者以能教養其民而為之立命故天命不解而祚運悠長矣君不為民則天位未必其尊且安也師曠曰天之愛民甚矣豈使一人肆於民上以從其淫以賊天地之性必不然矣况一時立功之士可不問其德行才藝而世祿百世乎如養此輩無益於民徒曰報功云爾則所謂皮之不存毛將安附者也司勳曰國功曰功王功曰勳戰功曰多此三者今之府衛之功也民功曰庸事功曰勞治功曰力此三者承平致治之功也先王皆有世祿之法然世祿之人居其位賦其田矣必有德行道藝之教有月書季考之法苟德不稱位位不稱職三年大比一觀一詢黜陟隨之豈惟世祿治國處民之道皆如此矣是公天下以為心報功守國衛民之道並行而不相悖者也豈如後世崇私之極至於坐困吾民而自蹶其本也哉是宜復先王之法藏兵於民家出一人為正卒所以聨其人以供貢賦以聽田役以比追胥又八家選一人為兵而儲之及有調發則於儲兵之中四人而選一人以行則兵何有不精天子親征不過六軍七萬五千人而已諸侯不過三軍卿大夫可知矣是以兵精則數寡而足用平時無養兵之費故郊里野鄙皆有委積師行不齎糧隨在取給焉以兵精而數寡也師止則各歸田里而安本業兵無常屯之戍將無擁兵之患天子有大封之役若城齊城謝之類則以他國之人力為後以本國之人給餉不并用之也其在邉疆及要害之地則更畨戍守今年春暮行明年夏代者至又留備秋至十一月而歸其卒以簡稽調發之數其饋餉以鄉井不調之家先王處兵之制大略如此至簡而易行立可以救生民之困豐國家之財冨强之術孰過於此蓋所謂對病之劑夫豈三年之艾乎有天下國家者留意焉肉刑昔嘗慨唐太宗之讀周禮曰不封建不井田不肉刑而欲行周公之道不可得也古今以為名言豫謂封建井田大事也肉刑豈可比哉使天子行法於上大臣議法於下頒方尺之書於天下則肉刑復矣若封建井田則必裂天下之土宇析天下之田疇明君賢臣繼出未之能復太宗三言無乃失其倫乎今而思之肉刑之復信乎其難也何哉人懷惻隱之心士習近易之見皆曰先王以不忍人之心行不忍人之政應死而死耳肉刑者斷肢體去生本殘傷酷虐乃暴秦之淫威豈聖人好生之心哉愚細考之自古刑法以五刑為本五刑者墨劓宫刖殺也故周禮司刑每刑各五百是文武之時刑條不過二千五百至穆王作吕刑墨罰之屬千劓罰之屬千剕罰之屬五百剕即刖也宫罰之屬三百大辟之屬二百輕刑比舊加密重刑加疏者世變使然也孔子曰五刑之屬三千亦據後王刑條為言耳則肉刑為墨劓宫刖自古帝王未之有改也雖堯舜之聖臯陶為士亦豈能舍肉刑為法守哉曰何以知唐虞亦肉刑也舜典曰象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦此萬世刑法之祖也有流有宥有鞭有撲有赦有贖乃入五刑故命臯陶曰五刑有服五服三就說者謂五服五刑之罪三就肉刑所就之處也則成周五刑本於唐虞承於夏商可知矣後世除墨劓宫刖而以笞杖徒流配大辟為五刑則有其故焉周禮司徒曰以刑教中則民不暴此鄉之八刑乃虞廷鞭作官刑撲作教刑也然止於鞭撲及議罪乃入士師此笞杖之所由始也司冦曰嘉石平罷民有罪過而未麗於法者桎梏而坐諸嘉石役諸司空司空掌地事者也又以圜土聚教罷民凡害人者置之圜土施職焉其刑人也不虧體其罰人也不虧財此徒流之所由始也然嘉石上罪旬有三日坐而朞役使州里任之則宥而舍之圜土上罪三年恥以明刑能改者反于中國不齒三年此皆收教之使復為平人未入五刑也入五刑則毁其肢體不得復為平人矣自隋唐來以笞杖徒流當五刑之數是古五刑其屬三千今只存大辟五百也若以吕刑之屬言之則只存二百也何以懲奸雖然肉刑終不可廢也孔子曰小人不恥不仁不畏不義不見利不勸不威不懲易曰屨校滅趾無咎又曰小人以小善為無益而弗為也以小惡為無傷而弗去也是以惡積不可掩罪大不可解易曰何校滅耳凶是必以其罪而當其刑矣死與不死之間其別有五然則五刑之等亦協乎天地之自然者也漢之文帝信一女子之言輕變帝王相傳之刑法以笞箠而易肉刑當劓刖者笞五百而卒多死不如肉刑尚可免其死也至景帝定箠令而笞者得全自是笞罪日􅑙而輕後世遂以笞杖為五刑其原又出於此夫謂死者不可復生先王大辟之法蓋殺一人而後生其欲死者矣斷者不可復續先王宫刖之法蓋斷一人而後續其欲斷者矣不原其罪之所當而概以當刑之可哀而憫之是豈制刑之意哉是故肉刑求其完而不可得也故殺之所謂天討有罪五刑五用也肉刑其可去哉今夫墨者使其惡不可洗劓者使其形不復完刖者斷其惡使不能肆此三刑人所易知復固不難也至於宫刑者男子去勢女子幽閉是去人之生本而絶其種類也好生聖人之大德絶人種類中智猶難之况上德之士全惻隱之心者乎此肉刑所以更千百年歷明君賢臣無敢復之者也愚反覆思之古聖帝明王何必制此肉刑哉豈古聖之心不若後世中主之心而好生之德不若今中智之士哉必有故矣蓋聖人為天地立心為生民立命必欲久安而後長治是以有裁成輔相之道是以有扶陽抑隂之法是以有遏惡揚善順天休命之良規故制為此刑也夫虎狼終身不再孕猛獸有角去其齒天地生物不能絶其惡必有以損其惡亦自然之理也至於草木亦有長善去惡之理焉詩曰作之屏之其菑其翳修之平之其權其栵啓之闢之其柳其椐攘之剔之其檿其柘故惡不去則善不長况於惡人而可使之滋蔓乎且天地之生生無窮而所以養人者有限生多而無以養之勢必大亂善惡俱傷及至人類消縮然後天命至人除暴救民成平定之功乃復生之養之此一治一亂世之所以常相尋也與其善惡並生而易亂孰若植善去惡使善人多惡人少世治長久而不亂乎後世不推帝王所以設肉刑之心輒曰聖人好生不肯輕絶人類是不知聖人法行於不可不用刑加乎自犯之罪且不失乎裁贊之道者也况肉刑之人先王既待以不死然猶不棄其用也掌戮曰墨者使守門劓者使守關宫者使守內髠者使守積不廢其生不枉其材用之食之聖人何仁之至也夫宫者使守內則通乎內外之間必用奄奚可知矣天官奄人皆屬內宰其間掌后服位下士四人雖曰刑餘其才有可用者亦命以下士之秩不過四人而止豈若後世無罪而自奄著青紫者千人乎或曰世婦掌女宫之宿戒果宫刑之女否曰男去勢而為奄女幽閉而為奚蓋女子去其生本則幽隂閉塞矣猶男子之去勢也漢儒訓幽閉為幽而閉於宫中後儒遂不考幽閉之法故釋女宫為宫中之女而不知為宫刑之女也天地一隂一陽而生萬物今男子有去勢之法而女子獨無豈聖人扶陽抑隂之意乎嘗觀禮曰大夫七十而老適四方乘安車行役以婦人又曰八十非人不暖矣則古人養老必用此宫刑之女可知矣春官世婦掌女宫天官內宰掌奄人宫刑男女各有司存則宫中充用必以是人可知矣酒正而下執役女奚無慮七百人皆幽閉之婦人也不然則外官執役女人之多何處取之豈不亂男女之別乎自此而諸侯之國自此而卿大夫之家所以用奄奚為不少矣以隨處皆有是人也是以三代之時家法各正姦慝不生娼優不行風俗淳美至治長久者肉刑存焉耳有志之君欲復三代之治肉刑其最先也豈在封建井田之後乎井田井田致治之本也舍此不可以言三代之治矣法制莫詳於周禮乃聖王為治之迹也儒先之論或有以為終不可行者或有以為可行於古而不可行於今者皆未明乎至當之理通變宜民之道焉耳夫山川邱陵與天地相終始萬古不易者也人生天地之中三十年為一世與時消長焉者也故一夫受田百畝井田之法也必以百畝授之一夫則人之生生無窮而田之區域有定人多田少之處又何所給授乎井法之不可行者以此也是宜以田為經以人為緯田有定制量人而授固不限以人皆百畝亦不使之無業務閒知乎此則周家井田之法可得而推矣司徒曰四井為邑四邑為邱四邱為甸四甸為縣四縣為都此井田之法也孟子曰方里而井井九百畝其中為公田八家皆私百畝同養公田此井田之制也又曰夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也由方里而井言之是夏以五百畝制井殷人乂更為七百畝至周又為九百畝焉蘇洵有言聖人迭起必以五百畝七百畝九百畝而制井則必塞溝渠移丘墓造涂路定疆界窮天下民力更數十年他務未遑然後可為但井田未成民已老死而天下困矣可以為聖人之法乎此言井田終不可行蓋泥於制井之形體故耳先儒又曰井田始自黃帝而大備於成周是更數十聖人又千數百載始成也若必曰中公外私八家同井雖再更數十聖人又安可成乎蓋天下之地豈皆沃衍膏腴而無淳鹵磽確之等乎豈無山林藪澤丘陵偃豬之限乎豈皆平土上地必可為井邑丘甸之制乎聖人必有通融之法執其權衡以制乎不齊之地使天下無一地而非井田無一水而非溝澮無一民而非有職乃見聖人之制但未之考耳請詳之遂人曰凡治野夫間有遂遂上有徑十夫有溝溝上有畛為一井之田一井九夫今曰十夫可知非井字之制矣孟子又曰請野九一而助國中什一使自賦先儒曰都鄙用助法八家同井鄉遂用貢法十夫有溝於經文信合矣愚觀都鄙之間亦有比閭族黨鄰里鄼鄙亦有山川城郭宫室涂巷豈鄉遂皆此地井法不可行都鄙皆平原廣野必可行助乎今國門之外固有膏腴平原畫井而行助山林川澤多居野外宜行貢也定為鄉遂用貢都鄙用助可乎惟邱葵曰邱甸亦可用之於鄉遂及公邑縣都用之於稍疆似矣而葉時則曰言井則通天下皆井矣井邑邱甸縣都之制無往不同可謂得先王之大意矣未必能推詳之也考之王制有云山陵川澤林麓溝瀆城郭涂巷三分去一為田之實數三分益一為水與道及山川城郭若以司馬法經制之則亦有可通者矣夫有田必有水也故遂溝洫澮必環於井邑邱甸之中有水必有道也故徑畛涂道必作於經界之際水與道既不可離於田則制夫之餘豈無羡衍之處可為田而不成夫者乎又豈無萊牧錯雜之處而不可以數定者乎故司馬法曰十井為通通方四井共溝其旁則一里十夫故曰十夫有溝溝上有畛十通為成成方十里則百井千夫共洫其旁則百夫故曰百夫有洫洫上有涂十成為終終千井萬夫共澮其旁則千夫故曰千夫有澮澮上有道十終為同同萬井十萬夫共川其旁則萬夫故曰萬夫有川川上有路皆兼乎水與道言之考工記匠人職曰九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮専達於川夫井間有溝則十夫也十里為成則百夫也百里為同則萬夫也蓋井邑邱甸以四起數言田之實數以稅斂而言也司馬法與匠人以十起數兼水與道以里數逺近而言也以此合王制三分去一之說亦可矣愚又以為聖人制為規矩以教天下也固欲人由規矩以得方圓非欲使天下必法吾方圓以合規矩也故規矩有不盡之方圓而方圓無不盡之規矩此自然之勢也今觀六鄉曰井邑丘甸縣都固以實田之數言也六遂曰上地夫一㕓田百畝萊五十畝中地夫一㕓田百畝萊百畝下地夫一㕓田百畝萊二百畝餘夫皆如之都鄙不易之地家百畝一易之地家二百畝再易之地家三百畝而不言餘夫何也九百畝為一井矣今一夫有二三百畝上地夫百畝矣六遂又加萊五十畝焉則中公外私八家同井既不能成而易法上地亦加萊牧五十畝都鄙餘夫皆如之未可知也大抵聖人制為三等之法非必曰六鄉用井邑丘甸六遂用萊都鄙用易也蓋平原廣野田無高下而有肥磽也則易法見焉丘陵墳衍田有髙下而萊雜焉者則以佐田之肥磽而萊法用焉膏沃之地田皆腴也則井地成焉井法雖曰可成然亦不拘於形體也先王以是三法因地利自然之勢而施之猶執其規矩可隨處而得其方圓耳夫萊易之法既以益田之肥磽則雖有二百畝三百畝之不同然亦不過定百畝之稅為一夫之征耳周家貢助並行未嘗限以鄉遂都鄙也六鄉之地城池道路所占必多以夫數而定井邑丘甸之制不成夫者則為宅田士田賈田而行貢法焉六遂之地亦行邱甸之制也其不成夫者則為官田牛田賞田牧田而行貢法焉故貢法所以厚君子稅有輕重之不同助法所以別野人則取以什一也百里之外為都鄙公邑則明言甸地即四丘而成甸也民居則或成鄼焉或成鄙焉鄙之名本於此至於稍地則田或數甸居則大邑也故謂之家邑地之大田之多而四甸之聚也則縣之形成矣民居則合萬家而謂之小都焉至於疆地則田積成同或數同焉內亦可制鄉遂都鄙也以大都不可偶國不與其成鄉遂而謂之大都焉郊甸縣都雖本於井地而都鄙之名實指而言耳然都鄙之中亦有比閭族黨在邑中鄰里鄼鄙在郊外亦有七等之田以厚君子故貢助並行無間於鄉遂都鄙也孟子曰無君子莫治野人無野人莫養君子此通率而言耳其曰野助而國中貢者蓋言都鄙非無貢也而助法多鄉遂非無助也而貢法多戰國之時惟以貢法専行而助法不復存矣人思助法之善故龍子之言如此孟子為救時之論以貢法未可盡廢而助法不可不行請野助所以寬野人國中貢所以厚君子此因當時所急而言非謂聖人定制如此也或曰先王立法既因時宜則井田貢助今亦可行乎曰何不可行也山川原隰邱陵墳衍古今同也宫室城池溝洫涂道古今同也但經界不同耳孟子曰夫仁政必自經界始經界不正井地不均穀祿不平矣今欲行先王之法惟正經界為先耳古之百畝今之四十畝古今尺不同今約言之耳也一夫受田百畝今亦以四十畝為一夫而定一夫之稅田有肥磽之不同如平地如萊牧以九等制之或一倍或再倍如今世等則之差而定為一夫之稅夫以界定井以夫定由是以夫起稅以稅起數則井邑邱甸縣都皆如古矣田制既定以家而授通之以士農工商固不限以人受百畝亦不必制為中公外私或二家共一夫或數家共一夫或一家受二三夫焉所謂上中下家者亦以受地多少而分之此九比之大本也又有野地民居密曠不同者則自狹鄉而徙寬鄉比鄰之長從而授之入鄉無授出鄉無節則唯圜土納之遊手務閒者不得恣於其間地之與民必參相得也乃以成夫之田為民田或助或徹而貢則以年之上下出斂法以七等之田為官田使野人耕以養君子或自耕而食皆行貢焉則稅無輕重之差田無欺罔之弊而吾夫定也稅定也役均也惟一正經界而天下之井田成矣由是而行比閭族黨於邑中鄰里鄼鄙於郊外以德行授秩隨賦以官田以成夫為民田稽丁配之丁少田多者分之以給無田者略為限田之法則先王之治朞年可復矣安有古今之異哉是故制而用之存乎法推而行之存乎通文武之政布在方䇿有君有臣舉而行之成周之治夫豈逺乎財賦周禮一書理財居半先儒有是言也夫財者家國之本以之調均庶政以之維繫人倫苟不經制使之饒裕則兵刑禮樂豈能獨行哉是理財乃六典之本何止居半耶大學論平天下之道止於理財用人而用人之實不過欲其理財以得民也今舉其要曰有人此有土有土此有財夫土以人治財以土生必然之理也蓋人必得土而後可以施鋤耰之力土必得人而後可以成生物之功人之與土相須不離則財由之以出故聖人經制天下必於二者是務焉此所以能致雍熙太和之治也後王之處民也立法雖詳防慮雖周惟不知人土相須之理是以民之生生無窮而土之荒萊日甚欲天下無亂不可得矣今觀太宰六典所以治天下之大綱固無不備然其要在於先設司徒司空以立足國之本而人莫之知也司徒司人者也司空司土者也自今觀之二官尊於百僚之上與細民耕稼之務何啻相去千里耶然載稽其職大司徒曰頒十二職以登萬民也獄訟治地者聽而斷之荒札移民通財小司徒稽國中四郊都鄙之夫家九比之數頒比法於六卿之大夫使各登其鄉之衆寡六畜車輦而辨其老幼廢疾征役之施舍何者而非民間之細務耶大司空之職曰知九州之地域辨其山林川澤邱陵墳衍原隰之名物以教稼穡樹藝分地職奠地守而須職事小司空即遂人也稽人民而授之田野教之稼穡歲時登其夫家之衆寡及其六畜車輦辨其老幼廢疾之施舍以頒職作事何者而非帥人治土之事耶是司徒司空同民異治一教一養無非使天下人土相配而財用由是出也故人知鄉遂天下根本而不知鄉遂之設乃行司徒司空之職耳其稽夫家辨施舍教戒勸勉皆欲民務本業以出財也若後世則以為民事之末務為守令者任一胥史可辦也孰肻留心于此耶今之所以財乏之故與古異者由司空之法先壞而司徒之職不舉也夫司空掌邦土居四民時地利後世地利之不盡其大端有四焉一曰經界不正古者一夫之界甚嚴六遂上地百𤱔亦加菜五十𤱔中地二百𤱔當百𤱔下地三百𤱔當百𤱔雖曰因土宜而倍之然耕治之法則在乎人糞多而力勤則中下之地可變為膏腴糞少而力怠則雖上地亦變為磽瘠矣故先王必倍分中下之地而不欲棄之者欲人各盡其力使天下磽瘠之處無不墾闢則財用出矣後世經界不行上地人爭趨之又令得買賣焉中下之地舉而棄之是以土無定限而賦稅不均三等莫辨而多寡無別故中下之地蒿萊千里人莫肻用力者皆古人出財之處也昔商鞅治秦定墾田之令將中下之地立法耕墾然不合決裂阡陌以壞先王之經界故一時雖致富强然井田之法終不可復而得罪萬世耳今能依三等之地而制其經界亦定墾田之令而井法行焉則天下之田皆可墾財豈有不出者哉二曰溝洫不制古者必為井田之制何也蓋將作溝洫使旱潦有備田乃可成也遂人曰夫間有遂遂上有涇以至萬夫有川川上有路是為田必有遂溝洫澮以通其水徑畛途道以嚴其界溝洫不制終無成田之理矣今南方水田遂溝洫澮勢所必成但無經界之限故徑畛途道不合於法三等之田不定而賦稅不均北方之田土厚水深水則千里瀰漫旱則大地涸竭此不制井之害溝洫不通之故也莫若以南北之田萊牧之外盡經界之差三等之地稽夫家而授之必為五溝五涂之制雖磽確僻陋之處經制必及焉是溝洫者所以備旱潦又所以定經界也所係不亦重哉孔子稱大禹曰卑宫室而盡力乎溝洫則禹貢之咸則三壤成賦中邦者皆盡力溝洫之明驗也欲財之出豈不以此為本乎三曰授地無法遂人定三等之田而為助載師制七等之田而為貢皆因天地之自然而畫為之制一定而不可易者也鄉遂辨夫家之衆寡以授之故受田多則為上地餘夫多則為上家蓋隨時損益稽授務使參互相得蓋欲土無磽瘠皆人力所及人無遊手皆有業可依故令之俱出粟米之征也今田不經畫惟定其稅額人不稽授惟任其買賣冨者田連千頃據膏腴之土貧者不得下地以耕欲天下之平何可得也昔管仲治齊分四民使各有定業作內政使人有定等竊先王之緒餘而假以行之且獲富强之效若能稽夫家辨施舍授地職奠地守實以先王之法行之財豈有不出者哉四曰勸課不勤夫經界制矣溝洫明矣民職授矣使不勤於勸課行秩叙賞罰之政則怠惰廢弛中下之地誰肻盡力也故里宰合耦于鋤不合耦者有罰粟鄰長簡稼器趨耕耨稽女工縣正趨稼事行秩叙而賞罰之鄙師察美惡而誅賞然則古之所以勸課者如此之備也詩人稱禾易長𤱔曾孫不怒農夫克敏又曰同我婦子饁彼南𤱔田畯至喜其一時上下之情勸課之風可想也故民職不分則多遊手不授地職則民不土著不奠地守則民業不定不行勸課則人力不盡而土不治數者皆為虛文矣故田野不闢則貨財不聚司空失其職故也以司徒言之司徒司人者也分其人民使各有定職稽其生業使各有定所司徒之職不舉故人土不相配其大病又有四焉一曰遊手後世田既在民富者積財買田數千𤱔驅貧民以耕而收其大半之入是以子弟僮僕皆不耕而食之徒一如在位之居養所占盡天下膏腴之田瘠薄之土無人耕治則是冨室子弟進不耕農退不士商乃遊手之大者况有專事浮巧鼓惑吾民以為生者乎若鄉法之行則自比長閭胥族師皆冨室之類其子弟無不受田以耕而黨正州長鄉大夫則今鄉官之家也既有七等之田以優之其子弟僮僕亦皆授其田分其職事豈遊手者哉欲人各有定業先頒十二職無使一人逸於頒職之外而財用不出未之有也二曰僧道韓愈曰農之家一而食粟之家六工之家一而用器之家六商之家一而資焉之家六奈之何民不窮且盜也蓋儒者之學教人耕而食織而衣此生人之本也故有父母妻子之養仰事俯育之勞古稱治平之極必曰出作入息帝力何有又曰民之質矣日用飲食不識不知順帝之則今二氏之教絶人倫去四大以同於太虛於世務若將凂然如使天下皆離人出世矣則三才何自而立又何人耕稼以資其身而立道本耶故今僧道不資土者滿天下廟宇之崇徒衆之盛則以為向道之人多也然皆鼓惑耕稼之民以為生其次雲遊訪真遍於天下乂其下則乞食求施者沿門載道此皆不耕而食為財之蠧者是宜修宗伯之法立太祝之職以司之喪祝辨乎喪禮商祝辨乎祭禮以需民用男巫女覡各統於禮官凡以神仕者以其藝為進退之等令天下僧道盡改為巫祝則既不失其本藝為吾民要用矣其無藝者斥遣歸耕而治於有司財豈有不出者哉三曰兵衆今天下坐食之兵何止百萬每一兵之家可任者三人或二人既為不耕之徒一兵之原派下子孫多者數百豈能盡籍於官而受土乎又軍祖之家有不得開籍之禁中藏間民十而未登其一况正軍亦養無用之人乎此則時制之相違人土不相配之大者是宜修司馬之法寓兵於農嚴簡稽之制立挑選之度有事置之行陳無事歸之田里以時教閲以備民患驅此無用者以歸農業天下豈有曠土耶四曰逐末古者任民分為九職九職之內又離為士農工商故民皆有業管仲曰少而習焉其心安焉不見異物而遷焉又曰農之子恆為農野處而不匿其秀民之能為士者必有賴也是以民獲本業各得其職然士與工商亦必兼農又有旅師聚三粟以資耕本無不欲其受土無逐末之念也今天下士農工商肆而為之耕者利少而商者或獲倍蓰故民多去農而為商詩人刺如賈三倍君子是識晉之富商韋畨木鍵不敢與士君子齒所以厚風俗抑末作也今則士君子亦為商賈之事居焉而不恥至於工技亦多為奇華淫巧以滋侈俗閒民無故奔走天下無有以農為本之意故天下大半皆逐末之夫也是宜修市關之法與虞衡之禁山澤者出材之地市關者聚材之處行其政令使商賈各有定業閒民無職者嚴比長之法入無授出無節惟圜土納之則人自有懲戒務本必多矣修是四者司徒治人之道已備天下可以無遊民矣生之者衆財安有不出耶然既知所以生財之道又必知所以取民之方則賦稅可均而無巧奪民利之失矣今以周禮賦民之大端言之載師曰宅不毛者有里布閭師曰無職者出夫布故民受五𤱔之宅而不種桑麻則必出此一夫㕓里之布不以不毛而免之無職閒民雖不受㕓里必有嬪婦治絲枲也亦出此一夫之布故里布夫布皆一布也是民之有職無職曾受㕓里與否夫里之布皆不可免此之謂布縷之征人人有之載師又曰田不耕者出屋粟民無職事者出夫征是受田不耕故於屋而取粟不以無獲於野而免之閒民不事耕農而必有生業亦令出此夫征之稅不以不受田而免之則是凡有身家可任之人一夫征稅皆所不免也此之謂粟米之征人人有之均人均人民之力政載師無職者出家征力政之法豐年則公旬用三日焉中年則用二日焉無年一日焉公旬者公上役作之旬也公役無定以旬而計日數不同豐歉異度此力役之征亦人人不免也孟子曰有布縷之征有粟米之征有力役之征君子用其一緩其二蓋深明乎先王之法者惟三征之制明故天下之人雖衆舉不能逃公家之征役其賦斂之則多端亦不能出三征之外矣或曰田不耕出屋粟宅不毛出里布則凡受地者必出公上之征是也若閒民既無田宅之受自為生理之資而令出此布縷粟米之征非虐政乎曰此先王所以杜逐末抑遊手驅閒民以著業令財用有出之源而人莫知也蓋所謂閒民亦必有夫婦也能不絲枲乎是入嬪婦之職矣故令之出夫布也閒民能坐食乎必有事於仰事俯育之資也故轉移於衆職之間而衆職亦須閒民以濟所入不下於耕者若不令其出此粟米之征則人皆學為閒民以免公上之賦矣此其必取布縷粟米之征一也又閭師任民農耕之外任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任虞以山事貢其物任衡以澤事貢其物則三農九穀之外民所事以為業不出此數者而凡所貢之物皆當粟米之征則天下萬民粟米之征亦盡於此矣此其二也其有居國野不為士農工賈圃牧虞衡者則為遊手矣必取以三征者欲其務本也故司徒司空必稽夫家辨施舍者謂此民不可使之閒也在國而居者有泉府焉以市官五布斂市之不售者物揭而書之其有貧而無資為商賈者與其有司辨而授之以服役國之公事為息以其貧也既歸其業則以原授之數納焉此處在國之閒民也在野而居者有旅師焉聚屋粟鋤粟閒粟皆出於貧民也故春頒秋斂還以給之使為耕本焉平頒而不取息者以每年有三粟之入無不欲民之歸本業也故取之者所以為義而還以貸之者所以為仁此閒民所以必取粟米之征三也或曰閒民粟米之征必取以百畝稅額則無業者固所不堪若不限以百畝之征則有資者又豐約無稽僥幸必多矣曰司空辨五物九等制天下之地征故王畿千里定為百同之田是天下土田皆畫經界夫井一定賦稅不易矣至於人之耕與不耕則在乎鄉遂之職稽夫家衆寡而授之民既授田則稅必出矣其夫井雖具無人可授而未嘗耕者則虛之而已非若後世賦稅不失原額令民有屈陪之虐也其曰一夫百畝之征亦為之中制而已若一家之衆力勤糞多耕至三四夫焉則亦出此三四夫之稅不限以百畝也若田少人多之處其家有工商藪牧相兼者或三四家共一夫焉亦只出百畝之稅耳然工商藪牧又有取之之法以益其業皆為粟米之征也故土田耕治之多賦稅之廣而府有餘財則為民牧之盡其職苟稽授之法不嚴施舍之辨不審使荒萊日多而賦入不廣則是民牧之失職故巡狩之典必以田野闢與土地荒蕪而行慶讓焉則此夫征百畝之稅亦略為之限耳閒民取以粟米之征亦即此其准也固不使有資者苟免於甚寡亦不至因其無職而必取盈焉則三征之行又有通融之法四也由是言之則周禮取民之制盡於三征王朝九賦之取侯國九貢之法皆於三征而均制之耳出三征之外以取於民則為暴征橫斂而君非其君矣不出三征或二征一征以為生則為遊手逐末而民非其民矣乃知孟子王佐之才其濟世之權衡又在乎此世豈能知之哉至於用財之方則九賦之取不出乎郊甸縣都所取之物不外乎金玉祀嬪器幣材貨而所用之式只在乎稍秣匪頒工事幣帛祭祀喪紀賜豫分其財物配式法之用大府總其要以受天下貢賦之入內置九府以異其藏是以冢宰執其式百官承其式王后不得外式而妄取官府不得違式而妄供則大府者乃唐宋之大司農今之戶部是也又有玉府內府藏其寶玉與良貨賄以備國實外府掌泉布之入出以給邦之時用皆統於大府然後立司㑹以㑹計之知盈縮之數司書以版籍之防遺逸之患則王朝之上財用之制節已極嚴明安有不足之患哉至於畿甸之內祭祀朝覲㑹同軍旅田役喪荒七事皆小宰令百官府供其財用治其施舍其百官府之稍食則廪人掌之宫中之稍食則舍人掌之野鄙之米榖則倉人掌之故遺人掌委積者也於鄉里門關郊里野鄙縣都各有委積以待乎恤艱厄養老孤待羈旅備凶荒之用矣是以有賔客會同師役之事自朝廷而至鄉國天下道路皆有委積以待之其事簡其用便朝令而夕給財滿國中富滿天下所以然者出財皆人土相配之理取財皆人人三征之法也是故能明乎孔門曽孟傳授之㫖以行王道豈不躋世道於唐虞哉周禮全經釋原卷十三
