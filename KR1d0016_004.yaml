body:
  text: 周禮全經釋原卷四明柯尚遷撰地官司徒第二官以地為名象地也地形載萬物司徒掌教以安萬民同也司主也専主一官之事也徒衆也謂萬民也萬物附屬於地萬民附屬於司徒宜矣又古文翻后為司言有司之道與后王相反君道貴寬大有司之道宜執守也惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國民極以上解見前釋曰邦教即教典佐助也因其所性而道之謂之安因其所習而制之謂之擾何氏曰仁漸義摩使自得其性者安之也惇典庸禮使各順其常者擾之也安則無矯拂扞格之憂擾則有優遊浸漬之益安而擾之民自和順於德義矣原曰冡宰掌邦治司徒掌邦教二官皆天下重任國之根本也故以天地名之而四官則各司一事猶天地統四時而四時則各司一氣也今觀治則治王宫正百官理財用而教則授民職考夫屋教三物正萬民也治舉於上教施於下真猶天施地生四時輒運者也後世政教殊軌以政令刑罰為治以語言誦授為教則與古悖矣孔子曰道之以政齊之以刑又曰道之以德齊之以禮夫政刑固所以治民而德禮乃所以教民也然皆曰道曰齊則治之亦所以為教也但古之教者教之以事而理不外焉君臣父子兄弟朋友非民事乎稼穡耕耨徵令貢賦老幼廢疾六畜車輦非民事行於其間乎舍是而為教抑將何教耶離此而有所謂事何事耶故古之教者惟於日用常行之中引導而整齊之使之歸於道而合於禮則精義入神之理即此而在矣故古者謂之教今則謂之治今之所謂教古亦謂之事也一道一齊用心誠偽之間王霸之幾判於此能知古人之所以教則大司徒之職始可得而言矣教官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人釋曰教官大小司徒也屬自鄉師至旅下士其屬六十人也六鄉則鄉師宜六人今只四人者蓋司徒教法通於天下故鄉師居司徒之府近掌六鄉外及六遂都鄙皆稟六鄉教法故不分治也原曰鄉師居司徒之府以治六鄉之政令遂師居司空之府以治六遂之政令然非鄉遂分治也鄉師行司徒之教法於六鄉而六遂都鄙效而法之遂師行司空治野之法於六遂而六鄉邦國都鄙效而法之然治六遂者居司空治六鄉者居司徒蓋以六遂在野故治野之法依之而立六鄉在國故教法依之而立國野雖分而教職事職則無偏廢之理矣然鄉遂之中秉天子刑政之權以治之者惟鄉師遂師而已都鄙之中則縣師也鄉遂大夫以下皆民秩也爵位雖髙不敢與二師抗矣故知賢能位職之辨然後可與言周禮也鄉老二鄉則公一人釋曰鄉老者致事公孤之老鄉官之爵最尊者昔成王立三公三孤為王者師周禮無其職惟此有鄉老宰夫司士有三公之位蓋在朝之公孤受大都百里采地者也公侯伯子男又在外諸侯之爵皆為在位之選也二鄉公一人六鄉則三公也丘氏曰鄉大夫猶有職掌鄉老惟大比興賢能則與焉在朝稱公在鄉稱老侍坐於天子而不為逼與百姓相親而不為褻惟道所在上而論道於王外與六鄉之教其要為民是以司徒見之也鄉大夫每鄉卿一人州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人釋曰比者比也相共之義也有長以别之二十五家為閭胥有才智之稱百家為族師帥也以德行帥人者也五百家為黨正者為人所取正也二千五百家為州長者衆人之尊也萬二千五百家為鄉直以本秩名之大夫尊也卿爵也上大夫之稱也是故天下國家者一家之積也比閭族黨州鄉者民居多寡之等也五人之長百人之長千萬人之長者德有大小故位有崇卑也先王為鄉法以總其教為品秩以等其爵視其爵位立其家法爵尊則家大使各治其家以為下觀法焉則賢否才德自見所謂教職者乃在於此則賢愚貴賤咸獲其所矣王道之本在此哉原曰鄉遂之法其治天下之大本耶人之生也愚知不同才能亦異不有以處之則強凌弱衆暴寡上下不辨民志不定矣天下何由而治哉聖王於是以自然之道而經理之自五家之比而至於萬二千五百家之鄉自五家之鄰而至於萬二千五百之遂自比長一下士而至於鄉大夫之卿自里宰一下士而至於遂大夫皆鄉舉里選月書季考必其人之德行道藝可為五人之長以至萬二千五百人之長者為其位以處之為其爵以等之則才德各稱其位人無慕外之心使其志慮不易視聽純一無不在於修德學道以聽在上之旌舉也聖王御世能使天地萬物各得其所其術如此可謂至簡至要矣其法具於此條之中更千古莫有能悟之者是以致用無術賢才無所而古今逺以判也何以明之有官府必有府史胥徒無之非官府也今鄉老而下自鄉大夫至比長皆以爵聨民居為差等無府史胥徒之設何也此賢者之位位焉既定則設官分職皆以維持乎此而已故凡周官有府史胥徒皆能者之職惟此與公侯伯子男為賢者之位不先定乎位又何以施其職哉曰鄉遂大夫而下皆有職何也曰此教職也夫教者以德行帥人也非以語言誦授也其教之具則不外乎三物惟其身有乎此然後帥人以此治家有法然後能教人以家法不在刑政之末也何官府之有是故天下之人雖多不出乎六等天下之家雖衆不外乎比閭天下之教雖殊不離乎三物有其德則有其位有其位則立其家立其家則司其教不明乎位職之辨何以知司徒之教法哉封人中士四人下士八人府二人史四人胥六人徒六十人釋曰聚土曰封謂壝堳及小封疆也封人事廣故其徒多然用之有時也鼓人中士六人府二人史二人徒二十人釋曰鼓人兼掌金而稱鼓人者金以節鼓也不屬司樂者以金鼓和軍旅正田役鄉野之事也舞師下士二人胥四人舞徒四十人釋曰舞師掌教舞蹈徒執役而舞者此官主教舞以供野祀司樂之舞則學士為之牧人下士六人府一人史二人徒六十人釋曰主牧六牲以祭祀牛人中士二人下士四人府二人史四人胥二十人徒二百人釋曰此官主牧祭牛凡牛堪祭祀者則牛人選入牧人牧之臨祭之前乃授充人而繫養之充人下士二人史二人胥四人徒四十人釋曰充肥也養繫牲肥之原曰封人為社稷而設也牧人牛人充人為祭禮而設也鼓人舞師為祭樂而設也民為貴社稷次之然則司徒蓋為民而立社稷禮樂祭祀皆為民而設故此六職次於司徒之下可以見民事之所重司徒之所先矣故曰為國者先盡禮於神而後致力於民故幽明各得其所也載師上士二人中士四人府二人史四人胥六人徒六十人釋曰鄭氏曰載之言事也事民而稅之愚按載師掌任地之法專司貢法也自國中至鄉遂都鄙皆貢助並行鄉中多貢遂都鄙亦有八等之田其法俱掌於載師而辨其輕重之稅如後世之均則也閭師中士二人史二人徒二十人釋曰以其周知閭里之情故曰閭師掌任民力也處於閭里之間與民相從事使之量其地宜以施九職而責其成功也原曰地不任則荒人不任則惰地荒則人之衣食何資人惰則必棄本業而事末作故先王設載師以盡天下之地其法曰民苟有分五畝之宅而不種桑麻者必出里布分百畝之田而不耕者亦出屋粟無職而不受田者亦出夫稅家稅何者以地不可荒也又設閭師以任天下之人使入於九職以著其地法曰民必歸其職無職者布縷之征不可免也故出夫布不耕不樹不蠶不績者各有罰所以振作天下之人而使之不惰也地不荒人不惰則衣食有資而恆産定矣勞則善心生逸則惡心生勞而不淫則恆心存矣有恆産有恆心俗之所以善治之所以成也二職之設其可緩哉縣師上士二人中士四人府二人史四人胥八人徒八十人釋曰主都鄙土地人民之事徴野賦貢蓋兼載師閭師二職而居於都鄙之中至縣而止縣正則鄉官縣師則命官也故其權與遂師同原曰八命賜則受采地曰都鄙天子使史治之者其縣師也故曰掌稍甸郊里之地域即都鄙之地也辨夫家稽畜輦考羣吏詔廢置即遂師以行於遂者也徵野賦貢即載師閭師之事也然則此官蓋兼鄉師遂師載師閭師之職專一邑之刑政者也不為都鄙之正官乎即後世之知縣也遺人中士二人下士四人府二人史四人胥四人徒四十人遺音位釋曰遺饋遺之遺掌委積之官雖待六事之用然待賔客其要也如今之主驛傳者均人中士二人下士四人府二人史四人胥四人徒四十人釋曰此官主均平土地之征經界之守均地利而入九職均人力牛馬車輦公役之征原曰遺人均人之設亦為國至要之務也遺人不設則國無委積道路不通賔客無館凶荒不備行旅何能出於其途哉均人不設則賦稅不均經界不正地職不明而力役公上者亦不均矣三征不均則欺詐幸免之俗興而姦邪悖亂之徒起矣天下不平乃由於此故六鄉必設遺人均人六遂必設委人土均蓋以民務莫要於此後世遺人無委積之掌而驛傳之法至於病民之深均人則絶無焉亦以經野之事制産之法皆不舉行此職無由而施故也師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人釋曰以道教人曰師世守其官曰氏師氏教王宫以德行詔人者保氏下大夫一人中士二人府二人史二人胥六人徒六十人釋曰保安也以道安人者保氏教國子六藝六儀乃王宫小學之師師氏王宫大學之師其職本以詔王􅍇與諌王惡則其教自王以下聽焉且掌國中失之事帥屬守門闈則古之教者必付以權其教乃行豈在於語言誦授之間耶原曰師氏掌以􅍇詔王以三德教國子保氏掌諫王惡而養國子以道皆居虎門之左其制何如王制曰小學在公宫南之左太學在郊尚書太傅曰王子八歲而出就外舍束髮而入大學公卿之世子大夫元士之適子十有三始入小學十八入大學蓋虎門者天子路寢之門師氏德行大學之教也保氏藝儀小學之教也由是觀之則公宫之左必有大小二學可知矣王子八歲入小學束髮入大學者入學之期也國子必十三入小學十八入大學者蓋國子與王子共學必稍長乃知貴賤之禮上下之分且使王子有輔仁之益故其期不同如此然則在郊之大學王子不入乎曰周制太學在郊者省朝謁之勞專學業也天子曰辟雍諸侯曰泮宫辟雍四門四橋東曰東序西曰瞽宗南曰成均北曰上庠東序即東膠也上庠即虞庠也其師即大司樂也鄉遂都鄙賔興之俊士天下侯國歲貢天子之造士國子及倅諸子教成材者皆學於此焉但王子之學則在公宫之左涖大學有時而與國子齒此記所以有將君我而與我齒讓者欲其知父子君臣長幼之義也夫周人之於王子國子其教之也詳其責之也深其養之也至王子之教其適將以宗廟社稷屬之為天下得人也其庶將以有國有家付之為民神之主也可不重歟國子之教以其席父兄之勢豢宫闈之安不有師道之尊嚴則何以保自然之和禁未萌之欲又有以變化其氣質涵養其德性也哉此師保之任所以為天下大本也司諫中士二人史二人徒二十人釋曰諫猶正也此官掌糾萬民之德行而巡察鄉遂都鄙之教者丘氏曰即今之提學官將以扶植正學維持公論者也司救中士二人史二人徒二十人釋曰語曰汝弗能救與此官以禮防人之過糾察人之罪惡者也原曰先王於王宫之教既有師保矣又以萬民之教鄉遂以下之職或怠廢不舉苟且以欺上也又設諫救二職以勸糾德行而巡察過惡所以輔翼警飭之者無所不至則為教者豈敢苟且具文而萬民豈敢怠於為善而肆於為惡乎然後知萬民之諫救即王宫之師保也調人下士二人史二人徒十人釋曰調和合也此官主平成人之相讐殺者丘氏曰凡人之情方其有觸則怒怒則爭爭則鼎鑊在前不顧也及其怨隙已成殺傷被執退省其身已無生路追念父母妻子不可復見未始不悔悟而恨旁人之不我救止也先王灼知人情之隱設調人以諧和於始使不至於此忠厚之至也媒氏下士二人史二人徒十人釋曰媒之言謀也謀合異類使和成之今齊人麴名曰媒蓋釀合之義也原曰男女之合人倫之本風化之原也詩首關雎書美釐降禮謹大婚人道自是始焉故先王設官以司之子生必書其月日與名藏之以立其根然後視其才質而媒合焉故無怨曠之失無反目之虞政徽俗美何莫不由此也司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人釋曰司市雖主平市然商賈一項人民皆其所統財利盈縮之間而教未始不存也葉氏曰先王授民以井田足食也制商以市㕓通貨也食足貨通而後教化可成矣是以匠人營國則前朝而後市內宰建國則佐后而立市市也者所以通商賈而阜貨財也昔者神農氏作日中為市致天下之民聚天下之貨交易而退各得其所此市之所以作也而聖人必先之曰何以聚人曰財理財正辭禁民為非曰義母亦曰朝與市有義利之分王與后有隂陽之别生財自有大道有國者當以義為利不當以利為利者歟質人中士二人下士四人府二人史四人胥二人徒二十人釋曰質平也主平定物價者㕓人中士二人下士四人府二人史四人胥二人徒二十人釋曰㕓民居區域之稱鄭司農曰㕓謂市中之地未有肆可居以藏畜貨物者孟子曰市㕓而不征法而不㕓謂貨物藏貯於市中而不租稅也愚謂市宅也公家所立為市之宅故有㕓布之稅而㕓人主斂諸布蓋斂市租之官非止管市宅而已司市質人㕓人三官乃命官胥師以下則給役也胥師二十肆則一人皆二史賈師二十肆則一人皆二史司暴十肆則一人司稽五肆則一人胥二肆則一人肆長每肆則一人賈音嫁暴音暴釋曰鄭氏曰自胥師以及司稽皆司市所自辟除胥及肆長市中給繇役者胥師領羣胥賈師定物價司暴禁暴亂司稽察留連不去者愚謂肆長則主一肆猶一家也胥師賈師管二十肆司暴十肆司稽五肆皆肆長之有才智者為之立市之法以二十肆而止與比閭不同原曰自肆長而上胥師而下其市之所以成乎以肆長為主則為賈而坐肆者也無肆長則無市矣胥與司稽司暴固肆長為之賈師平物價胥師掌治訟皆巨賈之有才者與之權而統率之猶夫比閭族黨之法非命官也故鄉制則萬二千五百家而止市制則二十肆而止何也義欲其長利欲其短也㕓人質人泉府則司市之屬設官也肆長而上不在鄉遂之數不𨽻教官以其近利也舉選不取以其無教也自胥師以下皆無秩明商賈不敢與士君子齒也逺郊之內有賈田司市與其屬之祿也胥師以下無秩則無祿矣蓋先王之立市也不使雜於閭里懼其亂教也不設朝廟之前以利為後也不使士農為之以商賈之人持心近薄恐其亂俗也是故設於國之隂而主之以后祭以隂禮其先義後利之制可見矣夫利平人不可親也恐其溺心也有位不可親也恐其蕩志也故令國君夫人世子命夫命婦皆不得過市過則有罰其作法之嚴如此先王之逺利何如哉昔者晉之富商韋籓木犍以過於朝而曰雖有澤車華服不敢與士君子齒則周公之遺化固存什一於千百矣後世立市無法士農君子雜而為之是以億兆之人皆騖于利士君子而有商賈之行聖人以道治天下之意今亡久矣泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人釋曰泉即錢也泉府之官主以征布斂貨使商不失其本以貨而平賣之使官不費其財民有祭祀喪紀急用者則賖之不取息以利民也民之貸者以國服為息以懲貪也六鄉有泉府以泉以貨賖貸鄉民六遂有旅師聚三粟以貸貧民平頒興積皆先王立通融之法以行周貧補助之政所以利民非以利國也民利則國利矣原曰泉府之設聖王立應時取豫之法以通天下之貨以濟天下之民乎故貨有貴賤時為之也未有貴而不賤賤而不貴者泉府以征布斂時所不售之貨使商不失利所以利商也時之既至必有求買者乃從其原抵賣之使官不失利民不從貴所以常平也民有喪祭困急則賖之立期取償而不取息所以濟人於困以廣仁也民有願貸則以其身服役國事為息願以身役可以徵貪不願不強也夫其取豫之間上不失時中不失官下不失民是先王所以流通百物拯救萬民裁成輔相之道也豈若劉歆六幹立法安石青苗市易堂堂大國皇皇求利者哉司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人釋曰此官主啓閉國門譏察不物防冦盜守國固者不征商惟犯禁之物則舉之司關上士二人中士四人府二人史四人胥八人徒八十人每關下士二人府一人史二人徒四人釋曰王畿千里於五百里界首面置三關共十二關此官主譏察出入防冦盜與門市為聨掌節上士二人中士四人府二人史四人胥二人徒二十人釋曰節符信也行者所執以為信原曰司門司關掌節三官皆掌譏察之官門關主於譏察貨賄人民掌節所以通乎譏察者夫民之姦偽四出有國者不有以譏之則亂不有以通之則滯聖王所以遏禍亂之原實在於此烏可忽哉地官上大司徒之職掌建邦之十有二教以佐王安邦國擾萬民釋曰此按五官之例而正之者也元本大司徒之職之下曰掌建邦土地之圖與其人民之數以佐王安擾邦國大司空之職闕焉臨川吳氏取孟子舜命契五教之目補之續以因此五物者民之常而施十有二教焉丘氏曰觀十有二教之施不係於五物則知此二句為羡文而司徒安擾邦國者不在於土地之圖人民之數其為冬官之文錯在於此無疑也愚按周禮乃成周一代之典及周衰諸侯相吞遂違周公封國之制孟子曰諸侯惡其害已而皆去其籍則周禮孟子時已亂矣至漢其書始出惟存五官河間獻王嘗購以千金莫能得乃以考工記補冬官至宋俞庭椿乃謂冬官錯於五官之中而有復古之編吳臨川祖其説而有五十字之補夫司空之職以考工記補之者固妄而曰錯於五官者亦非也司空之職具在無待於補也蓋自去籍之後書已錯亂遂人即小司空也以變小司空之名故續於地官之後而大司空之職以無所附故併於大司徒之中特去大司空之職五字而已豈遂亡哉十二教正司徒之職掌也而次於土會五土物生之後以不相續也遂增因此五物者民之常二句是司空之職盡入於司徒也後儒雜取冬官於五官之中辨職不明各以己意移易經文無所證據則六官皆亂矣名為復古實亂古也竊不自揆更考經文以遂人序官之數與五官相同有旅字之别則知遂人以下皆司空之職又以天官辨職考之教職言安言擾事職言富言養則知土地之圖封疆之制非司徒之職而十二教與頒職事所謂安與擾俱盡之司徒之職又可知矣二職之分以經證經斷無可疑非逞已見者而司徒司空之職皎如日月是周公以全經遺萬世者可無憾矣一曰以祀禮教敬則民不苟二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不愈七曰以刑教中則民不暴八曰以誓教恤則民不怠九曰以度教節則民知足暴薄報反釋曰安上治民莫先於禮欲民盡五常之道必以禮教之祀禮祭祀之禮外祀則州社黨禜族酺也內祀則祖先之祭禮祈報以教敬追逺以教孝孝敬合一則自無輕慢苟且之失矣陽禮則冠也射也飲酒則相見也教以敬長尚齒貴德尊賢則其心和順自知遜讓之道無爭競之失隂禮者婚姻之禮及父子異宫之類教以男女有别婚姻以時子致情於親則親愛之心生而怨曠可免矣移風易俗莫善於樂樂禮者燕饗祀神庠序皆教以作樂興舞則民情和洽向善而不能已無乖戾之失矣此則儀禮家鄉之禮其綱在此皆宗伯頒之儀者宫室車旗衣服器用禮節各視鄉官之秩使貴賤隆殺等級分明則上下以辨民志以定無有僣越踰分矣此典命掌之俗即本俗六事也教之齊車服興孝弟尚道義則衆心安定民風淳厚不偷薄矣刑即鄉之八刑時有不率教者則有弼教之刑其附於五刑者歸于士斯無橫暴而難制者矣誓者糾戒也恤憂也鄉中以時讀法而糾戒勸勞之使之知憂勤而盡職則不敢怠惰矣度品制之度分鄉官為六秩不使僣踰辨其賢否以别貴賤而定其制度如五儀六服六摯之類則民皆率德安分而知足止矣原曰大矣哉聖人以度教節之意乎蓋凡人耳之好聲目之好色鼻之好臭口之好味苟窮其欲雖匹夫而擬萬乘或未足以厭其心也是聖王既以五儀之命等在位之人又以鄉遂之秩行民俗之內使之比長少别於齊民其宫室衣服飲食賔客閭胥不得以勝族師而族師又不得以過黨正司徒又以儀等辨之不使踰越而辨施舍又嚴於貴賤之等是故無德而富則秩不加有德而貧則祿必益故雖有千金之資惟無德則與下户為伍宫室不得侈而衣服不能華則飽食之餘無所用溫暖之外無所求奈之何不率德厲行以聽人之旌舉哉故鄉遂之法行儀等之辨嚴所以正人心美風俗行教化之大機也十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功釋曰鄭氏曰世事世習其事猶管仲云士農工商各專其業少而習焉其心安焉不見異物而遷焉是也愚謂世事世間才藝之事鄉遂治事之吏皆學世事而有能者使隨所長而任職則可謂使能而令之不失職矣賢有德行者爵位也鄉民之中有德行者進以爵秩是以賢制爵也則民孰不勉而修德哉祿以酬功鄉吏盡心於庶職以功而詔祿則莫不勉於興功而盡職矣二者尊賢使能之事司徒掌教之大權也原曰舜命契為司徒教以五典而周禮十二教不及五典何也曰五典言其理十二教施其事是故教敬則親矣教讓則序矣教親則别矣辨等則義矣教安則信矣五典雖舉其要孰若司徒所教措之於事周詳曲折各得其條理哉夫教之道廣矣大矣先德禮而後刑政教和教中者所以師其進德也教恤教節者所以作其憂勤也制爵制祿者所以勵其激勸也孰非所以扶植五教本乎事而納之於道也乎故觀十二教之目則古人所以為教之事可知矣固無待於補也頒職事十有二于邦國都鄙使以登萬民一曰稼穡二曰樹藝三曰作材四曰阜蕃五曰飭材六曰通財七曰化材八曰斂材九曰生財十曰學藝十有一曰世事十有二曰服事釋曰頒職本在縣法之下今以司徒大政所在故移於此頒布也登載也布萬民之職事而載於籍焉稼穡即三農生九穀也樹藝即園圃育草木也作材即虞衡也阜蕃即藪牧也飭材即百工也通財即商賈也化材即嬪婦也生財隨宜以為生固不專於轉移執事也太宰分職而司徒頒之乃見施行之實也九職之外又有學藝謂有道藝如禮樂書數之類致用於事功之實也世事如農圃醫卜祝史之事藝之小者所謂世事教能是也今欲補內六記即學藝是也外六記即世事是也服事給公家之役如府史胥徒之類是也故九職定其本十二職舉其繁天下之人雖多豈出於十二職之外哉無職則為浮民遊手聖王不容者也原曰天下之治在於民有職天下之亂在於民無職故太宰分職矣必司徒頒之乃得其所也由是而司空均職鄉遂施職閭師任職凡治民之官罔不以民職為事誠以民之為生皆上所以與之一技能之微一動作之末上皆為之區處至於一德可稱一能可取必使之待用而不遺民之父母其信然矣後世非惟不為民分田制産以為生且民職不分服田畝者征科百出而斂之若讎民遂厭農畝而不事至無以為生乃浮巧逐末任其自生為僧為道為雜技者半農人焉而上不之恤馴致大亂何莫而非不頒民職之故哉以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去譏七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊弛施氏反舍音捨去上聲眚音省殺所界反蕃方表反釋曰施十二教教之頒十二職養之民得其所矣凶災之變不可不防也故以荒政繼焉散利發倉廩以賑貸之薄征減其賦稅也緩刑省其刑罰也弛力寬其力役也舍禁山林川澤之利令民不時取之也去譏關市之上非惟不征雖譏察亦去之也眚禮凡吉禮及賔客之奉皆省之凶荒殺禮也殺哀凶禮葬祭不求備也蕃息也止息音樂飲酒不樂也多昏不備禮許嫁娶也鬼神能助隂陽為水旱札瘥者必索而祭之盜賊之起由於凶荒故盡心荒政則盜賊自除矣原曰水旱堯湯不能免故聖君賢相既修德行政調和隂陽無所不用其至矣而司徒親民之官復以荒政為首務何也蓋不恃吾有德足以格天而恃吾修政足以應天如子之於父母能保其不怒哉要在起敬起孝而底豫之也故修政所以修德也然十二荒政以散利為先利不散則民不聚雖有眚禮蕃樂殺哀多昏之舉行未必有實惠及民也然利苟不備於平時則臨事將何所散哉周人為荒政之備者詳矣旅師泉府積三粟與斂不售者平頒興積而賖貸之遺人掌縣都委積以待凶荒倉人掌粟入之藏以待凶荒而頒之蓋以三年耕而餘一年之食九年耕而餘三年之食是以天不能災而人不能害者以備先具也不知乎此而欲修德以應天也不亦迂乎以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寬疾六曰安富釋曰保安也息生也謂保安其民使之蕃息也丘氏曰救荒之政如攻療保息之政如調理幼者慈愛之如産子三人與之母二人與之餼是也老者養贍之如七十者賜以粟八十以上者賜以帛是也鰥寡孤獨皆天民之窮者必有以振救之飢寒匱乏貧不能自存者必有以賙給之疾病者寬其力役使得保其性命家富者平其賦役書其勤敏使保其常産而不侵削之行此六者則民皆得其所矣原曰歲飢民困災變不虞民欲自食其力而不可得者先王為救荒之政可也至於平時為生宜自力也復為是保息之政何哉蓋民之困窮固由於凶荒亦有不凶荒而困窮者則幼者資人以生老者資人以養窮者無所控訴貧者不能自給疾者廢於天刑皆不可無保安之政也詩云哿矣富人哀此煢獨先王既有荒政聚之於災變之日又有保息養之於無事之時真所謂如保赤子父母天下之心也以本俗六安萬民一曰􅍇宫室二曰族墳墓三曰聨兄弟四曰聨師儒五曰聨朋友六曰同衣服􅍇與美同釋曰本俗者使民風習俗不離於本奢侈相矜強弱相勝皆離本者也民不安原於俗之偷弊故本俗所以安萬民也朴而不壞華而不僣謂之􅍇鄉遂比居之法以閭巷之形畫圖使貴賤有等華朴得宜則相帥以安分矣族猶類也類其墳墓使祖禰體魄不遺則莫不敬宗重逺而相帥以孝敬矣聨合也使之有次序不相凌也兄弟手足之愛易於暌違聨之使情義相得則莫不相帥而遜弟矣師儒有道德者聨之使先覺覺後覺則莫不向學而尊道貴德矣同師曰朋同志曰友聨之使合志同方營道同術則莫不相帥相讓以敦信誼矣衣者身之章也等級由之以分同之使制度有常上下有等則莫敢詭異而僣越矣誠能行此六者則文質彬彬泰和之氣象也太宰九兩有宗族師儒朋友則天下之治必以道德孝弟為先也可見原曰古人有言上行下效謂之風衆心安定謂之俗風俗之臧否天下治忽隨之周公有見為治之大原故立本俗之法於司徒誠以俗不正則民不安故􅍇宫室以安其生族墳墓以安其死聨兄弟以安其情聨師儒以安其教聨朋友以安其業同衣服以安其分自其生死之安也而孝敬之俗興矣自其情分之安也而遜讓之俗興矣自其師友之安也而道義之俗興矣三者之俗興則不賞而勸不怒而威遷善逺罪有不知誰之為者有不在於本俗之六事也哉正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象浹日而斂之釋曰正月陽和始布之時縣教象之法于雉門之兩觀政教之始也布教謂頒布教法之文書縣教象謂以教法畫之於板而縣之也邦王畿國侯國也都鄙王畿侯國皆有之司徒之教通於天下者也乃施教法于邦國都鄙使之各以教其所治民令五家為比使之相保五比為閭使之相受四閭為旌使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔釋曰施教法即鄉法也王畿侯國都鄙之君長各使其鄉官行教法故曰使之各以教其所治五家則號為比比次之義善惡纎微必知使相保任不得為惡二十五家則號為閭左右為之門以稽出入同巷而居良者使相容受惡者毋得相隱百家則號為族有同宗合族之義一家或有喪衆共助之故曰相葬五百家則號為黨有相黨援之意故患難則合力救援二千五百家則為之州州之言周也有無相通賙其匱乏萬二千五百家為鄉鄉向也人所向往上令而下從也三歲大比彼有賢能我從而賔之我有賢能彼又來賔我此鄉遂不獨王畿大國三鄉三遂次國二鄉二遂小國一鄉一遂不成鄉遂則為都鄙其教法皆同原曰天王大一統者也故鄉遂之法軍伍之制皆通之天下無不同焉是以司徒施教司空治野司馬制軍其法皆同皆曰邦國都鄙也曰然則比閭族黨在國中鄰里鄼鄙在四郊何也曰國中多君子故教法依之而立四郊多野人故治野之法依之而立天下莫不有鄉遂莫不有都鄙也是故在司徒以掌其教則有比閭族黨州鄉之名在司空以掌其野則為鄰里鄼鄙縣遂之名在司馬以掌其兵則為伍兩卒旅師軍之名均此民也而治法有三先王恐三者之法名實相紊也故分其所屬而辨其輕重使為治者因其宜而制之國中多君子而教法重也則當鄉之名四郊多野人而治野之法重也則當遂之名都鄙雖未成鄉遂也而比居之制立教之法田野之事無不同也及用軍旅之時司馬稽其人數更立伍兩卒旅師軍之制名雖異而數則同均此民也教法必行於遂都鄙治野之法亦行於六鄉制軍之法鄉遂都鄙均焉是以各有所屬而通於天下自其各有所屬也而職掌明焉輕重審焉自其通之天下也是以一視而同仁並行而並事焉故匹夫為善於千里之外可得而知也為惡於千里之逺可得而糾也故曰聖人之於天下也一視而同仁篤近而舉逺以鄉三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數釋曰以鄉者以上文鄉法也三物德行藝也賔賔禮也興舉也以鄉法之三物教天下之民德不足取之行行不足取其藝有德行則謂之賢有道藝則謂之能鄉大夫以鄉飲酒之禮舉之獻賢能之書也德謂道得於心知者明睿畢照仁者博愛無私聖者思能通微義者處事合宜忠者內外如一和者順適無乖然皆五性之德和者禮之德忠者信之德而聖則兼五者之德也行者以德而見於行事也孝謂善事父母友謂善於兄弟睦謂親於九族姻謂親於外親任謂信於朋友恤謂矜憫孤弱然孝者百行之先五者孝之推也六者之序人生本於父母罔極之恩也故孝居先兄弟與吾同出於親故友次之九族同出於祖宗故睦次之五服異姓之親骨肉相聨故姻次之朋友合志同方故任次之鄰里鄉黨相安而居故恤又次之藝者習之於事也禮五禮習熟其儀文度數樂六樂能知其節奏鏗鏘射以觀德御以馳驅書以形天下之文數以計天下之物此六者皆道之所存也故曰道藝原曰三物其盡教之道乎得之於心之謂德行之於身之謂行習之於事之謂藝其道則一而已矣分而言之德行所以成已道藝所以成物三者皆吾性完具而不可一闕焉教者豈能強於性分之外哉但人之才質不同故於三者互有長短是故德行道藝俱全者謂之大賢大能賔興舉之於王以當大用矣司諌所謂辨其賢能而可任於國事者是也長於德行而略於道藝則謂之賢長於道藝而德行次焉則謂之能下文所謂使民興賢出使長之使民興能入使治之是也上者賔興於王次者進退其秩此之謂賢者在位能者在職苟道藝不足而德行能存者質實之人耳德行不足而道藝獨長者才藝之士耳以位職之小者處之俱無可取則隨其位職而廢置行焉此三物之論也傳曰德成而上藝成而下行成而先事成而後先王有上有下有先有後然後有制於天下此賢能之别也故天下之人不同而三物之教則同天下之才不同而賢能之成就則同先王以賢而處位以能而任職二端既明天下可運於掌矣以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不姻之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑釋曰刑以弼教故不從三物之教者則設刑以糾之麗五刑者歸之士師鄉刑亦撲罰而已不弟即不友也不言友者兄不友者教之弟不恭者刑之造言謂訛言惑衆亂民謂亂名改作執左道以亂政者德藝不設刑獨於六行有刑者蓋德無可見而行有可徴有德必有行以行考其德思過半矣藝則人之材有不可強者故教以德藝而糾之以行先王之教內外兼舉如此原曰刑以弼教其依禮而言者與教者何教以禮也六行之教內則曲禮少儀也此三禮者鄉之所以為教也教之不從然後以刑一之刑必依禮而制者也故曰仁與義互為交修禮與刑相為表裏刑也者帥其由禮也苟不教以禮而徒以刑一之則刑之者不知其所由用刑者惟徴之於法是孟子所謂不教而殺罔民者也故古者制行必徴之於禮行法者以禮而議刑夫是之謂表裏之義也以五禮防萬民之偽而教之中以六樂防萬民之情而教之和釋曰禮吉凶賔軍嘉也樂六代之樂也偽者心未受而強從之謂情與偽對蓋流蕩縱肆而不可拘檢之謂中者抑其過引其不及使歸於中也和者變化鼓舞使之心志融悅以入於道也中和者民之性情也教民者必求至於是以為凖焉原曰先王之於民既以三物教之八刑糾之道教亦云備矣又以禮樂防之何也夫民力分未及而強施之則悖知識未至而強聒之則勞斯皆心未能受者也而遽以刑迫之則未免強從於外免而無恥矣故名之曰偽禮者聖人本天理緣人情而畫為制焉使賢知者不得而過愚不肖者亦勉強而企及教之具必以此為先焉使其尊卑貴賤日用彛倫皆循是為守則民有所據依自率德安教免於偽矣非防偽教中之道與孔子曰道之以德齊之以禮此之謂也夫禮者天地之序也樂者天地之和也和序人心之本也序則相敬和則相親而情正矣故禮勝則離離則情僻情僻則流流則忘返先王懼其離而流也故以樂和之凡燕饗祭祀庠序之間必教以歌舞之樂所以宣其和而節其流則情無乖戾歡欣和悅以進於善體教自不能已矣非防情教和之道與孔子曰有恥且格此之謂也則先王之為天下亦奚為哉禮樂而已後世以刑政代禮樂治功之盛髙不出乎五霸之間禮樂雖存具文而已歐陽子曰三代而上治出於一而禮樂逹於天下三代而下治出於二而禮樂為虛文憶斯言也判古今於一言決王伯於萬代者與凡萬民之不服教而有獄訟者與有地治者聽而斷之其附于刑者歸于士釋曰不服教不從而違教法者爭賄曰訟爭罪曰獄地治謂爭地而訟者小司徒曰凡民訟以地比正之地訟以地圖正之即此是也士謂鄉遂士附麗也司徒聽訟施鄉刑撲作教刑也其有麗於五刑者則歸之士師使審察而正其罪祀五帝奉牛牲羞其肆享先王亦如之大賔客令修野道委積大喪帥六鄉之衆庶屬其六引而治其政令大軍旅大田役以旗致萬民而治其徒庶之政令釋曰祀五帝謂迎氣四郊及大饗帝於明堂奉猶進也牛能任載地類也奉牛牲謂薦腥也肆陳體骨也羞其肆謂薦熟也享先王四時禘祫皆是也亦如之奉牲羞肆也大賔客謂諸侯來朝大司徒令遺人於野路之上修治途道及委積芻薪米穀以待之也大喪王后之喪也六引喪車索也六鄉屬六引六遂主六紼治政令徒庶喪事之戒令也大軍旅謂大司馬九伐之事大田役謂狩田大閲之事旗畫熊虎者也當用衆之時則以此旗致其徒衆而治其戒令若國有大故則致萬民於王門令無節者不行於天下大荒大札則令邦國移民通財舍禁弛力薄征緩刑釋曰大故謂國有冦兵也致民於王門衛天子及備詢謀也節六節有節乃行防姦細也荒凶年札疫厲也移民移其少壯以就食也通財許賖貸不閉糴也蓋民食之不足移之以就有餘通之以濟不足舍禁弛力薄征緩刑皆荒政之事歲終則令教官正治而致事正歲令于教官曰各供爾職修乃事以聽王命其有不正則國有常刑釋曰正治明處其文書也致事上其計簿也歲終令所屬計一年之要也改歲教法未頒止令其官屬而警戒之曰各共其所治之職修其所作之事以聽王命者以王之誅賞皆依各職所上之功過也不正謂不共職而修事者常刑司冦官刑也原曰前乎周官舜命契為司徒則曰敬敷五教在寬後乎周官則穆王命君牙為司徒而曰𢎞敷五典式和民則司徒之掌教尚矣故成王作周官亦曰司徒掌邦教五典擾兆民然則司徒之掌教舍五典人倫之外無他物今司徒所掌典曰教典職曰教職象曰教象法曰教法官曰教官則司徒之掌教夫誰不知愚以為天下後世之惑特未知教之所以為教故或局於人民土地之粗則以為司徒專掌財賦或厭其粗迹而入於髙虛則曰司徒只教以親義别序信者師氏保氏不過五六員其餘蓋分托焉夫土地人民之事乃司空之錯簡而五典亦豈外於十二教耶蓋先儒徒知五典為親義别序信不知所以行是五典者有不在於十二教頒職事荒政保息本俗與夫三物八刑禮樂也哉愚故曰施教頒職恤其凶荒保其孤弱正其習俗者教之以事也德行道藝者教之以理也以禮樂防其情偽而致於中和者教之功也則今司徒之教亦可逺稽大舜近質穆王矣孰謂司空既亡而司徒専掌財賦哉小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令比毗志反施式氏反釋曰小司徒言建邦則大司徒可知矣故依此補之也稽考也國中王城之中六鄉也四郊六遂也都鄙王畿之都鄙不言邦國者小司徒止教王畿之內大司徒則及天下也侯國亦建六典有司徒止奉大司徒之法以教其國而已一夫一婦為夫家稽之即下文稽人民而周知其數也九比之數者即辨其夫家之衆寡與貴賤老幼廢疾之等如七人授以上地六人授以中地五人授以下地三等大槩言之耳細分之上等有三中等亦有三下等亦有三所謂上上中中至下下凡九等也故為九比之數後凡言九比者倣此辨其施舍者如一家三人二人半二人可任者國中自七尺以及六十野自六尺以及六十有五皆征之是施之也老者貴者賢者能者服公事者幼者廢疾者皆不征之是舍之也征謂百畝之稅役謂力役之征蓋周人每夫受田百畝而取以三征曰粟米曰布縷曰力役無職事宅不毛者但有夫家則三征不能免也必如老者以下乃免之故挍九比以辨施舍司徒之大務祭祀謂州社黨禜族酺飲食若鄉飲酒饗食之類喪紀族相葬埋之法皆有禁令使不失禮也乃頒比法于六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物以歲時入其數以施政教行徴令及三年則大比大比則受邦國之比要釋曰比法以九比之數畫為成式夫家衆寡也六畜車輦也稼穡耕耨也勤惰德行也優者為上等次者為中等又次者為下等三三而九之以此法頒于六鄉之大夫使之登載其實以歲之四時入其數司徒依此以施其政教謂使之讀法糾勸也行徴令謂徴召命令莫不有一定施舍之籍大比者勾考三年中之消息而頒受之以上中下之地稽其勤惰賢否而黜陟之賢者能者各有等數上等賔興次等進秩下等降黜莫不以九比之法乘之比要者比法等第之簿也六鄉內也故入其數邦國外也故受其要侯國三年進其要於司徒乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦卒子忽反釋曰會合也卒百人伍五人蓋約伍兩卒旅而為名也比閭之法以家起數卒伍之法以人起數故别其名焉作亦起也田大田也役工力之事比有同行共作之意追逐冦胥伺盜也令貢賦亦用卒伍之法者令其納粟於官亦以卒伍起之也丘氏曰司馬法兵車一乘甲士三人步卒七十二人是一乘者七十五人也約而言之兵車一乘則三兩之數四乘則三卒之數百乘則三師之所合五百乘則三軍之所合積而至於千乘則六軍聚焉六軍之數適足以容千乘乃天子宿衛之兵其餘六遂都鄙之兵悉天子之畿內則為萬乘矣諸侯大國則有千乘而三鄉則僅止五百乘耳以三鄉三遂言之故曰千乘之國乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役無過家一人以其餘為羡惟田與追胥竭作釋曰均土地者地有肥磽則以萊與易佐之而分為上中下之地此遂人之法也又稽人民考其數而知其為上中下之家者蓋上地家七人餘夫多故受田亦多則為上地可任者即餘夫未成家不受㕓而受里者中地下地亦然皆以餘夫多寡而為受田之多寡而分也起徒役無過家一人者優餘夫也蓋以正當夫家一人為正卒餘夫為羡卒竭盡作行也記曰惟為田單出里與冦盜非常之變則正卒羡卒偕行不言起軍旅者六鄉之民止供貢賦衛王室而已夫正羡更出者所以畨休其力正羡並出者所以重講武事凡用衆庶則掌其政教與其戒禁聽其辭訟施其賞罰誅其犯命者凡國之大事致民大故致餘子釋曰用衆庶謂田役與追胥之類政教以令之戒禁以止之皆小司徒所掌有爭競者聽其辭訟有功罪者施其賞罰有不遵誓戒者則誅責之大事田役軍旅之類致會集也大故冦盜水火非常之變也餘子即餘夫羡卒也原曰司徒所以詳於九比之法者將以授三等之地也地有三等之不同而三等之中又有三變焉以地之肥磽而分上中下之地者則都鄙不易之地家百畝一易之地家二百畝再易之地家三百畝遂人上地田百畝萊五十畝中地田百畝萊百畝下地田百畝萊二百畝是也以一家受田之多寡而分上中下之地者則上地家七人可任者家三人中地家六人可任者二家五人下地家五人可任者家二人是也蓋家有上中下而㕓則一田萊與易有上中下而餘夫受田皆如之故知餘夫多則受地多授地多則為上地餘夫多則為上家此不易之理也故九比之法所以校其人之多寡勤惰而授以三等之田受田之後又校其人之多寡而分三等之地也司馬令賦又有三等之地者以其地之墾闢多寡與人可用之多寡而分則據成功而言耳其曰上地食者三之二可用者家三人中地食者半可用者二家五人下地食者三之一可用者家二人曰食者謂其耕治而可養人者耳曰可用者謂其可簡稽而為兵者耳故曰以地與民制之然後賦之以兵斯不謂以墾闢多寡而分三等之地乎愚故謂三等之地有三變苟不然則上家授以上地田百畝中家授以中地田二百畝下家授以下地田三百畝地有定數而家有定人一恆人可辨之小司徒又何察察於九比之稽哉且上家餘夫多而上地田數少中家人少而下地田數多則上家有力無可耕之地下家無力而地多不能耕先王經制固如是耶乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都釋曰井牧固是司空之大務今在司徒者以司徒掌六鄉井牧之法雖始自六鄉然制井之法必有夫畛塗道路遂溝洫澮川乃成井牧故司徒只言田之實數而經制之法則在司空也可耕之地為井可畜之地為牧言牧則山林藪澤丘陵原隰皆舉之矣遂人授田以萊相之萊即牧也葉氏曰此泛言經土地耳夫井牧之制通之天下可也井邑丘甸縣都無往不同井方一里凡九夫受田九百畝邑方四里三十六夫受田三千六百畝丘方十六里百四十四夫受田萬四千四百畝甸方六十四里五百七十六夫受田五萬七千六百畝縣方二百五十六里三千三百有四夫受田二十三萬四百畝都方一千二十有四里九千二百十六夫受田九十二萬一千六百畝中為公田之數在內經野不殊乎九夫度地不離乎三等受田不過乎百畝此井田定制也丘氏曰甸方八里旁加一里則方十里為一成積百井其中六十四井為田其三十六井則山川城郭縣方八十里旁加十里則方百里為一同積萬井其中六千四百井為田而三千六百井為山川城郭以四數之田之實數司馬法以十數之兼山川城池而言也丘甸則用之於鄉遂及公邑縣都則用之於采地鄉遂公邑非無縣都也有縣都之制而民受地者特一夫之田與夫宅田賈田士田之類未至於縣都也采地之所受亦非無井邑丘甸也井邑丘甸見於縣都之中唯卿大夫之所受者或四十里或八十里此所以必畫為縣都之制也但野外之田不無美惡肥磽之差豈必盡如指掌之平基盤之畫哉唯有井有牧比折而行乃是井田之活法周禮一書皆通率而備言之楚蒍掩所謂畫土田度山林鳩藪澤辨京陵表淳鹵藪疆潦規偃豬町原防牧隰臯井衍沃即成周之遺法也所謂井九百畝者非必皆平土上地也因地形之所遇而為之計度可以知井田之説矣故井田之法始於唐虞以至夏商稍稍葺治而大備於成周以任地事而令貢賦凡稅斂之事乃分地域而辨其守施其職而平其政政音征釋曰此主六鄉言之任地事者既授之田遂任以耕治之事也貢者詩曰中田有廬謂公田百畝內以二十畝分八家為廬舍又二畝半在邑於墻下植桑以供蠶事因取其布帛以為貢故大府謂之九功也賦者貢法地稅之中出泉為財賦也稅斂之事公田之稅粟也斂收也謂就公田中所斂也分地域正其經界也辨其守定其業也施其職施九職於田事之中也平其征使之供貢稅出車役各有常法而均一之無使有輕重也凡小祭祀奉牛牲羞其肆小賔客令修野道委積大軍旅帥其衆庶小軍旅巡役治其政令大喪帥邦役治其政教釋曰小祭祀王玄冕所祭者小賔客諸侯之使臣也此二事大司徒主其大小司徒主其小宜矣大軍旅則以旗致萬民小司徒當帥其衆庶以與之大軍旅大田役大司徒治其徒庶之政令小軍旅小巡役則小司徒當治其政令喪役者正棺引窆復土之事帥領六鄉衆庶以役其事而治其政教凡建國立其社稷正其畿疆之封凡民訟以地比正之地訟以地圖正之釋曰建立邦國必設其社稷之壇壝使各有所奉正其疆域之界限使各有所守蓋社稷疆域國之重事故小司徒立之亦可以見司徒掌邦國矣地比即五家為比之比地圖田野及㕓宅閭巷之圖也民之爭訟是非則以比鄰之人正之民之爭疆界地域則以所在地圖正而斷之此小司徒所以聽訟而以無訟為本也歲終則考其屬官之治成而誅賞令羣吏正要會而致事釋曰屬官司徒之上中下士也羣吏鄉中受治職之官也治成治事成功之績也要會羣吏所上之計簿也此一歲之終考治之事其本屬之官則責其成功以詔誅賞其六鄉之吏則考正其計簿上其事於大司徒以待冡宰之考績而行黜陟也正歲則帥其屬而觀教法之象徇以木鐸曰不用法者國有常刑令羣吏憲禁令修法糾職以待邦治釋曰帥屬則司徒之僚屬羣吏則六鄉之吏也憲表懸之也修法防虧廢也糾職防緩散也正歲改歲之時教法未頒於天下大司徒乃縣之於地官之所小司徒則帥僚屬往觀焉木鐸之戒戒司徒之屬也小司徒又令六鄉之吏遵司徒之禁令修明教法糾正職事以待邦家之政治也及大比六鄉四郊之吏平教治正政事考夫屋及其衆寡六畜兵器以待政令釋曰六鄉四郊之吏謂鄉遂中之羣吏也言四郊則六遂亦以六鄉之教法行之可見鄉法通之天下矣教治讀法糾戒之事政事比法訟獄之事夫屋即田百畝夫一㕓也衆寡即家七人六人五人也蓋三年大比之時小司徒則帥六鄉六遂之教官平其教治之優劣正其政事之得失考其受田之夫㕓里之屋及家人衆寡六畜登耗兵器備乏上於大司徒司徒上之冡宰詔王廢置誅賞之故曰以待政令原曰先王教民之法固已備見於大司徒矣若其法之施行則小司徒盡之而小司徒所執以行教法之要則九比盡之今觀比法不過稽其夫家之衆寡也辨其老幼貴賤廢疾也六畜車輦之多少也田器兵器之苦良也耕種樹藝之勤惰也是數者若甚煩而且末上之人宜不足恤也而小司徒之職乃顓顓焉從事於此月有要也歲有會也三年有大比也羣吏之誅賞無不以是也夫以堂堂司徒豈無所事而所職乃民間之細務此有故矣夫天下之治在於民得其所得其所則治失其所則亂夫民之所急有不在於衣食乎是故稽其夫家之衆寡將以授三等之田也辨其老幼貴賤廢疾將以行征役之施舍也稽其畜器展其治事將以别勤惰行黜陟也自其夫家之稽也而生厚焉自其器事之展也而用利焉自其勤惰之别也而德正焉德正則俗善用利則民安生厚則民富斯三者聖人所以使天地萬物各得其所也雖唐虞雍熙之治亦不出此矣後世乃以為民間之細事廟廊之上不一及焉此古今所以判歟鄉師之職各掌其所治鄉之教而聽其治以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟釋曰受命朝廷專治六鄉者鄉師而已雖居司徒屬首治法只及六鄉不及天下以四人而治六鄉則亦末嘗分治也若鄉大夫以下皆在民之官無不聽命於鄉師故曰掌其所治鄉之教而聽其治聽謂平察之也國比即九比之法制之於王司徒頒之故稱國焉惟夫家有衆寡故必辨其可用與可免也其戒令糾禁與獄訟皆鄉師專掌之是比法鄉師所執以治鄉之大權也鄉大夫以下惟考其實上其數於鄉師鄉師校其比而等第之致於司徒大比則執此以行廢置誅賞其聽治之法先之以戒令次之以糾禁終之以聽訟所以治之而謂之教也大役則帥民徒而至治其政令既役則受州里之役要以考司空之辟以逆其役事凡邦事令作秩敘釋曰此言鄉師掌役也大役如築城造邑之類未至則帥之既至則治之政令徒役之政教命令也役畢則州里之長課其章程於簿致之鄉師鄉師受之以考司空所均之力政必均平然後鈎考其所作之役事凡邦事小役也秩常也敘次也令鄉吏依常作之不親涖也大祭祀羞牛牲共茅蒩大軍旅會同正治其徒役與其輂輦戮其犯命者大喪用役則帥其民而至遂治之及葬執纛以與匠師御匶而治役及窆執斧以涖匠師蒩音菹輂九玉反音菊纛桃報反匶音舊窆音殿釋曰此言其喪祭之執事也羞牛牲與司徒奉之也茅以縮酒蒩以藉祭此共於甸師及祭入于鄉師共之也輂輦皆小車輂駕馬輦人挽行所以載任器也止則以為蕃營大軍旅會同稍人作其徒役輂輦帥以至鄉師則治之而已有犯教令者惟鄉師得執而戮之者權之所在也大喪則帥民至其所監督其事纛羽葆幢也匠師葬事之師也鄉師執纛以指麾挽匶之役柩在路恐有傾覆故與匠師御正其柩而監督役人之窆窆葬下棺也及下棺又執斧以臨備豐碑之用也凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟釋曰此言其司田獵之事也四時之田春搜夏苖秋獮冬狩是也田法田獵之法度即所當用之器與當用之人也鼓鐸旗物兵器則閲之卒伍之法則修治之此田之先事也大旗熊虎之旗也致衆庶則植旗致於其下也陳之者表正其行列也每鄉各有旗以為號鄉師則以旗物分别其鄉邑之人使各立於其處而聽指麾然後治其政令而使之從憲其刑禁而使之避也車徒屯聚前後異部巡之所以修正其部伍也其有違犯命令者則執而戮之軍法尚嚴也獵得禽而爭則聽斷之凡四時之徴令有常者以木鐸徇於市朝以歲時巡國及野而賙萬民之囏厄以王命施惠囏音艱釋曰四時徴令有常如歲時屬民正月命修封疆二月雷且發聲之類皆用木鐸徇于市朝以警人知也以歲時巡國中之民有不得其所者巡野中之民有不足不給者量度以行補助之政知旅師所聚三粟春頒而秋斂之如遺人所掌鄉里委積皆奉王命而施惠澤於民此巡省賙民之事也歲終則考六鄉之治以詔廢置正歲稽其鄉器比共吉凶二服閭共祭器族共喪器黨共射器州共賔器鄉共吉凶禮樂之器釋曰鄉師教官之考也故四人共掌六鄉歲終共相參考六鄉之吏治以詔王行廢置之法焉鄉器禮器也器有大小及所用之不同則分其民居多寡而共之以備行禮之用官又常稽之令民耳聞目見所以習禮樂之意於平時此成周之治所以禮備樂和粹然盛美也鄭氏曰吉服祭服也凶服弔服也比長主集為之祭器者簠簋籩豆之屬閭胥主集為之喪器者夷槃素俎揭豆輁軸之屬族師主集為之此三者民所以相共也射器弓矢幅中之屬黨正主集為之州長或時行禮於此黨也賔器者樽俎笙瑟之屬州長主集為之鄉大夫或時賔興賢能於此州也吉器若閭祭器者也凶器若族喪器者也禮樂之器若州黨賔射之器者也鄉大夫備集此四者為州黨族閭有故而不共也愚謂族相葬故共喪器射於州序故黨共射器賔於鄉故州共賔器卑者備為尊者用也至於吉凶禮樂全具之大器則非鄉大夫莫能備其全也若國大比則考教察辭稽器展事以詔誅賞釋曰歲終考校正歲稽器三歲大比則考六鄉羣吏之教德行道藝之進與否察吏致事之辭情實與否稽其禮器兵器田器精良與否展其鄉之民事或治與否以告於王而行誅賞之法焉原曰鄉大夫既以卿為之州長又中大夫今鄉師乃以下大夫而秩居其上何也曰六鄉之中受命天子秉刑政之權以治之者鄉師而已若鄉大夫州長其秩雖尊一聽鄉師制治之法也今觀一職之中稽夫家辨施舍也則曰掌其戒令糾禁聽其獄訟大役則治其政令邦事令作秩敘則刑禁之事官府常法鄉師掌之矣其於軍旅會同田役喪紀皆掌其刑禁戮其犯命至於巡郊野賙囏厄給補助大比則考教察辭稽器展事以詔王誅賞是鄉中大權無不秉於鄉師也然後知鄉遂之師為治鄉遂之正官與鄉大夫而下所掌之糾戒禁令不同矣况黨正族師又皆在民之官乎宰夫八職二曰師掌官成以治凡則鄉師之職可知矣况鄉師之下又有上士中士下士皆所以治鄉大夫以下之人乎苟不明乎在位在職之辨此品秩之崇卑何以處之周禮全經釋原卷四
