body:
  text: 周禮全經釋原卷二明柯尚遷撰天官上大宰之職掌建邦之六典以佐王治邦國釋曰大宰天官之長也職所掌之事也建立也邦指王畿言典常也經也六典治教禮刑政事也此六者冡宰秉之以為常經六官守之以為常灋也佐助也治者理之也邦國通言王畿侯國也原曰職也者其所主制以統衆官乎故獨於大宰小宰宰夫言之也建邦也者國於天地必有與立其王者所恃以立國乎故於六官及司樂大史朝士言之也六典者一分而為六也天下之治渾淪粹盎和氣充周者一之為也判以治教禮刑政事綱舉目張條而不紊則燦然各有其所矣故天子主一以代天理物太宰佐王建六以為常灋愈分則愈理愈析則愈密在得人而任之故曰治邦國也邦國治則教養孚洽王徳周浹矣一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以紏萬民六曰事典以富邦國以任百官以生萬民釋曰治者經紀而統理之言治典者立為常灋冡宰掌之經猶治絲而條理其經緯也治謂臨制而整齊之百官所居曰府紀理也萬民天下庶民也使民皆就吾條理故曰紀是故邦國其主也官府其本也萬民其極也三者舉而天下盡矣教者訓誨振作之謂立為常灋司徒主之安者上無教則百姓不親彛倫不叙而國危矣故教者所以安之官府亦言教者百官萬務各有自然之道以處之故不可無教擾者馴習之也謂振作興起使復其常性故治則使之就吾條理而教則使之向慕喜悦以安吾條理也治則如天教則如地禮者自然之秩序也無序則不和故立為常灋宗伯掌之和邦國者使之各安其分各履其常也統百官者使之尊卑先後秩然有序也變官府為百官者尊治教也諧和也司徒曰以五禮防民偽而教之中以六樂平民情而教之和諧之謂也政者正也所以正人之不正者正則平矣物各當其分之謂平平則均矣均齊方正之謂均故整齊天下脩飭百度使天下截然齊一政之事也立為常灋司馬主之刑者侀也成也所以禁奸慝刑暴亂也詰問也隱而難知故推問以求其情顯而易見則直刑之耳紏猶察也戒也紏戒禁令是也立為常灋司冦主之是故治典以立其本教典以掖其歸禮典以齊其分其有不一者則政典以一之背教出禮違政則入刑矣故刑典為後也事者民事土地田野之事也耕耨不失其時則倉廪充實財用足矣故曰富百官之設以為民故百職皆以此而任之分民九職使之治地以定其業所以生之也以治地之事立為常灋司空主之六典而至於刑盡矣生生之本在農也故以事典終焉民獲其養則治教禮刑有所施猶四時之冬所以立三時之本也原曰六典其盡天下之務矣乎故六典立而治道舉矣治者理之也主宰綱維百政由出如天之無不覆幬教者成之也涵濡長養萬姓仰頼如地之無不持載禮者節文之使神人各安其所政者正也正其不正以振舉之也刑者齊一之如天有長養必有肅殺以弼成之也事者生之也立民生之本如天之冬萬物萌芽於此也六典舉則一徳成矣由邦國而官府而萬民三者所以盡天下也以邦國言故曰經曰安曰和曰平曰詰曰富所以統理之以官府言故曰治曰教曰統曰正曰刑曰任所以振舉之以萬民言故曰紀曰擾曰諧曰均曰紏曰生所以造化之此六者千萬世不易之常經邦國之治亂係焉百官之脩廢由焉生民之休戚關焉冡宰之任其重如此所以為六卿之綱也以八灋治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聯以㑹官治四曰官常以聴官治五曰官成以經邦治六曰官灋以正邦治七曰官刑以紏邦治八曰官計以弊邦治灋古法字釋曰八者之灋皆朝廷所制之法度與百官守之者也治者經理之府者官所居之處葢官者合卿大夫士而言也府者總府史胥徒而言也屬即小宰之六屬自宰夫鄉師肆師等以下共三百六十人也冡宰八灋舉其綱小宰詳其目其實官府之灋皆小宰所掌也六官所治之事則謂之職主也如曰大宰之職大司徒之職六職之外不言之也辨者别而明之使有司存也其目見於小宰聯謂通職聯事以合成禮事也官指官府而言邦治則總官民也事有關係衆官者則㑹衆聨事而合成之事即三禮之事也故官無屬則上下不相統而事不治職不辨則彼此相侵而任不專無官聨以通之則大事五禮皆不舉矣故官聨次之官常者叙官之常灋始則命之位次則授之以職次則考其勤惰次則以事而制食次則考其成功之要㑹又察之以情而施賞罰此為治官之常灋即小宰之六叙也聴者審察而考其實也官成即小宰之八成有一定之成灋也經謂條理之曰官常者治凡百官也曰官成者治鄉遂之官也官灋者百官各有隨時斟酌奉行之灋有命令之行使人遵守如太宰正月垂治象之灋司徒垂教象之灋是也百官各循其灋則無侵官離局矣故曰正官治官刑者治官府之刑即司冦之官刑上能紏職其目見於士師之八成不在小宰者冡宰統六官也有官刑則人知警戒而不敢犯灋度故以此紏察之書曰制官刑儆于有位是也計猶察也弊猶斷也以六者察羣吏之行能斷羣吏之治狀而賞罰之即小宰之六計也葉氏曰官府所以振舉天下之事為治之本源也大宰既溥之以六典均之以八則苟無八灋則庶政不行而治灋不立矣故必以治官府繼六典也惟其有官屬則治有統而不亂有官職則官有守而不侵有官聨則脉絡貫通有官常則百官以治有官成則萬民以察有官灋則變通自上而下守不移有官刑則莫敢為非有官計則莫不向善大宰舉其綱小宰治其目周公之詳於官府如此又安有曠官廢事者哉是以小宰正嵗以官刑令於百官府俾各脩職考灋而警之於始月終則以叙受羣吏之要嵗終則令羣吏致事又有以察之於終大宰則令百官各正治受㑹詔王廢置於一嵗之終既而大計羣吏復行誅賞於三年之後是以百官正而朝廷正矣寧不為治天下之大根本哉以八則治都鄙一曰祭祀以馭其神二曰灋則以馭其官三曰廢置以馭其吏四曰禄位以馭其士五曰賦貢以馭其用六曰禮俗以馭其民七曰刑賞以馭其威八曰田役以馭其衆馭音御釋曰則亦灋也詳曰灋畧曰則都鄙在鄉遂之外載師所謂公邑家邑皆鄙也大都百里次都七十里小都五十里載師所謂縣畺之地皆都也親王子母弟與公同處於大都次䟽者與卿同處於小都次疏者與大夫同處於家邑所以使之朝夕涖事王朝而退食於家收其貢賦立其宗廟社稷故賜則以治之也都鄙之中外有封疆溝樹之固内有城郭市朝社稷宗廟之别故三公稱諸侯者五廟五祀三社三稷其族酺黨禜州社無不與鄉遂同大夫士以此殺之馭猶馬之在馭操縱之權自其君出也故使之立其祭祀則一方之鬼神皆主之矣灋即則中之灋也有官府則有八灋以治之天子八灋以治天下官府諸侯八灋以治一國官府故都鄙之君必賜之灋則以馭其長貳之官也有罪則廢之有行則置之吏殷輔之吏不勸則不勉不威則不懲故賜其君以廢置之權也禄田禄也位爵位也士上中下士也吏則能者在職之人士則賢者在位之選也有比閭族黨之制則有徳行道藝之書有興賢能之典則有禄位之命故賜其君以制禄授位之權以馭其士也上斂下為賦下奉上為貢賦者收之於民貢者奉之於王也用國用也既賜之都鄙則令之取其地之所有以操財用出入之權而行經制之灋也禮俗昏冠喪祭飲射讀灋與六俗也使之頒五禮六俗之教以馭其民則教化行而風俗美矣刑即八刑五刑賞即進爵加禄刑以懲惡賞以勸善使都鄙之君操之則威行而莫敢不服矣田役則用伍兩卒旅師軍之灋起之田則大田役則工役皆用衆之方也使其君得以卒伍之灋用其民而教其坐作進退之方所以馭其衆也原曰則也者治之灋也制於王者也故祭祀而下莫不有一定之制通行天下而不可易矣而都鄙復有八則以治之者蓋賜其君以八者操縱之權宗伯曰五命賜則是也六命賜官則得以專此八灋矣七命賜國則亦專此六典矣夫邦國在王畿之外者也故其權專都鄙在畿國之内者也故其權降官府在王朝邦國都鄙之中者也故其權分先王以典灋則等之則逺近輕重之間斟酌損益毫釐不爽苟能通之則天下之大皆具於三者之中矣後世荒逺微職無不除授於冡宰無乃與先王公天下之意殊乎以八柄詔王馭羣臣一曰爵以馭其貴二曰禄以馭其富三曰予以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過予音與行去聲釋曰柄者操持之名猶器之有柄詔告也八柄者天子所以馭羣臣非人臣所可預惟冡宰得以詔於王者也相權在此爵内則公卿三大夫三士外則公侯伯子男爵以授德有爵則貴矣自君出也故命之爵所以馭其貴禄田禄所以酬功也有禄則富矣田邑君所司也故賦之所以馭其富也予賜也特厚之稱封爵是也幸者特恩之加覬望所不及也故予與奪對言其不測也置謂進而置之於此出其等也行謂賢能可紀則進而置於其位也故予則不測之賞置則循序之進不測之賞所以待異才異功循序之進所以待常徳常行生與殺對欲殺而不殺之是生之也不死得生福莫大焉是君予之也故曰以馭其福奪者盡取其爵禄則無所有而貧矣是君使其貧也廢退也與置對不賢不能以輕重而廢退之也與盡奪之者異矣以其有罪也誅殺也内史曰殺與生對過則罪之深也原曰王者以爵土分天下英賢度逺近制為典灋則共治之矣苟非操大權之柄以制其命何以見天王大一統之治哉故典灋則者制治之經上所以布乎下而八柄者制治之權下所以服乎上八柄一失則典灋則皆不行矣故以次其後也夫貴也富也榮幸也夀福也進秩也人之所大欲也惟王得以予之是馭之以不測之賞也夫誰不感戴而願忠貧也退也誅也人之所深惡也惟王得以奪之是馭之以罪過之罰也夫誰不畏懼而慎飭内史又有八枋以詔王治何也蓋八柄必詔之以大宰然後權之施得其當又詔之以内史然後權之用不敢輕是以大宰内史有品量之權而無生殺之柄天子操生殺之柄而必寄二臣以品量之權此所謂天命天討非人所得而私也以八統詔王馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賓釋曰統猶統治之統謂振舉之也馭羣臣者制其生殺予奪之柄馭萬民者振其徳行道藝之權而使之遷善敏徳也必詔王者欲躬行於上以率之也親親者使人各親其親以行孝弟之道又制為宗灋而使之親睦九族則親疎之殺各得其當矣故謂故舊也制為交際問饋之禮使之厚親舊即六行之睦婣也進賢謂使民興賢出使長之命司徒行舉選之灋賔興徳行之賢也使能謂使民興能入使治之命司徒舉有道藝之人亦賔興之使之在職二者興賢舉能之事庸有力於施教立事者功徳在民則益其田禄以保之貴謂卿大夫州長黨正之屬德行可尊者舍其役益其禄隆養老之禮使人致敬而莫敢慢所以尊之也吏鄉遂之吏如閭師縣師旅師司稼之類有功則加其禄秩以達之此三者鄉吏進秩之事禮賔使訝士遺人委人野廬豐其委積䟽材以待賔客覊旅也此馭萬民而曰興賢使能尊貴逹吏則王道只在行鄉遂之法可見矣原曰民可教也亦可馭也知所馭之道而馭之帝王之功可立致也書曰予臨兆民若朽索之馭六馬不其難歟夫親親敬故馭之以行也進賢使能馭之以徳也保庸達吏馭其功也尊貴禮賔馭以禮也馭以行則人莫敢不興行而綱常立矣馭以徳則人莫敢不脩飭而徳教行矣馭以功則人莫敢不趨事而功業可興矣馭以禮則人莫敢不相敬而風俗可美矣此八者上以之維乎下下以之屬乎上感之而孚動之而應絲牽繩連惟命是聴此馭民之道歟苟以智巧籠之刑威逼之民始不可馭矣此萬世治民之要灋也王道之本在此可不思乎以九職任萬民一曰三農生九穀二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂䟽材九曰閒民無常職轉移執事釋曰職事也任使也民生至繁民事至多不以職分之使各歸其業則逰手必多矣故既馭之必有職以任之也三農原隰平地之農天下皆三等之地故列三等之農以為本九糓黍稷稻粱豆麥秫苽麻也生種也惟可種九穀乃為可食之地也以籬樊之曰園可種果蔬曰圃其實一也毓與育同猶生也草木果蔬之屬載師所謂場圃任園地其實國中四郊皆有之掌山林之官曰虞掌川澤之官曰衡山澤雖非可耕之地凡民有資山林川澤以為生者皆虞衡之官掌之故總言虞衡作材今虞衡之徒衆是也藪無水之澤牧即萊也不可為田宜牧畜者故曰牧大抵萊近田者故可以益田之肥磽牧則曠逺之地特可蕃養鳥獸而已工專治之稱致力攻治謂之飭因形移易謂之化八材珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剥羽曰析此化材也言百工則不止此有是地之所出無百工則不資民用矣故次之行貨曰商居貨曰賈阜盛也通流行也金玉曰貨布帛曰賄有百工作材無商賈以通之則貨滯矣故次之嬪妻之貴者婦有姑者曲禮曰生曰妻死曰嬪美稱也化治繰練紡績之屬絲蚕絲也枲苧麻也有男職必有女職故次之臣男之賤者妾女之賤者謂奴婢之屬聚斂謂畜積之疏材如蕉葛之可布草根木實之可食用者閒民無職事之稱葢下户不能任一夫之㕓里者轉移於八職之間執事若今之雇作者故無常職然所入亦不下於耕者故立其職使出夫家之征焉原曰任民也者因其地而授之隨其力而使之不廢其所能不强其所不能任之謂也夫天下之地使民業之而食力以資生者不過平地原隰皆可為田者與夫園圃可種菜茹者山澤出材之處則有虞衡焉湖海曠逺之所則有藪牧焉天下之地不過此數者而已食土之毛孰非君民無曠土無遊民則天下治矣故四職為民生之本也苟無百工則地雖有生民何以致於用哉百工既作而用利矣苟無懋遷有無焉民亦未見其獲利以資生也又有商賈以阜通之焉此二職者又所以運用乎地之所生民之所業者也民職盡於此矣然男服事乎外女服事乎内又有嬪婦焉而絲枲者土地之所出也况嬪婦又有業者之室家乎貴者為嬪婦賤者為臣妾精者為絲枲粗者為疏材皆分之以宅地者有布縷之征焉職可以不列乎閒民不能受地則轉移於衆職之間而衆職亦須閒民以助不給所以列其職者不可使有遺民也故九職分則民業定矣民業一定志慮不易風俗自淳美財用自充足萬物各得其所矣大司徒之頒職小司徒之施職載師之均地職皆頒此也施此也均此也故觀九職之立則知周公之於天下徧布周密幽隱畢達萬生庶類咸在甄陶之中包天地以為量而裁成其道輔相其宜者乎以九賦歛財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦釋曰上取於下曰賦歛聚也金寶曰財布帛曰賄既以九職任之乃以九賦取之載師閭師徵之耳邦中國門之内載師㕓里任國中塲圃任園地邦中之地也國宅無征園㕓二十而一此其出賦之制也四郊國門之外近郊五十里逺郊百里葢鄉遂之地載師以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地此出賦之田也又曰近郊十一逺郊二十而三此出賦之額也甸地去國中二百里載師曰以公邑之田任甸地其賦皆無過十二也削作稍家削去國中三百里載師曰以家邑之田任稍地大夫之采邑在焉故曰家縣地去國中四百里載師以小都之田任縣地乃王子與卿大夫之采地都去國中五百里載師曰以大都之田任畺地乃王子母弟之親者與三公受百里之都為采地比於外諸侯也自邦甸至邦都皆都鄙之地其制凖鄉遂而殺之其出賦亦如四郊但助灋則粟米之征貢灋則取其泉為賦或以其物其布縷之征則自㕓里取之有田必有里皆在郊甸縣都之中也二征九賦未嘗别焉至大府乃分為九功以其所入為布縷之征故也王城門外警急處為關城内有市都鄙亦有關市關以征貨之出入市以征貨之藏積市關皆有賦也山澤虞衡之賦也閭師曰任虞以山事貢其物任衡以澤事貢其物者此也按先儒以九功為九職之貢則虞衡藪牧既在九職矣又何以山澤在九賦也可見九職之虞衡以任之九賦之山澤以取之九功亦在九賦之中也明矣幣餘者職幣以式灋歛官府都鄙與凡用邦財者之幣振掌事者之餘財皆納之於上故九賦列之職幣納之也原曰貢賦之不明也久矣上取乎下曰賦下奉乎上曰貢其實一也上文以九職任之此以九賦取之載師等其則而徵其賦固所以為九賦也閭師任其職責其貢亦所以為九賦也故賦一也其類有二有粟米之征公田賦禄之外以貢灋取之載師等其則閭師歛其財以貢天子大府名之曰九賦雖九職所出不同然皆謂之粟米之征正賦也布縷之征乃七職之嬪婦臣妾所出以其布帛之賄貢於天子大府名之曰九功雖有無職與宅不毛者所出不同然皆謂之布縷之征亦正賦也大宰以其所出同郊甸縣都之地也故合之而分為貨與賄大府以其所入有貨與賄之異其類也故分之而名為九功以九職之功也故九賦九功皆一賦也無所謂九職之貢矣若侯國取民之制無不同於王畿王制大同故也但以其國之所歛者貢於天子賦之名變而為貢耳非有二也是故天下之民不同也不外乎九職天下之職不同也不出乎三征出三征以取賦則為暴征横歛而君非其君矣外九職以治生則為浮巧逐末而民非其民矣孟子曰有布縷之征有粟米之征有力役之征君子用其一緩其二以周禮攷之然後知孟子王佐之才深明先王之灋者也以九式均節財用一曰祭祀之式二曰賔客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式好去聲釋曰式謂用財之成灋均者使適中節者無濫費也冡宰制國用九式其制之灋乎祭祀謂玉帛牲牷之豐殺宗伯致其用大宰定其式大府曰邦都之賦以待祭祀諸侯為賔其臣為客式謂燕饗牢餼之等差大行人主之大府曰邦中之賦以待賔客喪有賵賻含禭贈奠之禮荒有賙䘏賑貸之費大府曰山澤之賦以待喪紀羞膳夫所用也服司服所用也大府曰關市之賦以待王之膳服工事百工之事謂營造制器凡工作之事皆是也大府曰邦甸之賦以待工事則工事只九式之一耳豈司空職哉幣帛謂迎勞賔客贈送之幣與吉㓙之禮所用者大府曰邦縣之賦以待幣帛草曰芻穀曰秣所以養牛馬也大府曰四郊之賦以待稍秣匪分也頒賜也王所頒賜羣臣或以旌勞或以奬善也大府曰家稍之賦以待匪頒好用者因其所好而用之婚媾之好宗室之親諸侯羣臣之見及有曲賜大府曰幣餘之賦以待賜予劉氏曰財用而必均節之者有二義焉由其均節而財用有餘則國有㐫荒之變九者之大禮不取於下而自足聖人所以仁其民也由其均節以立制度則繼世之主不敢踰而公侯伯子男因之而隆殺有差則天下知所以節用而愛民也聖人所以制九式者如此葉氏曰九式之立豈但以制侈用之原亦所以均調天下紀綱國家辟之治家豈不以財用為先此所以繼九賦之後也夫惟大宰有式灋以均之大府以式灋頒之司㑹以式灋逆計之職嵗又以式灋而賛逆㑹職幣又以式灋而賛㑹事則人主不得違式灋而通用有司不敢違式灋而妄供私心以式灋而碍侈心以式灋而消九式真理財之大道歟以九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢釋曰下供上曰貢致者使之自至用者適於用而已不求珍異之物也祀貢如犧牲苞茅之屬嬪貢如絲枲之屬器貢如銀鐵石磬丹漆之屬幣貢玉馬皮帛之屬材貢杶幹栝栢篠簜之屬貨貢金玉龜貝之屬服貢絺苧絲麻之屬斿貢珠璣琅玕可共燕游之物物貢九州雜産之物夫貢賦一也王畿九賦以其地為類而供九式之用侯國取賦之制亦如王畿既貢於王即分為九等以入九式祀貢祭祀也嬪貢幣貢服貢乃幣帛膳服賔客也器貢材貢物貢乃工事稍秣喪荒也貨貢斿貢非匪頒好用乎是大府所入九貢反多九賦反少矣原曰大行人侯服貢祀物至要服貢貨物六服六貢矣此制貢各以其所有也視大宰之九貢而闕其三其為物至微也然則九貢者豈諸侯之貢各有九物乎曰六服六貢是等其逺近定諸侯間嵗朝覲廟享贄幣之禮非九貢之物也小行人曰令諸侯春入貢秋獻功是天下諸侯每嵗遣臣納貢之禮大宰之九貢是也蓋侯國公田之粟既為卿大夫之禄矣地賦之取必以貢王故賦之名變而為貢然後以其餘為國中之用也按司空建國有五百至百里之差而曰其食者四之一三之一二之一耳此兼其屬國而言也司勲曰凡頒賞地三之一食謂王食其一二入於臣是大國百里七十里小國五十里與都家采地賞地三之一食其常制也但王畿之賦以粟米布縷分為九賦九功侯國則直指所貢之物配為九式之用亦可以見九賦之歛財賄者不出九物之内而侯國之取賦亦不外於郊甸縣都互相備也若天子富有四海而諸侯乃令其以逺近間嵗而貢其至㣲薄之物且又聴其自來而不强其至豈富有四海之意耶無怪乎秦之欲郡縣天下也以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以利得民七曰吏以治得民八曰友以任得民九曰藪以富得民繫音計長丁丈反釋曰兩猶耦也繫猶綴也所以協合萬民使聨綴而不渙散也上既有八統馭民此又有九兩繫之者蓋統者上以其灋而收束之兩者使下之心協合於上九兩行則民心協合自親戴於我不離叛矣牧有土牧民之臣在位之職也古者列爵惟五分土惟三雖牧伯亦有分土惟其有爵土也必思國為己土衆皆我民民安則已受利國傷則家嬰禍莫不盡心民事生利而教誨之以有地之故也五等皆民牧故曰以地得民非止九州牧也首言得民在行封建以為之綱長者鄉遂之長亦在位之人也自族師至鄉大夫自鄼長至遂大夫皆民之長也有徳行道藝而進之以大夫士之位其宮室衣服禮儀各有等級齊民不得齒焉則人莫不脩徳學道以聴旌舉矣非以貴得民乎行封建必行鄉遂故次之師者徳行髙而學業富足為人之模楷又能教導引翼成學者之徳以達其材者也上能隆禮而尊崇之必成就賢才以需國用而徳化成矣非以賢得民乎儒謂有道有學者詩書禮樂之兼備先王之道賴之以明所謂天民之先覺者足為後覺之師資則人皆遵道遵路而孝弟忠信之俗興矣非以道得民乎夫鄉遂之長職乎教固有師道然以長目之則以品秩之崇使人向慕也師者庠序學校之師有道徳能成就人才者非鄉遂之長也儒謂明先王之道以覺人蓋不論在位在職與齊民但有能明斯道者皆謂之儒雖師以教儒以道然為師者未必不為儒為儒者亦有不為師皆足以得民故先王之時亦必别之宗宗灋也族九族也小史辨系世奠昭穆公卿大夫士至於齊民莫不有宗有族公劉立國必君之宗之乃宗灋行於鄉灋之中使之尊尊而親親則九族惇叙孝弟化行矣非以族得民乎主者一家之主自其臣妾子弟言之即族黨州鄉之長得以合子弟畜臣妾位愈尊則益其田禄而家愈大衣食豐足是以利得民也上言長以品位禮儀言之此言主以田禄子弟臣妾言之故曰貴曰利以别之其實皆鄉遂之長也吏治事之吏能者在職之人也有才藝者使民興之以治鄉遂都鄙之民事鄉遂庶職是也是其興利除害有益於民而民心悦之則得民矣故知賢能之分則知主吏之説也以類相求曰友以徳相信曰任以力相勸亦曰任友者同等之稱貴賤長少皆有同輩者如野人以耕農相任童㓜以習學相任君子以脩徳學道相任皆得民者也夫子老安少懷而中於朋友信天下之民齊等者多皆能以信相任則天下治矣藪澤藪山澤皆有虞衡不言山者江河湖海天下獨多可以兼山故不言山而言藪也山澤之寶藏魚鹽材木民生不可一日闕者處之有灋而公其利則民富矣必以藪終之者有恒産而後有恒心人情莫不欲富聖王厚之而不困欲得民者終不離乎富之而後教也故觀九兩之立則先王所以治天下之道不出於鄉遂之灋也可見矣原曰大宰以九兩終治典者得無意乎夫民難合而易睽撫我則后虐我則讐苟非徳義足以結其心利澤足以養其身决非一人名位所得而留也此非有他牧以地主以利吏以治藪以富皆足以養民之身而吾任得其人使脩飭而振舉之長以貴師以賢儒以道宗以族友以任皆足以繫民之心而吾處得其當又作興而鼓舞之則自然相安相養相遜相親愛之如父母歸之如流水雖有變故之死靡他矣故周公晝夜思兼作大宰十章其經制天下罔不備矣而終之以此正以見為上者欲得民不在於區區灋度之間惟在於教養兼舉以仁心而行仁政而已孟子曰徒善不足以為政徒灋不能以自行九兩繫民之謂乎按大宰十章周禮之綱也治天下之道舉備于此張子曰大宰一職難㸔蓋無胸襟如許之大包褁得過記得此又遺彼以愚觀之天下之大各有條理不過使天地萬物各得其所而已其要皆備於吾心今觀典灋則八柄與下文施之之灋雖立天下之大本然不過用人之道也八統九職九兩治民之道也九賦九式九貢理財之道也天下之大不出此三者而已大學傳平天下曰好惡絜矩者大宰治民之道也用人理財各有大道者亦大宰二端盡之中庸之九經亦不出此是知孔門之傳授致用之要術豈出於周禮之外哉正月之吉始和布治于邦國都鄙乃縣治象之灋于象魏使萬民觀治象挾日而歛之正音政縣音𤣥挾音浹釋曰正月孟春之月吉朔日也始和建寅之候陽和始布也夏正紀月三代迭用惟改嵗則夏建寅商建丑周建子所以新民耳目終始萬事也後凡言正嵗則建子月朔也嵗終則建亥月終也大抵改嵗則三代不同紀月以正四時則三代一揆商書曰惟元祀十有二月元祀則改嵗以紀年也十有二月是不改月也春秋書春王正月則純用夏正以紀年不以改嵗繫月也故周公獨言始和可知矣孔子告顔淵曰行夏之時正春秋之灋示後世不宜以改嵗紀年也布頒布也治治典邦國都鄙兼王畿侯國言之縣掛也以今年所行治典之條章畫之於板象縣於雉門兩觀之間使有司萬民觀而灋之體而行之也浹日旬日也歛收也鄉遂之民十日而觀可遍矣邦國都鄙則正嵗十一月朔既頒行之至於正月則遍於天下矣皆令正月縣之此成周頒灋頒朔之制也丘氏曰治象者天垂象聖人則之故闕曰象魏灋曰治象之灋縣之有象於上為萬民所瞻仰也葉氏曰聖王縣灋象魏其愛民深而教之至乎蓋聖王未嘗以灋令刑罰而强民以必從也惟恐其以愚觸罪有愧於作民君師之責是以正嵗既布治灋以示乎近正月皆縣之以示乎逺遲之以十日之期欲其觀聴之詳收之於浹旬之後恐其習讀之玩又使遒人以木鐸徇之不但已也使鄉遂之中鄉大夫正月頒灋州長正嵗正月與夫春秋祭社之時屬民讀灋黨正又以孟月及正嵗與夫春秋祭酺之時讀灋閭師又以嵗時聚衆之時讀灋葢視民彌親者教彌數保民於無疆者其教思亦無窮真如父兄之於子弟耳提面命丁寧告戒惟恐不至果不可帥然後不得已以刑一之正所謂王者之道涵濡煦育納之於仁夀之域孔子曰道之以德齊之以禮此之謂也乃施典於邦國而建其牧立其監設其參傅其伍陳其殷置其輔監去聲參七南反傅音附釋曰典六典也施典於邦國侯國得以依六典而建官也此典灋則皆自建官言之建立也牧者宗伯曰八命作牧每州各設牧伯以司其州之諸侯曲禮曰九州之長入天子之國曰牧是也監鄭氏曰公侯伯子男各監一國愚謂諸侯各治其屬國即方伯連帥而謂之監也大功徳升為州牧則稱伯焉殷制天子使大夫三人為三監至周使伯為牧不立大夫設參卿也六典三卿者并大宰於司徒并宗伯於司馬并司冦於司空左傳杜􅂥云吾子為司徒夫子為司馬孟子為司空則諸侯三卿之制可見王制曰大國三卿二卿命於天子一卿命於其君如齊有天子二守國髙是已伍五大夫也傅附也諸侯之卿當天子之大夫中當其下下當其元士殷衆也謂衆士猶六官旅下士也王制諸侯上士二十七人中士下士各居其上之三分輔佐助也助成官府之事府史胥徒是也灋立矣乃建官以行之曰立曰設曰傅曰陳曰置皆建字之義也乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔釋曰則八則也典分國事而為六則又分邑事而為八則者典之目長謂王子公卿大夫所食之采地為邑之主或身在王朝而食其賦税也兩謂兩大夫天子使之治其采邑者也伍下大夫五人也殷輔則視邦國而殺之乃施灋于官府而建其正立其貳設其攷陳其殷置其輔釋曰灋八灋也凡官府皆有正如大宰司徒是也貳如小宰小司徒皆中大夫二人主治一官之事攷成也佐成事者乃屬之首如宰夫鄉遂師肆師士師是也殷則上中下士所謂其屬六十人是也凡官府之士皆謂之殷惟六官下士稱旅也輔則府史胥徒也典則之輔皆同凡百官府皆有長貳殷輔無是則非官府矣原曰制而用之存乎法推而行之存乎人變而通之存乎權故邦國都鄙官府立而天下之大舉矣六典八則八灋制而政之大綱立矣牧監長正與參兩貳及伍攷殷輔設而舉政之人備矣天下之大聖人以三者之權等之則大小髙卑繁簡各得其平矣非聖人心極天下之公而明孰能運天下如此其周且要哉夫德侔天地者為天子六徳為諸侯三徳為大夫下至於鄉遂之官莫不各以其徳而制其位又各與之以大小不齊之權大者治要小者治繁聖人固不曰四海一統也天下一人也以天下之權盡收一已以四海之事盡屬王朝而天下公侯大夫俱不與之以專命之權固無不可矣然天下之髙者必自下積累之而后至於髙未有空中特然獨髙之理泰山髙矣必有邱阜岡巒輔之而后成其大天子必有公侯卿大夫師長而后成其尊有公侯大夫師長矣必有權以授之然後各得其職苟不與之權徒以空名崇之無乃非聖人以天下才治天下事之公心乎此權之所以不可不均也故王朝有六典矣而諸侯亦有六典非僣也天子六典有六卿諸侯六典只三卿天下民事皆同故侯國不得不施六典也六典雖施三卿之下其官皆得自置故曰六命賜官而大夫則非諸侯比也既與之地為都鄙之君乃賜以八則之權得以禄位黜陟其臣民也故曰五命賜則至於官府之吏則在職之人其權各有差等矣後世獨有官府之權而賜典賜則絶無焉是非聖人公天下之心也故舉天下之權皆收於一人萬里之外一命之官無不選授於王朝無乃非先王均權之意歟凡治以典待邦國之治以則待都鄙之治以灋待官府之治以官成待萬民之治以禮待賓客之治釋曰上言行灋之本此言用灋之要聖人以天下之事盡於典灋則也故建官以行之亦惟循守成灋以待事之至而已固不得作聰明以亂舊章亦不至臨事無所據依而眩此聖人制作之功也故守成之君何為哉亦守先王之灋而已以灋待官府之治者邦國都鄙皆有官府則又典則之本也官成雖在八灋之中官皆為民而立又八灋之本也故特言之禮統言之禮治合於道則為禮又所以秩序和平典灋則者又其本也待賔客之治者有典則則必有交際有交際則必有禮禮無所不在待賔客特其治之一耳原曰天下之人衆矣其務繁矣豈一手足所能運動哉不有成灋以待之日亦不足矣故天子以一人主制於上次則諸侯也又次則都鄙之君也而王朝邦國都鄙又皆設官府以總理之故立為典灋則以經之則天下事統之有綱也㑹之有紀也治灋立矣擇人而任之矣大宰清心無為候事之至各舉舊章應之未嘗作聰明以亂成憲所謂無偏無黨王道蕩蕩者也可以見制作之功矣然官為民而立也苟於民事不有成灋以理之恤其饑寒救其疾苦聫其恩愛而徒以刑灋把持之烏在其為君也又有八成之灋以待之然典灋則與官成固所以整齊於尊卑分守之中外不無賔客之徃來也又制為邦交聘問食饗飲燕之禮則禮樂刑政四達不悖四方上下均齊方正無有偏而不舉之處矣此皆出於自然之理固非騁其才智强力而可以壓服乎天下也祀五帝則掌百官之誓戒與其具脩前期十日帥執事而卜日遂戒及執事眡滌濯及納亨賛王牲事及祀之日賛玉幣爵之事眡與視同後倣此滌直歴反濯直角反釋曰上言大宰正職此至賛王命言大宰聯職聯者合諸職共行五禮之事也其目見小宰諸職皆有聯郊祭有分祀有合祀總言祀五帝者合祀也後言旅上帝者分祀也程子曰帝者氣之主也有五方五色之異謂之五帝宗伯言昊天上帝者又合而言之非五帝之外又有昊天上帝也祀帝禮之首也故大宰掌百官之誓戒具脩誓戒令也戒齋戒也具謂備具牲帛牢醴之品脩謂洒掃嚴潔之事此致蠲也前朝十日散齋七日致齋三日也帥執事卜日凡百官有司執祭之事者大宰大宗伯太史帥之而卜日得吉則與大司冦涖戒誓之犯誓則施刑此卜日致戒之事及執事眡滌濯者當嚮祭之晨執事滌溉祭器大宗伯宿眡之大宰及執事然後視之此省器之事納亨謂納牲將告殺君親牽牲大宰賛助之既殺以授亨人謂之納亨此省牲之事及祀之日旦明也玉幣所以禮神玉爵所以獻齋酒執以從王至而授之此賛王行祭獻禮之事郊祀之儀亦畧見於此矣祀大神示亦如之享先王亦如之賛玉几玉爵大朝覲㑹同賛玉幣玉獻玉几玉爵大喪賛贈玉含玉作大事則戒于百官賛王命示音祗下同釋曰祀大神示謂旅上帝祭地示也亦如之太牢之禮皆如郊祀享先王宗廟六享也玉几所以依神玉爵所以獻神皆大宰賛之天神地示人鬼之禮見大宗伯春見曰朝秋見曰覲時見曰㑹殷見曰同朝覲㑹同或言大者五服皆朝之嵗朝者衆故謂之大玉幣諸侯所以享天子行人云廟中三享是也玉獻諸侯所以獻國珍幣與貢皆合之以玉故謂之玉幣玉獻也玉几王所依者立而設之所以優尊者玉爵王禮諸侯之酢爵王朝諸侯立依前南面禮之於阼階上賛者助王授之此四者皆大宰為之贈玉所以送先王行於旣窆之後含玉天子崩以玉含口中行於始崩之時亦助嗣王為之作大事若軍旅田役及嘉禮是也大宰尊故不别言只戒百官賛王命而已他職則備言六聨五禮也原曰大宰天子之相臣故其禮亦天子之相禮也上相天子下臨百官故百官必聴太宰之誓戒天子必待大宰之賛助以一人而處上下之間其任可謂重矣故六聨五禮皆誓戒百官賛助王命巍然百僚之首身任天下之重故不觀其禮何以知其職之尊哉王眡治朝則賛聴治眡四方之聴朝亦如之凡邦之小治則冢宰聴之待四方賔客之小治釋曰此言大宰賛王出治之事眡朝謂臨朝也治朝在路門之外天子日朝羣臣聴政之朝也冡宰賛聴治助王平斷國事也四方聴朝謂王廵狩四方朝諸侯於方岳以攷制度冡宰亦賛聴朝大政事大典禮王自治之小事則大宰聴决不以煩王也四方賔客小治謂天下諸侯令臣來聘或小諸侯來咨政事亦不煩王冡宰自决之王恭己南面大治與宰臣平章一人之體也大治與聞助王所不及小治不以煩王者百揆之體也上奉王命次請于冡宰衆務各以其職自治之庶僚之體也治各有體觀此則君相之職可知矣原曰於賛禮可以見大宰之職尊於賛政愈可以見大宰之任重矣故眂朝聴朝皆以賛王王固必待大宰之賛而後行事乃得其當也小治自决亦欲得當乃可以副王之託也相資以道相與以心故君臣道合魚水相投斯明良遇而王道成矣嵗終則令百官府各正其治受其㑹聴其致事而詔王廢置三嵗則大計羣吏之治而誅賞之㑹音檜釋曰嵗終建亥月終也不言正嵗者以有小宰正嵗率屬觀大宰治象之灋於天官之府乃頒行天下令各於正月縣之故大宰不言正嵗小宰不言正月互相備之義此言大宰考課百官而行誅賞也百官府百司庶府六官皆在也正其治自考其屬以正其一年所治之事㑹大計也受其㑹則各屬以其所㑹之事致于大宰大宰受之令司㑹逆羣吏之治而聴其㑹計以參互考日成以月要考月成以嵗㑹考嵗成以周知四方之治然後聴其所致之事以告于王詔廢置廢者退其秩置者進其秩此一嵗之考也及三嵗則令天下大比邦國都鄙凡百官府皆㑹計羣吏而行誅賞之灋蓋嵗終廢置所以脩舉廢墜三嵗大計乃行黜陟之典誅也者不徒廢而又加之罪賞也者不徒置而又加地進爵考覈明而誅賞當此人臣所以力於事功也六典而下建立治道紀綱也正月縣灋率百官興事也施灋待治執要以御天下也嵗終省其成也一嵗詔廢置三嵗大計誅賞順承天道之公也故大宰一職豈惟為臣所當知為君者亦不可不知原曰唐虞之灋三載考績三考黜陟幽明故考績以三年黜陟以三考則九年矣在唐虞之灋可謂甚寛成周則日有日成月有月要嵗有嵗㑹而廢置行矣三嵗則大計而誅賞之其灋若甚密焉何哉蓋聖人考績之典非固止於稽績以進官也又非遏其久次以妨賢也不過欲以天下才治天下事使官稱其職德稱其位僥倖者無所容奸欺者不得逞而已苟徳稱其位才稱其職一世不易可也靡德冐位靡才鰥官旬日即去可也徳大任小匹夫卿相可也徳小任大易不踰時可也是故任之不得不久而考之不可不密任不久則功不能成考不密則實不能覈然則成周一嵗廢置三嵗誅賞者久任之意未嘗不存而有虞三載考績九載黜陟者考之未嘗不密也小宰之職掌建邦之宫刑以治王宫之政令凡宫之紏禁釋曰小宰貳大宰者大宰平章天下司其綱小宰專掌王宫與官府八灋之目言建邦者亦建立邦本國依以立者也宫刑王宫之刑罰也后宫則路寢一小寢五其外則宿衛之處有八次八舍之灋宮正宫伯掌之后宫者王后所居之六宫内宰掌之内有女傅女宫設女官八十一人春官世婦掌之亦兼總於小宰蓋天官者天子之相臣先掌王脩身齊家之事而后及於治國平天下故宫刑與政令紏禁皆小宰掌之猶司徒之掌六鄉司空之掌六遂者也政以正之令以約之紏以察其失禁以止其邪政令行於王宫紏禁兼行於后宫葉氏曰小宰之職不亦重乎首曰建邦之宫刑又曰正嵗帥屬觀治象之灋退以宫刑憲禁于王宫夫在王宫者百官府之次舍與士庶子之宿衛宫正宫伯已掌其戒令紏禁宰夫正嵗又以灋戒警羣吏令脩宫中之職事宫中職事謂宫卿傅母及女宫奄人之屬内宰所掌之事則周人於宫政詳且密矣今小宰首掌王宫刑禁何也曰天下風教未有不自王宫始也侍御僕從一有不正出入起居一有不欽皆足以害治雖大宰嵗終廢置三年誅賞亦惟總其要耳宰夫惟警戒之耳宫正亦惟令其毋去守耳宫伯亦惟令其作宫衆而已不有小宰治之以宫刑憲之以宫禁使之各脩職考灋待事以聴王命而制之以不共之大刑吾恐竒衺之習作滛怠之念萌居王所者皆若而人則君慝必不能潜消於密勿之中而吏習必妄肆於禁嚴之内誰與繩愆紏繆而格其非心也耶然則宮刑之掌於小宰其脩其廢實君心敬怠之所由判君徳隆替之所由基也掌邦之六典八灋八則之貳以逆邦國都鄙官府之治執邦之九貢九賦九式之貳以均財節邦用釋曰逆謂迎受勾考使知功過之所在貳者掌其副貳之書也典灋則所以治邦國官府都鄙者也而小宰掌其貳所以佐大宰治平用人之事也執守也均財使之得其平節邦用使之無過費冡宰雖制國用然司其大綱而已小宰實執其貳而均之節之此佐大宰理財之事也原曰太宰者天下之綱也小宰者大宰之目也大宰施其意小宰行其灋故典灋則大宰總其操縱之權小宰則掌其貳而考其功罪之當貢賦式大宰既制其歛散之政而小宰則執其貳而謹其出入之司非行其灋乎大宰有八柄八統而小宰無之二者皆天子操縱臣民之大權大宰詔之故不與也大宰有九職九兩而小宰無之二者皆調理萬民之事制治之本原小宰行灋而已故不與也然則太宰小宰之職不居然可見乎以官府之六叙正羣吏一曰以叙正其位二曰以叙進其治三曰以叙作其事四曰以叙制其食五曰以叙受其㑹六曰以叙聴其情釋曰以官府者本大宰以八灋治官府而言下五條皆言以官府者亦同乃詳八灋之目也六叙即八灋之官常叙者官府次序之秩惟有序斯可執之以為常矣正者整治之羣吏上士以下也位者别其品秩有上中下之别以次序正之使不得紊亂凌僣也治有四職治要治凡治數治目之别位有貴賤治有詳畧尊者宜畧卑者宜詳以叙進之使不得干亂也事者有職斯有事作猶起也事有小大緩急以叙作之則無闕人廢事也食稍食士之俸給也上士倍中士中士倍下士下士與庶人在官者同禄故制食必與作事相應叙而制之者使其餼廪稱事也㑹者嵗終衆職致事獻所㑹計功狀必以逺近尊卑為叙而受之情者五叙之中或有情灋相礙不可以叙拘者則聴其情而以情灋權之六叙苟無聴情則魚貫而進可矣必有通融聴情之灋斯無窒碍也原曰八灋以官常次於官聨之下小宰以六叙居首何也蓋叙者官府秩序之常也凡事有叙則條理可尋而不紊常經可據而不拂况於正羣吏而無叙可乎是故以叙正其位則尊卑不得以相踰以叙進其治則職事不得以相違以叙作其事以叙制其食則事食不得以相浮以叙受其㑹則日旬月嵗之要可考也以叙聴其情則親舊賢能之故可原也不然則六者皆亂尊卑得以踰越功過得以相混簿書可以紊亂賄賂可以私行百官何所灋守而官屬官職安得而舉哉故不得不以六叙為首宰夫八職四曰旅掌官常以治數蓋六官下士之多専為此而已七曰胥掌官叙以治叙蓋衆職胥役守其文書給其使令亦為此而已以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則専達二曰地官其屬六十掌邦教大事則從其長小事則専達三曰春官其屬六十掌邦禮大事則從其長小事則專達四曰夏官其屬六十掌邦政大事則從其長小事則専達五曰秋官其屬六十掌邦刑大事則從其長小事則專逹六曰冬官其屬六十掌邦事大事則從其長小事則專達釋曰屬者連屬之義六官各有職職必有屬然後聴於一六屬者六官之屬必聴於長然後邦治可舉而行也天官謂大宰一人小宰中大夫二人以為正與貳以主制一官之事者三人而已其屬謂宰夫以下至旅下士凡六十人也掌邦治謂天官一府長與屬共掌邦治之事也大事從長謂屬首上於長貳不敢專行也小事專達謂宰夫鄉師肆師士師遂師皆可達於王也故曰長治要而屬治繁六官皆同原曰王者體天以為治故灋天以建官六官三百六十屬非人為之私智也灋天運自然之度而已臯陶曰無曠庶官天工人其代之凡官之設皆代天工也况六職之中政本所繫數不灋天官非代天可乎自漢以來皆謂合六官所統者為三百六十之數間有不齊乃以己意移易以合小宰每屬六十之言亂經之原實起於此不知小宰之六十皆以六官之内所屬不以六官之外所統也其曰天官則大宰少宰三人為長宰夫至旅下士六十人為屬則長與屬皆掌邦治代天工之人也邦教邦禮刑政事皆然若以所統言屬則膳夫以下庖人酒人及縫染之職皆可以言掌邦治乎又所統之官有一官散而為千百者如地官鄉大夫而下只六職合六鄉則有一萬八千餘矣可以當六十之數乎所謂大事從長小事專達者亦為六屬之首言之也若以所統之長屬則天官宫正而下只有六七屬六官微細之職皆有長屬亦得専達否乎經文明言其屬六十是分毫不可増損也若以萬有不齊之官而為此畫一不易之數又非聖人作經之灋也夫唐六典分二十四司固得屬首下大夫二十四人之意然每官上士八人中士十有六人則亦二十四人而止耳旅下士三十有二人則全無之後世不得不以吏胥補下士之數夫胥徒皆庶人在官役民為之漢一胥統十徒謂之什長可以當下士之數乎今六官之中弊端最深六十屬之説不明故也以官府之六職辨邦治一曰治職以平邦國以均萬民以節財用二曰教職以安邦國以寧萬民以懷賔客三曰禮職以和邦國以諧萬民以事鬼神四曰政職以服邦國以正萬民以聚百物五曰刑職以詰邦國以紏萬民以除盗賊六曰事職以富邦國以養萬民以生百物詰起乙反釋曰上言官屬欲官府聨屬而定于一也此言辨職欲官府各定其職不侵紊也六職既辨則府定其局官定其守而百政自理矣六職與六典大同而小異六典以書言治之灋也六職以官言治之人也不言官府此正官府之事也平者各當其分之謂使之大小强弱不相侵凌而邦國平矣均者各得其職之謂使之貧富賢愚各安其所而萬民均矣治莫先於理財㑹計財用而調節之治職之事也教職以教為職守也使之各循於理則無侵暴之事邦國有不安乎使之興行而遵道則無乖爭之失萬民有不寧乎使行旅入其境皆有常餼以禮之賔客有不懷乎以禮為職者朝覲䀻問不使有闕是和之也冠婚喪祭射鄉相見各有儀式是諧之也天神地祇人鬼各安其享是事之也服則使之順於王正則使之安於職九貢出於邦國邦國歛於其民服之正之則百物可聚矣問其曲直而加征討察其犯教而施刑罰所以刑邦國與萬民也明灋禁戮奸慝盗賊除矣事職者土地衣食之事也是故正經界時耕耨田里安氓土宜教氓由是以生百糓由是以足蠶桑由是以實倉廪則邦國得其富萬民得其養而百物以之生矣無曠土無游民此冬官之職乎原曰愚觀於辨職益信司空之未嘗亡也遂人曰掌邦野稽人民授田野教稼穡非事乎頒職作事以令貢賦非富乎夫一㕓田百畆非養乎趨耕耨稽女工以四達戒功事非生乎故遂人即小司空也不於辨職而知之何從而考之是故取大司徒土地之事以為大司空之職而加於遂人之上分地官之半以為司空之職考之六典辨職而合稽之序官六十屬而同放之六官無一事不通於條貫則六官完整如舊矣噫後儒以司徒為司田野司空為掌百工則辨職所謂教所謂養而富而生果何謂哉以官府之六聯合邦治一曰祭祀之聯事二曰賔客之聯事三曰喪荒之聯事四曰軍旅之聯事五曰田役之聯事六曰歛弛之聯事凡小事皆有聯釋曰屬以官定職以事定然事有相因屬有大小不通之以聯則五禮不行矣故官聯次之五禮事之大者皆聯事通職然後邦治得以㑹合而成祭祀謂大宰賛玉幣司徒奉牛牲宗伯眡滌濯司馬羞牛牲司冦奉明水火之類是也賔客謂太宰大朝覲㑹同賛玉幣玉獻與小宰大宗伯大行人小行人掌客所治賓客之事司徒令脩道備委積大司冦前王之類是也喪謂大宰賛含玉贈玉大司徒率衆庶鄉師治役荒謂大司徒移民通財宗伯殺禮行人賙委之類軍旅如司馬禁令大司徒以旗致民中春振旅中冬大閲皆聯事也田所以簡衆役所以任衆也如司馬教陳鄉師帥民司徒舉旗虞人萊野之類歛民之賦弛民之力如大宰九賦司馬司空制賦閭師載師徵賦此歛之聯事也均人掌均力政而鄉大夫則舍其賢者能者老者疾者此弛之聨事也六官之聨皆具衆職之後小事有聨如司關聨門市之類原曰聨職也者聨其五禮之事也五禮有吉凶賔軍嘉皆王朝之大禮周禮每官必有聨職大史職曰大事執書讀禮而協事是知大事為五禮其書為儀禮聨職所以行之者也夫祭祀者吉禮也喪荒者凶禮也賔客者賔禮也軍旅者軍禮也而田役本在軍禮以事大故分之嘉禮亦在賔禮以事小故合之歛弛則事之大者故特見焉是六聨之行五禮者審矣夫官不分則侵官離局而體統不立職不聨則大事不舉而禮行不周大宰舉其要故以官聨㑹官治小宰治其詳故以六聨合邦治是故分其職而率其屬則事權雖分而不相離也合其聨而㑹其治則諸職相通而不相混也邦治成焉大禮大事舉焉故不觀聨職何以知儀禮之所亡哉以官府之八成經邦治一曰聴政役以比居二曰聴師田以簡稽三曰聴閭里以版圖四曰聴稱責以傅别五曰聴禄位以禮命六曰聴取予以書契七曰聴賣買以質劑八曰聴出入以要㑹政音征傅音附别彼列反予上聲釋曰此即大宰之官成立民間八事之定灋以經理萬民之治也聴猶聴治之聴上接下之辭即治官之治字葢經理之非聴訟之謂也政力政也字從征謂賦也役徒役也比居以民居比而列之立五家為比五比為閭凡起徒役無過家一人言欲理民征役之事則令其行比民居之灋師用衆以征伐也田四時之田獵也簡選也稽計也簡稽之灋如一家五人可任者家二人一為正卒一為羨卒起徒役無過家一人若行師又以司馬灋簡稽之甸出長轂一乗甲士三人歩卒七十二人四分當兵之數發其一分之强其灋見逸司馬言欲理民師田之事則以司馬簡稽之灋起之二十五家在鄉則為閭在遂則為里皆有巷巷首有門門側有塾版圖者古人以版為䇿畫閭里之形於圖藏之官府凡民訟則以比居之圖正之地訟則以地形之圖正之也稱謂貸之以物責謂責其所償傅著也著約信於大書别而為兩兩家各得一也言欲理民貸責之事則先為傅别之灋使之不爭也位定而後禄之此禄位也鄉遂之長進秩則有田禄以益之官田宅田士田是已禮命者月書季考及大比興賢能以鄉飲酒與鄉射之禮禮之進其書於王然後命之以禄位也取予者取之於官而官予之即泉府官歛市之不售者貨之滯於民用者買者賖者都鄙從其主國郊從其有司皆書於契然後予之是也此與稱責異者稱責民自相借貸故令為兩券各藏其一此則民貸於官故必從其有司書之於契然後與之質劑即司市質人之事質成也平也先鄭云月平價也劑券書按質人成市之貨賄賣買者質劑焉想古者貨賄入市必先令質人成其價揭於書以示人使賣買者不得爭價随時髙下月必更之故曰月平大市則質人平其價而立券小市則依揭示而賣買焉故五尺之童適市而莫或欺也有爭則依官揭與券而斷之故曰以質劑結信而止訟舊説質長券劑短券不知賣買之時何用券書且質字豈可以長劵訓之哉然則質劑者乃質平之劑也官給於民曰出民輸於官曰入即旅師春頒秋歛之事嵗計曰㑹月計曰要皆計簿也頒與歛皆以官之計簿考之原曰八成也者制為成灋使民遵行而後經理之即鄉遂之灋也是故比居而後起征役簡稽而後出師田禮命而後進禄位圖成而後正閭里則教養兼舉而民定矣大本立矣不能無有餘不足也而使之相為稱貸焉不能無以贍補不足也立司市而聴其交易焉不能無喪難之急也設泉府於國以聴其賒貸焉不能無貧乏之可矜也立旅師於野以平頒其興積焉八成設而民業定焉定分明焉役政均焉禮教行焉忠信立焉恩澤溥焉大宰司其綱小宰詳其目然後布於司徒司空使行之六官之設何者非為民哉苟以八成為聴訟之具也則大宰典灋則之下又専言官成以待萬民之治何耶葢又為典灋則之本故也以聴官府之六計弊羣吏之治一曰廉善二曰廉能三曰廉敬四曰廉正五曰廉灋六曰廉辨釋曰聴平治也弊猶斷也平治八灋治官之計有此六者以斷羣吏之治廉察也大宰之大計小宰宰夫之月書季考嵗㑹皆所以廉之也善謂循良有徳及民者六計以徳為首能有才藝而事功及民者敬者操持不苟才能不及而立已嚴潔者正者特立持正而無傾邪者此二者長於徳行之吏灋能恪守官灋是守職無侵者辨者斷决分明之意才識明敏臨事不惑也此二者長於才能之吏以此六事廉察之則吏之賢能見矣原曰六計廉善不廉惡何也曰冢宰以興治為事故考其徳行才能將以畀之職而禆於治也司冦以紏過為事故有官刑而曰上能紏職其目見於士師之八成皆所以行大宰官刑之事者也古之考百官善惡不相混故小宰廉善士師紏惡而分考之夫無善則不可任職矣治官以用人為職者也豈可先立不善之目以廉之哉故賈誼曰上設禮義廉耻以御其臣臣不以節行報上者非人類也此亦小宰之六計待人以君子長者之道居其厚不居其薄之意與是故吏以徳行為上才能次之敬與正察其立身行己徳行之實也灋與辨察其涖官行灋才能之實也教不出乎德行道藝用不離乎賢徳才能故考之亦以此也故觀小宰之六計則知成周用人之灋才必稱其徳職必當其位可知矣以灋掌祭祀朝覲㑹同賔客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用治其施舍聴其治訟釋曰灋五禮之灋度也戒謂飭其事具謂備其物太宰於戒具不言灋道揆之任也共財用者國用冡宰制之故七事皆小宰令百官府共之施謂施恩惠舍謂舍而不用爭其事之謂訟聴其訟之謂治施舍治訟皆自聴理之事舉其要而已林氏曰三代之政未嘗有轉輸漕輓之文春秋列國諸侯㑹同征伐無嵗無之然其兵食資用皆取給於所過之國亦未始有餽餉之役凡以農功脩而粟帛衆雖門關郊里野鄙之間皆有委積故能隨用取足也故小宰㑹同軍旅令百官府共其財用而春秋齊師還自召陵申侯請道出陳鄭之間共其資糧扉屨是也至秦欲攻匈奴使天下之民飛輓芻粟轉輸河北率三十鍾而致一石漕運之盛蓋興於此惡足為治世灋哉凡祭祀賛玉幣爵之事祼將之事凡賔客賛祼凡受爵之事凡受幣之事喪荒受其含禭幣玉之事釋曰宗廟之祭有禮神之玉幣獻神之玉爵則從大宰助王亦謂之賛也酌鬱鬯以獻尸謂之祼言灌也宗廟之祭王酌以獻尸小宰將而送之也賔客之祼宗伯攝王為之小宰賛之王不祼賔客而有受酬故凡受爵受幣大宰於賔客處受之以授王大宰又受於王以授小宰蓋祼則佐宗伯受爵受幣則佐大宰也實口曰含衣服曰禭凶荒有幣玉者賔客所賙委之禮程氏曰天地用玉幣交神明而不祼則玉幣尊於鬯故大宰賛之鬯則大宗伯賛之祼將又卑於鬯故小宰賛之若此類所謂序事也先王量徳受任因任受職此序事所以辨賢也月終則以官府之叙受羣吏之要賛冡宰受嵗㑹嵗終則令羣吏致事釋曰叙即六叙也月要每月之小計則小宰受之嵗㑹一嵗之大計則賛冡宰受之也每嵗終則令六官各齎一年之功狀致於冡宰以待考也事小宰考計之事正嵗帥治官之屬而觀治象之灋狥以木鐸曰不用灋者國有常刑釋曰正嵗十一月建子之朔也周改嵗於建子故稱正嵗改嵗之朔耳目一新大宰斟酌一年之治灋此日縣於天官之府小宰乃帥治官之屬往觀之乃頒行於天下至正月之吉縣於象魏令天下各以是日縣之行新令也先儒以正嵗為建寅正月不知此耳蓋以改嵗言故曰正嵗以始月言故曰正月鐸鈴也金口木舌古者將有教令必擊木鐸以警衆使明聴也不用灋者謂官屬有違治象之灋者以國刑施之不汝赦此警衆之辭也乃退以宮刑憲禁于王宮令于百官府曰各脩乃職攷乃灋待乃事以聴王命其有不共則國有大刑釋曰乃退者觀治象而退也宫刑即建邦之宫刑也五刑掌於司冦宫刑獨小宰掌之以總治王宫也憲謂表縣之禁謂止絶之以宫刑之禁縣之使宫中官府觀之也又令以戒之使各脩其所治之職蓋宫中之人各有職業無逰閒者各攷其所事之灋以待所作之事以聴王之命令蓋小宰之戒飭乃承王命以治其家者安有專輙之失哉不共謂犯刑禁也大刑重於常刑以王宫深嚴之地故制刑加之治家貴嚴故也陳君舉曰小宰之職蓋貳冡宰以掌邦治而宰夫又所以貳小宰也故冡宰掌其典而小宰帥其聴冢宰操其柄而小宰則治其紏禁凡小宰之所聴所弊所刑雖非冡宰所自為而百官之所以聳動警飭而不敢易紀律者蓋嚴冡宰也夫是以君宰尊嚴朝廷清明百工稱職而不政不勉者盖本諸此鄭氏諤曰或問小宰宰夫推廣大宰之灋而聳動警飭百官府之治矣今而復掌王宫何也曰先王之制事權欲合於一而内外本不容分也蓋宫正宫伯不過掌宫中徒役之事子弟宿衛之職與夫官府之在内者耳其於后宫則無所預内宰雖曰掌王内又不過以禮教王后夫人與九嬪世婦凡女宫奄人之在左右者耳其於徒役宿衞又不相關職既不能以相統而權亦不能相臨統而臨之惟大宰焉故宫正宫伯内宰皆𨽻于大宰職雖列於外而通於内權雖分於二而總於一自今考之曰建邦之宫刑曰治王宫之政令曰憲禁于王宫曰令脩宮中之職事春官世婦掌女宮之宿戒則王宫后宫無不在所掌也自其掌王宫也則兵衛郎衛凡宿衛之人皆領之飲膳衣服洒掃啓閉次舍幄帟供奉之人皆領之宫禁之秘藏王后世子之好用財用之司存皆領之其間多寡豐約用舍去取天子始不得以自私而小臣始不得以自便矣自其掌后宫也則六宫六寢無王后之限九嬪九御無女宫之别詔其禮樂正其服位禁其竒衺稽其功緒其間損益増减採擇進御而無侵竊感移之患矣葢世未有家不齊而國可治者未有國不治而天下可平者大宰之治所以兼總内外而小宰為始小宰之宫刑既已齊其家宰夫之朝灋又以治其國然後大宰之典灋始可以治天下矣宰夫之職掌治朝之灋以正王及三公六卿大夫羣吏之位掌其禁令叙羣吏之治以待賔客之令諸臣之復萬民之逆釋曰宰夫六屬之首天官之攷也攷者覈實督察之任朝有三一曰燕朝在路門之内王國宗人嘉事之朝也大僕小臣掌焉一曰治朝在路門之外王日聴治之朝也宰夫司士掌焉一曰外朝在庫門之外詢萬民聴政之朝也小司冦朝士掌焉王眡治朝則冡宰賛聴治而宰夫掌其灋正位者立朝廷尊卑之位司士掌之宰夫紏其不如儀者治朝之位王南嚮三公北面見朝士職灋以止之曰禁灋以使之曰令此肅朝儀也叙羣吏之治即下徵令辨其八職是也令戒令也上有所令而下有所報言謂之復上無所令而下有所啓請謂之逆猶漢之尚書典奏章報告是也按三公無職以六卿兼之其位見於此其職見周官原曰宰夫之設朝廷紀綱之司也故正朝位有其灋則無内陵之患待賔客有其令則無外侮之憂羣吏之治得其馭則紀綱脩明職業必勉矣臣民復逆得其通則明目達聰君門無壅矣此宰夫所以操振肅之權而為天下之耳目也掌百官府之徵令辨其八職一曰正掌官灋以治要二曰師掌官成以治凡三曰司掌官灋以治目四曰旅掌官常以治數五曰府掌官契以治藏六曰史掌官書以賛治七曰胥掌官叙以治叙八曰徒掌官令以徵令釋曰百官府合六官所屬及天下之官府也徵召也辨分辨也辨百官府之所職掌以備百官徵召命令也正謂官府之長以中正為義灋官府之八灋也要者綱要也官府之長只掌其本職官灋之綱要而已師謂官府之貳以教帥為義官成官府之成灋也凡者合衆目者也謂庶務也貳則治其繁司屬官之長也以主職為義官灋謂毎年頒行之灋縣於象魏者蓋斟酌八灋之條件故曰目非八灋也旅衆也謂六官之下士他官無旅也官常官府秩序之常灋數如文書案斷之數然則旅者如今六部都吏司吏之類皆下士為之非今之胥吏也府藏財貨之屋契符契藏蓄積有官府必有貨財有貨財必有書契故設府以司之此則庶人在官之長者史理文詞能述事曰史書者官府通行文書也賛佐也佐治者若今文書令其起草也此必道藝之選有文學曽教養者然後舉用之如孔子曽為委吏乘田之類府史之賢亦命以官胥徒則役於民賤役也不才則去之胥有才智之稱官叙官府所行之次序規矩也設胥以給官府治事務次序之役此為徒之什長漢一胥管十徒役之於民者按胥即堂上之徒徒者役召之稱官令謂官府之命令徵召也令使也蓋趨走應荅官府命令之役今之皂役也原曰自要而凡自凡而目自目而數治人者也府史胥徒庶人在官治於人者也然府史則不與胥徒同府史道藝之選胥徒役民為之八職既辨統之有宗㑹之有元如身之使臂臂之使指天下之大感之而通動之而應事無不舉矣掌治灋以攷百官府羣都縣鄙之治乘其財用之出入凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之辟音僻釋曰治灋治吏之灋式也考稽督也百官府以王朝鄉遂之官府言羣都縣鄙以在野之官府言王氏曰制治者灋也行灋者吏也吏有勤怠則治有善否非立灋以考之則吏治無由而知大宰出灋以治之者也小宰執灋以逆之者也宰夫循灋以考之者也乘猶計也王氏曰以一二三四乘之謂之乘總㑹其數之謂㑹欲知其總數則宜㑹欲知其别數則宜乘今此欲知其失財用物及足用長財善物故言乘之失其所藏之財賄則謂之失財非所當用而用之則謂之失用所失之物非貨賄則謂之失物辟名謂非其物而假其名者也官刑所謂邦盜邦誣也足用用無不足長財所用有餘善物美而精緻故詔冡宰以行其誅賞宰夫冡宰之考也故凡用人理財之事必稽考覈實如此以式灋掌祭祀之戒具與其薦羞從大宰而眡滌濯凡禮事賛小宰比官府之具凡朝覲㑹同賔客以牢禮之灋掌其牢禮委積膳獻飲食賔賜之飱牽與其陳數委於偽反積子四反飲食並去聲飱音孫後倣此釋曰灋式祭祀之式也薦薦脯醢也羞庶羞也凡此皆有常灋式者大宰眡滌濯而宰夫從之禮事五禮之事比較次也小宰七事令百官府供其財用而宰夫賛比之牢禮之灋總言其綱也掌牢禮以下詳言其目也牛羊豕共為一牢禮委積謂米禾薪芻膳謂熟物齊和者獻謂新物始獻者飲食燕饗也飱熟食也如大行人飱五牢之類牽牲可牽而行者陳數所陳多寡之數賔客未至則有委積已至則有膳獻飲食始至則有飱牽賔之飱牽則有司所供賜之飱牽則王所好賜此言燕賜賔客掌其物又掌其數也凡邦之弔事掌其戒令與其幣器財用凡所共者大喪小喪掌小官之戒令帥執事而治之三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之釋曰弔事弔諸侯及臣也幣用以賻也器所致明器也凡所共者凡喪所用者皆共其財用也凡喪始死弔而含禭葬而􅈖贈其間加恩厚則有賻焉大喪王后世子之喪也小喪夫人以下之喪也小官士也宰夫事其戒令治共辨其事也旅冡宰下士三公六卿之喪則與職喪帥有司治之大夫之喪則使旅下士帥有司治之尊卑之體各當其分如此嵗終則令羣吏正嵗㑹月終則令正月要旬終則令正日成而以攷其治治不以時舉者以告而誅之釋曰此考治官之屬羣吏之治也嵗終每嵗之終也嵗計曰㑹謂一嵗㑹計文書總勾考之月終每月之終也月計曰要十日為旬終滿十日也嵗計月成宰夫令羣吏各正其嵗㑹月要日成為書上之以考其治否違令而廢事愆期者告於冡宰而誅責之觀此則成周考課何其嚴也蓋本屬則旬月上其要鄉遂外屬則嵗終上其㑹宰夫受而考之李氏曰先王之所以課吏者如此其密也日入其成是無一日而可廢放嵗終廢置是無一嵗而不勸懲三年有成則申之以誅賞有功者驟獲其利無功者卒伏其辜宜乎天下之無不勸勉愧恥也正嵗則以灋警戒羣吏令脩宮中之職事書其能者與其良者而以告于上釋曰此警戒攷察宮中之官府蓋小宰總其要宰夫考之灋即治宫刑之灋度警謂懲之以言戒謂束之以事正欲其脩宮中之職事也宫職宮伯掌其徒役則理宫中之庶務宫正稽其功緒是也其士庶子宿衛者則宫正紏其徳行教之道藝是也諸子又春合諸學秋合諸射其教不出乎三物也王内則内宰置府於六宫之外宫卿則置府於六宫之内皆小宰宰夫掌之是以小宰頒其教宰夫考其成書其能者謂有道藝者與其良者謂有德行也其百官府亦以賢能二端攷之不言賢能而曰能良者蓋廉奄人女奚與宫中女官及凡縫枲之職不言告王而言告上者書其功狀以進小宰小宰告于大宰大宰告于王而行舉用誅賞之典也原曰治外易治内難外之百司庶府所懼者天子之内八柄所存也至於宫中之官府則固近天子之光而有深切感移之機矣今觀宰夫既掌治朝之灋固日侍天子左右也又以灋警戒宫中之庶職然徒警之或不勸也又書其良者能者以告于上而行誅賞焉則宫府之中凛乎天子之嚴威惟恐不脩職考灋植徳學道以聴旌舉矣孰有女寵内侍騁其邪諛傾覆之技於其間哉此宰夫所以尊嚴隆重而百官内外莫敢易紀律者以灋在也然宰夫又不得自専也而屬之小宰小宰則總内外百官府之綱而治其刑賞紏禁者也小宰又不得而専之也所以調爕之者又存乎大宰焉是其體統相維共効忠悃而王則中心無為以守至正而已然則宫中府中又安得不一體而天子無私人矣後世天子大内相臣不得與聞所以脩身齊家天下大本一切付之奄人至使大臣反媚左右以求容者亦勢所必至本焉既亂而末治者否矣有志欲行先王之政者必以宰夫小宰之宫政始焉宫正掌王宫之戒令紏禁以時比宫中之官府次舍之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之辨内外而時禁比方季反柝吐角反舍音赦釋曰宫正掌王宫之宿衛者戒謂戒其怠忽紏者紏其緩散令之使有為禁之使勿為夫侍衛之不嚴無以備非常左右之不正無以謹近習掌王宫之戒令紏禁乃宫正之大權也時四時也比校比也官府之在宫中如膳夫内宰之屬次所以待直宿也舍所以待休沐也皆校比其人之衆寡及在否置版以籍其人之名以待戒令也夕莫也柝戒守者所擊也又行夜以比直宿者為其有懈怠離部署也故謂禍災也令宿宿衛王宫也亦如之擊柝以上之事辨内外王宫自雉門内以至燕寢為内自雉門外以至外朝為外辨謂分其内外之人禁謂禁其非時出入稽其功緒紏其徳行幾其出入均其稍食去其滛怠與其竒衺之民㑹其什伍而教之道藝稍所教反釋曰稽猶考也計也興事造業為功功事有倫為緒身之所存為徳見於行事為行即六徳六行也功緒有多寡故稽之徳行有勤怠故紏之也幾察之於微也若閽人云喪服凶器不入之類均平頒也稍食俸廪也蓋察宿衛羣吏之出入與均頒羣吏之禄食也天官惟宮正内宰獨言均其稍食它有司不言者周時内有六宮外有三朝凡治朝之官宮正掌之凡禁中之官内宰掌之故廪禄之多寡總計其數付與二人使自分授之故羣吏自均平不待於持劵打請也滛放濫也怠懈慢也竒異常也衺不正也民宫中吏之家人與為徒役之事者蓋禁中内外之别至嚴官府次舍列于外六寢六宫列于内有公政與徒役則帥而入于宫之内以治之暮則出而歸于次有衺者去之内外之辨豈不嚴乎什伍者五人為伍二伍為什㑹之者亦以什伍之灋編列之使之輩作輩學相勸率且寄宿衛之令道藝即六藝以其皆道之所存也故曰道藝上文紏其徳行此教之道藝則三物之教王宮與萬民無異也但師保三物之教則教王子庶子公卿大夫元士之適子諸子之脩徳學道則教公族之人宫正之徳行道藝則教官府衆吏之家人與徒役之衆庶也故王宫之教雖有三等然不出乎三物矣月終則㑹其稍食嵗終則㑹其行事凡邦之大事令于王宫之官府次舍無去守而聴政令春秋以木鐸脩火禁凡邦之事蹕宫中廟中則執燭大喪則授廬舍辨其親䟽貴賤之居釋曰吏之廪禄月終㑹之以小宰受其月要也吏之職業嵗終㑹之以大宰受其嵗㑹也王氏曰稍食以月㑹行事以嵗㑹䟽數不同者養之者詳而責之者畧君人之仁也事君先其事而後其食人臣之義也人臣致其義而下不致於慢事而廢職君人致其仁則下不至於日陵而無耻大事祀與戎也無去守使之皆在次舍不得去離所守而頒其政令所以待非常也火星以二月見於辰九月伏於戌即其出入之時以木鐸警衆使脩火政先王因天時以謹人事之戒思患而預防之者也蹕蹕止行人以禁諠譁也秉燭為明以防不虞也蓋宫正從王以出行或宫中廟中則司其蹕與燭所以共衛護廬倚廬舍堊室也大夫居廬士居堊室辨者禁其散亂等其次序親者貴者居廬䟽者賤者居舍梁氏曰侍御僕從之官朝夕近於王者也苟非常徳之士方正之人則阿徇逢迎沮善長惡何所不至宫正所以職於内外之辨功緒之稽徳行之紏出入之幾滛邪之去其防之嚴矣而尤必曰教之道藝何用心之切哉必使左右近習之人皆親儒生以成徳行然後王心無為以守至正而朝廷百官萬民無不正矣宫伯掌王宫之士庶子凡在版者掌其政令行其秩叙作其徒役之事授八次八舍之職事釋曰伯長也以其掌公卿大夫之子弟故曰宫伯王宫之士庶子者王族與功臣之世賢者及公卿大夫士之庶子王以其自近而衛焉故安危一體休戚一心即諸子所謂國子之倅是也蓋此士庶子乃宿衛王宫者宫伯掌其政事諸子辨其等正其位教以車甲先王所以待貴臣庶子者猶如此况世冑乎版名籍也以版書之政令上所正者為政下所禀者為令秩謂依班秩受禄叙謂依才等之先後徒役之事宫衛用衆之時也宮伯作之諸子亦謂國有大事帥國子而致於太子惟所用之者也次宿衛所在舍休沐所在八者環列八方以衛宸居乃子弟分授之或居四角或處四中各任徼候之事亦使之脩徳學道於此皆謂之職事也邦有大事作宮衆則令之月終則均秩嵗終則均叙以時頒其衣裘掌其誅賞釋曰大事如國有冦戎之事起宫中之衆使士庶子行則宫伯戒令而統治之也秩叙者班秩之廪當月給故月終均之才等之叙以嵗成故嵗終均之均平也宫正尊故主㑹宫伯卑故主均以時冬夏也頒布也夏頒衣冬頒裘有功則賞有罪則誅皆宫伯掌之王氏曰食人之食者必思所以死人之事被人之衣者當思所以懷人之憂先王豈徒衣食之哉亦使之有以充其責故也夫衣裘之頒所以示其仁誅賞之行所以示其義仁以親之義以制之先王所以治國子者固有道矣此所以用於宿衛則無間之可乘用之於守固則無患之弗禦而安危一心矣葉氏曰宫正宫伯掌王宫者也在王宫者百官府各有版士庶子亦有版官府有次舍士庶子亦有次舍宫正則掌其戒令紏禁比百官府之衆寡宫伯則掌其教令秩序而授士庶子之職事此皆郎衛也太僕司𨽻虎賁所掌乃兵衛也蓋天子之衛有二而其别有四卿大夫士之官吏在宫中而直宿者宫正掌之卿大夫士之庶子在宫中而入衞者宫伯掌之眂朝則司士正其儀大事則諸子掌其政此居守環列之衛也王眂朝則前正位而退王出入則自左馭而前驅眂朝則在路門之左太僕掌之而小臣御僕屬焉此僕從侍御之衛也虎士八百人先後王趨以卒伍眡朝則在路門之右虎賁氏掌之而旅賁氏屬焉此奔趨先後之衛也居虎門之左使其屬率四夷之𨽻各以其兵服守王門之外師氏掌之帥四翟之𨽻使服其邦之服執其邦之兵以守王宫司𨽻掌之此周防楗閉之衛也宿衛之别四而郎衛兵衛二者常相聨屬焉然而居守環列之衛天子所恃以為腹心者也居王之左右前後則其地密備王之顧問應對則其任専是必稽其功緒而紏其徳行㑹其什伍而教之道藝所以勸之使為善也辨其内外幾其出入去其滛怠竒衺所以警之使不為惡也均其稍食㑹其行事使無闕禄廢職則居王所者孰非徳行道藝之選哉士庶子之在版者皆卿大夫士之子弟有諸子以考之成材者有司樂以合之宫伯惟均其秩叙頒衣裘掌誅賞而已則在八次八舍之列者孰非端人正士哉周禮全經釋原卷二
