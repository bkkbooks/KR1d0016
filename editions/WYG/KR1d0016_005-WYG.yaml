body:
  text: 周禮全經釋原巻五明柯尚遷撰地官下鄉大夫之職各掌其鄉之政教禁令釋曰萬二千五百家為鄉一鄉之中必立一上大夫之尊以為主無宰伯正司之號直以本秩名之又不設府史胥徒之役固知鄉大夫以下皆民官也然則民官以徳詔爵亦有祿乎曰載師於近郊有宅田官田鄉大夫以下之祿也士田族師之祿也賈田市官之祿也逺郊又有賞田則鄉大夫有功而加賞者也牛田養公牛牧田養馬者也鄉官之祿必取於此也政以正之教以誨之禁其勿為令其有為此鄉大夫之權也然政教禁令與鄉師不同正月之吉受教灋于司徒退而頒之于其鄉吏使各以教其所治以攷其徳行察其道藝釋曰正月之吉建寅月朔也教灋三物九比是也鄉吏自州長以至比長也徳行六徳六行藝六藝以其皆道之所存也故曰道藝按鄉大夫獨受教灋于司徒退而頒于鄉吏則鄉大夫乃教官之宗主是必昔日卿大夫涖事王朝退老於家則司鄉中之教而食教官之禄者也尚書太傅曰大夫七十而致事老其鄉里大夫為父師士為少師故鄉遂之官大夫士之秩者皆嘗為大夫士者或為大夫士之子孫而世其禄者是必家勢素為民之所服而教亦易行人所矜式子孫亦思守其家灋而不敢廢宗灋亦可常行而不墜故上下以辨民志以定也教灋固不離乎三物然推行之際必有條件故逐年有受教頒教之事也以歳時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舎者國中貴者賢者能者服公事者老者疾者皆舎以歳時入其書釋曰登上之也夫家之衆寡稽之於州長黨正鄉大夫則登之版籍也可任即上地家三人一為正卒餘為羨卒皆辨之也國中六鄉野六遂也國中之民晚征而早舎以地近而役多也郊野之民早征而晚舎以地逺而役少也此所謂施之也其舎而不征者有六有爵者在所尊有徳者在所敬有道藝者在所崇服公事在所優有年齒者在所安有天刑者在所恤也既登於版籍每嵗終則入其書於司徒焉原曰司徒教灋以辨施舎為大務施舎之辨而國中四郊則異灋此可見鄉灋之必行於天下矣然謂之施者征之也舎者免之也征之者豈如後世分地稅身税為二哉盖古者自十五至二十皆授田而為夫家其無執事者亦出夫家之征其宅不毛者有里布則是有田無田無論在國在野之殊皆取以三征曰粟米曰布縷曰力役也若夫賢能則舉於司徒者不征於鄉舉於王者不征於司徒所謂舎之也既言施之有國野之别而貴者賢能與服公事者之舎必表曰國中者盖鄉遂異治鄉中多君子也而遂人只曰老幼廢疾而已故不明施舎之辨則不知司徒之教必通於郊野不知稅灋之三征則何以明施舎之事也三年則大比攷其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之釋曰此賔興賢能之事三年大比者毎歳月吉閭胥書其敬敏任恤族師書其孝友睦婣有學四時孟月黨正書其徳行道藝每嵗之首州長又攷其徳藝則人才成否有定書矣故鄉大夫三年則大校比其月書季考之實而總覈其徳行道藝之全大賢大能宜進於王也則集合鄉吏行鄉飲酒禮以賢能為賓而興舉之焉鄉老天子之三公致仕時居於百里大都之中時而與王坐而論道賔興之時暫屈為鄉老重得人也吏謂州長黨正衆寡者族師閭師比長貴者寡而賤者衆故曰衆寡上禮字鄉飲酒之禮下禮字禮敬之禮以上賔之禮敬之也厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貮之釋曰厥其也其賓興之明日也獻進也天府祖廟寶玉所藏之府内史掌國令之貳王制禄則贊為之者也獻賢能之書王必再拜而受之重得賢也其書與祖廟寶玉共藏貴重之至也内史貳之將以制禄也苟舉而未當豈不愧此禮哉退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞此謂使民興賢出使長之使民興能入使治之釋曰退獻賢能之書而退也前言禮者鄉飲之禮此言鄉射之禮乃鄉吏共行射禮以觀之與賔禮待之者異矣詢之者以平日位在己下者既書其賢能則出而在己上問其心服與否也一曰和謂内志正也有徳則能和矣二曰容謂禮貌莊嚴也有行則容莊矣三曰主皮謂射中否也有藝則能中矣四曰和容謂禮儀習熟容節比禮也此以禮觀之也五曰興舞謂綴兆舒疾節奏比樂也此以樂觀之也成周造士以禮樂故攷之以禮樂也既行射禮以觀人材與所書之稱否又詢于衆庶以問其心之服否所以示至公也此謂者應上之詞言所以觀之詢之者非徒如此而已也將使民自興其賢者出其本秩使之加於己上以長於我而任教也將使民自興其能者使入於其鄉而治我事也舉非為人而舉乃以長我治我者而舉之實見其賢能故耳果心有未服則豈肯舉之哉原曰成周舉選之灋有二節焉其大賢大能則行鄉飲酒之禮以之為賔而興之進於天子入於太學教養之司馬辨論官材舉以任百官府之治矣其次賢次能則鄉射以舉之而進鄉官之秩焉然其舉雖二其教一也二十五家之閭歳時讀灋而書其敬敏任恤百家之族月吉屬民讀灋而書其孝友睦婣有學五百家之黨正歲屬民讀灋始書其徳行道藝之全矣然能書之未能攷之也州長則攷之能攷之未能興之也而鄉大夫則興之教之初已為興之地則興之日何負於賓禮之隆哉周家得人之盛其本固在此也然鄉吏進秩其舉行之典亦有至公之制焉既行射禮以五物觀其徳行道藝所以騐其平日所書之當否又徧詢其所舉者果出於其心之所願服則其所書者既不可以經營而倖得而所以舉者復豈有蔽私得我之心哉則人必將率徳勵行以聽旌舉之不暇矣使徳非實有則誰肯舉之而還以長治於我者乎孟子曰古之人修其天爵而人爵従之此之謂也後世科目取士糊名易書以示至公不知以利祿為媒先誘以利欲之教灋矣豈若賔興之典使人自修其徳行道藝以為教月書季考使人心服自舉之為公哉嵗終則令六鄉之吏皆㑹政致事正歲令羣吏攷灋于司徒以退各憲之於其所治國大詢于衆庶則各帥其鄉之衆寡而致於朝國有大故則令民各守其閭以待政令以旌節輔令則逹之釋曰㑹計也大曰政小曰事致獻也歳終則攷其一年所教之功遂令鄉吏大計其所教之政獻其所治之事上於大司徒也正歳事之始也則令鄉吏攷灋于司徒而斟酌其利宜而行於一歳也以退攷灋而退也憲表懸之也所治謂州黨族閭也國大詢如詢國危詢國遷詢立君之類皆鄉大夫致其民至於外朝也大故災變冦戎之類則令其所治之民各守其閭門以備之将以待上之政令也旌節執以為信者民雖以徴令行必以旌節輔之乃得通逹也古人二十五家為閭閭首有門門左有塾閭胥坐之其灋至嚴所以備災變防冦盜行教灋謹出入也州長各掌其州之教治政令之灋正月之吉各屬其州之民而讀邦灋以攷其徳行道藝而勸之以糾其過惡而戒之釋曰二千五百家為州州長中大夫之秩亦鄉官也教治即下文勸戒之事政令謂賞罰戒令所以輔教治者灋則其條目也屬猶合也謂㑹聚之邦灋司徒所頒之教灋固不外于三物十二教然每年必有推行之灋訓戒之辭讀之以教民也攷其徳行道藝者以黨正族師之所書者攷之以驗其實也既攷之又勸勉而訓誨之其有犯教與過惡者則糾督而戒飭之夫州長教民既攷其善矣復勸之既紏其惡矣復戒之無不欲其入於善蓋欲以徳化民不恃其刑政以威之此教化之道也若以歳時祭祀州社則屬其民而讀灋亦如之春秋以禮㑹民而射于州序凡州之大祭祀大喪皆涖其事若國作民而師田行役之事則帥而致之掌其戒令與其賞罰釋曰州社州中土穀之神也歳時春祭社以祈穀秋祭社以報功祭之日必㑹民而讀灋者民不空集也亦如之謂勸戒之也序州學也孟子曰序者射也盖州長主攷黨與族閭所書者故春秋以鄉射之禮㑹民於序以别賢否且示化焉盖古之攷徳必以射班固曰序則行禮而示化焉此也大祭祀州祭社稷也大喪鄉老鄉大夫之喪也涖臨也必親涖者敬上也作起也師謂征伐田謂狩獵行役謂土功戍守役作凡此數者徴民則州長帥而致於司徒戒令所以率作事賞罰所以治功過皆兼掌之歳終則會其州之政令正嵗則讀教灋如初三年大比則大攷州里以贊鄉大夫廢興釋曰歳終㑹政攷其終也正歳讀灋正其始也三年大攷州里徳行道藝之成否將以贊鄉大夫也惡者黜廢之善者賔興之皆本於州長所攷而贊之也不曰州閭而曰州里者鄉灋兼行於六遂之中也黨正各掌其黨之政令教治及四時之孟月吉日則屬民而讀邦灋以糾戒之春秋祭禜亦如之釋曰五百家為黨曰正者為一黨之人所取正也政令教治變上文耳其實一也四時孟月寅申己亥之月也吉日朔日也正月在州三時在黨讀灋必言邦灋者兼八刑也民知教灋則不違乎義理民知邦灋則不麗於刑辟因讀邦灋遂糾其過惡戒其怠惰也禜雩祭水旱之神盖亦為壇祭之如社稷云左傳曰日月星辰之神則霜雪風雨之不時於是乎禜之山川之神則水旱疫癘之災於是乎禜之是也亦如之者必讀灋而糾戒之民不空集也國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位壹命齒于鄉里再命齒于父族三命而不齒釋曰索鬼神郊特牲曰歳十二月合聚萬物而索饗之即蜡祭也稱國命祀也序當作庠州學既名序黨學宜名庠也學記曰黨有庠術有序孟子曰謹庠序之教又曰庠者養也序者射也今有州學而行鄉射於黨學而行鄉飲是其義也黨庠飲酒禮亡必正齒位者以民三時務農將闕於禮至此農隙之時而教之尊長養老見孝弟之道也凡射飲酒雖鄉大夫之尊亦來觀禮鄉射記曰大夫樂作不入既旅不入是也齒于鄉里者以年與衆賔相次也鄉黨尚齒然有爵尊而齒不敵者専以齒序則失貴貴之義故聖人制之禮曰一命爵不敵齒則齒于鄉里再命爵尊于鄉人而不能勝乎天序故與父族之人為齒三命者天子之上士公侯伯之卿也爵尊矣不齒者貴貴之禮則席于尊東盖鄉飲鄉射皆酒尊在室戸之東房户之西賔主夾之鄉人為卿大夫觀禮者為鄉人所遵灋故謂之僎席在酒尊東是之謂正齒位而長長貴貴並行不悖矣凡其黨之祭祀喪紀昏冠飲酒教其禮事掌其戒禁凡作民而師田行役則以其灋治其政事釋曰黨中婚冠喪祭飲酒之禮皆黨正教之蓋民者㝠也非教則不明古者民間之禮無不自上教之且戒禁之此風俗所以淳美也夫射飲相見固鄉禮也而冠昏喪祭則家禮也自黨以下家禮無不教之師旅田役則以什伍聨比之灋治其政事謂糾率之也歳終則㑹其黨政帥其吏而致事正歳屬民讀灋而書其徳行道藝以歳時涖校比大比亦如之釋曰歳終㑹計其黨政則帥族師以下致之於州長夫人之智愚賢不肖之不同教以徳行道藝使之歳終服習日就月將至於歳首必有可書者故㑹民讀教灋而書之黨正既書則州長得以攷而勸之鄉大夫得以攷而興之則其材成矣校比即辨施舎與其可任者族師閭胥至近也歳時校比黨正則徃臨之以驗其實也大比亦親校其比以閱實之而登其數於州長也族師各掌其族之戒令政事月吉則屬民而讀邦灋書其孝弟睦婣有學者春秋祭酺亦如之酺音步釋曰百家為族師帥人者戒以飾其怠忽令以輔之政事邦政之事月吉毎月之朔也讀灋州長以正月黨正以四孟月族師則每月舉行之民彌親者教彌數也孝弟睦婣六行之本學謂詩書禮樂之事族師所書三物未全但有一之可稱者閭胥即書之進於族師族師又攷而書之也酺為人物災害之神鄭氏曰此世所謂蝝螟之步與人鬼之步歟盖亦為壇位祭之如雩禜然族師無飲酒之禮但因祭酺而與民相酬酢因而讀邦灋書徳行也大抵百家之族日與民相從事其賢否必知之悉矣故三物之書族為本也月吉春秋皆有遺所以激其進徳作其怠倦也至矣以邦比之灋帥四閭之吏以時屬民而校豋其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦釋曰邦比小司徒之九比也四閭之吏閭胥與比長凡有職事者夫家衆寡與六畜車輦鄉大夫既登之族師又登之盖以死生貴賤老少之變不同不可不以時校登為施舎之地也百政皆起於族雖黨正亦親涖之以其親民故也五家為比十家為聨五人為伍十人為聨四閭為族八閭為聨使之相保相受刑罰慶賞相及相共以受邦職以役國事以相葬埋釋曰聮綴也有次序之義盖一比之中五家既有先後矣十家為聨則二比又分先後也四閭既有先後矣八閭為聨則二族又有先後也分之則比長各統五家閭胥又統五比族師各統四閭若無先後之次則同等者不相上下何以能合為億萬使翕然齊一哉惟其有聨則自一家數至五家為一比之次自一比數至五比為一閭之次自一閭數至四閭為一族之次自一族而加一族為八閭之次自比積之而萬而億莫不翕然有序如身之使臂臂之使指皆本乎自然連而不亂也推之天下無不皆然十家為聨聨其居也十人為聨聨其人也居有比閭族黨人有伍兩卒旅其灋皆同先王所以必立為聨比之灋者欲其舊比居者則相保新來徙者則相受刑罰相及相共則惡者所同惡而無所蔽慶賞相及相共則善者所同好而無相嫉職役葬埋則相佐助焉故聨比其民者所以歡洽其心也若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰歳終則㑹政致事釋曰作起也前言五人為伍十人為聨矣此言若出師田役用衆之時則毎家擇可任中一人以伍兩之灋合之若行簡稽之灋則或四家出一人或八家出一人或三十家出一人如司馬灋乃視其見在人數合其卒伍而用之族師掌百家聨比之灋所起故詳言之掌其治令戒禁刑罰者管轄人亦須有灋貴嚴肅也故用衆之道合其卒伍使有統一簡其兵器使之精强帥以鼓鐸旗物使威令必行掌其戒禁刑罸使灋度嚴肅所以協其力也至於嵗終則㑹計其一歳所行之政事而致於鄉大夫焉原曰治民之道上下不辨則貴賤無别而强弱相凌矣故無序則禮不行上下不聨則情義乖離而歡愛不接矣故不和則樂不興先王以禮樂治天下必先以伍比之灋等其上下以立其序又以什聨之灋合其羣衆以導其和故以居言之則五家為比十家為聨百家為族二百家為聨無事則相保相受有事則刑罸慶賞相及由此而修之則教化以行人心以變由此而修之則禮義可興刑罸可措由此而修之則風俗可淳泰和可致矣以人言之則五人為伍十人為聨百人為卒二百人為聨推而至於千萬人焉億兆人焉故渙然而歸則各安其居忽然而合則各有其次令以師田則行伍以定號令以行旗物以整令以執役則同力合作戒令不煩而事功畢舉者以伍聨素定故也夫伍不制則亂聨不合則乖聖人欲有為於天下吾知必有機要之道不徒清靜而無為矣然則什伍之灋雖閱百聖何以易之大司徒亦有兄弟師儒朋友之聨者皆欲其同心同徳以向於善何往而非以禮樂治天下之道哉閭胥各掌其閭之徴令以歳時各數其閭之衆寡辨其施舎凡春秋之祭祀役政喪紀之數聚衆庶既比則讀灋書其敬敏任恤者凡事掌其比觵撻罸之事政音征觵古横反撻吐達反釋曰二十五家為閭胥民之有才智者惟其齊民故無政治只掌徴召命令於其閭而已衆寡人民也二十五家人民可以數計故不言夫家衆寡然施舎之辨自閭胥始與民同處故察之詳祭祀謂州社黨禜族酺也閭胥與焉役師田功事之役政州黨射飲讀灋之類喪在上之喪也遇此數事必聚衆者以閭胥民所率先掌徴召也比謂校比一閭之衆也閭胥近民故讀灋無時節聚而比則讀之以相告戒既比則書其恭敬勤敏與同等相信為任同類相濟為恤也不及徳行道藝者徳未可名由敬敏任恤以行之而至於成徳達材則有徳行道藝之名而可書矣故敬敏任恤又徳行道藝之本也故閭胥之所書止䇿勵修飭之所在觀此可以知教本矣不於此而立基只日求乎孝弟睦婣與夫仁聖忠和者而書之其不苟以相欺者㡬希矣凡事謂聚衆庶而校比之事觵罸爵撻罸朴也罸罰財帛也此失禮違教之罸閭胥執其役也夫書其行則不遺片善罰其惡則不容小惡此周家之民所以遷善逺辠而不自知者由治之於始故也班氏固曰聖王之制於里有序而鄉有庠序以明教庠則行禮而示化焉春令民畢出在野冬則畢入於邑所以順隂陽備冦賊習禮文也春將出民里胥平旦坐於左塾鄰長坐於右塾畢出然後歸夕亦如之入者必待薪樵輕重相分班白者不提挈冬民既入餘子皆在序室婦人同巷相從夜績女工一月得四十五日必相從者所以省費燎火同巧拙合習俗也又曰民年八歳入小學學六中五方書計之事始知家室長幼之節十五入大學學先聖禮樂而知朝廷君臣之禮按班氏之言能推測周制之一二但曰於里有序而鄉有庠是未知州序黨庠之制也春冬出入民里胥鄰長坐左右塾此遂灋也餘子在序室俊秀十五六入庠序之餘子也婦人同巷相從亦料想之言耳但曰民年八嵗入小學而知長幼之節十五入大學而知君臣之禮則合古者小大二學之意蓋比閭族黨之教所以教萬民其書内則曲禮少儀也閭塾之學所以教小子者周禮亦未之言但於司諫曰朋友正其行而强其道藝辨其能而可任國事者正言在黨庠州序之俊秀也是少儀者閭塾之書而内則曲禮則黨庠州序之書也班氏此説可以補未備之意比長各掌其比之治五家相受相和親有辠竒衺則相及徙于國中及郊則從而授之若徙于他則為之旌節而行之若無授無節則唯圜土内之辠即罪字衺似嗟反釋曰比長即上農也雖五家亦立之為長有下士之秩然後等級有辨統帥有人五家聽信之故亦有治之道焉相受謂相寄托假貸也相和親情意綢繆也有辠為非而麗灋禁也竒謂怪誕衺謂邪惡比長齊民之長也故惟令其善相勸勉而相和惡相糾戒而相及而已徙謂不便其居也或國中之民出徙於郊或郊野之民入徙國中其田里必自上授之其舊居比長必送於彼授其吏若去逺鄉不能親送則為之旌節使執之則門關得達也若所居新鄉無比長親授或出本鄉過他鄉無節信則門關繫之納於圜土以詰所自來蓋非逃民即盜賊也梁氏曰比長至卑也而鄉灋必始於此聖人慎焉其相受相和親也而後善俗可以興有竒衺而罪必相及也而後奸惡無所容無授無節則必因而治之也而後反叛之徒無處之可藏無往而不獲盖善有所勸惡有所懲業可以安生可以遂非上之人慮之周而處之當曷能使之無不得其所哉原曰教也者不貴於語言而貴以徳化徳而無位以處之則徳隠而教不行故先王為之位以授徳為之職以處能位職各稱其人則教化自行矣故自比長以至鄉大夫其等雖懸而所以為教一也夫讀灋糾戒月吉歳時皆屬民焉則耳提面命不是過矣徳行道藝教之也昏冠飲酒喪祭射鄉教以禮也校九比辨施舎六畜車輦教以事也古之所以為教者不出乎此人之所以為人不外乎此矣不獨教之而又書之不惟書之而又攷之攷之既審乃㑹鄉之衆寡而行賔興之禮上者進於王次者觀之詢之以進退其秩則人心孰不激勸而向於善耶故徳稱其位則徳尊教以其徳則化行為之爵以次其尊卑為之禮儀宫室衣服度數以等其分為之鄉遂諸職事以用其才有徳禮以感之無刑政以驅之官不出其鄉教不離其事有激勸之權有訓告之備斯先王所以民日遷善逺罪而不自知致雍熙太和之盛其機盖在此矣後世不知位職之辨立教之灋别立教官専以語言誦授為教鄉無崇徳之位民無觀感之實縱曰致治不過財穀豐盈而已徳禮之備民心之淳無有也聖君賢相出焉宜以此為首務封人掌設王之社壝為畿封而樹之凡封國設其社稷之壝封其四疆造都邑之封域者亦如之令社稷之職釋曰地官司民者也民事以治神為先故封人為屬之首社祭地之稱配以稷王社祭天下之土國社祭一國之土天子之國畿内也社以勾龍氏配稷以棄為配壇在中壇外為壝畿封而樹之者植其所宜木以嚴其界限也不言稷與壇者舉重以見之也封國封建諸侯也則割其方色之土與之立社於其國設其社稷之壇立其界限之壝畿界之上皆為溝塹又封其土樹其木以為阻固若造大都小都公邑家邑亦封其四域溝樹之令其社稷之職者都邑亦必有封人以主社稷之事王朝封人特令之使立其職事而已凡祭祀飾其牛牲設其楅衡置其絼共其水稾歌舞牲及毛炮之豚凡喪紀賔客軍旅大盟則飾其牛牲楅音福絼一作紖持忍反槀古老反釋曰飾謂刷治潔清之也楅設於牛之角以防觸也衡設於牛之鼻以繫繩絼牽牲之繩也水以滌牲稾以藉牲也君牽牲入廟時隨歌舞之言其肥香以歆神也毛炮豚者爛去其毛而實􅀥於腹炮之以備八珍也鄭氏曰封人歌舞其牲云博碩肥腯喪紀有奠牛賔客有牢醴積膳之牛軍旅有犒牛㑹同之盟有載書之牛皆飾面㓗之葉氏曰古者立君曰奉社稷取妻曰共社稷死國曰死社稷社稷之重亦明矣故封人掌設王之社壝封國必設社稷之壝造都邑亦如之此見王畿邦國皆有社稷也鄭氏曰社稷土穀之神有徳者配食焉共工氏之子曰勾龍食於社厲山氏之子曰柱食於稷湯遷之而祀棄詩載芟春祈社稷也良耜秋報社稷也宗伯大烖則類社稷言其與天時相為休咎與嵗事相為豐耗故設官以掌之歟鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役教為鼓而辨其聲用以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏鼖音焚鼛音高釋曰金鼓皆鄉野所用者故特設鼓人以掌之所謂和民以樂此其一也六鼓即下文六鼓四金即金錞金鐲金鐃金鐸也以節聲樂雷鼓靈鼓路鼓晉鼓是也以和軍旅鼖鼓是也以正田役鼛鼓是也教為鼓教擊鼓者辨其聲用鼓之制有長短而其聲有大小辨其所當用之事也雷鼓八面鼓也神祀謂祭天神也靈鼓六面鼓也社祭祭地􅅘也路鼓四面鼓也鬼享祭宗廟也鼖大鼓也長八尺止兩面軍旅鼓之鼛鼓長一丈二尺役事鼓之詩曰鼛鼓弗勝是也晉鼓長六尺六寸鼓金奏謂先擊編鐘後聲晉鼔以和之此六鼓也以金錞和鼓以金鐲節鼓以金鐃止鼔以金鐸通鼔錞音淳鐲直角反鐃女交反釋曰錞錞于也圓如碓頭樂作鳴之與鼓相和鐲鉦也形如小鐘軍行鳴之以為鼔節鐃如鈴無舌有秉執而鳴之以止擊鼓也鐸大鈴也振之以通鼓金鈴金舌曰金鐸在軍所振金鈴木舌曰木鐸施令時所振此四金也凡祭祀百物之神鼔兵舞帗舞者凡軍旅夜鼓鼜軍動則鼓其衆田役亦如之救日月則詔王鼓大喪則詔大僕鼓帗音弗鼜音戚釋曰百物之神謂蜡祭兵舞則干戚之舞帗舞以采繒為之有秉當舞之時則繫鼓以應其節也鼜夜守鼓也盖軍儆戒在夜故擊鼜鼓以警衆也司馬灋曰昬四通為大鼜夜半三通為晨戒旦明五通為發昫軍動且行也亦擊鼓以進衆救日月則告王擊祀天之雷鼓大喪始崩及窆時則詔大僕擊鼓傳達于四方也舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事凡野舞則皆教之凡小祭祀則不興舞暵呼但反釋曰舞師掌教舞者兵舞即武舞用于舞祭名山大川用之有扞衛之義帗舞用於社稷有祓除之義羽舞析白羽為之形如帗四方謂四望也羽有翼蔽之義皇五彩羽為之用於旱暵有隂陽相濟之義三者皆文舞也野舞謂野人之學舞也教之以備鄉遂州黨祭祀之用舞也興猶作也不興舞民間小祭可略也原曰鼓人舞師不屬於樂師而在於司徒者以民間之所用所謂移風易俗莫善於樂其具在此也夫民不以禮教之則凌不以樂教之則乖祭祀固禮矣而樂之用亦莫大於祭祀至於軍旅田役非樂不和而况於歌舞之節文所以正民徳者樂其可廢於民哉故大司徒曰以六樂防萬民之情而教之和此鼔人舞師所以必在於此也牧人掌牧六牲而阜蕃其物以共祭祀之牲牷凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之凡時祀之牲必用牷物凡外祭毁事用尨可也凡祭祀共其犧牲以授充人繫之凡牲不繫者共奉之黝於紏反釋曰六牲謂牛馬羊犬豕雞也阜盛也蕃息也物謂色也牲生牲也牲純全也盖牲牷則牲之全體者犧牲則牲之純色者皆互言之耳祀分隂陽天陽而地隂日陽而月隂宗廟則昭陽而穆隂陽祀禋祀實柴槱燎之祀也隂祀血祭之祀也望祀貍沈之祀也時祀六享宗廟之祀也外祭謂表貉及王行所過山川用祀者毁事候禳毁除殃咎之屬騂者赤色之盛黒色之㣲以南北方之色而分隂陽之祀也方色則東青西白南赤北黒中黄也尨雜色皆可也繫牲者時祀以上也不繫外祭小祭之牲也繫則授充人以養之不繫則自共奉之而已不授充人也牛人掌養國之公牛以待國之政令凡祭祀共其享牛求牛以授職人而芻之釋曰牧人所養者成牲之牛牛人所養者未成牲之牛公牛者公家之牛祭祀以為犧牲者待國之政令則祭祀享食賓射軍事喪紀所需也享牛獻神之牛求索也職人即充人也芻養也凡賔客之事共其牢禮積膳之牛饗食賔射共其膳羞之牛軍事共其犒牛喪事共其奠牛凡㑹同軍旅行役共其兵車之牛與其牽徬以載公任器凡祭祀共其牛牲之互與其盆簝以待事徬蒲浪反簝音老釋曰牢禮殷膳太牢也積所以給賔客之用生饋之也膳熟進之也羞進也所進賔之膳其牛享食賔射講禮之時用之也犒牛犒師所用奠牛遣奠所用之牛牛有二有祭享之牛有任用之牛兵車之牛則推戰車也載任器則用以推載車也人在前曰牽居其傍曰徬任用也公用之器也互楅衡之屬盆所以盛血簝所以受肉皆牛人共之也充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月享先王亦如之凡散祭祀之牲繫于國門使養之展牲則告牷碩牲則賛釋曰充猶肥也牢䦨也繫于牢者充人所躬親也養牛羊曰芻盖授之牧人而養之也散祭祀謂司中司命及凡小祭祀也繫于國門使守門者養之展牲謂察視也告牷告其體色之純全也碩大也君牽牲宗人告碩而充人則賛之原曰自封人至充人職至㣲也而列載師之前何哉盖五官皆司徒屬外所用禮樂之㣲職猶春官鬱人至司几筵五官是也官雖㣲而職則要事雖小而關乎禮樂則大故次於此也載師掌任土之灋以物地事授地職而待其政令釋曰任土者土地有生物之功任之不使閒曠也其灋則區畫王畿之土地為郊甸縣都之等將以授人也物地事者有土斯有物土有青黎白黒黄壤之不同或宜九穀或宜果蓏或宜蕃鳥獸之類凡地事以此物之有事斯有職或職以耕事或職以牧事凡所謂地宜之職以此授之待其政令者以此而定賦稅待上令而取之也以㕓里任國中之地以場圃任園地釋曰在國之屋曰㕓在田之廬曰里孟子曰五畆之宅樹之以桑注曰二畆半為宅在邑二畝半為廬在田即里也詩曰中田有廬是也國中王城之内也場以納禾稼圃以種蔬菜園樊之則為圃也按廛里也場圃也雖云任國中與園地其實總鄉遂都鄙凡在邑之宅皆謂之廛在田之廬皆謂之里其在田在邑之空地皆謂之園地合鄉遂都鄙皆謂之國中以邑宅而言也下文云園廛二十而一可見在田之廬為里餘地為場圃矣此二句言廛宅也以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地釋曰宅田州長黨正之田士田族師閭師之田賈田司市以下之田近郊五十里六鄉之地也官田遂大夫縣正鄙師之田賞田有功者賞地之田也牛田養公牛者牧田養馬者也逺郊百里六遂之地也此七等之田皆鄉遂之中井田之外行貢灋野人耕而取其賦以養君子者孟子曰卿以下必有圭田又曰國中什一使自賦即此是地若井田之徹灋則自鄉遂都鄙皆是此地其賦稅為百官之禄及九賦之需又非如七等之田専以厚君子也鄉大夫爵則卿也或昔日王朝之卿大夫有家邑其田非鄉中可容故不存焉此總言七等之田在鄉遂者下文只以都邑本名言之其實都鄙雖不成鄉遂亦如鄉遂之制故制田之灋而七等在其中矣以公邑之田任甸地以家邑之田任稍地釋曰鄉遂之外為都鄙亦為公邑何以謂之鄙五百家也有五百家之聚則謂之邑不成縣遂也公邑天子未頒與人者郊外曰甸地在二百里之内也井地之灋四丘為甸四甸為縣四縣為都盖丘邑之田在鄉遂之内成甸之田在鄙邑之内而縣都之田則居於小都大都矣以井田之數而名其地未可知也家邑者天子之大夫各受二十五里采地在三百里之内者稍字未詳地則甸與縣之間耳治邑者縣師也以小都之田任縣地以大都之田任畺地釋曰縣者井田之灋則四甸為縣比居之灋則二千五百家為縣曰縣地者用井地灋曰小都大都者用比居灋四縣為都都之名依之而立四縣則萬家也都止於萬家四縣而已不制鄉遂者大都不可耦國也畺介也自此之外則為侯國小都則天子之卿各受五十里采地在四百里之内大都則天子之三公及王子母弟又受采地百里在五百里之内者故采地百里亦如侯國大國三鄉三遂采地不成鄉遂者别四郊也丘氏曰四郊地居四同甸居十二同稍居二十同縣居二十八同都居三十六同共百同王畿千里也鄭氏曰凡王畿内方千里積百同九百萬夫之地也有山陵林麓川澤溝瀆城郭宫室涂巷三分去一餘六百萬夫又以田不易一易再易上中下相通定受田者三百萬家也逺郊之内地居四同三十六萬夫之地也三分去一其餘二十四萬夫六鄉之民七萬五千家一家受二夫則十五萬夫之地其餘九萬夫則廛里也場圃也宅田也士田也賈田也官田也牛田也賞田也牧田也九者亦通受一夫焉則半農人也定受田十二萬家也按鄉遂共十五萬家一家受田不及二夫七等之田亦以夫受計凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟其漆林之征二十而五釋曰上言任土貢助在其中此言任地専以貢灋言也蓋周人貢助並行助則十一不假言貢則七等之田有差等耳故再列之國宅凡官府所有宫室吏所治者故無征園㕓二者皆民居盖在五畆之宅之内者種桑麻為布縷之征故二十而一下文宅不毛者亦有里布是也近郊十一謂宅田士田賈田之税也逺郊二十而三謂官田牛田賞田牧田之稅也甸稍縣都皆無過十二者亦貢灋七等之田鄉官所受之禄也漆故書作桼盖有水澤之處謂之漆詩曰猗歟漆沮凡澤藪皆可名漆也林山林也漆澤衡所掌之地林山虞所掌之地二十而五者如魚鹽材木之類不用人力耕治天地自然之利也但視其所得每十分取其二分之半夫井田之助灋則有公田固十一也徹灋無公田但每夫十取其一貢灋則輕近而重逺者盖七等之田皆鄉官所受以為禄乃其私田而授民以耕者故取之不同如此亦立為定灋令其不得多取於民故也然亦或有萊易之中耕治之勝於腴田者故多取之未可知也國語季孫以田賦仲尼語冉有曰先王制土籍田以力而眡其逺邇賦里以入而量其有無籍田者鄉官之禄孟子所謂圭田也以力者耕治有勤惰而取之不同故有逺邇輕重之差正此之謂也賦里下文里布也宅不毛有里布所謂量其有無也若在官之田皆取以什一不假言矣凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征以時徴其賦釋曰宅不毛者宅謂廛里也遂人曰頒田里夫一廛田百畆則宅地五畝二畆半在邑則廛與園也二畆半在田則田里與場圃也皆植桑以供蠶事里田廬也遂人曰以田里安氓是也布即布帛也孟子曰有布縷之征此正五畆宅地之布也閭師任嬪以女事貢布帛即此布也故民受五畝之宅若不種桑麻亦必取其里布為布縷之征不以不毛而免之也屋者民居之室即廛也屋粟粟之出於屋者蓋既受百畆之田自有百畝之税粟雖不耕於田無所取粟亦必於屋而取之不以無而免之也夫征即百畆之税粟家征力役之征也夫無職亦取夫家之征受宅不毛受田不耕皆取其粟米布縷之征則是周制每成夫家必有三征惟貴者賢者能者服公事者老者幼者疾者然後舎之故鄉灋以辨施舎為大務鄭𤣥訓里為二十五家之里屋為三夫之屋則窮民一家尚不能共况二十五家與三家乎暴秦亦不至於是也鄉遂之賦小司徒鄉師令之閭師載師徴之皆此賦也都鄙之賦里宰徴之縣師歛之亦此賦也以時者徴之各以其時布縷取之於夏粟米取之於秋力役取之於冬孟子曰君子用其一緩其二即此是也原曰周人監二代之制故貢助徹兼行貢者取其受地之稅耳助者八家同井同養公田也徹者通力合作計畆均收也葉氏曰井則通天下皆井矣丘甸縣都之制無往不同又曰載師七等之田閭師縣師所任之賦則貢灋矣税有逺近輕重之不同故載師立為定額使之自貢而司稼以年上下出歛灋則郊野貢灋亦隨歳以為上下非校數歳為常也愚謂井灋邑丘甸縣都者言實田之數耳然用之於鄉遂甸則用之於鄙邑縣都則用之於大都小都七等之田鄉遂都鄙皆有之而徹灋亦在於井邑丘甸縣都之中故載師備列之盖周人經界之灋甚嚴一夫定為百畝其有肥磽則以萊牧益之不過欲均百畆之稅耳但數至九夫則為一井固不拘拘畫井為公田也惟耕則通力合作計畆而取以什一故為徹灋成井則有公田為助灋故皆可謂之丘甸縣都也其有不成井與夫者即七等之田孟子所謂卿以下必有圭田隨其秩以為差等非以五十畆為限也但所謂國中自賦亦大槩言國中多君子故貢灋多非謂鄉遂無助徹也至於甸稍縣都不言七等之田者盖都鄙之制皆有國野比居之灋亦如鄉遂但不使之成鄉遂故為都鄙亦貢助徹並行其間故舉其本名概之七等之田自在其中耳但助徹則皆什一矣七等之田多鄉官之祿不得不行貢灋故立為定額使鄉官自賦之理或然也鄭𤣥乃謂王畿皆為貢侯國皆用助實不然矣閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徴其賦釋曰閭師熟於閭里之情者故掌鄉遂人民六畜豋耗之數將以任其力不使怠惰遊手也待政令聽鄉遂師校比之政令徴賦與載師同徴此賦也載師之賦主於地稅閭師之賦主於九職農末雖有或專或兼之不同但每人三征則無不同故曰皆一賦也若如先儒説閭師所徴者任民之稅則下文言貢而此言賦可見與載師同徴凡任民任農以耕事貢九穀任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物釋曰此言任民之灋天下之民不出九職太宰分職司徒頒職不過分之頒之而已必閭師任之然後職有可立之地而出賦税也農者天下之本任之於郊甸縣都之中而出粟米之征矣園圃則郊内藪牧則郊外固有以農兼之亦有專其業者則視其業而取賦或貢草木或貢鳥獸焉工化八材商通貨賄亦有農兼之或專之為業者則工有工灋商有市灋使之貢器物貢貨賄焉任虞以山任衡以澤山澤之利出於天地之自然也故使之各貢其物若角人徴齒角羽人徴羽翮掌葛徴絺綌于山澤之農之類以當邦賦是也自三農至虞衡所職不同視其業而取賦皆不出百畝税額或以物或以米穀穀以為禄物以當邦賦也至於嬪婦則凡成夫家者皆有之故皆使之貢布帛以為布縷之征焉此任其職而責其貢以充賦也或曰貢九穀者農也農既受田而取以十一矣若園圃工商嬪婦虞衡之貢既不能以什一取之則事其業者貢賦何以為節乎曰以下文間民無職者觀之則令其出夫布矣以上文載師無職出夫家之征觀之則夫征百畆之税一家力役之征也是有職無職皆出三征矣夫布力役則或有定數而夫征則有等殺焉載師職曰園廛在國中則二十而一場圃藪牧在郊甸縣都之中則或十一十二也虞衡則二十而五焉商有市灋工有役灋此其取之之節也凡無職者出夫布凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰釋曰無職謂閒民無常職也夫布嬪婦所貢之布帛即載師之里布也凡成夫家者皆有之故夫布里布皆一布也孟子曰㕓無夫里之布言夫布里布皆廛布也分而取之非矣此即布縷之征故閒民亦不免之畜養牲也盛黍稷也椁周棺也不帛不得衣帛也不衰衣不得綴衰謂吉衰也罰之所以恥之使各歸其職而勤其兼職也原曰先儒謂夫征百畆之税何但百畆之税耶盖兼九職之貢耳夫農貢九穀固百畆之税粟矣圃貢草木工貢器物商貢貨賄牧貢鳥獸虞衡貢山澤之所有雖非受田皆當百畆之稅而為粟米之征者也嬪貢布帛則凡成夫家者皆有之故為布縷之征焉而力役之征則辨其可任之人而有公旬之灋則具於均人矣是故有夫家則有分職有分職則有三征此先王所以制恒産定賦役出財用之本原皆具於此也故明乎三征之灋則太宰之九職九賦九式九貢大府之九功皆可源流㑹通條而不紊矣或曰三征者布縷力役輕於百畆之稅而受田者尚以年之上下出歛灋若園圃工商藪牧虞衡皆限以百畝之額且無上下而必取盈焉民將不堪矣曰先王粟米之征受地者視地而取税受職者視業而取貢故百畝為夫一也有一家受地餘夫多而兼數百畆者焉亦有田少人多兼别職者二三家共百畆者焉惟視其田有百畝則取百畝之賦耳此田不耕者所以有屋粟也其不受田者藪牧有藪牧之取工商有工商之征山澤有山澤之賦亦視其業之多少則視業而取貢耳非每夫必限以百畝之額也惟閒民既不受田又無職業豐約既不可稽使不限以三征天下之民或受一征焉而曰吾家有可任之人則共力役之征耳或受二征焉則曰吾既成夫家則出夫布矣使不限以粟米之征民皆不就本業浮民游手偏於天下而田之荒萊日甚惟曰吾共二税而已然則太宰分職司徒頒職司空授地職皆以不受田而免之則何人可頒可授乎故粟米之征閒民所不可免也可以見先王敦本抑末之政矣或曰九賦之歛財賄粟米不在矣果如漢儒口率出泉為賦乎曰非也田野所取貢助徹之入皆以粟米為百官府與在位在職之禄矣惟草木鳥獸貨賄器物與山澤之所出皆取其物以充九賦而當粟米之征焉或取其物或取其泉隨時之宜惟上所令耳是九賦所取雖為粟米之征而非粟米之物也若夫布縷之征則盡為九賦故大府别為九功觀太宰以九賦配九式之用自祭祀而下無粟米可知矣至於侯國九貢亦以九賦取民以三之一為九貢之目其二則為國中之用王制大同故也故明乎載師閭師貢賦之灋王制如指諸掌矣縣師掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽三年大比則以考羣吏而以詔廢置釋曰縣師治都鄙之正官其職與遂師同蓋五鄙為縣二千五百家也下有五百家之鄙上有萬家之都縣居其中故治都鄙者總名縣師邦國王畿侯國也王畿侯國俱有都鄙稍謂家邑甸謂公邑郊里者都鄙之郊里也掌地域守其分上也夫家人民辨其上中下家可任之人田萊上中下地田百畆萊五十畆及一易再易之數也夫家人民有多寡田萊有荒治六畜有消息車輦有備乏縣師皆掌其數而攷之三嵗都鄙之吏縣師考校之上其功過於縣則知人而廢置之若將有軍旅㑹同田役之戒則受灋于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至釋曰軍旅㑹同田役皆用衆之事也受灋于司馬者都鄙之兵皆司馬主之有所徴召則縣師帥而至大抵鄉遂之兵以衛王國軍旅征役皆都鄙之兵也故平時皆受司馬節制㑹其車人之卒伍者既作三畨簡稽之數則隨見在調發之人㑹合其卒伍之灋與稍人帥之以聽役於司馬凡造都邑量其地辨其物而制其域以歳時徴野之賦貢釋曰造都邑者帥民徒而造之都有大都小都邑有公邑家邑量其地者亦以室數制之量其寛狹以為鄰里鄼鄙辨其物者辨十二壤土宜之物而授民田然後定其里數地域而溝封之野謂稍甸縣都也縣師盖兼載師閭師之職載師任地徴賦縣師則辨稍甸郊里地域而徴賦閭師任民責貢縣師則辨夫家田萊而徴貢故疊言賦貢明兼二職然賦貢一也原曰縣師其治都鄙之専職也與鄉有鄉師遂有遂師以治之而載師閭師則居於鄉遂之中以任地與民焉惟都鄙則只設縣師而事舉矣故掌稍甸郊里之地域則兼任地之事矣辨夫家田萊六畜則掌校比任民之事矣攷羣吏詔廢置則掌考績之事矣作衆庶㑹卒伍則掌兵戎之事矣造都邑量地制域則掌營建徒役之事矣徴賦貢則掌徴歛之事矣合鄉遂之四職而萃於一官以分地少而委權専也所謂天子使吏治之非縣師也耶若其所以為都鄙之主則在乎五命賜則之卿大夫焉遺人掌邦之委積以待施恵鄉里之委積以恤民之囏阨門闗之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待㓙荒凡賔客㑹同師役掌其道路之委積積音漬釋曰少曰委多曰積廪人倉人計九穀之數以待邦用其餘於六處立倉以聚之也鄉里謂鄉遂之内民居之處立倉積穀以賑民之囏難困阨者在國曰門在郊曰關門關所征之貨既以供九賦矣其餘則積之以養老而無子幼而無養者焉必於門闗者以出入易於取餼也郊里謂四郊之鄰里也諸侯為賔其臣為客必以郊里委積待之者賔客至郊關之内為主者當與之餼廪也野鄙謂百里之外甸鄙之地羇寄也旅行客也以野之委積待之給過客之行餼也縣四百里都五百里之内民聚居之處各有委積待凶荒之賑恤也盖此委積隨在而貯不隨在而取郊里野鄙亦有待凶荒者而賔客羇旅則凡三十里五十里皆委積以備之此其大概也行之有通融之灋焉數事皆衆之所聚道路皆有委積以待之遺人掌之如下文所列者道路之委積也凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有侯館侯館有積凡委積之事巡而比之以時頒之釋曰國野自國而達於野之道路也廬企室也略設飲食以濟飢渇三十里半舎也則有路室可宿焉委小積也以供飲食五十里民居聚集則設市𨽻於市官四方可以交易市中設有侯賔之館有積以供具焉凡一舎之間三廬一宿日有飢渇之備夜有寢處之安所以處賔客行旅亦周矣凡委積所在遺人司之巡而比之則所積不至侵耗以時頒之則所出不至於妄濫原曰遺人委積之掌凶荒之賑恤老孤之畜養賔客羇旅之行固皆取之而足也至於諸侯㑹同聘問軍旅之興徒役之作用衆之方也道路皆有以供之是何委積之多如此哉後世一遇凶荒則賑濟無䇿師役之興千里餽糧驛傳之擾民不安其生民困於徴求國疲於軍餉安得如古者隨地委積以供之無徴求之苦無轉運之勞而事事乃有其備哉揆厥所原由於兵民既判委積盡於養兵官不土着驛傳困於迎送耕寡食衆地利不盡社倉廢墜是以一遇荒饑而國力不支也然周人之委積也有道旅師聚三粟春頒秋歛恤民囏阨在此矣委人聚疏材以待賔客羇旅之用倉人辨粟入之藏有餘藏之以待凶而頒之國之大事備道路之穀積食飲之具則周人所以為委積亦多矣是以備能先具而亡後世之患也後王不欲致治則亦已矣如欲寧萬民壽國脉先王之政可不講求而施措之哉均人掌均地政均地守均地職均人民牛馬車輦之力政釋曰均平也政讀為征均地政者均其土地之征税也先定其經界一夫受田百畆萊易牧地佐之使肥瘠得中令一夫守之是謂均地守分上中下之田施以三等之農藪牧使之蕃鳥獸場圃使之種桑麻是謂均地職地守地職既定然後征之使出一夫之税粟一家之布帛也均人民則辨其可任者役之牛馬車輦使之委輸此事役之征也地守地職則粟米布縷之征下文公旬所用則力役之征凡均力政以歳上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政無財賦不收地守地職不均地政三年大比則大均釋曰凡均力役之征必視歳之上下以為差等豐年人食四鬴之嵗也人食三鬴為中年人食二鬴為無年公旬者公上役作之旬也如有十日之役則役可任之人以年上下三日二日一日以公旬為率故曰用民之力歳不過三日鄭𤣥改旬為均鄭鍔則曰每冬三月役民二十七日則誠暴秦之灋由不知公旬之義也凶謂饑饉札謂疫癘無力政者雖公旬一日亦無之也無財賦者粟米布縷皆免之也收猶修也對均言之盖凶札之時不辨守界人自不侵不施地職民自盡職不均地征以無財賦也凶年不均每年小均三年大均盖地守地職有變易人民有消長地道有變動故三年必大均然後三征得以均平人民得以樂業原曰均人之設見孟子三征之言為得周人征稅之要也盖均地守者均一夫百畆之地粟米之征由是出也均地職者以九職之人各任其地之職布縷之征由是出也均力政則辨其可任者給役以公旬為斷焉力役之征具於此也自均人觀之則周禮賦貢征税之事征役力政之灋雖繁且博豈外於地守地職力政之三事哉惟三事必用乎均也是以載師任地有宜授之人閭師任職有當受之業而族閭之長校比之得其可任之人以聽公上之役矣使均人不設則諸職不能相兼三征亦安能使之平均而無偏重之失哉師氏掌以􅍇詔王以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡􅍇即美字釋曰􅍇善道也謂徳行之奥也詔告也三徳至徳敏徳孝徳也國子天子之元子衆子與公卿大夫元士之適子也師氏徳盛道尊為世師表故以善道詔王者以自然之理而從容以告所以尊王也以徳教國子則自其所得者而儀刑誨訓之使國子效灋之也文王世子曰師也者教之以事而諭諸徳是也至極也徳者心所得於天之理道則天人性命之㣲事物當然之則也苟不至徳至道不凝故至徳為道之本也敏速也敏徳者強志力行蓄徳廣業之事行則人倫日用之間實履其事者也苟不勤敏則行不力故敏徳所以為三行之本也孝徳者國子所生之隆所籍之厚既與人殊自當深念罔極之㤙不可頃刻而忘于懐有得于此則為孝徳須臾而忘于此則為逆惡也故真有此徳篤實深固則必深知逆惡之事而自不忍為矣朱子曰三徳者相須為用不可偏廢盖不知至徳則敏徳者散漫無統固不免乎篤學力行有不知道之譏不務敏徳而一于至徳又無以廣其業而有虚空之弊不知敏徳則孝徳僅為匹夫之行而不足以通神明然不務孝徳而一於敏徳則又無以立本而有悖徳之累此先王之教所以本末相資精粗兩盡而不倚於一偏也教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長釋曰教以徳者使之得於心教以行者使之習於事朱子曰不夲之以徳則無所自得而行不能以加修不實以行則無所持循而徳不能以自進然人之行莫大於孝故至徳敏徳亦惟孝徳足以盡之故三行亦以孝行為本推行友順之目亦以盡孝也孝行如問安視膳之類親者愛之也知愛其親則知所以奉養之方矣友行如忠信辭遜之類尊者敬之也賢良道徳之可尊者順行如恭敬奉承之類事者弟子之禮也師則敬我者也長則尊我者也是故事師長如事親則可謂孝順矣尊賢良如事兄則可謂友弟矣堯舜之道孝弟而已居虎門之左司王朝掌國中失之事以教國子弟凡國之貴逰子弟學焉釋曰虎門王路寢之門也居左者立大小二學於門之左也師氏保氏居之司視察也察王之視朝有善道可行則以詔王中中於禮也失失於禮也蓋王日視朝於路寢用人行政之善師氏詔之而教國子以為灋用人行政之失不在於語言誦授之間而直於行事之際教誨焉是以古人必於事而為學成材然後可以涖政而臨民也夫師氏以􅍇詔王則王之所聞者善言所知者正道固可以格其非心然退而寒之者衆則此心易搖所以必使國子宿衛王宫薫陶於徳行則在王所者長幼卑尊皆善士所以輔養君徳涵養氣質而置君於無過者莫急於此此王宫之教所以為宻也凡祭祀賔客㑹同喪紀軍旅王舉則從聽治亦如之使其屬帥四夷之隷各以其兵服守王之門外且蹕朝在野外則守内列從才用反治直吏反蹕音畢釋曰舉行也聽治坐朝而聽政也王出而祭祀賓客㑹同軍旅喪紀入而常日聽朝師氏無不在左右者無往而不詔王以善也其屬上士府史胥徒也四夷之𨽻乃司𨽻所掌者兵服各用其本國之旃布弓劔也門外中門之外蹕止行人不得迫王宫也内列謂蕃營之在内者王在朝與出在野外師氏必帥其屬與𨽻以守衞王者所以教國子皆守衛王宫之人且屬官之多徒衆之廣掌威嚴之權則教道尊嚴而人攝服王亦恃以無恐矣况帥四夷之𨽻以守内列亦以逺人無覬幸非常之望可防肘腋之變故也先王於師氏之官所以處之委曲詳盡如此則教道焉有不行者葉氏曰師氏教三徳而不曰六徳教三行而不曰六行保氏既教以六藝又加以六儀與司徒三物不同以貴㳺子弟與六鄉之民異其節目雖有詳略之殊然為教則一也夫國子皆曰教而保氏獨曰養國子以道者道非口舌之所能喻以之養其心則三者之教始可得而施焉此又與三物教民不言道同意也又師氏曰掌國中失之事以教國子中者教之以為灋失者教之以為戒如此則逹於政事然後可以涖政臨民矣周人之於國子其教之也詳其責之也深其養之也至則其任之也重盖以公卿大夫之子席父兄之寵豢宫闈之安未離襁褓已列縉紳不限才愚槩居禄位恬視世禄則鮮克由禮不學面牆則涖事惟煩苟無教養之素以變化其氣質而保䕶其徳性將何以責其徳行之素而動容節奏必合於禮樂異時涖官臨民而欲授之以政皆達得乎當成王時魯周公之子伯禽衞康叔之子牟齊太公之子吕伋皆事成王他日皆為顯諸侯此非周人詳於教國子之驗歟保氏掌諫王惡而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數釋曰保也者謹其身而輔翼之以歸諸道者也以諫惡為職者繩其愆糾其繆使内無失徳外無失政乃所以保之也養國子以道者六藝道之寓也六儀道之著也師氏之徳行非可以語言直入必教之藝儀使之朝夕游焉以博其義理之趣優㳺浸漬以涵養之則徳行自然可造矣養之以道如此然師氏之教大學之教也保氏之教小學之教也大學教之以理小學教之以事二學之教亦於師保二官見之吉凶賔軍嘉五禮也雲門大咸大韶大夏大濩大武六樂也白矢參連剡注襄尺井儀五射也鳴和鸞逐水曲過君表舞交衢逐禽左五馭也象形㑹意轉注指事假借諧聲六書也方田粟米差分少廣商功均輸方程盈朒勾股九數也六藝以禮樂為本禮樂者聖人所以治天下之具也而列於六藝何也曰禮樂有大小有始終有儀文度數之禮樂有大禮大樂和平天下之本焉有不可須斯去身焉保氏之五禮六樂亦儀文度數之間耳然大司樂成均之教専以樂成就人才故藝謂之曰道藝者正指禮樂而言之也乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容凡祭祀賔客㑹同喪紀軍旅王舉則從聽治亦如之使其屬守王闈釋曰容即儀也以見於外者言祭祀有祼獻薦徹故其容欲穆穆皇皇賔客有迎送燕餽故其容欲嚴恪矜荘朝廷則踧踖如也鞠躬如也曲禮曰朝廷濟濟翔翔喪紀始死則皇皇焉既殯則望望焉既葬則慨然如不及曲禮曰喪容纍纍色容顛顛視容瞿瞿梅梅言容繭繭軍旅曲禮曰戎容暨暨果毅貌言容詻詻教令嚴肅貌色容厲肅視容則清明也車馬曲禮曰車馬之美匪匪翼翼鸞和之美肅肅雍雍論語曰車中不内顧不疾言不親指藝乃道之所寓容乃道之所發養之以道者如此王舉聽治皆從者謂隨事納諫也其職事與師氏同闈宫中巷門使其屬守之所以㡬出入嚴宫中之衛也師氏守門保氏守闈宫中整肅之權一由師保節制此教之所以必行而不敢犯也葉氏曰周官分職聨事可謂纎悉而獨諫官一職缺焉僅有師氏掌以􅍇詔王保氏掌諫王惡而已周公以三公之師保不必備乃設為師保二氏而以中大夫下大夫二人為之其職専其任重意者言責之所由係也然師氏詔􅍇不知所詔者何􅍇保氏諫惡不知所諫者何惡夫陳善閉邪順美救惡臣子職分之當然也然謂之師保詔􅍇諫惡不過一言自教國子而外則帥𨽻而守王門帥屬而守王闈其餘則王舉聽治則從而已也其於拾遺補闕繩愆糾繆之事殆若有不屑焉愚以二官考之則皆守衛王宫者也其教國子亦皆守衛之人居王之左右前後備王之顧問應對盖以循誘其善於嘿嘿之中何以昌言為哉然師氏之教國子以徳者乃其詔王羙也保氏之養國子以道者乃其諫王惡也必有師氏涵養於先而後保氏正救於後是師氏之職尤重焉故書言師氏必儕於虎賁綴衣之列詩言師氏而伍於膳夫趣馬之行誠以出入起居侍御僕從在王所而與為善者師氏之功居多也一或有過則保氏從而正救之故曰掌諫王惡一言而已豈必如後世以諫名官耶司諫掌糾萬民之徳而勸之朋友正其行而强之道藝巡問而觀察之以時書其徳行道藝辨其能而可任於國事者以攷鄉里之治以詔廢置以行赦宥釋曰此官列於師保之後盖猶民間之師氏也司救猶民間之保氏也糾者率其怠倦勸者循循善誘徳六徳朋友同學之人也行六行正規戒也强謂切磋琢磨也道藝則詩書禮樂是也盖徳無可見故示之以意感之以心惟上所以糾之勸之若孟子所謂勞來匡直輔翼期使之自得者可謂盡糾勸之方矣行則可見而道藝則又習業之本務也故令其朋友以六行相規正以道藝相講習而勸强磨厲以進於學孟子所謂謹庠序之教申之以孝弟之義是也盖古者庠序之中不專立師而教灋秉於閭胥族師州長黨正又不専居於庠序但擇其朋友之長而先覺者互相規戒告詔故言朋友而不言師也巡謂巡行問謂訪問觀察則考校之也徳行道藝之書既定於鄉大夫黨正以下矣司諫則考察其所書之當否以詔廢置也辨其能而可任於國事者此即俊秀有徳行道藝可升於司徒進之天子入太學涵養之司馬辨論官材而任之是也鄉中升俊秀之事惟見於此夫教之書之固在鄉大夫以下而巡問觀察考校覈實審其才定其書然後使之升之者其權司諫執之也巡問觀察之間六鄉之吏治可攷矣萬民之徳行可知矣以詔王行廢置也赦宥者民既有過失為司救所罰而廢黜者能改過有徳行可書者又從司諫而赦宥之此可見為師者必操攷察廢置之權而後教道尊嚴而人信服若師保二氏必掌國中失帥屬𨽻守門闈而後教可行也司救掌萬民之衺惡過失而誅讓之以禮防禁而救之凡民之有衺惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空衺即邪字釋曰救猶禁也司諫掌糾勸徳行司救掌誅讓衺惡過失亦猶師氏詔王􅍇保氏諫王惡四官皆師表之職也衺惡在心故為不善者其辠重過失在事誤陷於惡者也其辠輕誅責罰也讓譴怒醮責也以禮防禁而救之者古者禮刑表裏出禮則入刑教民以禮以禮制刑刑其犯禮者而已故防禁民之衺惡莫先於禮苟有背此者亦審喻而救止之果不能救乃行誅讓也盖古者有少儀内則曲禮三篇實鄉中教民之禮書所謂八刑亦依此制之故使民有所持循今此書之廢乆司救以禮防禁果何禮乎此治衺惡之灋也讓者以言語切責之罰者以捶楚擊撻之士司冦之屬加之明刑則去其冠飾而書辠惡著之背以明示諸人嘉石朝士所掌在外朝之門左使坐焉以恥辱之坐日已滿又役於司空以勞苦之夫三讓而罰三罰而加明刑所以使之愧悔恥諸嘉石所以徴其心役諸司空所以挫其體無非欲其改衺惡之行而革心向化也先王之愛民厚矣苟又不變寧免於殺哉其有過失者三讓而罰三罰而歸于圜土凡歳時有天患民病則以節巡國中及郊野而以王命施恵釋曰圜土獄城也過失雖非故為讓之可也三讓三罰以啓其遷善之心者至矣而復不悛則納之圜土盖日任之以事而夜則收之于獄不加明刑不坐嘉石者其辠輕於衺惡也天患災異也民病札瘥也國中六鄉也郊野六遂都鄙也必以節巡者節以輔王命也問民疾苦或賙之或救之也以王命者宣布天子徳意也司救掌衺惡過失之刑罰者而兼賙恤施恵之事何也曰先王之設刑非以殘民将以救民也故曰以生道殺民雖死不怨殺也官以救為名而末乃示以救之之事先王好生之意不可見乎原曰觀司諫司救之職可以知教道矣夫教也者非糾勸之至而刑罰之加則教道不行非任之以政假之以權則教道不尊故先王既立鄉職以司教化之本矣使無振作飭整之方則教亦終廢也故又設司諫以巡問而觀察之書其徳行别其人材以風厲之其糾勸可謂至矣又使之操考察之柄詔廢置之權則道安得而不尊教安得而不行哉又設司救之職專以八刑糾萬民之衺惡過失犯者三讓而罰三罰而加明刑復因其辠之重輕而困辱之而勞苦之無不欲其入於善也則教道安得而不立人心安得而不服哉是故吾於朋友之正行强藝可以見古之庠序亦有羣聚之灋於辨其可任國事則知儲才之本俊秀之升調人掌司萬民之難而諧和之凡過而殺傷人者以民成之鳥獸亦如之難乃旦反釋曰難相為讎殺也諧猶調也和平也民相仇讎由教灋之不舉耳故設調人於司救之後正以消其仇怨之風而養其渾厚之俗也過失誤也無意而犯之成平也謂立證佐共明之也過誤殺傷此在秋官司刺有過失之刺皆在所宥也先王於民物之命固不忍見其殺傷然亦憫其過誤之至此是在此無可讎之理在彼有必報之意故立調人以鄉里之民立為證佐共明其非本意以平停其怨怒之心亦省刑之大者及過誤而殺傷人畜產者亦以鄉里之民平之盖造謀殺人不待教而誅矣過誤殺人死者為不幸生者不免於怨故情事既明辟之亦足矣凡和難父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國君之讎眡父師長之讎眡兄弟主友之讎眡從父兄弟弗辟則與之瑞節而以執之釋曰和調和也難讎難也九夷八蠻六戎五狄謂之四海主大夫與君也禮曰父之讎弗與共戴天兄弟之讎不反兵交友之讎不同國此復讎之義也今有父兄被殺子弟之怨不能平也故欲從復讎之義然君上之義以過誤殺傷本人無罪也自上殺之則賊棄其民聽其子弟之讎殺是無其君故立調人以和之而使之相辟則彼無横死君無棄民而子弟之怨亦消矣辟之何如君父之讎則辟諸海外以其有不共戴天之義也兄弟師友之讎則辟之千里之外以其有不反兵之義也從父兄弟主友之讎則辟之不同國以其有不可同國之義也曲禮言其義之經周禮處其義之權故知經權之變者可與言禮矣瑞節玉節之剡圭也和之而不肯辟者是不從王命也調人以剡圭使其子弟執之以治其罪或殺之或囚之也夫矜過誤而弛重辟之施緣人情而立辟讎之灋仁之至義之盡矣故與之以和難之瑞節而使得以自執之朝士曰凡執仇讎者書於士殺之無罪是也凡殺人有反殺者使邦國交讐之凡殺人而義者不同國令勿讐讐之則死凡有鬬怒者成之不可成者則書之先動者誅之釋曰凡殺人是過誤殺人也反殺者既避之他國子弟不書于士又無瑞節自反殺之則彼既有殺人之罪此亦有專殺之失故又使鄰國交讐之不可容於其國也或曰反復也既殺一人其有子弟恐其復讐則又殺之故鄭氏曰欲除害弱敵則殺人者或逃他國則令其國與本國交讐之殺人而義如當事而誅大憝執灋而戮元奸朝士所謂凡盜賊軍鄉邑及家人殺之無罪是也若此者避之他境令其子弟勿讐之仇之是不從王命者也必誅之而不宥焉鬬怒忿怒相鬬未至殺傷也故使鄉里共和解之平成之則不至於殺傷而爭息矣不可成謂不相服也則鄉里之長與調人書其是非曲直辨其先動者為非為曲而誅罰之原曰復讐和調之説漢唐儒者多駁之伊洛之門亦惑之五峰胡氏大以為非周公之典愚以為惟此益信其為聖人之制制治於未亂保民之大本也盖先王既立鄉官以司教又設司諫司救以糾勸誅讓之則鄉里之中宜其師師睦睦無鬭爭殺傷之失也然人心不齊事變不一不可不預為之處也故立調人之官以諧和之集閭族鄰里共質正之有鬭怒者先成焉書其曲直誅其先動固不使其訟於鄉師𨽻於士師矣此息訟之本也及其有殺傷者亦先於鄉里成之故而殺者歸之士師誤而死者謂其夲無意而過誤也寘之於灋則彼本無罪一切宥之則不能平子弟之怨禮有復讐之義刑有欽恤之典故調和於禮刑之間令其相避勿得相讐夫其辟諸海外則重於幽州之流矣避諸千里之外則無異於三危之竄矣避諸異國則不能保其鄉井矣為子弟雖不得剸刃於其仇不可以舒其忿而慰其心耶及不肯避則予之瑞節令其仇之既復其讐又令其不得反仇之夫其使自避而不執之於官也是欲其知罪免逮捕之擾也使其子弟勿讐者令其以災𤯝自咎也故調人之官一設使彼知罪而自辟使此自省而勿仇是以無鞠究之煩無逮捕之擾無累及鄉鄰之不安其居者矣不動聲色之間而息大獄於本原之地謂非聖人之制可乎愚見後世大獄大囚之遍於天下何者而非殺傷人之未能辨明者乎死者一人而累者數十家何莫而非不成於鄉里而成於官府者乎一有秉心直道者出而調和之則又厲於灋禁又誰人肯任調人之責者乎噫調人之官不設而後世之訟獄始煩鄉里之教不修而人始多犯灋制世御俗者其思之媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡娶判妻入子者皆書之釋曰判别也男女之合必有行媒者以有别也成名謂子生三月父名之書其所生年月日及名嫁娶以為騐也陽竒隂偶故男三十而娶女二十而嫁為期孔子曰夫禮言其極是也判妻出妻也入子謂女子為人婢養者凡娶此二色之人為不正之名皆書以記之中春之月令㑹男女於是時也奔者不禁若無故而不用令者罰之司男女之無夫家者而㑹之釋曰仲春建卯之月隂陽交㑹行婚禮順天時也奔謂先時未具六禮過此則失時也故亦許其成婚内則曰聘則為妻奔則為妾是也凡不告廟而行納采納徴請期親迎者謂之奔此必因家貧凶喪荒札之故者而後許之若無故而不備禮及此時而欲成昏謂之不用令罰其父母及主昏者觀此則奔非私奔之謂矣司猶察也女無夫男無家而鰥寡不能自存者㑹合之使各有所歸如書所謂敬寡屬婦是也若義夫節婦則特異之行故旌之以厲風俗凡嫁女娶妻入幣純帛無過五兩禁遷葬者與嫁殤者凡男女之隂訟聽之于勝國之社其附于刑者歸之于士純側其反釋曰幣婚禮有納幣納徴皆用帛純帛純色之帛五兩十端也貧者可以不及富者不得過制故曰無過遷葬謂死而求婦嫁殤謂死而求夫是皆瀆禮亂倫故禁之也隂訟謂淫奔之訟也勝國亡國其社奄其上而棧其下使無所通隂訟鄙䙝之甚不可聽之于官府故就出聽之以示不正之合喪國亡家之本示監戒也罪𨽻五刑者歸之士師所謂去勢幽閉者此刑也李氏曰天地不合萬物不生有夫婦然後為家上得以養父母下得以育子孫生民之本於是乎在而人主慢之非計也是以聖王設官主判合之禮子生必書其名男女盛年其昏禮自季秋至於孟春惟其所用男三十女二十為期盡雖中春猶可行所以蕃育人民先王之道如此其至也既為之立其家又使之有其業國中則典婦功掌婦式之灋野則鄼長稽其女工然而民不庶且富者未之有也司市掌市之治教政刑量度禁令以次叙分地而經市以陳肆辨物而平市以政令禁物靡而均市以商賈阜貨而行布以量度成賈而徴儥以質劑結信而止訟以賈民禁偽而除詐以刑罰禁虣而去盜以泉府同貨而歛賖賈音嫁儥音育劑子隨反賈音古虣薄報反去起吕反釋曰司市主市㕓治商賈平物價收財賄者也所以一項人民聨屬鄉遂也故屬地官之末先義後利也治以理之教以化之政以政之刑以齊之量斗斛也度丈尺也執五量以定五穀之價建五度以定布帛之式禁謂違式衍俗之物不陳於市令謂宣教立政之事必憲於民此八者司市之大經也次市官所治之舎思次介次也叙肆之行列也以官次為列序分地而治之則市之經畫定矣肆賈人藏貨之邸也陳物於肆以類而辨之則市之物價平矣物之侈靡易售而無實用者也禁之則民不貴異物而市平矣阜盛也布謂泉也布所以權百物而通之貨苟不阜則布無所通故商賈通而貨財盛則泉布得行矣徴召也儥買也量度所以齊物也物之多寡長短有定價則買者來矣質以人證劑以書約賖貸交予以是為信則爭者止矣賈民胥師賈師也能知物之真偽使之辨貨貿易則欺詐之術不行矣刑罰如小刑憲罰中刑徇罰大刑朴罰是也市肆之間奸詐強虣萃焉徴以刑罰則虣可禁而盜可去矣泉府聚泉之府同共也泉府所藏之貨與民共之市之不售者官為歛之民之無貨從官貸之所以利民非以冨國也司市為市官之主故其教治政令皆司其綱而其目則自質人以下分掌焉故質劑結信則質人之職商賈行布則廛人之職賈民禁僞則胥師之職量度成價則賈師之職刑罸禁虣則司虣之職也陳肆辨物則肆長之職也至於同貨歛賖者又非泉府之職乎其餘門闗掌節皆同商賈之徃來察貨賄之出入與夫征禁符節之事亦司市之通貨賄以璽節出入者也然則商賈也者亦分天下四民之一者也故其設官分職經制之詳宻如此盖亦為國之大務與大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主昃音側釋曰日昃日未中也易曰日中為市故大市期於日中百族萬家也為主主於為市謂其多也大市交易大而且多故百族為主萬家立一市也商賈家于市中故朝在焉夕市日將入時市也販夫販婦朝買夕賣以日餘力而給人家常用也故夕時在焉凡市入則胥執鞭度守門市之羣吏平肆展成奠賈上旌于思次以令市市師涖焉而聽大治大訟胥師賈師涖于介次而聽小治小訟釋曰市入謂三時之市開市門以納賣買之人也鞭度者無刃之殳繫鞘子上則為鞭刻為尺寸則為度爭門者執鞭以威之爭長短者執度以齊之故胥執此以守市門也羣吏謂胥師以下平肆者正其肆之分界展之言整也成平也平成市物者也奠定也整飭㑹者使定物價防誑欺也上旌者掲析羽之旌于思次以為衆望使知三時市也思次市中官舎行次也市師即司市也涖事于此以聽大治大訟謂胥師賈師不能决而上之也介副也小官舎行次也則有序次分地而守之胥師賈師涖以聽市之小治小訟者凡萬民之期于市者辟布者量度者刑戮者各於其地之叙凡得貨賄六畜者亦如之三日而舉之釋曰期于市謂有買賣要約期决于市者辟偏辟之物謂布有真僞爭偽布者爭量度之長短者刑戮謂犯刑者此四事則隨其方之人各於其所分之地叙要决之不可亂也所謂以次叙分地而經市是也得遺物者亦使置於其所分之地叙貨於其貨之肆畜於其畜之肆則不亂拾而失主求之易也三日而無識認者則舉而沒之官凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使㣲凡通貨賄以璽節出入之國凶荒札喪則市無征而作布闕釋曰利利於民者害害於民者靡物之侈靡使人競溺者凡治市者懋遷有無化居雖資於商賈而作灋以低昂之使厚風俗徴奸宄正人心實本於公上故凡治市貨賄之灋有用之物無者使有利者使阜盖貴其價以來之則必有而阜盛矣示民不賤用物也無用之異物害者使亡靡者使㣲盖賤其價以抑之禁之則必亡而㣲細不用矣示民不貴異物也王制所謂不粥於市之物是也通逹也凡商人齎貨賄出入市與門闗皆於司市給印章與節然後得行盖門關有㡬貨物有禁隨地有征故也國有災害則不收市征以蘇民困盖凶札民困於財矣若泉饒裕則亦可蘇故聚金作布也凶荒鑄錢以益國盖古灋云凡市僞飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二市刑小刑憲罰中刑徇罰大刑扑罰其附于刑者歸于士釋曰僞飾之禁如用器不中度布帛粗精不中幅之類凡十有二在民者不得畜也圭璧一金璋二命服三命車四宗廟之器五戎器六用器七兵車八姦色九錦文十珠十一玉十二也凡此在上者不得作也商則資此而通之賈則因此而粥之皆在所禁故分之各十有二焉憲表縣其所犯之由以示懲戒也徇以其罪徇于道路以辱之也扑則撻其身體以痛之有犯五刑者則歸于士師議正其罪國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事釋曰過市謂諸侯夫人世子過其國之市大夫内子過其都之市也先王立灋欲於未然之前防之市者貨利所在君子不入焉恐竒靡淫侈蕩其心而變其守也故國君過市則赦市之刑人盖以已既好利市人何誅焉至於夫人世子命夫命婦之過必罰其幕帟盖帷所以責其無以自蔽而見淫侈之物也國君如此則天子可知矣市司者凡市之主也遺人五十里有市市有候館則専以待賔客㑹同師役之事者有市則有儥賣之事大衆所在其地之市司帥賈師從之而掌其貿易之事也質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉大市以質小市以劑掌稽市之書契同其度量壹其淳制巡而攷之犯禁者舉而罰之釋曰質成也成平也主平定物價者也貨賄財物也人民奴婢也兵器弓矢戈矛之類珍異竒美異常之物凡此皆質人平定其價也儥買也凡以物買賣者則為之立質劑焉質謂人質如今牙儈劑交約劵書大市人民牛馬則以人質小市財物珍異止用書契用質劑者欲其無反悔也稽考也書契取予市物之券即劑也同較量之使合律度度以齊其長短量以齊其淺深淳謂幅廣制謂匹長巡行於市而規攷之若其度量不同淳制不一則舉其貨罰其人凡治質劑者國中一旬郊二旬野三旬都三月邦國朞期内聽期外不聽釋曰治質劑謂偕證佐持契券求訟者度地逺近以爲要約之期期内來則治之後期則不治者所以絶民之好訟省文書也郊逺郊野稍甸也廛人掌歛市絘布總布質布罰布廛布而入于泉府凡屠者歛其皮角筋骨入于玉府凡珍異之有滯者歛而入于膳府釋曰邱氏曰絘布胥師所取在次之布也總布肆長總歛在肆之布也質布質人所歛質劑者之布也罰布司市所舉犯令者之布也盖方貨入於市其間有詐偽者罰之以布出於次謂之絘布貨入於肆肆長隨其所貨之物收其總税而計之其數非一謂之總布質人儥賣之質劑如今田宅牛馬官給券以收税謂之質布司市於辟布等有犯市令舉而罰之謂之罰布廛人正掌市廛之地凡諸物邸舎之税廛人得以歛之然廛人本歛廛布亦兼歛五布者欲使知取其物之税者不得兼取地税其入泉府又將以歛市之不售與貨之滯民用者雖取之實予之豈若後世因以奪民利哉屠殺六畜者皮角筋骨可作器物也故歛而入玉府以當地税珍異之物滯於市而不售者在廛乆恐其腐敗官為賣之入膳夫之府以供貴者之膳亦所以利商也胥師各掌其次之政令而平其貨賄憲刑禁焉察其詐偽飾行儥慝者而誅罰之聽其小治小訟而斷之釋曰胥師掌二十肆之刑禁政令者也胥師之下又有司虣司稽肆長止於二十肆不可與民居同也俱無秩賦之也次介次也二十肆則設之以施政令貨賄之入則平地之物使爭競司市所頒之刑禁則表縣之使知所趨避也詐偽以言欺人者飾行以事欺人者儥賣也連言作買單言作賣二用也慝惡物也謂使人行賣惡物於市乃飾之以証買者此胥師所以察而禁之也司市治訟聽其大者則小治訟胥師自聽而自斷之也賈師各掌其次之貨賄之治辨其物而均平之展其成而奠其賈然後令市釋曰賈之有師賈之所取灋也次即介次與胥師同居一司禁令一司物價也肆有百貨總言貨賄也治者理其買賣之事也辨其物之美惡課而比之使相均平展省而平定之然後定其價直使之合宜則百貨定矣然後令之賣於市使不得輕重焉夫古之為市也先令賈師定物價百貨之價既定然後令市此五尺之童適市莫之或欺以有此灋也然賈師又豈得以已意低昂於其間哉将禀之司市司市禀之内宰内宰稟之后也是故物無甚貴甚賤之價人無壟斷乘時之思後世劉晏畧知此意然非先王之灋矣凡天患禁貴儥者使有恒賈四時之珍異亦如之凡國之賣儥各帥其屬而嗣掌其月凡師役㑹同亦如之釋曰天患凶荒札喪貧者不能預備賈民乘時以罔厚利貴儥以重民困必禁之使有常賈所以恤民瘼又以懲奸民也四時食物之美雖由人好尚亦使之有恒賈凡官府有所斥賣之物與買物為官府之用賈師則帥其所屬司虣以下至肆長更代直月以均勞逸凡師旅大役㑹同有大用於市買賣者皆使之嗣掌更代直月焉司虣掌憲市之禁令禁其鬭嚻者與其虣亂者出入相陵犯者以屬遊飲食于市者若不可禁則搏而戮之釋曰此職掌禁人無禮鬭奪酗暴者將以禮與灋經市也市者利之所在而凶强之淵藪也先王將安良善保柔弱使市不擾乃於十肆立一司虣専以察强暴為事憲其禁令使人避之苟有違禁不服者摶而戮辱之其古人所謂牧羊去其敗羣之意乎司稽掌巡市而察其犯禁者與其不物者而摶之掌執市之盜賊以徇且刑之釋曰犯禁則犯市令之禁者不物不正之物竒器淫巧不適於用皆是也摶伺而擒之徇於路且刑之使衆知畏而不敢犯也此職専主巡察之任與司虣相通也胥各掌其所治之政執鞭度而巡其前掌其坐作出入之禁令襲其不正者凡有罪者撻戮而罰之釋曰此胥乃胥師之役持鞭朴之人也執鞭度以巡其前凡坐作出入各有執掌如有㳺手行坐不如灋者不以正者掩捕之撻戮有罪者亦有罰之使出布者肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相爾也而平正之歛其總布掌其戒禁釋曰肆長則立肆之人盖有財而為賈者猶鄉之比長也故各掌其肆之政令名相近者如布帛之名同而制之精粗則異所以相逺實相近如馬牛之肥腯相近而名則不同所以相爾相逺則正其價使之高下相邇則平其價使之如一所謂陳肆辨物而平市者其灋如此總布一肆之中隨其所賣之物不計其貨只一年取税若干謂之總布歛而收之以輸於廛人原曰司市質人廛人皆設官也故有屬有府史胥徒其所掌政令刑禁皆受之朝廷者也胥師賈師則富商大賈之有才令其掌二十肆之刑禁辨物定價焉猶鄉遂族師鄼長之類也司虣司稽與胥則其所用之徒役肆長所備之人也肆長則有財為商而坐肆者猶比長也盖商賈乃四民之一别有一項人民故先王所以治之之灋如此泉府掌以市之征布歛市之不售貨之滯於民用者以其賈買之物楬而書之以待不時而買者釋曰泉府者司市主貨財之府以泉通商賈之貨賄濟萬民之困急利民莫大焉猶遂人之有旅師聚三粟以濟貧民平頒興積者也在野以粟在國以泉二官盖相依也市之征布謂廛人所歛諸色之泉也市有積滯不售之貨官以泉而收之所以便商非為其賤而買之也每物書其賈而掲之以待不時而買物有通塞賈無貴賤所以便民非為其貴而賣之也所以為此通融之灋為商為民國何利焉買者各從其抵都鄙從其主國人郊人從其有司然後予之凡賖者祭祀無過旬日喪紀無過三月凡民之貸者與其有司辨而授之以國服為之息釋曰抵本也民有買貨以濟用者各從其本價恐貪人利之也必從其所居鄉里之長或所治之有司審察之果非射利然後予之賖者立期取償而無息猶夫買者也然必祭祀喪紀大事困急不得已而後賖之祭祀旬日喪紀三月量輕重以為限也貸與賖不同賖者買物以濟喪祭之用無論貧冨貸者借泉以濟貧乏之用惟貧民則貸之有司其鄉里所轄之官辨其物定其價而授之還本之後使服役於國事各有日數以為息以其貧無所取財而為息也夫泉府之布出於廛人所歛非苛征也泉府之貨出於商賈不售非奪商也民之買者與其有司辨其要用不與其貪利也物有貴賤必從其本價不謀其利也民有喪祭困急而賖貨則立期取償而無息急民困也民有從官借物以濟急必出不得已而後授之以身服役國事為息不責其所無也則既不病民亦不病國兩得其宜矣凡國事之財用取具焉歳終則㑹其出入而納其餘釋曰國之財用取具者入九賦則以供王之膳服在於民則歛貨利商也賖貸利民也是國之經費不過為王為民為商而已歳終㑹其出入不過㑹此三者而已他事豈其取於此乎納其餘亦納之於職幣以待移用而已原曰泉府之財所入者㕓人五布而已今曰國之財用取具焉不知泉府何以供之王介甫執此遂曰善為國者不取於民而財用足乃置市易務出内帑錢數百萬以為本遣人諸處市物以厭冨商之利又官出本賖貸於民而取其厚息以資國用豈非以國之財用取具於泉府之一言乎盖所謂財用者供九賦之一也具國用者待王之膳服也供賦之餘則歛貨利商也賖貸利民也出入有餘又納於職幣也具國之財用如斯而已介甫讀禮不熟以成宋人之害胡氏父子遂力詆周禮非周公之書噫以釋經之誤而遺天下之大患廢聖人之全經其失均矣司門掌授管鍵以啓閉國門㡬出入不物者正其貨賄凡財物犯禁者舉之以其財養死政之老與其孤祭祀之牛牲繫焉監門養之凡歳時之門祭受其餘凡四方之賔客造焉則以告鍵其展反釋曰匠人云營國九里旁三門王城有十二門也管鑰也鍵牡也入者為牡出者為牝盖授管以閉門授鍵以啓門故曰啓閉國門也㡬察也不物有所㡬而後害者亡靡者㣲貨賄有所正而後亡者有利者阜舉之沒入官也死政之老死國事之父母孤其子也犯禁者冒利先王以義治之則司門沒其財死政者徇義先王以利養之則遺人養其老幼盖遺人之委積自司門出也正是㡬之也監門門徒也養祭祀之牛牲以門外有閒地也門祭受其餘者不敢用祭祀之牛祭門特受其共牲之餘者而用之朝聘之賔客至門則以告其上以禮而迎之也司關掌國貨之節以聨門市司貨賄之出入者掌其治禁與其征廛凡貨不出於關者舉其貨罰其人凡所達貨賄者則以節傳出之釋曰王畿千里而五百里界首面置三關亦十二關國貨之節通貨賄之璽節也凡節皆掌節守之惟璽節付之司關使通貨賄以聨門市謂自外入者通之門與市自内出者通之門與關内外參聨以檢滑商司貨賄之出入於關猶司門之正貨賄也治者治其鬭爭禁者禁其欺詐征者征其出入之貨廛者賦其市地之廛丘氏曰市有廛市關則無市官之灋安有廛征盖其掌國貨之節以聨門市是辨其合征合廛者而關白焉貨不出於闗必僞物犯禁而避税者舉者没其貨罰者撻其人貨賄不犯禁者則達之即授以節又為之傳書使所至無留礙盖商取貨於民間至關驗而書之乃與之璽節其有節者亦為之傳書也國凶札則無關門之征猶㡬凡四方之賔客敂關則為之告有外内之送令則以節傳出内之釋曰凶謂荒饑札謂瘥癘春秋傳曰札瘥夭昏無關門之征猶㡬者謂苛察之不得令姦人出入孟子曰關㡬而不征則天下之旅皆恱是也敂作叩敂關謂至關謁關人也國語曰敵國賔至關尹以告行李以節迎之朝聘者亦然送令者外之送令謂從侯國畿内而入者以節及傳内之送至王所内之送令謂有王命從王國而出則以節與傳出之送至侯國畿上也掌節掌守邦節而辨其用以輔王命守邦國者用玉節守都鄙者用角節凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之釋曰節謂行者所執之信邦節則玉節以下之八節也辨其用者或用以守或用以使也輔王命王有命則以節授使者執以為信此守節也玉節之制如玉為之則以命數為小大玉美在其中而暢達於外君子比徳如玉諸侯之徳宜如是也角則致力於内而捍禦於外公卿大夫為采邑之長者其材宜如是也制則未聞此邦國之使節也諸侯使卿大夫聘於天子諸侯行道路所執之節皆鑄金為之各為虎人龍之象以山國多虎如晉楚澤國多龍如吳越平土之地則人之如陳鄭之平原曠野視其所執之節可明其所徃之邦也英飾也蕩竹也英以綵繒而繫於竹持之使其英華外著内有不變之剛外有可觀之美尊王命重使華也門關用符節貨賄用璽節道路用旌節皆有期以反節凡通達於天下者必有節以傳輔之無節者有㡬則不達釋曰門關司門司關也貨賄主通貨賄之官謂市官也道路主土地者謂比長也符節以竹為之有判合如漢宫中詔符也璽節今之印章也旌節以竹為旌如漢使者所擁節是也凡民逺出至門者司門為之節由關者司關為之節商則司市為之節其以徴令及徙家則鄉比長為之節不出關不用節也凡節有灋式藏於掌節有期反節不獨民與商門關道路之官亦必有期而反弊則更為邦國都鄙之使節反則有時守節易世方反凡欲逺行於天下者無有不得節而出不獨有王命也傳者所以書其事與節相依而行故曰輔之無節者遇門關㡬察之處則執之或納於圜土故不達也葉氏曰瑞節所以頒大信于天下者掌節一官尊守邦節者也曰守邦國用玉節守都鄙用角節是即珍圭牙璋穀璧琬琰者也則掌節所掌必有與典瑞相通者矣以至邦國之使節曰虎節人節龍節門關道路曰符節璽節旌節又與小行人所達之六節相關通焉獨都鄙之管節與貨賄之璽節不同爾盖角節王畿都鄙之節管節侯國都鄙之節掌節有門關之聨有貨賄之出入故有璽節小行人掌諸侯之聘無貨賄之出入故無璽節此其所以不同與夫節所以示信也既典之以春官之典瑞又守之以地官之掌節又達之於秋官之行人不如是則無以為信也盖典瑞雖以瑞節授使者而持之苟不合於掌節則使者所持未必信掌節雖以符節授使者而行之苟不達之於小行人則使者所行未必通瑞節出入三官互相稽驗則無矯偽之弊矣周禮全經釋原卷五
