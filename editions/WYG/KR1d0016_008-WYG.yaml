body:
  text: 周禮全經釋原卷八明柯尚遷撰春官下大師掌六律六同以合隂陽之聲陽聲黄鍾大蔟姑洗㽔賔夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾凾鍾即林鍾小吕即仲吕釋曰陽律六隂同亦六同亦謂之吕皆生於黄鍾黄鍾九寸空圍九分積八百一十分是為黄鍾之實以三歴十二辰得一十七萬七千一百四十七為黄鍾之全數由是自黄鍾九寸之管隔八相生陽皆下生隂皆上生術曰以上生者倍其實三其灋以下生者四其實三其灋自子至已陽升隂退故律生吕皆下生吕生律皆上生自午至亥隂升陽退故律生吕皆上生吕生律皆下生蔡氏曰黄鍾太蔟姑洗損陽以生隂林鍾南吕應鍾益隂以生陽何則黄鍾至姑洗陽之陽也林鍾至應鍾隂之隂也陽之陽隂之隂則陽息隂消之時故陽常下生而有餘隂常上生而不足㽔賔至無射則隂之陽大吕至仲吕則陽之隂也隂之陽陽之隂則陽消隂息之時故陽常上生而不足隂常下生而有餘但六陽辰則當位自得六隂辰則居其衡蓋居衡則隔八矣由是十二律之實約以寸灋則黄鍾林鍾太蔟得全寸約以分灋則南吕姑洗得全分約以􅁵灋則應鍾㽔賔得全􅁵約以毫法則大吕得全毫約以絲法則夾鍾得全絲至仲吕之實十三萬一千七十二以三分之不盡二筭其數不行此律所以止於十二也又有變律者若大吕為宫則黄鍾為變宫特黄鍾管為最長所以止得用半律蓋黄鍾不可為他律役故也由是六陽律皆以次而减半律以合之然後洪纎高下不相奪倫焉亦尊陽抑隂之意原曰天地之間皆氣也有氣則有物有物則有聲凡聲者陽也聖人因陽聲而制律吕故立黄鍾諸律根本蓋天地之體數十為隂陽之全數黄鍾之數九九為純陽之極樂者所以宣陽氣也故以純為主而不用十也純陽既立再生隂陽而後樂之節奏成焉其再生隂陽者陽中之隂也故曰樂由陽來禮自隂作若以太隂太陽相配則與禮為對矣是以用陽而不用隂而純陽之中又自有隂陽也然黄鍾雖大只當復卦初九一爻而已初九之陽至微也而以至大之純陽當之何也夫樂者所以宣陽和之本也故復之一陽在天徳謂之元在人心謂之仁其氣至淳其理至喜其體至微其用至廣者也故作樂必則此至純之體因而起數配以隂陽以齊天下之聲然後宣之而天下和平感之而鬼神昭格由其本之至純至粹猶道家所謂天元一氣者也若雜於大氣之中則反為氣所役矣何自而有樂乎惟其則此至純一氣以為之本也故一而三三而九之九而二十七二十七而八十一焉而極於十七萬竒黄鍾之功用大矣哉然十一律不則其功用之大三分其二九分其八二十七分十六八十一分六十四以至十七萬分六萬餘者必欲探乎元也元者一氣至純之本也黄鍾之體也蓋分者當律之數其分而存者則黄鍾之本數也雖十一律各自為均而黄鍾未嘗不存焉故十一律未生黄鍾不見其有餘十一律既生黄鍾不見其不足一而貫圓而神其妙矣乎知乎此然後可以言合隂陽之聲矣皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹釋曰文以五聲者以律生之黄鍾之數八十一即宫聲也是為聲本宫三分損一下生徴聲五十四徴三分益一上生商聲七十二商三分損一下生羽聲四十八羽三分益一上生角六十四以三分之不盡一筭數不可行此聲之所以止於五也宫聲大而濁羽極細而清商之大次宫徴之細次羽而角居四者之中焉然中聲不取角而取宫者蓋宫居隂陽交㑹之中而衆聲之所始也角雖居五聲之中而非五聲之㑹也又有變徴居其中夫變徴豈得為中聲哉所以有變聲者由其有變律也五聲相生如黄鍾為宫則太蔟為商姑洗為角林鍾為徴南吕為羽又轉無射為宫夫宫與商商與角徴與羽相去各一律至角與徴羽與宫相去乃二律相去一律則音節和相去二律則音節遠於是有變聲焉角徴之間近徴收一聲少高於徴故謂之變徴羽宫之間近宫收一聲少下於宫故謂之變宫所以濟五聲之不及而謂之七音也變聲非正故不為調又有變律子聲何也宫君也商臣也角民也徴事也羽物也臣不可以過君民不可以過臣至於事物則不必避如以黄鍾為宫則他律應之者皆得其正及以他律為宫而或商高於宫則臣凌其君矣或角聲高於商則民凌其臣矣乃减半律而製四清聲以應之而謂之子聲也蓋律吕之數徃而不返黄鍾不為他律役所用皆正律無空積忽微自林鍾而下則有半聲自㽔賔而下則有變律皆有空積忽微不得其正故黄鍾獨為聲氣之元諸律諸聲皆黄鍾所生所謂純粹中之純粹者也原曰宫聲者何中聲也中聲者何本於黄鍾也黄鍾生十一律而商角徴羽不事外求盡於宫中而得之故宫聲八十一黄鍾之八十一也商聲七十二太蔟之七十二也角音六十四姑洗之六十四也徴音五十四林鍾五十四也羽音四十八南吕四十八也此五音之一終矣及大吕為宫宫音七十五竒商音六十七竒角音五十九竒徴音五十竒羽音四十四竒又五音之二終矣循是以降莫不皆然故十二律全半具而五音大小之數備矣十二律旋宫立而五音大小之聲形矣曷嘗有一之不本於宫之一音哉故宫者君象也乾為君故取乾氣以作樂乾以統天自乾而下皆坤坤以順為至少有不順則天地不位君以統臣臣以順為良小有不順則君臣易位宫之於商猶乾於坤君於臣易至於相陵以其位之相近此樂之大忌也故宫商二聲為樂之大端宫中已具有水火木金商中已含有角徴羽故角之居東徴之居南當水火之成氣若生氣則已具於宫矣樂之宫以生數自處以成數處商角徴羽生數自處者立體也成數處四聲者成物也故聽其宫聲可以知其極之建焉聽其四聲可以知其極之錫焉曰旋相為宫又各自有君臣何也曰宫統四聲猶天子公侯伯子男通天下之五爵也大吕以下旋宫猶國中之五爵也對天子而言公侯以下皆臣也自列國而言則各全其尊矣獨八十一之宫終不他易者此天地中正之位而民無二王也聖人性天地中正之德履天地中正之位陶天地中和之氣然後作天地中和之樂則黄鍾定而宫音正矣天地泰和之氣由此而宣矣教六詩曰風曰賦曰比曰興曰雅曰頌釋曰教教國子也太學之教以詩為先王制曰詩書禮樂以造士六詩者王氏曰一國之事繫一人之本謂之風言天下之事形四方之風謂之雅美盛德之形容以其成功告於神明謂之頌三者詩之體也直述其事而陳之謂之賦以其類而况之謂之比以其所感發而比之謂之興三者詩之用也故詩有六義焉朱子曰風則閭巷男女風土情思之詞雅則朝㑹燕享公卿大夫之作頌則鬼神宗廟祭祀歌舞之樂其所以分者以其篇章節奏之異而别之也賦比興所以分者又以其屬辭命意之不同而别之也衆作雖多而聲音之節製作之體不外乎此故大師教國子必使之以是六者三經而三緯之則凡詩之節奏指歸皆將不待講說而直可吟咏以得之矣王氏栢曰周公祖述虞庭命䕫典樂之教於是詔大師教六詩是時未有訓詁傳註之可說不過曰此為風此為雅頌此為比興此為賦而已使學者循六義而歌之玩味其辭意以涵泳其性情莫切焉漢劉歆乃謂詩始萌芽於文帝之時一人不能獨盡其經或為雅或為頌相合而成吾故知各出諷誦之餘以足三百之數矣自是傳註之學日盛而六義之别反湮程子曰學詩不分六義豈能得詩之體朱子亦以為古今聲詞條理無出於此愚嘗求之三百篇矣固非虞夏之詩也固非盡出於周公之所定夫子之所删也周公之詩不滿百篇先儒以為正風正雅也夫子之删存者二百餘篇先儒以為變風變雅也頌雖無正變之分而夫子合之為三百之數總繫之周也今之所謂三百篇者皆周公夫子之舊乎成康既沒至孔子未五百年也大師瞽矇音調未失而雅頌龎雜已荒周公之制夫子自衛反魯而後正之况夫子既沒大義已乖而聲詩益廢至秦舉詩書而焚之漢定之後詩忽出於魯出於齊燕國風雅頌之序篇什章句之分吾安知無一篇之亡一章之失而盡復周公孔子之舊也夫書授於伏生之口參以孔壁之藏且不勝其錯亂訛舛為萬世深恨不知詩之為經藏於何所乃如是之秘傳之何人乃如是之的遭焚禁之禍而三百篇宛如聖人之舊詩書同禍而存亡遼絶如此吾斯之未能信以六德為之本以六律為之音釋曰王氏曰六德中和祗庸孝友也君子之學詩豈徒誦其空言哉要本之於徳而已蓋六徳本於性情所以主於中六律稽諸度數所以正於外以六德為之本故雖變猶止乎禮義以六律為之音則書所謂聲依永律和聲也六德以中和為本詩必備乎六德者然後取之以作樂協之聲律播之八音也周公之詩未為經六代之樂則既有定矣其餘風雅頌則隨用隨作然必曰六德為之本則當時所得之詩可放之者亦多矣原曰古人之詩有六德以為之本矣然後恊之聲律稽之度數合天地之自然而奏之郊廟朝廷故可以動天地感鬼神和上下格鳥獸也後世之詩既無六德以為之本辭焉是工雖剛柔清濁靡不畢究已不合乎天地之自然矣况於矜竒眩能工聲律拘對偶窮年卒嵗為江山草木雲烟魚鳥尚得謂之詩乎或云古詩可以恊律作樂今詩不可以恊律作樂曰不然也蓋有天地自然之聲有由人所作之聲自然之聲者先天也人所作之聲者後天也故以五聲恊之律吕旋相為宫自然清濁高下成六十調此天地自然之聲樂之本也人所作之詩配之五音恊之律吕播之八音錯綜而條理之自然成樂亦猶先天之數移而為後天入用之數也故先天則自然不可易移之後天則變動而不可窮矣故德之至者詞亦至詞之正者聲亦正聲正則氣從之故奏之可以動天地感鬼神歌之可以和上下格鳥獸也以自然之聲推以作樂者自天而之人也德極於至而樂亦至者自人而復乎天也德有未至詞焉是工恊之聲律而播之八音人之淺深自不可掩子貢所謂聞樂知德者也故德之正者聲亦正德之邪者聲亦邪樂未嘗以其詩之邪而聲律遂窮也今之為詩也能有中和祗庸孝友之德矣發之聲詞鏘然中正如鳴鸞鳳如調琴瑟如奏金石聞者不知手之舞足之蹈若此者雖今詩之體獨不可以為樂乎大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼔􅉧大饗亦如之大射帥瞽而歌射節大師執同律以聽軍聲而詔吉凶大喪帥瞽而廞作匶諡凡國之瞽矇正焉朄音𦙍釋曰帥瞽矇也登歌歌在堂上也奏奏鍾皷也擊擊石磬也拊拊琴瑟也書所謂戞擊鳴球搏拊琴瑟也下管吹管者在堂下登歌下管貴人聲也樂器笙簫之屬播播揚其聲皷鼗皷也􅉧小皷也詩曰應􅉧縣鼓􅉧皷之以引樂射節若樂以騶虞九節貍首七節采蘋采蘩五節之類皆大師帥瞽矇為之歌也大師大起軍旅也鄭氏曰王者行師出軍之日授將士弓矢士卒振旅將張弓矢呼大師吹律合音商則戰勝軍士强角則軍擾多變失志宫則軍和士卒同心徴則將急數怒士卒勞羽則兵弱少威明師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功詔吉凶使知所戒也廞陳也陳其生行迹為作諡史序王行見於事故太史讀誄瞽掌樂王德成於樂故大師作諡諡成德之名也瞽矇正焉皆屬大師之政令也小師掌教鼓鼗柷敔塤簫管弦歌釋曰教教瞽矇也鼗小鼓兩旁有耳持其柄搖之則旁耳還自擊柷状如漆桶方二尺四寸深尺有八寸中有椎柄連底撞之令左右擊所以起樂也敔状如伏虎背上有二十七齟齬刻以籈櫟之籈長一尺所以止樂也塤土音大如鵝子銳上平底如稱鍾大孔燒土為之朱質戧金餙之簫編小竹管為之其管寸二後世謂之鳳簫管如篴併兩管而吹之長尺有二寸弦琴瑟之類歌樂章聲依永亦依於琴瑟也堂上之樂大祭祀登歌擊拊下管擊應鼓徹歌大饗亦如之大喪與廞凡小祭祀小樂事皷􅉧掌六樂聲音之節與其和與音預和音禍釋曰應鼙也爾雅云大鼓謂之鼖小鼓謂之應徹歌於有司徹而歌雍也王氏曰鼗塤管簫堂下之樂也弦歌登歌擊石拊石皆堂上之樂下管擊應亦堂下之樂柷敔上下各有之書曰戞擊鳴球摶拊琴瑟以詠戞擊柷敔也此用之於堂上也又曰下管鼗鼓合止柷敔此用之於堂下也與廞從大師也鼓􅉧小樂事亦如大師六樂六代之樂也大不踰宫細不過羽五聲之節也琴瑟在上金革匏竹在下八音之節也小大清濁相應而不相凌則和矣瞽矇掌播鼗柷敔塤簫管弦歌諷誦詩世奠繫鼓琴瑟掌九徳六詩之歌以役大師釋曰有眸子而無見曰矇無眸子曰瞽樂職瞽為之以其善聽而審於聲音也播發揚其音也詩風雅頌之詩也諷吟也誦讀誦也瞍賦矇誦謂詩也詩世謂作詩者之時世也奠定之也繫屬之於此也丘氏曰諷誦其詩而及於世乃定樂章而繫之如商頌作於高宗之世云九徳六府三事韶樂之歌也六詩風賦比興雅頌是也鼓琴瑟被以九徳六詩之歌所謂弦歌也役謂聽役使原曰詩世奠繫者何也諷誦其詩必及其世乃定為樂章而編繫之也孟子曰誦其詩讀其書不知其人可乎是以論其世也則詩必繫之世乃可知其為人之實而諷詠其詞涵泳其徳想像其人然後以樂而播其聲詞故可以感鬼神和上下也苟不繫之世以實其人則大韶何以知其為舜大武何以知其為武王哉此詩所以必有序次時世而後别以六體也今詩經之中六體為重世次為輕是以雅鄭相雜漢儒不悟偽作詩序以定之後世遂不能辨皆以為孔門之舊本矣劉歆明言孝文時詩始萌芽一人不能盡其經或為雅或為頌相合而成毛氏之出最後詩序必出毛氏之手自謂傳之子夏以欺當時而排壓三家是時三家之詩並列學官毛說獨行於北海鄭𤣥北海人也故為之箋自是而後毛詩假康成之重獨得盛行於世毛鄭既孤行三家抵牾之迹遂絶後世乃以序冠於經文之上唐宋大儒莫之敢議以為大序孔子所作小序作於子夏是漢儒一時之偽能掩千載之目也今觀詩序國風皆季札觀樂之次不同無幾矣按孔子自衛反魯正樂之嵗與季子觀樂相隔六十餘年孔子明言放鄭聲今鄭衛淫詩何以俱存也自唐而下承舛聽訛皆以為大小序孔門所傳矣至朱子㧞出千載之見斷謂小序漢儒擬作獨於經中求作者之意盡去小序不以亂經可謂大有功於聖門矣然朱子知小序之非猶惑於大序之說是以風雅次序未之能明以孔子所放絶妖淫愁怨之辭得厠於先王大樂之間耳今觀瞽矇諷誦詩世奠繫之說則詩必表時世可知矣以今考之自周公而上極盛之詩也先儒謂之正風正雅乃當時朝廷家鄉邦國宗廟之樂章也今固當恊之聲律以復三代之治自周公而下至宣王亦盛時之詩也宜皆别以風雅頌之名恊之音律用於天下焉自平王東遷則詩亡而春秋作矣王政不綱諸侯變亂季子所觀乃孔子之未删定者也漢儒得於國史遽作序冠之可謂不知而作矣竊欲以風雅之變詩祖孔子作春秋與善去惡之㫖及思無邪與放鄭聲之言取其可以垂訓者列正風正雅之後其妖淫之詩另為編以俟君子以從放逺之義以合詩世奠繫之說不知何如眡瞭掌凡樂事播鼗繫頌磬笙磬掌大師之縣凡樂事相瞽大喪廞樂器大旅亦如之賔射皆奏其鍾皷鼜愷獻亦如之眡讀為視瞭音了頌音容相去聲鼜音戚釋曰眡瞭所相瞽亦兼以作樂播鼗者以鼗所用者衆也繫縣之於筍簴也頌或作庸功也磬在西方曰頌磬西成功之方也大射禮曰樂人宿縣于阼階東笙磬西南又曰西階之西頌磬東西大師之縣謂大師縣樂器兼掌之相瞽謂扶工孔子曰相師之道也大喪則陳器而不行大旅大軍旅也五百人為旅賔射王與諸侯射鍾鼓以為之節焉夜守戒之鼓擊聲疾數故曰鼜憂戚之義也愷獻者獻捷之時亦奏愷樂也典同掌六律六同之和以辨天地四方隂陽之聲以為樂器凡聲高聲䃂正聲緩下聲肆陂聲散險聲歛達聲贏微聲韽囘聲衍侈聲筰弇聲鬱薄聲甄厚聲石䃂音衮險彼義反韽音闇侈昌氏反筰側百反甄音震釋曰大師主於和聲故合隂陽之聲典同主於制器故辨天地四方隂陽之序太師既合其聲然後令典同制器故曰掌六律六同之和陽聲屬天隂聲屬地天地之聲布於四方各有隂陽之聲是為十二聲十二聲雜比而和之取中聲焉以作樂器欲其度數齊量之不亂凡聲生於形形異則聲異高鍾大上也形上大則聲旋衮於上正謂上下直直正則聲緩而無所動下謂鍾形大下下大也下大則聲出放肆陂謂偏陂陂則聲離散也險謂偏狹形偏狹則聲歛束達謂形微大中空大則聲有餘而若多微謂形微小中微小則聲闇而不明囘謂其形圓形上下四抱則其聲淫衍而無鴻殺也侈謂中央約也侈則聲迫筰出去疾也弇中央寛也弇則聲鬱而不出甄猶掉也形薄則聲戰掉形厚則聲如扣石無餘響也凡聲與形相摶而成觀其形可以知其聲凡為樂器以十有二律為之度數以十有二聲為之齊量凡和樂亦如之釋曰數本起於黄鍾始於一而二之歴十二辰而五數備其長則度之所起其餘律皆自是生之故樂器之度數制於十二律也䃂聲生於高肆聲生於下甄聲生於薄石聲生於厚高下厚薄之屬所制則有齊矣贏聲生於達衍聲生於囘筰聲生於侈鬱聲生於弇達囘弇侈之屬所容則有量矣故凡為樂之齊量又制之十二聲焉此形聲所以無過不及而皆得其中和也和樂亦如之鄭氏曰和謂調其故器也亦以十二聲律為準而齊量之也李氏曰度數齊量不出乎黄鍾黄鍾萬事根本度量衡之所由出制樂器為急焉蓋制琴瑟之類必以度度審則琴瑟之制取諸黄鍾之長制塤匏之類必以量量嘉則塤匏之制取諸黄鍾之容制鍾磬之類必以權衡權衡謹則鍾磬之制取諸黄鍾之重是金石絲竹匏土革木莫非黄鍾造之也其音安得不具黄鍾之音哉謂之曰以十二律為之數度無不欲其得黄鍾之音故耳故鍾磬雖屬金一黄鍾之金也鼓雖屬水一黄鍾之水也管簫柷敔雖屬木一黄鍾之木也琴瑟雖屬火一黄鍾之火也壎箎笙匏雖屬土一黄鍾之土也先王制樂器尚象於黄鍾故其所出者皆黄鍾之聲蓋中氣運於八方物兼八方而純和之氣備溥黄鍾於八音奏兼八音而純陽之聲備蓋聲具於器器出於物物産於其所屬之方八方盡天下之方八物盡天下之物八音盡天下之音有黄鍾之律然後有黄鍾之器有黄鍾之器然後有黄鍾之聲器其聲之本乎律其器之本乎典同者典黄鍾而已磬師掌教擊磬擊編鍾教縵樂燕樂之鍾磬凡祭祀奏縵樂釋曰教謂教眡瞭也鍾與磬皆編之十六枚為一架宫縣有特磬十二鎛鍾十二皆依次陳之以應其方之律也編鍾編磬皆磬師職之教眡瞭擊特磬編磬又教之擊編鍾也言擊編鍾則鍾之大者鍾師自擊之縵謂雜聲之和樂者記曰不學操縵不能安弦燕樂房中之樂所謂隂樂即二南也縵樂燕樂皆教其鍾磬祭祀奏縵樂祭之燕也或曰縵樂雜弄即今之調曲鍾師掌金奏凡樂事以鍾鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏凡祭祀饗食奏燕樂凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩掌鼙鼓縵樂釋曰金奏擊金以為奏樂之節金謂鍾及鎛二者不編獨縣而已以鍾鼓奏九夏鍾師兼言擊鼓者凡樂鍾與皷不相離皷有鼓師欲見先後次第故兼言之也九夏皆鍾曲名樂之大者以鍾鼓奏之有音節而無文辭王出入所奏謂之王夏尸出入所奏謂之肆夏牲出入所奏謂之昭夏四方賔來奏納夏臣有功奏章夏章表之也夫人助祭奏齊夏族人侍燕奏族夏客醉而出奏祴夏祴戒也公出入奏驁夏戒其驕傲也按九夏皆鍾之音節有聲無詞若投壺有魯鼓薛鼓之類必以鼓應之者以金革不相離也鄭康成遽因穆叔之言以為詩篇誤矣左傳固曰金奏肆夏工歌文王鹿鳴言金奏則無詞可知與工歌者異矣祭祀饗食奏燕樂以鍾鼓奏之也掌鼙鼓縵樂鼙小鼓縵樂雜弄之樂謂作縵樂則鍾師擊鼙和之言鼙鍾亦在也笙師掌教龡竽笙塤籥簫箎篴管舂牘應雅以教祴樂凡祭祀饗射共其鍾笙之樂燕樂亦如之大喪廞其樂器及葬奉而藏之大旅則陳之釋曰竽三十六管笙十三管竽宫管在中笙宫管在左籥如篴三孔其中則中聲其上下二孔則聲之清濁所由生也箎長尺四寸一孔上出篴笛同長三尺四寸六孔笙師皆教以吹之之法舂牘應雅皆祴樂所用教瞽矇與眡瞭於賔醉而出之時奏之舂牘以竹為之長者七尺短者一二尺其端有兩孔舂地以作聲名曰牘者賔醉恐有瀆於禮也應亦以竹為之長六尺五寸中有椎亦舂於地名曰應者賔歸恐不應乎禮欲其行與樂相應也雅状如漆筩而弇口長五尺六寸以羊韋輓之有兩紐亦舂於地名曰雅賔出恐其失禮欲其雅正也三器在庭築地為聲此則鄉飲鄉射之後賔出而奏陔樂也鍾笙與鍾相應之笙大旅則陳於饌次不涖其縣也鎛師掌金奏之鼓凡祭祀鼓其金奏之樂饗食賔射亦如之軍大獻則鼓其愷樂凡軍之夜三鼜皆鼓之守鼜亦如之大喪廞其樂器奉而藏之鼜音戚釋曰鼓考擊以作之也鎛小鍾也鄭氏曰金奏之鼓擊晉皷以奏鎛鍾也軍中夜戒之鼓有三故曰三鼜守鼜備守鼓也鼓之以鼗鼓何氏曰祭祀鼓其金奏所謂笙鏞以間也饗食亦如之所謂金奏肆夏也賔射則擊鎛鍾以歌射節大獻則擊鎛鍾以奏愷歌守國以鼓戒嚴則三鼓亦如在鍾師也韎師掌教韎樂祭祀則帥其屬而舞之大饗亦如之釋曰韎為赤色之韋此舞者所著故因以名官韎師旄人鞮鞻氏皆掌樂而命名不同者韎言其所服旄言其所執鞻言其所履韎東夷之服使其樂因使服其服屬舞者十六人也三方之樂不存於祭祀大饗之時惟用東夷東夷箕子之國孔子所欲居其樂有中國之風故也陳氏曰王者必作四夷之樂一天下也記曰納夷蠻之樂於太廟言廣魯於天下也先王之於夷樂雖或用之然夷不可以亂華哇不可以雜雅蓋亦後之而弗先外之而弗内也觀夾谷之㑹齊有司請四夷樂孔子曰吾兩君為好㑹夷狄之樂何為請有司却之然則齊魯納夷蠻之樂於太廟蓋陳之於門外而已唐之時皆奏於四門之外豈古之遺制與旄人掌教舞散樂舞夷樂凡四方之以舞仕者屬焉凡祭祀賔客舞其燕樂釋曰葛天氏之民操牛尾投足而歌旄人蓋其遺制也散樂者野人之樂夷樂者四夷之樂凡以舞仕者皆屬旄人蓋其所統皆夷人之善舞者燕樂有間燕之意籥師掌教國子舞羽龡籥祭祀則鼓羽籥之舞賔客饗食則亦如之大喪廞其樂器奉而藏之釋曰籥三孔生中聲而上下之律吕生焉樂之本也故文舞持羽龡籥詩云左手執籥右手秉翟記曰秋冬學羽籥是也謂秉翟以舞而龡籥以為節也鼓作之也舞亦以鼓為節廞樂器而藏之惟羽籥耳籥章掌土鼓􅃎籥中春晝擊土鼓龡􅃎詩以逆暑中秋夜迎寒亦如之釋曰土鼓以瓦為匡以革為兩面而可擊也􅃎籥以葦為管竅其上為三孔可吹也土鼓即記所謂蕢桴葦籥伊耆氏之樂王氏曰王業之起本於􅃎而樂之作始於土鼓本於籥逆暑迎寒祈年皆本始民事息老物則息使復本反始故所擊者土鼓所吹者􅃎籥其章用􅃎詩焉按中春晝書所謂日中陽於是而分故逆暑蓋民事之始終實闗天時之消長故必先之以逆暑逆如逆女之義自外而入於内以我為主謂陽常居大夏而主嵗功中秋夜書所謂宵中隂於是而分故迎寒迎如迎賔之義自内而出於外以彼為客謂隂常居大冬時出而佐陽萬物生於土反於土則土者物之終始也逆暑迎寒所以擊土鼔焉􅃎詩七月也當時必有􅃎詩周人相傳其詞質朴故有􅃎風􅃎雅􅃎頌之說厥後周公擬作以代之不獨雅頌亡而􅃎風亦亡矣若大田良耜諸篇則周公以後之詩豈可以當之哉凡國祈年于田祖龡􅃎雅擊土鼓以樂田畯國祭蜡則龡􅃎頌擊土鼔以息老物釋曰祈年祈豐年也田祖始耕田者謂神農也田畯古之先教田者爾雅曰畯農夫也祭蜡郊特牲曰天子大蜡八伊耆氏始為蜡嵗十二月合萬物而索饗之蜡之祭也主先嗇而祭司嗇也黄衣黄冠而祭息田夫也既蜡而休息民息老物者萬物助天成嵗事至此為其老而勞乃祀而老息之於是國亦養老焉月令孟冬勞農而休息之是也劉氏曰此三事皆奏􅃎詩或用其風重民時也或用其雅尊先嗇也或用其頌報成功也葉氏曰樂有詩而無書詩存則樂存詩亡則樂與之俱亡耳書曰詩言志律和聲此樂之本乎詩也樂由詩作故可因詩以觀樂無詩雖有鍾磬鼗鼓簫管尚遺古人之舊果可以言樂乎韶至齊而猶聞濩至魯而猶存必韶濩之詩尚存也詩苟不存武樂至萇𢎞商樂至戴公時已不傳矣今觀大師教六詩曰風賦比興雅頌瞽矇諷誦詩世掌九德六詩之歌此詩之所以為樂也大師大祭祀帥瞽登歌籥章龡􅃎詩􅃎雅􅃎頌則皆有詩也由今觀之九德九功之歌今不載於經射節四詩貍首不全􅃎雅􅃎頌今亦不存則詩之亡亦乆矣詩存則古樂傳詩亡則古樂廢今不以樂詩不存為憾而徒曰樂書不傳焉豈先王作樂之本哉今觀雅頌固無恙也以漢之詩使李延年恊之以唐之歌使吕才被之管絃尚足為樂誠能因三百篇以為樂則今樂何患不如古也鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌之燕亦如之釋曰鞮鞻革履也革去毛而未為韋非吉屨也蓋夷服四夷之樂東方曰韎南方任西方曰侏離北方禁劉氏曰王者設官掌四夷之樂示四夷之樂王化也故於祭祀賔客服其服奏其樂聲其歌以明王道之廣大也典庸器掌藏樂器庸器及祭祀帥其屬而設筍虡陳庸器饗食賔射亦如之大喪廞筍虡釋曰樂器如離磬崇鼎之屬歴代傳之以為寳也庸功也庸器征伐所得之金以鑄器而銘功也筍虡所以縣鍾磬之屬横曰筍植曰虡祭祀陳庸器示能守也饗食賔射陳之以華國也司干掌舞器祭祀舞者既陳則授舞器既舞則受之賔饗亦如之大喪廞舞器及葬奉而藏之釋曰丘氏曰成周樂舞之制有文舞有武舞文舞羽籥籥師掌之武舞干戈司干掌之然文舞未嘗無干故舜舞干羽于兩階武舞未嘗無羽故詩言公庭萬舞執籥秉翟是知文舞干不勝羽武舞羽不勝干此籥師之教國子所以專言舞羽吹籥文王世子亦云小樂正學干大胥賛之籥師學戈籥師丞賛之則亦教武舞矣舞器干羽之屬舞人綴兆行列既定則以武器授之舞訖則受而藏之賔饗皆有舞其授受亦如祭祀也國有大喪則廞舞器而藏之所謂四海遏宻八音也劉氏曰國子未成童之時所學小舞則此干戈當須輕小其制便於國子秉執囘旋故列在樂器之中而屬於大司樂也文王世子所謂春夏學干戈秋冬學羽籥則是舞勺舞象時所用之器司兵職曰祭祀授原闕今謂之思夢觭者竒也無所感無所思出於神運竒怪之夢故謂之觭夢無心感物為咸陟升也謂無所拘滯自有其夢鄭氏曰陟得也謂無心而得夢經運占夢以嵗時日月星辰為運鄭氏曰運當為煇是眡祲所掌十煇也王者於天日也夜有夢則晝眡日旁之氣以占其吉凶凡所占十煇每煇九變其術今亡劉氏曰王者之心天地萬物之心也故其心之有夢則日為之煇是以與日同占焉以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳以八命者賛三兆三易三夢之占以觀國家之吉凶以詔救政釋曰作龜作其辭於將卜以命龜王氏曰古之作事不殫一已之思慮明則謀之人幽則謀之神故其所以作龜而命之者有八焉征謂卜討伐及行役也鄭良霄曰先王卜征五年嵗習其祥是也象謂天象變動之休祥易曰天垂象見吉凶是也與者卜與人共事之成虧也謀者卜謀事之得失也果者卜所求之果否也至者卜所俟之至否也雨者卜時之雨暘瘳者卜疾之瘥愈國家欲卜此事則以此命龜也卜之龜筮之蓍參之夢則吉凶可以前知矣吉謂福祥凶謂禍烖詔告也既知吉凶乃預告王脩政以救之王氏曰邦事之八命以卜之龜故用三兆之法以筮之蓍故用三易之法以考之夢故用三夢之法作八命非特占之於龜亦驗之於筮叶之於夢而後已故洪範大疑謀及卜筮兩眡其從違以斷吉凶武王曰朕夢恊朕卜戎商必克者此也如是則國家之吉凶可以前知則詔王正厥事以救之也盖吉凶之變雖自乎天而其所以感召之者實存乎人知凶而脩政以救之則可以轉禍而為福矣古人有以君之三善言而熒惑為之退舍孰謂救政之不可為與凡國大貞卜立君卜大封眡高作龜大祭祀則眡高命龜凡小事涖卜國大遷大師則貞龜凡旅陳龜凡喪事命龜釋曰大貞大事求正於龜也立君以嗣位未定則卜之也封國以命諸侯可否則卜之也立嗣君天下之本也封諸侯一國之本也故為事之大眡高者用龜之腹骨骨近足者其部高眡龜骨高處作龜者以火灼之以作其兆也命龜謂告以所卜之事也涖臨也大事則宗伯涖卜小事則大卜自臨之貞龜則貞之於卜位不親命也凡旅謂水火兵災則旅於神示也陳龜則陳之於饌所而不卜與陳樂器同陳氏曰大卜或作或命或貞或陳其事不一喪祭輕於大貞則命龜大遷大師輕於喪祭則貞龜凡旅則陳龜而已考之儀禮卜人奠龜宗人眡高及坐命龜而後卜人坐作龜然則大卜於大祭祀凡喪事命之而不作則作者其屬也國大貞作之而不命則命者小宗伯也貞龜則不命陳龜則不卜也卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆凡卜事眡高揚火以作龜致其墨凡卜辨龜之上下左右隂陽以授命龜者而詔相之釋曰開龜者開龜之體去其外甲而存其下甲中有文可占吉凶分為四部曰方曰功曰義曰弓此占龜之法古有其書百二十體每體有十繇辭今不傳凡卜皆卜師眡高大事則太卜宗伯眡高揚猶熾也卜師揚火以作其龜之兆墨者兆之體也兆體旁舋微而不可辨故致其墨食則見而可辨矣書曰惟洛食龜有六種見龜人職凡卜必辨其種類所屬隨其所屬各有其法以為卜之方然後以授命龜而求卜者且詔相其禮儀也上者仰也下者俯也左左倪也右右倪也隂後弇也陽前弇也皆龜體也所卜者當各用其龜龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬以其方之色與其體辨之凡取龜用秋時攻龜用春時各以其物入于龜室上春釁龜祭祀先卜若有祭祀則奉龜以徃旅亦如之喪亦如之釋曰屬言非一也名以命之物以色之色𤣥行而首俯者天龜也為靈屬色黄行而首仰者地龜也為繹甲長前弇色青者東龜為果後弇色白者西龜也為靁首左倪色赤者南龜也為獵首右倪色黒者北龜也為若此其體也龜人辨之以精其術鄭氏曰東龜南龜長前後在陽象經也西龜北龜長左右在隂象緯也天龜俯地龜仰東龜前南龜郤西龜左北龜右各從其耦也秋取龜及萬物成也攻治也治龜骨以春是時乾解不發傷也龜室六龜各異室也上春夏正建寅之月釁者殺牲以血塗之神之也既釁則祭祀乎先卜謂卜師之有功德者不忘本也奉猶送也祭祀奉龜以徃待卜也旅奉以徃待陳也喪奉以徃待命也菙氏掌共燋契以待卜事凡卜以明火爇燋遂吹其焌契以授卜師遂役之釋曰燋灼龜之木契開龜之鑿也詩曰爰契我龜士喪禮曰楚焞置于燋在龜東楚焞即契燋謂炬其存火所以共卜之用也明火以陽燧取火於日而用之明潔之至也契之銳頭為焌以契之銳頭火而吹之其頭若戈鐏焉焌契既燃乃授卜師以卜師燃火作龜以致其墨是也菙氏因而賛相其事為卜師所役也占人掌占龜以八簭占八頌以八卦占簭之八故以眡吉凶凡卜簭君占體大夫占色史占墨卜人占坼凡卜簭既事則繫幣以比其命嵗終則計其占之中否簭音筮釋曰占人亦占筮言龜者簭短龜長以龜為主龜書有頌頌者占兆之辭八故即八命也命筮之辭以八簭占八頌者八簭即九簭也用其八以命簭之事合於龜頌之繇辭以命龜之事合於八卦之繫辭故曰以八卦占八故也占人先筮而後卜兩者相習俱作而兩眡其從違以斷吉凶也詩曰卜筮偕止㑹言近止是也卜以龜簭以蓍體色墨坼皆龜也而曰凡卜筮則筮亦占體也然必先簭而後卜詩曰爾卜爾筮體無咎言簭亦有體謂卦體也鄭氏曰體兆象也色兆氣也墨兆廣也坼兆舋也體有吉凶色有善惡墨有大小坼有微明尊者視兆象而已卑者以次而詳其餘王氏曰卜之事龜坼而後墨見墨見而後色著色著而後體備卜人先占坼史占墨次之大夫占色又次之衆占備焉而後君占體以斷吉凶事之序也故玉藻曰卜人定龜史定墨君定體據序事先後言之此先言君占體者尊卑之序也凡卜簭既事則繫幣謂禮神之幣也比其命謂書其命龜筮之辭而比之嵗終則計其占中否以考官占之得失而進退之簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶凡國之大事先簭而後卜上春相簭凡國事共簭釋曰易以卦言簭以數言定數然後成卦則簭定數於始卦成體於終也易有三則所立之名不同簭則九則所簭之事不一巫當為簭字之誤也簭之有九猶龜之八命簭更謂變更都邑咸猶僉也謂簭衆心歡否也式謂簭制作法式也目謂事衆簭其要所當也易謂簭變易之事比謂簭與民和比也祠謂簭牲與日也參謂車擇御與右也環謂環而攻之可致師與否也先簭後卜兼用卜簭而尊龜故後之吉凶取斷於龜也簭而不吉則不卜相擇也採擇其蓍草可用者以供用占夢掌其嵗時觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉凶一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢釋曰嵗時其得夢之年時也天地之㑹謂升降徃來之㑹隂陽之氣謂休咎旺相之氣日為太陽月為太隂星二十八宿屬陽辰十二次屬隂以嵗時天地隂陽日月星辰而占六夢之吉凶也王氏曰人之精神與天地同流萬物一氣也列子曰神遇為夢形接為事故晝想夜夢神形所遇一體之盈虚消息皆通於天地應於物類盖人之生也受命於天也賦形於隂陽故禍福妖祥成敗得喪之出於所夢者吉凶固無所逃矣鄭氏曰天地之㑹建厭所處之日辰隂陽之氣休王前後日月星辰謂日月之行及合辰所在春秋昭三十一年十二月辛亥之夜晉趙簡子夢童子倮而轉以歌旦而日食占諸史墨對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有適火勝金故弗克此以日月星辰占夢者也正夢者無所感動神靈自覺安平自夢者也噩夢者有所驚愕神動致夢思夢者覺時所想寐而見夢寤夢者魂惺而神遊若夢是寤而有夢也喜夢者心喜情動而夢喜之事懼夢者心有所恐懼神動而夢恐懼之事大凡人之所夢不出乎此六者六夢之中有可占者有不占者莊子曰至人無夢然孔子亦夢周公則夢亦人所必有者故惟正夢可以占吉凶妖祥盖人心之靈通乎天地善必先知之不善必先知之占夢者占此而已噩夢則神有觸而動於夢思夢則心思所求之切孔子夢周公是也寤夢則非夢也神所遊耳喜夢則因喜而致懼夢則因懼而感五者皆非正夢不可占也然亦可以驗心之邪正身之安危神之動靜志之緩切意之所隨而已故曰夢寐可卜學之淺深謂此也朱子曰人之精神與天地隂陽流通故晝之所為夜之所夢其善惡吉凶各以類至謂正夢也季冬聘王夢獻吉夢于王王拜而受之乃舍萌于四方以贈惡夢遂令始儺敺疫􅃕音釋儺音那釋曰聘如聘女之聘當迎新送故之際欲納來嵗之福故聘其吉夢欲其來也舎萌取菜之始萌而祭之欲去其萌芽之義乃遣惡夢而使去之也獨言正夢則下五夢不占可知正夢有吉有凶故獻而贈之也令令方相氏始儺以迎和氣敺疫以送戾氣也鄭氏曰季冬日窮于次月窮于紀星囘于天數將幾終於是發幣而問若休慶之云爾因獻羣臣之吉夢於王歸美焉詩云牧人乃夢衆維魚矣旐維旟矣此所獻之吉夢眡祲掌十煇之法以觀妖祥辨吉凶一曰祲二曰象三曰䥴四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想掌安宅叙降正嵗則行事嵗終則弊其事煇音運䥴許規反瞢亡鄧反隮作資釋曰煇謂日旁之氣輝光也妖則主凶祥則主吉觀妖祥所以辨吉凶也祲隂陽五色之氣浸淫相侵象謂隂氣附日而凝結成象如赤鳥夾日以飛也䥴者日旁氣刺日形如䥴也監者雲氣臨日上也闇者隂氣蔽日方盡而闇也瞢不光明貎隂氣蒙蒙日光瞢然也彌者横亘如白虹彌天而貫日叙者雲有片叚成列如山在日上也隮螮蝀升隮于日旁也詩曰朝隮于西想者雜氣象似以成形想也劉氏曰日者太陽之精出地則為晝照物則為生隂斜之象或祲於晝日光所灼莫不消除也今日旁有隂斜之氣干犯而不能消者陽剛之德衰日光為之微弱隂邪盛大莫克消除以成十者之異以洪範五行推之則人君無剛徤之德隂邪氣盛干犯日光謫見於天以示警戒也聖人設官以掌其事方有萌兆則詔於王而救政脩焉安宅叙降者謂人睹妖祥而不安其居者眡祲則以其灋為之安其居處也又為叙其妖祥而降之使之備其凶而應其吉若保章降凶荒之祲象是也正嵗則行事者謂行安宅叙降之事以預告乎下也弊斷也謂計其吉凶之中否多少也葉氏曰三卜三簭亦云足矣又有三夢之法六夢之占何耶曰此天地之㑹隂陽之氣黙有所交而人之精神心術潛有所感也若高宗以夢而得說武王以夢而克商豈虚也哉宣王考室考牧之詩以熊羆虺蛇而占男女以魚旟而占豐年室家則夢之有占尚矣是故致夢之法夏后氏作焉觭夢之法殷人作焉咸陟之法周人作焉其經運皆十其别皆九十此占書也太卜又賛以八命之事以占夢之吉凶亦足以詔王而救政事矣然夢之所感有六占夢乃以日月星辰占之盖精神心術之運與日月之行相交感鄭𤣥以運如眡祲之十煇夜有夢則晝視日旁之煇以占吉凶此以日占夢之一灋耳月與星辰亦可以此灋推乎可以見夢之吉凶猶神於卜筮也不然何以占夢曰季冬聘王夢聘之者用焉而奉幣以慶之也獻吉夢于王何以拜而受之拜云者受焉而屈躬以禮之也此豈先王欲神其夢而徒為是禮哉大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝釋曰告神之辭曰祝天所佑為福福所化為祥歴年之謂永正命之謂貞先王中心陳信於鬼神示而其誠不可見大祝以辭薦信於鬼神示謂郊祀社稷宗廟福祥謂國家福慶永貞謂民心永歸正道即六事也順謂四時恊順年謂年糓豐登吉謂斂五福而錫庶民化謂仁敷九有萬方向化瑞謂順氣成象天降甘露地出醴泉四靈畢見筴祝謂龜筮不違乎人大同而逢吉也此六祝皆祈天道恊順地道發生人道歸德然後吉祥發動瑞應疊至龜筮恊從雍熈太和之氣象也非國家之福祥永貞哉掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰說禜音詠釋曰六祝者因祭享祀而祝之用之於無事之時六祈者特為一事之祭而祈之用之於有災變之際同鬼神示者三者不和則災變生故為六祈以和合之類以其類而祭若類于上帝之屬造即其所而祭若造于祖之屬禬禳災集福之祭若禬國之凶荒民之札喪之屬禜禱水旱之祭若春秋祭禜之屬攻治去其害故剪氏以攻禜攻之之屬以辭責之之謂說若庶氏以攻說禬之之屬夫鬼神示之於人幽明異勢疑若不可同也然鬼神聰明正直依人而行先王與鬼神合其吉凶則同鬼神示固有道矣大祝之六祈其陳信於鬼神者如此亦所以與民同吉凶之患而已彼於禍福之際固未數數然也作六辭以通上下親䟽逺近一曰祠二曰命三曰誥四曰㑹五曰禱六曰誄誄音累釋曰以言達意謂之辭上下以位言親䟽以情言逺近以勢言即下六者所通也然此六者皆主於告神若夫訓告臣民則在内史祠者祠享先王嘏於主人之辭命者述其意以命神命龜之辭誥者古者大誥命必誥於廟作册之辭㑹者㑹同盟誓之辭禱告神求宥之辭誄哀死之辭夫辭命之作大矣古之誥誓辭命深淳爾雅後世不可及者皆太祝所以陳信於鬼神詩書所存可見大抵為神而作者出於太祝為人而作者出於太史後世乃謂祝史末流豈知先王之立祝史乃天下禮樂文章所自出乎辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號齍音咨釋曰號謂易其常名更為美稱用申尊敬之誠意也神號天神之號如曰昊天上帝是也鬼號宗廟人鬼各有美稱如云皇祖烈考是也示號地神之號如曰后土神祗是也牲號犧牲各有名如曲禮牛曰一元大武豕曰剛鬛羊曰柔毛是也齍號齍盛皆有名號如黍曰薌合梁曰薌箕稻曰嘉蔬是也幣號若玉曰嘉玉幣曰量幣是也神以敬為主詞不盡美不足以通神明而表心中之敬况斥其名者哉此六號所以不可以已也辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭釋曰此言飲食必有祭所以事鬼神也此九祭當是六享於宗廟皇尸祭食之法命者尸坐祝命尸取韭􅉁以祭也衍祭者尸取黍稷切肺以祭也炮祭者尸取所炮之豚以祭也周祭者賔尸依殽之序而徧祭之也振祭擩祭本同但振者先擩後振擩者不振也蓋擩者尸未食之前以爼中肺肝擩于醢祭于豆間振者尸將食之時既擩必振之乃祭也絶祭繚祭亦同繚祭者以手從肺本循之至于末乃絶以祭之絶祭者不循其本直絶肺以祭禮多者繚之禮畧者絶之共祭者膳夫所共於廟中太祝授王以當祭者或曰凡尸之食祭皆佐食工祝共之所以尊之也辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰裦􅉔九曰肅􅉔以享右祭祀􅉔即拜字裦音報釋曰稽首頭至于地稽留之乆而後興拜之至重者也頓首頭至地頓而便起拜之次重者也空首頭至手其中空闊所謂拜手者也振動者戰栗變動之拜在吉禮則為舞蹈在凶禮則為擗踊吉􅉔拜而後稽顙凶􅉔稽顙而後拜竒拜一拜也裦讀為報既拜矣又報一拜再拜是也肅拜但俯下手今時揖是也推手曰揖引手曰肅不下拜俯下其手而復引之禮介者不拜故曰為事故敢肅使者陳氏曰太祝言禮之重者則先稽首而繼之頓首空首振動言禮之輕者則先竒拜裦拜而繼之肅拜盖頓首空首振動禮之漸殺者也裦拜肅拜禮之尤殺者也享右接人也或享尊在已上者或右尊在已右者祭祀接神也或備物以祭而拜或侑助尸食而拜疏曰稽首拜中最重臣拜君之禮哀十七年公㑹齊侯于蒙孟武伯相齊侯稽首公拜齊人怒孟武伯曰非天子寡君無所稽首又公如晉孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣君拜臣下當從空首拜其有敬事亦稽首周誥曰周公拜手稽首成王亦拜手稽首是已凡自敵者皆從頓首拜陳氏曰春秋時晉穆嬴抱太子頓首於趙宣子魯季平子頓首於叔孫則頓首非施於尊長之禮凡大禋祀肆享祭示則執明水火而號祝隋釁逆牲逆尸令鍾鼓右亦如之來瞽令臯舞相尸禮既祭令徹隋許規反釋曰大禋祀祭天圜丘肆享宗廟祭也祭示祭地方澤明水火司烜所共以鑑取水於月以燧取火於日以給烝烹示至潔而清明者也號六號祝六祝先號而後祝隋尸之祭釁薦血之事逆牲則祼後王出廟門而迎牲逆尸者向祭之晨王出廟門而逆尸隋釁逆牲逆尸以鍾鼓奏肆夏昭夏也右謂尸食而右之皆太祝令之也來瞽令臯舞樂師詔之太祝來之也相尸禮延其出入詔其坐作也既祭歌雍以徹祭亦太祝令之也大喪始崩以肆鬯渳尸相飯賛斂徹奠言甸人讀禱付練祥掌國事國有大故天烖彌祀社稷禱祠大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝釋曰肆鬯謂陳尸設鬯也渳尸以鬯浴尸言猶語也禱六辭之屬甸人喪事代王受𤯝災太祝為禱辭語之讀宣使以禱于籍田之神付當為祔祔者虞祭卒哭後祔祭于祖練者十三月小祥而練祥二十五月而大祥除衰杖掌國事謂辦䕶喪事也彌猶徧也大故天烖當祈於神太祝主徧祀社稷及諸所禱神示既則祠之以報焉大師大興師以討伐宜于社軍將出則宜祭于社取社主以行造于祖軍出造于祖廟取遷主以行載以齋車設軍社軍之所在必設軍中之社於其地類告上帝也有事四望謂軍行所過望祭四方山川之神及軍有功而歸獻捷于社則大祝居前先以祝辭告之也大㑹同造于廟宜于社過大山川則用事焉反行舎奠建邦國先告后土用牲幣禁督逆祀命者頒祭號于邦國都鄙釋曰王與諸侯㑹同或時見或殷見或在畿内或在畿外皆告于廟宜于社而行所過名山大川必祭以告行反必釋奠以告至釋奠者設饌薦獻酌奠而已無迎尸以下之事古者釋奠或施於山川或施於廟社或施於學新建邦國之城先告地示者所司故也用牲幣所以禮神禁督逆祀命者謂不稟天子命令而僣於祀典者禁之頒祭號使得祭者頒定其神之名號使齊一也小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺辠疾彌亡爾反釋曰非天地宗廟神示而當祭祀之者小祝所掌也侯候也侯以候福之將至禳以却禍之將来禱以先事而求祠以後事而報皆事之小者小祝將事則掌其祝號也福則無禍祥則無災故欲祈而得之豐年則百穀咸登故欲順而應之先期而迎之曰逆因變而安之曰寧彌與弭同恒風恒暘皆反休而為咎故祭以寧之烖天患兵人難故祭以弭之天降罪罰札瘥其民為政者之所恐懼也故設祭以禳之大祭祀逆齍盛送逆尸沃尸盥賛隋賛徹賛奠凡事佐大祝大喪賛渳設熬置銘及葬設道齎之奠分禱五祀釋曰送逆尸送徃迎来也沃尸盥太祝相尸禮小祝沃尸盥賛隋尸始入室拜妥尸尸隋祭以韭葅祝云既祭命徹諸宰君婦徹時小祝賛之奠奠爵也祭祀先奠後徹反言之者明所佐大祝非一也設熬棺既蓋熬黍稷設於其旁所以惑蚍蜉也銘書死者名於旌以識之也齎猶送也齎道之奠遣奠也又分禱五祀者所以告王喪之行也大師掌釁祈號祝有㓂戎之事則保郊祀于社凡外内小祭祀小喪紀小㑹同小軍旅掌事焉釋曰軍行以牲血釁鼓而祈成功故釁祈當其時則掌其號與祝也保郊保神壝之在郊者社不在郊無所事保故祀之而已保郊所以防患祀社所以弭兵事祝號禮儀之事大祝掌其大小祝掌其小也喪祝掌大喪勸防之事及辟令啟及朝御匶乃奠及祖飾棺乃載遂御及葬御匶出宫乃代及壙說載除飾小喪亦如之掌喪祭祝號王弔則與巫前掌勝國邑之社稷之祝號以祭祀禱祠焉凡卿大夫之喪掌事而歛飾棺焉匶音舊說哇活反釋曰勸謂執纛居匶前以勸帥前引也防謂執披以防傾側也辟辟除其塗令啓棺菆疏曰天子七月而葬七日殯殯時以椁菆塗其棺及至葬時除菆塗棺所謂辟也及朝謂將葬朝於廟而後行喪祝為御匶也奠朝廟奠也祖謂既朝而祖於庭飾棺帷幌之屬也遂御者執翿居前郤行為節度乃代者喪祝二人更相代也說及壙說載下棺也除飾去棺飾也䘮祭虞祭也王弔公卿大夫之喪則祝與巫以桃茢居王前也勝國所誅討者社稷亡國之社也存之重神也斂棺飾斂諸有司所當共者也甸祝掌四時之田表貉之祝號舎奠于祖廟禰亦如之師甸致禽于虞中乃屬禽及郊饁獸舎奠于祖禰乃斂禽禂牲禂馬皆掌其祝號貉亦作禡舎讀為釋禂音誅饁于輒反釋曰貉師祭也五表以祭故謂之表貉陳氏曰古人祭貉於立表之處無壇壝其置甲胄弓矢於神座之側建稍於神座之後此師祭也舎奠于祖廟禰廟者告將時田也夫四時之田必在近郊然亦告于祖禰者以人君出入不可不謹也師甸用師以田也田畢虞人植旌旗於所表之處令獲者各致禽其中甸祝㑹而屬之各以其類聚之也饁饋也以所獲饋于郊薦于四方又以奠于祖禰告至也歛禽者擇取三十入于腊人以為乾豆備祀享焉禂禱也斂禽以祭牲牢之神及馬祖之神詩曰既伯既禱者此之謂也詛祝掌盟詛類造攻說禬禜之祝號作盟詛之載辭以叙國之信用以質邦國之劑信釋曰盟詛以求於人類造攻說禬禜以求於神此民之所不能免也先王與民同患因為典禮置官以掌之也㰱血以詔明神謂之盟渝盟則詔明神以殛之謂之詛盟詛之時用六祈則詛祝掌之也載辭為辭而載之於策次用牲加書于其上也以叙國之信用者載書之辭所以叙明國之信者而用之也質成也劑謂盟載之約也以約信之詞書於劑以成諸侯之信也司巫掌羣巫之政令若國大旱則帥巫而舞雩國有大烖則帥巫而造巫恒祭祀則共匰主及道布及蒩館凡祭事守瘞凡喪事掌巫降之禮匰音丹蒩子都反瘞於側反釋曰男巫女巫皆不預為員數司巫則羣巫之長故掌其政令雩旱祭也帥男女巫而舞吁嗟来雨魯僖公欲焚巫尫以其舞雩不得雨也巫恒巫之有常而知幽明之故者為人所尊信故名巫恒國有大烖則帥羣巫造之以求所以祈禳之方焉主者神所依匰者盛主之器也道布神巾也中霤禮曰以功為道布屬于几也蒩之言藉也以茅為藉祭食有當藉者館所以承藉若今筐也士虞禮曰苴刌茅長五寸實于筐守瘞謂若祭示有埋牲玉者則守之祭畢則去之巫降者人死骨肉歸于土精神陟于天故喪事則巫掌降其精魄之禮焉男巫掌望祀望衍授號旁招以茅冬堂贈無方無筭春招弭以除疾病王弔則與祝前衍讀為延聲之誤也釋曰望祀者望而祀之望衍者望而衍之或曰望祀四望之祀望衍四方百物之類衍言其多也授號以祭之名號授之游魂浪􅑂失位無依為厲於人者束茅以招而祭之冬則贈送不祥與季冬贈惡夢之贈同一於堂行贈送之禮劉氏曰冬者嵗之窮理宜推故以納新也况堂乃人之所寢處而安之者不宜有邪氣以妨春陽之来也不宜有妖􅑂以礙吉祥之至也無方者巫與神通言當東則東當西則西四方皆可也小大多少莫不除之故曰無筭春陽既来則亦祭以招吉祥以弭去禍􅑂則疾病可除矣與祝前與喪祝也弔用巫祝前道以祓除不祥臨死者故也女巫掌嵗時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖歌哭而請暵呼旱反釋曰嵗時祓除如今三月上已脩褉之類釁以香薫浴以草藥沐浴皆乘隂陽代謝之時為之今醫方猶爾旱暵帥女巫而舞助隂氣也后弔則與女巫女祝前后如王禮也大烖歌哭以請有歌者有哭者以悲哀感神靈也原曰巫者所以通神明去不祥迎福禳烖者也曷可少之世儒咸曰先王之世正道明邪說息安有巫祝之事此未明天地隂陽之理也易曰用史巫紛若吉國語曰民之精爽不携貳者而又能齋肅衷正其智能上下比義其聖能光逺宣朗其明能光照之其聰能聽徹之在男曰巫在女曰覡是豈後世淫巫左道治符水厭勝之術者哉雖然今之巫覡固非古矣特以今之設官自漢以來皆闕此職故淫祀謟祭無所不至邪誕妖妄誑惑愚民以至於今雜亂極矣神人舉不得其所矣夫幽之與明猶隂之與陽不可偏去者也是宜以今之巫覡之實理正以古人之灋則其禮儀事務必有所當講者理幽之道得則理人之道可無憾也奚可以今之巫覡皆非實理而為正道所絶哉太史掌建邦之六典以逆邦國之治掌灋以逆官府之治掌則以逆都鄙之治凡辨灋者考焉不信者刑之凡邦國都鄙及萬民之有約劑者藏焉以貳六官六官之所登若約劑亂則辟灋不信者刑之辟婢亦反釋曰六典八灋八則掌於太宰太史又掌焉者太宰掌其治太史掌其書也逆迎也為王迎受其治也凡邦國官府都鄙之吏有爭其舊典是非者必就太史考之其與所藏不合者則治之以刑約盟辭劑劵書也約劑之書其正登於六官其副亦藏於太史如約劑亂不可質則太史開所藏之貳而叅考之其有不合者亦治以刑也王氏曰天子制灋臣下守灋是宜承式而行謹度而循苟辨而不信事理妄㑹是奮其私智將至於亂灋矣然則考其辨灋所以伸在下之情刑其不信所以杜好辨之源也約劑所以輔信今司約掌邦國萬民之約劑矣盖六官所藏約劑有藏於司約者太史又藏焉所以貳六官之所藏而參考之故也司約不信者服墨刑其大亂則殺亦以約其罪之輕重也正嵗年以序事頒之于官府及都鄙頒告朔于邦國閏月詔王居門終月釋曰中數曰嵗朔數曰年中朔不齊正之以閏太史日官也作厯以授時使民以序而作事也頒之于官府都鄙者先王上以因天之時下以成人之事故先布厯於官府次及於都鄙王國既定然後頒告朔於諸侯諸侯藏之祖廟至朔朝於廟告而奉行之居門居路寢之門也明堂路寢皆有五室十二堂四門每月視朔聽政於堂王居必隨日月所㑹閏月無所㑹之次故居其月之門中左扉葉氏曰明堂有五室王者南面而立向明而治故總謂之明堂匠人曰夏世室殷重屋周明堂夏官𨽻僕掌五寢鄭氏以為五廟之寢明堂有五室故有五寢明堂之名不見於周禮而見於考工記意在當時或稱為寢廟與天子十二月既有常居閏月非常月則太史詔王居門終月說者謂聽朔於明堂門中退處路寢門中玉藻曰天子聽朔於南門之外是明堂在南門之外每月聽朔於此又曰閏月則闔門左扉立於其中彼謂之立是閏月聽朔則立於明堂門中此謂之居是聽朔而退則居於路寢門中如此則路寢與明堂門相通故知其為寢廟矣周禮十二月所居之制固無明文然上文曰頒告朔於邦國下文曰閏月詔王居門則知聽朔必於明堂而閏月則在門矣先王重告朔之禮而閏月亦謹所居者盖閏以正時時以序事書曰以閏月定四時成嵗時以閏定事以閏成可不謹乎不然則古人制字何取於王在門而謂之閏也大祭祀與執事卜日戒及宿之日與羣執事讀禮書而恊事祭之日執書以次位常辨事者攷焉不信者誅之大㑹同朝覲以書恊禮事及將幣之日執書以詔王釋曰執事太卜之屬與卜日者當視墨戒謂前期十日散齊也宿謂前祭三日致齊也羣執事凡有事於祭也祭之儀灋度數具載於禮書王朝五禮之書也太史掌焉故與羣執事讀禮書恊合其事行禮也位常禮儀節度各有常位故當祭之日太史執書而次序之使合於禮也太史掌書掌禮故辨禮事之人皆考信於書有抵冒違犯者太史誅讓之王朝五禮皆有書朝覲㑹同賔禮也太史執書而恊其事防失禮也及諸侯將幣廟中三享之時禮之大者太史亦執書詔王以恊其事也大師抱天時與大師同車大遷國抱灋以前大喪執灋以涖勸防遣之日讀誄凡喪事攷焉小喪賜諡凡射事飾中舎筭執其禮事釋曰太史知天文故大出師征伐之時抱天文之書以從行隨時以觀天也大師樂官之長執同律以聽軍聲太史以占星象而知天道大師以聲律而知天道故同車共察軍行之善否也大遷都營建都城太史掌營國之灋即五禮軍禮之中大封大役之事也抱灋以前先至其所營度也執灋以涖者灋即五禮之凶禮有制度儀等之詳故稱灋即禮書也涖之亦執書而恊事也勸防引六紼也遣將行時祖廟大奠也誄者哀死而述其行諡者節惠而易其名誄者事之大叙述王之功行朝廷之事也故太史讀之諡則卿大夫之行太史叙之故詔王賜之也喪事攷焉亦攷之凶禮之書也中盛筭之器也設筭於中以待射而釋之記其中之多寡此大射之禮其書皆掌於太史故執其禮事也小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱大祭祀讀禮灋史以書叙昭穆之爼簋大喪大賔客大㑹同大軍旅佐太史凡國事之用禮法者掌其小事卿大夫之喪賜諡讀誄釋曰邦國之志謂列國記其山川風土物産貢賦之書春秋所謂周志國語所謂鄭書是也奠定也世則帝系世本之屬小史主定之父子相繼為世世所自出為繫父昭則子穆父穆則子昭定其繫世則知祖宗之本原辨其昭穆則知世代之倫序忌謂死者之日諱謂死者之名詔告王之忌諱使人當事而不犯也禮書禮之全書灋禮之制數太史執書小史則讀禮灋以戒百官也昭穆有尊卑爼簋之數有多寡小史按書而叙之五禮之事皆佐太史小事則自掌之卿大夫之喪則小史為之賜諡讀誄所謂掌其小禮事也馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位釋曰嵗謂嵗星所在每嵗移一舎自攝提格至赤奮若凡歴十二舎為一紀則有十二嵗之位月斗柄所建每月移一辰自建寅至建丒凡歴十二朔為一嵗則有十二月之位辰謂日月所㑹自𤣥枵至娵訾為十二辰之位十日謂甲乙至壬癸為十日之位二十八星謂赤道旁之經星自角亢至翼軫為二十八宿之位辨其叙事者東作南訛西成朔易有先後之序也㑹天位者周天三百六十五度四分度之一嵗月日星辰之行俱不失其度而可為時事之候蓋太史正嵗年以叙事馮相氏於是乎辨之以合其常位也冬夏致日春秋致月以辨四時之敘釋曰致者至也致日致月以土圭立表以度其至否冬至日在牽牛景長丈三尺長至也夏至日在東井景長尺五寸短至也日者實也必於長短極時致之故以冬夏春分日在婁月上弦於東井圓於角下弦於牽牛秋分日在角月上弦於牽牛圓於婁下弦於東井月者闕也必以長短中時致之故以春秋日之長短月之盈虧以四時致之罔有差忒是之謂辨四時之叙王氏曰此皆以土圭立表以度其至否典瑞云土圭以致四時日月者此也保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶釋曰占候者以星為主天星謂經星緯星也志古文作識記也五星有贏縮圓角超舎而前出為嬴贏為客晚出為縮縮為主圓角者五星更王相休廢其色不同王則光芒相則内實休則無角不動搖廢則少光色辰謂日月所㑹日有薄蝕暈珥月有盈虧朓側匿之變盈虧者三五而盈三五而缺朓側匿者晦而月見西方謂之朓朔而月見東方謂之側匿者變動無常也而天下之妖祥禍福之遷運於下者實應之故保章氏隨占而記載其變動之順逆而辨其吉凶之大小深淺以詔為國者脩救政也以星土辨九州之地所封封域皆有分星以觀妖祥釋曰星土星所主土也封猶界也辨九州之地所封則角亢氐兖州也房心豫州也尾箕幽州也斗牛揚州也虚危青州也室壁并州也奎婁胃徐州也􅄧畢冀州也觜參益州也井鬼雍州也栁星張三河也翼軫荆州也九州皆有星主之觀妖祥則彗星客星犯於其宿屬何分野主何妖祥五星當在其宿而盈縮失度亦如之鄭漁仲曰國有分星蓋古人封國之初命以主祀之意昔堯舜封閼伯於商丘主辰則辰為商星商人是因封實沈於大夏主參則參為夏星唐人是因唐後為晉則辰為商星參為晉星其来乆矣非因封國嵗星所在始有分星也漢魏諸儒言星土者或以州或以國辰次度數各因當時歴數與嵗星遷徙不可為据方戰國未滅時星象之言見有明驗今則同在畿甸之内或者又執漢書地理求之則非也善乎唐一行之言十二次也惟以雲漢始終言之雲漢江河之氣也認江河脉絡於兩戒識斗羅升沈於四維下參以古漢郡國其於區處分野所在如指諸掌盖星有氣耳雲漢也北斗也五星也無非是氣一行之學其深矣乎以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之䘲象以十有二風察天地之和命乖别之妖祥相去聲釋曰嵗謂太嵗嵗星與日同次之月斗所建之辰也嵗星為陽右行於天太嵗為隂左行於地十二嵗而小周相者色相也嵗星欲其光明潤澤赤而角則其國昌赤黄而沈其野大穰故必占其色相色相變異則天下之妖祥可得而知矣王氏曰分星經星也故有所主之封域嵗星緯星也異於分主則無常主矣占其所見之相有順逆盈縮伏見進退之不同而妖祥著於天下矣物色也雲有五色可辨吉凶鄭氏曰以二分二至觀雲色青為蟲白為喪赤為兵黒為水黄為豐年故春秋傳曰凡分至啟閉必書雲物為備故也豐有年也荒饑饉也氣為祲形為象降之者下其祲象於國使民知之使未至而為之備也十二風者十二辰皆有風吹其律以知和否艮為條風震為明庶風巽為清明風離為景風坤為凉風兊為閶闔風乾為不周風坎為廣莫風四維艮為丒寅巽為辰巳坤為未申乾為戌亥其風各二故曰十二風八風本乎八卦傳曰舞以行八風謂此也風生於天地之氣以風察天地之和不和則命乖别之乖則異而不同别則離而不合不和所致也故命其妖祥以告人使知所備焉然乖别在人而妖祥先見於風則人與天地流通萬物一氣故也凡此五物者以詔救政訪序事釋曰五物謂日月星辰之變動星土辨九州十二嵗五雲物十二風也以此五物測隂陽之和否察天地之逆順以詔王反躬務徳以脩救政使臣下咨訪救政之事所當先後緩急也丘氏曰詔救政於上則人君知脩省之道訪序事於下則人臣知警戒之意葉氏曰馮相保章何以列於史官之中春秋傳曰楚有雲如衆鳥夾日以飛楚子使問於周太史則太史固司天道月令曰太史守典奉灋司天日月星辰之行則二官屬之太史固也皆稱氏者以其有世功而氏其官猶重黎之世序天地也馮相則司天文之常保章則司天文之變司其常以辨叙事所以敬授人時司其變以詔救政所以克謹天戒且如星見大辰梓慎知宋之將火此以星土觀妖祥也嵗紀𤣥枵禆竈知楚子之將死此以嵗相觀妖祥也梓慎望雲而知宋鄭之多喪則以雲物而辨其吉凶矣師曠歌風而知楚師之無功則以風而命乖别矣保章之詔救政以此也叙事者馮相之常救政者保章之變然保章之救政必訪馮相之叙事以此見二官其職實相通也内史掌王之八枋之灋以詔王治一曰爵二曰禄三曰廢四曰置五曰殺六曰生七曰予八曰奪釋曰枋與柄同言八柄當自王出也太宰既以詔王内史又居中貳之殺即誅也太宰之職重所執者其權賛王以行之也内史之職親所掌其灋考其當否得以將順匡救焉王氏曰太宰八柄之序先慶賞而後刑威於慶賞則先重而後輕於刑威則先輕而後重勸賞畏刑之意也内史則慶賞刑威雜而不知其孰先主於守灋而不與其道揆之意也執國灋及國令之貳以攷政事以逆㑹計掌叙事之灋受納訪以詔王聽治釋曰上以道制而下守之為法上以命使而下稟之為令皆有書内史則掌其副貳也政事即典灋則之於政事内史考百職之奉與否又以共逆其㑹計之要書而知其得失善惡而誅賞也叙事事治先後也人臣陳言於上為納人君答詢於下為訪受納訪者受其所納之言與其所訪之對也内史所掌叙事之灋者有便於民先王不任已以為明察必納訪於臣而使内史受焉便者因之不便者革之損益必利於民然後可以治天下故先受納訪然後詔王聽治龍之於舜山甫之於宣王是其職也凡命諸侯及孤卿大夫則䇿命之凡四方之事書内史讀之王制禄則賛為之以方出之賞賜亦如之内史掌書王命遂貳之釋曰命王命也諸侯五等邦君典命四命為大夫加一等出封為子男策命者以簡䇿書王命命大夫亦策命士則不䇿命也春秋傳曰王命内史叔興父䇿命晉侯為侯伯其文曰王謂叔父敬服王命以綏四國紏逖王慝晉侯三辭從命受䇿以出此命晉文之辭也四方諸侯有事以書奏王内史則讀其書以示王也禄田禄仕者之俸也賛為之為其文辭也方版也書其辭於方版出而授之賞賜加以田禄也如之亦賛為之辭也制禄之方司禄受之賞賜之方職嵗受之皆考於八枋之法不得而濫受之也王言之出為命内史載而書之貳副也寫而藏之以待有所考也外史掌書外令掌四方之志掌三皇五帝之書掌達書名于四方若以書使于四方則書其令釋曰上出為命下稟為令故内史書内謂之命外史書外謂之令王之詔令出於外則外史書之鄭氏曰外令王命下於畿外也志記也四方之志若晉之乘楚之檮杌魯之春秋是也丘氏曰古者諸侯無私史諸侯國史記國中之事以達於天子天子又時巡以察之故列國之史皆藏周室三皇五帝之書上古之書也傳所謂三墳五典八索九丘之類是也故掌四方之志則下以知風俗之所尚掌三皇五帝之書則上以考古昔之所行書名六書之名義㸃畫聲象之屬達之四方欲其同文也小行人九嵗諭書名盖外史達之諸侯九嵗慮其不二又使行人諭之則天下之書莫不同文矣此一道徳以同俗之事也若使者奉詔令以使於諸侯外史則書其令而授之丘氏曰令猶今言制勅也書猶今言制書勅書也内史猶今言内制翰林也外史猶今言外制舎人也凡䇿命之出皆黜陟予奪大小臣工爵禄之事其與人主圖之者冡宰也而上意之然否師言之恊否非有文墨議論之士講求參酌或不當於功罪而褒貶損益之文或作於好惡往徃傷王之體此二史所以立也御史掌國都鄙及萬民之治令以賛冡宰凡治者受法令焉掌賛書凡數從政者釋曰治令者凡治皆出於治典六典八則與官成也冡宰頒之邦國都鄙御史則以治令考察其從違而繩紏之必如其法所以賛冡宰也法令皆御史書之故凡為治者從而受之王有命當以書致之則賛為辭若今尚書作詔文數從政者自公卿下至於庶人在官者皆從政也不可不知登下多寡之計故有凡數御史當紏察之若今御史掌班簿吕氏曰御史之名見於周官以中下士為之特小臣之傳命令者耳至於戰國其職益親故獻書多云獻書於大王御史澠池之㑹各命御史書事而淳于髠亦曰御史在前執法在後是掌記事紏察之任也至秦人主自親事以操御臣下侍御僕從其勢益重而御史大夫遂與丞相分權矣巾車掌公車之政令辨其用與其旗物而等叙之以治其出入王之五路一曰玉路錫樊纓十有再就建大常十有二斿以祀二曰金路鉤樊纓九就建大旂以賔同姓以封三曰象路朱樊纓七就建大赤以朝異姓以封四曰革路龍勒條纓五就建大白以即戎以封四衛五曰木路前樊鵠纓建大麾以田以封蕃國錫音陽樊步干反斿音留條讀為絛前音剪鵠户篤反釋曰公猶官也用謂祀賔之屬旗物謂太常以等序之以封同姓異姓之次序掌政令以治其出入凡公車之數與其新故成毁無不周知之玉路以玉為餙玉者陽精之純故祀天必乘玉路錫馬面當盧刻金為之詩所謂鉤膺鏤錫是也動則有聲所以養聦樊馬大帶纓馬鞅也當胷以削革為之樊與纓皆以五采罽餙之所以養明五采一匝為一就就成十有二全數也太常九旗之畫日月者正幅為縿斿則屬焉王氏曰玉德之美也王所乘玉路備徳之美然後可以格神而享之故玉路王乘之以祀欲王之雖在道途跬步不敢忘乎徳也金路以金為餙鉤婁額之鉤也金路無錫有鉤亦以金為之其樊及纓以五采罽餙之而九成大旂九旗之畫交龍者以賔者以㑹同賔客同姓以封謂王之子弟率以功徳出封者也象路以象為餙無鉤以朱餙勒而其樊及纓以五采罽餙之七成大赤九旗之通帛以朝日視朝也異姓王甥舅也革路輓以革而漆之龍駹也以白堊餙韋雜色為勒其樊及纓以絛絲餙之而五就不言樊脫字爾大白商之旗猶周人大赤蓋象正色也即戎謂兵事四衛四方諸侯守衛者蠻服以内也木路至質無文以淺黒色餙韋為樊鵠色餙韋為纓不言就省也大麾黒色主殺為事王出田則乘之蕃國之君以此封之王氏曰太常象天有日月焉大旂象春有交龍焉大赤象夏南方之物也大白象秋正西方之物也大麾象冬正北方之物也王后之五路重翟鍚面朱總厭翟勒面繢總安車彫面鷖總皆有容蓋翟車貝面組總有握輦車組輓有翣羽蓋重直龍反厭於渉反繢户對反鷖鳥兮反釋曰重翟用翟之羽或摇或翬重二以餙車蔽錫面餙馬同玉路也朱總馬勒直兩耳與兩鑣以朱為總此后從王祀先王先公所乘也厭翟鱗次翟羽相厭為餙不重之也勒面如王龍勒之韋為當面餙也繢書文也詩碩人曰翟茀以朝謂諸侯夫人始来乘翟蔽之車以朝見於君也此從王見賔客則乘之安車坐乘車凡婦人車皆坐乘特無翣無蔽者命之曰安車以其不餙之羽與四者異也彫面謂刻革為馬面之餙鷖總青黒色以繒為之車皆有容盖蔽之安車無蔽后朝見於王所乘有安處之義容車帷也盖車盖也翟車不重不厭以翟餙車側爾貝面貝餙勒之當面也組總以織組為總也有握有帷幕也有握則無盖矣后所乘出親桑也輦車不言餙后居宫中從容所乘但漆之而已為輇輪人輓之以行有翣所以禦風塵以羽作小盖為蔽日也陳氏曰祭祀賔客行禮也故有容盖出桑適逺也故有幄朝王不必蔽翣宫中不必蔽幄也王之喪車五乘木車蒲蔽犬􅍜尾櫜䟽餙小服皆䟽素車棼蔽犬􅍜素餙小服皆素薻車薻蔽鹿淺􅍜革餙䮾車萑蔽然􅍜髤飾漆車藩蔽豻􅍜雀飾薻音藻萑音丸釋曰木車不漆者蔽車旁禦風塵者蒲蔽以蒲為蔽􅍜覆軾也犬􅍜以白犬皮為􅍜也尾櫜又以其尾為戈㦸之弢疏飾麄衣飾二物之側小服刀劒短兵之衣此始遭喪所乘備奸也書曰以虎賁百人逆子釗亦為備焉素車以白土堊車也棼讀為薠蔽薠麻以為蔽其􅍜服皆以素繒為縁此王卒哭所乘薻水草蒼色以蒼土堊車以蒼繒為蔽鹿淺􅍜以鹿皮為覆笭又以所治去毛者縁之此既練所乘䮾雜色䮾車邊側有漆飾也萑細葦席也以為蔽者漆則成藩即吉也然者果然獸名也髤漆之亦多黒小者此大祥所乘漆車黒車也藩漆席為之豻胡犬也雀黒多赤少之色韋也此既禫所乘服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車凡艮車散車不在等者其用無常凡車之出入嵗終則㑹之凡賜闕之毁折入齎于職幣釋曰服車服事者之車夏篆五采畫轂約也夏縵亦五采畫但不瑑爾墨車黒漆之而不畫棧車素之而不漆役車方箱可載任器以供役王氏曰貴而孤卿賤而庶人率皆參稽其徳位之隆殺以為之制度以立之差等則徳不稱焉有所不用也位不稱焉有所不敢也上不得以偪下下不得以僣上雖有桀驁者不敢干越焉是乃所以正名分之大而杜僣竊之端與精製曰良麄制曰散自役車以上皆在等者其用固有常矣餘或良或散惟所用無常也出以給官用入用罷歸官至嵗終則總㑹計完敗多少以入計㑹也凡賜闕之者凡賜無常惟上所用則闕而不㑹至尊不可以有司之灋制之齎與資同財也乗官車毁折者入財以償繕治之直入于職幣職幣主受給官物所用之餘者既得其資還與車人繕治之大喪飾遣車遂廞之行之及𦵏執蓋從車持旌及墓嘑啓關陳車小喪共匶路與其飾嵗時更續共其弊車大祭祀鳴鈴以應鷄人遣才用反釋曰遣車一曰鸞車廞謂陳駕之行之以道於墓所執蓋從車隨柩路也持蓋與旌者王平生時車建旌雨則有蓋今蜃車無蓋執而隨之象生時有也所執旌者銘旌也關墓門也車貳車也小喪共匶路載柩車也飾棺飾也嵗時更續更易其舊續續其不任用者物之弊者不有以續之則無繼共其弊車歸其故弊車入于車材或有中用也鷄人主嘑旦車有和鸞相應故使之鳴鈴應鷄人以警衆也典路掌王及后之五路辨其名物與其用說若有大祭祀則出路賛駕說大喪大賔客亦如之凡㑹同軍旅弔于四方以路從說音脫釋曰車人造車以授巾車通掌之其王及后所乘者特設典路掌之而其職特嚴事至尊故也名以命之物以色之用謂駕之說謂舎之大祭出路出玉路王當乘之賛駕說賛僕與趣馬也傳曰日出而駕日中而說所謂駕說也大喪出路陳之書曰大路在賔階面綴路在阼階面先路在左塾之前次路在右塾之前大賔客出金路以路從者王乘一路典路則以餘路從行非特衛至尊亦以華國也車僕掌戎路之萃廣車之萃闕車之萃苹車之萃輕車之萃凡師共革車各以其萃㑹同亦如之大喪廞革車大射共三乏萃七内反廣古曠反苹音平輕遣政反釋曰萃猶副也此皆兵車所謂五戎也戎路乃革路也革路以即戎故又謂之戎路王在軍所乘廣車横陣之車左傳所謂其君之戎分為二廣闕車所用補缺之車苹猶屏也所用對敵自隱蔽之車也輕車所用馳敵致師之車詩曰輶車鸞鑣輶車即輕車也按車戰之法每車甲士三人步卒七十二人二十四人居前左右各二十四人居前者戰左右者挾轅常相更番後又二十五人為一隊去車三五步所謂炊家子守衣裝厮養樵牧者是也行則以車為衛居則以車為營一車一間又有倅車孫子曰萃車千駟輕車千乘帶甲四十萬謂倅車也車戰之法為不可敗之計有倅車者萬一或敗免致倉皇無備古人兵有制故用車戰共革車者凡兵師用車者皆以革輓之各因其所用而備副車焉廵守及兵車㑹則乘戎路乗車之㑹王雖乘金路猶共戎路以從不失備也廞革車則五戎皆在焉乏一名容射人云三獲三容是也王之大射必張三侯每侯之後必張一乏使待旌告獲之人用此以自蔽也司常掌九旗之物名各有屬以待國事日月為常交龍為旂通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌旜之然反隼息亮反旟音餘旐音兆旞音遂釋曰物名者九旗所畫異其物則異其名各有屬則自王以下臣民各有所屬見其旗則使其屬知所從也待國事謂國有祭祀師田賔客之事各建其旗待用也九旗皆以綘帛為之太常畫日月者取天道之運也郊特牲曰旂十有二旒龍章而設日月象天也左氏曰三辰旂旗昭其明也即太常也龍一升一降曰交龍白隂而升青陽而降交泰之道也詩曰龍旂陽陽記曰龍旂九斿天子之旌也旜用通幅絳帛為之無飾周人尚赤所謂大赤也物者内幅以綘外飾以白殷之正色所謂太白也旗畫熊虎熊取其毅虎取其猛也旟畫鳥隼鳥取其速隼取其摯也旐畫龜蛇龜取其靈而有知蛇取其敏而有勇也大抵旂以交龍曲禮所謂左青龍也旗以熊虎曲禮所謂右白虎旟以鳥隼即前朱雀旐以龜蛇即後𤣥武也其象上取於列宿豈苟然哉全羽析羽皆五采繫之於旞旌之上旂謂注旄於干之首也及國之大閱賛司馬頒旗物王建太常諸侯建旂孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌皆畫其象焉官府各象其事州里各象其名家各象其號畫當作􅀞釋曰司馬主兵司常主旗故於大閱賛司馬頒旌物焉王建太常臨照萬方象天道也諸侯在國有君道在朝有臣道故交龍一升一降易曰見龍在田君徳也孤卿中大夫以上旜之為義取諸亶誠也象為大赤赤心事君也殷尚白周尚赤物中赤而外白言大夫士宜以先王正道佐職也師都六鄉六遂大夫也謂之師都者民所聚也建旗者象熊虎守猛莫敢犯也州鄉官里遂官建旟者象鳥隼之勇徤也縣都采地之官建旐者龜蛇之旋繞營衛於後也道車象路也王以燕出入斿車木路也王以田以大閱全羽析羽皆五采象之徳也居則以全行則以析葉氏曰司常言國之大閱賛司馬頒旗物而司馬教治兵言王載太常諸侯載旂則同其他否者此言孤卿建旜彼則師都載之此言大夫士建物彼則鄉遂載之此言師都建旗彼則羣吏載之此言州里建旟彼則百官載之此言縣都建旐彼則郊野載之此言載旞載旌而司馬閱之盖司常主大閱而言司馬主治兵而言大閱大禮也孤卿大夫士與鄉遂采地之大夫咸在師都將縣都之兵州里縣鄙鄉遂之兵此師都所以有旟州里所以有旌縣鄙所以有旐孤卿大夫士則從王耳所以建旜建物也治兵常禮也孤卿大夫士未必盡出其所從王者百官也命卿之為軍吏者也采地鄉遂之兵皆屬於命卿故雖師都不過載旜鄉遂不過載物至於郊野載旐特以采邑大夫將采邑之兵不屬于命卿故也此其所載之旗或不同故於司常司馬互言之也皆畫其象畫之於旗此旗之細者事名號者徽識所以題别羣臣𣗳之於位朝各就焉覲禮曰公侯伯子男皆就其旂而立此其類也在國以定朝位在軍又象其制而為之官府各象其事則畫六官所掌之事州里各象其名則畫州里之官名家各象其號則畫其家邑之名號此即司馬所謂號名是也凡祭祀各建其旗㑹同賔客亦如之置旌門大喪共銘旌建廞車之旌及葬亦如之凡軍事建旌旗及致民置旗弊之甸亦如之凡射共獲旌嵗時共更旌釋曰王祭祀乘玉路則建太常諸侯以下各建其旗物朝覲宗遇玉乘金路巡守兵車之㑹王乘戎路皆建其太常掌􅃕曰為帷宫設旌門設之者掌􅃕而共其旌以為門者司常也銘旌王則太常也士喪禮曰為名各以其物建廞車之旌謂以廞旌建於遣車之上此在廟陳時也葬亦如之亦建旌以行也致民置旗弊之者始置旗以致民民至仆之誅後至者皆司常所掌甸田獵之旌亦司常建之服不氏以旌居乏而待獲此獲旌也亦司常共之更旌謂受官旗用之者嵗時换易則取舊而予新也都宗人掌都祭祀之禮凡都祭祀致福于國正都禮與其服若有㓂戎之事則保羣神之壝國有大故則令禱祠既祭反命于國釋曰都者畿内百里之都王子母弟及公卿之采邑王頒祀以敘其神設宗人以典其祀如社稷五祀宗廟名山大川之在其地者皆有祀典是其祭祀惟王所頒神之所享惟王之賜所以必致福于國也又都家之主皆身居王朝而祭或時涖與正都禮與其服者夫禮所以定尊卑别貴賤辨親疏而明分守也服者衣服車旗宫室之等也僣亂之生其微常起於禮與服此正之所以不可緩也羣神之壝山川丘陵墳衍之壇域也有大故則保之以依神也令令都内之有司也祭報賽也反命白王也王氏曰祀所以馭其神必命之祭然後祭則祭之命上所出也既祭反命于國則逆祀者蓋無有矣家宗人掌家祭祀之禮凡祭祀致福國有大故則令禱祀反命祭亦如之掌家禮與其衣服宫室車旗之禁令釋曰家謂大夫所食之采地所祀與都同盖大夫皆身居王朝而其私邑之官皆王朝所命故屬春官祭必命而後祭既祭必反命其致福者不親祀也國有大故令禱祀者或有山川水旱之神在其地者則令其禱祀之歸白於國都宗人曰若有㓂戎則保羣臣之壝據王所命祀者而言則此家宗人有王所命祀者亦保可知矣都宗人曰正都禮與服而此則衣服宫室車旗之禁令大抵都家宗人職掌本同言之或詳或畧可以互見凡以神仕者掌三辰之灋以猶鬼神􅅘之居辨其名物以冬日至致天神人鬼以夏日至致地􅅘物鬽以禬國之凶荒民之札喪鬽眉秘反釋曰凡以神仕者既在於司巫矣此復言之者在都鄙之巫祝也鬼神至幽其情狀難明聖人於大祝司巫之職不敢顯言之至此乃曰以三辰之法猶鬼神示之居三辰者何也天有三垣各有帝星其庶事庶職與人間無異天象下照以其精司天下鬼神若以天法而圖之則鬼神之情狀可見而其居可明也是以聖人祀則神格祭則鬼饗豈無其本哉王氏曰三辰者隂陽之精也鬼神􅅘雖幽無形然皆麗乎隂陽由隂陽之精以推之則其居可圖也昔神降于莘問内史過曰以其物享焉其至之日亦其物也是亦以三辰之法猶之辨其所命之名所色之物此所以知鬼神之情狀也鄭氏曰國語曰在男曰覡在女曰巫是以所制神之處位次主而為之牲器時服巫既知神如此又能居以天法是以聖人用之今之巫祝既闇其義何明之見何法之行哉鄭氏曰天神陽也地物隂也陽氣升而祭鬼神隂氣升而祭地示物鬽致人鬼於祖廟致物鬽於壇墠百物之神曰鬽王氏曰禬國凶荒民札喪夫禱祈􅠹禬人情不能免先王因人情而為之典禮凡以與民吉凶同患之意也按楚語昭王問於觀射父而及重黎絶地天通之事蓋古者巫祝之任甚重射父所對詳矣周禮全經釋原卷八
