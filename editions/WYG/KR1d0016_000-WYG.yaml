body:
  text: 周禮全經釋原禮類一周禮之屬提要臣等謹案周禮全經釋原十四卷明柯尚遷撰尚遷字喬可長樂人自號陽石山人其書自天官至冬官凡十二卷又附以周禮通論周禮通今續論各一卷前列序二篇源流序論一篇六官目問四篇全經綱領十二條釋原凡例七條書中解詁其稱説者皆依古注集成其曰原者則推原作經本意也冬官不亡諸儒紛紛異議俞庭椿等因欲割裂五官以補其缺致有竄亂古經之譏尚遷謂當以經證經取遂人以下地官之事分為冬官自遂人至旅下士正六十人可證序官之同乎六十不待移易他官以亂聖經其説較諸家頗為有據故唐順之姜寳皆深是之雖其析大司徒掌建邦土地之圖以下為大司空之文徑依六典改原文安擾邦國為富邦國又以吳澄所補惟王建國以下四十字冠於冬官之首而置考工記不録仍不免師心自用之失然其立論平實於理較近未嘗不可以參備一解焉朱彝尊經義考載此書卷目相合而注其下云内源流敘論一卷通論一卷案此本通論外尚有續論而源流敘論乃在卷首不列十四卷之數􅂜尊所紀為誤葢當時失於考訂也乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周禮全經釋原序先民有言泰和在成周宇宙間至治固不可得而見矣幸存周官灋度六篇其當時為治之迹矣乎因其迹以求其心得其心以推於政故成周之治百世可復作也今全經具存不曰周官而名周禮何哉蓋禮也者道之體也灋也者道之用也心也者道之管也道與心一斯心與政一矣心與政一斯灋與禮一矣灋與禮一然後謂之王制也心與政一然後謂之王道也道與心一然後謂之天德也故程子曰有天德斯可與語王道張子曰不聞性與天道而言制作者末矣是以君子格物以誠意慎獨以養心則天德具矣立誠以動物由心以行政順應以平施則王道行矣則地稽天損益因禮變通宜民則制作協乎自然矣故能㑹心政禮灋為一道則成周之治夫豈逺哉周禮晦蝕於戰國毁棄於暴秦漸出於漢氏劉德購之得於李氏惟存五官而補以考工記劉歆傳之杜子春訓之鄭衆鄭𤣥更相發明聖王之制復見於後世者固不幸哉自漢以來干餘年矣論之者更幾賢行之者更幾主而卒不明不行何哉其不明也我知之矣簡札淆亂司空錯於地官未之分也封建鄉遂井田格於悖說未之正也其不行也我知之矣心與政離既荒其原不明不行固其所也況於假而用者王莽誤而用之者安石乎漢唐之儒固有以為戰國隂謀之書又有以為漢儒附㑹之說則又均為不明而果於非聖矣獨程朱大儒洞識聖心之淵㣲斷斷以為周公遺典而明道横渠又決欲行之以復三代有志不就故㣲辭奥義未及論著君子惜焉夫冬官未嘗亡也何必購以千金又胡為補以考工記後此諸儒訓釋名物不為無功雖大意未見然尚承襲漢本不敢更定至元有俞庭椿氏者始謂冬官不亡散於五官之中作復古編以伸其說永嘉王氏臨川吳氏清源丘氏椒丘何氏咸宗之各於五官之中雜取諸職以補冬官人持所見各自為編則周禮雖存紛紜舛錯幾不可讀矣以遷之魯鈍竊志是經體驗探求至形寤寐似窺見其一二者然後知周禮一言一字無非聖人精神心術之所寓當時已施之治迹者也孟子曰諸侯惡其害己而皆去其籍故知周禮者孰如孟子今觀遂人以下地官之半實冬官也不知何人次於掌節之後而大司空之職舉而雜於大司徒之中遂起千古不決之疑無乃戰國諸侯之所亂乎偉哉孟氏爵祿之篇井田征稅之論誠宜補周禮之闕者又約其㫖將自試於齊梁卒不能遂乃曰堯舜之道不以仁政不能平治天下為髙必因丘陵為下必因川澤為政不因先王之道可謂智乎何其言之諄諄至此百世之下非無知孟子之心者特以周禮不明無所率由故耳遷不自度乃分遂人以下為冬官而證其序官之同乎六十取地官土地之事為大司空之職則冬官復矣又以鄉遂大夫以下皆無府史胥徒而知其在民之官大端既明則封建井田與夫賢能征稅之屬俱可類見矣乃敢集諸儒之訓以釋之發鄙見以原之庶幾聖人作經以開萬世太平者為不亡矣哉嘉靖乙巳二月朔旦柯尚遷序欽定四庫全書周禮全經釋原卷首明柯尚遷撰源流叙論按書傳周公一年治亂二年伐商三年踐奄四年建侯衛五年營成周六年制禮作樂七年致政成王則是書之作當在攝政六年之後將致政成王之時也然當是時天下既定法制既立故其書於六官之首每冠之以惟王建國以至民極二十言歟夫周公之作周禮也非字字創而造之也蓋皆當時朝廷官府縣象頒布之文臣民遵守之典斟酌於廟廊施措於天下武周所以監夏商之舊章損益因革立一代之新政隨而㑹萃成書周公復筆削焉則是書之成當在成王涖政之日制為一代憲典令萬世遵行亦若後世㑹要㑹典之書也孔子曰周監於二代郁郁乎文哉言周禮也孟子曰周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦言周公作周禮其用心如此古語曰周公一飯三吐其哺一沐三握其髪以來天下之賢士夫天下之士豈有賢於周公者而周公方居冢宰之尊接之如此之勤者亦以天下庶事百物知其理於心不若專其事者得之尤切故也是以其作周禮也規模措置綱紀畢張不徒於弼亮天地和洽神人而凡百工衆技無不挈持綱領而可推其細㣲也不徒檢飭君身防絶禍患而盟詛讐伐凡所以待衰世者無不備也不徒分別賢能在位在職而凡百官萬民一德可稱一能可使無不俾之各致於用也不徒山川井牧萬生庶類區處各當而凡禮儀之施牢醴籩豆之數無不詳也是故以之維持一世則一世之人安維持百世則百世之人安維持千萬世則千萬世之人安是周公之心也及至幽厲禮樂之書稍稍廢棄東遷之後王政不綱諸侯相吞已違周公治諸侯之灋度至孔子時周禮雖在於魯三家專政既與周禮背馳故孔子曰如有用我者期月而已可也謂思欲舉而復周公之舊制也其對哀公問政首曰文武之政布在方䇿則知是時周禮尚完可舉而行爾又曰吾衰也久矣吾不復夢見周公蓋寤寐不忘周禮故也不幸魯麟見獲女樂間機天無意於斯民矣東周之志徒發於公山佛肸之召於是退修春秋以寓周禮故凡征伐盟㑹邦交聘問之際深致意焉鳯鳥不至河不出圖吾已矣乎知道不行春秋之作扶周禮於既壊使人知王道不可一日不明於後世也厥後孟子欲以周禮而施諸戰國之君故其言曰以齊王猶反手也遂約其㫖欲自試於齊梁及不能用乃曰堯舜之道不以仁政不能平治天下聖人竭其心思之力繼之以不忍人之政言周禮也又曰為髙必因丘陵為下必因川澤為政不因先王之道可謂智乎何其諄諄至於如此然當是時諸侯惡其害已而皆去其籍去籍者去其害已而錯亂之也今觀周禮冬官之職合於地官之末大司空之職合於大司徒又地官而闕司禄之職大司馬小司馬治諸侯之法度皆闕焉此非諸侯惡害已之所去乎是以孟子班爵班祿之對井田征稅之論誠欲補周禮之闕者然則孔孟所以汲汲皇皇欲挽其世為三代者其具蓋在此矣及至秦一火而燼之漢興岩藏壁隠皆出獨周禮未嘗見焉髙堂生傳士禮十七篇瑕丘蕭奮以禮至淮陽太守授孟卿后倉傳之二戴即今之儀禮禮記是已周禮不知何所出賈公彦敘云漢書藝文志周官六篇傳四篇東漢儒林傳乃謂周官六篇本孔安國所獻馬融傳云秦孝公以下用商君之法其政酷烈與周官相反故始皇禁挾書特疾惡欲滅絶之焚燒之獨悉是以隠藏百年孝惠除挾書之律開獻書之路時有李氏上周官五篇復入于秘府五家之儒莫得見焉又隋書經籍志有云漢時有李氏者得周官上於河間獻王獨缺冬官一篇獻王購以千金莫能得遂以考工記補成六篇奏之孝武時蓋有其書特未與五經例置博士耳至孝成時劉向子歆校理秘書始得列敘著于錄畧時衆儒並出共排以為非是惟歆獨識其年尚幼務在廣覽乃知周公致太平之迹具在於此其後取以輔王莽更制立度而周禮大壊後世遂有周禮作於劉歆之說此敘周禮正經存亡顯晦亦頗明矣然謂冬官獨缺只存五官愚謂冬官實不亡合於地官耳而夏官大司馬亡者半小司馬軍司馬輿司馬行司馬俱有職掌皆治諸侯與行軍征伐之法度實亡耳此皆戰國諸侯惡害己之所去人不知其為缺而曰冬官亡也豈其然哉至於註疏之家正義又云漢末有河南緱氏杜子春永平之初年且九十能通其讀頗識其說賈徽及子逵大中大夫鄭興及子大司農衆往傳其業又以經書記傳轉相證明為解二鄭明於典籍觕識周官之義存古字發疑正讀鄭𤣥作周禮注多引杜子春及鄭司農之說以讃而辯之焉周禮遂因康成之注列於九經乃盛行於後世矣其時亦有林孝存以為武帝知周官末世濁亂不驗之書作十論七難以排棄之何休亦以為戰國隂謀之書甚者則謂劉歆附益以佐王莽唯康成徧覽羣經精于考究故能答林碩之難使其義得條通焉然則自漢以來註疏之家得失亦可見矣迨至於魏有蘇綽者邃識其書取以輔宇文周其所更立制度多本之周禮雖大經不明事多杜撰然其良灋美意亦足開唐家一代制作之懿為后世宗所謂六官府兵與租庸調是也周禮雖存其義晦矣梁明威將軍崔靈恩合周禮儀禮二戴之學敷述貫穿該悉其儀撰義宗一百五十六篇先儒稱其推衍閎深有名前世三禮乃並立矣太學博士賈公彦作周禮疏十二卷世稱其發揮鄭學最為詳明孔穎達作正義以備古今之說訓詁雖詳聖人制作精意未之能明至宋熈寧中王介甫自為周官義十餘萬言其自序云自周衰至今歴載千數而太平之遺跡掃蕩殆盡學者所見無復全經于是乃欲訓而發之為難又立政造事追而復之為尤難也可謂有志於是矣至其所以自釋其義者未能提綱挈領乃謂其書理財居半以其所創新法盡傳著之務塞異議之口如青苗之法證以國服為息之言其他方田保甲市易之類皆稽焉破壊天下至今藉口惟明道程子十事之奏雖不別言周禮而周禮之精要具焉嘗曰不以三代之灋治天下終危邦也周禮由孟子而後惟明道能知之考其所言真復三代手段也考亭朱子乃謂三禮宜以儀禮為經而以禮記諸書為傳其書以周禮禮記列為記傳至於王朝之禮之補則又多引雜書與周禮㕘錯以補諸禮之闕故近儒舒氏譏之曰東漢而下是書與儀禮戴記並行猶吳魏鼎立漢賊之義晦矣至於儀禮經傳通解之作則以儀禮為本周禮為末此書僅得與淮南子白虎通偽家語諸子備引證而已是天王居鄭而狩河陽矣此朱子之大惑也然愚嘗考其言曰周官徧布周宻乃周公運用天理熟爛之書又曰比閭族黨之灋正周公建太平基本如棊盤布定然後棊子方有放處又曰周禮胡氏父子以為是王莽令劉歆撰出此不然周禮是周公遺典也又語門人曰禮書異時必有二本其據周禮分經傳不多取國語雜言迂僻蔓衍之說者吾書也其黜周禮使事無統紀合經傳使無間别多取國語雜記之書使傳者疑而習者蔽非吾書也則朱子於周禮尊信如此儀禮經傳之作蓋未成之書亦非定論故也雖然朱子未嘗表章周禮然古今相傳漢本猶在不敢移易其時有臨川俞庭椿氏者以為冬官未嘗亡實雜出於五官之中於是取四十九官以補冬官之闕又分大司徒之半以為大司空之職著復古編以伸其說嘉熈間東嘉王次㸃又作周禮訂義以補俞氏之所遺至元泰定間清源邱吉甫又以序官置各職之首大加更定名以全書而臨川吳氏又於大司徒補孟子五典於十二教之上并去序官之文始以遂人入司空至本朝椒邱何氏又復序官於諸職之前以大司樂為司徒之教而司勲司士太史之屬皆入天官工作之事皆入冬官則畧倣我朝之制度矣至於近時有周禮剔偽之作又於諸職之文逐句刪合分别真偽奪彼與此矣夫周禮聖王經世大典諸職之文諸官之序親出於周公之所裁定其義足以幽賛神明其數足以㕘天兩地如日星之明不可掩蔽如四時之序不可變更諸職相通諸事相濟如錯行代明並行不悖者也豈容一毫意見移易哉一壊於戰國諸侯害已之惡遂合冬官於地官使大典淆缺幸而漢儒傳習尚存古本也至宋俞氏再亂矣王邱吳何雖各自為書然諸職之文則未嘗更也至有剔偽圖釋之書則逐句逐字皆可去取更易矣是今之周禮雖存不過古人之事料隨人意見皆可為書也豈先王經世之典哉水心葉氏有言曰周禮晚出而劉歆遽行之大壊矣蘇綽又壊矣王安石又壊矣千四百年更三大壊而是書所存無幾矣詩書春秋皆孔子論定孟軻諸儒相與弼承世不能知而信其所從井列於逵衆酌飲焉惟其量耳故治雖不足而書有餘也孔子未嘗言周禮孟子亦以為不可得而聞一旦驟至如竒方大藥非黄帝神農所名無制使服食之灋而庸夫鄙人妄咀吞之不眩亂顛錯者幾希故用雖有餘而書不足也然周之道固莫聚於此書他經其散者也周之籍固莫切於此書他經其緩者也公卿敬羣有司亷教灋齊備義利均等固文武周召之實政在是也大哉言乎然冬官具存六典畢備其大綱大紀固足以成相天地立極生民其庶物萬事纖悉畢舉節目詳明則書非不足也孔子曰其人存則其政舉孟子曰有不忍人之心斯有不忍人之政矣苟有君有臣躬行於上惻乎愛民之實心舉之以運吾心之實政則三壊之腥穢可洗而成周之至治可復矣苟無其心未見治之有餘也千載而下惟王通其識周禮乎曰吾視干載而上聖人在上未有若周公焉其道則一而經制大備後之為政者有所持循其居家不暫舍周禮曰如有用我者執此以往唐太宗曰不封建不井田不肉刑而欲行周公之道不可得也横渠張子嘗曰縱不能之天下猶可驗之一鄉欲買田畫井推周公之遺灋明當今之可行皆可謂有志矣然仲淹子厚人臣也無可為之勢發之空言可也太宗人君也有可為之勢當可為之時猶有不得為之嘆何哉豈非冬官未復而六典之不辨鄉遂未明而設官之太多井牧不兼而征稅之難定簡稽不定而軍政之非制賢能不分而才德不當其位教化不立而善俗不能興制産無灋而民不得其養則周禮何以能行哉無怪乎三代而下有為之君賢明之佐項背相望以無其具故不能致三代之治也愚自有知竊有志焉以天地民物得所之由古今治亂懸隔之故含蓄于心久矣考後賢未施之論及君臣已行之迹皆不能如王子陽所謂建萬世之長䇿舉明主於三代之隆之論及得周禮讀之研精覃思為日既久似有得其要領者然後知武周之治迹孔孟之作用舉備於此乃敢㑹衆說而折其中洗千年之晦蝕決諸儒之壅塞是故復遂人以下為冬官而六典備攷鄉遂以下為鄉官而位職明發在位之職與在職之位而封建定推師保諫救之教而學校舉表宰夫鄉師遂師肆師士師以下為六十屬而三百六十之數定取司馬灋以明井牧之制簡稽之灋而軍制復辨九功非九職之稅而賦斂之灋明以九比為九等之稽上中下地有三類而授田征役之施舍審至於辨天地分合祀之非以明郊社禘嘗之禮則質之胡氏之論推司樂三宫之制為古雲門大韶之樂則聞之師說此皆周禮之大綱周公之精意所在後世所未明者敢竭鄙見作原以發明之其他先儒之論有可采如葉氏邱氏李氏鄭氏之類能推明大義者俱書於所釋之後與鄙原相錯非敢繁也俾聖經之大㫖敷暢闡明焉耳今古儒者註述周禮莫可勝紀敬以其表見于世者僣論於此云柯尚遷喬可書六官目問天官太宰小宰宰夫宫正宫伯膳夫庖人内饔外饔亨人甸師獸人􅈄人龞人腊人醫師食醫疾醫􅅑醫獸醫酒正酒人漿人凌人籩人醢人醯人鹽人幂人宫人掌舍幕人掌次大府玉府内府外府司㑹司書職内職嵗職幣司裘掌皮内宰内小臣閽人寺人内竪九嬪世婦女御女祝女史典婦功典絲典枲内司服縫人染人追師屨人夏采目問冢宰何以掌邦治也曰治之大者則統乎天下自典灋則而下以及監牧立監設官分職凡所以立國而宜民者皆其職之所掌故曰邦治然則其掌王宫何也曰天下之治修身為本未有治國平天下不本於修身以齊其家者也故冢宰所職雖曰治平之事然其本務則唯為王經理修齊二事而已故宫正而下天官所統之職豈出於修齊之外哉小宰雖掌八灋之目然治王宫其本也宰夫雖鉤考治灋然亦修宫中之職事可以見天官之職齊治而已矣曰以宫正宫伯為屬之首何也曰以其掌宫禁宿衛士庶子之治者也王家宜以謹固宫室為先故始之歟曰飲食細務也必次之以膳夫至腊人十官何也飲食居室修身之本也曰以醫師五官繼之何也有安養則有疾病故醫次膳羞也曰所醫者國人而供王則食醫又不治疾何也曰善理身者未病而調節飲食能謹則病無自來矣故立食醫以奉王而不敢言醫疾所以致尊養之義也自酒正至幂人九官不次膳夫之下在醫官之後何也曰酒醴籩豆皆以行禮非以為食也是故極醇醪之味盡水陸之珍以交神明以洽賔客耳雖共王舉亦以禮也故不屬於膳夫焉曰自宫人至掌次四官繼之何也修身之道飲食居處而已安不忘危舍次必備焉夫天官冢宰以保王躬為急則所以輔養交修表裏和粹是居處飲食皆關乎心術之㣲而遏其未萌之欲者正大臣以道格君之事也顧以為緩而不切耶曰大府以下四官在冢宰何也王制不曰冢宰制國用乎天子以天下為家財用家之本也故以次修身焉又次之以司㑹五官何也財不㑹則用無節而國貧矣故立計官次財官之後也而職幣司裘掌皮次財官何也曰以其財所出之異不入大府也曰以内宰宫寢之官繼之何也曰此正王之家事冢宰治其外内宰司其内實天下之大本也以内小臣奄竪次之者役於内宰以通内外以别男女也曰九嬪世婦女御王之妃嬪矣三夫人不與者非冢宰所統也曰春官世婦每宫卿二人大夫四人士八人合六宫則六十四人矣非九嬪之世婦乎曰宫卿世婦掌禮者也蓋女師之職有齒德者為之施内宰之教妃嬪以下之傅母也故以女官而加男爵屬於禮官曰女祝女史在其後者何也曰其有才藝之女御遂以任之也自典婦功至夏采皆衣服女功之事次之者男服事乎外女服事乎内天下未有無職事之人故典絲典枲典婦功縫人皆為后宫女功而立者也以夏采終焉則修身齊家之道盡矣故天官之職以治天下為末以修身齊家為本此所以佐王而為首相焉地官大司徒小司徒鄉師鄉老鄉大夫州長黨正族師閭胥比長封人鼓人舞師牧人牛人充人載師閭師縣師遺人均人師氏保氏司諫司救調人媒氏司市質人㕓人胥師賈師司虣司稽胥肆長泉府司門司關掌節目問問曰司徒掌邦教何也曰教者教萬民也冢宰掌朝廷王宫司徒掌萬民故萬民者君之本也朝廷者萬民之本也民賴君以治君資民以養天施地生之道也故二官以天地名焉民以官府而治天官掌官府故曰治親民治事謂之教司徒專理民事者故謂之教曰自鄉大夫至比長者無府史胥徒何也此鄉官司教者也萬民之中人品不齊故差其等秩以明其禮推其德行以職乎教者也此皆賢者之位也曰自封人至充人六官皆㣲職而次鄉官之後何也曰此皆掌萬民禮樂之事教之先也封人為社稷而設也鼓人舞師為祭樂而設也牧人充人牛人為祭禮而設也為國者先盡禮於神然後致力於民故居此與曰載師閭師次之何也曰此在職之選也載師任土閭師任力土無遺利人無遺力斯九土可治九職可分矣此民事之大者故先之焉曰縣師次之何也此治都鄙之吏也合鄉遂師載師閭師之職兼統於一官天子使吏治其采邑是也曰遺人均人又次之何也曰遺人掌委積均人均職役貢賦使食各有其備使民各得其職故次之曰師氏保氏司王宫之教宜在天官今在地官何也曰地官掌教雖貴人不與民同其教灋同也故屬地官司諫司救即萬民之師保也司諫掌勸率之教司救掌糾戒之罰亦猶詔􅍇諫惡之意也故次之曰調人媒氏之繼諫救何也曰既教於安常之日不能不防於鬭怒之時故調人以平成之治之於未亂也夫調人司和合之政而男女又合之本也故設媒氏掌男女之判合以次之所以立生民之始也曰司市次之何也曰民生衆則庶職備不可無交易也故設交易之處自質人至肆長皆司市之所經理也曰泉府居末何也曰此六鄉補助之政也國中賒貸則用泉貨郊野賒貸則用穀粟在國則泉府主之以出於市也在野則旅師主之以出於田也皆濟民之善政也曰門關又次之何也曰門關所以譏察異言異服與貨賄之不由不物者與市官相聮故次之掌節在地官何也曰節所以通達道路門關之所譏事相聮屬也故次之而地官終矣故教者所以教其民之事也故商賈不遺焉豈後世之所謂教哉春官大宗伯小宗伯肆師鬱人鬯人雞人司尊􅂜司几筵天府典瑞典命司服典祀守祧世婦内宗外宗冢人墓大夫職喪大司樂樂師大胥小胥大師小師瞽矇眡瞭典同磬師鐘師笙師鎛師韎師旄人籥師籥章鞮鞻氏典庸器司干太卜卜師卜人龜人菙人占人簭人占夢眡祲太祝小祝喪祝甸祝詛祝司巫男巫女巫太史小史馮相氏保章氏内史外史御史巾車典路車僕司常都宗人家宗人目問問曰宗伯掌邦禮何也曰王者以禮樂治天下天下有序而和則治矣故命官曰春春者所以生萬民也曰宗宗者所以為天地人神之主也曰既有三禮又有五禮何也曰三禮所以位天地五禮兼以齊民物是使幽明各得其所也其文則具於儀禮其綱紀則列於宗伯是故夫禮大宗伯則掌其經小宗伯則守其灋肆師則陳其數鬱人鬯人雞人司尊彛司几筵則司其器斯禮之所由行也或曰天府居禮屬之首何也以其掌祖廟之重器神明之也典瑞典命司服次之何也曰禮莫大於分分以辨等為先等級之懸莫大於天子諸侯大夫士也典瑞則以圭璧節信而辨之典命則以車旂宫室禮儀而辨之司服則以冕弁服飾而辨之是故儀章表於上等級明於下天下豈有不安其分者哉此禮官之大灋故次天府也曰典祀守祧次之何也曰既以正人尤宜事神故典祀則事外神也守祧則事内神也神人各歸其所斯禮立矣曰世婦設女官府於六宫乎曰世婦以婦人而加男爵以治内政蓋王后夫人以下之傅母也内外宗𣲖出於王族故世婦大抵皆内外宗之有齒德者為之故次之也曰與天官之世婦同乎曰天官世婦王之妃嬪也王以禮治天下后以禮治六宫故設世婦女官以掌其禮以掌女宫有員有秩有女府史胥奚以掌禮也故屬禮官焉曰冢墓職喪次之何也曰禮有吉凶廟祀吉禮也喪祭凶禮也既有祀祧以典其吉又有冢墓職喪以典其凶則慎終追逺之道也或曰大司樂樂官也既掌大學之教宜屬司徒而在宗伯何也曰古人樂以養德大司樂之教國子乃成德之教樂以達三才之奥豈獨教人而已乎屬宗伯者有禮而後有樂禮自隂而統陽樂自陽而居隂禮可兼樂隂宜從陽也若大師以下則專掌樂者也典同以下十二官則掌樂之器數也曰太卜次司樂何也曰卜以藏天地之奥樂以通幽明之氣氣以妙其靈神以通其故故相次焉曰太祝占卜何也曰皆神道也卜以求其靈祝以通其故卜以求未來祝以明既往故相次焉曰太史後卜祝何也曰太史總知天道人神之故者也蓋兼卜祝掌禮灋又以司天故馮相保章氏皆屬之内史掌内令外史掌外令御史掌賛書皆以賛王及冢宰之治者然不外乎文書之職焉車旂又禮之辨名分所存也都家宗人掌都家之祀禮以在外故末之而禮典終矣夏官大司馬小司馬軍司馬輿司馬行司馬司勲馬質量人小子羊人司爟掌固司險掌疆候人環人挈壺氏射人服不氏射鳥氏羅氏掌畜司士諸子司右虎賁氏旅賁氏節服氏方相氏太僕小臣祭僕御僕隸僕弁師司甲司兵司戈盾司弓矢膳人槀人戎右齊右道右大馭戎僕齊僕道僕田僕馭夫校人趣馬巫馬牧師庾人圉人職方氏土方氏懐方氏合方氏訓方氏形方氏山師川師邍師匡人撢人都司馬家司馬秋官大司冦小司冦士師鄉士遂士縣士方士訝士朝士司民司刑司刺司約司盟職金司厲犬人司圜掌囚掌戮司隸罪隸蠻隸閩隸夷隸貉隸布憲禁殺戮禁暴氏野廬氏蜡氏雍氏萍氏司寤氏司烜氏條狼氏修閭氏冥氏庶氏穴氏翨氏柞氏薙氏硩蔟氏翦氏赤犮氏蟈氏壺涿氏庭氏衘枚氏伊耆氏大行人小行人司儀行夫環人象胥掌客掌訝掌交掌察掌貨賄朝大夫都則都士家士冬官大司空遂人即小司空遂師遂大夫縣正鄙師鄼長里宰鄰長旅師稍人委人土均草人稻人土訓誦訓山虞林衡川衡澤虞迹人丱人角人羽人掌葛掌染草掌炭掌荼掌蜃囿人場人廪人舍人倉人司祿司稼舂人饎人槀人三官目問問曰夏官屬政秋官屬刑何也曰夏為長物之府秋為成物之府政者正也使民物各由於正則長養而不窮矣生長不已必盛而無制使不加以肅殺之威則物不能成刑者成也故物患於不長尤患於不成也此夏秋二官所以配政刑歟曰事官為冬官何也曰冬者閉藏之時藏不宻則長不盛物以長盛為極故閉之於冬所以為夏長之地也曰冬官司田野可以為閉藏之地乎曰五氣行乎地中發而生乎萬物萬物出於土而復於土三時本於冬萬物本於地此冬官所以司田野也曰夏官掌兵兵大刑也秋官又掌刑何也曰夏官掌平天下使諸侯各遵王法而莫敢不一於正兵固不用也使民物各由於正刑亦可措也刑設而不犯政行而不窮則天下治矣此二官所以常相須也曰小司馬既亡矣軍司馬乃屬之首而闕其職不知所掌何事也曰治諸侯之法度必詳於小司馬軍司馬乃其攷也有振肅之道焉孔子曰禮樂征伐自天子出孟子曰天子討而不伐諸侯伐而不討此天下之大閑司馬之根本也諸侯惡害已而去籍使司馬之職存則周固不為春秋亦不為戰國矣孔子生於周末悼王道之不昭懼浸淫於戰國也故作春秋以寓王灋大抵本於司馬之職掌故曰誅曰殺曰征曰伐曰盟曰㑹孰非執司馬之權以治天下諸侯乎故考春秋之所書則司馬之職掌存矣說春秋者不知本於司馬灋而曰孔子以天道而貶黜諸侯與大夫且當時周未亡也孔子陪臣以天道自任誅討時王之臣子欲閑僣亂而自為僣亂可乎況當時刑書亦備諸侯大事存於司馬小事著於刑書今刑書亦亡矣孔子據司馬而討諸侯據刑書而誅大夫執成周之國灋以行文武之政刑使天理民彛不可一日泯滅於天下此作春秋之心灋也或曰小司馬既亡軍司馬為下大夫與五官同輿司馬為上士行司馬為中士與五官異何也或三司馬原無職掌但制軍之灋既定及有征伐大小司馬及三司馬將之以行故闕其職乎曰萬二千五百人為軍大國三軍軍將皆命卿各有府史胥徒則有將帥有官府可知也而司馬之職乃掌平天下與兵政之本非將帥之任也輿行司馬亦各有分職如晉之公路公行品秩有定故特著之必俱有職掌而亡之矣曰五司馬既有職掌六軍又有將帥官府則兵民分矣曰考之司徒司空既有職掌而鄉遂大夫又有其職則司馬必有職掌又有預設之將帥其卒伍之灋皆同如晉作三軍趙孟將上軍欒書將下軍皆臨時命將也而兵則寓於農若有征伐則以簡稽之灋起之四分當兵之數籍於司馬發其一分之强以行征伐平時皆在民伍之中非如後世兵長為兵而坐食民膏也或曰司冦之職士師為屬首遂士縣士方士在四郊都鄙其聽職也有期皆受中于士師則王畿士官固整然明也而大行人之在秋官果可以舉諸侯士官之職乎曰諸侯六典建官亦有鄉遂鄙邑其設士官皆同王畿刑罰諸侯自治之行人所掌者諸侯入貢獻功朝覲會同之品制聘問禮儀之節度皆所以使之慎固封守遵王章而不敢踰越苟有愆違九伐隨之此刑之大者亦可見治國之與平天下宜繁宜要之道矣或曰冬官掌邦土其灋行於六鄉都鄙矣又設稍人一官掌丘乗之令毋乃司馬之屬乎曰稍人所以屬地官者都鄙之中兵民不分寓兵於農稍人掌之是故家出一人為正卒見於六鄉司徒主之甸出車一乗四分當兵之數司空主之若有征伐發其一分之强則屬司馬合其卒伍選將以行苟不知三番簡稽之灋司徒司空司馬各有所主之兵而言三代寓兵于農之制皆罔而已曰山林川澤有虞衡皆屬司空而司市則屬司徒何也曰虞衡出財之地故屬司空司市聚財之所故屬司徒大抵六官各有比閭族黨之外之餘民以其類而分屬焉天官之有士庶子宿衛王宫之人及后宫之衆宗伯之有大司樂司馬之掌諸侯司冦之有行人與司徒之司市司空之虞衡皆周公均權之意存乎其間也豈容以意見移易哉或曰夏官之有小子羊人司爟秋官之有犬人司寤司烜冬官之有舂人饎人槀人皆為祭祀而設與司徒封人五官宗伯鬯人四官同可矣而秋官自冥氏至庭氏十數官㣲細非關祭祀行禮之事也毋乃非周公之意乎曰聖人在上使昆蟲草木鳥獸無不咸若蜡氏雍氏萍氏冥氏庶氏柞氏薙氏數官有益民用存之猶可穴氏翨氏硩蔟氏翦氏赤犮氏蟈氏壺涿氏庭氏所載甚㣲末其文至淺近非聖人所刪定明甚今思之致後人疑周禮者實在乎此乃戰國時擬為之以混於聖經如考工記四十三工皆擬周禮官名而作者後人欲以補周禮之闕謬矣此數官宜出之於考工記之末又恐啓人移易諸官之弊今姑存之而著其說於此云後學柯尚遷識全經綱領一周禮所以名全經者豈惟六官得全六經亦由此而全也是故分遂人以下為冬官以司徒土地之事為司空之職則六典畢備脉絡貫通三百六十屬猶天運之自然也不謂之全經乎儀禮雖與周禮並行然亦以出於周禮而全也何以明之司徒曰以祀禮教敬則士祭禮也以隂禮教親則士婚禮也士喪禮也以陽禮教讓則士冠禮也士相見也鄉射鄉飲也家鄉之禮非司徒之書乎掌交曰諭諸侯以九禮之親則食饗燕射邦交聘問皆邦國禮也非司馬之書乎王朝之禮則吉凶賔軍嘉是也太史大祭祀朝覲㑹同執書讀禮而協事此即五禮之書聮職所以行之也非宗伯之書乎據周禮以補儀禮則經亦全矣豈惟儀禮五經皆出於周禮也太卜掌三易之灋非易之所出乎太師掌九德六詩之歌曰風賦比興雅頌非詩之所出乎外史掌三皇五帝之書内史䇿命孤卿大夫太祝作誥誓命以通上下親疎非書之所出乎春秋則以司馬之職掌正天下諸侯之違王灋者是四經皆出於周禮者也邵子曰天之四府者時也隂陽升降於其間矣聖人之四府者經也禮樂汚隆於其間矣是知周禮儀禮者四經之本也命之曰全經夫豈苟哉一周禮所以合儀禮為六經者何也禮記經解敘六經為詩書易春秋禮樂樂無經今配禮為六何也記曰樂由陽來禮自隂作蓋禮體雖隂而用則陽樂體雖陽而用則隂陽能統隂故禮必兼樂周禮有大司樂屬於禮官樂之本也樂之用則在儀禮故郊廟燕饗鄉射飲酒必用樂樂之聲雖自陽來而用則從於禮而為隂無禮則無樂矣故樂不成經從於二禮稱六經云一周禮三百六十屬見於小宰絲毫不可増減也先儒以合六官所統為三百六十官故參差不齊移易經文之原起於此今以屬首宰夫下大夫四人倍至上士八人中士十有六人則二十八人矣加以旅下士三十有二人則六十人矣他官不稱旅也合六官則為全經讀周禮者必先明乎此則六官統紀斯正而無疑於㣲細諸職矣一天官固主天下之平而本職則掌天子修身齊家之事也故小宰獨掌宫刑焉宫中設内宰以士人為之者以出於德行道藝之選也先儒以為混男女之别後世易之以奄宦不知春官世婦有宫卿之設以女官而加男爵乃女傅之任也置府於六宫有女府史胥奚所以施内宰教灋其職則掌女宫之宿戒女宫者宫刑之女男去勢而為奄女幽閉而為奚宫中用刑男女所以通傳内外命令也内宰雖用士人與宫卿官府分為表裏男女之别豈不甚嚴而冢宰又總之三代有此故無女寵奄人之禍此灋不傳天官之職不明故也一司徒比閭族黨之職乃賢者在位之選教灋之原也六官治事之職乃鄉吏能者在職之人也故曰使民興賢出使長之使民興能入使治之賢能二科實周禮大綱能明乎此治天下猶運之掌耳取人不外乎賢能用人不離乎位職教人不出乎三物司徒之大本也今六德之書滿天下六行無書故人不尚行治不如古乃在乎此宜以古經曲禮内則少儀三篇修成完書使天下之人先習此而後六經又以是而制為鄉刑則人皆修行風俗淳美而天下治矣孔子期月而可孟子齊王反手其具乃在乎此辨之已詳兹不復著一先王以禮為國宗伯掌禮所以治神人各安其所也使不通之以司徒教灋則禮不達於天下矣司徒曰以儀辨等則民不越又曰以度教節則民知足蓋人之欲無限雖遞踰分限心猶未足不以禮制閑之亂何窮已也故典命司服皆所以辨其宫室車旗衣服禮儀使貴賤等級不相踰越則上下有體而民志以定費用有節而財計不乏先王所以能使禮達分定而民易使者其具在此一春官五禮之書在儀禮今古經闕王朝之禮獨有覲禮一篇其餘五禮皆可依周禮補之吉禮則郊社宗廟也明堂大饗也藉田親蠶也先帝先師也凶禮則大喪也荒禬弔恤也賔禮則朝覲宗遇㑹同聘問也軍禮則大師大田大役大均也嘉禮則婚冠飲食賔射饗燕脤膰賀慶也太史執書讀禮協事今書既亡小宰六聮者聮合衆職以行五禮之事也若以各職中聮職取而合之使始終條貫以補衆禮之闕雖不能畢備紀綱可具見矣愚於儀禮家鄉邦國三部既考定集釋成書而於王朝之吉凶賔軍嘉敬以聮職為經考諸傳記以補之雖不能如太史所執之書明備亦以經補經非無稽妄作者使後王制禮有所據依而先王之禮亦可存其槩不至廢墜矣一言禮必及樂樂依乎禮者也古之樂經存于大司樂其五聲六律八音大師以下備詳其制而六列三宫之歌奏則六代之樂咸備焉愚既取漢太史之所傳授宋朱蔡之新書及近代明樂之著作詳具於大司樂之中矣但樂章不傳則不可得而補也若其樂之用則宜列於儀禮各篇之後如天神地示人鬼之樂曰六變而天神降八變而地示出九變而人鬼享大合樂也以和邦國諧萬民安賔客恱逺人作動物其理皆形見於樂則未之能備但樂之本原既得其理亦可推也欲於儀禮天神地示人鬼之禮之後各補以樂將詩經風雅頌之中凡可用於儀禮者各以律協之文之以五聲播之以八音列於諸禮之後以全聖人禮樂之制病未能也聊引其端以竢髙明邃哲君子一司馬職掌宜不止此而以蒐苗獮狩入之戰國諸侯所亂也小司馬既亡軍司馬亦有職掌今大司馬所存只有九灋九伐九畿令賦四節而已治諸侯灋度不如是畧也若以秋官掌交考之則有九稅之利九禮之親九牧之維九禁之難皆大司馬之目也小司馬職掌宜以孟子班爵班祿補之又以逸司馬簡稽之灋三番寓兵與調發之制補之則大小司馬可知其槩矣輿行司馬則蒐苗獮狩是也司馬之亡孟子患之今推測如此未知是否一秋官亦有刑書今皆不傳司刑曰墨罪五百劓罪五百宫罪五百刖罪五百皆肉刑也殺罪五百孔子曰五刑之屬三千則周末刑條愈宻矣鄉又有八刑乃以禮制刑司徒所謂以刑教中則民不虣是也又有嘉石焉有圜土焉此皆未麗於灋者必有其書今俱亡之矣後世除肉刑則三千之屬既棄而不用鄉刑嘉石圜土皆無書禮刑表裏也刑不立則人孰肯由禮存於後世者生刑大輕死刑大重不及周官五刑之一刑罰不得其當何以懲奸三代之不可復其至要尤在乎此可不思乎一司徒司空雖在六官之中皆以親民自治其鄉遂如小司徒職稽國中及四郊都鄙之夫家九比之數遂人即小司空也稽人民授田野簡兵器教稼又辨其夫家六畜車輦老幼廢疾以頒職作事其親民之事如此其詳也諸侯六典建官亦有司徒司空自治其民猶王畿也三代之時天子諸侯無不親民如此後世天子獨居九重之上雖設六官而司徒只司錢穀大府之職也司空只司百工雖有虞衡水利亦具名而已親民之官獨有州縣而已州縣而上有郡守不親民也郡守而上有監司不親民也監司而上有牧伯有巡察而又有六卿制之皆不親民一羊十牧則州縣雖有愛民之實心承奉制使日亦不足矣安能各副其望而自展其志乎故欲求三代之治必復司徒司空二職郡守親民然後可一府史胥徒庶人在官之役也司徒頒職有曰學藝者府史也服事者胥徒也宰夫八職曰府掌官契以治藏史掌官書以賛治然則府史與胥徒宜有分别府者有謀猷操守亷介之人為之官府之主本也史者有文學精敏練達之士為之皆由於庠序之所教養有德行道藝者各以其才之所成者舉用焉亦試之以事之意也稱職有功則入賔興之典孔子嘗為乘田委吏即府史之類也才藝既成乃命以職髙者入太學下者為鄉吏治事之職胥者有才智之稱漢謂之什長掌官叙以治叙則堂上為序次幹辦之役也不稱則復之農畆徒掌官令以徵令堂下皂役是也漢一胥管十徒四職既明則天下弊端絶矣後世則統謂之吏胥吏者鄉吏能者在職之選也胥者堂上之役趨走服役之人也合而名之非也欲復三代之治府史必庠序之中有德行有才藝者為之賢能則入舉選之典而命職焉胥徒則役民為之天下不治未之有也一周禮古經自惟王建國始今首題曰天官冢宰第一地官司徒第二下四官皆然乃後人所加以為書之標題今因之然此總名一官也則太宰之職之前宜題曰天官上舊本無今補之其天官下與五官皆有下則隨卷帙厚薄而別之非有定例也故今亦因卷帙而題之不拘舊本也一周禮序官明言乃立天官乃立地官此設官也序一官之後乃明言太宰之職司徒之職此分職也古本序官在前分職在後與六綱相應後儒解經多析序官繫各職之首與綱不合今悉依古本正之一周禮自漢儒訓釋至于今日不下百家其於名物器數至詳至悉矣然皆以周禮闕冬官故大義多舛逆不通後儒雖有新得者亦以意見移易經文為解其名物多依古註集成亦不能辨此釋自何人始愚今有見於全經所解多出於愚見隨經文而發明之條理脉絡固無先儒之擁遏矣但其名物器數與非大義所關者亦不能一一出自己見為解摘採前人與己說合㑹而成一家之言若有要義之處方著某氏曰鄙見則以按字别之一每篇訓釋之後必作原以發明之蓋周禮之書與他經說義理者不同字字有實事實用幽㣲廣逺故每篇訓釋之後必作原以發明之謂之曰原者推原作經本意也猶原道原性之原其有先儒論著暢達可采者則直書某氏曰不别作原其文繁者節之泛及他章者纂之不純者刪之使簡明易見云一訓釋之中有采先儒之說書曰某氏訓釋之後總解有采先儒論著以代作原者亦書某氏曰覽者無從考某氏為何先儒間有同姓者敬以自漢以來先儒姓氏名字所著書目及地望總列於前使觀者欲求其人有所考證云一音釋只考古註擇其要者註於經文之下易知之字不須音切者畧之然是經之註初亦雙行節經註解原曰乃大書今因雙行之註經文大析及小字難看遂併其經以成段數使觀者得全篇㫖趣故訓釋亦大書與原曰同依正義加釋曰二字别於原曰故名釋原云一六官正經釋原之後約全書大綱如鄉遂封建之類作為通論十篇以發聖人經世大灋之意編為一卷以附於後矣又思古之天下亦今之天下幸逢治教大明之時良灋美意直可繼周矣其間有詳於古而畧於今者有詳於今而畧於古者既提其要具於綱領矣敬取古今之制宜更改損益通變宜民之道著為續論以附於後名曰附錄云周禮全經釋原卷首
